id: FF-0058
overview:
  - "The Sunday of the Blind Man is the sixth Sunday of Pascha, the last of the Sunday commemorations before the Ascension. It recounts Christ's healing of a man who had been blind from birth, narrated in the ninth chapter of the Gospel of John. Passing by, Christ anointed the man's eyes with clay made from earth and spittle and sent him to wash in the Pool of Siloam, from which he returned with his sight. The man's ensuing confession of Christ as Lord frames the day's theme: the opening of the eyes of the body as an image of the opening of the eyes of the soul."
  - 'The commemoration belongs to the Pentecostarion, the liturgical book covering the fifty days from Pascha through Pentecost, sometimes called "the Book of the Fifty Days." Within that season it stands as the penultimate Sunday before the Ascension and Pentecost, following the Sunday of the Samaritan Woman and preceding the Sunday of the Holy Fathers. The week that follows it closes the Paschal afterfeast: the Apodosis of Pascha falls on the Wednesday after this Sunday, marking the transition toward Ascensiontide.'
history:
  - The observance takes its content directly from the Gospel of John (John 9:1-38), read at the Divine Liturgy on this day. In that account Jesus, on the Sabbath, spat on the ground, mixed the saliva with earth to make clay, anointed the eyes of a man blind from birth, and instructed him to wash in the Pool of Siloam, a name the Evangelist notes means "Sent." The man washed and returned seeing, and after questioning by his neighbors and by the Pharisees — during which he was put out of the synagogue for confessing his healer — he came at last to worship Christ as Lord.
  - The Sunday belongs to the fixed cycle of Paschal-season Sundays preserved in the Pentecostarion, each of which was assigned a distinct Gospel and theological emphasis. The Sundays of the Paralytic, the Samaritan Woman, and the Blind Man form a group unified by their reference to Baptism, each illustrating a different dimension of the sacrament, with water imagery figuring prominently in their hymns. Because Pascha was traditionally the time for baptizing new converts, this season as a whole took on a strongly baptismal character, and the Blind Man's washing in Siloam was read as a sign of the baptismal font.
  - The unnamed man of the Gospel has been remembered in Christian tradition under the name Celidonius, by which his memory has been preserved in liturgical commemoration. The Gospel passage drew extended patristic exposition — Saint John Chrysostom and Saint Cyril of Alexandria among others provided detailed theological commentaries exploring its spiritual and Christological dimensions, which shaped the day's interpretation in the Church's services.
meaning:
  - The healing is presented by the synaxarion as one of the most extraordinary of Christ's miracles, since no one had ever opened the eyes of a man born blind. In fashioning clay from earth and applying it to eyes that had never functioned, Christ performs an act of creation — repeating, in the tradition's reading, the first forming of man. Commentators have drawn the parallel with Genesis 2:7, where God shapes humanity from dust and divine breath, so that the mixing of earth and the breath of the Creator's own mouth becomes a sign of Christ's divine authorship over the human person.
  - By working the miracle on the Sabbath, when the Law forbade such activity, Christ showed Himself to be Lord of the Sabbath and therefore equal to God the Father, exercising divine authority over both ritual law and physical affliction. The Church further reads the blindness itself not as punishment but as permitted so that the works of God might be displayed; the Fathers held that the man benefited spiritually from his affliction, receiving enlightenment in both body and mind.
  - "The deeper theme of the day is the contrast between physical and spiritual sight. The man's progress from blindness to reasoned confession of Christ serves as a model of Christian conversion: those who reject Christ remain spiritually blind, while those who believe receive the light of life and come to see and know the Son of God. The synaxarion also reads the blind man as representing the Gentile peoples, whom Christ found as He passed by and taught. The baptismal reading completes this: the faithful are reminded that the Lord has anointed their own eyes with His divine hands and washed them in the waters of Baptism, so that the historical healing becomes an image of every Christian's illumination."
scripture:
  - ref: John 9:1-38
    note: "The Gospel of the day: Christ heals the man born blind, who comes to confess Him as Lord."
  - ref: Genesis 2:7
    note: The forming of man from dust and divine breath, echoed in Christ's making of clay.
  - ref: 2 Kings 5:10
    note: Naaman healed by washing in water, an Old Testament parallel to the washing in Siloam.
hymnography:
  - The hymns of the day, sung within the Pentecostarion, dwell on the theme of spiritual illumination and repentance. The kontakion sets the healed man's condition against the worshipper's own, presenting the believer as one blind in the eyes of the soul who comes to Christ in repentance and calls upon Him as the radiant Light of those in darkness. Across the three baptismally themed Sundays — the Paralytic, the Samaritan Woman, and the Blind Man — water imagery recurs, binding the washing in Siloam to the baptismal font.
