iconography:
  - The festal icon depicts Gabriel announcing the glad tidings to Mary. The archangel is shown with a staff, signifying his role as messenger, while Mary is portrayed standing or seated—often holding yarn or a scroll—with her head bowed to indicate her consent. A ray of light descending from heaven symbolizes the work of the Holy Spirit; in some well-known icons this ray includes a white dove. Traditional depictions concentrate on the moment of the divine announcement and Mary's acceptance of her role as Theotokos.
hymnography:
  - The Orthodox services for the feast include appointed epistle and gospel readings together with proper hymnographic compositions. The Akathist Hymn to the Theotokos is associated with the feast and its season, its themes centered on the salutation of Gabriel and the mystery of the Incarnation.
fastingPractice:
  - "The Annunciation falls during Great Lent, and the feast relaxes the fast: fish is permitted on the day in honor of the Incarnation—one of only a small number of Lenten occasions when fish is allowed (sources note Palm Sunday as the other principal exception). The Divine Liturgy is served even on a Lenten weekday, which is unique to this feast; depending on the day, the Liturgy of St. John Chrysostom or St. Basil is celebrated. When the feast coincides with Great and Holy Friday, the Liturgy of St. John Chrysostom is still served—the only non-paschal occasion when this occurs—and the fasting rule is adjusted accordingly. When the Annunciation falls on Pascha itself (Kyriopascha), it is celebrated jointly with the Resurrection."
customs:
  - Fish is blessed for the table even during Lent, and where the feast falls the joy of the Incarnation is kept despite the fast.
  - In Greece, on the island of Tinos, many make a pilgrimage to the Church of Evangelistria, which houses a miraculous healing icon discovered in 1823; crowds fill the docks and city streets on March 25 and again on August 15.
  - Various Orthodox cultures maintain distinctive Annunciation customs, including Bulgarian traditions, reflecting local expressions of the universal feast.
