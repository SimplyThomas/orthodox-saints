id: FF-0008
overview:
  - The Annunciation of the Theotokos commemorates the archangel Gabriel's announcement to the Virgin Mary in Nazareth that she would conceive and bear the Son of God, and her free assent, "Behold the handmaid of the Lord; be it unto me according to thy word." The account is drawn from the Gospel of Luke (1:26–38), where Gabriel comes to Mary during the sixth month of Elizabeth's pregnancy with John the Forerunner. The Church understands Mary's consent as the moment initiating the Incarnation of Christ.
  - The feast is observed on March 25, a date set exactly nine months before the Nativity of the Lord (December 25). It stands among the Twelve Great Feasts of the Orthodox liturgical year and is counted among the feasts of the Lord as well as of the Theotokos. Its forefeast is kept on March 24 and its leavetaking (apodosis) on March 26, which is also the Synaxis of the Archangel Gabriel; because the feast falls within Great Lent, it has no ordinary afterfeast period.
  - Falling in Lent, the Annunciation is a festal interruption of the fast. The Divine Liturgy is served even on a Lenten weekday—uniquely permitted for this feast—and fish is allowed at the table in honor of the Incarnation, so that the joy of the feast is kept despite the season of preparation.
history:
  - "The feast probably originated shortly before or after the Council of Ephesus (c. 431). It was not yet known at the Synod of Laodicea in 372, though St. Proclus of Constantinople (d. 446) may have referred to it in his homilies. In the Latin Church it first appears in official records in the Sacramentary of Pope Gelasius (d. 496) and later in the Sacramentary attributed to St. Gregory (d. 604). An early artistic witness survives in Rome: the Catacomb of Priscilla contains one of the oldest known depictions of the Annunciation, dated by sources variously to the second and to the fourth century."
  - By the seventh century the feast is spoken of as universally observed. The Tenth Synod of Toledo (656) describes it as already celebrated throughout the Church, and its canon is among the earliest certain written records of the feast. The Council in Trullo (the Quinisext Council of Constantinople, 692) forbade the celebration of festivals during Lent but made an explicit exception for Sundays and for the Annunciation—an exception that fixed the feast's distinctive place within the Lenten discipline.
  - The choice of March 25 was reinforced by patristic reckoning that joined the date to the whole economy of salvation. Church Fathers held that the coming of the Lord and His death should coincide with the creation and fall of Adam, and ancient sources assigned March 25 both to the creation of Adam and to the Crucifixion; this theological numerology underlay the patristic selection of the date. Later, when Dionysius Exiguus introduced the Anno Domini calendar system in 525, he set the beginning of the new year at March 25, holding that grace had begun with the Incarnation on that day.
  - The feast retained cosmic and civic significance in various lands. In Lebanon, March 25 remains an official national holiday, and in Greece the date coincides with the commemoration of Greek Independence. Across Orthodox cultures the universal feast acquired localized expressions and customs while keeping its fixed place on the calendar.
meaning:
  - The Annunciation is understood as the beginning of salvation and the revelation of the eternal mystery of God's plan for the redemption of humanity through the Incarnation. In the words the Church applies to the feast, it is "the beginning of our salvation, and the revelation of the eternal mystery." What is announced to Mary is that Christ is conceived of the Holy Spirit and of the Virgin, as confessed in the Nicene-Constantinopolitan Creed.
  - Central to the feast's theology is the free consent of the Virgin. Her willing acceptance is treated not as passive but as genuine cooperation in the work of salvation; St. Philaret of Moscow taught that "the word of the creature brought the Creator down into the world," underscoring Mary's active participation in salvation history. Through her assent she is called the workshop—or the very site—of salvation.
  - The Fathers read the event against the whole of Scripture. They interpret the reference to "her seed" in Genesis 3:15 as prophetically pointing to Christ, so that the Annunciation fulfills God's ancient promise for humanity's redemption. They also draw the parallel between Mary and Eve, exploring how the Virgin's obedient acceptance reverses the consequences of ancestral sin—the point at which divine purpose intersects with human consent.
