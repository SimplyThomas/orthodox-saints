hymnography:
  - On the Lenten Memorial Saturdays many of the hymns of the Daily Office and of the Divine Liturgy are appointed to the remembrance of the departed. Within the Panikhida served on the day, the hymnody includes the Kontakion of the Departed and concludes with the singing of 'Memory Eternal' for those commemorated.
