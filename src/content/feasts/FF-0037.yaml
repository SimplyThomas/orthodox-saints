sections:
  - heading: Kolyva and its origins
    body:
      - Kolyva, the liturgically blessed offering of boiled wheat central to Orthodox memorial practice, is used for the benefit of the departed as a form of commemoration. Its basic form is boiled wheat kernels sweetened with honey or sugar, to which are commonly added sesame seeds, almonds, walnuts, cinnamon, pomegranate seeds, raisins, anise, and parsley.
      - The custom is of great antiquity, with roots reaching back before Christianity to ancient Greek offerings of cooked seeds; the classical scholar Martin P. Nilsson noted the practice as an exceptional instance of the continuity of a cult usage traceable through the ages. In Christian use the offering appears at funerals across Greek, Romanian, Serbian, and other Orthodox traditions, at memorial services on the third, ninth, and fortieth days after death and on anniversaries, on the Soul Saturdays, and on Theodore Saturday, the first Saturday of Great Lent.
  - heading: The wider cycle of Soul Saturdays
    body:
      - The complete cycle of Soul Saturdays in the Orthodox Church includes the Saturday of Meatfare Week before Great Lent; the second, third, and fourth Saturdays of Great Lent; Radonitsa on the Monday or Tuesday following St. Thomas Sunday; the Saturday before Pentecost; the Intercession Saturday before October 1; and Demetrius Saturday before October 26.
      - Jurisdictional variation exists across this cycle. The Bulgarian Church substitutes the feast of Saint Michael on November 8 for Demetrius Saturday; the Russian Church adds observances including Victory Day on May 9 and a warrior commemoration on September 11; and the Serbian Church keeps a commemoration near the conception of St. John the Baptist on September 23.
