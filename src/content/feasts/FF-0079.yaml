id: FF-0079
overview:
  - The Sunday before the Exaltation of the Cross is a preparatory observance that falls in the window of September 7 through 13, on the Sunday immediately preceding the feast of the Exaltation of the Holy Cross on September 14. It belongs to the cluster of days—the Saturday and Sunday before and after September 14—that the Church surrounds the great feast with, each marked by special Epistle and Gospel readings about the Cross at the Divine Liturgy.
  - "As a preparatory Sunday, it bridges the ordinary course of the liturgical calendar with the coming feast, readying the faithful to venerate the holy relic of the Cross. Its appointed readings turn the assembly's attention to the mystery the feast will celebrate: the Son of Man lifted up so that whoever believes in Him should have eternal life."
  - The Sunday is dedicated to the Cross, and its readings and hymnody frame the crucifixion not merely as a past event but as the centerpiece of Christian salvation—an instrument of shame transformed into the sign of glory.
history:
  - "The observance draws its meaning from the feast it precedes. The Exaltation of the Holy Cross commemorates three principal events: the finding of the True Cross by Saint Helena around 326, when Bishop Macarius of Jerusalem conducted excavations to locate Calvary and the Holy Sepulchre; the consecration of the Constantinian basilica over the Holy Sepulchre in Jerusalem on September 13, 335; and the elevation of the True Cross at Hagia Sophia in Constantinople in 629 by the emperor Heraclius, after it had fallen into the hands of the Persian emperor Chosroes II in 614. The day after the consecration of the church in Jerusalem, the relic of the Cross was shown—exalted—for the first time to the people for veneration."
  - The feast originated with that dedication of the Church of the Holy Sepulchre on September 13–14, 335, celebrated with great solemnity by bishops from across the Mediterranean. The Ancient Georgian Iadgari, or Chantbook, bears witness to the celebration of the Exaltation in Jerusalem prior to the middle of the sixth century, and the feast emerged at Rome during the seventh century, commemorating above all the recovery of the True Cross from the Persians under Heraclius.
  - Within this festal complex, the Church appointed the Saturday and Sunday before and after September 14 with their own readings about the Cross. For the Sunday before, homilies of Saint John Chrysostom, Saint John of Kronstadt, and other Fathers were appointed, emphasizing the Cross as central to Christian salvation and spiritual transformation. On this same Sunday the Church also commemorates Saint Chrysostomos of Smyrna and fellow hierarchs martyred during the 1922 Asia Minor Catastrophe, linking modern martyrdom to Christ's redemptive suffering.
meaning:
  - The theological emphasis of the Sunday rests on the appointed Gospel, John 3:13–17, which addresses how the Son of God was destined to die for humanity's redemption from sin, the curse, and death—not by any other means, but through the Cross. The passage recalls Moses lifting the serpent in the wilderness as a foreshadowing of Christ's elevation on the Cross, so that just as the Son of Man must be lifted up, those who believe might have eternal life.
  - "Several interconnected themes converge: divine love, in God's compassion for humanity and desire for its salvation; the Cross as the necessary means of redemption; the connection between faith in Christ and spiritual immortality; and preparation, the spiritual readiness to venerate the holy relic during the feast itself. The Sunday positions the Cross not as a historical event only but as the centerpiece of Christian salvation theology—an instrument of shame transformed into a sign of glory."
  - "The Epistle, Galatians 6:11–18, concludes Paul's letter with reflections on the Cross's spiritual importance, boasting only in the Cross of Christ, through which the world has been crucified and by which the Christian lives. The appointed patristic homilies draw out the paradox at the heart of the feast: the call to self-denial and to take up one's cross in discipleship, the connection between Christ's crucifixion and His glorification, and death leading to life through Christ's sacrifice."
  - The wider tradition distinguishes the veneration due to the Cross from the worship reserved for God alone. The Second Council of Nicaea in 787 taught that the honor paid to an image passes to its prototype—that veneration involves relative honor directed toward Christ, rather than the absolute worship (latria) that belongs to the divine nature alone. Unlike Good Friday, which is dedicated to the passion and crucifixion, the feast this Sunday prepares for celebrates the Cross itself as the sign of salvation.
timeline:
  - when: c. 326
    title: Finding of the True Cross
    body: Saint Helena's search leads Bishop Macarius of Jerusalem to conduct excavations locating Calvary and the Holy Sepulchre.
  - when: September 13–14, 335
    title: Consecration in Jerusalem
    body: The Constantinian basilica over the Holy Sepulchre is consecrated; the day after, the relic of the Cross is exalted before the people for veneration for the first time.
  - when: "614"
    title: Loss to Persia
    body: The True Cross falls into the hands of the Persian emperor Chosroes II.
  - when: "629"
    title: Elevation at Hagia Sophia
    body: The emperor Heraclius elevates the recovered True Cross at Hagia Sophia in Constantinople.
  - when: "787"
    title: Second Council of Nicaea
    body: The council draws the distinction between veneration of the Cross and the worship (latria) that belongs to the divine nature alone.
  - when: "1922"
    title: Asia Minor Catastrophe
    body: Saint Chrysostomos of Smyrna and fellow hierarchs, martyred in the catastrophe, come to be commemorated on this Sunday.
scripture:
  - ref: John 3:13-17
    note: "The appointed Gospel: the Son of Man lifted up as Moses lifted the serpent, that whoever believes should have eternal life."
  - ref: Galatians 6:11-18
    note: "The appointed Epistle: Paul's closing reflection, boasting only in the Cross of Christ."
hymnography:
  - "The appointed homilies for the Sunday—drawn from Saint John Chrysostom, Saint John of Kronstadt, and other Fathers—emphasize the Cross as central to Christian salvation and spiritual transformation, the connection between Christ's crucifixion and His glorification, the call to self-denial and to take up one's cross, and the paradox of death leading to life through Christ's sacrifice. Chrysostom noted the Cross's universal prominence: that kings take up the Cross in place of their diadems, and that it is found on the imperial purple, in prayers, on armor, on the holy table, and throughout the world."
fastingPractice:
  - This Sunday itself carries no special fasting discipline in the dossier. The feast it prepares for, the Exaltation on September 14, is always kept as a fast day, on which the Church's practice excludes meat, dairy, and fish. On the eve of the feast the priest places a tray bearing the Cross on a bed of fresh basil leaves or flowers, and the Cross remains in the center of the temple throughout the afterfeast for the faithful to venerate.
related:
  - name: Saint Chrysostomos of Smyrna
    note: Commemorated on this Sunday together with fellow hierarchs martyred in the 1922 Asia Minor Catastrophe, linking modern martyrdom to Christ's redemptive suffering.
  - name: Saint Helena
    note: Whose search led to the finding of the True Cross around 326, the event underlying the feast this Sunday prepares for.
  - name: Emperor Heraclius
    note: Who elevated the recovered True Cross at Hagia Sophia in 629 after its return from Persia.
