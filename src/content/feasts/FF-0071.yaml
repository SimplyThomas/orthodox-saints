  - ref: Colossians 1:16
    note: Cited alongside Ephesians as scriptural basis for the classification of the heavenly ranks.
iconography:
  - The archangels are each depicted with distinguishing attributes. Michael tramples the devil with a spear and bears a white banner; he also appears as an angelic warrior, fully armed with helmet, sword, and shield, standing over a dragon and sometimes piercing it with a lance, and he is shown holding a pair of scales for weighing souls or carrying the book of life, signs of his part in the judgment. Gabriel holds a paradise branch or a lantern; Raphael guides Tobias and carries healing medicines; Uriel bears a naked sword and a fiery flame; Selaphiel stands in a prayerful posture with folded hands; Jehudiel holds a golden crown and a three-thonged whip; Barachiel displays a white rose; and Jeremiel carries balance scales. In many icons Christ is accompanied by a number of angels, with Michael a predominant figure among them.
