sections:
  - heading: Michael's rank among the angels
    body:
      - Tradition has not spoken with one voice on Michael's precise place within the angelic ranks. Some theologians positioned him above all the angels, and among them Saint Basil; some held him to be prince of the Seraphim, while others placed him as prince of the lowest choir. The feast honors him above all as the leader of the whole company of the bodiless powers under whose command the nine ranks are gathered.
