id: FF-0018
overview:
  - The Nativity Fast is a forty-day period of abstinence and penance observed by the Eastern Orthodox Church in preparation for the feast of the Nativity of Christ on December 25. On the Revised Julian (New) calendar it runs from November 15 through December 24; churches that keep the Julian calendar begin on the same liturgical date, November 15, which corresponds to November 28 on the Gregorian reckoning.
  - It is also called Philip's Fast (or St Philip's Fast) because it begins the day after the feast of the Apostle Philip on November 14. The fast prepares the faithful spiritually for Christmas through prayer, fasting, and almsgiving, orienting the whole season toward the coming Incarnation of God.
  - Though it shares the forty-day length of Great Lent, the Nativity Fast is kept less severely, and its earlier weeks admit fish, wine, and oil on many days; the discipline tightens in the final stretch before the feast. As a fast season, it functions as a period of preparation rather than a liturgical celebration in its own right, and it overlaps a rich sequence of forefeast commemorations and readings that anticipate the Nativity.
history:
  - "A distinct pre-Christmas fast was not part of the earliest Church. In the West, preparation for the Nativity appears no earlier than the late fourth century: the Synod of Saragossa (380 CE) mandated church attendance from December 17 through Epiphany, and St Caesarius of Arles (502–542) referenced a pre-Christmas fasting period, though no universal observance yet existed. The Synod of Mâcon in 581 ordered special fasting from November 11 on certain weekdays."
  - In the Greek East, a documented pre-Christmas fast is likewise late. St Theodore the Studite (d. 826) made no mention of such a season when discussing Greek fasts and feasts, suggesting it was not yet a fixed observance in his time. When the Eastern fast did take hold it functioned as a fasting season extending from November 15 to Christmas, rather than as a liturgical cycle of celebration in the manner of the later Western Advent.
  - "The fast was not fully standardized in its forty-day form until 1166, when the Council of Constantinople established the present forty-day format. Earlier practice varied: a twelfth-century Church canonist noted that lay people might reasonably observe just one week before Christmas, indicating that the length of the fast for the laity remained flexible. The November 15 starting rule proved durable — a 1720 council of Ruthenians maintained it."
  - St Symeon of Thessalonica (d. 1429) articulated the fast's rationale, teaching that in fasting for forty days the faithful reflect upon and receive from the Virgin the living Word. This theological framing set the Eastern fast apart from the Western Advent, whose tradition developed around a different set of themes.
meaning:
  - The Nativity Fast centers wholly on the Incarnation of God. Eastern Orthodox Nativity theology emphasizes the proclamation and glorification of the Word made flesh, a focus that distinguishes it from the Western Advent framework, which reflects on three comings of Christ — his Incarnation at the Nativity, his reception through grace and Holy Communion, and his Second Coming in judgment. The Eastern fast has no such tripartite scheme; its whole weight rests on the coming of God in the flesh.
  - The purpose of the fasting is spiritual reorientation. Theologically, the discipline aims to turn the faithful away from worldly needs and toward spiritual ones. Eastern Orthodox theology emphasizes the synthesis of body and soul, employing physical discipline to effect spiritual transformation and to develop Christ-likeness in the one who fasts.
  - "The season is woven through with Old Testament anticipation of the Incarnation. Prophets who foretold the coming of Christ are commemorated during the fast, and the fast's readings and commemorations draw the righteous of the old covenant into the preparation for the Nativity, presenting the whole history of salvation as leading toward the birth of the Savior. St Symeon of Thessalonica gave voice to this expectant reception: through forty days of fasting the faithful reflect upon and receive from the Virgin the living Word."
