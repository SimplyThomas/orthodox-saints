hymnography:
  - During the Forefeast of the Nativity (December 20–24), daily Nativity hymns are chanted as the services turn fully toward the coming feast. In the Russian tradition, church hangings are changed to festive white for this period. Following the conclusion of the Entry of the Theotokos into the Temple (November 21), a Great Feast that falls within the fast, Nativity hymns resume on Sundays and high-ranking feast days.
  - The Paramony service on Christmas Eve combines the Royal Hours in the morning with a Vesperal Divine Liturgy of St Basil the Great and includes the exultant chanting of the refrain 'God is with us,' interspersed with passages from the prophet Isaiah (8:9–18 and 9:2–7) that proclaim the presence of God among his people.
fastingPractice:
  - The Nativity Fast is not kept as severely as Great Lent or the Dormition Fast. Throughout the season the traditional practice abstains from red meat, poultry and meat products, eggs, and dairy, while fish, wine, and oil are permitted on many days — commonly Saturdays and Sundays and most Tuesdays and Thursdays. Additional allowances are traditionally granted on high feast days within the season, such as the feast of St Barbara (December 4) and the feast of St Nicholas (December 6).
  - In one common reckoning, stricter fasting applies chiefly to Mondays, Wednesdays, and Fridays, with fish permitted on Sundays. The strictest period runs December 20–24, during which fish is no longer permitted. On the Paramony (December 24), tradition holds that no solid food is taken until the evening star is seen or until after the Vesperal Divine Liturgy.
  - "The December 25 through January 4 period is fast-free; strict fasting resumes on the eve of Theophany, January 5. As with all fasting, the practice is descriptive and pastoral rather than a rigid rule: the ill, the very young, the elderly, and nursing mothers are exempt from the full discipline, and consultation with a confessor is encouraged."
customs:
  - Called St Philip's Fast because it begins on November 15, the day after the feast of the Apostle Philip.
  - Allowances of fish, wine, and oil are traditionally kept on the feasts of St Barbara (December 4) and St Nicholas (December 6) within the fast.
  - In the Russian tradition, church hangings are changed to festive white during the Forefeast (December 20–24) as Nativity hymns are chanted daily.
sections:
  - heading: Commemorations within the Fast
    body:
      - "The season carries a sequence of commemorations that draw the Old Testament toward the Nativity. Old Testament prophets who prophesied the Incarnation are remembered during the fast: Obadiah (November 19), Nahum (December 1), Habakkuk (December 2), Zephaniah (December 3), Haggai (December 16), and Daniel together with the Three Holy Youths (December 17). The three youths in the fiery furnace are interpreted as a type of the Virgin Mary, who conceived God the Word in her womb without being consumed."
      - Two Sundays gather the righteous of old. The Sunday of the Holy Forefathers, two Sundays before the Nativity (falling December 11–17), commemorates Old Testament righteous figures from Adam through the patriarchs, emphasizing their perseverance and their symbolic connection to the Incarnation. The Sunday of the Holy Fathers, the Sunday immediately before the Nativity, remembers all the righteous from creation through St Joseph and features three Old Testament readings with the Epistle of Hebrews 11:9–40 and the Gospel of Matthew 1:1–25.
      - The Great Feast of the Entry of the Theotokos into the Temple (November 21) falls within the fast; after its conclusion, Nativity hymns resume on Sundays and high-ranking feast days. The Paramony service on December 24 combines the Royal Hours with a Vesperal Divine Liturgy of St Basil the Great, whose eight Old Testament readings prefigure or prophesy the Incarnation of Christ.
