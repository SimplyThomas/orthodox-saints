celebration:
  intro: Ways to keep the Nativity Fast (Advent) as a family.
  ideas:
    - idea: Make a 40-day countdown to the Nativity — a paper chain, countdown cards, or a fabric Advent calendar.
    - idea: "Keep a Jesse Tree: read a short passage each evening from creation to the manger and hang a small ornament for each, walking through salvation history."
    - idea: Celebrate the "little feasts" within the fast — the Entry of the Theotokos (Nov 21), St Nicholas (Dec 6), and St Lucy (Dec 13) — to keep the season joyful.
    - idea: "Take on a family almsgiving project: collect coats or food for a shelter, adopt a giving-tree family, or do secret acts of kindness like St Nicholas."
    - idea: Set out a wooden Nativity set the children can handle, adding figures as the season progresses.
    - idea: Gather daily for prayer, a hymn, and a Nativity storybook from a small stack of Christmas saint books.
