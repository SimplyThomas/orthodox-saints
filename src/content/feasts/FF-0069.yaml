id: FF-0069
overview:
  - The Deposition of the Robe of the Most Holy Theotokos at Blachernae, kept on July 2, commemorates the enshrinement of the robe of the Mother of God — her maphorion, or outer veil — in the church at Blachernae in Constantinople in the fifth century. The relic became the object to which the imperial city ascribed its protection in times of siege, and its deposition is remembered as the founding of one of the great Marian shrines of the Byzantine capital.
  - It is one of two Constantinopolitan relic-feasts of the Theotokos, the counterpart to the deposition of her cincture (belt) commemorated on August 31. Together these feasts express the ancient conviction that the material tokens of the Mother of God's earthly life remained present and active within the city dedicated to her.
  - The feast belongs to the fixed calendar and honors both a specific relic and the church built to house it near the seacoast at Blachernae, a site already associated with the Theotokos before the robe's arrival.
history:
  - According to tradition, the robe came to Constantinople during the reign of Emperor Leo I (Leo the Great, 457–474). Two brothers named Galbius and Candidus, associates of the emperor, set out from the capital to venerate the holy places in Palestine. Near Nazareth they lodged with an elderly Jewish woman who kept a sacred room where many lamps were lit, incense burned, and the sick gathered for healing. When questioned, she revealed that she possessed the Robe of the Mother of God, which worked many miracles. Tradition holds that the garment had been bequeathed by the Virgin Mary herself before her Dormition to a pious maiden, and had been passed down within the same family across generations.
  - The brothers secretly had a copy of the chest made and exchanged it for the original, carrying the robe back to Constantinople. The relic was authenticated by Saint Gennadius, Patriarch of Constantinople, together with Emperor Leo. A new church in honor of the Mother of God was constructed at Blachernae near the seacoast, and in the mid-fifth century Saint Gennadius transferred the sacred robe into the church with solemnity, placing it within a new reliquary. The maphorion and part of the belt were later added to the same reliquary.
  - The church at Blachernae itself predated the arrival of the relic. Built by the Empress Pulcheria around 450 and known as the Panagia Blacherniotissa, it was one of three Marian churches she established in the city, alongside the Monastery of the Panagia Hodegetria and the Chalkoprateia. Situated near the seacoast and the city walls, it was the first major church encountered on approach from the sea, and so acquired a symbolic role as the site of the Theotokos's guardianship over the city's defenses. It housed a sacred spring associated with the Virgin. When the robe was enshrined there in 458, the church was already an established sacred space dedicated to the Mother of God.
  - The relic was afterward credited with protecting Constantinople during repeated sieges — by the Avars in 626 and the Arabs in 717. The most celebrated episode came during the attack by the Rus' in 860. Tradition relates that Emperor Michael III prayed at Blachernae while Patriarch Photius called the people to repentance; the sacred robe was carried in procession around the city walls, and its edge dipped into the waters of the Bosphorus, after which the attacking forces withdrew. Later Byzantine accounts elaborated this into a story of a sudden tempest that dispersed the enemy ships. Historians observe that Photius's own sermon from that August, documenting the siege's end, makes no mention of Michael III's return to the capital nor of a miracle with the veil, suggesting that the fully miraculous narrative developed in later Byzantine historiography.
  - "The annual feast on July 2 is attributed to Patriarch Photius. The deliverance and the veneration it fostered carried significance beyond the capital: the legend of the robe contributed substantially to the veneration of the Theotokos in Russia and to the icon-painting traditions centered on the Blachernae church, and the events were later linked to the subsequent Christianization of Kievan Rus."
meaning:
  - The feast expresses the Church's teaching that the Mother of God continues to intercede for and protect her people, made tangible through a relic of her earthly garment. The robe is honored not for itself but as a token of her abiding presence and maternal care, focused upon the city that had placed itself under her patronage.
  - The enshrinement of a major Theotokos relic under Leo I was consistent with an imperial religious policy that reinforced devotion to the Mother of God in the years after the Council of Chalcedon (451). The title Theotokos — God-bearer — had been affirmed as the theological confession of the Church, and the veneration of her robe gave that confession a public, civic, and material expression in the life of the capital.
  - In the memory of the sieges, and above all the deliverance of 860, the feast came to embody the conviction that the city's true defense lay not in its walls but in the protection of the Theotokos. Even where later tradition amplified the historical account, the enduring meaning the Church draws from the feast is that of refuge sought and found in the intercession of the Mother of God — a theme that would spread from Constantinople into the wider Orthodox world, especially the emerging Christian nations of the Slavic north.
timeline:
  - when: c. 450
    title: Church of Blachernae built
    body: The Empress Pulcheria builds the Church of St. Mary of Blachernae (Panagia Blacherniotissa) near the seacoast, one of three Marian churches she established in Constantinople.
  - when: 457–474
    title: Reign of Leo I
    body: During the reign of Emperor Leo the Great, the brothers Galbius and Candidus bring the Robe of the Theotokos from Palestine to Constantinople; the relic is authenticated by Emperor Leo and Patriarch Gennadius.
  - when: mid-5th century
    title: Deposition of the robe
    body: Saint Gennadius, Patriarch of Constantinople, transfers the sacred robe into the Blachernae church and places it within a new reliquary; the maphorion and part of the belt are later added.
  - when: "860"
    title: Deliverance during the Rus' attack
    body: Tradition holds that during the Rus' siege, Emperor Michael III and Patriarch Photius carry the robe in procession around the city walls and dip its edge into the water, after which the attackers withdraw.
  - when: 9th century
    title: Institution of the July 2 feast
    body: Patriarch Photius establishes the annual feast commemorating the robe on July 2.
iconography:
  - Byzantine and later tradition depicted the enshrinement of the relic itself. A sixteenth-century Russian icon shows Emperor Leo I enshrining the Robe of the Theotokos in the church at Blachernae, presenting the emperor and patriarch as the guarantors of the relic's authenticity and its solemn deposition. The icon-painting traditions centered on the Blachernae church became especially influential in Russia, where devotion to the robe and its protecting power took deep root.
sections:
  - heading: A pair of Constantinopolitan relic-feasts
    body:
      - The deposition of the robe on July 2 is one of two Constantinopolitan relic-feasts of the Theotokos. Its counterpart is the deposition of her cincture, or belt, commemorated on August 31. Both feasts arose from the presence of tokens of the Mother of God's earthly life within the capital and the churches built to house them, and together they framed the liturgical year with the memory of her material protection over the city.
