celebration:
  intro: Ways to keep the feast of the Lord's Baptism and the blessing of the waters at home.
  ideas:
    - idea: Bring home a bottle of blessed Theophany water; drink a little on an empty stomach through the season and keep the rest in the icon corner for the year.
    - idea: Reverently sprinkle each room and the thresholds and windows of your home with the holy water as a family blessing.
    - idea: "Prepare for the priest's house blessing: tidy up, open the door of every room, and turn on the lights before he arrives."
    - idea: Let a child lead the house-blessing procession with a candle, going room to room — a memorable way to offer the whole home to God.
    - idea: Reassure children (and yourself) that the blessing is God's welcome and grace, not an inspection — the home is blessed in whatever condition it is in.
    - idea: Read the account of Christ's baptism in the Jordan and sing the troparion of Theophany at the icon corner.
    - idea: Walk to a nearby river, lake, or stream and talk about how Christ sanctified all water — and all creation — by entering the Jordan.
