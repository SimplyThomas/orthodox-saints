iconography:
  - Orthodox icons of the Last Judgment share a set of distinctive compositional elements. Christ is seated at the center, flanked by angels and by the Virgin Mary and John the Evangelist in a Deesis group. Saint Michael is shown weighing the deceased or directing the proceedings, while the dead rise from their graves at the base of the composition. The saved are led toward heaven, depicted as a fortified gateway, and the damned are herded toward hell by demons. A characteristic river of fire, rendered as a serpent-like band, descends from Christ's feet toward hell, and the figures of Adam and Eve are often shown below Christ or the empty throne prepared for judgment (the hetoimasia).
fastingPractice:
  - Meatfare Sunday is the last day on which meat is eaten before Pascha. In the week that follows—called Maslenitsa in the Slavic tradition and Cheesefare week elsewhere—the Church's practice sets meat aside while permitting eggs, fish, and dairy on any day of the week. This transitional week forms a gradual step toward the stricter disciplines that begin with Great Lent, so that the fast is entered by degrees rather than all at once. Practice and typikon prescriptions vary by tradition; the faithful are directed to their own priest for how the discipline is kept.
customs:
  - The eating of meat ceases after Meatfare Sunday; it is the last day meat is permitted before Great Lent.
  - In the following week (Maslenitsa in the Slavic tradition, Cheesefare week elsewhere), eggs, fish, and dairy remain permitted on any day while meat is set aside.
