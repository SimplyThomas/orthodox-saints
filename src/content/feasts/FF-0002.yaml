id: FF-0002
overview:
  - The Nativity of the Theotokos commemorates the birth of the Virgin Mary to her aged and previously childless parents, the Righteous Joachim and Anna, who conceived her in answer to long prayer. It is celebrated on September 8 and is counted among the Twelve Great Feasts of the liturgical year.
  - "Because the Orthodox Church year opens on September 1, the Nativity of the Theotokos stands as the first of the Great Feasts in the fixed calendar cycle. Its placement is understood to be fitting: the year of salvation history begins with the coming into the world of the one who would bear Christ."
  - The feast is served with a forefeast on September 7 and concludes with its apodosis (leave-taking) on September 12. Its scriptural and hymnographic tradition presents Mary's birth not merely as a family event but as the dawn of humanity's redemption.
history:
  - The earliest known account of Mary's birth is preserved in the Gospel of James, also called the Protoevangelium of James, an apocryphal text dated to around 150 AD. There her parents are named Joachim and Anna. Joachim is described as a wealthy member of one of the Twelve Tribes of Israel who, together with Anna, was deeply grieved by their childlessness; tradition holds that each was informed separately by an archangel of Anna's coming pregnancy.
  - The feast itself likely originated in Syria or Palestine at the beginning of the sixth century, in the period following the Council of Ephesus (431), when veneration of the Mother of God intensified. Evidence for it appears in sixth-century hymns and in the Georgian Chantbook of Jerusalem, compiled in the mid-sixth century. The first liturgical commemoration is connected with the sixth-century dedication of the Basilica Sanctae Mariae ubi nata est — now the Church of Saint Anne in Jerusalem — which stood at the site known as the Shepherd's Pool, thought to have been the home of Mary's parents.
  - By the seventh century the Byzantine churches were formally keeping the day as the Feast of the Birth of the Blessed Virgin Mary. At Rome the feast began to be observed toward the end of the seventh century, brought there by Eastern monks; Pope Innocent IV established an octave for it in 1243. Across both Eastern and Western traditions the feast is celebrated on September 8.
  - The theological and liturgical elaboration of the feast owes much to its early hymnographic tradition, associated especially with Saint Andrew of Crete and Saint John of Damascus. A wider body of patristic homilies and encomia developed around the day, attributed to Saint John of Damascus, Saint Andrew of Crete, Saint Photios the Great, Saint Nicholas Cabasilas, Saint Gregory Palamas, and Saint John of Kronstadt.
meaning:
  - The Church understands the birth of Mary as the beginning of the age of salvation. The OCA synaxarion situates her arrival at a time when human moral decay seemed to make restoration altogether impossible; her coming into the world is understood as the dawn of redemption, since she would become the vessel through whom God would take flesh.
  - The liturgical texts present the feast as a cosmic salvific event. The Troparion (Tone 4) proclaims universal joy and names Christ the Sun of Righteousness rising through Mary, celebrating the reversal of the ancestral curse and of death through her role as Theotokos. The Kontakion (Tone 4) celebrates the resolution of Joachim and Anna's barrenness and announces liberation from death's corruption and freedom from the guilt of sin, declaring that the barren woman gives birth to the Theotokos. Recurring themes are the reversal of human fallenness — Adam and Eve, barrenness, death — Mary's instrumental role in redemption as the God-bearer, and joy and restoration as spiritual outcomes.
  - "Orthodox theology maintains a distinction from the Roman Catholic doctrine of the Immaculate Conception, which it explicitly rejects. Instead, it holds that Mary received ancestral sin through normal human conception and required salvation like all humanity, while there is general Orthodox consensus that she was cleansed from sin at the Annunciation. This understanding is captured in the verse from the tradition: 'Anna, all mothers truly you surpassed, until your daughter should become your Mother' — Anna's motherhood of Mary is itself surpassed by Mary's divine maternity as Mother of God incarnate."
