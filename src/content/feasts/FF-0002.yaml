hymnography:
  - The feast's principal hymns are the Troparion and Kontakion, both in Tone 4. The Troparion proclaims universal joy and names Christ the Sun of Righteousness rising through Mary, celebrating the reversal of the curse and of death through her role as Theotokos. The Kontakion celebrates the ending of Joachim and Anna's barrenness and announces liberation from the corruption of death and freedom from the guilt of sin. The early hymnographic tradition, associated especially with Saint Andrew of Crete and Saint John of Damascus, contributed greatly to the feast's theological and liturgical elaboration.
customs:
  - Numerous shrine icons across Greece are celebrated on September 8, including Panagia Tsambika on Rhodes and icons on Samos, Chios, and Tinos, many associated with healing and with answered prayers for childless couples — a devotional pattern mirroring the narrative of Joachim and Anna.
  - Several Theotokos icons are venerated on this day, among them the Kursk Root Icon ('Of the Sign'), one of the most ancient icons of the Russian Church; the Pochaev Icon, connected with a monastic vision of 1340; and the Kholm Icon, traditionally attributed to the Evangelist Luke.
