celebration:
  intro: Ways to keep the Ascension of the Lord at home.
  ideas:
    - idea: Attend the Ascension Liturgy (usually a Thursday) and learn the feast's troparion beforehand so children can follow along.
    - idea: Dress in white and set fresh white flowers before the festal icon to echo the feast's brightness.
    - idea: Take a family hike and picnic on a hilltop under the open sky, retelling the ascent of the Mount of Olives.
    - idea: Lie on a blanket and watch the clouds, talking about Christ taken up in a cloud and His promise to return the same way.
    - idea: Trace Jerusalem, Judea, Samaria, and the wider world on a map, showing how the apostles would carry the Gospel "to the ends of the earth."
    - idea: At the table, explain simply how Christ raises human nature up to God.
