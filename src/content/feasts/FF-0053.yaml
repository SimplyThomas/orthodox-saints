id: FF-0053
overview:
  - Radonitsa (also Radunitsa, Radonica, or Provody in Ukrainian tradition) is a Slavic Orthodox commemoration of the departed observed on the Tuesday after Thomas Sunday, the second Tuesday after Pascha (the ninth day of the paschal season). It is the first occasion after Pascha on which the Church formally remembers the dead, carrying the proclamation of the Resurrection to the graves of the faithful.
  - The name derives from the Slavic word radost, meaning joy, and the day is often rendered the "Day of Rejoicing" — for the Church announces Christ's victory over death even at the tomb. In Kievan Rus' it was known as Krasnaya Gorka ("Red Hill" or "Beautiful Hill"), while in Serbia the associated commemoration is called Pobusani ponedeljak ("Tomb-Sweeping Monday").
  - Kept chiefly by Russian, Serbian, and Bulgarian churches — and by Russian, Belarusian, and Ukrainian communities worldwide — Radonitsa joins a memorial service and cemetery visitation to the paschal greeting "Christ is Risen," so that the remembrance of the departed is set wholly within the joy and hope of the Resurrection.
history:
  - The observance grew out of an older Slavic custom of visiting family graves in springtime to feast together. After the Christianization of the Slavs this practice was received into the life of the Russian Orthodox Church and reshaped as Radonitsa, retaining its cultural significance while taking on a theological emphasis on resurrection hope.
  - Sources point to ancient roots for a joyful commemoration of the dead in the paschal season. St. Ambrose of Milan (340–397) spoke of commemorating the departed after Pascha and sharing joy with the holy martyrs, which he understood as announcing the glory of the Lord's resurrection. St. John Chrysostom (349–407) likewise testified to a joyful commemoration of the departed on the Tuesday of Thomas Week.
  - "The placement of the day is bound to the discipline of the paschal season: special prayers and memorial services for the departed are set aside from Great and Holy Thursday through Thomas Sunday, so that Holy Week and the resurrection joy of Bright Week are not overshadowed. Radonitsa therefore falls at the first opening after this period. The Tuesday reckoning became customary in part because many monasteries traditionally fast on Mondays; keeping the commemoration on Tuesday allowed all the faithful to share paschal foods without conflict with the fast. In some regions of southwest Russia the day is instead observed on the Monday of Thomas Week."
  - "Though the Typikon prescribes no special office for the day, Radonitsa has the standing of a firmly established pious custom. In pre-Revolutionary Russia its character as a day of rejoicing was marked publicly: taverns remained closed and alcoholic beverages were not sold until the day itself."
meaning:
  - The heart of Radonitsa is the meeting of Pascha and the grave. The Church does not mourn the departed apart from the Resurrection but carries the paschal proclamation to the cemetery, greeting the dead with "Christ is Risen" and answering, as it were, on their behalf. The very name — the Day of Rejoicing — declares that the remembrance of the dead is an act of joy, grounded in Christ's victory over death.
  - "The day is understood to embrace the departed faithful of every age: those Orthodox Christians of all times who have died in faith and in the hope of resurrection. In this way the commemoration binds the individual dead to the whole company of the reposed and to the general resurrection yet to come."
  - "Placing painted Easter eggs upon the graves gives visible form to this teaching: as St. Ambrose and the wider tradition affirm, the sharing of paschal joy with the departed is itself a proclamation of the resurrection. The eggs and the paschal greeting spoken at the tomb are meant to recall the General Resurrection and the hope it brings to all."
