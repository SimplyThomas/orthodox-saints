hymnography:
  - Radonitsa has no proper office prescribed by the Typikon; it observes the memorial forms of the Church within the paschal season. The services carry paschal hymns and litanies for the departed, and the Panikhida celebrated after the Divine Liturgy concludes with the chant "Memory Eternal." The commemoration thus joins the paschal chants sung during Bright Week to the prayers for the reposed, framing the memory of the dead within the joy of the Resurrection.
fastingPractice: []
customs:
  - After the Divine Liturgy a Panikhida (memorial service) is served for the reposed, and the paschal foods brought by the faithful are blessed.
  - Clergy process to the cemetery with cross, incense, and candles, where paschal hymns and litanies for the departed are chanted, concluding with "Memory Eternal."
  - Families visit the graves of their departed, greet them with "Christ is Risen," and place painted eggs and paschal foods on the graves; traditional foods include funeral kutia (koliva), dyed eggs, kulichi, pancakes, dracheni, and honey prianiki.
  - Russian tradition knows the day as Krasnaya Gorka ("Red Hill"); the Serbian commemoration is called Pobusani ponedeljak ("Tomb-Sweeping Monday").
  - Radonitsa marks the beginning of the marriage season, since weddings are not celebrated during Great Lent or Bright Week; among Slavic families gift-giving to in-laws is customary, to spread the joy of the day throughout the households.
