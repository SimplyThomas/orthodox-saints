iconography:
  - The festal icon of Pascha is the Anastasis, the Descent into Hades. It shows Christ standing in triumph upon the gates of Hades, which have been torn from their place and lie fallen in the form of a cross. He grasps Adam and Eve by the wrists — not the hands — to signify that humanity could not raise itself from the ruin of sin but is lifted only by the work of God.
  - "Around Christ stand the righteous of the Old Covenant, among them Abraham, David, Solomon, and John the Baptist. Below yawns the chasm of Hades, dark and strewn with broken locks and shattered chains, and sometimes Death or the devil is shown bound in the depths. Long used as the icon of Holy Saturday, this image is the Church's chief pictorial confession of the Resurrection: by his death Christ has trampled down death and emptied the prison of the dead."
hymnography:
  - The Paschal Matins is built around the canon attributed to St. John of Damascus, sung at midnight after the procession. Its themes are the passage from death to life, the dawn of the new creation, and the summons of the whole world to rejoice.
  - The Paschal troparion, sung for the first time at the procession and repeated throughout the services, proclaims Christ risen from the dead and trampling down death by death; it is paired with verses from Psalm 67(68). The services also include the Paschal Sermon of St. John Chrysostom, read at Matins, which invites all the faithful — those who have fasted and those who have not — to forget their sins and enter fully into the joy of the feast.
fastingPractice:
  - Pascha ends the Great Fast of Lent, the longest and most rigorous fasting season of the year. The day itself and the whole of Bright Week that follows are kept entirely fast-free, so that the fast of preparation gives way to unbroken festal celebration. Particular practices vary by jurisdiction; the faithful are directed to their own priest for guidance.
customs:
  - The midnight Paschal service, in which the faithful process outside the darkened church with banners, icons, candles, and the Gospel and return to hear "Christ is risen!"
  - The Paschal greeting "Christ is risen!" answered "Truly He is risen!", exchanged through Bright Week.
  - The blessing of Paschal baskets and foods after the Liturgy — eggs, cheese, meat, and festal breads such as kulich; Greek practice includes lamb soup.
  - The Artos, a loaf stamped with the Cross or the Resurrection, consecrated in honor of Christ the Bread of Life.
  - Red-dyed eggs, whose color signifies the renewed life received through the Blood of Christ.
