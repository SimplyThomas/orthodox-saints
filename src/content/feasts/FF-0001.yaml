id: FF-0001
overview:
  - Pascha is the Orthodox celebration of the Resurrection of Christ from the dead, the center and crown of the whole Church year. It is not counted among the Twelve Great Feasts but stands above them as the "Feast of Feasts," the passage from death to life to which the entire liturgical calendar is oriented.
  - "The feast is approached through a long preparation: the pre-Lenten Sundays, the forty days of Great Lent, and Holy Week, which together span roughly twelve weeks before the day itself. Pascha ends the Great Fast, and its light extends outward across Bright Week and the fifty days to Pentecost, its leavetaking (apodosis) falling on the Wednesday before Ascension."
  - As a movable feast, Pascha has no fixed calendar date. It is reckoned by the ecclesiastical rule fixed in the early Church rather than assigned to a single day, so the surrounding Paschal cycle of movable observances shifts with it each year.
history:
  - The dating of Pascha was among the earliest questions to divide the Christian world. In the 2nd century the Quartodeciman controversy set the churches of Asia Minor, which ended the Lenten fast on Nisan 14 of the Hebrew calendar in step with Passover, against Rome and Alexandria, which kept the feast on the following Sunday. The dispute sharpened around 190, when Pope Victor I attempted to excommunicate the Quartodeciman churches; the attempted excommunication was rescinded and the two sides reconciled after Bishop Irenaeus and others reminded Victor of the tolerant precedent of his predecessor Anicetus.
  - 'The First Council of Nicaea in 325 took up the question, and settling the Quartodeciman controversy was among the reasons the Emperor Constantine convened the council. Nicaea determined that the churches would no longer reckon the feast by the Jewish calendar but would adopt a common method following the practice of Rome and Alexandria. The rule that emerged places Pascha on the first Sunday after the first full moon on or after the spring equinox (reckoned as March 21). The calculation is ecclesiastical rather than astronomical: the "Paschal full moon" is the fourteenth day of a lunar month and may differ from the observed full moon by as much as two days.'
  - The Orthodox Church continues to reckon this rule on the Julian calendar. Because the Julian lunar tables now run several days behind the Gregorian, Orthodox Pascha falls between April 4 and May 8 on the civil (Gregorian) calendar and generally lands one or five weeks after Western Easter, though the two dates occasionally coincide. The feast keeps its name and historical anchor in the Jewish Passover, during whose week the crucifixion and resurrection took place, even as the method of reckoning was made independent after Nicaea.
meaning:
  - 'Pascha proclaims that in the Resurrection of Christ death itself has been overthrown. The Church expresses this as Christ "trampling down death by death": his own dying breaks the power of the grave, so that the day is kept not as a memorial of a past event but as the present reality of life triumphant over corruption.'
  - The feast is understood as a passage — the meaning carried in the name Pascha, the Passover — from death to life and from bondage to freedom. Christ's descent into Hades to raise the dead held captive since the beginning makes the Resurrection a cosmic renewal rather than a private restoration, the opening of the tomb becoming the opening of Paradise to the whole human race.
  - "For this reason Pascha is celebrated as an eighth-day mystery: it belongs not to the ordinary week of seven days but to the age to come. The whole Paschal season, from the day through the forty days to Ascension, is treated liturgically as a single unending day, a foretaste of the eternal life the feast announces."
