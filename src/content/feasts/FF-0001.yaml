celebration:
  intro: Ways families keep the Feast of feasts and carry its joy through Bright Week.
  ideas:
    - idea: Bake kulich (tall sweet Easter bread) and paska (a sweet cheese spread), and let children frost the kulich or shape the "XB" (Christ is Risen) on top.
    - idea: Dye red eggs with onion skins and play the egg-cracking game (tsougrisma) at the table, greeting one another "Christ is risen!"
    - idea: Bake Lazarus buns on Lazarus Saturday to begin the turn toward the feast.
    - idea: Pack a Pascha basket with festal foods — eggs, cheese, meat, bread — to be blessed after the midnight service, then feast on the blessed food at dawn.
    - idea: Bring the children (even sleepy ones) to the midnight procession with candles and singing — the joy they will remember.
    - idea: Set a bright, festal Paschal table with red eggs, flowers, and candles to mark that Great Lent is over.
    - idea: Share extra kulich, paska, and baskets with widows, new mothers, the newly baptized, and anyone unable to prepare their own.
    - idea: Read Catherine's Pascha to draw children into the wonder, and keep greeting "Christ is risen! — Truly He is risen!" through Bright Week.
      detail: The Paschal greeting is exchanged until the Leave-taking of Pascha, just before Ascension.
