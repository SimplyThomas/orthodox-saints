flagReasons:
  - claim: March 26 is the Leavetaking (Apodosis) of the Annunciation
    detail: The anchor row's Apodosis column is blank, and no dossier external item identifies March 26 as the Apodosis/Leavetaking of the Annunciation. The OCA source lists March 26 saints but does not call it the Apodosis. The Annunciation's Leavetaking timing is not established by any dossier item; this appears to be an unsupported parametric-knowledge claim.
  - claim: The two observances of the synaxis and the Leavetaking are 'bound together in the calendar'
    detail: Depends entirely on the unsupported claim that March 26 is the Leavetaking of the Annunciation (see above). No dossier item supports this pairing.
  - claim: Gabriel's July 13 synaxis originated on Mount Athos in the ninth century during the reign of Emperor Basil II
    detail: The Wikipedia/Gabriel external source states the July 13 feast 'originated on Mount Athos in the 9th century during Emperor Basil II's reign,' but Emperor Basil II reigned 976–1025 AD, which is the 10th–11th century, not the 9th century. The dossier item says '9th century' and 'Basil II' in the same sentence, which is internally inconsistent (Basil II was 10th–11th century). The profile reproduces this inconsistency without flagging it. The claim as stated ('ninth century, during the reign of Emperor Basil II') is contradictory and unsupported as written.
