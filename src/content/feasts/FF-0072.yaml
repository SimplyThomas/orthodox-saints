id: FF-0072
overview:
  - The Synaxis of the Archangel Gabriel is an Orthodox feast kept on March 26, the day immediately following the Annunciation. It gathers the faithful in liturgical assembly to honor the archangel who announced to the Virgin Mary the conception of Christ, and who throughout the Scriptures bears the tidings of God to His people.
  - "The feast belongs to the category of angelic commemorations, and its placement is not incidental: it falls the day after March 25 precisely because of Gabriel's central role in the mystery celebrated on the Annunciation. March 26 also marks the Leavetaking (Apodosis) of the Annunciation, so the honoring of the messenger flows directly out of the feast whose message he delivered."
  - A second synaxis of the Archangel Gabriel is observed later in the year on July 13, which commemorates the appearances and miracles attributed to him throughout history. Gabriel is likewise honored, together with Michael and the other bodiless powers, at the general feast of the archangels on November 8.
history:
  - In the tradition of the Eastern Church, a synaxis is a liturgical assembly that commemorates the saints and holy figures connected to a major feast. The practice arose in Constantinople, where the clergy and faithful would gather on the day after a great feast at a church dedicated to the figure who had participated in the event being celebrated. Thus, after Theophany a synaxis honoring St. John the Forerunner was kept at his church the following day, and after the Annunciation a synaxis honoring the Archangel Gabriel was kept on March 26.
  - Originally proper to Constantinople, these synaxes over time passed into general use and are now observed across the Orthodox churches. They function as fixed annual commemorations or as movable observances tied to the Paschal cycle, extending the celebration of a principal feast into a secondary observance that honors those instrumental in the mystery.
  - The Synaxis of March 26 exists to honor Gabriel for his role in the Annunciation, when he was selected by the Lord to deliver to the Virgin Mary the announcement of the Incarnation of the Son of God. Because March 26 is also the Leavetaking of the Annunciation, the two observances are bound together in the calendar. The day additionally commemorates several martyrs and ascetics, among them the Hieromartyr Irenaeus, Bishop of Sirmium; the 26 Martyrs in the Crimea; Saint Malchus of Chalcis in Syria; the Venerable Basil the New; and the New Martyr George of Sofia.
  - Gabriel's second synaxis, on July 13, took its origin on Mount Athos in the ninth century, during the reign of Emperor Basil II. According to tradition, Gabriel appeared in a monastic cell and inscribed the hymn 'It is truly meet' upon a stone tablet, and the feast came to commemorate all the appearances and miracles attributed to him through history.
meaning:
  - Gabriel is understood in the tradition as God's messenger and revealer, the angel through whom the divine will is made known to humanity. His name, drawn from Hebrew, joins the words for 'man' and 'God' and has been read as 'man of God'; the medieval writer Bernard of Clairvaux interpreted it as 'the strength of God,' and the Latin tradition renders it 'Fortitudo Dei,' the power of God. This meaning is fitting for the herald of the Incarnation, in which God takes on human nature, and its significance touches the mystery of Christ as both divine and human.
  - The Scriptures present Gabriel as the interpreter of divine mysteries. In the Book of Daniel he explains the prophet's visions and delivers the prophecy of the 'seventy weeks,' and he is remembered in Jewish tradition as a guardian of Israel alongside Michael. In the Gospel of Luke he announces the birth of John the Baptist to Zechariah and, most significantly, announces to Mary the conception of Jesus. His declaration, 'I am Gabriel, who stand before God,' has been understood by the tradition to mark him among the highest of the angelic messengers.
  - Christian tradition has characterized Gabriel as the angel of the Incarnation and of consolation, and as the angel of mercy, set in contrast to Michael as the angel of judgment. In honoring Gabriel the day after the Annunciation, the Church acknowledges that the mystery of salvation was announced through a servant who stands before the throne of God, and it teaches that the bodiless powers minister within the economy of human redemption. The Annunciation itself, initiated by Gabriel's word and completed by Mary's acceptance — 'Behold the handmaid of the Lord; be it unto me according to thy word' — is celebrated as the beginning of salvation, and the synaxis extends the honor of that beginning to its heavenly messenger.
scripture:
  - ref: Daniel 8:15-26
    note: Gabriel explains to Daniel the vision of the ram, concerning the Persian and Macedonian empires.
  - ref: Daniel 9:21-27
    note: Gabriel communicates the prophecy of the 'seventy weeks' after Daniel's prayer for Israel.
  - ref: Luke 1:26-38
    note: "The Annunciation: Gabriel announces to Mary the conception of Christ."
iconography:
  - In Byzantine iconography Gabriel is depicted, like the angels generally, as a youthful, androgynous figure. He is traditionally shown bearing a white lily, a trumpet, or a scroll, emblems of his office as the divine herald. He appears most often in depictions of the Annunciation, portrayed with the Virgin Mary at the moment of the angelic announcement, a scene that remains prominent in Orthodox sacred art.
hymnography:
  - Tradition associates Gabriel with the hymn 'It is truly meet,' which, according to an account set on Mount Athos in the ninth century, he inscribed upon a stone tablet; that episode is chiefly connected with his July 13 synaxis rather than the feast of March 26.
related:
  - name: The Most Holy Theotokos
    note: To her Gabriel announced the conception of Christ at the Annunciation; the synaxis is kept the day after that feast.
  - name: Archangel Michael
    note: Named with Gabriel among the guardians of Israel and the chief of the bodiless powers; honored with him on November 8.
customs:
  - A second synaxis of the Archangel Gabriel is observed on July 13, commemorating the appearances and miracles attributed to him throughout history.
  - Gabriel is honored together with Michael and the other bodiless powers at the general feast of the archangels on November 8.
