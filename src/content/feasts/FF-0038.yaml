celebration:
  intro: Ways to honor the Cross at the mid-point of Great Lent.
  ideas:
    - idea: Lay a hand-cross on a small table or in the icon corner, decorate it with spring flowers, and have each family member bow and kiss it — echoing the flower-strewn cross brought out at church.
    - idea: Use fresh flowers and fragrant basil around the home cross, the scent and blossoms meant to make us think of life and joy in the middle of the fast.
    - idea: Make a simple cross craft — a pressed-flower cross, or one decorated with early spring blooms the children gather.
    - idea: Sing "Before Thy Cross we bow down" together as you venerate (name the hymn, don't recite a copyrighted setting).
    - idea: Frame the day as a mid-Lent encouragement — like shade for a tired traveler — and mark that Pascha is now closer than the start.
