celebration:
  intro: Ways to keep Palm Sunday, the Entry of the Lord into Jerusalem, at home.
  ideas:
    - idea: Fold palm crosses together from the blessed palms brought home from Liturgy (or from paper strips), following a simple tutorial.
    - idea: Hold a small procession through the house, each child carrying a palm or cross, reenacting the crowd welcoming Christ.
    - idea: Tuck the blessed palms — or the pussy-willow branches used in colder Orthodox lands ("Willow Sunday") — into the icon corner to stay up through the year.
    - idea: Read the Entry-into-Jerusalem account together and talk about why the people waved branches.
    - idea: On the eve of Lazarus Saturday, bake lazarakia (little spiced sweet-bread figures) and read the raising of Lazarus, which the Church pairs with the feast.
    - idea: Sing the feast's troparion while holding the palms at evening prayers.
