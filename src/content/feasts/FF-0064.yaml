hymnography:
  - To the ordinary Sunday services of the day are added special scriptural readings and hymns addressed to all the saints, both known and unknown. In its local form the commemoration draws on hymns proper to the saints of the particular Church — the holy men and women of a given land or monastic mountain — sung alongside the resurrectional material of the Sunday.
fastingPractice:
  - The observance falls within the opening days of the Apostles' Fast, which begins on the Monday after the first Sunday after Pentecost. As a Sunday, however, the day itself carries the festal relaxation customary for the Lord's Day. Typikon prescriptions for the Apostles' Fast vary between traditions, and the faithful are directed to consult their own parish and spiritual father.
customs:
  - Each local autocephalous Church keeps the commemoration under its own title — for example the Synaxis of All Saints of Russia, of North America, of Romania, of Serbia, of Georgia, of Bulgaria, or of Mount Athos — honoring the saints of its own territory.
