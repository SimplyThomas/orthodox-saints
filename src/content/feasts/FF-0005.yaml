id: FF-0005
overview:
  - The Nativity of Christ (Christmas) commemorates the birth of Jesus Christ in the flesh in Bethlehem of Judea, of the Virgin Mary, when God took on human nature for the salvation of the world. It is one of the Twelve Great Feasts of the Orthodox Church, kept on December 25, and is honored in the Church's tradition as the foundation of all the other feasts — sometimes called the "mother of all feasts."
  - "The event is drawn from the accounts of the Evangelists Matthew and Luke: Mary and Joseph travel to Bethlehem for the census under Augustus, find no room, and the child is born in a cave used as a stable. Shepherds are the first to hear the angelic announcement, and Magi come afterward bearing gifts."
  - "The feast crowns a forty-day preparatory fast (the Nativity Fast, or Advent) and stands within a longer festal season: a forefeast begins December 20, and the celebration continues through an afterfeast to its apodosis on December 31, leading toward Theophany."
history:
  - "In the first three centuries the Eastern churches largely kept the birth of Christ together with his Baptism as a single feast on January 6, while the Western church observed the Nativity separately on December 25. The earliest surviving reference to a December 25 celebration at Rome is the Chronography of 354 (the Philocalian calendar), and the date itself was defended early: Hippolytus of Rome (c. 170–236) reckoned it by assuming the Annunciation fell at the spring equinox and adding nine months, a computation echoed in an Orthodox reading that counts backward from the civil New Year."
  - The separate December 25 feast spread rapidly through the East in the later fourth century. John Chrysostom's sermon at Antioch in 386 indicates the feast had been kept there for about a decade, and by around 385 it was observed as distinct from the Baptism feast in Constantinople, Nyssa, and Amaseia. In the West, Pope Leo I preached the feast as the Mystery of the Incarnation and Pope Sixtus III is associated with the institution of the midnight service.
  - "Imperial and conciliar acts fixed the feast in law and practice: the Church's tradition records decrees of universal celebration under the emperors Theodosius (438) and Justinian (535), the feast reaching Jerusalem in the sixth century, and the Council of Tours (567) uniting the days between Christmas and Epiphany into one festal cycle. The modern divergence by which some churches keep December 25 and others what corresponds to January 7 reflects the difference between the Julian and Gregorian calendars, not a dispute over the date of the birth."
meaning:
  - "The feast proclaims the Incarnation: that the eternal Son and Word of God, without ceasing to be God, took a complete human nature and was born as a man. The Church's hymnography dwells on this paradox and on the divine condescension by which the infinite Word is contained in finite flesh and the Lord of all is laid in a manger."
  - The doctrine carried by the feast was worked out in the great christological controversies of the first centuries, which turned on the title Theotokos (God-bearer) for the Virgin and on how the one Christ holds together full divinity and full humanity — the hypostatic union confessed at the Council of Chalcedon in 451. The Nativity is thus not only a remembrance of a birth but a confession of who is born.
  - In the feast's theology Christ is the new Adam, and his birth is the beginning of the saving ministry that leads to the Cross and the empty tomb. Salvation is announced to shepherds and Magi alike — to Israel and to the nations — so that the humility of God entering the world as an infant is at the same time the opening of redemption to all.
