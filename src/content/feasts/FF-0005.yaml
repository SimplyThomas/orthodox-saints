iconography:
  - "The festal icon gathers the elements of the Gospel narrative into a single composition: the Virgin Mary reclining beside the Christ Child, who lies wrapped in the manger of a dark cave; Joseph set apart to one side; the ox and ass at the manger; the shepherds receiving the angelic announcement; and the Magi approaching with gifts. The darkness of the cave and the swaddling of the infant set the humility of the birth against the divine identity of the one born, and the icon proclaims the reality of the virgin birth rather than a merely sentimental scene."
hymnography:
  - The services are unusually rich in hymnography built on the paradox of God made man. The Nativity kontakion of St. Romanos the Melodist, dated to 518, is among the most celebrated festal hymns; the feast's canons and the singing of the full Nativity canon at Matins carry the theme that Christ is born and creation is renewed. The hymns describe rather than merely narrate — they contemplate the Word contained in flesh, the manger holding the uncontainable, and the response of shepherds, Magi, and the whole created order.
sections:
  - heading: The services of the feast
    body:
      - On the Eve (December 24) the Royal Hours are read — the First, Third, Sixth, and Ninth Hours joined with the Typical Psalms into one service — followed by the Divine Liturgy of St. Basil the Great served together with Vespers, at which Old Testament prophecies of Christ's birth are chanted. In many places a strict-fast Holy Supper is kept until the first star.
      - The festal Vigil opens with Great Compline and includes the blessing of the five loaves with wheat, wine, and oil; at Matins the full canon is sung as the faithful venerate the Nativity icon. The forefeast from December 20 is deliberately shaped after the pattern of Holy Week, presenting the birth of the Son of God as the beginning of the way that leads to the Cross.
fastingPractice:
  - The feast is the goal of the forty-day Nativity Fast (Advent), which in the received practice begins in mid-November and intensifies toward its close; its Eve is kept as a strict fast, traditionally until the first star appears, and is marked by the Royal Hours. With the feast itself the fast is ended, and the Church's tradition keeps the days from the Nativity to the eve of Theophany as fast-free. Particular prescriptions vary by typikon and jurisdiction; the faithful are directed to their own priest for practice.
customs:
  - A strict-fast Eve (Paramony) kept until the first star, with the Royal Hours and, in many traditions, a twelve-course Lenten Holy Supper.
  - The forty-day Nativity Fast as preparation, beginning in mid-November.
  - Festal carols and hymns sung through the afterfeast toward Theophany.
