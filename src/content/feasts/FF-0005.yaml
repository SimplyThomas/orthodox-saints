celebration:
  intro: Simple, joyful ways families keep the Nativity at home through the Twelve Days.
  ideas:
    - idea: Keep a visible 40-day Nativity Fast countdown — a numbered paper chain or a tally the children mark down each night toward Christmas.
    - idea: Build a Jesse Tree, hanging one ornament a day while reading the matching Scripture story, tracing Christ's lineage from creation to the manger.
    - idea: 'Keep a "kindness manger": children lay a piece of straw for each good deed, so the crib is soft and full for the Christ-child by Christmas.'
    - idea: Fill an almsgiving basket through the fast — canned goods for a food bank, cookies for neighbors and the lonely elderly.
    - idea: Add the Nativity icon to the icon corner and let young children arrange a nativity set, moving the figures toward the cave as the days count down.
    - idea: Sing the troparion of the feast and beloved carols at supper, and read Orthodox Christmas picture books aloud (e.g. King Island Christmas, Goodnight Jesus).
      detail: Sing the hymns of the feast rather than reading a copyrighted translation aloud.
    - idea: Bake a Christopsomo ("Christ's bread") on Christmas Eve, marking the round loaf with a cross, and cut it after the Liturgy.
