id: FF-0036
overview:
  - The Sunday of St Gregory Palamas is an observance kept on the second Sunday of Great Lent, honoring Gregory Palamas (c. 1296–1359), the monk of Mount Athos who became Archbishop of Thessalonica and defended the reality of the uncreated divine light and the prayer of the heart. Falling five weeks before Pascha, it stands second among the themed Sundays of the Lenten Fast, immediately following the Sunday of Orthodoxy.
  - The commemoration honors Palamas's theological defense of hesychasm — the contemplative tradition of inner stillness and unceasing prayer practiced on Mount Athos — against the criticisms of Barlaam of Calabria. At its center lay the question of whether the light experienced by contemplatives in prayer, identified with the light of Christ's Transfiguration on Mount Tabor, was created or genuinely divine.
  - "The Church commemorates Gregory Palamas twice each year: on November 14, the anniversary of his death, and on this second Sunday of Lent. This Lenten commemoration is understood as a continuation of the Triumph of Orthodoxy celebrated the previous Sunday, extending the Church's defense against error from the veneration of icons to the reality of communion with God."
history:
  - Gregory Palamas was born around 1296 in Constantinople to a family connected to the imperial court. Rejecting a promising secular career, he entered monastic life at Mount Athos about the age of 21, in 1316, where he spent decades in ascetic practice before being drawn into theological controversy.
  - The dispute arose over hesychasm, the contemplative prayer tradition emphasizing direct spiritual experience of God. Barlaam of Calabria, trained in Western scholastic theology, attacked the hesychast monks as heretical and held that philosophers possessed better knowledge of God than the prophets. He dismissed the monks' claim to experience the uncreated light as blasphemous, regarding it as a form of polytheism. At the request of the monks of Mount Athos, Palamas composed the Triads in defense of the Holy Hesychasts, around 1338, offering a systematic theological defense grounded in Scripture and the Church Fathers.
  - The controversy was examined in a series of patriarchal councils held in Constantinople. Sources record six such councils, meeting on 10 June 1341, in August 1341, on 4 November 1344, 1 February 1347, 8 February 1347, and 28 May 1351. The synod of 1341 supported Palamas and condemned Barlaam; though his opponents temporarily secured his condemnation in 1344, his theology was reaffirmed at the synods of 1347 and 1351. The final council of 1351, held under the presidency of the Emperor John VI Cantacuzenus, conclusively exonerated Palamas, condemned his opponents, and established the hesychast doctrine as the official teaching of the Orthodox Church. Many Orthodox Christians and several prominent theologians regard the synods of 1341, 1347, and 1351 as constituting the Ninth Ecumenical Council.
  - Palamas was canonized in 1368. His victory over Barlaam came to be seen as a continuation of the Triumph of Orthodoxy, and for this reason the Church established a second annual commemoration on the second Sunday of Great Lent, connecting his theological triumph to the Church's broader defense against heretical error.
meaning:
  - The heart of the feast is the distinction Palamas drew between the essence and the energies of God. He taught that while it remains impossible to know God in His essence, humans can truly know God in His energies — that is, in what God does and who He is in relation to creation and to humanity. These energies, or operations, of God are themselves uncreated, and through them the contemplative in this life, and the righteous in the next, receive a true spiritual knowledge of God.
  - Central to the dispute was the nature of the light seen by the hesychasts. Palamas maintained that the apostles who witnessed Christ's Transfiguration were in fact seeing the uncreated light of God, and that others could similarly experience this light through the practice of prayer. Where Barlaam considered the claim of encountering uncreated light to be blasphemous, Palamas defended it as orthodox doctrine, affirming that this light is genuinely divine and accessible to those who pray.
  - Through this commemoration the Church teaches that God is not merely an object of intellectual speculation but One with whom the faithful may enter into real communion. The victory of Palamas affirms that the goal of the ascetic life — inner stillness (hesychia) sought through unceasing prayer — leads to genuine encounter with the living God. Placed within Great Lent and understood as a continuation of the Sunday of Orthodoxy, the feast presents the vindication of hesychasm as a defense not of a mere theological opinion but of the reality of the spiritual life to which Lent itself calls the faithful.
