sections:
  - heading: Hesychasm
    body:
      - Hesychasm is a mystical tradition of prayer in the Orthodox Church centered on achieving inner stillness (hesychia) through the uninterrupted Jesus Prayer. The practice developed its definitive form during the 14th century at Mount Athos.
      - Barlaam of Calabria, trained in Western scholastic theology, attacked hesychasm around 1337, considering it polytheistic because it appeared to posit two eternal divine substances. Palamas answered by distinguishing God's unknowable essence from His accessible, uncreated energies, defending the monks' claim that in prayer they encounter genuine divine reality. The tradition Palamas defended, and the councils that vindicated it, established this contemplative prayer as authoritative Orthodox teaching.
