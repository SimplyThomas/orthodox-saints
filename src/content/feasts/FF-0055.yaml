id: FF-0055
overview:
  - The Sunday of the Paralytic is the fourth Sunday of Pascha in the Orthodox liturgical year. It commemorates Christ's healing of a man who had been paralyzed for thirty-eight years, an event recorded in the Gospel of John (5:1-15) at the Sheep's Pool of Bethesda in Jerusalem.
  - The commemoration falls twenty-one days after Pascha (P+21) and belongs to the paschal season, the fifty days from Pascha to Pentecost during which the Church reflects on the significance of the Resurrection through a sequence of themed Sundays. It is an observance rather than a fixed feast, its date moving each year with Pascha.
  - Through the account of the paralytic's healing, the Church presents the risen Lord as the one who raises up the infirm and forgives sin, and it draws from the miracle a teaching on Baptism and the healing of the soul.
history:
  - The commemoration takes its narrative from John 5:1-15, which recounts an episode during a feast when Christ was in Jerusalem. According to the Gospel, a man had lain paralyzed at the Sheep's Pool for thirty-eight years, waiting for someone to place him in the water. Tradition held that an Angel troubled the water at intervals, and the first person to enter after the water was stirred would be healed. Because others always entered before him, the man was never able to reach the pool in time. Christ, seeing him, felt compassion and healed him, and the miracle took place on the Sabbath, which occasioned controversy over the observance of the law.
  - The texts and readings for this Sunday, like those of the whole paschal season, are drawn from the Pentecostarion, the service book that supplies the moveable portions of the divine services from Pascha through the feast of All Saints. During this fifty-day period the Gospel readings are taken from the Gospel of John, while the epistle readings come from the Acts of the Apostles, which depicts the life of the first Christians in communion with the risen Lord. The Paschal Troparion continues to be sung throughout the services until Ascension.
  - The site of the healing has been the subject of archaeological study. The Pool of Bethesda in Jerusalem originated as a reservoir constructed across the Beth Zeta Valley, with a second pool added south of the dam around 200 BC during the tenure of the High Priest Simon II. Natural caves at the site were used as ritual bathing facilities in the Hellenistic and Roman periods. When the Emperor Hadrian rebuilt Jerusalem as Aelia Capitolina, the site was expanded into a temple; by the fifth century, in the Byzantine period, it had been converted into a church, and Byzantine Christians built the Church of the Probatike, or Sheep Pool Church, there. The Gospel of John describes the pool as having five porticoes and serving as a gathering place for the infirm. The name Bethesda derives from Hebrew and Aramaic, meaning house of mercy or house of grace.
meaning:
  - The Church reads the healing of the paralytic as a sign of Christ's power over infirmity and sin. Where the Sheep's Pool healed only a single person once a year, Christ is understood to save endless multitudes through divine Baptism. The miracle is thus received as a prefiguration of Christian Baptism, which the Church teaches cleanses the believer of every sin; through baptism in the Church the faithful, too, are healed and saved by Christ for eternal life.
  - The paralytic's long affliction is understood typologically. The man who lay helpless for thirty-eight years, unable to bring himself to the water, is seen as a figure of the soul spiritually paralyzed by sin and unable to help itself toward salvation. Christ's healing, given by a sovereign word and requiring no intermediary and no ritual immersion, reveals the freedom and power of divine grace. The Kontakion of the day supplicates Christ to raise up souls paralyzed by sins and thoughtless acts, making the physical paralysis a metaphor for the spiritual condition of mankind.
  - Christ's parting command to the healed man, that he sin no more lest something worse befall him, links the physical healing to moral transformation. The tradition understands this word as recognizing a moral dimension to the man's affliction and as binding the gift of bodily restoration to the call to a renewed life.
scripture:
  - ref: John 5:1-15
    note: The healing of the paralytic at the Sheep's Pool of Bethesda, the Gospel account read on this Sunday.
hymnography:
  - The hymns of the day are drawn from the Pentecostarion. The Canon for this Sunday identifies the Angel who stirred the water of the Sheep's Pool as the Archangel Michael, addressing him as Leader of the Angels and Supreme Commander, and invoking him as a protector against falling into the passions of life and a guide upon its paths. The Kontakion turns the miracle inward, asking Christ to raise up souls paralyzed by sins and thoughtless acts, so that the healing of the body becomes an image of the healing of the soul.
sections:
  - heading: The Pool of Bethesda
    body:
      - The Gospel locates the healing at the Sheep's Pool, or Pool of Bethesda, a site in Jerusalem whose remains have been studied archaeologically. Built up over centuries from an earlier reservoir, expanded under Hadrian and later occupied by Christian churches in the Byzantine period, the pool is described in John's Gospel as having five porticoes where the infirm gathered. Later structures rose at or near the site, including the Crusader Church of Saint Anne, completed in 1138 and associated by tradition with the birthplace of the Theotokos; after Saladin's conquest of Jerusalem in 1187 the church was converted into an Islamic school.
related:
  - name: Archangel Michael
    note: Identified in the Canon of the day as the Angel who troubled the water of the Sheep's Pool.
