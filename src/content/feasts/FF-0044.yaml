iconography:
  - The days of the Bridegroom are marked by the icon of Christ the Bridegroom, which depicts Jesus wearing a purple robe and a crown of thorns. During Holy Monday, Tuesday, and Wednesday this icon is placed in the center of the temple for veneration.
hymnography:
  - Holy Monday's Matins belongs to the Bridegroom Services, so called from their theme of Christ as the Bridegroom of the Church, kept on the evenings of Holy Monday, Tuesday, and Wednesday. The canon of Bridegroom Matins is a triode, a canon of three odes.
  - Binding the three days together is the Troparion of the Bridegroom, whose sense is that the Bridegroom comes at midnight and that blessed is the servant whom He finds watching. Its midnight imagery marks the boundary between the old world and the coming Kingdom, and it challenges each worshipper to examine his readiness for the Lord's coming.
customs:
  - The Bridegroom Matins are served in the evening, with the icon of Christ the Bridegroom, showing the Lord in a purple robe and crown of thorns, set out in the center of the temple for veneration through Holy Monday, Tuesday, and Wednesday.
