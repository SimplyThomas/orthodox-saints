hymnography:
  - During the Soul Saturday services, hymns honoring the departed are incorporated into the standard liturgy. A panikhida (memorial service) typically follows either the Divine Liturgy on Saturday morning or Vespers on Friday evening.
customs:
  - A general panikhida (memorial service) is served for the departed.
  - Families visit and tend the graves of their reposed relatives.
  - Koliva -- a dish of boiled wheatberries or rice and honey -- is prepared and placed on the memorial table; after the service the priest blesses it and participants consume it together as a memorial act.
  - Kept especially in the Russian and other Slavic churches; the Bulgarian Orthodox Church instead keeps a commemoration before the feast of Saint Michael the Archangel (November 8).
iconography:
  - Saint Demetrios, to whose feast this Saturday is anchored, appears in Russian iconography as a soldier in plumed armor, with a spear and sword in hand, embodying the spiritual warrior ideal.
