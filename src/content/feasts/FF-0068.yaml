id: FF-0068
overview:
  - The Procession of the Precious and Life-Giving Cross is observed on August 1, opening the month with the first of what the Byzantine and Slavic traditions came to call the three "Feasts of the Saviour." On this day the relic of the True Cross is brought out and venerated, and a Lesser Blessing of Water is served. It is regarded as a minor feast of the Cross, distinct from the major September 14 Exaltation of the Cross and from the Veneration of the Cross on the Third Sunday of Great Lent.
  - August 1 is also the first day of the Dormition Fast (August 1–14), one of the four fasting seasons of the Church year, which prepares the faithful for the Dormition of the Theotokos on August 15. The feast therefore marks both a commemoration of the Cross and the threshold of a two-week fast.
  - The Seven Holy Maccabee Martyrs are also commemorated on August 1; they are carried in the saints table rather than here. In the Russian tradition the day is joined to the memory of the Baptism of Rus, and to popular customs surrounding the blessing of water and of the new honey harvest.
history:
  - The feast originated in Constantinople as a public-health observance tied to the sickly late-summer season. The Greek Horologion of 1897 records that, because of the illnesses occurring during August, it was customary at Constantinople to carry the Precious Wood of the Cross in procession throughout the city for its sanctification and its deliverance from sickness. The relics of the True Cross were carried through the streets to bless the city, in the belief that they brought health and cleansed the air and the houses of sickness.
  - The ceremonial pattern is described in early liturgical sources. The tenth-century Synaxarion of Constantinople relates that the True Cross was transported from the Great Palace of Constantinople to Hagia Sophia and, placed near the baptistery, was venerated by the bishops. By the later custom reflected in the 1897 Horologion, the Cross was removed from the imperial treasury on July 31 and laid on the Holy Table of Hagia Sophia; from August 1 through the Dormition of the Theotokos processions moved through the city, after which the faithful were able to venerate the relic.
  - In the Russian Church the feast was combined with the commemoration of the Baptism of Rus. Historical records place the baptism of the Great Prince Vladimir of Kiev and of all Rus on August 1, 988. Bishop Nikolaj Velimirovic relates a further tradition that the feast was instituted by mutual agreement of the Greeks and the Russians to commemorate simultaneous twelfth-century victories of Byzantine and Russian leaders over their enemies.
  - "The observance also drew liturgical acts of the Slavic Church into fixed form. The 1627 service order of Patriarch Philaret describes a Cross Procession with the Sanctification of Water, for the enlightenment of the people, to be held in all the towns and places. The present form of the feast keeps this shape: an outdoor procession with the Lesser Sanctification (Blessing) of Water, conducted before or after the Divine Liturgy, together with the bringing out of the Cross and its veneration by the faithful, on the pattern of the September observances."
meaning:
  - The feast gathers its meaning around the Cross as the instrument of salvation and the source of sanctification. The August 1 commemoration emphasizes seeking God's blessing and relief from sickness through the veneration of the Cross relic, extending the healing and protecting power of the Cross over a whole city and its people during a season of illness. The carrying of the relic through the streets expressed the conviction that the Cross sanctifies not only souls but the very air and dwellings of a community.
  - "John Chrysostom's account of the veneration of the Cross voices this theology: kings removing their diadems take up the Cross, the symbol of their Saviour's death; the Cross is set on the purple, borne in prayers, on armor, and on the holy table, and shines throughout the universe brighter than the sun. Veneration of the Cross is thus honor given to the Lord who was crucified upon it, and confession of His victory over death."
  - As the opening of the Dormition Fast, August 1 also carries the meaning of preparation. The two weeks that follow lead the faithful toward the Dormition of the Theotokos on August 15, when the Church commemorates Mary's falling asleep and her being taken up into heaven. The term "dormition" reflects the Orthodox understanding of death as a sleeping or falling asleep, a peaceful departure — so the day that begins the fast joins the sign of the Cross to the hope of a death conquered by Christ.
