iconography:
  - "The observance centers on the relic of the True Cross itself: the Wood of the Cross is brought out from its place of keeping, carried in procession, and venerated by clergy and faithful, in the manner of the bringing out and veneration of the Cross at the September Exaltation."
fastingPractice:
  - "August 1 marks the first day of the Dormition Fast, which runs August 1–14 in churches following the Revised Julian (New) calendar. The Church's practice for this season is comparatively strict: the fast sets aside meat and meat products, dairy, fish, oil, and wine, with wine and oil generally permitted on Saturdays and Sundays. The feast of the Transfiguration on August 6 is a customary exception, when fish, wine, and oil are allowed. The fast prepares the faithful for the Dormition of the Theotokos on August 15. Prescriptions vary by jurisdiction and household, and the site's standing counsel is to consult one's priest."
customs:
  - A Lesser Blessing (Sanctification) of the Waters is served, in an outdoor procession before or after the Divine Liturgy; the day is popularly known as the "Savior of the Water."
  - In Russian practice the first fruits of the new honey are blessed, giving the day its popular name the "Honey Savior" (Medovy Spas), also rendered the "Savior of the Honey."
  - In the Russian tradition the feast is joined to the commemoration of the Baptism of Rus.
sections:
  - heading: Relation to the other feasts of the Cross
    body:
      - "The August 1 procession is a minor feast, distinct from the two major commemorations of the Cross: September 14, the Exaltation of the Cross, which is one of the Twelve Great Feasts, and the Third Sunday of Great Lent, the additional Veneration of the Cross."
      - Within August it is counted the first of three "Feasts of the Saviour," preceding the Transfiguration on August 6 and the observances that follow.
