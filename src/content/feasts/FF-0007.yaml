id: FF-0007
overview:
  - The Meeting of the Lord in the Temple, called Hypapante (Greek for "meeting") in the Byzantine tradition, commemorates the presentation of the forty-day-old Christ in the Temple at Jerusalem, forty days after the Nativity. In the Orthodox calendar it is kept on February 2 (February 15 for churches following the Julian calendar), with a one-day forefeast on February 1 and an afterfeast whose apodosis, or leavetaking, is normally February 9. The feast concludes the cycle of celebrations that begins with the Nativity and Theophany.
  - The event is recorded in the Gospel of Luke (2:22–40). In accordance with the Mosaic Law, Mary and Joseph brought the infant Jesus to the Temple for the purification of the mother and the presentation of the firstborn son, offering a pair of turtledoves or two young pigeons—the offering permitted to the poor. There the aged and righteous Simeon, who had been promised he would not die before seeing the Messiah, received the Child in his arms, and the prophetess Anna proclaimed Him to those awaiting the redemption of Jerusalem.
  - The feast is counted among the Great Feasts, and in the Byzantine tradition it uniquely combines elements of both a Great Feast of the Lord and a Great Feast of the Theotokos. Because it can fall within the pre-Lenten and Lenten seasons, its afterfeast may be shortened; when the Triodion begins early, the leavetaking can fall as soon as the day after the feast itself.
history:
  - Celebration of the Meeting is among the oldest feasts of the Church, dating from the fourth century in Jerusalem. The pilgrim Egeria, who journeyed to the Holy Land in the early 380s, documented its observance there as a major procession to the Anastasis (the Church of the Holy Sepulchre), recording that the day was "celebrated here with the greatest honour." Early church fathers—among them Methodius, Cyril of Jerusalem, Gregory the Theologian, and John Chrysostom—composed sermons on the observance in the early centuries.
  - Originally the feast was a comparatively minor celebration. Its elevation is traditionally connected to the plague that struck Constantinople in 541, during the reign of Emperor Justinian I. Sources relate that the emperor ordered solemn processions and prayers throughout the empire on this feast day, and that when the epidemic ceased—in 542 by these accounts—the feast was raised to a more solemn celebration and established throughout the Eastern Empire. From the East the observance gradually spread westward.
  - The feast's liturgical texts were enriched by later hymnographers, including Saint Andrew of Crete, Saint John of Damascus, and Saint Joseph of Thessalonica. In Constantinople, emperors traditionally kept the feast with vigils at the Church of Blachernae, a custom said to have continued until the fall of the Byzantine Empire. In the West the feast became known as Candlemas, from the custom of blessing candles; the practice of holding lighted candles during the Divine Liturgy of the day is traced in Jerusalem to about the year 450.
meaning:
  - The feast celebrates the meeting of Old Testament righteousness with the promised Messiah. Simeon and Anna are understood as the last of the righteous figures of the old covenant awaiting Christ's coming; in receiving and proclaiming the Child, they represent the Law and the prophets recognizing their fulfillment. Simeon's canticle—the Nunc Dimittis—forms the theological heart of the celebration, naming Christ "a light for revelation to the Gentiles, and for glory to your people Israel."
  - The presentation shows Christ fulfilling the requirements of the Mosaic Law, both the purification of the mother and the redemption of the firstborn son prescribed in Torah. Tradition holds that the Virgin Mary had no need of purification, since she had given birth to the Source of purity and sanctity, yet she submitted to the Law's requirements in humility. The offering of two birds rather than a lamb marks the poverty of the Holy Family.
  - Simeon's words to Mary—that a sword would pierce her own soul also—join the joy of the meeting to the foreshadowing of the Cross, so that the feast holds together Christ's coming as light and the suffering that His salvation would entail. The blessing and carrying of candles expresses the confession of Christ as the Light of the World, meeting and being received by His people.
