scripture:
  - ref: Luke 2:22–40
    note: The Gospel account of the presentation of Christ in the Temple, Simeon's reception of the Child, and Anna's proclamation.
  - ref: Leviticus 12
    note: The Mosaic law of purification following childbirth.
  - ref: Exodus 13:12–15
    note: The law concerning the redemption of the firstborn son.
iconography:
  - The festal icon centers on the moment of meeting between the righteous Simeon and the Holy Family within the Temple. In the Eastern tradition the Virgin is more likely still to hold the infant Jesus, in contrast to Western depictions where Simeon is often shown already holding the Child. Early Byzantine images concentrated on this encounter, establishing iconographic patterns that persist in Orthodox art.
  - Two related icon types develop Simeon's prophecy of the sword. The type known as "Simeon's Prophecy" depicts the Virgin without the Christ Child, pierced by seven swords—three from the left, three from the right, and one below—signifying her foretold suffering. A related variant, "The Softening of Evil Hearts," represents the same prophecy in a different arrangement.
hymnography:
  - "The feast's liturgical hymns were composed and enriched by medieval hymnographers, among them Saint Andrew of Crete, Saint John of Damascus, and Saint Joseph of Thessalonica. Their texts draw out the themes of the meeting: the aged Simeon receiving the Author of life, the confession of Christ as the Light of revelation, and the foreshadowing of the Cross in the prophecy of the sword. Simeon's canticle, the Nunc Dimittis, occupies a central place in the services of the feast."
fastingPractice:
  - "The Meeting is a joyful Great Feast and is not a fast day. Because its date can fall within the pre-Lenten period governed by the Triodion, the length of its afterfeast varies: the leavetaking normally falls on February 9, but the afterfeast is shortened when the Triodion begins early, so that the apodosis can fall as soon as the day after the feast itself. Typikon prescriptions for such overlaps vary by tradition."
customs:
  - In many traditions candles are blessed on this feast—the origin of the Western name "Candlemas"—and carried and lit as a sign of Christ the Light meeting His people.
  - In some traditions worshippers bring their own candles to be blessed; these are treasured and taken home to be lit in times of stress, sickness, storms, or at the bedside of the dying.
  - In contemporary Orthodox practice, infants are brought to the church on the fortieth day after birth, in remembrance of the Theotokos and Joseph bringing the infant Jesus to the Temple.
