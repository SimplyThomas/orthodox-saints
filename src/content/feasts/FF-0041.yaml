    title: Fixed to the moveable cycle
    body: The Akathist passes into the moveable liturgical cycle, its complete chanting appointed for the fifth Saturday of Great Lent, with portions distributed across the preceding four Fridays.
hymnography:
  - The Akathist Hymn to the Theotokos comprises twenty-four oikoi (stanzas) that form an alphabetical acrostic in Greek, each stanza beginning with a successive letter of the alphabet. The stanzas are arranged as thirteen kontakia with their corresponding oikoi, prefaced by a prooimion (introduction). Alternating longer and shorter stanzas carry a series of poetic salutations, the chairetismoi, each beginning with the greeting 'Rejoice,' and a recurring refrain honoring the Virgin as the unwedded Bride.
  - On the Saturday of the Akathist the complete hymn is integrated into the Matins service, whereas on the preceding four Fridays of Lent only successive portions are chanted at the 'Salutations to the Theotokos.' The hymn is traditionally set in the Plagal of the Fourth tone. In monasteries following the Athonite tradition, the complete Akathist is customarily chanted nightly at Compline, extending its liturgical use beyond the annual Saturday observance.
fastingPractice:
  - The observance falls within Great Lent and does not lift the season's fast. During the chanting of the Akathist, standing is customarily observed by all present — the posture from which the office takes its name — as an expression of reverence and thanksgiving toward the Theotokos.
customs:
  - The complete Akathist Hymn to the Theotokos (the 'Salutations') is chanted on this Saturday; it is also chanted in four successive stanzas on the first four Fridays of Great Lent.
  - In monasteries of the Athonite tradition, the complete Akathist is chanted nightly at Compline.
