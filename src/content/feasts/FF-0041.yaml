id: FF-0041
overview:
  - The Saturday of the Akathist is an observance kept on the fifth Saturday of Great Lent in the Eastern Orthodox Church, dedicated to the Most Holy Theotokos. On this day the whole of the Akathist Hymn to the Theotokos — the poetic office popularly known as the 'Salutations' — is chanted in thanksgiving for the Mother of God's protection of the Church.
  - The Akathist Hymn is a lengthy office of praise addressed to the Virgin Mary. Its full text is sung during the Matins (Orthros) of this Saturday, distinguishing the day from the preceding four Fridays of Lent, on which the hymn is chanted in four successive portions during the 'Salutations to the Theotokos' service.
  - Falling within the penitential season of Great Lent, the observance belongs to the moveable cycle of the liturgical year, anchored to Pascha rather than to a fixed calendar date. Its timing also correlates with the Feast of the Annunciation, which almost always falls during Lent but, because of the season's penitential character, lacks the festive observances of an ordinary Great Feast.
history:
  - According to the Synaxarion, the observance originated in the year 626, during the reign of the Emperor Heraclius, when Constantinople was besieged for some months by the Persians and the Avars. Tradition holds that the city was saved through the intercession of the Most Holy Theotokos, and the observance commemorates this deliverance.
  - The 626 siege was a coordinated assault by Sassanid Persia and the Avar Khaganate against Byzantine Constantinople in June and July of that year. The attackers are said to have deployed some 80,000 troops against far fewer defenders. Byzantine control of the Bosphorus prevented Persian reinforcements from crossing to support their Avar allies, weakening the siege. The defense was directed by Patriarch Sergius alongside the patrician Bonus; despite continuous bombardment, morale within the walls remained high, attributed to the patriarch's religious fervor and his processions along the walls carrying an icon believed to be that of the Virgin Mary.
  - "Tradition relates that when the city was delivered, the faithful gathered at the Church of Blachernae for an all-night thanksgiving vigil, at which the entire crowd chanted the hymn while standing. From this practice the office takes its name: 'Akathist' means 'not sitting' in Greek, the standing posture expressing reverence and thanksgiving toward the Theotokos. Later deliverances of the city, under Leo III the Isaurian and Constantine Pogonatus, were similarly commemorated. Following the successful defense of 626, a new proemium (introduction) for the hymn is traditionally said to have been composed by an unknown author, possibly Patriarch Sergius or George of Pisidia."
  - "The authorship of the Akathist Hymn itself remains uncertain. It has traditionally been attributed to Romanos the Melodist, the foremost composer of kontakia of his era, but recent scholarship largely disputes this attribution, though significant dissent among scholars remains. Other proposed authors include Patriarch Sergius I of Constantinople and George of Pisidia. The hymn's dating is likewise debated: before the turn of the twenty-first century it was usually assigned to the sixth or seventh century, but more recent scholarship has argued for a fifth-century origin. The hymn passed into the moveable liturgical cycle during the fourteenth century, its full chanting fixed to the fifth Saturday of Great Lent."
meaning:
  - The observance celebrates the Theotokos as the Mother of God, the intercessor and defender of the Church. Its historical setting — the deliverance of Constantinople — expresses the conviction that the Church is guarded through the Virgin's intercession, and the day gathers the faithful in thanksgiving for that protection.
  - The Akathist Hymn honors Mary above all for her role in the Incarnation. Its elaborate invocations praise her participation in the mystery of God's coming in the flesh, using poetic language that emphasizes paradox and divine mystery. Through its verses the hymn also progresses through the events surrounding Christ's coming — the Annunciation, the Visitation, Joseph's doubts, the Nativity, the visit of the Magi, the flight into Egypt, and the Presentation in the Temple.
  - "The standing posture that gives the office its name is itself part of its meaning: to remain standing throughout the hymn is an act of reverence and thanksgiving, a bodily confession of gratitude for the Theotokos's defense of her people."
