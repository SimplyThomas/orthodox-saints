    title: Composition of the Akathist Hymn
    body: The hymn is composed by an uncertain author; traditionally attributed to Romanos the Melodist, though later scholarship disputes this and proposes Patriarch Sergius or George of Pisidia. Dating ranges from a fifth-century to a seventh-century origin.
  - when: "626"
    title: Deliverance of Constantinople
    body: During the reign of Heraclius, Constantinople is besieged by the Persians and Avars and, according to tradition, saved through the intercession of the Theotokos. The faithful keep an all-night thanksgiving vigil at the Church of Blachernae, chanting the hymn while standing.
