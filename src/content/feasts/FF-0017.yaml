hymnography:
  - The distinguishing liturgical feature of the fast is the chanting of the Paraklesis, the supplicatory canon to the Theotokos, on the evenings of the fast. In Greek practice either the Great Paraklesis or the Small Paraklesis is served each evening, except on Saturday evenings and the eves of the Transfiguration and the Dormition. In the Russian tradition the weekday services more broadly resemble those of Great Lent.
  - "In some regions, particularly Jerusalem and Russia, a Burial of the Theotokos rite is observed during the All-Night Vigil of the feast: an embroidered cloth icon (Epitaphios) depicting the Theotokos in repose is processed on a bier while lamentation hymns are sung to Psalm 118, echoing the burial service of Holy Saturday."
iconography:
  - Byzantine iconography of the Dormition depicts the Mother of God lying on a bier surrounded by the Twelve Apostles, with Christ appearing in a mandorla and cradling her soul, shown as an infant or a seraph. The composition expresses the Church's teaching on her repose and her bodily assumption, the theme toward which the fast is directed.
fastingPractice:
  - The Dormition Fast is a short but strict fast kept on the pattern of Great Lent, and is generally reckoned stricter than either the Nativity Fast or the Apostles' Fast. In its fullest form the season abstains from red meat, poultry and meat products, dairy, fish, oil, and wine, with wine and oil customary on weekends and fish permitted on the feast of the Transfiguration (August 6). Until the Transfiguration, when grapes and other first fruits are blessed in churches, some traditions also keep the faithful from eating those fruits.
  - The specifics of how strictly the fast is kept — and which relaxations apply on which days — vary between traditions and parishes, and the faithful are directed to their own parish and spiritual father rather than to any fixed table of rules.
customs:
  - The Paraklesis (supplicatory canon) to the Theotokos is chanted on the evenings of the fast.
  - The blessing of grapes and first fruits accompanies the feast of the Transfiguration on August 6.
  - The fast opens on August 1 with the Procession of the Honorable Wood of the Life-Giving Cross, which includes outdoor processions and the Lesser Blessing of Water.
  - Some parishes bless flowers before the Divine Liturgy on August 15.
  - In Jerusalem and Russia, a Burial of the Theotokos rite with an Epitaphios icon is observed during the All-Night Vigil of the feast.
sections:
  - heading: The August feasts
    body:
      - The fast frames a cluster of August celebrations. August 1 opens it as the Procession of the Honorable Wood of the Life-Giving Cross of the Lord — an observance that arose in Constantinople, where the precious relic was carried in procession through the city for its sanctification during the illnesses that occurred in the month of August. The same date commemorates the Seven Holy Maccabee Martyrs together with their mother Solomonia and their teacher Eleazar.
      - August 1 is counted the first of three 'Feasts of the Saviour' in August, the others being the Transfiguration on August 6 and the feast of the Icon Not Made by Hands on August 16. The feast of the Dormition itself has a one-day Forefeast and eight days of Afterfeast.
