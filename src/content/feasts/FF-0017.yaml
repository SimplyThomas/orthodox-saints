id: FF-0017
overview:
  - The Dormition Fast is a two-week period of abstinence kept from August 1 to August 14 (August 14 to 28 on the Julian calendar), immediately preceding the feast of the Dormition of the Mother of God on August 15. It is one of the four principal fasts of the Orthodox liturgical year, alongside Great Lent, the Nativity Fast, and the Apostles' Fast, and is the shortest of them.
  - Though brief, the fast is comparatively strict, undertaken in honor of the Most Holy Theotokos in preparation for the celebration of her repose. It also embraces the feast of the Transfiguration of the Lord on August 6, which falls within the fast and marks a single relaxation of its discipline. The fast opens on August 1 with the Procession of the Honorable Wood of the Life-Giving Cross of the Lord.
  - The period is distinguished liturgically by the chanting of the Paraklesis, the supplicatory canon to the Theotokos, on the evenings of the fast, and by the blessing of grapes and first fruits associated with the Transfiguration.
history:
  - Tradition holds that the observance of a fast before the Dormition belongs to the early centuries of the Church. Pope Leo the Great, writing around 450, described what has been understood as this observance as 'the autumn fast, in the seventh month,' listing it among the annual fasts known to the ancient Church.
  - The date of August 15 for the feast of the Dormition was fixed by an edict of the Emperor Maurice (582–602), which established the liturgical framework within which the preceding fast came to be observed. In Rome, Pope Sergius I (687–701) later established the feast as the Dormitio Beatae Virginis, drawing on the observance already kept at Constantinople.
  - St. Symeon of Thessalonica explained the purpose of the fast as an act of imitation, honoring the Mother of God who, in his account, 'ascetically labored and fasted for us.' In this way the two weeks came to be kept as a period of spiritual preparation for the two major August feasts it precedes, the Transfiguration on August 6 and the Dormition on August 15.
  - Regional practice shaped the character of the fast's services. In the Russian tradition the weekday services during the fast resemble those of Great Lent, while in Greek practice either the Great Paraklesis or the Small Paraklesis is celebrated each evening, except on Saturday evenings and the eves of the Transfiguration and the Dormition.
meaning:
  - The fast honors the Theotokos and prepares the faithful to celebrate her Dormition — her 'falling asleep,' or death, and her bodily assumption into heaven. Orthodox teaching holds that the Mother of God, having died like all humanity, has already undergone bodily resurrection and entered the glorified state that other righteous persons will attain only after the Last Judgment.
  - The tradition surrounding the Dormition relates that when the Apostle Thomas arrived after the others and her tomb was opened, her body was found to be absent. This is understood as a firstfruits of the resurrection of the faithful at Christ's Second Coming. The feast is thus received not as a tragedy but as a triumph — a foretaste of the general resurrection — and the fast prepares the faithful to celebrate it as such.
  - The feast is described as proclaiming the Mother of God's assumption into the heavenly kingdom of Christ in the fullness of her spiritual and bodily existence. The fast, in honoring her ascetic labor, joins the faithful to her preparation and to the hope of the resurrection she prefigures.
