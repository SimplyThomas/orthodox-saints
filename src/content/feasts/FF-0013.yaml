id: FF-0013
overview:
  - The Dormition of the Theotokos commemorates the falling-asleep — the repose in death — of the Virgin Mary and, by the tradition of the Church, the taking up of her body to her Son. Its Greek name, Koimisis, means "a falling asleep," the same root from which the word cemetery derives, and it frames Mary's death not as an end but as a sleep from which she was raised. It is the last of the Twelve Great Feasts of the Church year, kept on August 15.
  - The feast is preceded by a one-day Forefeast on August 14 and followed by an Afterfeast that extends to its Apodosis (leave-taking) on August 23. It concludes the two-week Dormition Fast, kept from August 1 through 14, and on the feast day itself fish is permitted. In some traditions the feast is called the "Summer Pascha," because it proclaims resurrection and joy rather than mourning.
  - The Church teaches that Mary died a natural death like all humanity; that her soul was received by Christ; and that her body was raised on the third day and taken into the heavenly kingdom. Because the canonical Scriptures do not record her death or Dormition, the feast rests wholly on the Church's Sacred Tradition.
history:
  - The belief in Mary's repose and bodily assumption developed gradually, transmitted first through apocryphal and later through genuine patristic writings. Christian canonical Scripture records neither her death nor her Dormition, and the earliest formal narratives emerged only over several centuries. The earliest known artistic depiction of the Dormition appears on a sarcophagus in the crypt of a church in Zaragoza, Spain, dated around 330, though the feast was not widely celebrated as a holy day before the fourth or fifth century.
  - Tradition preserved by St. John of Damascus records testimony attributed to St. Juvenal, Bishop of Jerusalem, who at the Council of Chalcedon in 451 reported that Mary died in the presence of the Apostles, and that when her tomb was opened at the request of St. Thomas it was found empty — from which the Apostles concluded that her body had been taken up to heaven. Genuine Eastern sources, including sermons by St. John of Damascus and St. Andrew of Crete, affirmed the tradition, while in the West St. Gregory of Tours was among the first to mention it. More formal narratives also emerged from authors such as Jacob of Serug and Theodosius of Alexandria.
  - The feast's date and observance varied by region before being standardized. In Palestine it was celebrated before the year 500, likely in August, and was initially kept on August 13 at a kathisma outside the walls of Jerusalem before the date shifted to August 15. Egypt and Arabia observed it in January, a practice later adopted by Gallic monks who placed the Gallican observance on January 18. Emperor Maurice (582–602) issued an edict standardizing the Eastern celebration on August 15, connecting it to Mary's tomb in the Church of the Panagia at Gethsemane.
  - "In the West, Rome's oldest Marian feast was January 1; the Assumption was later established in Rome by Pope Sergius I (687–701), borrowed from Constantinople. In the Roman calendar the feast was added in the seventh century as the Dormitio, and in the eighth century its title was changed to the Assumptio. The two-week Dormition Fast that precedes the feast was itself established in the seventh century: originally divided into two periods, it merged into a unified fourteen-day observance beginning August 1."
meaning:
  - "The Orthodox Church understands the Dormition in two distinct but joined movements: the Dormition itself, a real death — the separation of soul and body — followed by the translation of the Theotokos, described as a resurrection, the reunion of her soul and body, and her ascension near her Son. The feast therefore commemorates not only Mary's death but her resurrection and glorification, proclaiming that she was assumed by God into the heavenly kingdom of Christ in the fullness of her spiritual and bodily existence."
  - The Church holds that Mary died as all humanity dies, falling asleep in the way the feast's name indicates. Though she is understood to be without personal sins, she truly needed to be saved by Christ, as every human person is saved from the trials, sufferings, and death of this world; she truly died and was raised up by her Son as the Mother of Life. In this the Theotokos is understood to have already undergone the bodily resurrection and to stand in heaven in that glorified state ahead of the final judgment.
  - For this reason the Church interprets the empty tomb — discovered when the Apostles opened it at Thomas's request — as a firstfruits of the resurrection of all the faithful that will occur at the Second Coming of Christ. What is promised to the whole Church at the end is shown already fulfilled in the Mother of God, so that the feast reads as a pledge and image of the hope held out to every believer.
