iconography:
  - "The traditional festal icon shows the body of the Theotokos lying in repose on a bed or bier, surrounded by the Apostles who were gathered to her passing. Behind the bier stands Christ, holding a small figure wrapped in a winding cloth that represents her soul, which he receives at her death. The composition inverts the natural order of mother and child: as she once held the infant Christ, so now he holds her soul in his arms."
  - Christ is set within a mandorla, the radiance of divine glory, and the surrounding sky may include angels, saints, and prophets attending the scene. The icon thus depicts at once her real death and her passage into the glory of her Son, holding both movements of the feast — the falling-asleep and the translation — in a single image.
hymnography:
  - "The services of the feast draw on the tradition of Mary's passing: the Archangel Gabriel announcing her repose three days beforehand, the miraculous gathering of the Apostles from throughout the world, the late arrival of Thomas, and the discovery of the empty tomb. Frescoes at church entrances depict these sacred funeral compositions, and hymns and patristic eulogies are central to the memorial character of the celebration."
  - During the two weeks of the Dormition Fast, the Church chants the Paraklesis — the supplicatory canon to the Most Holy Theotokos — on weekday evenings, with the Great Paraklesis and the Small Paraklesis sung on alternating days. These canons prepare the faithful through the fast for the feast itself.
fastingPractice:
  - The feast concludes the Dormition Fast, a two-week period kept from August 1 through 14. The fast was established in the seventh century; originally divided into two periods, it was merged into a single fourteen-day observance. The Church's practice during the fast is to abstain from oil except on Saturdays and Sundays, with fish permitted on the feast of the Transfiguration (August 6) that falls within it. On the feast of the Dormition itself, fish is permitted. Typikon prescriptions vary by tradition; the faithful should consult their priest.
customs:
  - The two-week Dormition Fast is kept before the feast, with the Great and Small Paraklesis canons sung to the Theotokos on weekday evenings.
  - The blessing of flowers and fragrant herbs on the feast.
  - In some places a Rite of the Burial of the Theotokos is celebrated during the All-Night Vigil, modeled on Christ's burial service, in which an embroidered cloth icon (Epitaphios) of the Theotokos is carried in procession with special hymns — a practice that originated in Jerusalem and spread particularly through Russian Orthodox tradition.
  - On several Aegean islands, including Tinos, Paros, and Patmos, decorated epitaphioi of the Theotokos are carried in procession.
  - In Greece the feast is called the "Summer Pascha," kept as a celebration of resurrection and joy; on Tinos, August 15 also commemorates the victims of the torpedoing of the Greek cruiser Elli in 1940.
