celebration:
  intro: Ways to honor the Protection of the Theotokos (Pokrov) at home.
  ideas:
    - idea: Sing the feast's troparion as a family and teach little ones the short refrain "Most Holy Theotokos, save us."
    - idea: Look at the Pokrov icon together and point out its story — the Theotokos spreading her veil over the crowd, with Sts Andrew and Epiphanius who saw the vision — as a picture of her sheltering prayers.
    - idea: 'Talk about the feast''s meaning: that the Mother of God covers and protects us "from enemies seen and unseen."'
    - idea: Add or refresh a Theotokos icon in the icon corner for the season and pray a short intercession or Akathist to her together.
    - idea: Do a simple "protecting veil" craft — an icon-card showing her outstretched veil over the family.
    - idea: Let young children carry a small Theotokos icon to the feast Liturgy.
