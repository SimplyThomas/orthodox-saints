id: FF-0061
overview:
  - The Saturday of Souls before Pentecost is one of the principal days appointed in the Orthodox Church for the universal commemoration of the departed. Falling on the eve of Pentecost (P+48 in the paschal cycle), it belongs to the Church's category of observances dedicated to the departed, and it prays for the repose of the faithful of every age as the Church prepares to celebrate the descent of the life-giving Spirit.
  - On this day the Church commemorates all pious and Orthodox Christians who have fallen asleep in the Lord, offering intercessory prayer for their repose. The synaxarion directs that remembrance be made of all who from the ages have fallen asleep in piety, so that the commemoration is collective and comprehensive rather than tied to any single individual.
  - It is one of two principal Soul Saturdays in the liturgical year, the other being the Saturday before Meatfare Sunday; additional Soul Saturdays fall on the second through fourth Saturdays of Great Lent. All Orthodox Christians, as well as Byzantine Catholics, observe the Saturday before Pentecost. A memorial service (Panikhida) is served and kollyva (koliva) is offered for all the departed.
history:
  - The commemoration of all the faithful departed has early roots in the Church. Catacomb inscriptions from the first through fifth centuries attest to widespread commemoration of the dead, and all the early liturgies contain prayers for the faithful departed, asking for peace, light, refreshment, and eternal life. Scriptural warrant was found in II Machabees 12:40-46, which describes Judas Maccabeus offering prayer and sacrifice for the fallen. The practice reflects belief in the communion of saints, the spiritual bond between the living and the deceased.
  - Saturday itself became the traditional day of prayer for the dead in the Orthodox Church because Christ lay dead in the Tomb on Saturday. On these Soul Saturdays the Church commemorates departed relatives and others among the faithful who would not otherwise be named specifically as saints, adding special hymns for the departed to the divine services.
  - The commemoration of the departed after Pascha was noted by Saint Ambrose of Milan (340-397), and Saint John Chrysostom (349-407) documented joyful commemorations during Thomas Week in his homilies, associated with what came to be called Radonitsa on the Tuesday of Thomas Week. Liturgical rubrics forbid special prayers for the departed during the eleven-day period from Great and Holy Thursday through Thomas Sunday, so that the joy of the Resurrection is not interrupted; the great paschal-season commemoration of the departed is gathered instead into this Saturday on the eve of Pentecost.
  - In its present form the day is observed across the Orthodox world with a memorial service, most often following the Saturday Divine Liturgy or the Friday Vespers, at which koliva is blessed and eaten. The readings from the Acts of the Apostles and the Gospel of John, which had been read continuously since Pascha, come to their conclusion on this date.
meaning:
  - The theological foundation of the commemoration is that the departed remain an organic part of the Church, members of the Body of Christ, because death is understood not as the door leading to nonexistence but as the door leading to the embrace of Christ. The Apostle Paul's affirmation that whether we live or whether we die, we are the Lord's, anchors this conviction, uniting the living and the dead in one communion.
  - "The placement of the commemoration on the eve of Pentecost carries a distinctive significance, identified by the theologian Sergei V. Bulgakov: the coming of the Holy Spirit is not only the economy of the salvation of the living, for the departed also share in this salvation. On this Saturday the Church petitions that the grace of the Holy Spirit benefit the departed, recognizing that their eternal blessedness depends on the same sanctifying force that enlivens the living, since all souls are enlivened through the Holy Spirit."
  - "The commemorative prayers embrace an extraordinarily wide range of the deceased: all the faithful from Adam to the present, across every rank of society, from kings and priests and bishops to monks and laity; individuals of every age from newborns to the elderly; and those who died in every circumstance, whether by natural death, accident, shipwreck, disaster, violence, or poisoning, and in every place, whether mountains, deserts, cities, or seas. The prayers ask Christ to deliver the faithful departed from torment and to grant them resurrection in glory on the last day and entrance into the heavenly kingdom."
  - The observance serves a twofold purpose. It offers intercessory prayer for the deceased who may not have completed their repentance during their earthly life, and it presents a spiritual challenge to the living, calling them to deepen their own repentance and to reorient their lives toward eternal rather than temporal pursuits. In this the day both prays for the dead and instructs the living.
scripture:
  - ref: Acts 28:1-31
    note: The reading from Acts, read continuously since Pascha, concludes on this day; it ends open-ended rather than with the apostles' deaths, suggesting the continuity of Christ's work through successive generations.
  - ref: 1 Thessalonians 4:13-17
    note: On those who have fallen asleep and the hope of the resurrection.
  - ref: John 21:14-25
    note: The Johannine reading, likewise begun at Pascha, reaches its conclusion on this date.
  - ref: John 5:24-30
    note: On the passage from death to life and the resurrection of the dead.
  - ref: II Machabees 12:40-46
    note: Judas Maccabeus's prayer and sacrifice for the fallen, cited as scriptural support for prayer for the departed.
hymnography:
  - The services of the day add special hymns for the departed to the ordinary Saturday offices, appointing a troparion and kontakion for the commemoration. The liturgical texts dwell on the vanity of material existence, using the imagery of viewing bodies in caskets to confront the faithful with the transience of life and the futility of pursuing worldly beauty, wealth, and status apart from Christ, while emphasizing Christ's mercy toward the departed and the living alike and recalling the dread Day of Judgment.
  - Saint John Chrysostom's Homily on Patience and Gratitude is appointed for reading during the Liturgy; the same homily is prescribed for the Orthodox funeral service, connecting the collective commemoration of this day with the individual departure of each Christian. Fr. Justin Popovich's work With All the Saints reflects the same continuity, describing hagiographies as a continuation of the Acts of the Apostles, with the saints continuing to preach the gospel and to manifest divine power across the generations.
fastingPractice:
  - The Saturday of Souls stands on the eve of Pentecost, which in the Orthodox Church ranks among the Great Feasts, second only to Pascha. On the evening of Pentecost the Church serves the Kneeling Prayer service, a Vespers with three sets of long poetical prayers ascribed to Saint Basil the Great, during which the faithful make full prostrations for the first time since Pascha and pray even for those in hell, that they may be granted relief. The Afterfeast of Pentecost then continues for a week, during which the Church's practice is that fasting is set aside even on days that would ordinarily be fast days.
customs:
  - A memorial service (Panikhida) is served for all the departed, typically following the Saturday Divine Liturgy or the Friday Vespers.
  - Koliva (kollyva), a dish of boiled wheatberries or rice with honey, is prepared and placed on the memorial table; after the service the priest blesses it and it is eaten by all present as a memorial of the departed.
