id: FF-0012
overview:
  - "The Transfiguration of the Lord is one of the Twelve Great Feasts of the Orthodox Church, celebrated on August 6. It commemorates the moment when Christ, having taken the apostles Peter, James, and John up a mountain, was changed before them: His face shone like the sun and His garments became white as light, while the prophets Moses and Elijah appeared speaking with Him and the Father's voice was heard from a bright cloud, declaring Him the beloved Son."
  - The feast is dedicated to the Lord and falls within the Dormition Fast (August 1–14). Because of the feast's importance the fast is relaxed on this day, and fish, wine, and oil are permitted. The celebration is preceded by a one-day Forefeast on August 5 and is followed by an Afterfeast of eight days, its Apodosis falling on August 13, the day before the Forefeast of the Dormition.
  - In Orthodox tradition the mountain of the Transfiguration is identified as Mount Tabor. The event is recorded in the Synoptic Gospels and referred to in the Second Epistle of Peter, and it stands as a revelation of Christ's divinity and a foreshadowing of His glory, given to strengthen the disciples before His voluntary Passion.
history:
  - The origins of the feast are uncertain. It may derive from the dedication of three basilicas on Mount Tabor, and it existed in various forms by the ninth century. Some sources connect its early observance to the Jewish Festival of Booths, of which the Transfiguration came to be regarded as the New Testament fulfillment. The celebration was at one time associated with the season of Great Lent, but this placement may have been felt to be too joyous for that penitential period, and the feast came to be kept on August 6.
  - A theology of the Transfiguration drew the attention of the Church Fathers from the earliest times. Irenaeus in the second century wrote that the glory of God is a living human being. By the fourth century Gregory of Nyssa and Pseudo-Dionysius developed a theology of light that influenced later Byzantine mystical traditions. In the seventh century Maximus the Confessor taught that the apostles' senses were transfigured so that they might perceive Christ's true glory.
  - The feast became central to a major theological controversy in the fourteenth century between Gregory Palamas and Barlaam of Calabria. Barlaam held that the light shining from Christ on the mountain was a created light, while Gregory maintained that the disciples were given grace to perceive the uncreated light of God. Palamas conceived true knowledge of God as the transfiguration of humanity by the Spirit, and his defense of the uncreated light shaped the Orthodox understanding of the feast.
  - The Transfiguration ranks among the Twelve Great Feasts of the Byzantine and Orthodox calendars. It is celebrated with an All-Night Vigil, and Great Vespers is served on the eve. When the feast falls on a Sunday, its liturgy is not combined with the Sunday service but completely replaces it.
meaning:
  - The Transfiguration reveals the divinity of Christ. On the mountain the disciples beheld, as far as they were able, the glory that belonged to Him always, and the event demonstrated His divine nature even as He drew near to His voluntary Passion. The setting on the mountain is presented as the meeting point of human nature and God, the place where the temporal and the eternal come together.
  - "Byzantine theology reads the feast as a revelation of the Holy Trinity: the Father spoke from heaven, the Son was transfigured, and the Holy Spirit appeared as a cloud. For this reason it is called the Small Epiphany, paralleling the Baptism of Christ, which is the Great Epiphany."
  - The appearance of Moses and Elijah, representing the Law and the Prophets, shows that Christ fulfills both, and the event is understood as the fulfillment of Old Testament messianic prophecy. Standing with Him, the two prophets bear witness that He is the one toward whom the Scriptures point.
  - "Central to the meaning of the feast is the teaching on the uncreated light. Following Gregory Palamas, the Church confesses that although God cannot be known in His essence, He can be known in His energies, and that the light which shone on Tabor was the uncreated light of God Himself. In this the feast opens onto the hope of theosis: the Transfiguration shows the possibility of the deification of the human person, transfigured by the grace of the Spirit."
