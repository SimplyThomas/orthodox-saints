iconography:
  - "Depictions of the Transfiguration developed early; a sixth-century symbolic representation survives in the Basilica of Sant'Apollinare in Classe. The standard iconographic composition organizes the figures into two zones. Above, Christ and the prophets appear in stately, static, and calm dignity: Christ stands in bright radiance at the center, with Moses, shown with a long beard, on the left and Elijah on the right. Below, the three witnessing apostles — Peter, James, and John — are shown sprawling and writhing in sleep or in terror, responding with wonder or prostration."
  - The mandorla is the primary vehicle for representing the divine radiance. In many Eastern icons a blue-and-white mandorla depicts the uncreated light emanating during the event; this element also represents the luminous cloud and signifies the presence of the Holy Spirit on the mountain. The tradition stresses that the disciples beheld the light only as far as they were able, reflecting the varying spiritual development of the apostles.
  - In monastic tradition icon painters have often begun their practice by rendering the Transfiguration, on the understanding that this icon is painted not so much with colors as with the Taboric light.
fastingPractice:
  - The feast falls within the Dormition Fast (August 1–14). In recognition of the importance of the celebration the fast is relaxed on this day, and the Church's practice permits the consumption of fish, wine, and oil. Fasting disciplines vary by tradition and typikon; the faithful are directed to their priest for the observance proper to them.
customs:
  - The blessing of the first fruits of the new harvest — especially grapes, and also apples and other produce — which are brought to the church to be sanctified after the Divine Liturgy on the feast, beginning the annual blessing of first fruits; where grapes are unavailable, other fruits may be substituted.
  - In Greece and Romania the harvest season traditionally began on the Transfiguration, and grapes in particular were not eaten before August 6; in some parishes the first grapes are brought to church for a blessing and then distributed to the faithful.
hymnography:
  - The services of the feast are furnished with proper hymns that celebrate the manifestation of Christ's glory on the mountain and the revelation of His divinity to the disciples. Great Vespers is served on the eve, with Old Testament readings drawn from Exodus and First Kings; the Gospel of the Transfiguration from Luke is appointed at Matins, and the readings from Second Peter and Matthew at the Divine Liturgy of Saint John Chrysostom, which is traditionally preceded by Matins.
