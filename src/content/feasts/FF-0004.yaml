hymnography:
  - Hymnody for the feast was shaped by early Constantinopolitan authors. Germanos I, Patriarch of Constantinople, composed two homilies for the feast in the eighth century, and in the ninth century George of Nicomedia composed three sermons together with hymns for it, marking the feast's establishment in the liturgical services.
  - In many places the feast marks the point at which the Nativity katavasiae, beginning "Christ is born," are first sung, so that its hymnography begins to turn the services toward the approaching feast of the Nativity.
fastingPractice:
  - The feast falls within the Nativity Fast. The Church's practice on this day is to lessen the fasting rules somewhat, so that fish, wine, and oil may be eaten in observance of the Great Feast.
customs:
  - In many places the feast opens the singing of the Nativity katavasiae ("Christ is born"), pointing the faithful toward the coming Nativity fast and feast.
iconography:
  - The festal image depicts the young Mary at the Temple. Tradition surrounds her entry with a procession of virgins who escorted her with lighted candles in their hands while singing sacred songs, and with the fifteen high steps leading to the sanctuary that the three-year-old ascended by divine strength. At the summit the High Priest receives her and leads her into the Holy of Holies, the space entered ordinarily only once a year by the High Priest alone.
