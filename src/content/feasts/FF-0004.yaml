id: FF-0004
overview:
  - The Entry of the Theotokos into the Temple is one of the Great Feasts of the Orthodox liturgical year, celebrated on November 21. It commemorates the presentation of the child Mary in the Temple at Jerusalem by her parents, the Righteous Joachim and Anna, who by tradition had vowed to dedicate their long-awaited daughter to the service of God. According to the account, Mary was received at the Temple by the priest Zechariah and dwelt there in preparation for her role as the living temple of God.
  - The feast is dedicated to the Theotokos and falls within the Nativity Fast. It is preceded by a forefeast on November 20 and concludes with its apodosis (leave-taking) on November 25. In many places it opens the singing of the Nativity katavasiae ("Christ is born"), directing the faithful toward the coming Nativity feast.
  - "The narrative underlying the feast is drawn chiefly from the Protoevangelion of James, a non-canonical text dated before 200 AD. The Church understands the event as a threshold in the history of salvation: the young Mary entering the sanctuary as the one who will herself become the dwelling place of the Divine child to be born of her."
history:
  - The narrative of the feast derives from the Protoevangelion of James, an apocryphal text dated before 200 AD. According to this account, Mary's parents Joachim and Anna, having vowed to dedicate their child to God if their childlessness ended, brought their daughter to the Temple at the age of three in thanksgiving for the gift of their daughter. The account relates that Mary remained in the Temple until her twelfth year, when Joseph became her guardian.
  - As a liturgical observance, the feast was not among the most ancient of the Christian year. Fourth-century Palestinian traditions mention that Empress Helen built a church honoring the event, though no concrete evidence supports the claim. Church Fathers including Gregory of Nyssa, Jerome, and John of Damascus mention the Entrance, but it is not attested as a festival of the Church until the eighth or ninth century. Gregory of Nyssa in the fourth century is cited as mentioning the feast.
  - The observance is closely tied to the dedication of the New Church of the Theotokos (the Nea Church, or Basilica of Saint Mary the New) constructed in 543 by the Byzantine Emperor Justinian I near the ruined Temple site in Jerusalem. That structure was destroyed by the Sasanian Persians under Khosrow II following the Siege of Jerusalem in 614.
  - The feast became formally established in Constantinople during the eighth century. Germanos I, Patriarch of Constantinople (715–730), authored two homilies for the feast, an early mark of liturgical recognition; according to Theodore Balsamon in the twelfth century, the Entrance was celebrated for the first time in Constantinople in 730. Patriarch Tarasios introduced it as an official feast around 806, possibly following the end of the first wave of Iconoclasm, and, with Germanus, delivered sermons on the feast in the eighth century. In the ninth century, George of Nicomedia composed three sermons and hymns for it.
  - 'From Constantinople the feast spread more widely. By the ninth century it was celebrated in Southern Italian monasteries. It received formal calendar designation in the eleventh-century Menologion of Basil II under the title "Εἴσοδος τῆς Παναγίας Θεοτόκου" (Entry of the All-Holy Theotokos), the earliest documented calendar mention. The date of November 21 was fixed in the East: a ninth-century codex at Saint Andrew''s Skete on Mount Athos provides the first clear designation of November 21, while Palestinian calendars mention the date only from the tenth century. In the West the feast developed differently and along a later course, being introduced to the Papal Chapel in Avignon in 1372, where it is also known as the Presentation of the Virgin Mary.'
meaning:
  - The feast celebrates Mary's presentation at the Temple as God's blessing for the human race, the preaching of salvation, and the promise of the coming of Christ. In dedicating their daughter to God, Joachim and Anna offered her as a first-fruit to the One who had granted her to them, and the Church honors in her the multidimensional purity of the Theotokos and her significance as a model for Christian life.
  - "The central theological content of the feast is the transformation the Church perceives in Mary's entry: she who is presented at the Temple becomes herself the living sanctuary and temple of the Divine child who was to be born in her. In this the feast is read as marking the end of the physical temple in Jerusalem as the dwelling place of God, signifying a transition in sacred worship from a place to a person."
  - Orthodox tradition surrounds the event with signs of divine election. The Temple is remembered as having fifteen high steps leading to the sanctuary, accessible only to priests, which the three-year-old Mary is said to have ascended independently and swiftly by divine strength; the High Priest, inspired from above, then led her into the Holy of Holies, a space ordinarily entered only once a year by the High Priest alone. This unprecedented action is remembered as amazing all who witnessed it.
  - The feast also holds up Mary as an example of ascetic and contemplative life. After her parents' departure she is said to have remained among the consecrated virgins, growing up in a community of pious virgins, diligently reading Holy Scripture, occupying herself with handicrafts, and praying constantly. Homilies on the feast accordingly discuss her monasticism and her example of asceticism and contemplative prayer within the life of the Temple.
