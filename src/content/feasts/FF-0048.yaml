iconography:
  - The icon proper to the day is the Epitaphios — most often a large cloth, embroidered and richly adorned, though it also exists in painted or mosaic form on church walls and panels. The name comes from the Greek epitaphios; in Slavonic it is the plashchanitsa, and in Arabic the naash. It depicts the Body of Christ after His removal from the Cross, lying supine as it is prepared for burial, drawing on the account of John 19:38–42.
  - The composition typically shows mourning figures gathered around the dead Christ — the Theotokos, John the Beloved, Joseph of Arimathea, Mary Magdalene, Nicodemus, and angels. A troparion concerning Joseph of Arimathea wrapping the Body is often embroidered around the edges of the cloth.
  - On Great and Holy Friday the Epitaphios is placed on the Holy Table, then carried in procession to the center of the church and laid on a decorated bier (the kouvouklion), which represents Christ's tomb and is often adorned abundantly with flowers. The faithful venerate it through the afternoon and evening. At the Paschal Vigil the priest raises it from the bier and returns it to the Holy Table, signifying the burial cloth left in the empty tomb; it remains there through Easter Week, and for forty days afterward, as a sign of the empty tomb and of Christ's post-resurrection appearances before His Ascension.
hymnography:
  - The hymnography of the day unfolds across its services. The Matins of the Twelve Passion Gospels interleaves twelve Gospel readings with hymns on the Crucifixion. The Royal Hours add special psalms and hymns to the consolidated Little Hours.
  - "The night service of the Lamentation at the Tomb centers on the Enkomia, the Lamentations or Praises: 185 short antiphons in three parts — seventy-five, sixty-two, and forty-eight tercet stanzas — sung interspersed with verses of Psalm 118, and known by their opening lines, 'Life in a grave,' 'Worthy it is,' and 'All the generations.' Their climax is a lamentation in the voice of the Virgin, mourning her child whose beauty has been laid in the tomb. Young parish girls place flowers on the Epitaphios while the priest sprinkles it with rose-water. The Attic style of the Enkomia points to a dating around the sixth century, possibly before Saint Romanos the Melodist."
fastingPractice:
  - Great and Holy Friday is kept as the strictest fast of the year. Traditional guidance holds that on this day of the Crucifixion neither a meal is offered nor is food eaten; adult faithful are expected to abstain from all food and drink through the day so far as their health permits, and many keep total abstinence in mourning for the crucified Lord. The site's fasting notes are descriptive and summary-level; practice should be kept in consultation with one's priest.
customs:
  - The Royal Hours are served on Friday morning; the Vespers of the Taking-Down from the Cross in the afternoon.
  - The Epitaphios, the burial shroud of Christ, is brought out and carried in procession; the faithful venerate it and, in many parishes, pass beneath it.
  - During the afternoon Vespers the Body of Christ is removed from the cross, wrapped in white linen, and carried into the altar.
  - At the Lamentations, young parish girls place flowers on the Epitaphios and the priest sprinkles it with rose-water; the faithful hold lighted candles during the procession.
