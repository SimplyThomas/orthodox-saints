sections:
  - heading: Timing
    body:
      - The commemoration falls on the Sunday following December 25 and so occupies the December 26–31 window. When the Nativity falls on a Sunday and no Sunday intervenes before January 1, the observance is transferred to December 26. It is kept within the Afterfeast of the Nativity.
