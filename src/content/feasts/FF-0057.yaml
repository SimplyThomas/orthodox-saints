id: FF-0057
overview:
  - "The Sunday of the Samaritan Woman is the fifth Sunday of Pascha in the Eastern Orthodox liturgical year, taking its name from the Gospel appointed for the day: Christ's encounter with a Samaritan woman at Jacob's Well near the city of Sychar (John 4:5-42). It falls four weeks after Pascha, within the Pentecostarion — the cycle of movable observances that runs between the Resurrection and Pentecost."
  - The Gospel recounts how Jesus, weary from travel, asked the woman for a drink of water and, in the dialogue that followed, offered her the "living water" of eternal life, revealed His knowledge of her past, and disclosed Himself explicitly as the Messiah. Her witness led many of the Samaritans of Sychar to believe in Him.
  - 'In Orthodox tradition the woman is remembered as St. Photini ("the luminous" or "enlightened one"), honored as Equal to the Apostles for her evangelistic witness and venerated as a martyr who died under Emperor Nero. She is commemorated on this Sunday and also on fixed dates: February 26 in the Greek tradition and (in Slavic and OCA usage) March 20 and June 2.'
history:
  - The observance is drawn directly from the reading of John 4:5-42 on the fifth Sunday of Pascha in the Byzantine Rite, and belongs to the Pentecostarion, the liturgical cycle stretching from the Resurrection to Pentecost. The Church supplies extensive material proper to the day — Epistle and Gospel readings, synaxarion accounts, patristic commentaries and homilies, and hymns, including hymnody attributed to St. Ephraim the Syrian.
  - The synaxarion for the day sets the encounter in its historical setting. The Samaritans were originally Israelites who, according to the tradition, fell into idolatry in the reign of King Pekah; after the Assyrian deportation, foreign settlers were resettled in the land, and though a priest was sent to teach them the law of God, they accepted only the five books of Moses, rejected the Prophets, and continued in idolatry. For this the Jews regarded them as only half-Jewish and refused fellowship with them — the background to the woman's surprise that Jesus, a Jew, would speak with her.
  - Interpreters cited in the synaxarion read the woman's five husbands symbolically, as either the five books of Moses or five divine dispensations across history — Paradise, the age after Eden, the time of Noah, the era of Abraham, and the period of Moses — with the sixth being the Gospel or the word of Christ not yet possessed. The Samaritans' expectation of the Messiah is grounded in the writings of Moses, particularly the promise of a coming Prophet (Deuteronomy 18:15).
  - Orthodox tradition extends the woman's story beyond the Gospel. She was baptized by the Apostles and given the name Photini; her continued witness eventually drew the attention of Emperor Nero (who reigned 54-68). The tradition recorded in the OCA account places her in Carthage, proclaiming the Gospel with her younger son Joses, while her elder son Victor served as a military commander at Attalia before being summoned to Rome. An official named Sebastian, who had first advised the family to keep their faith secret, was struck blind for three days and, on confessing that "the God of the Christians is the only true God," regained his sight and was baptized. Christ is said to have appeared to the confessors, renaming Victor "Photinus" — "because through you many will be enlightened."
  - According to the tradition, the martyrs endured severe torments — the crushing of finger-joints, blinding, crucifixion, and flaying — accompanied by miracles. After twenty days imprisoned in a well, Photini confronted Nero directly, refused to renounce Christ or sacrifice to the idols, and was cast again into the well, where she died (reckoned around 66). Older editions of the Roman Martyrology likewise list "Photina of Samaria" as a martyr on March 20, and the Episcopal Church keeps a Lesser Feast for her on February 26, dating her death to about 67.
  - "The holy sites of the encounter were later honored liturgically: the synaxarion records that the Emperor Justinian transferred relics associated with the event — the mouth of Jacob's Well and the stone on which Christ conversed with the woman — to the Great Church (Hagia Sophia) in Constantinople, where they were reported to heal diseases, especially fevers and chills."
meaning:
  - 'The central image of the feast is water. The Gospel dialogue moves from the physical water the woman came to draw to the "living water" Christ offers — a passage the Church reads on multiple levels: physical thirst set against spiritual fulfillment, a well that becomes an interior fountain, and the salvation imagery of the prophets (Isaiah 12:3). The hymnody of the day turns on this reversal: coming to obtain perishable water, the woman instead drew forth living water and washed away the stains of her soul; approaching the well for "perishable water," she met "the Water of Wisdom" and, drinking abundantly, inherited the Heavenly Kingdom.'
  - The feast also teaches the nature of true worship. When the woman raises the disputed question of place — Mount Gerizim, holy to the Samaritans, or Jerusalem, holy to the Jews — Christ answers that authentic worship transcends location, being offered "in spirit and truth." As the synaxarion explains it, God is not material, and those who worship Him do so not through sacrifices tied to a place but through spiritual communion in the Holy Spirit and in the Son, who is Truth itself.
  - "In the encounter the Church sees Christ deliberately crossing religious and social boundaries — speaking with a woman and with a Samaritan at once, both countercultural acts in first-century Judea. The favorable portrayal of the Samaritans and the woman's swift return to bring her whole community to Christ make her, in Orthodox reckoning, an apostle to her people: her witness leads many to believe, and Christ remains two days in the city, where the tradition holds He worked many miracles."
  - The Fathers draw the day toward the veneration of the saints and the search for divine knowledge. St. Cyril of Alexandria understood Christ's visit to Jacob's Well as intended "to teach us to honor and dwell in the memory of His Saints," and St. Maximus the Confessor read the well itself as a symbol of divine grace and knowledge. In this the fifth Sunday of Pascha continues the paschal season's unfolding of the Risen Christ as the giver of new and abiding life.
scripture:
  - ref: John 4:5-42
    note: "The appointed Gospel: Christ and the Samaritan woman at Jacob's Well; the discourse on living water and worship in spirit and truth."
  - ref: Isaiah 12:3
    note: Prophetic source of the "water of salvation" imagery underlying the day's living-water theme.
  - ref: Deuteronomy 18:15
    note: The promise of a coming Prophet, the basis of the Samaritans' messianic expectation.
  - ref: Genesis 29
    note: Jacob's well encounter, a structural parallel to the Gospel scene noted by commentators.
  - ref: Acts 1:8
    note: Christ's promise of apostolic witness reaching Samaria.
hymnography:
  - "The Church provides a full complement of hymnody for the day, and tradition ascribes some of the proper hymns to St. Ephraim the Syrian. The Kontakion develops the feast's governing image: the Samaritan woman came to the well seeking perishable water and there encountered the Water of Wisdom, from which, drinking abundantly, she inherited the Heavenly Kingdom. Other hymns of the day play on the same reversal — that in coming for perishable water she drew forth living water and so washed away the stains of her soul. These texts are described here rather than quoted, since modern liturgical translations are not reproduced."
iconography:
  - "The scene at Jacob's Well is among the earliest attested subjects in Christian art: second-century paintings in the Catacomb of Callistus in Rome depict the biblical episode. The subject continued to draw Western artists as well, including Duccio di Boninsegna, Lucas Cranach the Elder, Guercino, and Carl Heinrich Bloch. The composition typically shows Christ seated at the well in conversation with the woman, who stands with her water vessel — the encounter that gives the feast its name."
