id: FF-0028
overview:
  - The Saturday of Souls before Meatfare Sunday is the great universal commemoration of all the faithful departed, kept on the Saturday before Meatfare Sunday in the pre-Lenten Triodion period. On this day the Church prays for all Orthodox Christians who have fallen asleep in the hope of the resurrection, placing this general intercession for the dead on the eve of Meatfare Sunday, whose theme is the Last Judgment.
  - It is one of the year's principal Soul Saturdays (or Parental Saturdays). In the Eastern Orthodox and Eastern Catholic Churches, Saturday holds special significance as a day of prayer for the dead because Christ lay dead in the Tomb on Saturday; these observance days add special hymns for the departed to the ordinary services, and a memorial service (Panikhida) is served together with the blessing of koliva.
  - The commemoration falls approximately fifty-seven days before Pascha (the anchor date P-57), standing within the Apokreo (Meatfare) phase of the Triodion. It thus sits at the threshold of the Last Judgment theme, so that the Church makes its universal intercession for all who will face that judgment immediately before contemplating it on the following Sunday.
history:
  - Prayer for the departed has ancient roots reaching back, in Orthodox understanding, to Old Testament times and especially to the New Testament era of the Apostles. The early Church Fathers Tertullian and Cyprian documented the regular practice of praying for the dead among early Christians, and the tradition affirms that such prayer benefits departed souls and maintains communion between the living and the deceased faithful.
  - "According to the synaxarion for the Saturday before Meatfare Sunday, the Divine Fathers instituted this commemoration on the basis of apostolic tradition for three reasons: to include those who had been denied individual funeral rites because of the circumstances of their death; to propitiate the just and unerring Judge so that He would show the departed His innate compassion; and to prepare believers spiritually before the Lenten fast by contemplating judgment and mortality. Saturdays in particular were chosen to honor the departed because, as the synaxarion notes, the Hebrew word for Sabbath means rest, and the dead rest from worldly cares."
  - The commemoration developed within the Triodion, the liturgical book covering the pre-Lenten and Lenten period from the Sunday of the Publican and Pharisee through Holy Saturday. In the Apokreo (Meatfare) phase, meat is no longer eaten after the First Apokreo Sunday, the eighth Sunday before Easter; the Saturday of Souls falls the day before Meatfare Sunday, whose theme is the Last Judgment, placing the universal intercession for the dead directly before the church's contemplation of judgment.
  - The Eastern Orthodox tradition retained multiple Soul Saturdays tied to the liturgical cycle rather than consolidating them into a single day. This differs from the Western All Souls' Day of November 2, established by Saint Odilo of Cluny in the tenth century. Besides the Meatfare Saturday, the Orthodox calendar keeps Soul Saturdays before Cheesefare, on the second, third, and fourth Saturdays of Great Lent, on the Saturday before Pentecost, and on the ancestral Saturdays associated with Saint Demetrios and (near October 1) the Intercession. The Russian Orthodox Church adds memorials on May 9 and September 11, and the Bulgarian Orthodox Church substitutes a commemoration near the feast of Saint Michael (November 8) in place of the Demetrius Saturday. The Orthodox also observe Radonitsa, on the Monday or Tuesday of the second week after Pascha, which emphasizes resurrection joy rather than penitential themes.
meaning:
  - "The commemoration prays for all those who from ages past have piously fallen asleep in the hope of resurrection unto life eternal. The Church prays especially for those who died in circumstances that denied them the customary memorial services: those who perished in wars, plagues, starvation, or while in a foreign country or traveling by sea; those who died prematurely, on mountains, or in disasters; and those who were poor and forgotten by the living. The synaxarion holds that these prayers benefit especially those who did even some small amount of good while they were numbered among the living."
  - The Orthodox Church maintains that communication between the living and the dead is not destroyed by death but continues, grounded in Christ's words that God is not the God of the dead but of the living, for all are alive to Him (Luke 20:38). Prayer for the departed provides the greatest benefit because not all people die in a state of full repentance; many die suddenly or while gravely ill, unable to confess their sins properly. In the teaching of Archimandrite Kirill Pavlov, such prayer becomes a means of assistance in the afterlife, comparable to a lifeline thrown to a drowning neighbor.
  - The observance also carries a purpose for the living. Saint Theophan the Recluse taught that the Church directs attention beyond the borders of the present life to the fathers and brothers who have passed on, using remembrance of the deceased as a catalyst for living righteously. Because, in his teaching, there is no self-purification after death — one remains as one is at the crossing over — the observance creates an urgent imperative for spiritual preparation during earthly life, readying believers to keep Cheesefare week and the Great Lent that follows.
  - The eschatological hope of the day finds voice in its hymns, which entrust the departed to God's mercy and look toward a place of repose free from suffering and grief, where eternal life reigns. The tradition affirms that memorial services, almsgiving, and prayers afford departed souls great respite and benefit until Christ's Second Coming.
scripture:
  - ref: Luke 20:38
    note: God is not the God of the dead but of the living, for all are alive to Him — the scriptural ground for the Church's communion with the departed.
hymnography:
  - The Soul Saturday services add special hymns for the departed to the ordinary Saturday order. The principal troparion emphasizes divine providence and eternal rest, entrusting the departed to God as their Creator in the confidence that they had placed their hope in Him. The kontakion voices the eschatological hope for the departed, praying that Christ receive them into a place of repose where suffering and grief have no place and life everlasting reigns.
  - The book governing the season, the Triodion, takes its name from the triode — the canons for weekday Matins in this period contain only three odes. Within it each pre-Lenten Sunday carries a specific eschatological theme (the Publican and Pharisee, the Prodigal Son, the Last Judgment on Meatfare Sunday, and the Expulsion from Paradise on Cheesefare Sunday), so that the Saturday of Souls stands at the threshold of the Last Judgment theme.
fastingPractice:
  - The Saturday of Souls falls within the Apokreo (Meatfare) phase of the Triodion, in which meat is no longer eaten after the First Apokreo Sunday, the eighth Sunday before Easter. The Meatfare Saturday precedes the Tyrine (Cheesefare) week, which culminates on Cheesefare Sunday, after which Great Lent begins on Clean Monday.
customs:
  - Koliva — boiled wheat kernels sweetened with honey or sugar, often combined with sesame, nuts, cinnamon, pomegranate seeds, raisins, and other ingredients — is prepared, blessed by the priest with holy water, and consumed communally in memory of the departed.
  - A Panikhida (Memorial Service) is served, typically after Saturday morning's Divine Liturgy or Friday evening's Vespers, following the general order of Matins as a truncated funeral service and concluding with the singing of 'Memory Eternal.'
  - Because memorial services are forbidden from Holy Thursday through Bright Week and on all Sundays throughout the year, the Soul Saturdays serve as the principal occasions for these services.
sections:
  - heading: Koliva
    body:
      - Koliva (Greek kolyva) is the ritual food used to commemorate the deceased. It consists of boiled wheat kernels sweetened with honey or sugar, often combined with sesame seeds, almonds, walnuts, cinnamon, pomegranate seeds, raisins, anise, and parsley. During requiem services the family or friends of the departed prepare the koliva and place it before the memorial table.
      - "The dish embodies theological symbolism: the association between death and life, between the seed planted in the ground and that which emerges, is embedded in the making and eating of koliva. The mixture is shaped into a mound resembling a grave, then covered with powdered sugar bearing the deceased's initials. The practice predates Christianity, deriving from the ancient Greek panspermia (ritual seed mixtures), and passed from pagan to Christian use in Byzantine society. It is traditional across Greece, Cyprus, Serbia, North Macedonia, Bulgaria, Montenegro, Ukraine, Romania, Moldova, Russia, Bosnia-Herzegovina, and among Orthodox Christians of the Middle East, with regional variations in preparation and name."
  - heading: The Panikhida
    body:
      - A Panikhida is the solemn liturgical service for the repose of the departed. The term derives from the Greek mnemosynon (memorial) and the Church Slavonic panikhida, meaning vigil. The service follows the general order of Matins and functions as a truncated funeral service, incorporating psalms, litanies, hymns, the Kontakion of the Departed, and the final singing of 'Memory Eternal.'
      - Participants hold lighted candles throughout, while the deacon censes nearly continuously; near the end the candles are extinguished or placed by the memorial table, symbolizing each soul's eventual surrender. The koliva of boiled wheat is blessed with holy water and distributed afterward.
  - heading: Patristic witness to prayer for the dead
    body:
      - "Compilations of patristic teaching gather the early Church's witness to prayer for the departed: Saint Cyril of Jerusalem on the commemoration of the dead in the Divine Liturgy; Saint Gregory of Nyssa on those who are asleep; Saint John Chrysostom on the benefits of memorials for the dead; and Saint John of Damascus on those who have fallen asleep in faith. Among more recent teachers, Saint Paisios the Athonite and Elder Thaddeus have also written on praying for the departed."
