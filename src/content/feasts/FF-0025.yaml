id: FF-0025
overview:
  - Zacchaeus Sunday is a thematic Sunday of the Orthodox liturgical year that stands at the threshold of the pre-Lenten season, taking its name from the Gospel of Luke 19:1-10, which recounts the chief tax-collector Zacchaeus of Jericho. Too short in stature to see Christ over the crowd, Zacchaeus climbed a sycamore tree; Christ called him down, entered his house, and Zacchaeus responded with joyful repentance, pledging half his goods to the poor and fourfold restitution to any he had defrauded.
  - In Slavic Orthodox usage — Russian, Serbian, and Bulgarian — this Sunday is the last Sunday preceding the formal opening of the Lenten Triodion, occurring one week before the Sunday of the Publican and the Pharisee. It falls on the New (Revised Julian) calendar convention on the Sunday that anchors the beginning of the new Paschal cycle in the Slavic tradition, the earliest of the Sundays that lead toward Great Lent and Pascha. Its date shifts each year with the date of Pascha, from which it is reckoned.
  - "The observance is not universal across the Orthodox world: it is chiefly a feature of Slavic practice, and is not a standard element of Greek Orthodox usage, which begins its pre-Lenten observance directly with the Triodion Sunday of the Publican and Pharisee. Because it precedes the Triodion proper, Zacchaeus Sunday functions as a pre-preparatory step — described as the first sign of the approach of Great Lent, and characterized as at once marginal and essential in the journey that ends at Pascha."
history:
  - The Sunday takes its identity from the fixed appointment of Luke 19:1-10 as its Gospel lesson in the Slavic recension of the lectionary. In the tradition of the Eastern Orthodox and Greek-Catholic Churches of Slavic heritage, the account of Zacchaeus is read on the last Sunday before the liturgical preparation for Great Lent begins, and it is from this reading that the Sunday derives its name.
  - In the Slavic ordering, the new Paschal cycle begins on Zacchaeus Sunday, eleven Sundays before Pascha. The Sunday that follows is devoted to the Publican and the Pharisee, at whose Vespers the Lenten Triodion — the liturgical book used through the services of Great Lent and Holy Week — begins to be used. Zacchaeus Sunday thus stands just outside the Triodion period as a pre-preparatory step, introducing the pre-Lenten arc that continues through the Sundays of the Publican and Pharisee, the Prodigal Son, the Last Judgment, and Forgiveness Sunday.
  - The placement reflects a deliberate pastoral pedagogy. As Fr. Alexander Schmemann explained, the Church recognizes the human inability to change rapidly or to pass abruptly from one spiritual state to another; before the actual disciplines of Lent begin, the faithful are led through a graded series of preparatory Sundays that unfold Lent's meaning through their Gospel lessons. Because the whole sequence is reckoned from Pascha, the calendar position of Zacchaeus Sunday varies from year to year while consistently holding its place as the initial preparatory Sunday, Great Lent itself always beginning on a Monday.
  - "The reading falls on what is counted as the thirty-second Sunday after Pentecost, typically preceding the Triodion season. The choice of the Zacchaeus narrative to inaugurate this arc rests on two exegetical points that later commentators draw out: Christ's call to Zacchaeus to come down from the tree, understood as the divine call to humility; and Zacchaeus's concrete repentance, understood as the recognition of sinfulness with which the Lenten journey must begin."
  - According to hagiographical tradition, Zacchaeus himself later became a disciple of the Apostles and was ordained Bishop of Caesarea in Palestine by the Apostle Peter, serving faithfully in the preaching of the Gospel; his memory is honored in the Orthodox calendar on April 20. The Sunday therefore carries a double resonance, commemorating both the Gospel encounter and a figure venerated in his own right as a saint and bishop.
meaning:
  - "The central theme the Church draws from this Sunday is desire — the longing to see and to approach Christ. Zacchaeus desired the right thing: he wanted to see Jesus, and the desire and effort to see Him is described as the first movement of salvation, the impulse that sets in motion the whole passage through Lent toward Pascha. Without a genuine longing to encounter Christ, the subsequent Lenten disciplines are held to be spiritually fruitless."
  - "Zacchaeus is presented as a model of true repentance that moves beyond verbal confession to concrete restitution. His pledge to give half his possessions to the poor and to repay fourfold anyone he had cheated exceeds the legal requirement, illustrating that repentance must be active rather than merely spoken. His physical shortness and his climbing of the tree carry a metaphorical weight: as those who have sinned and fallen short of the glory of God, the faithful must likewise ascend the ladder of the virtues through spiritual effort in the Lenten preparation."
  - The narrative is read as a portrait of transformation through humble reorientation. The crowd that hindered Zacchaeus is understood as the passions that obstruct the soul's approach to God; his short stature as a want of faith; his climbing of the tree as detachment from earthly concerns; and Christ's journey to Jericho as His willingness to draw near to any sincere penitent. Christ's words, 'Today salvation has come to this house,' stand as the key verse, disclosing the divine mercy that meets such repentance.
  - In a deeper register the Sunday is bound to the Orthodox teaching of theosis, the process by which Christians come to partake of the divine nature. Zacchaeus's initial failure to see Jesus is read as a sign that worldly power and privilege are spiritually ineffective, while his self-marginalization through humility — running, climbing, giving away his wealth in a radical abandonment of social status — brings him into communion with God. The Sunday thus sets the pedagogical tone for the entire pre-Lenten arc, teaching that personal renewal begins with the recognition of sinfulness and issues in the transformation of sinful behavior into virtuous living.
scripture:
  - ref: Luke 19:1-10
    note: The Gospel of Zacchaeus, appointed for this Sunday in the Slavic lectionary and the source of its name; contains Christ's words 'Today salvation has come to this house' (Luke 19:9).
hymnography:
  - "At Sunday Matins the customary resurrectional hymns are sung: when the weekly Tone is 1, 3, 5, or 7, the Troparion of the Resurrection follows the Great Doxology and Trisagion, and after the Great Doxology the resurrectional dismissal hymn 'Today salvation has come to the world' is sung — a phrase that echoes Christ's own declaration to Zacchaeus. These resurrectional themes are heard as parallel to the transformation the Lenten preparation seeks. The distinct hymnody of the Lenten Triodion does not yet enter on this Sunday; the Triodion begins to be used only at the Vespers of the following Sunday of the Publican and the Pharisee."
fastingPractice:
  - Zacchaeus Sunday stands before the Triodion and outside the pre-Lenten fasting structure; it introduces the season thematically rather than imposing any discipline of its own. The graduated relaxations and intensifications of the pre-Lenten weeks belong to the Triodion Sundays that follow, and the practice of any given jurisdiction should be confirmed with one's own parish and priest.
related:
  - name: Zacchaeus the Publican
    note: The chief tax-collector of Jericho whose encounter with Christ (Luke 19:1-10) gives the Sunday its name; by tradition later a disciple of the Apostles and Bishop of Caesarea in Palestine, ordained by the Apostle Peter, commemorated April 20.
customs:
  - Chiefly observed in the Slavic Orthodox traditions — Russian, Serbian, and Bulgarian — as the last Sunday before the opening of the Lenten Triodion; not a standard feature of Greek Orthodox practice.
