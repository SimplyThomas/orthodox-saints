flagReasons:
  - claim: Spirit Monday falls 'fifty days after Pascha', but the anchor places it at P+50. In the traditional liturgical counting (Pascha = Day 1), Pentecost is the 50th day (P+49) and Spirit Monday is the 51st day. Saying Spirit Monday is 'fifty days after Pascha' conflates Spirit Monday with Pentecost itself.
    detail: The anchor assigns Begins=P+50 to this feast; in the traditional count where Pascha is Day 1, P+49 (Pentecost) is the 50th day and P+50 (Spirit Monday) is the 51st day. 'Fifty days after Pascha' describes Pentecost, not Spirit Monday. No dossier external item applies that phrase to Spirit Monday.
  - claim: "The profile quotes or closely paraphrases liturgical text in what appears to be a translated hymn or service-book passage: 'who provides all things, who gushes forth prophecy, perfects the priesthood, and holds together the whole institution of the Church. He is named the Fountain of goodness, through whom the Father is known and the Son is glorified, and the source of life and of sanctification through whom the prophets, Apostles, and martyrs are crowned.'"
    detail: Possible copyrighted liturgical translation (§9). These phrases are rendered in the voice of a translated liturgical text (stichera or troparion). The OCA dossier source quotes the same phrases but does not establish they are public-domain; a modern service-book translation may be in copyright. The profile should describe the hymn themes rather than reproduce the wording.
  - claim: "The profile reproduces the same liturgical phrasing in the hymnography section as well: 'the all-Holy, good, and life-creating one who provides all things, gushes forth prophecy, perfects the priesthood, and holds together the whole institution of the Church.'"
    detail: Possible copyrighted liturgical translation (§9). Reproducing translated liturgical text verbatim in a second section compounds the copyright risk. This should be paraphrased as a description of the hymn's theme, not a reproduction of the translated wording.
