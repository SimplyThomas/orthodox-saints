id: FF-0062
overview:
  - Monday of the Holy Spirit, also called Spirit Monday, is the day immediately following Pentecost Sunday, dedicated to the honor of God the Holy Spirit, the third Person of the Holy Trinity. It commemorates the descent of the Spirit upon the Apostles at Pentecost and forms the first day of the Afterfeast of Pentecost.
  - "In the Eastern Orthodox reckoning, Pentecost unfolds across three days: the first is kept as Trinity Sunday, the second as Spirit Monday, and the third, Tuesday, as the Third Day of the Trinity. Spirit Monday thus gives the Holy Spirit His own day of honor within the wider Pentecost celebration."
  - "The observance falls on the day after Pentecost, fifty days after Pascha. It opens a fast-free week: fasting is not permitted during the Afterfeast of Pentecost, even on the Wednesday and Friday that would ordinarily be fast days. The Leave-taking (Apodosis) of Pentecost follows on the ensuing Saturday."
history:
  - The dedication of the day after a great feast to the person or agent through whom the feast was accomplished is a long-standing liturgical pattern in the Orthodox tradition. Just as the Theotokos is honored on the day after the Nativity of Christ and Saint John the Forerunner on the day after Theophany, so the Holy Spirit is honored on the day after Pentecost, the feast that celebrates His descent upon the Apostles.
  - Early Christianity extended the Pentecost celebration across multiple days. In the Western tradition, Whit Monday was part of Pentecost's octave, an addition made in the seventh century, until the 1969 revision of the Roman Calendar removed it. The Eastern tradition has retained an extended commemorative structure, spending successive days honoring the Persons of the Trinity made manifest through the Pentecost event, so that Trinity Sunday is followed by Spirit Monday and then the Third Day of the Trinity.
  - In its present form, the day carries much of the Pentecost service forward. Many of the same hymns as on the day of Pentecost itself are sung, while a proper Canon of the Holy Spirit is chanted at Compline, and special canons to the Holy Spirit are appointed for Matins. No Vigil is prescribed for the eve of the observance, in contrast to the eve of Pentecost. At Matins the Great Doxology is sung without the Polyeleos. At the Divine Liturgy the Deacon intones the same introit as on Pentecost, and the special entrance verse and dismissal of Pentecost are used, the dismissal being the same as on the feast itself.
  - "The whole week following remains fast-free, and the pattern of naming days from the day after Pentecost extends onward: all the remaining days of the ecclesiastical year, until the preparation for the next Great Lent, are numbered from the Monday after Pentecost."
meaning:
  - The day sets apart the honor of God the Holy Spirit, the all-Holy, good, and life-creating Spirit who descended upon the Apostles at Pentecost and who continues to sanctify the Church. Where Trinity Sunday contemplates the whole revelation of the Godhead, Spirit Monday draws out specifically pneumatological themes, giving the third Person of the Trinity His own day of honor.
  - The liturgical texts describe the Spirit as the one who provides all things, who gushes forth prophecy, perfects the priesthood, and holds together the whole institution of the Church. He is named the Fountain of goodness, through whom the Father is known and the Son is glorified, and the source of life and of sanctification through whom the prophets, Apostles, and martyrs are crowned.
  - "The observance therefore proclaims the Holy Spirit as an active, personal agent in the Church's life rather than an abstract power: the giver of prophecy, the perfecter of holy orders, and the bond that sustains the Church. In honoring the Spirit the day after Pentecost, the Church confesses that the descent of the Spirit was not a single past event but the abiding source of her sanctification."
hymnography:
  - Spirit Monday shares many of its hymns with Pentecost itself. A proper Canon of the Holy Spirit is appointed at Compline, and special canons to the Holy Spirit are chanted at Matins. The Great Doxology is sung at Matins without the Polyeleos, and no Vigil is prescribed for the eve of the day. These texts describe the Spirit as the all-Holy, good, and life-creating one who provides all things, gushes forth prophecy, perfects the priesthood, and holds together the whole institution of the Church.
iconography:
  - The day shares the festal icon of Pentecost. It depicts the Twelve Apostles seated in a semicircle, with the Holy Spirit descending upon them at the top in the form of tongues of fire; in some versions the Theotokos is shown seated in the center among them. At the bottom is an allegorical figure called Kosmos, symbolizing the world, holding scrolls that represent the teaching of the Apostles. In the Orthodox tradition the liturgical color of Pentecost is green, and clergy and faithful carry flowers and green branches during the services.
fastingPractice:
  - The Afterfeast of Pentecost is a fast-free period lasting one week. During it, fasting is not permitted, including on the Wednesday and Friday that would ordinarily be observed as fast days. The Leave-taking of Pentecost falls on the following Saturday. As always, questions of personal fasting practice should be directed to one's own priest.
customs:
  - Churches are often decorated with greenery and flowers for Pentecost and its afterfeast; in the Orthodox tradition the liturgical color is green, and clergy and faithful carry flowers and green branches during the services.
  - "On the night of Pentecost, the Kneeling Prayer service is observed: a Vespers to which are added three sets of long poetical prayers composed by Basil the Great, during which the faithful make full prostrations, resuming the prostrations that had been set aside from Pascha until this point."
sections:
  - heading: Place in the liturgical year
    body:
      - All of the remaining days of the ecclesiastical year, until the preparation for the next Great Lent, are named for the day after Pentecost on which they occur, so that Spirit Monday marks a reference point for the numbering of the weeks that follow. In Orthodox theology, Pentecost is not considered the birthday of the Church; the Church is understood to have existed before the creation of the world.
