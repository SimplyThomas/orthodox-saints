hymnography:
  - Most of the hymns of the week are concerned with the birth of the Savior, teaching that Christ is born on earth to crush the power of evil and to enlighten humanity. The Troparion in the Second Tone highlights how faith justified the forefathers and, through them, prepared the Church drawn from the Gentile nations. The Kontakion invokes the faithfulness of the forefathers during their trials, drawing a parallel to the Three Youths who refused to worship graven images and were preserved in the furnace, prefiguring divine deliverance. The hymns of the period call the faithful to celebrate the Nativity of Christ and to prepare to meet Him with pure conduct.
sections:
  - heading: The genealogy of Christ
    body:
      - "The Gospel of Matthew organizes the lineage of Jesus into three sets of fourteen generations: from Abraham to David, from David to the Babylonian Exile, and from the Exile to Christ. The number fourteen carries symbolic weight, being twice seven and matching the numerical value of the name David."
      - "The first group, from Abraham to David, includes Abraham, Isaac, Jacob, and Judah, and notably names four women: Tamar, Rahab, Ruth, and Bathsheba. The second group traces the Davidic royal line through Solomon and the kings of Judah. The third group, from the Exile to Jesus, ends with Joseph and Mary, and then Jesus. In this way the genealogy establishes Jesus as the Messiah through descent from David and Abraham, fulfilling the messianic expectation and affirming His royal credentials as Israel's expected king."
  - heading: Relation to the Sunday of the Forefathers
    body:
      - The Sunday of the Holy Forefathers, observed one week earlier in the window of December 11 through 17, commemorates the ancestors who lived before the Law and under the Law, including Adam, Abraham, Sarah, Isaac, Jacob, Elias, Daniel, Zechariah, Joachim and Anna, John the Baptist, and the Theotokos. Its readings are the Epistle from Colossians and the Gospel from Luke on the parable of the great supper.
      - The Sunday of the Holy Fathers, falling immediately before Christmas, expands the commemoration to all the righteous from creation to Saint Joseph, and carries an even fuller service. Figures unique to this closer Sunday include the later ancestors and descendants standing directly in the line leading to the Nativity.
