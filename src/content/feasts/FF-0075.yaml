id: FF-0075
overview:
  - The Sunday of the Holy Fathers before the Nativity is the last Sunday preceding the feast of the Nativity of Christ, falling in the calendar window of December 18 through 24. It commemorates all the righteous men and women who were well-pleasing to God from the creation of the world onward, gathering the ancestors, patriarchs, prophets, and other holy figures who prepared for and foretold the coming of the Savior.
  - Together with the Sunday of the Holy Forefathers, which falls one week earlier (December 11 through 17), it forms a pair of preparatory commemorations that lead the faithful into the Nativity by way of the history of salvation. Whereas the earlier Sunday remembers the ancestors who lived before the Law and under the Law, this closer Sunday broadens the scope to embrace all the righteous from Adam up to the righteous Joseph, the betrothed of the Theotokos.
  - The commemoration is marked by an even fuller service than the preceding Sunday, and its Gospel reading is the genealogy of Christ, tracing the human lineage through which the Son of God entered the world. As the final Sunday before the great feast, it stands as the culminating liturgical preparation for the celebration of the Incarnation.
history:
  - The Sunday of the Holy Fathers developed within the Church's cycle of preparation for the Nativity, alongside the Sunday of the Holy Forefathers observed one week earlier. The two Sundays together honor the Old Testament saints from whose human family, according to the flesh, came the Lord Jesus Christ, and they served to orient the faithful toward Christmas through remembrance of the whole span of salvation history.
  - The services of the week surrounding this Sunday came to glorify a wide company of the righteous. Across the two preparatory Sundays more than one hundred figures are honored, encompassing patriarchs, matriarchs, prophets, kings, and righteous women. Among those specifically highlighted are Abraham, Isaac, Jacob, the Three Youths Shadrach, Meshach, and Abednego, and the Prophet Daniel, who were remembered for foretelling the birth of Christ from a virgin and for exemplifying faith through trials.
  - "The scope of the closer Sunday was defined more broadly than that of the Forefathers: it commemorates all of the righteous men and women who pleased God from the creation of the world up to Saint Joseph. The Orthodox tradition preserves a genealogical chain of these ancestors beginning with Adam and Eve, the first-created, and continuing through the righteous Abel, Seth, Enos, Kenan, Mehaliel, Jared, and onward through the generations."
  - "The observance also acquired particular rubrical rules for the years in which it coincides with the eve of the feast. When this Sunday falls on December 24 itself, special provisions apply: because seven troparia follow the two for the Resurrection, the Canon of the Resurrection is not sung. Notable homilies on this Sunday and the surrounding liturgical period were preached in later centuries, among them those of Saint John of Kronstadt."
meaning:
  - Through this Sunday the Church teaches the continuity of God's covenant faithfulness across every generation from creation to the Incarnation. By commemorating all the righteous from Adam onward, the celebration proclaims that the coming of Christ was not an isolated event but the fulfillment of a long history of divine promise and human expectation, gathering into one the whole line of those who prepared for and foretold His birth.
  - The genealogy read on this day presents Christ as the awaited Messiah descended from David and Abraham. Abraham receives particular emphasis as the recipient of God's covenant promise that in his seed all the nations of the earth would be blessed. The binding of Isaac is understood as a prefiguration of Christ the sacrificial offering, and Jacob's vision of the ladder is read as a symbol of the Mother of God, who united earth to Heaven.
  - The faith of the forefathers during their trials is set forth as the pattern of trust in God. The Three Youths, who refused to worship a graven image and were preserved unharmed in the furnace, are held up as figures of divine deliverance and as a foreshadowing of the salvation brought by Christ. The hymns of the period teach that Christ is born on earth to crush the power of evil and to enlighten humanity, binding together the Old Testament ancestry with the redemptive purpose of the Incarnation.
