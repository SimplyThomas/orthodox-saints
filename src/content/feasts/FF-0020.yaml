celebration:
  intro: Ways to keep the strict-fast day of the Beheading of St John the Baptist with children.
  ideas:
    - idea: Keep the strict fast as a household, adapting gently for young children so the day's solemnity is felt without imposing adult fasting.
    - idea: Serve simple bowl foods — soup, lentils, rice and beans — a plain fasting meal that helps children sense the day is set apart.
    - idea: Bake "locust and honey" crescent rolls with the kids, tied to St John's wilderness diet.
    - idea: Read the Gospel account (Mark 6) and tell children about St John beforehand, preparing them with the story.
    - idea: Color a St John the Forerunner page at the icon corner and talk about his courage and humility.
    - idea: Sing the troparion and pray to St John at the family icon corner.
