hymnography:
  - The season's most distinctive hymnographic monument is the Great Canon of St Andrew of Crete, the longest canon of the church year, comprising nine odes woven densely from scriptural images of repentance. It is read in portions during the first week of the fast and in its entirety at Matins of the Fifth Week, an observance commonly called the Thursday of the Great Canon.
  - The hymnody of the Triodion, the service book proper to the season, governs both the pre-Lenten Sundays and the weeks of the fast, giving each Sunday and week its own penitential and preparatory themes.
fastingPractice:
  - Great Lent is kept as the most demanding fast of the year, observed as a graded discipline rather than a single uniform rule. The fast sets aside meat, fish, eggs, and dairy, together with wine and oil, for the duration of the season.
  - "Within that general shape the tradition allows customary relaxations: wine and oil are permitted on Saturdays and Sundays and on certain feasts, and fish is permitted on Palm Sunday and on the Annunciation when it falls within the fast. The exact keeping of the fast varies by day, by local typikon, and by pastoral counsel, and the faithful are directed to keep it according to their strength under the guidance of their priest."
customs:
  - Forgiveness (Cheesefare) Vespers on the eve of Clean Monday opens the fast with the ceremony of mutual forgiveness, in which the faithful ask pardon of one another.
  - The Liturgy of the Presanctified Gifts is served on Lenten weekdays, especially Wednesdays and Fridays, since the full eucharistic Divine Liturgy is not celebrated on the weekdays of the fast; the faithful commune from Gifts consecrated the preceding Sunday.
  - The Saturdays of the Dead (Soul Saturdays) commemorate the departed, kept with kolyva.
  - "Each Sunday of the fast carries its own commemoration: the Sunday of Orthodoxy, St Gregory Palamas, the Veneration of the Cross, St John Climacus, and St Mary of Egypt."
sections:
  - heading: The Triodion and the pre-Lenten Sundays
    body:
      - "Before the fast itself, the Church keeps a preparatory cycle drawn from the Triodion: the Sundays of the Publican and the Pharisee and of the Prodigal Son, followed by Meatfare and Cheesefare weeks, which gradually withdraw the faithful from rich foods and set the tone of humility and return that the fast will deepen."
