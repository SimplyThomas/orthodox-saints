id: FF-0014
overview:
  - Great Lent is the chief penitential season of the Eastern Orthodox year, the most demanding fast of the calendar and the Church's principal period of preparation for Pascha. It is often called a springtime of the soul, a spiritual workshop in which the faithful intensify prayer, almsgiving, and fasting in imitation of Christ's forty days in the wilderness.
  - The Forty Days proper begin on Clean Monday, the Monday following Forgiveness (Cheesefare) Sunday, and run continuously to the Friday before Lazarus Saturday. In the Eastern reckoning the Sundays are counted within the forty days, while Lazarus Saturday, Palm Sunday, and Holy Week fall outside the count and are kept as their own observances; fasting nonetheless continues through Holy Week to Pascha itself.
  - The season does not stand alone. It is opened by the pre-Lenten Sundays of the Triodion, which ease the faithful toward the fast, and it is structured internally by a series of themed Sundays and by distinctive weekday services found at no other time of the year.
history:
  - "The forty-day Lenten fast was not part of apostolic practice or the first three centuries. St Irenaeus, writing around 190, records that Christians before Easter kept fasts of widely differing lengths: some for a single day, some for two, some for several, and others reckoning a period of forty hours. Tertullian in the early third century likewise knew only a short paschal fast, not a period of forty days."
  - The Church's memory of the season's origin links it closely to the baptismal catechumenate. Having established Easter as the solemn day of Baptism, the early Church subjected candidates, the catechumens, to an intensive period of spiritual training and fasting in preparation for their illumination. Their sponsors, relatives, and friends gradually joined them in this discipline, so that a fast begun for those approaching the font came in time to involve the whole body of the faithful. Whereas the earlier fast was a brief paschal observance, the lengthening forty-day fast was bound up particularly with this final preparation of the catechumens for Baptism.
  - The first official mention of the term Tessarakoste, Greek for fortieth, appears in the fifth canon of the First Ecumenical Council at Nicaea in 325, where it is spoken of as something already familiar rather than a novelty introduced by the council. By 331 St Athanasius enjoined forty days of fasting before the stricter fast of Holy Week, and in 339, after travelling through Rome and Europe, he urged the Alexandrians to keep it as a practice observed everywhere. The Synod of Laodicea, about 360, imposed the obligation of fasting through the forty days before Easter. By the end of the fourth century the Great Fast, called Tessarakoste by the Greeks and Quadragesima by the Latins, was generally observed throughout the Church.
  - The precise way of counting the forty days varied from place to place. Some regions kept a six-week span and others an eight-week arrangement, as at Jerusalem, with localities exempting Saturdays or Sundays differently in order to arrive at exactly forty actual days of fasting. The Eastern practice that took hold counts the Sundays within the forty days and treats Holy Week as a distinct, more rigorous observance beyond them.
meaning:
  - Great Lent teaches that repentance is not a season of gloom but of purification and joy. The Orthodox tradition presents the fast as a return and a renewal rather than a mere ordeal, insisting that it is not a time of morbidity but a time of joyfulness in which the soul is cleansed and turned back toward God.
  - The Eastern understanding of the fast places its accent less exclusively on penance for sin than on the recovery of humanity's original state. Through the disciplines of the season the Christian is drawn to become, by grace, more godlike, participating more deeply in the life of Christ. Asceticism is offered to each of the faithful according to their own strength, so that the fast is a shared labor of the whole Church and not the work of monastics alone.
  - The season rests on three inseparable practices, prayer, fasting, and almsgiving, held together and oriented toward repentance and the renewal of love for God and neighbor. The forty days are patterned on the great fasts of Scripture, Moses receiving the commandments, Elijah journeying to Horeb, and above all Christ's forty days in the wilderness, so that the faithful walk with Christ toward His Passion and share, at its end, in the joy of His Resurrection.
