    body: St Irenaeus records Christians keeping fasts of varying length before Easter, from a single day to a period of forty hours, with no fixed forty-day season.
  - when: "325"
    title: First mention of Tessarakoste
    body: The fifth canon of the First Council of Nicaea uses the term Tessarakoste, the Forty Days, as an already-familiar observance.
  - when: 331 and 339
    title: St Athanasius commends the forty days
    body: Athanasius enjoins forty days of fasting before Holy Week and later urges the Alexandrians to keep it as universally practiced.
  - when: c. 360
    title: Synod of Laodicea
    body: The synod imposes the obligation of fasting through the forty days before Easter.
  - when: End of the 4th century
