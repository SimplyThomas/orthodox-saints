flagReasons:
  - claim: The Troparion (Tone 8) honors the relic as pertaining to her 'most honored body, which remained incorrupt through her seedless childbearing' and describes the Theotokos as the one 'through whom time and nature are renewed', asking peace for her people and great mercy for souls.
    detail: Possible copyrighted liturgical translation (§9). The OCA external source quotes the Troparion as 'physical relics of your most honored body which remained incorrupt throughout your seedless childbearing' and 'through you time and nature are renewed' — these are close renderings of the troparion text, and the profile's phrasing, while described as hymn theme, closely follows the quoted liturgical translation verbatim enough to risk reproducing copyrighted text. The profile presents these as descriptions of what the Troparion says using language nearly identical to the source translation.
  - claim: The Kontakion (Tone 4) frames the event as 'the enshrinement of the precious sash' and acclaims the Virgin as 'the boast of all Christians'.
    detail: Possible copyrighted liturgical translation (§9). The OCA external source quotes the Kontakion as 'the enshrinement of your precious sash' and describes the Virgin as 'boast of all Christians.' The profile's phrasing closely mirrors the specific wording of the OCA's liturgical translation rather than merely describing the hymn's theme.
  - claim: The profile describes the Empress Zoe associated with embroidering the relic as having dates '978–1050 in one tradition' in the sections body.
    detail: "The dossier anchor and the Wikipedia external source both identify the Empress Zoe who embroidered the cincture as the wife of Emperor Leo VI who died in 899 — not a different Empress Zoe with dates 978–1050 (who would be the wife of Constantine VIII and mother-in-law of emperors, a much later figure). The profile inconsistently gives two different identifications of Empress Zoe: in the history section it correctly states 'Empress Zoe (died 899), wife of Emperor Leo VI,' but in the 'relic today' section it states 'embroidered in gold by the Byzantine Empress Zoe (978–1050 in one tradition),' which would be a different Empress Zoe. The Girdle of Thomas Wikipedia article also mentions 'Byzantine Empress Zoe (978–1050),' creating an apparent conflict between sources, but the anchor's source (the Wikipedia Cincture article) clearly attributes this to the Zoe who died 899. Presenting the later dates as a valid alternative 'tradition' while the anchor is clear is unsupported."
