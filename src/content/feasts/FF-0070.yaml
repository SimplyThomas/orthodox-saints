hymnography:
  - The hymns of the feast celebrate the enshrinement of the Virgin's precious sash. The Troparion (Tone 8) honors the relic as pertaining to her most honored body, which remained incorrupt through her seedless childbearing, and describes the Theotokos as the one through whom time and nature are renewed, asking peace for her people and great mercy for souls. The Kontakion (Tone 4) frames the event as the enshrinement of the precious sash and acclaims the Virgin as the boast of all Christians. These texts are described here in their sense; the Church's liturgical service provides the full hymnody for the day.
iconography:
  - The festal image depicts the deposition of the cincture — its ceremonial placing in its shrine — with the relic itself, kept at Vatopedi in a silver reliquary, as the focus of veneration. Icons of the feast center on the Theotokos and the honored sash that tradition holds she wove of camel hair and gave to the Apostle Thomas.
customs:
  - At Vatopedi Monastery on Mount Athos, where a portion of the sash is kept, blessed ribbons touched to the relic are given to pilgrims; these are sought especially by the childless.
  - When the relic travels for public veneration, as at Belgrade in 2026, pilgrims receive small blessed strips of cloth that have been in contact with the cincture.
sections:
  - heading: The relic today
    body:
      - The cincture — also called the zone, belt, sash, or girdle — is housed at Vatopedi Monastery on Mount Athos, where it is held to be the actual belt the Theotokos wore on earth and gave to the Apostle Thomas after her Dormition. It is described as made of camel hair and embroidered in gold by the Byzantine Empress Zoe (978–1050 in one tradition), and it was long kept in the Church of St. Mary of Blachernae in Constantinople before its translation to Athos.
      - "The relic exists in three portions: the principal part at Vatopedi, a part gifted by the Serbian ruler Lazar Hrebeljanović and stored in the altar of the monastery's main church, and a third held since 1522 by a monastery on Mount Othrys in Magnesia."
