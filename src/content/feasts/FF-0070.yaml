id: FF-0070
overview:
  - The Deposition of the Precious Cincture of the Most Holy Theotokos, observed on August 31, commemorates the enshrinement in Constantinople of the cincture — the sash, belt, or girdle — traditionally held to have belonged to the Virgin Mary. The feast falls on the final day of the Orthodox liturgical year, on the eve of the Indiction (September 1), so that the Church year both opens and closes under the protection of the Theotokos.
  - The relic itself is a portion of which is today kept at the Great Monastery of Vatopedi on Mount Athos, where it is venerated for many reported healings. According to Orthodox tradition, the sash was handmade by the Virgin Mary from camel hair, and it is honored as a tangible legacy left by the Mother of God to the Church.
  - Together with the Robe of the Virgin, the cincture was among the great Marian relics that Constantinople gathered and enshrined, making the imperial city a center of devotion to the Theotokos. The August 31 commemoration marks the deposition — the ceremonial placing of the relic in its shrine — rather than a single event in Mary's earthly life.
history:
  - Orthodox tradition connects the cincture to the Dormition of the Theotokos. It holds that when the Virgin Mary underwent her Dormition, the Twelve Apostles buried her in Jerusalem; three days later the Apostle Thomas, who had arrived late, requested a final viewing, and when the apostles opened the tomb her body was found to be absent. According to this tradition the Virgin then appeared and gave her belt to the Apostle Thomas — the same tradition that in the Western church is known as the Girdle of Thomas, understood as physical evidence of her Assumption.
  - The relic's documented history begins in the fifth century, when it was translated from Jerusalem to Constantinople together with the Robe of the Virgin Mary and placed in the Church of St. Mary at Blachernae. In the ninth century the Empress Zoe (died 899), wife of Emperor Leo VI, embroidered the relic with gold thread in gratitude for a miraculous cure — an act preserved in the tradition of the sash's later ornamentation.
  - The official feast day was established in the twelfth century by Emperor Manuel I Komnenos (1143–1180), who fixed the commemoration of the cincture on August 31. In the following century the Emperor John VI Kantakouzenos (reigned 1347–1355) donated the cincture to the Holy Great Monastery of Vatopedi on Mount Athos, where it remains, kept in a silver reliquary.
  - Over time the relic was divided into three parts. One part remains at Vatopedi; another, gifted by the Serbian ruler Lazar Hrebeljanović, is stored in the altar of the monastery's main church; and a third portion has been held since 1522 by a monastery on Mount Othrys in Magnesia, Greece.
  - The cincture has continued to draw large-scale veneration in modern times. In autumn 2011 it was brought to Russia for public veneration, attracting some 200,000 pilgrims in St. Petersburg and approximately 150,000 in Yekaterinburg. In May and June of 2026 it was displayed at the Cathedral of Saint Sava in Belgrade, drawing tens of thousands of pilgrims daily, who received small blessed strips of cloth that had been in contact with the relic.
meaning:
  - The feast honors the cincture as a physical relic understood to have remained connected to the Theotokos through her seedless childbearing and incorrupt Dormition. In venerating the sash, the Church confesses that the Virgin's body was sanctified and glorified, and that material things touched by holiness can become channels of grace and healing.
  - The liturgical texts of the feast present the cincture as a source of spiritual renewal. The Church remembers the Theotokos as the one through whom time and nature are renewed, and the feast petitions, through her, for peace to her people and great mercy for souls. The relic is thus not venerated for itself but as a pledge of the Virgin's continuing intercession.
  - "The placement of the feast on the last day of the liturgical year gives it added significance: the Church year closes under the Theotokos, the boast of all Christians, just as the new year on September 1 opens under her protection. The cincture stands as an enduring sign of the bond between the Mother of God and the faithful who seek her aid."
