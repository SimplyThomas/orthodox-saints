hymnography:
  - The Hymn of Kassiani is the day's musical and spiritual highpoint, chanted each year as a doxastichon at the end of the aposticha of orthros and among the lamp-lighting psalms of the Presanctified Liturgy. Written from the perspective of the sinful woman, it addresses penitence and redemption; sung slowly, sorrowfully, and at length, it can last upwards of twenty minutes and is described as moving worshippers to prayerful tears. Demanding a very wide vocal range, it is regarded as one of the most difficult pieces of solo Byzantine chant, often delivered in unison over a vocal bass drone.
  - The day's other hymns hold together its two great themes. The Troparion (Tone 8) sets forth the image of the Bridegroom coming at midnight and the call to spiritual watchfulness, while the Kontakion (Tone 4) turns to repentance and forgiveness, invoking the penitent woman as a figure of contrition and asking remission of sins.
fastingPractice:
  - The commemoration of the betrayal by Judas on this day is understood as the origin of the wider Orthodox practice of fasting on Wednesdays throughout the year, keeping the memory of that moment present across the calendar rather than only within Holy Week.
  - "The Sacrament of Holy Unction celebrated on this evening is closely tied to the following day's Communion: those who receive unction on Great and Holy Wednesday are encouraged to go to Holy Communion on Great Thursday, and recipients typically make confession beforehand. The mystery is administered only to Orthodox Christians. Practice varies by tradition, and the site's disclaimer applies."
customs:
  - In the Greek tradition, the Sacrament of Holy Unction is celebrated on the evening of Great and Holy Wednesday, when all the faithful are anointed with blessed oil for the healing of soul and body.
  - The full form of the service calls for the ministry of seven priests, with seven Epistle readings, seven Gospel readings, seven prayers, and seven litanies; the faithful are anointed with the sign of the cross on the forehead, cheeks, chin, lips, and hands.
  - In the Ecumenical Patriarchate, the Ecumenical Patriarch sanctifies Holy Myrrh on this day, completing a process begun on Holy Monday.
