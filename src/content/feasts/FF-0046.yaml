id: FF-0046
overview:
  - "Great and Holy Wednesday is the third day of Holy Week in the Eastern Orthodox Church, observed on the Wednesday before Pascha (the anchor date P-4). It is one of the observances of the Lord that fill the final week before the Passion, and its liturgical focus rests on a deliberate contrast between two figures: the sinful woman who anointed Christ's feet with costly myrrh and her tears, and Judas Iscariot, who on this day went to the chief priests to arrange the betrayal of the Lord for silver."
  - "The day belongs to the sequence of the Bridegroom services, the Matins form used on the first three days of Holy Week, and it is marked in the Greek tradition by two distinctive observances: the singing of the Hymn of Kassiani, composed from the perspective of the penitent woman, and, on the same evening, the celebration of the Sacrament of Holy Unction, at which the faithful are anointed for the healing of soul and body."
  - "The commemoration also underlies a year-round discipline: the Orthodox practice of fasting on Wednesdays throughout the year is traced to the betrayal of Judas remembered on this day, keeping the memory of that moment present across the whole calendar."
history:
  - The synaxarion tradition explains the placement of the commemoration by noting that the Divine Fathers decreed that the harlot who anointed the Lord with myrrh should be remembered on this day because the anointing took place shortly before Christ's saving Passion. The day's services thus gather the events of the days immediately preceding the crucifixion into a single liturgical focus.
  - The observance took its enduring musical and poetic form through the Hymn of Kassiani, attributed by tradition to Kassia (also spelled Kasiani or Kassiani), a ninth-century hymnographer and abbess. A legendary account relates that the Emperor Theophilos visited her monastery in his later years and found her unfinished composition on her writing table; the line associating the penitent woman with the feet whose sound Eve heard at dusk in Paradise is linked to that encounter, after which Kassia is said to have completed the work.
  - The services of the day developed in a fixed pattern. Vespers, which may include the Presanctified Liturgy, carries readings that reference the sufferings of Moses and Job, with Gospel passages on parables of the Second Coming; Matins follows the Bridegroom Service format shared by the first three days of Holy Week. The Hymn of Kassiani is chanted as a doxastichon at the end of the aposticha of orthros and among the lamp-lighting psalms of the Presanctified Liturgy.
  - In the Greek tradition, and spreading elsewhere, the Sacrament of Holy Unction came to be celebrated on the evening of Great and Holy Wednesday, so that the whole body of the faithful might be anointed. In the Ecumenical Patriarchate the day also completes the sanctification of Holy Myrrh, a multi-day process begun on Holy Monday, when the Ecumenical Patriarch sanctifies the Myrrh.
meaning:
  - "The theological heart of the day lies in the juxtaposition the liturgy sets before the worshipper: the unnamed woman who demonstrates repentance and devotion by anointing Christ's feet, and Judas who at the same moment plots betrayal for financial gain. The contrast between genuine spiritual transformation and treacherous self-interest is presented as the choice set before every soul."
  - The commemoration of the sinful woman is read as an image of transformation through contrition and love. The hymnography and homilies of the day stress tears of repentance, forgiveness, and the soul's journey toward salvation through sincere spiritual renewal, holding out the possibility of divine mercy to the penitent.
  - "A second emphasis runs alongside repentance: vigilance. The central image of the day's hymns is the Bridegroom coming at midnight, calling believers to spiritual watchfulness and preparedness rather than to be weighed down with sleep. The liturgical texts thus present Great and Holy Wednesday as a day of spiritual awakening, joining the acknowledgment of human sinfulness to readiness for Christ's coming."
  - "The Sacrament of Holy Unction observed on this evening draws its meaning from the same Gospel narrative: as the sinful woman's sins were forgiven because of her penitence, so the faithful are moved to repent and receive anointing that is understood to bring healing of both soul and body together with forgiveness of sin."
