iconography:
  - Eastern Orthodox icons of the feast typically depict three of the Marys at the center, flanked by two angels, with the Holy Sepulchre in the foreground together with the winding sheet and the napkin left behind. Mary Magdalene also appears prominently in individual icons as a myrrhbearer. Among the notable historical depictions are the 'White Angel' fresco of the Mileševa monastery (about 1235) and an eighteenth-century Russian icon from Kizhi.
hymnography:
  - The Sunday repeats several hymns proper to Holy Saturday. Foremost is the Troparion beginning 'The noble Joseph…', which recalls Joseph of Arimathea taking down the body of Christ and laying it in the tomb, and to which a line commemorating the Resurrection is added for the Paschal season. The Doxastikon 'Joseph together with Nicodemus…' is likewise sung. During the following Week of the Myrrhbearers the Troparion is repeated daily at the Canonical Hours and the Divine Liturgy, and the Doxastikon is sung at Vespers on Wednesday and Friday evenings.
  - Throughout the Sundays of Pascha a special hymn called the Hypakoë is chanted at Matins and the Midnight Office. The term is connected with the sense of being sent, referring to the myrrhbearing women who were sent to announce the Resurrection to the Apostles. Numerous further hymns of the Octoechos and the Pentecostarion celebrate the roles of these figures in the accounts of the Passion and the Resurrection.
customs:
  - In many places the day is kept as a day of honor for Orthodox women.
  - Several Orthodox cathedrals and churches bear the name of the Myrrhbearers and keep this Sunday as their patronal feast.
