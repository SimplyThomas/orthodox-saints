id: FF-0054
overview:
  - The Sunday of the Myrrhbearing Women is the third Sunday of Pascha in the Eastern Orthodox and Greek Catholic Churches, falling two weeks after the feast of the Resurrection. It commemorates the women who came at dawn on the first day of the week bearing myrrh to anoint the body of the Lord and instead became the first to learn that He had risen. Alongside the women the day honors the righteous Joseph of Arimathea and Nicodemus, who took the body of Christ down from the Cross and buried it.
  - The commemoration gathers the figures who remained close to Christ through His burial and were the earliest witnesses to the empty tomb. Tradition lists among the myrrhbearers Mary Magdalene, Mary the mother of James and Joses, Mary the wife of Cleopas, Martha and Mary of Bethany, Joanna the wife of Chuza (a steward of Herod Antipas), Salome the mother of James and John, Susanna, and other unnamed women. Because they were sent to carry the news of the Resurrection to the Apostles, the Church remembers them as, in effect, the apostles to the Apostles.
  - The Sunday opens a week likewise named for the Myrrhbearers, during which its principal hymns are repeated at the services. As a Sunday within the Paschal season it carries both the joy of the Resurrection and the memory of the burial that preceded it, joining the noble ministry of Joseph and Nicodemus to the faithfulness of the women at the tomb.
history:
  - The commemoration is rooted in the Gospel accounts of the burial of Christ and the discovery of the empty tomb, which appear across all four Gospels (Matthew 27:55–61 and 28:1–10; Mark 15:40–16:11; Luke 23:50–24:10; John 19:38–20:18). The women had followed Jesus during His earthly ministry in Galilee, providing for Him and His followers out of their own means, and they remained faithful through the most dangerous hours of His arrest and execution, standing by the Cross and accompanying Him to His burial.
  - Joseph of Arimathea, described in the Gospels as a disciple of Jesus but secretly, obtained the Lord's body from Pontius Pilate and laid it in his own new tomb. Nicodemus, a Pharisee who had first come to Jesus by night, later assisted Joseph in preparing the body with myrrh and aloes before burial. Their acts of burial are joined on this Sunday to the women's return at dawn, when they found the tomb empty and were commissioned to announce the Resurrection to the Apostles.
  - The day acquired its own liturgical shape within the Pentecostarion, the book of the Paschal season. Certain hymns proper to Holy Saturday are repeated on this Sunday, among them the Troparion beginning 'The noble Joseph…', to which a line commemorating the Resurrection is added, and the Doxastikon 'Joseph together with Nicodemus…'. The following week is designated the Week of the Myrrhbearers, during which the Troparion is repeated daily at the Canonical Hours and the Divine Liturgy, and the Doxastikon is sung at Vespers on Wednesday and Friday evenings.
  - "Many of the individual myrrhbearers also hold their own feast days in the Menaion, the Church's fixed liturgical calendar, so that the Sunday gathers into a single Paschal observance figures who are also honored separately through the year. The commemoration has continued to draw wider recognition: in 2022 the Episcopal Church added Joanna, Mary, and Salome as the myrrhbearing women to its own calendar with a feast day on August 3."
meaning:
  - The Sunday sets before the Church the faithfulness of those who did not abandon Christ in His death. The women came to the tomb to perform a work of love — the anointing of a body they believed to be dead — and their devotion, offered without expectation of the Resurrection, became the occasion of their being the first to receive its news. Their faithfulness through the danger of the Passion is held up as the pattern by which love precedes and prepares for the encounter with the risen Lord.
  - The women were commissioned as witnesses, sent to announce the Resurrection to the Apostles, and so the Church remembers them as the apostles to the Apostles. For this reason the myrrhbearers, and especially Mary Magdalene, are sometimes called equal to the Apostles. That women were the first witnesses of the empty tomb has been understood as underscoring the truthfulness of the testimony, since such witnesses ran counter to the expectations of the surrounding culture; the Gospel writers repeatedly make the women the subject of verbs of seeing, presenting them plainly as eyewitnesses.
  - In Joseph of Arimathea and Nicodemus the day honors a discipleship that had been secret and became bold at the hour of the Cross. Both had followed Jesus quietly, and both stepped forward to claim and bury His body when His public disciples had scattered — an act of courage and reverence that the Church joins to the women's ministry as together forming the human care given to the Lord between His death and His rising.
