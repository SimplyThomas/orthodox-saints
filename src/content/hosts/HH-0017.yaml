overview:
  - Archangel Jeremiel (also rendered Jerahmeel, Jeremiil, Ieremiil, Remiel, or Ramiel in various manuscript traditions) is one of the principal archangels commemorated in portions of Orthodox liturgical tradition. Among the traditional seven or eight archangels of Byzantine and Slavic Christianity, Jeremiel holds a distinctive place as the angel associated with divine mercy, spiritual reflection, repentance, eschatological hope, and the contemplation of God’s judgments.
  - Unlike Michael, Gabriel, and Raphael he is not named in the canonical books of the Old or New Testaments. His principal literary appearance is in 2 Esdras (known in many academic editions as 4 Ezra), an important Jewish apocalyptic work that circulated widely among early Christians. Although 2 Esdras is not universally regarded as canonical throughout the Orthodox world, it exercised a significant influence on Christian angelology and eschatological thought.
  - "The name Jeremiel is generally interpreted as “Mercy of God,” “God’s compassion,” or “one whom God exalts.” These meanings shaped his later Christian role: in the Orthodox liturgical and iconographic traditions Jeremiel came to symbolize the divine call to repentance, reflection upon one’s life, preparation for judgment, and hope in God’s mercy."
  - His primary textual source is 2 Esdras, where he appears among the exalted angels standing before God. In 2 Esdras 4:36 the prophet hears that “Jeremiel the archangel” is among those who answer concerning the souls of the righteous — a brief but significant reference that became the foundation of his later place in Christian angelology.
  - Orthodox theology carefully distinguishes canonical revelation from later tradition. Because Jeremiel is not named in canonical Scripture, the teachings concerning him do not carry the authority of those regarding Michael, Gabriel, or Raphael; yet the Church preserves his memory through liturgical commemoration and iconography as part of the broader tradition of the heavenly hosts.
  - Over time the Byzantine and especially the Slavic traditions expanded his role, associating him with spiritual self-examination, the remembrance of God’s mercy, reflection upon one’s actions, and preparation for the judgment to come. In some iconographic programs he is shown holding scales, a scroll, or the symbols of contemplation and judgment.
  - Where Michael represents spiritual warfare, Gabriel revelation, Raphael healing, Selaphiel prayer, Jegudiel faithful labor, and Barachiel blessing, Jeremiel is associated with repentance, discernment, and the contemplation of eternal realities — associations that developed chiefly through liturgical and theological reflection rather than biblical narrative.
  - The Orthodox Church understands Jeremiel, like all the angels, as a created spiritual being who serves God — neither worshiped nor possessing independent authority, but commemorated as one of the heavenly ministers who share in God’s providential governance and His care for humanity.
  - Today Jeremiel remains part of the traditional archangelic cycle in many Orthodox jurisdictions, continuing to serve as a symbolic representation of repentance, divine mercy, and preparation for the life to come.
orthodoxInterpretation:
  - St. Basil the Great discusses the angels as ministers of the divine providence, though he does not name Jeremiel.
  - St. Gregory the Theologian emphasizes God’s mercy and the angelic share in the divine governance — themes later associated with Jeremiel.
  - St. John Chrysostom frequently addresses repentance and judgment, without discussing Jeremiel by name.
  - St. Dionysius the Areopagite presents the angels as transmitters of the divine illumination and knowledge, the framework later applied to Jeremiel’s role.
  - St. John of Damascus teaches that the angels are ministers of God’s will who share in the administration of His providence. No major patristic writer treats Jeremiel in detail; most of the traditions concerning him emerge from the later Byzantine and Slavic developments.
liturgicalTradition:
  - Jeremiel is commemorated with all the bodiless powers at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8, often numbered as the eighth among Michael, Gabriel, Raphael, Uriel, Selaphiel, Jegudiel, and Barachiel.
  - He appears in the Menaion, Synaxarion, Horologion, and the services honoring the bodiless powers, where the recurring themes are mercy, repentance, reflection, judgment, and preparation for eternity.
iconography:
  - Jeremiel is usually depicted as a youthful winged angel in Byzantine ceremonial garments, holding a scroll and often carrying scales or a book.
  - "His symbols express his role: the SCROLL represents wisdom and reflection; the SCALES, discernment and judgment; and the BOOK, the knowledge of human deeds and the divine wisdom. His colors are blue, white, gold, and green."
  - His iconography developed chiefly through the Slavic and Byzantine depictions of the seven (or eight) archangels.
historicalInfluence:
  - Jeremiel’s influence originates largely from the circulation of 2 Esdras among the early Christians; through the Byzantine period the lists of principal archangels increasingly incorporated him, and Russian iconography and liturgical texts greatly expanded his prominence.
  - He remains part of the traditional commemoration of the archangels in many Orthodox jurisdictions — appearing in the icon cycles of the archangels and in fresco programs of the angelic hierarchy, his hymnography bound to repentance, mercy, and preparation for judgment, and invoked by monastic writers in discussions of self-examination and repentance.
sections:
  - heading: A Note on His Canonical Status
    body:
      - Jeremiel is not named in the canonical Old or New Testaments, nor in the universally received Deuterocanonical books. His one ancient textual anchor is 2 Esdras (4 Ezra) 4:36, where “Jeremiel the archangel” answers concerning the souls of the righteous — a work that shaped Christian eschatology and angelology but is not received as canonical Scripture across the Orthodox world.
      - His place among the archangels therefore rests on Holy Tradition and the liturgical life of the Church. Some scholars compare Jeremiel with the Remiel or Ramiel of the Enochic traditions, but a direct identification remains uncertain — another reason the Church honors him through its own liturgical inheritance rather than asserting a fixed biblical foundation.
  - heading: The Angel of Repentance and Mercy
    body:
      - Interpreting his name as “Mercy of God,” the tradition makes Jeremiel the archangel who turns the soul toward repentance and the remembrance of God’s compassion. His scales and scroll are not the instruments of condemnation but of discernment — a summons to examine one’s life, to weigh one’s deeds honestly, and to prepare for the life to come in the confidence of God’s mercy.
      - "Among the lower-triad archangels he completes a quiet pattern of the Christian life: Selaphiel gathers its prayer, Jegudiel crowns its labor, Barachiel carries its blessing, and Jeremiel calls it to repentance and the hope of eternity."
