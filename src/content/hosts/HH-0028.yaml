sources:
  - 2 Kings 18:13–19:37; Isaiah 36–37; 2 Chronicles 32:1–23
  - Sirach 48:17–25; 1 Maccabees 7:41; 2 Maccabees 8:19 (deuterocanonical)
  - St. Basil the Great, On the Holy Spirit; St. John Chrysostom (on Hezekiah and prayer)
  - St. John of Damascus, An Exact Exposition of the Orthodox Faith; St. Dionysius the Areopagite, On the Celestial Hierarchy
  - Josephus, Antiquities of the Jews X (extra-biblical); Herodotus, Histories II; Sennacherib’s Prism (Assyrian royal inscriptions)
  - Menaion (November 8); Horologion; Divine Liturgy of St. John Chrysostom
