overview:
  - The Cherubim (Hebrew Keruvim, singular Keruv) are among the most frequently mentioned heavenly beings in Holy Scripture and occupy a central place in Orthodox Christian angelology. They appear throughout both the Old and New Testaments as attendants of God’s presence, guardians of sacred spaces, participants in heavenly worship, and signs of divine glory. Orthodox Christianity recognizes the Cherubim as a real order of bodiless powers rather than merely symbolic creatures.
  - Among the angelic orders the Cherubim traditionally occupy the second rank in the celestial hierarchy, immediately below the Seraphim and above the Thrones. This classification derives primarily from the writings of Pseudo-Dionysius the Areopagite and became standard throughout Byzantine and Orthodox theology.
  - "The first biblical appearance of the Cherubim occurs immediately after the Fall of Adam and Eve, when God stations Cherubim at the entrance to Eden to guard the way to the Tree of Life (Genesis 3:24). This establishes a recurring biblical theme: the Cherubim function as guardians of sacred space and as visible signs of God’s presence."
  - The Cherubim subsequently appear in the Tabernacle and the Temple. Images of Cherubim adorned the Ark of the Covenant, the Holy of Holies, the curtains of the Tabernacle, and Solomon’s Temple, where they symbolize the heavenly court surrounding God’s throne. The Ark itself is repeatedly described as the place where God is enthroned “between the Cherubim” (1 Samuel 4:4; Psalm 80:1; Psalm 99:1).
  - The most elaborate biblical descriptions occur in the visions of the Prophet Ezekiel, where the Cherubim appear as composite heavenly beings with multiple faces, wings, and extraordinary mobility, bearing the divine chariot-throne. Ezekiel’s visions profoundly influenced Jewish apocalyptic literature, Christian angelology, and Orthodox iconography.
  - "Orthodox theology emphasizes that the scriptural descriptions of the Cherubim should not always be read as literal physical anatomy. The Fathers generally understand the imagery symbolically, expressing spiritual realities beyond ordinary human comprehension: the multiple faces, numerous eyes, and wings signify knowledge, vigilance, spiritual perception, and readiness to accomplish God’s will."
  - The Cherubim are also deeply embedded in Orthodox liturgical life. The Divine Liturgy includes the Cherubic Hymn, which invites worshippers to join mystically in the worship of the heavenly hosts; numerous prayers, hymns, and iconographic programs refer to the Cherubim as participants in eternal heavenly worship.
  - Patristic writers frequently associate the Cherubim with divine wisdom and knowledge. Where the Seraphim symbolize burning love and purification, the Cherubim traditionally symbolize illumination and the contemplation of divine mysteries — an interpretation made especially influential through Dionysius the Areopagite, St. John of Damascus, and later Byzantine theologians.
  - The influence of the Cherubim extends far beyond theology into Orthodox church architecture, frescoes, manuscripts, hymnography, and iconography. Six-winged Cherubim frequently decorate apses, domes, icon screens, vestments, liturgical books, and sacred vessels, so that the Church visually expresses the participation of earthly worship in the worship of heaven.
  - Within Orthodox Christianity the Cherubim therefore serve as a bridge between biblical revelation, liturgical worship, theological reflection, and sacred art. Their presence throughout Scripture and Tradition makes them one of the most significant angelic orders in Orthodox understanding.
historicalContext:
  - "Ancient Near Eastern background: the Cherubim have parallels in the winged composite throne-guardians of Mesopotamian and Levantine art, but the biblical Cherubim are transformed into servants of the one God rather than independent divine beings."
  - In Israelite religion the Ark’s Cherubim symbolized God’s heavenly throne rather than idols, emphasizing divine transcendence.
  - In Second Temple Judaism the Cherubim were increasingly associated with the heavenly liturgy, the angelic hierarchies, and visions of God’s throne.
  - Early Christians interpreted the Cherubim christologically and ecclesiologically, viewing earthly worship as a participation in heavenly worship.
orthodoxInterpretation:
  - St. Dionysius the Areopagite places the Cherubim second among the Nine Orders and associates them with fullness of knowledge and the contemplation of divine mysteries.
  - St. John of Damascus accepts the Dionysian hierarchy and describes the Cherubim as rational, spiritual beings possessing exceptional knowledge.
  - St. Gregory the Theologian connects angelic worship with the human participation in divine worship.
  - St. Basil the Great speaks of the differing angelic ranks and ministries.
  - St. John Chrysostom links liturgical worship with the worship of the Cherubim and the heavenly hosts.
  - St. Maximus the Confessor uses the Cherubim as examples of created beings continually contemplating divine realities.
liturgicalTradition:
  - The Cherubim have no separate feast of their own; they are commemorated collectively at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8 (November 21 on the civil calendar for Old-Calendar churches).
  - The Cherubic Hymn, sung at the Great Entrance of the Divine Liturgy, opens “We who mystically represent the Cherubim …,” inviting the faithful to lay aside all earthly care and join the worship of the heavenly hosts.
  - The Menaion frequently invokes the Cherubim in hymns to the Theotokos, the saints, and the angelic hosts, and the Horologion names them in the daily prayers and doxologies.
  - Within the Divine Liturgy the Cherubim are recalled in the Cherubic Hymn, the Sanctus, and the prayers of the Anaphora.
salvationHistory:
  - heading: Creation
    body:
      - The Cherubim are part of the angelic creation, made by God before the visible world.
  - heading: The Fall
    body:
      - They remain faithful to God while some of the angels rebel.
  - heading: Eden
    body:
      - After the expulsion of Adam and Eve they guard the entrance to Paradise and the way to the Tree of Life.
  - heading: Tabernacle and Temple
    body:
      - Fashioned in gold above the Ark and carved and woven throughout the Tabernacle and Solomon’s Temple, they represent God’s heavenly throne in the midst of His people.
  - heading: The Incarnation
    body:
      - They witness and serve the incarnate Christ.
  - heading: The Resurrection and Ascension
    body:
      - They share in the heavenly worship surrounding the risen Lord and are among the heavenly hosts that receive the ascending Christ.
  - heading: The Last Judgment
    body:
      - They remain attendants of God’s throne.
iconography:
  - In traditional Orthodox iconography the Cherubim are shown as many-winged beings covered with eyes, often with a human face or several faces, arranged in a circle around the divine glory.
  - By common Byzantine convention they are blue (as the Seraphim are red). The eyes signify knowledge and vigilance; the wings, spiritual mobility; the blue, heavenly wisdom; and the multiple faces, the fullness of creation praising God.
  - "Regional traditions share a common Byzantine inheritance: Byzantine art favors blue six-winged forms; Greek iconography sets them in dome and apse decoration; Russian iconography develops elaborate celestial imagery; and Serbian, Romanian, and Antiochian traditions continue the Byzantine style."
historicalInfluence:
  - The Cherubim shaped Byzantine church decoration and iconography, liturgical texts, and medieval Christian art.
  - Their imagery also marked church architecture, monastic spirituality, and the history of biblical interpretation.
scripture:
  - ref: Genesis 3:24
    note: "The first appearance: Cherubim guard the way to the Tree of Life after the Fall."
  - ref: Exodus 25:18–22
    note: Golden Cherubim atop the Ark’s Mercy Seat, from between whom God speaks.
  - ref: Exodus 26:1, 31
    note: Cherubim woven into the curtains and veil of the Tabernacle.
  - ref: Numbers 7:89
    note: God speaks to Moses from between the two Cherubim over the Ark.
  - ref: 1 Samuel 4:4
    note: The Lord of hosts “enthroned upon the Cherubim.”
  - ref: 2 Samuel 22:11; Psalm 18:10
    note: God rides upon a Cherub — an image of divine majesty and manifestation.
  - ref: 1 Kings 6–8
    note: The monumental olivewood Cherubim overshadowing the Holy of Holies in Solomon’s Temple.
  - ref: Psalm 80:1; Psalm 99:1
    note: The Lord enthroned upon the Cherubim — heavenly kingship and liturgical imagery.
  - ref: Ezekiel 1
    note: The vision by the river Chebar of the living creatures who bear the divine throne.
  - ref: Ezekiel 10
    note: The living creatures are explicitly identified as Cherubim as the glory departs the Temple.
  - ref: Ezekiel 41:18–25
    note: Carved Cherubim in the visionary eschatological Temple.
  - ref: Hebrews 9:5
    note: “The Cherubim of glory overshadowing the Mercy Seat” — the Temple worship fulfilled in Christ.
  - ref: Revelation 4:6–8
    note: The four living creatures around the throne, commonly linked with the Cherubic imagery.
