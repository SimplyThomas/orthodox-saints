status: draft
generated: "2026-07-09"
sources:
  - Revelation 9:1–11; Revelation 20:1–3
  - Job 26:6; 28:22; 31:12; Psalm 88 (LXX 87):11; Proverbs 15:11; 27:20; Joel 2; 2 Peter 2:4; Jude 6; Luke 8:31
  - St. Andrew of Caesarea, Commentary on the Apocalypse
  - St. John of Damascus, An Exact Exposition of the Orthodox Faith; St. Dionysius the Areopagite, On the Celestial Hierarchy
  - Archbishop Averky (Taushev), The Apocalypse in the Teachings of Ancient Christianity; Fr. Lawrence Farley, The Apocalypse of St. John
  - Orthodox Study Bible; Richard Bauckham, The Theology of the Book of Revelation
overview:
  - Abaddon, called Apollyon in Greek, appears in Revelation 9:11 as the king of the demonic locusts released during the sounding of the fifth trumpet. His Hebrew name, Abaddon, means “Destruction”; the Greek Apollyon means “Destroyer.” Scripture calls him “the angel of the bottomless pit” — the abyss, the place of imprisonment for evil spirits — and sets him at the head of the tormenting host that rises from it.
  - Unlike the holy angels who faithfully carry out God’s will, Abaddon is presented as a ruler of destructive powers. He is a fallen being, and this record catalogues him as such, for study and completeness, not for veneration; the Church addresses him with no prayer and keeps no memory of him in her worship.
  - "Yet even his authority is not his own. The abyss is opened only when a fallen star is “given” the key; the locusts are permitted to harm only those who lack the seal of God on their foreheads, and only for five months, and they may not kill. Every limit is set from above. Here is one of the central lessons of the Apocalypse: even the powers of evil cannot act independently of God’s providence."
  - Revelation does not identify Abaddon with Satan. He appears as a distinct spirit, ruler over the abyss and king over the host of the fifth trumpet, and the text says no more. Orthodox tradition, refusing to add what Scripture withholds, does not equate him with Satan, with Beelzebul, or with any other named demon, and it discourages elaborate speculation about his origin or identity.
  - The Hebrew word abaddon runs through the Old Testament, but there it names the realm of destruction or the grave — an impersonal place, set beside Sheol — rather than a personal being. Revelation is unique in taking the word up as the title of a spirit. Because the biblical evidence is so limited, the emphasis of the passage falls not on the destroyer himself but on the God whose authority binds and looses even him.
historicalContext:
  - Revelation is the sole source that presents Abaddon as a personal figure, and — alone among the New-Testament books — it is not read in the Byzantine liturgical services; he is known through the text, its commentary, and, rarely, the iconography of the Apocalypse.
  - "The Old-Testament background is a matter of vocabulary, not of a person: in Job, the Psalms, and Proverbs, abaddon is the realm of ruin and death, laid bare before God, never satisfied, hidden even from the living — a poetic name for the grave."
  - The idea of an abyss holding imprisoned spirits was developed in Second-Temple literature, above all in 1 Enoch, where the fallen angels and disordered powers are bound in a pit until the day of judgment — the background against which Revelation’s “bottomless pit” and its “angel” would have been heard.
  - Byzantine interpreters, especially St. Andrew of Caesarea, read the fifth-trumpet vision as a warning about spiritual deception and divine judgment, stressing the strict limits God places on the destroyer; modern Orthodox scholars continue to discourage identifying Abaddon with particular historical rulers or contemporary figures.
orthodoxInterpretation:
  - St. Andrew of Caesarea interprets Abaddon as the leader of the destructive demonic forces loosed at the fifth trumpet, understanding the locusts symbolically as manifestations of demonic deception and spiritual ruin, permitted for a limited time according to God’s judgment.
  - St. John of Damascus teaches that the demons are fallen angels who retain their intelligence but misuse their God-given freedom in opposition to Him; though he does not name Abaddon, this is the framework within which Orthodoxy understands him — a rational creature turned to destruction, yet never beyond God’s power.
  - "St. Dionysius the Areopagite treats only the holy angelic hierarchy and does not number the fallen among the celestial orders — which is why Abaddon is assigned no rank: he has fallen out of the order of the Nine, not into a place within it."
  - "The consistent Orthodox emphasis is on the limits laid upon him: the demonic plague begins only by divine permission, harms only the unsealed, spares life, and lasts a fixed span. The vision is finally not about the destroyer’s power but about God’s — that even the abyss opens and closes at His word."
liturgicalTradition:
  - Abaddon has no feast, no commemoration, and no place in Orthodox worship; a fallen spirit is not honored, and the Church directs no address to him. He is named here only because Scripture names him, and only to be understood.
  - Where the theme touches the Church’s prayer at all, it is in her confidence — expressed throughout the services and in every exorcism and baptismal renunciation — that Christ has trampled down the powers of the abyss, and that the demonic remains wholly subject to God, bound and loosed at His will.
  - "His end is the Church’s hope: the same abyss over which he is king is, in the vision’s close, the prison into which the enemy is cast and sealed (Revelation 20:1–3), and from which no power of destruction will trouble the redeemed — the theme set before the faithful on the Sunday of the Last Judgment."
iconography:
  - Abaddon rarely appears in Orthodox art. Where he is depicted, it is almost exclusively within manuscript illustrations or fresco cycles of the Apocalypse, shown as the ruler of the locust-host emerging from the smoke of the abyss.
  - He has no fixed attribute and no independent iconographic tradition; Orthodox iconography generally avoids dwelling on demonic figures except as required to illustrate a biblical narrative, and never gives them the honor of a standalone image.
  - The fifth-trumpet scene — the pit opened, the smoke, the strange locusts, their king over them — belongs to the narrative cycles of Revelation (as in the Bamberg Apocalypse and Dürer’s woodcuts), where the emphasis falls on the judgment permitted and its limits, not on the destroyer himself.
historicalInfluence:
  - The name Apollyon, “the Destroyer,” passed into the wider Christian imagination of the demonic and of the abyss, and the fifth-trumpet scene became a fixture of apocalyptic art East and West.
  - "In Orthodox thought the figure served chiefly as an occasion to state a principle: that there is no second god, no power of evil independent of the Creator, but only fallen creatures held on the leash of divine permission."
  - The passage reinforced the Church’s sober demonology — the demons as fallen angels, intelligent but ruinous, real but wholly subordinate to God — and her refusal of the dualism that would set a kingdom of darkness over against the kingdom of light as an equal.
salvationHistory:
  - heading: Angel of the Abyss
    body:
      - Abaddon is named “the angel of the bottomless pit” (9:11) — king over the tormenting host that rises from the abyss at the fifth trumpet, a fallen ruler of destruction, not a minister of God.
  - heading: Loosed Only by Permission
    body:
      - The abyss is opened when a fallen star is “given” the key (9:1); the destroyer acts only within a door that God unlocks — the demonic never seizes its hour but is permitted it.
  - heading: Bound by God's Limits
    body:
      - The locusts may harm only those without the seal of God, may not kill, and are permitted only five months (9:4–5) — every boundary set from above, so that even torment serves the measure of divine justice.
  - heading: Not Satan, and Not Named Further
    body:
      - Scripture does not identify Abaddon with Satan or any other demon; Orthodoxy keeps that silence, refusing to build identities or hierarchies of the fallen beyond what the text reveals.
  - heading: The Word Made a Person
    body:
      - In the Old Testament abaddon is the impersonal realm of destruction (Job; Proverbs; Psalm 88); Revelation alone gives the word a face — a distinction the reading must keep, lest the grave of the psalms be mistaken for the demon of the Apocalypse.
  - heading: The Abyss Sealed at the End
    body:
      - The abyss over which he reigns is, in the end, the pit into which the enemy is cast and shut and sealed (Revelation 20:1–3) — the destroyer’s realm becoming the enemy’s prison, under the victory of Christ.
scripture:
  - ref: Revelation 9:1–3
    note: A fallen star is given the key to the bottomless pit; from its smoke come locusts with the power of scorpions.
  - ref: Revelation 9:4–6
    note: They may harm only those without the seal of God, may not kill, and torment for five months — the strict limits set upon them.
  - ref: Revelation 9:11
    note: “They had as king over them the angel of the bottomless pit, whose name in Hebrew is Abaddon, but in Greek… Apollyon” — the only passage naming him as a person.
  - ref: Job 26:6; 28:22
    note: “Destruction (Abaddon) has no covering before Him”; “Destruction and Death say…” — abaddon as the realm of ruin, laid bare before God, not a being.
  - ref: Proverbs 15:11; 27:20
    note: “Sheol and Abaddon lie open before the Lord”; “Sheol and Abaddon are never satisfied” — the grave and destruction as figures, parallel to Sheol.
  - ref: Luke 8:31
    note: The demons beg Christ not to command them “to go out into the abyss” — the pit as the dreaded prison of the fallen, over which they have no power against Him.
  - ref: 2 Peter 2:4; Jude 6
    note: The angels who sinned, cast down and “kept in chains” for the judgment — the New-Testament witness to the fallen bound in the abyss.
  - ref: Revelation 20:1–3
    note: An angel binds the dragon and casts him into the abyss, shutting and sealing it — the destroyer’s realm becoming the enemy’s prison under Christ’s victory.
sections:
  - heading: A Fallen Being — Named, Not Venerated
    body:
      - This record differs from every other in the Heavenly Hosts, for Abaddon is not a servant of God but an enemy of His work. He is catalogued here because Scripture names him, and because a faithful account of the angels of the Bible cannot pass over the one place where a demonic ruler is given a name; but he is catalogued to be understood, never to be honored. The Church directs to him no prayer, keeps for him no feast, and grants him no icon of veneration. He stands in “the Fallen,” apart from the holy hosts, marked as what he is.
      - "And what he is, Scripture is careful to limit. He has fallen out of the celestial hierarchy, not into a rank within it — St. Dionysius numbers only the holy among the Nine Orders — so he bears no order and no office of light. He is, as St. John of Damascus teaches of all the demons, a fallen angel who keeps his intelligence but has turned his freedom to ruin: real, and dangerous, and wholly a creature."
  - heading: The Destroyer on a Leash
    body:
      - The heart of the Orthodox reading is the chain of permissions that runs through the whole scene. The abyss does not open itself; a key is “given.” The locusts do not choose their prey; they are told whom they may touch — only the unsealed — and whom they may not. They are not permitted to kill. They are allowed a set span, five months, and no more. At every point the destroyer and his host act inside boundaries God has drawn.
      - "This is the Apocalypse’s answer to the ancient temptation of dualism — the notion of two gods, light and darkness, locked in equal war. There is no such second power. Abaddon is not God’s rival but His prisoner-on-parole, loosed for a measured hour to serve, even against his will, the purposes of a justice not his own. The vision that seems most to display the strength of evil in fact displays its subjection: the Destroyer cannot destroy one soul that God has sealed, nor act one moment past the time God allows."
  - heading: Abaddon the Place and Abaddon the Person
    body:
      - "A careful reading must hold two things apart. Long before Revelation, the Hebrew word abaddon appears in Scripture — in Job, in the Psalms, in Proverbs — but always as a common noun: “destruction,” the realm of ruin, the grave, set in parallel with Sheol. “Sheol and Abaddon lie open before the Lord” (Proverbs 15:11); “Destruction and Death say, ‘We have heard a rumor of it’” (Job 28:22). It is a place, or at most a poetic personification of a place — never a spirit with a will."
      - "Revelation does something new: it takes the word and makes it a name, the title of “the angel of the bottomless pit.” This is a genuine development, and the register must be kept clear. The abaddon of the psalms is not the demon of the fifth trumpet read backward into the Old Testament; it is the grave, over which God alone is Lord. Orthodoxy receives the Old-Testament passages as they stand, and does not populate them with the personal destroyer of the Apocalypse — even as it recognizes that Revelation, in naming him, gathers up the old word for ruin and gives it a face."
