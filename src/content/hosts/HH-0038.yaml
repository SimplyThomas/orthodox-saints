  - name: Holy Prophet Moses
    note: At whose leading the trumpet sounded at Sinai (Exodus 19) — the trumpet of the divine presence the Apocalypse recalls.
    href: saint/OS-0057
    commemorated: true
  - name: Righteous Joshua
    note: Before whom seven priests with seven trumpets brought down the walls of Jericho (Joshua 6) — a type of the trumpets of judgment.
    href: saint/OS-0090
    commemorated: true
  - name: Prophet Joel
    note: “Blow the trumpet in Zion… for the day of the Lord is coming” (Joel 2:1) — the prophetic trumpet the Apocalypse fulfills.
