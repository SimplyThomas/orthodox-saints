    href: host/HH-0008
  - name: Angels
    note: The ninth rank — the general order of the ministering spirits who execute God’s commands, of which the trumpet angels are a company.
    href: host/HH-0009
  - name: Archangel Michael
    note: "Chief of the bodiless powers, joined to the trumpet of judgment: “the Lord Himself will descend… with the voice of an archangel and with the trumpet of God” (1 Thessalonians 4:16)."
    href: host/HH-0010
  - name: Apostle & Evangelist John the Theologian
    note: The seer of the Apocalypse, to whom the vision of the seven trumpets was given on Patmos.
    href: saint/OS-0005
