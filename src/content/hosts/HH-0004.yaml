  - ref: Ephesians 1:21
    note: Christ exalted above every rule, authority, power, and dominion.
  - ref: Colossians 2:10
    note: Christ is the head over every principality and power.
  - ref: Romans 8:38
    note: Neither angels nor principalities can separate believers from the love of Christ — a recognition of the spiritual orders.
  - ref: 1 Peter 3:22
    note: Angels, authorities, and powers made subject to the ascended Christ.
  - ref: Daniel 7:9–10
    note: The heavenly court surrounding the Ancient of Days — Old Testament background for the celestial hierarchy.
  - ref: Psalm 103:20–21 (LXX 102)
    note: The angels who perform God’s commands — angelic service and obedience.
  - ref: 1 Kings 22:19
    note: The heavenly host standing before God — the imagery of the divine council.
