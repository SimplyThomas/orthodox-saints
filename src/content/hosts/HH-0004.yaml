overview:
  - The Dominions (Greek Kyriotētes; Latin Dominationes), also called Lordships in some English translations, are one of the traditional angelic orders recognized in Orthodox Christian angelology. In the received Orthodox hierarchy of the Nine Orders of Angels they occupy the fourth rank overall and the first rank of the middle triad, below the Thrones and above the Virtues.
  - Unlike the Seraphim and Cherubim, prominently depicted in biblical visions, the Dominions are mentioned only briefly in Scripture. Their significance derives chiefly from the New Testament’s references to invisible heavenly powers and from the theological synthesis of the Church Fathers, especially the tradition associated with Pseudo-Dionysius the Areopagite.
  - The principal biblical basis for the Dominions is found in St. Paul. In Colossians 1:16 Christ is proclaimed Creator of all things, visible and invisible, including “thrones, dominions, principalities, and powers.” Similar terminology appears in Ephesians and elsewhere in the Pauline corpus, establishing that invisible ranks of heavenly beings exist and that all of them owe their existence to Christ.
  - Orthodox Christianity understands the Dominions as created spiritual beings belonging to the heavenly host. Like all angels they are finite creatures, distinct from God and wholly dependent on Him — not divine powers nor independent cosmic forces, but sharers in God’s providential ordering of creation.
  - The name “Dominions” derives from the idea of lordship or governance. Patristic interpretation associates them with the orderly administration of God’s will within the angelic hierarchy; in the Dionysian tradition they are marked by freedom from earthly passions, stability in divine service, and participation in the orderly transmission of God’s providence through creation.
  - The Dominions hold an important place in Orthodox theology because they help illustrate the Church’s understanding of the invisible world. Scripture repeatedly teaches that reality includes both visible and invisible creation; the existence of orders such as the Dominions shows that God’s creation extends beyond the physical universe to rational spiritual beings who serve Him.
  - Orthodox liturgical tradition numbers the Dominions among the heavenly hosts commemorated at the Synaxis of the Archangel Michael and the Other Bodiless Powers. Though they have no separate feast, they appear in the hymnography and liturgical texts that celebrate the whole angelic hierarchy.
  - The Dominions also figure in the development of Christian angelology. The Nine Orders system, widely adopted throughout Eastern Christianity, became a framework for discussing the relation of heavenly and earthly worship. Scripture itself does not present a complete hierarchy; the Fathers drew together its various references to construct a coherent understanding of the heavenly hosts.
  - In Orthodox iconography the Dominions rarely appear as independent subjects. They are usually represented within depictions of the Nine Orders of Angels or the heavenly court, their imagery symbolic rather than narrative, reflecting the limited biblical description of their appearance.
  - "The study of the Dominions therefore occupies an important place in Orthodox angelology: it shows how the Church interprets the biblical references to invisible powers, how the Fathers developed a theology of the angelic world, and how heavenly worship became woven into Orthodox liturgical and artistic tradition."
historicalContext:
  - "Ancient Jewish background: Second Temple Judaism developed increasingly complex understandings of the angelic hierarchies. The Hebrew Bible already speaks extensively of angels, and later Jewish literature elaborated on celestial orders and heavenly administration."
  - In the Second Temple context, texts such as 1 Enoch and other apocalyptic works describe structured heavenly courts and angelic ranks. These writings do not establish Orthodox doctrine, but they provide important historical background for the development of angelology.
  - "The earliest Christians inherited Jewish beliefs about angels but interpreted them through Christology: St. Paul’s letters consistently emphasize that all heavenly powers derive their existence and authority from Christ. As Christianity developed, theologians increasingly read Paul’s lists of invisible powers as references to distinct angelic orders."
orthodoxInterpretation:
  - St. Dionysius the Areopagite, in On the Celestial Hierarchy, places the Dominions at the head of the second (middle) hierarchy, associating them with freedom from servility, spiritual authority, and orderly participation in the divine governance.
  - St. John of Damascus accepts the traditional hierarchy and presents the angelic ranks as rational, spiritual beings created by God.
  - St. Basil the Great cites Paul’s references to the invisible powers as evidence of the created spiritual world.
  - St. Gregory the Theologian speaks of the angelic hosts sharing in heavenly worship and serving God’s providence.
  - St. John Chrysostom emphasizes that all dominions and powers are subordinate to Christ, warning against speculation that would diminish Christ’s supremacy.
  - St. Maximus the Confessor interprets the angelic hierarchies as sharing in the ordered transmission of divine illumination.
liturgicalTradition:
  - The Dominions are commemorated with all the bodiless powers at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8 (November 21 on the civil calendar for Old-Calendar churches).
  - The Menaion for November 8 names the various angelic orders, including the Dominions, and the Horologion frequently references the heavenly hosts collectively in the daily prayers.
  - Although the Dominions are not named individually in the principal hymns of the Divine Liturgy, the liturgy repeatedly invokes the Church’s participation in the worship of the heavenly powers, and Byzantine hymnography groups the Dominions with the other ranks when describing heavenly worship.
salvationHistory:
  - heading: Creation
    body:
      - Created through Christ as part of the invisible world.
  - heading: The Fall
    body:
      - They remained faithful to God.
  - heading: Old Testament
    body:
      - They share in the heavenly worship and governance glimpsed in the prophets’ visions of the divine council.
  - heading: The Incarnation
    body:
      - They witness the coming of Christ.
  - heading: Christ’s Ministry
    body:
      - They are subject to Christ’s authority.
  - heading: The Resurrection
    body:
      - They rejoice in Christ’s victory over death.
  - heading: The Ascension
    body:
      - They acknowledge Christ’s exaltation above all powers (Ephesians 1:21).
  - heading: The Last Judgment
    body:
      - They remain part of the heavenly court.
iconography:
  - Because Scripture does not describe the Dominions visually, their iconography is largely symbolic. They are commonly shown in angelic human form, in royal garments or liturgical vestments, bearing a scepter or staff, and taking part in the heavenly assembly.
  - "The symbols carry theological meaning: the scepter signifies authority under God; the crown, heavenly dignity; white garments, purity; and gold, divine illumination."
  - Byzantine icons emphasize the hierarchical order; Greek tradition follows the Byzantine models; Russian icons often depict the full Nine Orders together; and Serbian, Romanian, and Antiochian traditions retain the Byzantine iconographic conventions.
historicalInfluence:
  - The Dominions shaped the development of angelology and Byzantine theology, and appear in liturgical hymnography and church decoration.
  - They also informed medieval Christian cosmology and the monastic reflection on order and obedience; less visually prominent than the Seraphim or Cherubim, they remain integral to the traditional account of the heavenly hierarchy.
