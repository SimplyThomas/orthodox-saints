overview:
  - Archangel Barachiel (also rendered Barakiel, Baraqiel, Varachiel, or Barachiil in the Greek, Slavonic, and transliterated traditions) is one of the principal archangels commemorated in Orthodox liturgical tradition. Unlike Michael, Gabriel, and Raphael he is not named in the canonical Scriptures; his place in Orthodox Christianity arises from Holy Tradition, the liturgical texts, medieval Christian angelology, and the Byzantine and Slavic ecclesiastical traditions.
  - "The name Barachiel is generally derived from the Hebrew Barak’el, “Blessing of God” or “God’s blessing.” This etymology strongly shaped his role: among the seven archangels, Barachiel became associated with the divine blessings, providence, family life, fruitfulness, hospitality, and God’s benevolent care for humanity."
  - Orthodox theology carefully distinguishes teachings rooted directly in Holy Scripture from those arising through later tradition, and Barachiel belongs chiefly to the latter. The Church commemorates him liturgically, but no canonical text names him or records actions attributed to him, and so the traditions concerning him are received differently from the scriptural accounts of Michael, Gabriel, or Raphael.
  - His figure emerged gradually within Christian angelology. Certain early Jewish texts contain references to a figure named Baraqiel, though the relationship of that figure to the later Christian Archangel Barachiel is not always clear. Over time the Byzantine and Slavic traditions incorporated Barachiel into the lists of principal archangels, giving him a symbolic role bound to the divine blessings and God’s providential care.
  - In Orthodox iconography Barachiel is often shown holding roses, flowers, or a vessel from which blessings flow — symbols drawn not from Scripture but from later ecclesiastical tradition, expressing God’s generosity and the blessings bestowed on humanity.
  - "By the medieval period, especially within Slavic Christianity, Barachiel was firmly established in the iconographic cycles of the seven archangels: alongside Michael, Gabriel, Raphael, Uriel, Selaphiel, and Jegudiel he formed part of a traditional archangelic group represented in churches, manuscripts, and devotional imagery."
  - Where Michael is associated with warfare, Gabriel with revelation, Raphael with healing, Selaphiel with prayer, and Jegudiel with labor, Barachiel is associated with blessing, abundance, hospitality, family life, and divine favor — associations that developed through liturgical interpretation and symbolism rather than historical narrative.
  - The Orthodox Church understands Barachiel, like all the angels, as a created spiritual being who serves God — not worshiped, possessing no independent divine authority, but commemorated as one of the heavenly powers who share in God’s providential governance of creation.
  - Though less prominent than Michael or Gabriel, Barachiel remains an important figure in traditional Orthodox angelology, his role reflecting the Church’s wider understanding of the angels as servants of God who share in the administration of the divine providence and care for humanity.
orthodoxInterpretation:
  - St. Basil the Great discusses the angels as ministers of the divine providence, though he does not name Barachiel.
  - St. Gregory the Theologian frequently speaks of the angels as sharers in God’s care for creation — a theme later gathered around Barachiel.
  - St. John Chrysostom emphasizes God’s providence and the ministry of the angels, without discussing Barachiel by name.
  - St. Dionysius the Areopagite presents the angels as channels through which the divine blessings and illumination are transmitted throughout creation.
  - St. John of Damascus teaches that the angels serve God’s purposes and share in His providential governance. No major Church Father treats Barachiel in detail; most of the traditions concerning him developed later, in the liturgical and iconographic setting.
liturgicalTradition:
  - Barachiel is commemorated with all the bodiless powers at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8, together with Michael, Gabriel, Raphael, Uriel, Selaphiel, Jegudiel, and (in many traditions) Jeremiel.
  - He appears in the Menaion, Synaxarion, Horologion, and the services dedicated to the bodiless powers, where the recurring themes are blessings, divine providence, thanksgiving, hospitality, and God’s care for humanity.
iconography:
  - Barachiel is usually depicted as a youthful winged angel in Byzantine ceremonial robes, holding flowers or roses and often carrying a basket or vessel.
  - The ROSES or FLOWERS are his most common symbol, representing the divine blessings bestowed on humanity; a BASKET of flowers signifies abundance and providence; and in Slavic iconography he is sometimes shown scattering blessings as white rose petals from his garments. His colors — green, white, gold, and blue — emphasize life, blessing, purity, and divine favor.
  - The floral symbolism appears chiefly in the Russian and Slavic iconographic traditions.
historicalInfluence:
  - Little evidence exists for a widespread independent veneration of Barachiel in the earliest centuries; the development of the traditional lists of principal archangels through the Byzantine period established his place in Orthodox angelology, and Russian iconography strongly shaped the modern image of him as the angel of blessing.
  - He remains among the traditional archangels commemorated on November 8 — appearing in the icons of the seven archangels and in fresco cycles of the heavenly hierarchy, his hymnography bound to blessing and divine providence, and invoked by monastic writers in discussions of God’s care and generosity.
sections:
  - heading: A Note on His Canonical Status
    body:
      - Barachiel is not named in the canonical Scriptures or the Deuterocanonical books; his place among the archangels rests on Holy Tradition and the liturgical life of the Church, and his blessing symbolism arises from the meaning of his name and later liturgical development rather than from any biblical narrative.
      - A figure named Baraqiel does appear in the Enochic literature, but scholars debate whether he should be identified with the later Christian Archangel Barachiel at all — in some manuscripts Baraqiel is numbered among the fallen WATCHERS rather than the holy archangels. This uncertainty is a further reason the Church receives Barachiel through its own liturgical tradition and iconography rather than through the ancient Jewish sources.
  - heading: The Angel of Blessing
    body:
      - "Interpreting his name as “Blessing of God,” the tradition makes Barachiel the archangel through whom God’s benedictions are poured out — associated with divine favor, abundance, fruitfulness, hospitality, and the blessing of family life. His roses and basket of flowers say it wordlessly: the generosity of God scattered like petals over His creation."
      - In this he complements the other archangels of the lower rank — as Selaphiel gathers the Church’s prayer and Jegudiel crowns its labor, Barachiel carries down the blessing that answers them, a sign of God’s providential care for the ordinary life of His people.
