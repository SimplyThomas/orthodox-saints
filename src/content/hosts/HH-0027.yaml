sources:
  - Exodus 3:1–6; 3:7–15; 4:1–17; Deuteronomy 33:16
  - Mark 12:26; Luke 20:37; Acts 7:30–35; Hebrews 11:23–29
  - St. Gregory of Nyssa, The Life of Moses; St. Gregory the Theologian, Orations; St. John Chrysostom, Homilies
  - St. Basil the Great; St. John of Damascus, An Exact Exposition of the Orthodox Faith; St. Dionysius the Areopagite, On the Celestial Hierarchy
  - St. Ephrem the Syrian; St. Andrew of Crete
  - Menaion; Horologion; Akathist Hymn to the Theotokos; the festal services of the Theotokos
  - Philo of Alexandria, On the Life of Moses (extra-biblical); Orthodox Study Bible; Metropolitan Hilarion Alfeyev, Orthodox Christianity; Fr. John Meyendorff, Byzantine Theology
overview:
  - The Burning Bush is among the most important divine revelations of the Old Testament, recorded in Exodus 3–4 as the encounter of Moses with God at Mount Horeb. Tending the flock of his father-in-law Jethro, Moses sees a bush that burns with fire yet is not consumed; and as he approaches, the Angel of the Lord appears in the flame, and God speaks to him from the midst of the bush, commissioning him to lead Israel out of Egypt.
  - The event holds a unique place in Scripture, joining angelic appearance, divine revelation, covenant history, and prophetic calling. Exodus 3:2 says that “the Angel of the Lord appeared unto him in a flame of fire out of the midst of a bush,” yet the narrative at once identifies the speaker as God Himself — a twofold description that has drawn deep theological reflection through Jewish and Christian history.
  - "Orthodox Christianity understands the Burning Bush first as a historical revelation to Moses: the beginning of his prophetic mission and of Israel’s liberation from bondage. God reveals His Name — “I AM WHO I AM” (Exodus 3:14) — in one of the foundational moments of biblical revelation."
  - The passage is central also to Orthodox angelology. It opens with the Angel of the Lord, the figure who recurs throughout the Old Testament. Some Fathers read certain of his appearances as manifestations of the pre-incarnate Word; others stress his role as divine messenger. Orthodox theology preserves the distinction between the biblical text and later interpretation while honoring the rich tradition around these passages.
  - Above all, the Burning Bush became one of the great symbols of the Theotokos. Because the bush held divine fire without being consumed, the Fathers and hymnographers read it as a foreshadowing of the Virgin, who bore God incarnate without being consumed or corrupted by the divine presence — a typology woven deep into Orthodox hymnography and iconography.
  - The event unfolds many themes at once — divine holiness, revelation, vocation, covenant, liberation, and God’s presence among His people. Moses is bidden to remove his sandals, for the ground is holy; and the revelation leads on to the Exodus, one of the central saving acts of the Old Testament. So the Burning Bush is at once a historical event, a divine revelation, a prophetic commissioning, an angelic encounter, a type of the Incarnation, and a sign of God’s saving presence.
historicalContext:
  - The early Church read the Burning Bush primarily as a theophany and a prophetic calling — the holy ground of Moses’ commissioning.
  - In the Byzantine period the Marian typology was developed to its fullness, the unconsumed bush becoming a settled image of the Virgin who bore God.
  - The Slavic tradition made the “Unburnt Bush” one of its most beloved Marian icon types, gathering into a single image the fire of Horeb and the visions of the prophets.
  - Modern Orthodox theology keeps the event central to its reflection on revelation, holiness, and the Incarnation.
orthodoxInterpretation:
  - St. Basil the Great takes Moses’ encounter as an example of divine revelation and holiness — the removing of the sandals a preparation for sacred meeting.
  - St. Gregory the Theologian reads the Burning Bush as a revelation of divine transcendence and presence, and links Moses’ ascent to the soul’s progress toward God.
  - St. John Chrysostom stresses God’s condescension in revealing Himself to Moses and the weight of Moses’ obedience.
  - St. Gregory of Nyssa, in The Life of Moses, builds upon the bush an extended contemplation of divine mystery and the ascent of the soul into the darkness of God.
  - St. John of Damascus names the Burning Bush among the principal Old-Testament types of the Theotokos, precisely because it bore divine fire without being consumed.
  - St. Dionysius the Areopagite reads the fiery manifestation as a symbol of the divine illumination transmitted through the heavenly hierarchies, while St. Ephrem the Syrian and St. Andrew of Crete carry the bush deep into the hymnography of the Incarnation and the Virgin.
liturgicalTradition:
  - Unlike most Old-Testament angelic encounters, the Burning Bush occupies a major place in Orthodox worship — chiefly through its Marian typology.
  - The bush is invoked across the feasts of the Theotokos — her Nativity, her Entrance into the Temple, the Annunciation, and the Dormition — where she is hailed as the Bush unconsumed that bore the divine fire.
  - The Menaion names her “the Burning Bush,” “the Bush unburnt,” “the Bush bearing divine Fire,” and the Akathist Hymn sings the same image; the story appears too in the readings and hymnography of Great Lent concerning Moses and divine revelation.
  - The angel of the flame is remembered, with all the heavenly powers, at the Synaxis of the Bodiless Powers (November 8); no feast commemorates the event itself, but the “Unburnt Bush” icon carries it through the year.
iconography:
  - The narrative icon shows Moses removing his sandals, the bush engulfed in fire, divine rays issuing from it, and an angelic or divine presence within the flame.
  - From it developed a distinct Marian type — the “Unburnt Bush” (Neopalimaya Kupina) — depicting the Theotokos within a fiery eight-pointed star, surrounded by angelic powers and by symbols drawn from Exodus and the vision of Ezekiel.
  - "Its colours are read: red for the divine fire, gold for glory, green for the bush unconsumed, blue for heavenly mystery."
  - The image grew especially prominent in Byzantine and Slavic iconography, and the “Unburnt Bush” became one of the most popular of all Marian icons.
historicalInfluence:
  - Moses before the Burning Bush is one of the most depicted of all Old-Testament scenes, from the Dura-Europos synagogue and the mosaics of Sinai to the manuscript cycles of Byzantium.
  - As the “Unburnt Bush,” the image stands near the center of Orthodox Marian hymnography and devotion, and it shaped monastic reflection on contemplation, holiness, and the divine encounter.
  - It has influenced Christian theology, mysticism, and biblical commentary throughout the history of the Church.
salvationHistory:
  - heading: The Angel in the Flame
    body:
      - The Angel of the Lord appears to Moses in a flame of fire from the midst of the bush, which burns yet is not consumed (Exodus 3:2).
  - heading: Holy Ground
    body:
      - God calls to Moses from the bush and bids him remove his sandals, for the place whereon he stands is holy ground (Exodus 3:4–5).
  - heading: The Divine Name
    body:
      - "God reveals Himself as the God of Abraham, Isaac, and Jacob, and discloses His Name: “I AM WHO I AM” (Exodus 3:6, 14)."
  - heading: The Commissioning of Moses
    body:
      - God announces that He has seen the affliction of His people and sends Moses to bring them out of Egypt (Exodus 3:7–10).
  - heading: Signs and Assurance
    body:
      - Moses receives signs — the rod, the leprous hand — and the promise of Aaron’s help, for the mission he is given (Exodus 4:1–17).
  - heading: The Beginning of the Exodus
    body:
      - "From the bush proceeds the whole work of deliverance: the Exodus, the Passover, and the covenant at Sinai, the foundational saving act of the Old Testament."
scripture:
  - ref: Exodus 3:2
    note: "The primary passage: “The Angel of the Lord appeared unto him in a flame of fire out of the midst of a bush,” which burned but was not consumed."
  - ref: Exodus 3:4–6
    note: God calls from the bush, bids Moses remove his sandals on holy ground, and names Himself the God of the fathers.
  - ref: Exodus 3:14
    note: "God reveals His Name to Moses: “I AM WHO I AM.”"
  - ref: Exodus 3:7–15; 4:1–17
    note: God commissions Moses to deliver Israel, giving him the divine Name, the signs, and the help of Aaron.
  - ref: Mark 12:26; Luke 20:37
    note: Christ appeals to the God who spoke “in the bush” as the God of the living, in proof of the resurrection.
  - ref: Acts 7:30–35
    note: St. Stephen recounts the appearance of “an Angel” in the flame of the bush at Sinai, sending Moses to Israel.
sections:
  - heading: The Angel of the Lord and the Voice from the Bush
    body:
      - "The Burning Bush is the sharpest instance of the pattern seen throughout the Angel-of-the-Lord narratives: Exodus 3:2 says the Angel of the Lord appeared in the flame, and Exodus 3:4 says that God called to Moses out of the bush. Messenger and Sender are named almost in one breath."
      - The Church presents the text as it stands and then offers its interpretation with care. Many of the Fathers read this theophany as a manifestation of the pre-incarnate Word, who makes the Father known; the Church has not required that identification, and this record — like the Angel of the Lord page to which it belongs — keeps the biblical account and the theophany reading distinct while honoring the patristic tradition.
  - heading: The Bush and the Theotokos
    body:
      - The abiding Orthodox reading of the Burning Bush is Marian. A bush that holds the fire of God and is not consumed became, for the Fathers and hymnographers, the image of the Virgin who received God the Word into her womb and yet was not consumed but remained inviolate.
      - So the Church hails her as “the Bush unburnt,” and from Horeb’s flame arose one of her best-loved icons, the “Unburnt Bush.” This is typological interpretation — the finding of Christ and His Mother foreshadowed in the Old Testament — offered as the Church’s contemplation, not as the surface sense of Exodus.
  - heading: Holy Ground and the Fire That Does Not Consume
    body:
      - "“Put off your sandals, for the place whereon you stand is holy ground.” The command marks the encounter as a meeting with the All-Holy, and the unconsuming fire becomes an image of how the creature may draw near to God: purified, illumined, made radiant, yet not destroyed by the divine glory."
      - The Fathers, above all St. Gregory of Nyssa, read the whole scene as the beginning of the soul’s ascent — from the light of first knowledge toward the mystery of the God who is beyond all comprehension, met at last in the luminous darkness of Sinai.
  - heading: In Extra-Biblical Sources
    body:
      - Philo of Alexandria, in On the Life of Moses, gives an influential allegorical reading of the Burning Bush as a figure of the oppressed people who burn but are not consumed; later rabbinic literature develops its own rich symbolism of the bush, the fire, and the divine presence. The Book of Jubilees, retelling Moses’ early life, does not substantially expand the scene.
      - These illuminate the history of interpretation but stand outside the canon of Scripture and hold no doctrinal authority in the Church; only Philo is noted here, as extra-biblical background. Within the wider canon the deuterocanonical Wisdom of Solomon reflects on the Passover deliverance rather than the call at Horeb, so the deuterocanonical register is left empty for this event.
related:
  - name: Angel of the Lord
    note: The heavenly figure who appears in the flame of the bush — the recurring Old-Testament messenger in whom the great theophanies are read.
    href: host/HH-0019
  - name: Seraphim
    note: The highest rank, the “burning ones,” whose fiery ministry the flame of the unconsumed bush recalls.
    href: host/HH-0001
  - name: Cherubim
    note: The guardians of the divine holiness that makes the ground before the bush holy ground.
    href: host/HH-0002
  - name: Angels
    note: The general order under which the unnamed angel of the flame is most fittingly treated.
    href: host/HH-0009
  - name: Guardian Angels
    note: The wider ministry of the angels who guide and commission God’s servants, as Moses is here commissioned.
    href: host/HH-0018
  - name: Holy Prophet Moses
    note: The God-seer who beheld the bush and was commissioned at Horeb to lead Israel out of Egypt (Exodus 3–4).
    href: saint/OS-0057
    commemorated: true
  - name: Most Holy Theotokos
    note: Hailed by the Church as the Bush unburnt, who bore the divine Fire and was not consumed.
    href: saint/OS-0001
    commemorated: true
  - name: Righteous Aaron the High Priest
    note: Moses’ brother, given at the bush as his spokesman before Pharaoh (Exodus 4:14–16).
    href: saint/OS-1563
    commemorated: true
