sources:
  - Revelation 14:6–11
  - Isaiah 40:9; Isaiah 52:7; Psalm 96 (LXX 95):2–10; Daniel 4:34–35; Matthew 24:14
  - St. Andrew of Caesarea, Commentary on the Apocalypse
  - St. John of Damascus, An Exact Exposition of the Orthodox Faith; St. Dionysius the Areopagite, On the Celestial Hierarchy
  - Archbishop Averky (Taushev), The Apocalypse in the Teachings of Ancient Christianity; Fr. Lawrence Farley, The Apocalypse of St. John
  - Orthodox Study Bible; Richard Bauckham, The Theology of the Book of Revelation
overview:
  - The Angel Flying in Midheaven appears in Revelation 14:6–7, where John sees an angel “flying in the midst of heaven, having the everlasting gospel to preach to those who dwell on the earth — to every nation, tribe, tongue, and people.” With a loud voice the angel calls all humanity to “fear God and give glory to Him, for the hour of His judgment has come,” and to worship the One who made heaven and earth, the sea and the springs of water.
  - "He is the first of three angels in Revelation 14. The second follows announcing the fall of Babylon the great, and the third warning against the worship of the beast and its mark. But this first angel is set apart from most of the figures of the Apocalypse: he is not an agent of judgment but a herald. His message is at once a final invitation to repentance and a declaration that God’s judgment is near — a last universal witness before the end of the age."
  - "The word “midheaven” (Greek mesouranēma) names the highest point of the sky, the zenith at which the sun stands at noon — a place from which a proclamation could symbolically be heard across the whole world. The angel’s elevation is the sign of the universal reach of his message: no nation, tribe, tongue, or people is left outside its call."
  - Orthodox Christianity understands him as one of God’s faithful heavenly messengers, proclaiming not a new gospel but the eternal one — the timeless truth of God’s kingdom and His claim upon every creature. The “everlasting gospel” is the same good news the Church preaches; the angel reaffirms the call to worship the Creator and to be ready for the coming judgment, and his cry sounds God’s desire that every nation should hear before the end.
  - "As with the other unnamed angels of Revelation, Scripture gives him no name, and the tradition assigns him none. His importance lies wholly in his message: the eternal gospel, proclaimed to all the earth, joining in one voice the mercy that invites and the judgment that draws near."
historicalContext:
  - Revelation is the sole source for the Angel Flying in Midheaven, and — alone among the New-Testament books — it is not read in the Byzantine liturgical services, so he is known through the text, its commentary, and its Apocalypse iconography.
  - Early Christian commentators understood him as a heavenly herald proclaiming God’s final call to repentance before judgment; Byzantine interpreters, above all St. Andrew of Caesarea, emphasized the universality of the message and its place within God’s plan of salvation.
  - The figure of a herald crying good news from a high place, and the summons of all nations to worship the one God, were long familiar from the prophets — Isaiah’s herald upon the mountain (Isaiah 40:9; 52:7), and the psalms that call the nations to declare God’s glory (Psalm 96).
  - Modern Orthodox scholarship continues to read the angel symbolically, as God’s universal witness to the world — a theological proclamation of the Gospel’s reach to all peoples rather than a forecast of a particular historical messenger.
orthodoxInterpretation:
  - St. Andrew of Caesarea interprets the angel’s proclamation as God’s universal witness before the final judgment, and reads the “eternal gospel” as the unchanging truth of God’s kingdom announced to all peoples before the end.
  - St. John of Damascus teaches that the angels serve as God’s messengers and ministers; though he does not treat Revelation 14, this gives the measure of the midheaven angel — a herald bearing not his own word but God’s.
  - St. Dionysius the Areopagite explains that the angels communicate divine illumination to creation according to God’s will — the framework within which the angel’s universal proclamation is understood.
  - "Orthodox interpreters therefore stress two things: that the “eternal gospel” is not a second or different gospel but the one Gospel of Christ, so that the angel reinforces rather than replaces the Church’s preaching; and that his message joins mercy to judgment, for even at the threshold of the end humanity is summoned once more to glorify the Creator."
liturgicalTradition:
  - The Angel Flying in Midheaven has no feast and no separate commemoration; because the Book of Revelation is never appointed for reading in the Byzantine services, his proclamation sounds in no lection.
  - "His theme, however, is at the center of the Church’s life: the preaching of the Gospel to all nations. The Lord’s own word — “this gospel of the kingdom will be preached in all the world as a witness to all the nations, and then the end will come” (Matthew 24:14) — is the mission the angel’s cry proclaims from heaven, and it is the Church’s mission on earth."
  - The general ministry of the bodiless powers, of which he is a part, is honored at the Synaxis of the Archangel Michael and the Other Bodiless Powers (November 8); and his summons — “the hour of His judgment has come” — meets the faithful at the Sunday of the Last Judgment, which sets the same reckoning before them.
iconography:
  - The Angel Flying in Midheaven appears occasionally in Byzantine and post-Byzantine illustrations of the Apocalypse, generally shown flying across the sky, carrying a scroll or an open book and raising a hand in proclamation, often together with the two angels who follow him in Revelation 14.
  - He bears no fixed personal attribute beyond the scroll of the gospel and his posture of flight and proclamation, and he is not given the identifying inscriptions of the named archangels.
  - He has no standalone icon and no feast; his image belongs to the narrative cycles of the Apocalypse and the Last Judgment — as in the Bamberg Apocalypse and Dürer’s woodcut of the three angels — rather than to the icon-screen or the calendar.
historicalInfluence:
  - The image of an angel flying at the zenith of heaven with the eternal gospel became a memorable emblem of the universal reach of the Gospel — a picture of the good news proclaimed to all the earth at once.
  - It reinforced the Christian conviction that the Gospel is one and unchanging, “the same yesterday, today, and forever,” and that its preaching to every nation belongs to the shape of the end (Matthew 24:14).
  - The three angels of Revelation 14 together — the eternal gospel, the fall of Babylon, the warning against the beast — shaped Christian reflection on the last summons of mercy and the choice set before every soul before the judgment.
salvationHistory:
  - heading: The Eternal Gospel
    body:
      - The angel bears “the everlasting gospel” — not a new revelation but the timeless proclamation of God’s kingdom and His claim upon every creature, the same Gospel the Church preaches.
  - heading: To Every Nation
    body:
      - His message is “to every nation, tribe, tongue, and people” (14:6) — the universal witness God wills that all should hear before the end (cf. Matthew 24:14).
  - heading: Fear God and Worship the Creator
    body:
      - He calls humanity to “fear God and give glory to Him… and worship Him who made heaven and earth” — the summons of the psalms turned toward the whole world (Psalm 96).
  - heading: Mercy at the Hour of Judgment
    body:
      - "“The hour of His judgment has come”: the angel joins the announcement of judgment to a final call to repentance, showing that God’s judgments are preceded by the offer of mercy."
  - heading: First of the Three Angels
    body:
      - He opens the three angelic proclamations of Revelation 14 — the eternal gospel, then the fall of Babylon, then the warning against the beast — the last heralds before the harvest of the earth.
scripture:
  - ref: Revelation 14:6
    note: “Another angel flying in the midst of heaven, having the everlasting gospel to preach… to every nation, tribe, tongue, and people.”
  - ref: Revelation 14:7
    note: “Fear God and give glory to Him, for the hour of His judgment has come; and worship Him who made heaven and earth, the sea and springs of water.”
  - ref: Revelation 14:8–11
    note: The second and third angels follow — announcing the fall of Babylon, and warning against the worship of the beast and its mark.
  - ref: Isaiah 40:9
    note: “O Zion… get up into the high mountain… lift up your voice with strength… say to the cities of Judah, ‘Behold your God!’” — the herald of good news from a high place.
  - ref: Isaiah 52:7
    note: “How beautiful… are the feet of him who brings good news” — the messenger of the Gospel the angel embodies for all the earth.
  - ref: Psalm 96 (LXX 95):2–10
    note: “Declare His glory among the nations… say among the nations, ‘The Lord reigns’” — the summons of all peoples to worship the Creator and Judge.
  - ref: Daniel 4:34–35
    note: Nebuchadnezzar’s confession of God’s everlasting dominion over all the inhabitants of the earth — the universal sovereignty the angel proclaims.
  - ref: Matthew 24:14
    note: “This gospel of the kingdom will be preached in all the world as a witness to all the nations, and then the end will come” — the mission the angel’s cry declares from heaven.
sections:
  - heading: The Herald, Not the Executioner
    body:
      - "Almost every angel John sees in the middle chapters of the Apocalypse carries a judgment — a trumpet, a bowl, a sickle. This one carries a gospel. He does not strike the earth or darken the sky; he flies at its zenith and preaches, calling the nations to fear God, to glorify Him, and to worship the Creator. Among the angels of wrath he is the angel of the last mercy: before the harvest of the earth, a herald sent to the whole world."
      - The Fathers read him as God’s universal witness at the threshold of the end. His very presence declares that the judgments of the Apocalypse are not the whole of God’s heart toward the world — that even as “the hour of His judgment has come,” the invitation to turn and worship still stands, offered to every nation, tribe, tongue, and people. Judgment and mercy sound together in his single cry.
  - heading: The “Eternal Gospel” — Not a New One
    body:
      - "The angel’s message is called “the everlasting gospel,” and the word matters. It is not another gospel — Scripture warns sharply against any such thing (Galatians 1:8) — nor a secret revelation reserved for the last days. It is the eternal Gospel: the one, unchanging good news of God’s kingdom and His claim upon His creation, the same that the Lord entrusted to His Church."
      - So Orthodox tradition reads the midheaven angel as reinforcing, not replacing, the Church’s own preaching. The Gospel the Church carries to the nations and the Gospel the angel proclaims from heaven are one; his flight at the zenith is the heavenly image of the mission the Lord gave His disciples — “this gospel of the kingdom will be preached in all the world… and then the end will come” (Matthew 24:14). The angel does not bring a word the Church does not have; he proclaims, in the sight of all the earth, the word she has always preached, at the hour when the world must hear it.
