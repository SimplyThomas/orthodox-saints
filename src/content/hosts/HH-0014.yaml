overview:
  - Archangel Selaphiel (also rendered Salaphiel, Sealtiel, or Selatiel) is one of the seven principal archangels commemorated in Orthodox liturgical tradition. Unlike Michael, Gabriel, and Raphael he is not named in the canonical Scriptures of the Old or New Testaments; his place in Orthodox angelology arises from Holy Tradition, the liturgical texts, Byzantine and Slavic ecclesiastical writings, and the broader development of Christian angelology.
  - The name Selaphiel is generally derived from Hebrew roots meaning “Prayer of God,” “Intercession of God,” or “One who prays to God.” From this traditional interpretation he became the archangel associated with prayer, worship, contemplation, and the right offering of praise before God, and in Orthodox iconography and hymnography he is depicted with folded hands and bowed head, in an attitude of attentive worship.
  - Where Michael’s biblical role centers on spiritual warfare, Gabriel’s on divine proclamation, and Raphael’s on healing and guidance, Selaphiel’s traditional role concerns humanity’s relationship with prayer and worship. The Orthodox liturgical texts frequently present him as a pattern of reverent prayer and heavenly praise.
  - "The Orthodox Church carefully distinguishes figures directly revealed in Scripture from those known chiefly through ecclesiastical tradition, and Selaphiel belongs to the latter: while his existence as an angel is received within the liturgical tradition, the specific details associated with him come from post-biblical sources rather than canonical revelation."
  - Some early Christian and medieval traditions attempted to identify Selaphiel with unnamed angels of Scripture — most commonly the angel who appeared to Hagar in the wilderness (Genesis 16 and 21) — but such identifications remain speculative and are not treated as authoritative by Orthodox theology.
  - The Byzantine and Slavic churches gradually incorporated Selaphiel into the commemorations of the archangels; by the medieval period the lists of seven principal archangels commonly included Michael, Gabriel, Raphael, Uriel, Selaphiel, Jegudiel, and Barachiel, with Jeremiel sometimes added by local tradition.
  - Today Selaphiel remains part of Orthodox liturgical commemoration, iconography, and devotional culture. His significance lies not in extensive biblical narratives but in his symbolic role as a representative of prayerful worship before God and of the angelic hosts’ participation in the heavenly liturgy.
  - Orthodox theology understands Selaphiel, like all the angels, as a created spiritual being who serves God — neither an object of worship nor an independent power, but one facet of the Church’s wider understanding of the heavenly hosts and their share in God’s providence and worship.
orthodoxInterpretation:
  - St. Basil the Great discusses the angels as participants in the heavenly worship and ministers of God’s providence, though he does not name Selaphiel.
  - St. Gregory the Theologian frequently emphasizes the angelic praise and worship — the very themes later gathered around Selaphiel.
  - St. John Chrysostom describes the angels as constantly glorifying God and sharing in the heavenly worship.
  - St. Dionysius the Areopagite, in On the Celestial Hierarchy, presents the angelic hosts as engaged in continual praise and the transmission of the divine illumination.
  - St. John of Damascus teaches that the angels are rational beings whose life is devoted to the service and praise of God. No major Church Father gives an extended, independent discussion of Selaphiel by name; his associations arise from the liturgical and traditional development rather than from direct patristic teaching.
liturgicalTradition:
  - Selaphiel is commemorated with all the bodiless powers at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8, together with Michael, Gabriel, Raphael, Uriel, Jegudiel, Barachiel, and Jeremiel.
  - He appears in the Menaion, Synaxarion, Horologion, and the services of the bodiless powers, where the recurring themes are prayer, worship, heavenly praise, reverence, and attentiveness before God.
iconography:
  - Selaphiel is usually depicted as a youthful winged angel in Byzantine court garments, standing reverently with head bowed and hands crossed over the breast or folded in prayer.
  - His most characteristic symbol is the FOLDED HANDS, representing prayer and contemplation; he is occasionally shown with an incense censer, representing worship offered before God. This prayerful posture distinguishes him from Michael’s military imagery and Gabriel’s messenger imagery. His colors are blue, green, white, and gold.
  - His iconographic type emerged chiefly within the Byzantine and Russian iconography of the Seven Archangels.
historicalInfluence:
  - There is little evidence of a widespread devotion specifically to Selaphiel in the earliest centuries; through the Byzantine period the lists of seven principal archangels became increasingly standardized, and Russian iconography and liturgical texts strongly contributed to preserving his identity.
  - Most Orthodox calendars continue to include Selaphiel among the commemorated archangels. He appears in the icon cycles of the seven archangels and in fresco programs of the angelic hierarchy; his hymnography is bound to prayer and heavenly worship, and monastic writers occasionally invoke him in discussions of prayer.
sections:
  - heading: A Note on His Canonical Status
    body:
      - Selaphiel is not named in the canonical Scriptures, nor in the Deuterocanonical books, and — unlike Uriel — he is largely absent even from the major Second Temple Jewish writings such as 1 Enoch, Jubilees, and 2 Esdras. His prominence develops within Christian liturgical and ecclesiastical tradition rather than in ancient Jewish apocalyptic literature, becoming common in the Byzantine and Slavic lists of the seven archangels.
      - His place among the archangels therefore rests entirely on Holy Tradition and the liturgical life of the Church. The occasional identification of Selaphiel with the angel who comforted Hagar and Ishmael (Genesis 16; 21) is a later, speculative association and is not treated as authoritative.
  - heading: The Angel of Prayer
    body:
      - Selaphiel’s whole significance is gathered around prayer. Interpreting his name as “Prayer of God,” the tradition presents him as the archangel who stands in ceaseless intercession and worship before the throne, and as the pattern for the Church’s own life of prayer — attentiveness, reverence, and the offering of praise.
      - "This is why he is shown not as a warrior or a herald but with hands folded and head bowed: he represents the participation of the angelic hosts in the heavenly liturgy, and humanity’s calling to join that unending worship."
