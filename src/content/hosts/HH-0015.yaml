overview:
  - Archangel Jegudiel (also rendered Jehudiel, Iegudiel, Yehudiel, or Gudiel in the Greek, Slavonic, and Latinized traditions) is one of the seven principal archangels commemorated in Orthodox liturgical tradition. Unlike Michael, Gabriel, and Raphael he is not explicitly named in the canonical Scriptures; knowledge of him derives from Holy Tradition, the liturgical texts, Byzantine and Slavic ecclesiastical writings, and the later development of Christian angelology.
  - The name Jegudiel is generally interpreted as “Praise of God,” “Glory of God,” or “One who gives praise to God,” from Hebrew roots associated with thanksgiving and praise. From this, Orthodox tradition came to associate him with labor performed for God’s glory, faithful service, diligence, the stewardship of one’s responsibilities, and the offering of praise to God through one’s actions.
  - Among the seven archangels — Michael, Gabriel, Raphael, Uriel, Selaphiel, Jegudiel, and Barachiel (with Jeremiel sometimes added) — Jegudiel holds a distinctive symbolic role. Where Michael represents spiritual warfare, Gabriel divine revelation, Raphael healing, and Selaphiel prayer, Jegudiel became associated with righteous labor, perseverance, vocation, and the faithful fulfillment of the duties entrusted by God.
  - The Orthodox Church carefully distinguishes canonical revelation from later ecclesiastical tradition. No canonical text names Jegudiel, and so Orthodox teaching does not place the same doctrinal weight on the traditions concerning him as on the scriptural accounts of Michael, Gabriel, or Raphael. Yet the Church preserves his commemoration in the liturgical texts and iconography, receiving him as part of the broader tradition of the heavenly hosts.
  - Some medieval Christian writers attempted to identify Jegudiel with unnamed angels of the Old Testament, particularly the angel who guided Israel through the wilderness (Exodus 23:20–23). Such identifications remain speculative and are not universally accepted; most Orthodox sources present him through liturgical tradition rather than any claim about specific biblical appearances.
  - His prominence grew especially within Slavic Christianity. Russian iconography portrays him carrying a golden crown — the reward prepared for those who faithfully serve God — and a whip or scourge — divine correction and the consequence of spiritual negligence. These symbols developed through ecclesiastical tradition rather than direct biblical revelation.
  - "In modern Orthodox tradition Jegudiel continues to be commemorated among the archangels as a symbolic representative of faithful labor, perseverance, stewardship, and praise offered through action rather than words alone — reflecting an important theme of Orthodox spirituality: that all honest work, undertaken according to God’s will, can become an act of praise and service."
  - Orthodox theology understands Jegudiel, like all the angels, as a created spiritual being who serves God — neither worshiped nor an independent power, but one facet of the Church’s wider understanding of the ministry of the heavenly hosts and their share in God’s providential care for creation.
orthodoxInterpretation:
  - St. Basil the Great teaches that the angels are ministers of God’s providence who assist in carrying out the divine purposes, though he does not name Jegudiel.
  - St. Gregory the Theologian describes the angels as servants who glorify God and share in the divine governance — themes later gathered around Jegudiel.
  - St. John Chrysostom frequently emphasizes diligence, stewardship, and faithful service, though without mentioning Jegudiel by name.
  - St. Dionysius the Areopagite presents the angelic orders as ministers of the divine illumination and governance, the framework within which Jegudiel’s later role fits.
  - St. John of Damascus teaches that the angels are rational beings who faithfully execute God’s commands. No surviving patristic work treats Jegudiel by name; his role developed chiefly through the later liturgical and iconographic tradition.
liturgicalTradition:
  - Jegudiel is commemorated with all the bodiless powers at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8, together with Michael, Gabriel, Raphael, Uriel, Selaphiel, Barachiel, and (in many traditions) Jeremiel.
  - He appears in the Menaion, Synaxarion, Horologion, and the services honoring the bodiless powers, where the recurring themes are faithful service, praise of God, diligence, stewardship, and heavenly ministry.
iconography:
  - Jegudiel is usually depicted as a youthful winged angel in richly ornamented Byzantine court attire, standing in a posture of authority.
  - "His distinguishing symbols express his role: the GOLDEN CROWN — his most common attribute — represents the reward prepared for those who faithfully serve God; the WHIP or SCOURGE represents correction, discipline, and accountability; and he is sometimes shown with a staff or scepter of authority. His colors are gold, red, green, and white."
  - His iconographic type became standardized chiefly through the Russian and Slavic depictions of the seven archangels.
historicalInfluence:
  - Little evidence exists for a distinct devotion to Jegudiel in the earliest Christian centuries; the development of the lists of seven principal archangels through the Byzantine period established his place in Christian angelology, and Russian iconography and liturgical texts greatly expanded awareness of him.
  - He remains part of the traditional archangelic cycle commemorated in many Orthodox churches — appearing in the icon cycles of the seven archangels and in the fresco programs of the angelic hierarchy, his hymnography bound to praise, service, and diligence, and invoked by monastic writers in discussions of work, obedience, and stewardship.
sections:
  - heading: A Note on His Canonical Status
    body:
      - Jegudiel is not named in the canonical Scriptures or the Deuterocanonical books, and — like Selaphiel — he does not appear prominently in the major Second Temple writings (1 Enoch, Jubilees, 2 Esdras). Unlike Uriel and Raphael, his origins are rooted more strongly in later Christian tradition, becoming common in the Byzantine and Slavic angelological writings.
      - His place among the archangels therefore rests on Holy Tradition and the liturgical life of the Church. The occasional identification of Jegudiel with the angel who led Israel through the wilderness (Exodus 23:20–23; 32–33) is a later, speculative association and is not treated as authoritative.
  - heading: The Angel of Faithful Labor
    body:
      - "Interpreting his name as “Praise of God,” the tradition makes Jegudiel the archangel of praise offered through work: the patron of righteous labor, perseverance, stewardship, and the faithful fulfillment of the duties God entrusts. His two attributes tell the whole of it — the golden crown held out as the reward of faithful service, and the whip that recalls the discipline and accountability of those who serve."
      - "In this he embodies a characteristic theme of Orthodox spirituality: that honest work, undertaken in obedience to God’s will, is itself an act of worship — praise offered not only with the lips but with the labor of one’s hands."
