overview:
  - Archangel Uriel occupies a unique position in Orthodox angelology because, unlike Michael, Gabriel, and Raphael, he is not named in the universally recognized canonical books of Scripture. His name appears primarily in several ancient Jewish writings — especially 2 Esdras (also called 4 Ezra in many academic editions), portions of 1 Enoch, and other Second Temple literature. Despite the absence of his name from the canonical Old and New Testaments, Orthodox liturgical tradition includes him among the principal archangels commemorated by the Church.
  - The name Uriel derives from the Hebrew Uri’el, generally translated “God is my light,” “Light of God,” or “Fire of God.” These meanings have strongly shaped the traditional understanding of Uriel as the angel of divine illumination, wisdom, understanding, and revelation.
  - Within Orthodox Christianity Uriel is honored among the seven principal archangels commemorated at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8. His inclusion reflects the Church’s reception of longstanding Christian and Jewish angelological tradition rather than direct testimony from canonical Scripture.
  - His primary textual source is 2 Esdras, a work preserved in various Christian traditions and influential in early Christian thought. There Uriel serves as an interpreter of divine mysteries, explaining difficult visions and theological questions posed by the prophet Ezra, and through a series of dialogues he reveals the limits of human understanding and the transcendence of God’s wisdom.
  - Orthodox tradition generally associates Uriel with enlightenment, divine knowledge, wisdom, repentance, and spiritual insight — themes arising chiefly from his role as interpreter and revealer in the extra-biblical literature. Where Gabriel’s mission centers on proclamation and Raphael’s on healing, Uriel’s is most commonly linked with illumination and understanding.
  - The Orthodox Church carefully distinguishes canonical Scripture from later tradition. Where Michael, Gabriel, and Raphael have direct scriptural foundations, Uriel’s status rests largely on liturgical tradition, ecclesiastical reception, and the ancient Jewish writings that influenced Christian angelology. The Church does not raise those sources to the level of Holy Scripture, but acknowledges their historical significance.
  - Through Byzantine, Slavic, and later Orthodox tradition Uriel came to be depicted in iconography and hymnography as one of the great archangels standing before the throne of God, often holding symbols of divine light or wisdom in keeping with the meaning of his name.
  - Thus, in Orthodox Christianity, Uriel is a figure whose significance lies primarily in Holy Tradition and the liturgical life rather than in direct biblical revelation — an illustration of how Orthodox angelology developed through the interaction of Scripture, Jewish tradition, patristic reflection, and the worship of the Church.
orthodoxInterpretation:
  - St. Basil the Great does not discuss Uriel by name in his surviving works, but affirms the existence of ranks of angels who serve as ministers of the divine wisdom.
  - St. Gregory the Theologian’s angelology emphasizes the role of the angels in transmitting the divine illumination — the very theme later associated with Uriel.
  - St. John Chrysostom does not name Uriel, but frequently speaks of the angels as teachers and ministers of God’s providence.
  - St. Dionysius the Areopagite, though he does not name Uriel, describes the celestial beings who transmit the divine illumination through the heavenly hierarchy — the framework within which Uriel is later understood.
  - St. John of Damascus accepts the traditional angelic hierarchy and discusses the angels’ role in communicating the divine knowledge; the later Byzantine liturgical authors increasingly number Uriel among the principal archangels and connect him with wisdom and enlightenment.
liturgicalTradition:
  - Uriel is commemorated with all the bodiless powers at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8, alongside Michael, Gabriel, Raphael, Selaphiel, Jegudiel, Barachiel, and Jeremiel.
  - He appears in the Menaion, Synaxarion, Horologion, and the services honoring the bodiless powers, where he is associated with divine illumination, wisdom, understanding, and heavenly light — themes drawn from the traditional interpretation of his name.
iconography:
  - Uriel is usually depicted as a youthful winged angel in richly ornamented robes, holding a flame or fire, and often carrying a sword and a scroll, sometimes a sun-like orb.
  - "His symbols express his name and role: the FLAME represents the divine illumination and the “Fire of God”; the SCROLL, wisdom and revealed knowledge; and the SWORD, truth and discernment. His colors — gold, white, red, and orange — emphasize light, wisdom, and heavenly glory."
  - His iconography developed chiefly through the Byzantine and Slavic artistic traditions rather than from any direct biblical imagery; Russian and Slavic icons frequently show him with a flame or a fiery sword.
historicalInfluence:
  - Uriel appears in the Jewish and Christian apocalyptic literature that circulated widely in the early centuries; through the Byzantine period the liturgical texts increasingly recognized him among the seven principal archangels.
  - Most Orthodox jurisdictions continue to commemorate Uriel among the archangels while acknowledging the non-canonical nature of the primary textual sources. In art he is commonly shown among the seven archangels; in hymnography he is associated with divine wisdom and illumination; and he appears in medieval Christian writings, apocalyptic literature, and later religious poetry.
sections:
  - heading: A Note on His Canonical Status
    body:
      - Uriel is not named in the canonical Old or New Testaments, nor in the Deuterocanonical books received by the Orthodox Church. His name comes rather from ancient Jewish writings — above all 2 Esdras (4 Ezra) and portions of 1 Enoch — that lie outside the Orthodox canon. His place among the archangels therefore rests on Holy Tradition and the liturgical life of the Church, not on direct scriptural testimony.
      - "This is why the Church, while commemorating Uriel on November 8, keeps the distinction clear: the sources that name him are historically important and influenced Christian angelology, but they do not carry the authority of Holy Scripture. Uriel is honored as a received tradition, not asserted as biblical fact."
  - heading: In the Ancient Writings
    body:
      - "In 2 Esdras — his most important source — Uriel is Ezra’s heavenly guide and interpreter: he is sent to answer Ezra’s questions (4:1), explains the prophetic mysteries (5:20), teaches concerning judgment and salvation (7:1–25), and interprets the symbolic visions (10:28–59), throughout revealing the limits of human understanding before the transcendence of God’s wisdom."
      - In 1 Enoch he appears among the principal angels who oversee portions of creation and the divine judgment, and in the Testament literature he is occasionally a revealer of heavenly mysteries. These writings shaped later angelology but are not canonical Scripture in the Orthodox reckoning.
