overview:
  - The Four Angels of the Four Corners of the Earth appear in Revelation 7:1–3, just after the opening of the sixth seal. John sees “four angels standing at the four corners of the earth, holding the four winds of the earth, that the wind should not blow on the earth, on the sea, or on any tree.” Before the winds are loosed, another angel ascends “from the east” bearing the seal of the living God, and cries to the four not to harm the earth or the sea “till we have sealed the servants of our God on their foreheads.”
  - The scene is a deliberate pause between the sixth and seventh seals. Instead of hastening to further judgment, Revelation halts to show God’s mercy and the protection of His faithful. The four angels hold real authority over the forces of nature — the destroying winds are theirs to loose — yet they act only at God’s command, and they suspend the judgment until His saving purpose, the sealing of His own, has been accomplished.
  - The expression “four corners of the earth” is the ancient biblical way of naming the whole world; it no more teaches that the earth has literal corners than the “four winds” teach four literal directions. Both are figures of totality — the entire creation, the universal reach of God’s authority — and the vision uses them to proclaim that all the world lies under His hand.
  - "Orthodox Christianity understands these four as faithful heavenly ministers who reveal at once God’s power over creation and His providential care for His people. Their restraint of the winds makes visible a truth the whole Apocalypse teaches: that divine judgment is never arbitrary or premature, but falls only at God’s appointed time — and only after His servants are marked and made safe."
  - In this they are the mirror-image of another quartet in the Apocalypse. At the sixth trumpet, four angels bound at the Euphrates are loosed to bring death upon a third of mankind (Revelation 9); here, at the sixth seal, four angels hold destruction back. Revelation sets the two side by side — the loosing of judgment and the restraining of it — and both, in the end, proclaim the same sovereignty of God over the times and limits of all that befalls the world.
historicalContext:
  - Revelation is the sole source for the four angels of the corners, and — alone among the New-Testament books — it is not read in the Byzantine liturgical services, so they are known through the text, its commentary, and the iconography of the Apocalypse.
  - Early Christian writers understood the four as servants of God’s providence who restrain judgment for a time; Byzantine interpreters, above all St. Andrew of Caesarea, emphasized the mercy of the delay — that judgment waits until God’s people are sealed.
  - The imagery of angels set over the winds and the quarters of the world was familiar from an older cosmology; the Second-Temple 1 Enoch describes angels governing the winds and the four directions (1 Enoch 60; 76), the background against which John’s readers heard of four angels at the corners of the earth.
  - Modern Orthodox scholarship keeps this reading, seeing in the passage an image of God’s sovereignty, protection, and patience rather than a forecast of geopolitical events.
orthodoxInterpretation:
  - St. Andrew of Caesarea interprets the four as ministers of God’s providence who restrain the destructive forces until the servants of God have received the divine seal, and he reads the sealing as the sign of God’s protection and ownership of the faithful.
  - St. John of Damascus teaches that the angels carry out God’s commands throughout creation; though he does not treat Revelation 7, this governs the reading of the four — they wield authority over nature, but only as God directs.
  - St. Dionysius the Areopagite describes the angels as ministers through whom God orders and governs creation, the framework within which the four angels’ command over the winds is understood.
  - Orthodox commentators therefore read the passage as an image of mercy within judgment — the delay that God grants for the sake of His own — and they discourage identifying the four with particular nations, events, or future powers; St. Andrew remains the principal interpreter.
liturgicalTradition:
  - The four angels of the corners have no feast and no separate commemoration; because the Book of Revelation is never appointed for reading in the Byzantine services, their vision sounds in no lection.
  - Their theme — the sealing and protection of God’s faithful before judgment — meets the Church wherever she prays for God’s mercy and His guarding of His people, and the general ministry of the bodiless powers, of which they are a part, is honored at the Synaxis of the Archangel Michael and the Other Bodiless Powers (November 8).
  - "The sealing itself resonates with the Church’s own mysteries: as the servants of God are marked on their foreheads in the vision, so the newly baptized are sealed with the gift of the Holy Spirit — “the seal of the gift of the Holy Spirit” — a bond of belonging that the four angels’ restraint of judgment sets in the light of the end."
iconography:
  - The four angels of Revelation 7 appear occasionally in Byzantine and post-Byzantine Apocalypse cycles, commonly shown standing at the four directions of the earth and restraining the winds, while another angel approaches from the east to seal the servants of God on their foreheads.
  - They bear no individual names or attributes and have no independent iconographic tradition; their image is a scene of the narrative — the winds held, the sealing begun — rather than a standalone figure.
  - As with the other angels of the Apocalypse, their depiction is confined to illustrations of the Book of Revelation and the Last Judgment, as in the Bamberg Apocalypse and Dürer’s cycle.
historicalInfluence:
  - The image of four angels holding back the winds at the corners of the world became a memorable motif of apocalyptic art, and a lasting emblem of God’s restraint of judgment for the sake of His people.
  - The passage shaped the Christian understanding of the “seal of God” upon the faithful — a theme the Church joined to Baptism and Chrismation, the sealing of the servants of God for the day of redemption (cf. Ephesians 4:30).
  - It fed the Orthodox sense of divine patience — that God delays the winds of judgment to gather and mark His own — a note that runs through the tradition’s reflection on the mercy hidden within the severity of the end.
salvationHistory:
  - heading: Authority Over the Winds
    body:
      - The four hold “the four winds of the earth,” the destroying forces of nature, so that no wind blows — a sign of the angelic ministry set over creation, exercised only at God’s command.
  - heading: Judgment Held Back
    body:
      - "They restrain the winds not to cancel judgment but to delay it: destruction waits upon God’s word, and His word waits upon the sealing of His servants."
  - heading: The Sealing of God's Servants
    body:
      - Before the winds are loosed, the servants of God are sealed on their foreheads (7:3) — the mark of His protection and ownership, as the faithful were marked in Ezekiel 9 before Jerusalem’s judgment.
  - heading: The Whole World Under God
    body:
      - “Four corners,” “four winds” — the biblical idiom of totality — proclaim that the entire inhabited world, and every force within it, lies under the one authority of God.
  - heading: Mercy Within Judgment
    body:
      - The mirror of the four bound angels of the Euphrates who loose judgment (Rev 9), these four hold it back — Revelation showing, in the two quartets, both the severity and the patience of God.
scripture:
  - ref: Revelation 7:1
    note: “Four angels standing at the four corners of the earth, holding the four winds… that the wind should not blow on the earth, on the sea, or on any tree.”
  - ref: Revelation 7:2–3
    note: "Another angel ascends from the east with the seal of the living God, and cries to the four: do no harm “till we have sealed the servants of our God on their foreheads.”"
  - ref: Ezekiel 9:4–6
    note: God marks a sign on the foreheads of the faithful in Jerusalem before the judgment falls — the direct Old-Testament type of the sealing.
  - ref: Jeremiah 49:36
    note: “I will bring the four winds… and scatter them toward all those winds” — the four winds as the instruments of God’s judgment among the nations.
  - ref: Daniel 7:2
    note: “The four winds of heaven were stirring up the Great Sea,” from which the beasts of the kingdoms arise — the winds before the unfolding of God’s judgments.
  - ref: Zechariah 6:1–8
    note: Four chariots, “the four spirits (or winds) of heaven,” go forth from standing before the Lord of all the earth — heavenly powers sent to the four quarters.
sections:
  - heading: Two Quartets, Judgment and Mercy
    body:
      - Revelation gives us, strikingly, two companies of four angels, and the tradition reads them together by their contrast. At the sixth trumpet, four angels “bound at the great river Euphrates” are loosed to kill a third of mankind (Revelation 9:14–15) — their very nature left uncertain, holy or fallen. Here, at the sixth seal, four angels stand at the corners of the earth and hold the winds back, so that no harm may come until God’s servants are sealed (7:1–3).
      - "The one quartet unbinds destruction; the other restrains it. Set side by side they say a single thing about God: that the times and the limits of all that befalls the world are in His hand — the loosing and the holding-back alike. And they say something about His heart: that even amid the judgments of the end, He halts the storm to mark and shelter His own. The four angels of the corners are, before all else, an image of mercy set within the severity of the Apocalypse."
  - heading: Sealed for the Day of Redemption
    body:
      - "The reason the winds are held is the sealing. Before the storm may break, an angel from the east marks “the servants of our God” upon their foreheads (7:3) — the sign, as St. Andrew of Caesarea says, of God’s protection and His ownership of the faithful. The image is Ezekiel’s: in the prophet’s vision, before Jerusalem was given to judgment, a mark was set on the foreheads of those who grieved over the city’s sin, and the destroyers were forbidden to touch them (Ezekiel 9:4–6). God knows His own, and He guards them before the day."
      - The Church has always heard her own life in this. The newly baptized is anointed and “sealed with the seal of the gift of the Holy Spirit”; the faithful are those marked as God’s, kept for the day of redemption (Ephesians 4:30). The four angels of the corners hold back the winds of the end precisely so that this sealing may be finished — so that not one of God’s servants is lost when the storm at last is loosed. (The sealing angel himself, ascending from the east with the seal of the living God, is another figure, distinct from the four; he awaits his own telling.)
