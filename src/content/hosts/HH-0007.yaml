overview:
  - The Principalities are one of the traditional angelic orders in Orthodox Christian angelology. In the received ordering of the Nine Ranks of Angels they are usually placed seventh overall and first within the lowest triad (Principalities, Archangels, Angels). This classification is associated especially with the Celestial Hierarchy attributed to St. Dionysius the Areopagite and is reflected in the Orthodox synaxarial teaching for the Synaxis of the Archangel Michael and the Other Bodiless Powers, which lists the Principalities after the Powers and describes them as having oversight of the lower angels and the protection of lands, nations, and peoples.
  - The English word “principalities” translates Greek terms related to rule, beginning, authority, or principled order; in the New Testament the relevant word is often archai, rendered “principalities,” “rulers,” or “authorities” according to context. This needs care, for in Holy Scripture “principalities” does not always mean the holy angelic order — it can refer to earthly rulers, invisible powers, or hostile spiritual powers. Orthodox tradition receives the Principalities as a holy angelic rank, but individual passages must be read in context.
  - "The principal biblical foundation is Colossians 1:16, where St. Paul writes that all things were created through Christ and for Christ, including “thrones, dominions, principalities, and powers.” The passage places all invisible ranks under Christ: the Principalities are not independent divine beings nor objects of worship, but created spiritual beings, subordinate to God, within the invisible creation. St. John Chrysostom explains that Paul’s list names the greatest invisible realities precisely to show that all creation exists through Christ."
  - "Other New Testament passages use similar language to emphasize Christ’s supremacy. Ephesians 1:21 says Christ is exalted above every principality, authority, power, and dominion, and 1 Peter 3:22 says angels, authorities, and powers are subject to the ascended Christ. Orthodox angelology is never meant to distract from Christ: the angelic ranks are meaningful only within the doctrine of creation and the lordship of Christ."
  - The Principalities are traditionally associated with order, oversight, governance, and the guidance of human communities. Orthodox synaxarial tradition says they watch over the world and protect lands, nations, and peoples, and that they instruct human rulers to use their authority for God and for the good of those entrusted to them — a matter of Liturgical Tradition and later Orthodox interpretation, not a direct narrative description from Scripture.
  - The Principalities also show the importance of distinguishing holy angelic powers from fallen or hostile ones. Colossians 2:15 speaks of Christ disarming “principalities and powers,” and Ephesians 6:12 of the struggle against “principalities” associated with darkness; St. John Chrysostom reads the principalities and powers of Colossians 2:15 as diabolical powers defeated by Christ. This does not mean the holy order of Principalities is evil — rather, the same terms may be used differently depending on context.
  - Orthodox Christianity understands the Principalities as part of the bodiless powers, rational spiritual beings created good by God, commemorated collectively with the other ranks on November 8. Since no individual Principalities are named in canonical Scripture, their significance rests not on detailed narratives but on their place within the Church’s understanding of the ordered invisible creation, the ministry of angels, and the subordination of all powers to Christ.
historicalContext:
  - In the Old Testament, angelic beings often appear as messengers, warriors, guardians, or members of the heavenly court. Daniel is especially important, speaking of heavenly “princes” connected with nations, including Michael as the protector of God’s people; this does not directly identify the seventh rank, but it provides the biblical background for the later association of Principalities with peoples, nations, and ordered authority.
  - Second Temple Jewish literature developed more elaborate angelologies, with heavenly beings connected to nations, elements, stars, and sacred history. These writings help explain the conceptual world in which the New Testament language of rulers, authorities, principalities, and powers developed, though they are not equal in authority to Holy Scripture.
  - Early Christianity inherited the Jewish angelic language but transformed it through Christology. St. Paul’s concern was not to encourage speculation about angels but to proclaim Christ above every power — especially in Colossians, where a concern about angel-veneration appears (Colossians 2:18). Orthodox interpretation therefore treats the Principalities as real created beings while firmly rejecting the worship of angels. The fully organized ninefold hierarchy appears most clearly in the Dionysian tradition, dated by modern scholarship to the late fifth or early sixth century and received by Orthodox liturgical tradition as part of the Church’s inheritance.
orthodoxInterpretation:
  - St. Dionysius the Areopagite places the Principalities in the third and lowest hierarchy, together with the Archangels and Angels — the hierarchy most directly involved in revelation, guidance, and the ordered transmission of divine illumination to human beings.
  - St. Basil the Great cites Colossians 1:16 when speaking of the invisible creation, supporting the doctrine that the invisible world is created by God and is not eternal or divine in itself.
  - St. John Chrysostom emphasizes that the list in Colossians 1:16 comprehends the whole created order, including the greatest invisible beings, all existing through Christ; in Colossians 2:15 he reads “principalities and powers” as the hostile, diabolical powers defeated through Christ’s Cross.
  - St. John of Damascus teaches that the angels are rational, bodiless beings created by God, and later Orthodox summaries draw on his theology alongside the Dionysian hierarchy.
  - St. Gregory the Theologian speaks of the angels as part of the heavenly worshipping order and the invisible creation, without presenting a detailed nine-rank system.
  - St. Maximus the Confessor is important in the wider Orthodox reception of the Dionysian hierarchy, especially the idea that divine illumination is communicated in an ordered way through creation.
liturgicalTradition:
  - The Principalities are commemorated collectively at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8 (November 21 on the civil calendar for Old-Calendar churches). The OCA synaxarial text names them among the nine ranks and describes their ministry in relation to the lower angels, lands, nations, peoples, and earthly rulers.
  - The Menaion for November 8 commemorates the bodiless powers together under the leadership of the Archangel Michael; the Principalities have no separate independent feast, and the Horologion refers to the angelic hosts collectively in the daily prayers.
  - The Divine Liturgy does not usually name the Principalities individually, but it repeatedly presents earthly worship as joined to the worship of the heavenly hosts — the Cherubic Hymn and the anaphoral references to angelic worship belong to this wider framework.
salvationHistory:
  - heading: Creation
    body:
      - The Principalities belong to the invisible creation made through Christ.
  - heading: The Fall
    body:
      - Orthodox tradition distinguishes the holy Principalities from fallen principalities or hostile spiritual powers.
  - heading: Old Testament History
    body:
      - Daniel’s references to angelic “princes” provide the background for the angelic oversight of peoples and nations.
  - heading: The Incarnation
    body:
      - Christ’s coming reveals the Lord of all creation, visible and invisible.
  - heading: Christ’s Ministry
    body:
      - Angels serve Christ; the hostile powers oppose Him but cannot overcome Him.
  - heading: Crucifixion and Resurrection
    body:
      - Colossians 2:15 speaks of Christ’s victory over the hostile principalities and powers.
  - heading: The Ascension
    body:
      - Christ is exalted above every principality and power (Ephesians 1:21).
  - heading: The Life of the Church
    body:
      - Ephesians 3:10 presents the heavenly principalities and powers as beholding God’s wisdom through the Church.
  - heading: The Last Judgment
    body:
      - Christ brings every rule, authority, and power into final subjection (1 Corinthians 15:24).
iconography:
  - Because Scripture does not describe the appearance of the Principalities, Orthodox iconography depicts them symbolically, usually within the larger icons of the Nine Orders of Angels, the Synaxis of the Bodiless Powers, or the heavenly court.
  - Typical features include winged angelic form, bright garments, and staffs, scepters, or other signs of ordered authority; some traditions add attributes suggesting oversight or governance. These reflect later iconographic tradition and theological interpretation rather than a direct biblical description.
  - "Regional traditions follow the Byzantine pattern: Greek icons follow the Byzantine prototypes, especially in the Synaxis; Russian icons often label the nine ranks in full-hierarchy images; and Serbian, Romanian, Antiochian, and modern Orthodox traditions present the Principalities within the ordered ranks of the heavenly court."
historicalInfluence:
  - The Principalities contributed to the doctrine of the invisible creation and the ordered ministry of angels; their traditional association with peoples and rulers also shaped Christian reflection on authority, governance, and the responsibility of leaders under God.
  - In art they appear chiefly in icons of the Nine Orders and the Synaxis; in hymnography they are numbered among the heavenly hosts who worship God; and in church architecture the angelic ranks appear in domes, apses, and vaults, connecting earthly worship with the heavenly court. In monastic and ascetical literature the language of “principalities and powers” also fed discussions of spiritual warfare — with care, since ascetical texts may use the phrase for hostile spirits, whereas the holy order belongs to the faithful angelic ranks.
scripture:
  - ref: Colossians 1:16
    note: "The primary basis: Christ creates all things, including “thrones, dominions, principalities, and powers.”"
  - ref: Ephesians 1:20–21
    note: Christ exalted above every principality, authority, power, and dominion.
  - ref: Colossians 2:10
    note: Christ is the head over every principality and power.
  - ref: Colossians 2:15
    note: Christ disarms the principalities and powers — the HOSTILE powers defeated at the Cross, not the holy order.
  - ref: Ephesians 6:12
    note: The struggle against principalities, powers, and the rulers of darkness — again the HOSTILE spirits, distinct from the holy Principalities.
  - ref: Romans 8:38–39
    note: Neither angels nor principalities nor powers can separate believers from God’s love — such powers are created and limited.
  - ref: Ephesians 3:10
    note: God’s manifold wisdom made known through the Church to the principalities and powers in the heavenly places.
  - ref: 1 Corinthians 15:24
    note: Christ will put down every rule, authority, and power — the eschatological subjection of all opposing powers.
  - ref: 1 Peter 3:22
    note: Angels, authorities, and powers made subject to the ascended Christ.
  - ref: Daniel 10:13, 20–21
    note: The angelic “princes” of Persia and Greece, and Michael the prince — background for the angelic oversight of nations, though not a direct naming of the rank.
  - ref: Daniel 12:1
    note: Michael, “the great prince who stands for the people” — background for the angelic guardianship of peoples.
  - ref: Titus 3:1
    note: Believers subject to rulers and authorities — authority-language used of human rulers, showing the term is not always angelic.
  - ref: Tobit 12:15; 2 Maccabees 3:24–26 (Deuterocanonical)
    note: Raphael among the seven who stand before God, and the heavenly horsemen at the Temple — angelology that does not name the Principalities.
sections:
  - heading: A Note on the Word “Principalities”
    body:
      - "The Greek archai (“rulers,” “beginnings”) is used in Scripture in more than one way: for the holy angelic order, for earthly rulers and authorities (Titus 3:1), and for hostile spiritual powers that Christ disarms and defeats (Colossians 2:15; Ephesians 6:12). The holy order of Principalities must therefore be distinguished from these fallen principalities by the context of each passage, exactly as with the word “powers.”"
      - Daniel’s angelic “princes” of the nations — the prince of Persia, the prince of Greece, and Michael the “great prince” who stands for God’s people (Daniel 10; 12:1) — are the biblical seedbed for the later association of the Principalities with the guardianship of lands and peoples. But that specific ministry, like the ninefold ordering itself, belongs to the patristic and liturgical-synaxarial tradition rather than to a direct scriptural narrative about the rank.
