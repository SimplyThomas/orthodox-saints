overview:
  - The Angels at the Resurrection are the heavenly messengers who appear at the empty tomb of Christ on the morning of His rising. All four Gospels record angelic appearances at the tomb, each Evangelist emphasizing different details. The angels announce that Christ has risen, interpret the empty tomb, and commission the first witnesses to proclaim the Resurrection — not because they raise Christ, but because they serve as heaven’s witnesses to a victory over death already accomplished.
  - The Resurrection itself occurs by Christ’s own divine power, and none of the Gospels describes the moment of His rising. The Evangelists begin instead with the arrival of the Myrrh-bearing Women at the tomb, where they meet angels who interpret the emptiness they find and proclaim that the Lord is risen.
  - Matthew records that “an angel of the Lord descended from heaven, came and rolled back the stone, and sat on it” (Matthew 28:2), his appearance like lightning and his clothing white as snow, so that the guards became “like dead men”; he tells the women, “Do not be afraid… He is not here; for He is risen, as He said” (Matthew 28:5–6). Mark tells of “a young man clothed in a long white robe sitting on the right side” (Mark 16:5) — universally understood as an angel from his appearance, message, and the parallel accounts.
  - Luke records that the women met “two men in shining garments” (Luke 24:4), who recalled to them Christ’s own prophecy of His Passion and Resurrection; John that Mary Magdalene saw “two angels in white” seated where the body had lain, one at the head and one at the feet (John 20:12). The Fathers harmonize these accounts, understanding that several angels were present while each Evangelist drew out particular aspects of the encounter for his purpose.
  - Orthodox theology is careful that the angels do not cause the Resurrection. Christ rises by His own authority, fulfilling His word, “Destroy this temple, and in three days I will raise it up” (John 2:19). Nor was the stone rolled away to let Him out — the Fathers teach with one voice that the glorified Christ had no need of an opened tomb; the stone was moved so that the women, the Apostles, and later witnesses might enter and see it empty. The angel’s act serves the revelation of the Resurrection, not the Resurrection itself.
  - "So the narratives show the cooperation of heaven and earth: the Myrrh-bearing Women become the first human witnesses of the empty tomb, and the angels the first heavenly witnesses of its meaning, and together they begin the apostolic proclamation that Christ has conquered death. The angels are never named, and Orthodox tradition keeps that silence — “He is not here; for He is risen” is the message that matters, and the risen Lord, not His heralds, the one to whom every eye is turned."
historicalContext:
  - The four Gospels preserve complementary accounts of the angelic witnesses, which the early Church received as historically true while recognizing each Evangelist’s distinct emphasis.
  - Second-century writers stressed the empty tomb, the angelic proclamation, Christ’s bodily Resurrection, and eyewitness testimony, the angels serving as heaven’s confirmation of the rising.
  - The Fathers addressed the apparent differences among the accounts — the number of angels, the rolled-away stone, the women’s role — and concluded consistently that they complement rather than contradict one another; in the Byzantine period the angel’s proclamation entered Paschal hymnography, iconography, homily, and lectionary as the Resurrection became the center of Orthodox worship.
  - The Slavic Churches preserved the Byzantine interpretation while enriching the artistic depiction of the Myrrh-bearing Women and the angels; modern Orthodox theology continues to stress the angels as witnesses rather than agents of the Resurrection, and the harmony of the four accounts.
orthodoxInterpretation:
  - St. John Chrysostom explains that the angels appear not because Christ needs their help but because humanity needs trustworthy witnesses; the angel rolls away the stone so the women can see the empty tomb, not to free Christ (Homilies on Matthew, Homily 90).
  - St. Gregory the Theologian celebrates the Resurrection as the decisive victory over death, the angels proclaiming it on heaven’s behalf and inviting humanity to rejoice with the heavenly hosts (Oration 45, On Holy Pascha).
  - St. Basil the Great, though he says little of the narratives themselves, teaches that the angels rejoice in God’s saving work and faithfully carry out His commands — a ministry the angels at the tomb exemplify in their proclamation.
  - St. John of Damascus insists that Christ rose by His own divine power, the angels serving only as heralds of a Resurrection already complete; St. Dionysius the Areopagite sees in them the angelic office of communicating divine illumination to humanity, here fulfilled in announcing the central mystery of the faith.
  - St. Cyril of Alexandria explains that the angels interpret the empty tomb and turn the women toward faith in the risen Christ; St. Ephrem the Syrian sings them as joyful witnesses to the defeat of death; and St. Theophylact of Ohrid harmonizes the Gospels, teaching that several angels were present while each Evangelist tells of different ones.
liturgicalTradition:
  - "The angels of the Resurrection hold a central place in Orthodox worship: their proclamation, “He is not here; for He is risen,” becomes the Church’s own at Pascha, the Feast of Feasts. Through the whole Paschal season the angelic announcement to the Myrrh-bearing Women is recalled as the first public proclamation of Christ’s victory over death."
  - Great and Holy Saturday anticipates the Resurrection — Christ’s descent into Hades, His victory over death, the joy awaiting creation — before the angel has yet appeared in the liturgical narrative; and Pascha itself proclaims the empty tomb, the Myrrh-bearing Women, and the angel’s message, the Paschal Matins ringing with “Christ is risen from the dead, trampling down death by death.”
  - The Sunday of the Myrrh-bearing Women (the third Sunday of Pascha) commemorates the women, together with Joseph of Arimathea and Nicodemus, its Gospel centering on their discovery of the empty tomb and the angelic message — the day that most fully honors the angels as the witnesses who commission the first proclaimers of the Resurrection.
  - Throughout Bright Week and the Pentecostarion the hymns celebrate the angels at the tomb, the women’s fear turned to joy, and heaven rejoicing with earth, the angels described as radiant, robed in white, heralds of eternal life; the Paschal Canon of St. John of Damascus carries their proclamation through all fifty days.
iconography:
  - The angels at the Resurrection appear in one of the most recognizable scenes of Orthodox art, and — unlike much Western painting — Byzantine icons do not portray Christ emerging from the tomb. They focus instead on the empty tomb, the angelic announcement, the Myrrh-bearing Women, and, in the principal Paschal icon, Christ’s Descent into Hades (the Anastasis).
  - The angels are shown youthful and winged, in dazzling white, seated upon or beside the tomb and pointing toward the empty burial place; where two are depicted, one is often at the head and the other at the foot of the bench, following John 20:12. The open tomb and the folded burial cloths signify Christ’s victory and the emptiness of death’s power, the rolled-away stone usually shown nearby.
  - Following Matthew, icons often show the Roman guards fallen “like dead men,” shielding their faces, overcome by divine glory — earthly power set against heavenly authority — while the Myrrh-bearing Women approach reverently with their jars of myrrh, listening to the angels and preparing to proclaim.
  - White signifies the Resurrection, purity, and divine light; gold the heavenly glory; the dark interior of the tomb set against the radiant angels shows death overcome by life. The composition, standardized in the Byzantine period, endured with little change into the Slavic tradition, which multiplied the angels, the women, and the fallen guards.
historicalInfluence:
  - The Myrrh-bearing Women at the Tomb became one of the earliest and most enduring Resurrection scenes in Christian art, from fourth-century sarcophagi and ivories to Byzantine mosaic, illuminated Gospel, fresco, and Russian icon — the angel a central figure from the first, and Orthodox art centering on the angelic announcement rather than the moment of rising.
  - Resurrection scenes with the seated angel adorn domes, apses, narthexes, monastery churches, and baptisteries, the angel upon the stone or within the tomb serving as a visual proclamation of Pascha.
  - "Few events shaped Orthodox hymnography more: the Paschal Canon of St. John of Damascus, and the hymns of St. Romanos, St. Cosmas of Maiuma, and St. Andrew of Crete, carry the angelic proclamation through the whole paschal season."
  - In the monastic tradition the empty tomb signifies the defeat of spiritual death and the beginning of the new creation, the angels a model of the continual proclamation of God’s victory; the scene runs through Paschal homily, commentary, theological treatise, and devotional poetry.
salvationHistory:
  - heading: Proclamation of the Resurrection
    body:
      - The angels announce, “He is not here, for He is risen,” becoming the first interpreters of the empty tomb and heaven’s heralds of the victory over death.
  - heading: Confirmation, Not Cause
    body:
      - The Resurrection needs no angelic help; Christ rises by His own divine authority, and the angels proclaim only what He has already accomplished — witnesses, never agents.
  - heading: Witnesses to Fulfilled Prophecy
    body:
      - The angels recall to the women that Christ had foretold His death and rising, binding prophecy, Passion, Resurrection, and fulfillment into one.
  - heading: Commissioning the First Witnesses
    body:
      - They send the Myrrh-bearing Women to tell the disciples that Christ lives, so that heavenly proclamation becomes at once apostolic proclamation.
  - heading: Preparing the Faithful
    body:
      - The angels reveal the meaning of the empty tomb before Christ appears to many of His own, readying the disciples to understand the Resurrection.
  - heading: The Defeat of Death and the New Creation
    body:
      - Their message proclaims the central truth of the faith — that death is conquered — and inaugurates the Church’s confession that Christ is risen, the beginning of the renewal of creation.
scripture:
  - ref: Matthew 28:2–3
    note: “An angel of the Lord descended from heaven,” rolled back the stone and sat upon it, his face like lightning, his garment white as snow — the New-Testament recurrence of the title (see HH-0019).
  - ref: Matthew 28:5–7
    note: “Do not be afraid… He is not here; for He is risen, as He said” — the angelic proclamation and the sending of the women to the disciples.
  - ref: Mark 16:5–7
    note: The women see “a young man… in a white robe,” understood as an angel, who announces the Resurrection and names Peter.
  - ref: Luke 24:4–7
    note: “Two men in dazzling garments” recall Christ’s own prophecy of His crucifixion and rising on the third day.
  - ref: John 20:11–13
    note: Mary Magdalene sees “two angels in white,” one at the head and one at the feet where the body had lain, who speak with her before Christ appears.
  - ref: John 2:19
    note: “Destroy this temple, and in three days I will raise it up” — Christ rises by His own power, which the angels only proclaim.
  - ref: Acts 1:10–11
    note: The two angels at the Ascension, whom the tradition compares typologically with the two at the empty tomb.
  - ref: Psalm 16 (LXX 15):10
    note: “You will not abandon my soul to Hades” — the prophecy of the Resurrection the empty tomb fulfills.
  - ref: Hosea 6:2; Jonah 2
    note: “On the third day He will raise us up,” and Jonah three days in the fish — the prophetic foreshadowings of the third-day rising.
  - ref: 2 Maccabees 7
    note: The mother and seven sons confess the resurrection of the body — the deuterocanonical hope fulfilled in Christ’s rising.
sections:
  - heading: One Angel or Two — the Gospels Harmonized
    body:
      - "The accounts differ in number: Matthew tells of one angel who rolls back the stone, Mark of a single “young man,” Luke and John of two. The Fathers, St. Theophylact of Ohrid among them, harmonize them not by forcing one into another but by understanding that several angels were present at the tomb through the morning’s events, and that each Evangelist recorded those he was concerned to relate. The differences are the marks of independent, truthful testimony, not of contradiction."
      - For this reason the encounter is treated as a Collective, and it anchors in two places at once. Matthew’s messenger is explicitly “an angel of the Lord” (Matthew 28:2), the recurring scriptural title, so the scene belongs with the Angel of the Lord (HH-0019); the “two men in white” of Luke and John belong with the general order of the Angels (HH-0009). Scripture names none of them, and no archangel is identified.
  - heading: Witnesses, Not Agents
    body:
      - "The whole Orthodox reading turns on a single distinction: the angels do not raise Christ, and they do not free Him. He rises by His own divine authority — “I will raise it up,” He had said of His own body — and His glorified flesh had no more need of an opened tomb than it would later need an opened door in the upper room. The Fathers are emphatic on this."
      - "Why, then, the rolled-away stone? Not for Christ, but for the witnesses — so that the women and the Apostles might enter, look, and see the tomb empty. The angel’s strength serves the revelation, not the rising. The heavenly messengers are heaven’s trustworthy witnesses to what Christ has done: they proclaim, interpret, and commission, and they point away from themselves to the risen Lord."
  - heading: The Deuterocanonical Hope of Resurrection
    body:
      - "The angels proclaim a Resurrection long hoped for. Two deuterocanonical passages give that hope its clearest Old-Covenant voice, and the Church reads them in the light of the empty tomb. Wisdom of Solomon 3:1–9 — “the souls of the righteous are in the hand of God, and no torment shall touch them… their hope is full of immortality” — is sung at the burial of the faithful and on Holy Saturday. And 2 Maccabees 7, the martyrdom of the mother and her seven sons, is the boldest confession of bodily resurrection in the Greek Scriptures: “the King of the world will raise us up… to an everlasting renewal of life.”"
      - These do not narrate the empty tomb; they foreshadow the victory it reveals, as Baruch foreshadows the Incarnation announced by Gabriel. They are recorded in the deuterocanonical register precisely as hope fulfilled — the resurrection of the righteous, promised in the Law and the Prophets and the wider Scriptures, accomplished at last in the rising of Christ.
  - heading: In Extra-Biblical Sources
    body:
      - "Among the apocrypha, the second-century Gospel of Peter is the one text that actually narrates angels at the Resurrection — and it is instructive precisely by contrast. Where the canonical Gospels stop at the empty tomb and deliberately never describe the moment of rising, the Gospel of Peter dramatizes that moment: two gigantic angels descend and lead the risen Christ from the tomb, His head reaching above the heavens, followed by a talking cross. The Church does not follow this account; it is valuable only for glimpsing how early Christian imagination elaborated what the Evangelists left in reverent silence, and Orthodoxy keeps the canonical reticence."
      - "The wider Jewish literature — 1 Enoch with its radiant angels and vindication of the righteous, Jubilees, 2 Esdras with its visions of resurrection, the Testament writings with their angels proclaiming and serving before God’s throne — supplies only thematic background: the ancient expectation that angels attend God’s great saving acts and that the righteous will rise. None recounts the empty tomb, and so, apart from the Gospel of Peter noted for contrast, they are left uncited."
