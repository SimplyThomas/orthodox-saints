overview:
  - The Mighty Angel appears in Revelation 10:1–11, in the pause between the sounding of the sixth and seventh trumpets. John sees “another mighty angel coming down from heaven,” clothed with a cloud, a rainbow over his head, his face like the sun and his feet like pillars of fire. He holds a little open scroll, sets one foot upon the sea and the other upon the land, cries out with a great voice like a lion, and swears by the eternal Creator that there shall be “no more delay” before the mystery of God is finished.
  - "The angel then bids John take and eat the little scroll. It is sweet as honey in his mouth but bitter in his stomach — an image of the prophet’s calling: to receive God’s word with joy and to bear it out in the sorrow of proclaiming judgment and of watching humanity refuse to repent. So the vision recommissions John to prophesy again “about many peoples, nations, tongues, and kings.”"
  - Orthodox tradition generally understands this figure as a powerful heavenly messenger rather than one of the named archangels. His appearance resembles the descriptions of Christ elsewhere in Scripture, yet the text explicitly calls him “another mighty angel.” Most Orthodox commentators therefore distinguish him from Christ while acknowledging that he bears divine authority and reflects God’s glory.
  - His imagery gathers up the Old Testament. The cloud recalls God’s presence with Israel from the Exodus; the rainbow evokes the covenant with all creation (Genesis 9) and the rainbow round the throne (Revelation 4:3); and the little scroll takes up Ezekiel’s commission, where the prophet too is commanded to eat a scroll before he speaks God’s word (Ezekiel 2–3). The angel’s oath echoes the oath of the man clothed in linen in Daniel 12 concerning the fixed end of God’s plan.
  - "The Mighty Angel stands at an important seam of the Apocalypse. Between the trumpets already sounded and the last yet to come, he reaffirms that God’s purposes will surely be fulfilled — no more delay — and prepares John to receive and proclaim the remainder of the vision. His significance lies not in a name Scripture withholds, but in this mission: to seal the certainty of God’s word and to send the prophet back to his task."
historicalContext:
  - Revelation is the sole source for the Mighty Angel, and — alone among the New-Testament books — it is never read in the Byzantine liturgical services, so the figure is known through the text, its commentary, and its iconography rather than through the Church’s public worship.
  - "Early Christian commentators differed over his identity: some, struck by his radiant appearance, proposed that he symbolized Christ, while others read him as an exalted angelic messenger."
  - Byzantine interpretation, above all through St. Andrew of Caesarea, settled on the latter — a mighty angel commissioned by God — largely because the text itself says “another mighty angel,” marking him off from the Lamb and the Son of Man of the earlier visions.
  - Modern Orthodox scholars continue to honor the symbolic richness of the figure while holding that Revelation does not disclose his personal identity, keeping the emphasis on his role in announcing the fulfillment of God’s purposes.
orthodoxInterpretation:
  - St. Andrew of Caesarea interprets the Mighty Angel as one of God’s exalted heavenly ministers entrusted with revealing divine mysteries; he reads the little scroll as the prophetic message given to John, and the oath as underscoring the certainty of God’s plan.
  - Some early Christian commentators suggested that the angel symbolically represents Christ because of his majestic appearance — but this did not become the standard Orthodox reading, chiefly because the text calls him “another mighty angel,” distinguishing him from the Lord.
  - St. Dionysius the Areopagite gives the framework within which the figure is understood — angels as bearers of divine illumination and revelation — though he does not treat this passage; and St. John of Damascus teaches the ministry of the angels generally without commenting on Revelation 10.
  - "Orthodox interpreters therefore caution against pressing the angel’s identity beyond what Scripture grants: he is unnamed, not identified with Michael or Gabriel, and his importance lies in his mission rather than in a name."
liturgicalTradition:
  - The Mighty Angel has no feast and no liturgical commemoration; because the Book of Revelation is not appointed for reading in the Byzantine services, his vision sounds in no lection, and he is met only in the text, its commentary, and the iconography of the Apocalypse.
  - The general ministry of the bodiless powers, to which he belongs, is honored at the Synaxis of the Archangel Michael and the Other Bodiless Powers (November 8), under which the whole angelic host, named and unnamed, is commemorated; and the theme of his oath — that God’s reckoning will surely come — meets the faithful at the Sunday of the Last Judgment.
iconography:
  - The Mighty Angel appears in Byzantine and post-Byzantine cycles of the Book of Revelation, shown descending from heaven with a rainbow about his head, clothed in bright garments or a cloud, holding a small scroll, and standing with one foot upon the sea and the other upon the land — the whole figure a picture of authority over the created world.
  - He bears no fixed individual attributes beyond the little scroll and the sea-and-land stance, and he is not given the identifying inscriptions of the named archangels; the iconography follows the text’s own reticence about who he is.
  - He has no standalone icon and no feast; his image belongs to the narrative cycles of the Apocalypse — as in the Bamberg Apocalypse and Dürer’s woodcut of the angel with the little book — rather than to the icon-screen or the calendar.
historicalInfluence:
  - The angel with the little scroll, one foot on sea and one on land, became a memorable image of apocalyptic art across Christendom, from Byzantine manuscripts and the Bamberg Apocalypse to Dürer’s celebrated woodcut.
  - His act of giving John the scroll to eat carried forward the prophetic imagery of Ezekiel, binding the seer of Patmos to the prophets of Israel and shaping the Christian sense of the prophetic word as something to be inwardly received before it is proclaimed.
  - His oath — “there shall be no more delay” — fed the Church’s confidence that God’s purposes, however long deferred, are certain, a note that runs through Orthodox reflection on the end and the patience of the saints.
salvationHistory:
  - heading: The Angel of the Oath
    body:
      - Raising his hand to heaven, the Mighty Angel swears by the eternal Creator “that there should be delay no longer” (10:6) — sealing the certainty that God’s mystery will be finished, as the man in linen swore in Daniel 12.
  - heading: The Little Scroll
    body:
      - The open scroll in his hand is God’s revealed word; given to John to eat, it is received wholly into the prophet — sweet as the honey of divine revelation, bitter as the judgment it announces (cf. Ezekiel 2:8–3:3).
  - heading: The Recommissioning of the Prophet
    body:
      - By the eating of the scroll John is sent again to prophesy “about many peoples and nations and tongues and kings” (10:11) — the vision renewing his prophetic calling for all that remains of the Apocalypse.
  - heading: Glory That Is Not the Lord's Own
    body:
      - Cloud, rainbow, sun-bright face, feet of fire — his glory mirrors the divine, and some read him as Christ; yet Scripture calls him “another angel,” a creature reflecting his Maker’s light, not the uncreated Light itself.
  - heading: No More Delay
    body:
      - Standing at the seam between the sixth and seventh trumpets, he holds the whole vision together with a single assurance — that the end is fixed, the mystery near, and the word of God sure.
scripture:
  - ref: Revelation 10:1–2
    note: “Another mighty angel coming down from heaven, clothed with a cloud… a rainbow on his head… his feet like pillars of fire,” holding a little open scroll, one foot on the sea and one on the land.
  - ref: Revelation 10:3–4
    note: He cries out with a great voice like a lion; the seven thunders utter their voices, but John is told to seal what they said and not write it.
  - ref: Revelation 10:5–7
    note: He raises his hand and swears by Him who lives forever and ever that “there should be delay no longer,” and that the mystery of God will be finished.
  - ref: Revelation 10:8–11
    note: John takes and eats the little scroll — sweet in the mouth, bitter in the stomach — and is told he must prophesy again about many peoples and nations.
  - ref: Ezekiel 2:8–3:3
    note: Ezekiel is commanded to eat the scroll before prophesying, and it is “sweet as honey” in his mouth — the direct Old-Testament type of John’s commission.
  - ref: Daniel 12:5–7
    note: The man clothed in linen raises his hands to heaven and swears by Him who lives forever concerning the appointed end — the pattern of the Mighty Angel’s oath.
  - ref: Revelation 1:12–16; 4:3
    note: The risen Christ with face like the sun, and the rainbow round the throne — the divine imagery the Mighty Angel reflects, though he is “another.”
  - ref: Genesis 9:12–17
    note: The rainbow, sign of God’s covenant with all creation, set over the angel who stands astride sea and land.
sections:
  - heading: Christ, or “Another Angel”?
    body:
      - "No figure in the Apocalypse has provoked the question more sharply. The Mighty Angel is clothed with a cloud, crowned with a rainbow, his face like the sun and his feet like fire — and every one of these belongs elsewhere to the divine: the cloud of God’s presence, the rainbow round the throne (Revelation 4:3), the sun-bright face of the risen Christ (Revelation 1:16). Some early Christian writers concluded that this was the Lord Himself, appearing in glory."
      - "But the text is deliberate: “another mighty angel” — allon angelon ischyron — one more of the angelic company, marked off from the Lamb and the Son of Man already seen. The dominant Orthodox reading, following St. Andrew of Caesarea, holds him accordingly a created angel who bears God’s authority and reflects God’s glory without being God by nature. This is offered as the tradition’s reading, not as a closed dogma; it is the same “is this the Lord, or His messenger?” question that the Old Testament raises for the Angel of the Lord (HH-0019) — there often answered toward the pre-incarnate Word, here answered by most toward the creature. A creature may blaze with borrowed light; only the text can tell us which we are seeing, and here it says: another angel."
  - heading: The Scroll Sweet and Bitter
    body:
      - "The little scroll is the heart of the encounter. John does not merely read it; he is told to eat it, and it is “sweet as honey” in his mouth and “bitter” in his stomach (10:9–10). The image is Ezekiel’s: before the prophet of the exile could speak God’s word he too was made to eat a scroll, and it too was sweet as honey (Ezekiel 3:3). To take God’s word within is joy — and to carry it out into a world under judgment is grief."
      - "So the scene is a commissioning. By the eating of the scroll John is sent to “prophesy again about many peoples and nations and tongues and kings.” The sweetness and the bitterness together are the prophet’s whole vocation: the delight of the revelation given, and the sorrow of the judgment it foretells and the repentance it so often fails to win. (The nearest extra-biblical echo, Ezra drinking a fiery cup and pouring out the scriptures in 2 Esdras / 4 Ezra 14, is a later apocalyptic variation on the same motif, not a source for this scene, whose true parallel is the canonical Ezekiel.)"
