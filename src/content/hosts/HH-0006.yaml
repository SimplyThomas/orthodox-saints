  - ref: Colossians 1:16
    note: "The primary basis: Christ creates all things, including “thrones, dominions, principalities, and powers.”"
  - ref: Ephesians 1:20–21
    note: Christ exalted above every principality, power, might, and dominion.
  - ref: 1 Peter 3:22
    note: Angels, authorities, and powers made subject to the ascended Christ.
  - ref: Colossians 2:10
    note: Christ is the head over every principality and power.
  - ref: Colossians 2:15
    note: Christ disarms the principalities and powers — HOSTILE powers defeated by Christ, not to be equated with the holy order.
  - ref: Ephesians 6:12
    note: The struggle is against principalities, powers, and spiritual hosts of wickedness — again the HOSTILE powers, distinct from the holy angelic order.
  - ref: Romans 8:38–39
    note: Neither angels nor principalities nor powers can separate believers from God’s love — the spiritual powers are created and subordinate.
  - ref: Ephesians 3:10
    note: The manifold wisdom of God made known through the Church to the principalities and powers in the heavenly places.
  - ref: 1 Corinthians 15:24
    note: Christ will bring every rule, authority, and power into final subjection.
  - ref: Psalm 103:20–21 (LXX 102)
    note: The mighty angels who perform God’s word — background for angelic strength and obedience.
  - ref: Daniel 7:9–10; 1 Kings 22:19
    note: The heavenly court and host before the Lord — Old Testament background for the celestial hierarchy.
  - ref: Tobit 12:15 (Deuterocanonical)
    note: Raphael as one of the seven who stand before God — an angelological passage that does not name the order of Powers.
  - ref: 2 Maccabees 3:24–26 (Deuterocanonical)
    note: Heavenly horsemen defend the Temple — angelic intervention, not a direct reference to the Powers.
sections:
  - heading: A Note on the Word “Powers”
    body:
      - Scripture uses “powers” in more than one sense. Some “principalities and powers” belong to the holy created order and are subject to Christ (Colossians 1:16; 1 Peter 3:22); others are hostile spiritual forces that Christ disarms and defeats (Colossians 2:15; Ephesians 6:12). The holy angelic order called Powers must therefore be distinguished from these fallen powers, which is why an Orthodox account keeps the two carefully apart.
      - The order should also not be confused with the fifth rank, the Virtues. In Greek the Virtues are the Dynameis and this sixth order is the Exousiai (“authorities”); English translations, which render both by words like “powers,” blur a distinction that the Greek keeps clear. As with the rest of the hierarchy, the ninefold ordering is a patristic and liturgical synthesis of biblical terminology rather than a single scriptural passage listing all nine orders in sequence.
