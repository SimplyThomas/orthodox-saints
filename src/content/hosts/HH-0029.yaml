overview:
  - Daniel’s Angelic Visions are the series of revelations recorded chiefly in the latter half of the Book of Daniel (chapters 7–12), together with the angelic interventions found earlier in the book. They include encounters with the Archangel Gabriel, the naming of the Archangel Michael, descriptions of glorious heavenly beings, revelations of the kingdoms to come, and portrayals of the heavenly court before God.
  - Among all the books of the Old Testament, Daniel gives some of the fullest descriptions of angelic activity. Earlier Scripture often mentions angels; Daniel introduces named angels, the angelic interpretation of visions, a conflict among heavenly powers, and detailed depictions of God’s throne room. For this reason it became foundational for later Jewish angelology and for Christian teaching on the angels.
  - The first angelic figure named is Gabriel, who comes to explain Daniel’s visions (Daniel 8:16; 9:21–23), serving as the heavenly interpreter who unfolds the meaning of what Daniel has seen. Michael, called “one of the chief princes” and “the great prince who stands watch over your people” (Daniel 10:13; 12:1), appears as the heavenly protector of God’s people.
  - "The visions also present unnamed heavenly beings: in Daniel 7 the Ancient of Days is seated in judgment, attended by thousands upon thousands; Daniel 10 describes a radiant messenger whose appearance shaped later Christian depictions of the angels; and the book speaks of angelic “princes” bound up with earthly kingdoms, introducing the idea of spiritual powers set over the nations."
  - Orthodox Christianity receives Daniel’s visions as true prophetic revelations given by God, disclosing both the course of earthly history and the realities of heaven. The angels here serve God’s purposes, communicate His revelation, protect His people, and share in the cosmic struggle against evil.
  - The book is especially important because it names Michael and Gabriel long before their New-Testament appearances — Gabriel to Zechariah and to the Virgin in Luke, Michael as leader of the hosts in the Apocalypse — and because its heavenly-court scenes, its radiant messenger, and its vision of the Son of Man shaped Orthodox liturgy, iconography, hymnography, and Christology. Unlike the single-event encounters, Daniel’s visions are a sustained unveiling of heaven, and among the richest of all sources for Orthodox angelology.
historicalContext:
  - The early Church read Daniel as a prophetic witness to Christ and to the heavenly realm, drawing on his visions for both angelology and eschatology.
  - In the Byzantine period Daniel became foundational for the doctrine of the angels and for the Church’s expectation of the end, and his radiant messenger and heavenly court entered deeply into iconography.
  - The Slavic tradition expanded the iconographic programs depicting Michael, Gabriel, and the apocalyptic scenes drawn from Daniel.
  - Modern Orthodoxy continues to regard the book as one of the most important scriptural sources on the angels and the heavenly world.
orthodoxInterpretation:
  - St. Basil the Great cites Daniel when teaching on the angels and heavenly powers, taking the visions as evidence of the ordered ministry of the angels under God.
  - St. Gregory the Theologian appeals to Daniel’s heavenly visions in speaking of divine transcendence and revelation, and of the limits of human understanding before the mysteries of heaven.
  - St. John Chrysostom dwells on God’s protection of Daniel and reads the angelic interventions as demonstrations of divine providence.
  - St. John of Damascus draws extensively on Daniel in his teaching on the angels as intelligent, bodiless beings who carry out God’s commands.
  - St. Dionysius the Areopagite appeals to Daniel — the Ancient of Days and the thousands who minister before Him — in expounding the celestial hierarchy and the worship of heaven.
  - St. Hippolytus of Rome and St. Jerome composed the great early commentaries on Daniel, emphasizing prophecy and the last things, and St. Gregory of Nyssa cites the book in his teaching on resurrection and judgment.
liturgicalTradition:
  - "Daniel’s visions stand behind the feasts of the archangels: the Synaxis of the Archangel Michael and the Other Bodiless Powers (November 8) and the Synaxis of the Archangel Gabriel (March 26; and July 13)."
  - The imagery of the heavenly court in Daniel 7 — the Ancient of Days and the thousands who serve Him — is echoed in the Cherubic Hymn and the heavenly-worship imagery of the Divine Liturgy.
  - The Prophet Daniel and the Three Holy Youths are commemorated together on December 17 and among the Holy Forefathers before the Nativity, and their deliverance from the furnace and the lions’ den is sung in the Church’s hymnography.
  - The Menaion and Horologion draw on Daniel for their portrayal of Michael and Gabriel and for the invocation of angelic protection.
iconography:
  - Gabriel is depicted as a youthful winged messenger bearing a staff, orb, or scroll — the interpreter of the visions.
  - Michael is depicted as a heavenly commander in armor, with sword or spear — the warrior-prince who stands watch over God’s people.
  - The radiant messenger of Daniel 10 — clothed in linen, girded with gold, his face like lightning and his eyes like flaming torches — shaped the iconographic type of the glorious heavenly being.
  - The colours are read as elsewhere — gold for divine glory, white for purity, blue for heaven, red for divine power — and Daniel’s throne-room and apocalyptic scenes strongly influenced Byzantine depictions of the heavenly court.
historicalInfluence:
  - Daniel is a principal source for the Christian depiction of Gabriel and Michael and for the imagery of the heavenly court and the apocalyptic visions.
  - Its visions shaped the feasts of the archangels and the hymnography of angelic worship, and served the monastic tradition in its teaching on spiritual warfare and prayer.
  - The book profoundly influenced Christian apocalyptic literature and the theology of the last things, from the early commentaries onward.
salvationHistory:
  - heading: The Angel of Deliverance
    body:
      - "Before the visions proper, angels deliver God’s servants: the fourth figure “like a son of the gods” in the fiery furnace and the angel who shuts the lions’ mouths for Daniel (Daniel 3:24–28; 6:22)."
  - heading: The Watchers and the Ancient of Days
    body:
      - A holy “watcher” descends to announce God’s decree over Nebuchadnezzar (Daniel 4), and Daniel beholds the Ancient of Days enthroned in fire, served by thousands of thousands (Daniel 7:9–10).
  - heading: Gabriel the Interpreter
    body:
      - The Archangel Gabriel is sent to make Daniel understand the visions — the ram and the goat, and the mystery of the Seventy Weeks that points toward the Anointed One (Daniel 8:16; 9:21–27).
  - heading: The Radiant Messenger
    body:
      - By the Tigris Daniel sees a man clothed in linen, girded with gold, his face like lightning, whose coming has been withstood twenty-one days by the “prince of Persia” (Daniel 10:5–14).
  - heading: Michael the Guardian Prince
    body:
      - Michael, “one of the chief princes,” comes to the messenger’s aid, and is named “the great prince who stands watch over the sons of your people” (Daniel 10:13, 21; 12:1).
  - heading: The Princes of the Nations
    body:
      - The vision discloses a conflict among heavenly powers — the princes of Persia and of Greece — the scriptural root of the teaching on angelic governance set over the nations (Daniel 10:20–21).
scripture:
  - ref: Daniel 7:9–14
    note: The Ancient of Days is enthroned in judgment, served by thousands of thousands, and One like a Son of Man is brought before Him — a vision central to Orthodox Christology.
  - ref: Daniel 8:15–26
    note: Gabriel — named for the first time in Scripture — is bidden, “make this man understand the vision,” and interprets the ram and the goat.
  - ref: Daniel 9:21–27
    note: Gabriel returns at the hour of the evening sacrifice to reveal the prophecy of the Seventy Weeks.
  - ref: Daniel 10:5–21
    note: The radiant man clothed in linen appears; the “prince of Persia” withstands him, and Michael, one of the chief princes, comes to help.
  - ref: Daniel 12:1
    note: “At that time Michael shall stand up, the great prince who stands watch over the sons of your people” — Michael as guardian of God’s people.
  - ref: Daniel 4:13–17; 6:22
    note: A holy watcher announces God’s decree, and an angel shuts the lions’ mouths — angelic judgment and protection in the earlier chapters.
  - ref: Luke 1:19, 26; Revelation 12:7–9; Jude 9
    note: Gabriel and Michael continue their Danielic ministries into the New Testament — Gabriel the herald, Michael the warrior-prince.
sections:
  - heading: The Book That Named the Archangels
    body:
      - Daniel is the hinge of biblical angelology. Before it, angels appear and act but go unnamed; in Daniel, for the first time in Scripture, an angel is called by his own name — Gabriel — and a second, Michael, is named as the great prince of God’s people. The nameless “Angel of the Lord” of the earlier books gives way here to distinct, named heavenly persons.
      - This is why Daniel’s visions anchor not to the Angel of the Lord but to the Archangels themselves. Gabriel the interpreter and Michael the guardian step out of these pages and into the Gospel and the Apocalypse, and from Daniel the Church drew much of what it sings and paints of them.
  - heading: The Princes of the Nations
    body:
      - One of the most remarkable disclosures of Daniel 10 is that behind the kingdoms of the earth stand angelic “princes.” The messenger is withstood by “the prince of Persia” and looks ahead to “the prince of Greece,” while Michael contends as the prince of Israel.
      - Orthodox tradition finds here the scriptural root of the teaching that angelic powers — the Principalities — are set by God over the nations, and that human history has a hidden dimension of spiritual struggle. This is interpretation built upon the vision, offered as the Church’s reading and not as an added revelation.
  - heading: The Watchers — Holy, Not Fallen
    body:
      - Daniel 4 speaks of a “watcher, a holy one” who comes down from heaven to announce God’s decree. In Daniel these watchers are obedient heavenly beings, ministers of the divine judgment.
      - It is important not to confuse them with the “Watchers” of 1 Enoch, where the term is used chiefly for the fallen angels of Genesis 6 who transgressed and were bound. The same word names very different beings, and Orthodox reading keeps Daniel’s holy watchers distinct from the fallen watchers of the extra-biblical literature.
  - heading: The Angels of the Greek Additions
    body:
      - The Church’s Daniel, following the Septuagint, is fuller than the Hebrew, and its deuterocanonical additions are themselves rich in angels. In the Song of the Three Holy Children, “the angel of the Lord came down into the furnace” and drove out the flame, making its midst as a dew-laden breeze; in Bel and the Dragon, an angel of the Lord seizes the prophet Habakkuk by the hair and carries him to feed Daniel in the lions’ den.
      - These belong to the anagignoskomena — the books read and honored in the Orthodox Church though held distinct from the protocanonical Scriptures — and are recorded here in their proper register, neither confused with the Hebrew text nor with the non-canonical apocalypses.
  - heading: In Extra-Biblical Sources
    body:
      - The Second-Temple literature that gathered around Daniel’s themes — 1 Enoch above all, with Jubilees and 2 Esdras (4 Ezra) — greatly expands the traditions of the watchers and names the archangels Michael, Gabriel, Raphael, and Uriel.
      - This literature shaped later Jewish and Christian imagination and is valuable for the history of angelology, but it stands outside the canon of Scripture and carries no doctrinal authority in the Church. It is noted here as extra-biblical background, distinct from both the canonical and the deuterocanonical Daniel.
