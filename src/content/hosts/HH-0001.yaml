overview:
  - The Seraphim (Hebrew śərāfîm, “burning ones”) are one of the highest angelic orders recognized in Orthodox Christian theology. They are most famously described in the vision of the Prophet Isaiah, where they stand around the throne of God and continually proclaim His holiness.
  - In Orthodox tradition the Seraphim belong to the highest triad of the Nine Orders of Angels. Following the hierarchy described by Pseudo-Dionysius the Areopagite and later received by much of the Orthodox Church, the Seraphim occupy the highest rank, above the Cherubim and the Thrones.
  - The primary biblical description appears in Isaiah’s vision of the heavenly throne room, where the Seraphim are depicted as six-winged beings who surround God in perpetual worship. Their cry, “Holy, Holy, Holy,” became one of the most important liturgical texts in Christianity and remains central to Orthodox worship today.
  - Orthodox theology understands the Seraphim not merely as symbolic figures but as real angelic beings. Their name emphasizes their fiery nature — not physical fire but spiritual ardor, purity, and nearness to God. Patristic writers consistently interpret the fire associated with the Seraphim as divine illumination, purification, and love.
  - The Seraphim appear comparatively rarely in Scripture beside the angels, cherubim, and archangels. Nevertheless their influence on Orthodox theology, iconography, hymnography, and liturgical worship is immense; their imagery helped shape the Christian understanding of heavenly worship and of the angelic hierarchy itself.
  - Orthodox tradition also associates the Seraphim with humanity’s calling to union with God. While angels and humans remain distinct orders of creation, the fiery love attributed to the Seraphim serves as a model for the transformation sought in the Christian life.
  - The Church’s liturgical texts frequently invoke the Seraphim together with the Cherubim as representatives of the heavenly hosts. During the Divine Liturgy the faithful join their praise to that of the Seraphim in singing the Sanctus (“Holy, Holy, Holy”), echoing Isaiah’s vision.
  - Although later Jewish and Christian literature expands upon the Seraphim, Orthodox doctrine remains grounded primarily in the canonical witness of Isaiah and the theological synthesis of the Church Fathers.
historicalContext:
  - In ancient Israel the Hebrew term seraph originally means “burning one.” In the Old Testament the root is also used of the fiery serpents of Numbers 21:6, though Isaiah’s Seraphim are clearly heavenly beings serving in God’s presence.
  - In the Second Temple period Jewish literature increasingly developed descriptions of the heavenly hierarchies, and angelic worship became a major theme — providing the background for later Christian angelology.
  - Early Christians inherited Isaiah’s throne-room vision and interpreted it christologically. The heavenly worship Isaiah described became a model for earthly worship, especially the Eucharistic liturgy.
orthodoxInterpretation:
  - St. Dionysius the Areopagite, in On the Celestial Hierarchy, places the Seraphim at the summit of the angelic orders; their fiery name signifies their closeness to God and their role in transmitting divine illumination to the lower ranks.
  - St. Basil the Great teaches that the angels participate in the service of God and are ordered according to differing ministries and ranks.
  - St. Gregory the Theologian (Nazianzen) frequently references heavenly worship and angelic praise as models for Christian worship.
  - St. John Chrysostom links the Sanctus of the Divine Liturgy directly to Isaiah’s vision, so that the worshipping Church joins the song of the Seraphim.
  - St. John of Damascus accepts the traditional angelic hierarchy and describes the angels as incorporeal, rational beings.
liturgicalTradition:
  - The Seraphim have no separate feast of their own; they are commemorated collectively at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8 (November 21 on the civil calendar for Old-Calendar churches).
  - In the Divine Liturgy the Sanctus quotes Isaiah 6:3 — “Holy, Holy, Holy, Lord of Sabaoth; heaven and earth are full of Thy glory” — so that the faithful join the unceasing praise of the Seraphim.
  - The Cherubic Hymn, though named for the Cherubim, likewise expresses the Church’s participation in the angelic worship of heaven.
  - The Menaion and Horologion frequently mention the Seraphim alongside the Cherubim and the heavenly hosts in festal hymnography.
salvationHistory:
  - heading: Creation
    body:
      - The Seraphim are present among the heavenly hosts created by God before the visible world.
  - heading: The Fall
    body:
      - They remain faithful to God and take no share in the rebellion of the fallen angels.
  - heading: Old Testament
    body:
      - They appear in the prophetic vision of Isaiah, surrounding the throne of God and cleansing the prophet’s lips with a burning coal.
  - heading: The Incarnation
    body:
      - The worship offered by the Seraphim is understood to continue unbroken before Christ enthroned.
  - heading: Christ’s Ministry
    body:
      - Angels minister to Christ throughout His earthly ministry.
  - heading: Resurrection and Ascension
    body:
      - They share in the heavenly worship surrounding the risen and ascended Christ.
  - heading: The Last Judgment
    body:
      - They remain attendants of God’s throne and witnesses of the divine judgment.
iconography:
  - In traditional Orthodox iconography the Seraphim are shown as six-winged beings, often with only the face and wings visible, arranged in a circle around the divine glory.
  - Their coloration is characteristically red or fiery. The six wings follow Isaiah 6; the fire signifies purification and divine love; the red denotes heavenly flame; and eyes shown upon the wings, in some depictions, signify spiritual perception.
  - "Regional traditions vary within a common Byzantine inheritance: Byzantine art favors stylized red six-winged forms; Greek iconography sets them in liturgical and apse decoration; Russian iconography develops highly detailed celestial imagery; and Serbian, Romanian, and Antiochian traditions follow Byzantine-derived models."
historicalInfluence:
  - The imagery of the Seraphim shaped Byzantine church decoration and dome iconography, the development of Christian angelology, and liturgical hymnography.
  - Their fiery love also marked monastic spirituality and Christian literature on heavenly worship, leaving a lasting imprint on medieval and Byzantine art.
scripture:
  - ref: Isaiah 6:1–7
    note: "The primary and foundational source: six-winged Seraphim surround God’s throne, proclaiming “Holy, Holy, Holy.”"
  - ref: Isaiah 6:6–7
    note: A Seraph touches Isaiah’s lips with a live coal — a symbol of purification and preparation for prophetic ministry.
  - ref: Revelation 4:8
    note: Four living creatures continuously proclaim God’s holiness; patristic commentators connect them with Isaiah’s heavenly worship.
  - ref: Hebrews 12:22–24
    note: The heavenly assembly of angels around God, supporting the Christian understanding of angelic worship.
  - ref: Daniel 7:9–10
    note: Heavenly attendants before God’s throne — context for the celestial liturgy.
related:
  - name: Cherubim
    note: The second angelic order, invoked together with the Seraphim as the nearest of the heavenly hosts.
  - name: Thrones
    note: The third order, completing the highest triad with the Seraphim and Cherubim.
  - name: Archangel Michael
    note: Commander of the heavenly hosts, with whom all the bodiless powers are commemorated on November 8.
  - name: Prophet Isaiah
    note: The prophet who beheld the Seraphim about the throne of God and whose lips were cleansed by the live coal.
