  - St. John of Damascus, An Exact Exposition of the Orthodox Faith; Pseudo-Dionysius the Areopagite, On the Celestial Hierarchy
  - Menaion (Nov 8); Horologion; Divine Liturgy of St. John Chrysostom; Orthodox Church in America
