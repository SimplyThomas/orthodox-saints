sources:
  - Genesis 3:22–24; Exodus 25:18–22; 26:1, 31; Numbers 7:89; 1 Kings 6:23–35; Psalms 18 (LXX 17); 80 (LXX 79); 99 (LXX 98); Ezekiel 1; 10; 11
