  - St. Basil the Great, Hexaemeron; On the Holy Spirit
  - St. John Chrysostom, Homilies on Genesis; St. Gregory the Theologian, Orations; St. John of Damascus, An Exact Exposition of the Orthodox Faith; St. Dionysius the Areopagite, On the Celestial Hierarchy
  - St. Ephrem the Syrian, Hymns on Paradise; St. Maximus the Confessor, Ambigua
  - Menaion (November 8); Horologion; Triodion (Forgiveness Sunday); Divine Liturgy of St. John Chrysostom
