overview:
  - The Cherubim Guarding Eden are among the earliest angelic beings explicitly named in Holy Scripture. Immediately after the expulsion of Adam and Eve from Paradise, God stations them east of the Garden of Eden, together with a flaming sword turning every way, to guard the way to the Tree of Life (Genesis 3:24).
  - "Orthodox Christianity reads this event not merely as punishment but as a decisive moment in salvation history. The cherubim are heavenly guardians of sacred space and a visible sign of the separation, opened by sin, between fallen humanity and the divine life the Tree of Life represents. Their presence sets in motion themes that recur throughout Scripture: holiness, divine glory, sacred boundaries, and the eventual restoration of humanity in Christ."
  - These are not portrayed as ordinary angels. Throughout the Bible the cherubim appear bound up with God’s throne, His glory, and the worship of heaven — guarding Eden in Genesis, overshadowing the Ark and woven into the Tabernacle and Temple, and borne up as the living throne-chariot in the visions of Ezekiel.
  - Orthodox theology generally understands the cherubim of Eden as members of the angelic rank known as the Cherubim — traditionally the second order of the celestial hierarchy described by St. Dionysius the Areopagite, ranked beneath the Seraphim. Their guarding of Eden is thus an earthly manifestation of a broader heavenly ministry.
  - The Fathers read the guarding of Eden as at once historical and symbolic. Historically, the cherubim keep fallen humanity from eating of the Tree of Life in a corrupted state; symbolically, they embody the barrier raised by sin and the need for reconciliation with God. Orthodox hymnography repeatedly sets the closing of Paradise by the cherubim against its reopening through the Cross, the Resurrection, and the entry of the Good Thief.
  - The image of cherubim guarding holy places became deeply embedded in Orthodox worship and architecture — on iconostases, church domes, liturgical textiles, and sacred vessels — while the Cherubic Hymn of the Divine Liturgy sets the faithful mystically among these heavenly worshippers. So the guarding of Eden marks humanity’s exile even as it points forward to the restoration of communion with God through Jesus Christ, who opens once more the way to the Tree of Life.
historicalContext:
  - In the early Church attention fell on the biblical symbolism of the cherubim as guardians of Paradise and worshippers before God, read within the wider story of the Fall and its healing.
  - Through the Byzantine period the connection between the cherubim and the worship of heaven grew ever stronger, above all through the Cherubic Hymn and the increasingly rich cherubic imagery of church decoration.
  - The Slavic tradition inherited these readings and gave cherubic imagery special prominence on the icon screen and beneath the dome.
  - Modern Orthodoxy continues to see in the cherubim a sign of heavenly worship and divine mystery, and reads the guarding of Eden within the whole arc of exile and restoration.
orthodoxInterpretation:
  - St. Basil the Great speaks of the angelic orders as ministers of divine governance and associates the cherubim with divine wisdom and contemplation (Hexaemeron; On the Holy Spirit).
  - "St. John Chrysostom, preaching on Genesis, stresses God’s mercy even in the expulsion: the cherubim are set at Eden not as merely punitive sentinels but within God’s providential care for fallen humanity."
  - St. Gregory the Theologian links the cherubim with the knowledge of divine mysteries and the worship of heaven.
  - St. John of Damascus describes the cherubim as rational, spiritual beings who surpass the lower orders in knowledge and nearness to God (An Exact Exposition of the Orthodox Faith, Book II).
  - St. Dionysius the Areopagite, in On the Celestial Hierarchy, places the Cherubim second among the nine ranks — beneath the Seraphim and above the Thrones — and associates them with divine wisdom, illumination, and the contemplation of God; the guardians of Eden are traditionally identified with this rank.
  - St. Ephrem the Syrian, in the Hymns on Paradise, dwells on the guarded Paradise and its restoration in Christ, while St. Maximus the Confessor sets Paradise and its guardians within a cosmic theology of humanity’s union with God.
liturgicalTradition:
  - The cherubim have no feast of their own; they are commemorated with the whole angelic host at the Synaxis of the Archangel Michael and the Other Bodiless Powers (November 8).
  - At every Divine Liturgy the faithful sing the Cherubic Hymn — “Let us who mystically represent the Cherubim…” — joining their own worship to that of the heavenly powers.
  - Cherubic imagery and Paradise themes recur through the Menaion, the Horologion, and the funeral services, where the reopened Paradise is set against the Eden once closed by the cherubim.
  - The Triodion’s Forgiveness Sunday — the Sunday of the Expulsion of Adam from Paradise — brings the Edenic scene directly into the Church’s worship on the threshold of Great Lent.
iconography:
  - Cherubim are commonly depicted as winged heavenly beings — six-winged or many-winged forms, sometimes as a face surrounded by wings, and often as fiery figures; in Byzantine art they are characteristically blue.
  - "Their colours carry meaning: blue for heavenly mystery, gold for divine glory, white for purity, red for divine fire."
  - Early Christian art tended to render them symbolically; the Byzantine period developed the familiar winged cherubic face, and the Slavic tradition expanded their use across iconostases and domes.
  - The specific scene of the cherubim at Eden appears within depictions of the expulsion of Adam and Eve, where the winged guardian and the flaming sword bar the gate of Paradise.
historicalInfluence:
  - The cherubim became among the most common angelic forms in Byzantine and later Orthodox art, adorning domes, apse mosaics, iconostases, and sanctuary veils.
  - Through the Cherubic Hymn they stand at the heart of the Church’s liturgical self-understanding, and Paradise imagery invoking the cherubim runs through monastic and ascetical literature.
  - The guarding of Eden is discussed at length in the patristic commentaries on Genesis, shaping Christian reflection on sin, exile, and the restoration of Paradise in Christ.
salvationHistory:
  - heading: Guardians of the Gate
    body:
      - They guard the entrance to Eden and bar the way to the Tree of Life, so that fallen humanity may not eat of it while still in a corrupted state (Genesis 3:22–24).
  - heading: Sign of Exile
    body:
      - Set visibly at the gate of Paradise, the cherubim embody the consequence of the Fall — humanity’s estrangement from the divine life it was made to share.
  - heading: Custodians of Sacred Space
    body:
      - The Edenic guardianship becomes the pattern for every later sacred boundary — the cherubim woven into the Tabernacle veil, overshadowing the Ark, and carved in Solomon’s Temple around the Holy of Holies.
  - heading: Throne-Bearers of God
    body:
      - Beyond Eden the cherubim appear as bearers of God’s throne and glory — God is enthroned upon the cherubim (Psalms 80; 99) and rides upon them (Psalm 18), and Ezekiel beholds them upholding the divine chariot.
  - heading: Preparation for Redemption
    body:
      - "The closed gate of Paradise anticipates its reopening: what the cherubim guard, Christ restores through His Cross and Resurrection, leading the Good Thief that same day into Paradise."
scripture:
  - ref: Genesis 3:22–24
    note: "The foundational passage: God places the cherubim and a flaming sword east of Eden to guard the way to the Tree of Life."
  - ref: Exodus 25:18–22
    note: Two golden cherubim overshadow the mercy seat of the Ark, where God promises to meet and speak with Moses.
  - ref: Exodus 26:1, 31
    note: Cherubim are woven into the curtains and the veil of the Tabernacle, marking the boundary of sacred space.
  - ref: Numbers 7:89
    note: God’s voice speaks to Moses from between the two cherubim above the mercy seat — the cherubim bound to divine revelation.
  - ref: 1 Kings 6:23–35
    note: Two great cherubim of olive wood overshadow the Holy of Holies in Solomon’s Temple, and cherubim are carved throughout it.
  - ref: Psalm 80:1 (LXX 79:2); Psalm 99:1 (LXX 98:1)
    note: God is enthroned upon the cherubim — the throne-imagery that underlies their guardianship of the holy.
  - ref: Ezekiel 1; 10; 11
    note: Ezekiel beholds the living cherubim who bear up the throne-chariot of the glory of God.
  - ref: Hebrews 9:5
    note: The Apostle recalls the cherubim of glory overshadowing the mercy seat within the earthly sanctuary.
  - ref: Revelation 4:6–8
    note: The four living creatures before the throne are widely associated with the cherubic and seraphic imagery of the Old Testament.
sections:
  - heading: Why the Gate Was Closed
    body:
      - "Genesis gives the guarding of Eden a specific purpose: “lest he put out his hand and take also of the tree of life, and eat, and live forever” (Genesis 3:22). The Fathers read this not as divine grudging but as mercy — for humanity to be fixed forever in a fallen, mortal condition would be a greater ruin than exile."
      - "So the flaming sword and the cherubim are, in the patristic reading, an act of God’s providence as much as of His justice: the gate is closed so that it may one day be opened aright, when human nature has been healed in Christ."
  - heading: From the Gate of Eden to the Veil of the Temple
    body:
      - The cherubim of Eden are the first of a series. The same beings are woven into the veil of the Tabernacle, overshadow the mercy seat of the Ark, and stand carved around the Holy of Holies in Solomon’s Temple — everywhere marking the threshold of the divine presence.
      - Orthodox theology sees this as one continuous symbolism of sacred boundary, carried at last into the church building itself, where cherubic imagery surrounds the sanctuary and the altar. The gate the cherubim once guarded becomes the sanctuary the Church now approaches through Christ.
  - heading: Paradise Reopened
    body:
      - "The deepest Orthodox reading of the guarded Eden is Paschal. The gate closed by the cherubim is the gate Christ reopens: by His Cross He disarms the flaming sword, and by His Resurrection He leads humanity back toward the Tree of Life, of which His own Cross is called the true and life-giving Tree."
      - The liturgical texts make the connection explicit, above all in the hymnography of the Cross and of Pascha, and in the promise to the Good Thief — “Today you shall be with Me in Paradise” — the first to enter the Paradise once barred. This is a theme of the Church’s prayer and patristic contemplation, drawn from Scripture rather than defined as a separate doctrine.
  - heading: In Extra-Biblical Sources
    body:
      - The Jewish literature of the Second Temple period develops the cherubim well beyond the biblical text. 1 Enoch numbers cherubic beings among the fiery orders surrounding God’s throne, and the Book of Jubilees expands the account of Paradise and its angelic guardians.
      - These writings illuminate the wider world of ancient Jewish angelology, but they stand outside the canon of Scripture and carry no doctrinal authority in the Church. They are recorded here as extra-biblical background only; no deuterocanonical (anagignoskomena) book names the cherubim of Eden, so that register is left empty.
related:
  - name: Cherubim
    note: The second angelic rank, to which the guardians of Eden belong — bearers of divine wisdom and the throne of God.
    href: host/HH-0002
  - name: Seraphim
    note: The first and highest rank, above the Cherubim in the celestial hierarchy.
    href: host/HH-0001
  - name: Thrones
    note: The third rank, completing with the Seraphim and Cherubim the first and highest triad.
    href: host/HH-0003
  - name: Guardian Angels
    note: The angelic ministry of protection extended to human beings, as the cherubim once guarded the gate of Paradise.
    href: host/HH-0018
  - name: Righteous Forefather Adam
    note: Whose expulsion from Paradise the cherubim guard (Genesis 3); commemorated among the Holy Forefathers.
    href: saint/OS-2524
    commemorated: true
  - name: Prophet Ezekiel
    note: Who beheld the living cherubim bearing up the throne-chariot of God’s glory (Ezekiel 1; 10).
    href: saint/OS-1564
    commemorated: true
  - name: Holy Prophet Moses
    note: Who, at God’s command, set golden cherubim over the Ark and wove them into the Tabernacle (Exodus 25–26).
    href: saint/OS-0057
    commemorated: true
  - name: Prophet-King Solomon
    note: Who overshadowed the Holy of Holies of the Temple with two great cherubim (1 Kings 6).
    href: saint/OS-2357
