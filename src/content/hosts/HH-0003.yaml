sections:
  - heading: A Note on the Word “Thrones”
    body:
      - In Scripture the word “thrones” can mean royal seats, heavenly-court imagery, or invisible powers. Only Colossians 1:16 is normally taken as the biblical foundation for the Thrones as an angelic order; the deuterocanonical uses (Wisdom of Solomon 7:8; Sirach 47:11) and much of the throne-imagery in Daniel and Revelation are royal or visionary rather than a naming of the rank.
      - "The nine-rank classification itself is not laid out in any single biblical passage: it is a patristic and liturgical synthesis, resting on Scripture (especially Colossians 1:16) and the Dionysian tradition. The identification of the Thrones with the Ophanim, or “wheels,” of Ezekiel is likewise a later interpretive and iconographic development, not a direct scriptural equation."
