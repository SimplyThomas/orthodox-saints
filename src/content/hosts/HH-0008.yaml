overview:
  - The Archangels are one of the traditional orders of the bodiless heavenly powers in Orthodox Christian angelology. In the received hierarchy of the Nine Orders of Angels they are placed eighth overall, below the Principalities and above the Angels, belonging to the lowest triad (Principalities, Archangels, Angels). This ordering is preserved in Orthodox liturgical and synaxarial tradition, especially in the feast of the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8.
  - "In Holy Scripture the word “archangel” appears explicitly only in the New Testament: Michael is directly called “the archangel” in Jude 1:9, and 1 Thessalonians 4:16 refers to “the voice of an archangel.” Gabriel is never explicitly called an archangel in the canonical New Testament but appears as a named heavenly messenger in Daniel and Luke; Raphael is named in the deuterocanonical book of Tobit as “one of the seven holy angels” who stand before God. Orthodox tradition commonly receives Michael, Gabriel, Raphael, Uriel, Selaphiel, Jegudiel, Barachiel, and sometimes Jeremiel among the archangels commemorated with the bodiless powers."
  - "Orthodox Christianity understands the archangels as created spiritual beings, not divine powers — rational, bodiless servants of God who act as messengers, protectors, and ministers within the divine providence. The title “archangel” means “chief angel” or “ruling messenger,” from the Greek archē (“chief,” “first”) and angelos (“messenger”). Their significance is never separate from Christ: all the angelic ranks, archangels included, are created through Christ and subject to Him (Colossians 1:16; Ephesians 1:21)."
  - The archangels are especially significant because several are known by name and appear in salvation history. Michael is associated with protection, spiritual warfare, and leadership among the heavenly hosts; Gabriel with divine announcements, above all the Annunciation to the Theotokos; and Raphael, in Tobit, with healing, guidance, and the offering of prayer before God. The other archangelic names are known chiefly from Orthodox liturgical and later traditional sources rather than from universally received canonical Scripture.
  - The Orthodox Church venerates the archangels but does not worship them — a crucial distinction. The Council of Laodicea condemned the worship of angels as gods, while Orthodox tradition affirms their proper veneration as servants of God.
historicalContext:
  - "The Old Testament contains named angels only rarely: Michael and Gabriel appear in Daniel, and Raphael in Tobit (deuterocanonical Scripture in Orthodox usage). During the Second Temple period Jewish writings increasingly developed angelic hierarchies, named angels, and heavenly-court imagery; these traditions form part of the historical background for New Testament angelology, though not all the later angelic names carry the same authority as Scripture."
  - Early Christianity inherited the Jewish angelic language but interpreted it through Christ. The New Testament consistently presents angels as servants of God, not independent divine beings, and St. Paul’s language about thrones, dominions, principalities, and powers emphasizes that all invisible beings are created through Christ and subject to Him.
orthodoxInterpretation:
  - St. Dionysius the Areopagite places the Archangels in the lowest triad, together with the Principalities and Angels, treating them as a rank especially involved in the transmission of divine messages to the human world.
  - St. Basil the Great speaks of the angels as part of the invisible creation, citing the Pauline language of thrones, dominions, principalities, and powers to show that God created both visible and invisible realities.
  - St. Gregory the Theologian speaks of the angels as rational heavenly beings who worship God and serve His will, without systematizing the nine ranks in the Dionysian manner.
  - St. John Chrysostom emphasizes that angels and archangels are subordinate to Christ, warning against any angel-veneration that would obscure Christ’s supremacy.
  - St. John of Damascus teaches that the angels are incorporeal, rational beings created by God — a theology that undergirds the Orthodox distinction between angelic nature, angelic ministry, and divine worship.
liturgicalTradition:
  - The principal Orthodox feast connected with the archangels is the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8, which commemorates Michael, Gabriel, Raphael, Uriel, Selaphiel, Jegudiel, Barachiel, and sometimes Jeremiel, together with all the heavenly hosts.
  - The Menaion for November 8 contains hymns honoring the archangels and bodiless powers collectively, and the Horologion frequently names angels and archangels in the daily prayers.
  - The Divine Liturgy joins earthly worship to the worship of the heavenly hosts, especially in the Cherubic Hymn and in the anaphoral references to the angels, archangels, cherubim, and seraphim.
salvationHistory:
  - heading: Creation
    body:
      - The archangels belong to the invisible creation made by God.
  - heading: The Fall
    body:
      - The holy archangels remain faithful to God, unlike the fallen angels — Revelation 12 shows Michael and his angels casting down the dragon.
  - heading: Old Testament History
    body:
      - Michael and Gabriel appear in Daniel; Raphael appears in Tobit.
  - heading: The Incarnation
    body:
      - Gabriel announces the Incarnation to the Theotokos (Luke 1:26–38).
  - heading: Christ’s Ministry
    body:
      - Angels minister to Christ and announce the divine events of His life.
  - heading: The Resurrection
    body:
      - Angels announce the empty tomb (Matthew 28:2–7).
  - heading: The Ascension
    body:
      - All the angels and powers are subject to the ascended Christ.
  - heading: The Last Judgment
    body:
      - 1 Thessalonians 4:16 links the Lord’s return with the voice of an archangel.
iconography:
  - The archangels are usually depicted as winged, youthful figures, often vested as heavenly warriors, messengers, or court attendants. Michael commonly carries a sword, spear, or staff and may be shown as commander of the heavenly hosts; Gabriel often bears a staff or lily-like rod in Annunciation icons; and Raphael may be shown with Tobias, a fish, or healing imagery, in traditions shaped by Tobit.
  - Byzantine, Greek, Russian, Serbian, Romanian, Antiochian, and modern Orthodox icons generally follow these patterns. Icons of the Synaxis often show Christ enthroned or Emmanuel in a mandorla, surrounded by Michael, Gabriel, and the other archangels, with cherubim and seraphim nearby.
historicalInfluence:
  - The archangels have had a major influence on Orthodox theology, liturgy, iconography, hymnography, and church architecture. Icons of Michael and Gabriel are often placed on the deacon doors of the iconostasis; Gabriel is central to Annunciation iconography, and Michael is prominent in icons of the Synaxis, the Last Judgment, and spiritual warfare.
  - The archangels also shaped monastic and devotional literature as examples of obedience, vigilance, and service to God.
scripture:
  - ref: Jude 1:9
    note: Michael is called “the archangel” — the only passage directly naming him so.
  - ref: 1 Thessalonians 4:16
    note: The Lord descends “with the voice of an archangel” — one of the two explicit New Testament uses of the word.
  - ref: Daniel 8:15–26; 9:20–27
    note: Gabriel interprets Daniel’s visions and explains the prophecy of the seventy weeks.
  - ref: Daniel 10:13, 21; 12:1
    note: Michael, “one of the chief princes” and “the great prince” who stands for God’s people — the Old Testament background for his archangelic role.
  - ref: Tobit 5–12 (Deuterocanonical)
    note: Raphael guides Tobias, heals Tobit, and reveals his identity.
  - ref: Tobit 12:15 (Deuterocanonical)
    note: Raphael is “one of the seven holy angels” who stand before God — a key source for the tradition of the seven archangels.
  - ref: Luke 1:11–20
    note: Gabriel announces the birth of John the Forerunner to Zechariah.
  - ref: Luke 1:26–38
    note: Gabriel announces the Incarnation to the Theotokos — the central New Testament appearance of Gabriel.
  - ref: Matthew 1:20–24; 2:13, 19–20
    note: An angel guides Joseph in dreams concerning Christ’s infancy.
  - ref: Matthew 28:2–7
    note: An angel at the tomb announces Christ’s Resurrection.
  - ref: Revelation 8:2
    note: The seven angels who stand before God — associated with the wider tradition of the seven archangels.
  - ref: Revelation 12:7–9
    note: Michael and his angels fight the dragon — Michael as leader in the heavenly conflict.
sections:
  - heading: The Named Archangels
    body:
      - "Orthodox tradition commonly numbers seven or eight archangels. Three are named in Scripture: MICHAEL (“Who is like God?”), the commander of the heavenly hosts, defender against evil, and protector of God’s people (Daniel; Jude 1:9; Revelation 12); GABRIEL (“God is my strength”), the messenger of divine announcements, above all the Annunciation (Daniel; Luke 1); and RAPHAEL (“God heals”), the companion and healer of Tobit’s household (Tobit 5–12)."
      - "Four more are received from Orthodox liturgical and later tradition: URIEL (“Fire of God,” associated with divine light and wisdom), SELAPHIEL (the angel of prayer), JEGUDIEL (who encourages those who labor for God), and BARACHIEL (the bestower of God’s blessings). An eighth, JEREMIEL (or Jerahmeel), associated with the raising up of hope, is sometimes added. These four-to-five names are not drawn from universally received canonical Scripture but from the Church’s liturgical inheritance, and an Orthodox account distinguishes them accordingly."
