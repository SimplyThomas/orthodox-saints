overview:
  - Archangel Raphael is one of the named angels of the biblical tradition and holds a distinctive place in Orthodox Christianity as the angel associated with healing, guidance, protection, and divine providence. His name derives from the Hebrew Rafa’el, “God heals” or “Healing of God.” Unlike Michael and Gabriel, who appear in both Testaments, Raphael is known chiefly through the Book of Tobit — one of the Deuterocanonical books received by the Orthodox Church as part of Holy Scripture.
  - "The Book of Tobit presents Raphael as a heavenly messenger sent by God to help two suffering people at once: the righteous Tobit, who has gone blind, and Sarah, afflicted by repeated tragedy through a demon. Disguised as a human traveler named Azarias, Raphael accompanies Tobit’s son Tobias on a journey, protects him from danger, instructs him, arranges his marriage to Sarah, defeats the demon Asmodeus, and finally restores Tobit’s sight — only then revealing his true identity."
  - Among the named angels of Scripture, Raphael gives one of the clearest examples of angelic interaction with human beings across an extended narrative. He does not merely deliver a message but actively guides, protects, instructs, and heals — actions that have profoundly shaped the Orthodox understanding of his role.
  - Orthodox theology understands Raphael as a created angelic being who serves God and shares in God’s providential care for humanity. He possesses no independent power; his healing is a manifestation of divine mercy carried out in obedience to God’s will, not a personal supernatural authority.
  - One of the most important statements about him occurs in Tobit 12:15, where he identifies himself as “one of the seven holy angels who present the prayers of the saints and enter into the presence of the glory of the Holy One” — a passage highly influential in Jewish and Christian angelology and in the later tradition of the seven principal archangels.
  - The Orthodox Church honors Raphael among the bodiless powers and commemorates him with Michael, Gabriel, and the other archangels. Though his biblical appearances are fewer than theirs, his influence on Orthodox spirituality, iconography, and liturgical tradition has been substantial.
  - Raphael’s association with healing is rooted directly in Scripture rather than in later devotional development, and so he is connected with physical healing, spiritual restoration, divine guidance, safe travel, the protection of the family, and God’s hidden providence at work through ordinary events.
  - "Orthodox tradition carefully distinguishes the canonical account in Tobit from the later traditions that expanded his role: the Book of Tobit remains the primary authoritative source, while subsequent Jewish, Christian, and liturgical writings further developed his place in the wider angelic tradition."
salvationHistory:
  - heading: Healing
    body:
      - Raphael is directly involved in the restoration of Tobit’s sight (Tobit 11) — the ministry from which his name, “God heals,” is drawn.
  - heading: Guidance and Protection
    body:
      - Disguised as the traveler Azarias, he accompanies Tobias throughout his journey, protecting him from danger and instructing him in practical matters (Tobit 5–6).
  - heading: Deliverance from Evil
    body:
      - He binds and restrains the demon Asmodeus, freeing Sarah and making possible her marriage to Tobias (Tobit 8).
  - heading: Mediation of Prayer
    body:
      - He identifies himself as one of the angels who present the prayers of the saints before the glory of God (Tobit 12:15).
  - heading: In Later Tradition
    body:
      - Orthodox tradition later associates Raphael with healing ministries, the care of travelers, the protection of the family, divine providence, and angelic intercession — themes rooted in the narrative of Tobit rather than in separate revelations.
orthodoxInterpretation:
  - St. Basil the Great teaches that the angels are ministers of God’s providence and guardians appointed for the good of humanity — Raphael’s actions in Tobit being a notable example of such ministry.
  - St. John Chrysostom, though he leaves no extended surviving commentary on Raphael specifically, frequently speaks of angelic guidance and protection in ways consonant with the Tobit narrative.
  - St. Gregory the Theologian views the angels as instruments through whom God governs creation and shows His care for humanity.
  - St. John of Damascus, in An Exact Exposition of the Orthodox Faith, teaches that the angels are ministers of the divine will — a role Raphael exemplifies through healing and guidance.
  - St. Dionysius the Areopagite numbers the Archangels among the celestial hierarchy that transmits the divine illumination and guidance. In the West, Ss. Ambrose of Milan and Augustine discuss Raphael’s guidance of Tobias, and St. Bede comments on his symbolic role as divine healing.
liturgicalTradition:
  - Raphael is commemorated with all the bodiless powers at the Synaxis of the Archangel Michael and the Other Bodiless Powers on November 8, together with the other archangels and the angelic hosts.
  - He appears in the Menaion, Synaxarion, Horologion, and the services honoring the heavenly powers, where he is named Raphael the Healer, Raphael the Guide, Raphael the Archangel, and one of the Seven Holy Angels.
iconography:
  - Raphael is commonly depicted as a youthful winged angel in a tunic and cloak, holding a pilgrim’s staff and carrying a fish, sometimes with a medicine vessel or box.
  - "His symbols come straight from Tobit: the FISH is his most distinctive attribute (its gall heals Tobit’s blindness and drives off the demon); the STAFF marks him as guide and companion on Tobias’s journey; and his traveler’s clothing recalls his appearance as Azarias. His colors are green (healing and renewal), blue (heavenly service), and gold (divine glory)."
  - His iconography developed largely from depictions of the Book of Tobit and became standardized in the Byzantine and medieval periods; Russian and Slavic icons often show him carrying the fish.
historicalInfluence:
  - In the early Church knowledge of Raphael came almost entirely from the Book of Tobit; through the Byzantine period he became increasingly associated with healing and protection, and in the Slavic tradition his icons regularly show the fish of Tobit.
  - He remains closely tied to healing ministries and the care of travelers. In art he is frequently depicted with Tobias and the fish; Orthodox hymnography emphasizes his healing ministry; and the Book of Tobit itself inspired many literary retellings and artistic representations.
scripture:
  - ref: Tobit 3:16–17 (Deuterocanonical)
    note: God sends Raphael to heal both Tobit’s blindness and Sarah’s affliction — his divine mission begins.
  - ref: Tobit 5:4–22 (Deuterocanonical)
    note: Raphael, disguised as “Azarias,” is engaged to accompany Tobias on his journey.
  - ref: Tobit 6:1–18 (Deuterocanonical)
    note: He instructs Tobias concerning the fish, and counsels him regarding Sarah — the means of healing and deliverance.
  - ref: Tobit 8:1–3 (Deuterocanonical)
    note: Raphael binds the demon Asmodeus, delivering Sarah from evil.
  - ref: Tobit 11:7–15 (Deuterocanonical)
    note: Following Raphael’s instructions, Tobias restores his father Tobit’s sight.
  - ref: Tobit 12:11–15 (Deuterocanonical)
    note: "Raphael reveals his identity: “I am Raphael, one of the seven holy angels who present the prayers of the saints and enter before the glory of the Holy One.”"
sections:
  - heading: One of the Seven Holy Angels
    body:
      - Raphael’s self-revelation in Tobit 12:15 — that he is “one of the seven holy angels who present the prayers of the saints and enter into the presence of the glory of the Holy One” — is one of the most influential angelological texts of the biblical tradition. It gives scriptural warrant, within the Orthodox canon, both for the number seven and for the ministry of the angels as bearers of the prayers of the faithful before God.
      - From this verse (together with Revelation 8:2) grew the wider Orthodox tradition of the seven principal archangels — Michael, Gabriel, Raphael, Uriel, Selaphiel, Jegudiel, and Barachiel — with Raphael among the three whose names Scripture supplies.
  - heading: In Extra-Biblical Sources
    body:
      - Raphael appears among the principal angels in 1 Enoch, associated with healing and the oversight of humanity, and in the Sibylline and Testament literature. These writings helped shape later angelological tradition but are not part of the Orthodox biblical canon; within Orthodoxy Raphael’s authoritative role rests on the canonical Book of Tobit.
