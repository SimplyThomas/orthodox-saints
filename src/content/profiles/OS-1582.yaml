lifespan: 2nd century
liturgicalTitle: The Holy Venerable-Martyr Paraskevi of Rome
overview:
  - Paraskevi of Rome was a second-century maiden of the city of Rome who, after being left an orphan, gave away her inheritance and devoted herself to preaching Christ openly among the pagans. Her name, Paraskevi, is the Greek word for Friday, the day of preparation before the Sabbath.
  - Accounts of her life recount a series of arrests and torments under the Roman authorities, from which tradition holds she was repeatedly delivered, before she was finally beheaded for refusing to renounce her faith. She is commemorated on July 26 and is widely invoked for the healing of diseases of the eyes.
timeline:
  - when: Early 2nd century
    title: Birth at Rome
    body: By tradition Paraskevi was born in or near Rome, the only daughter of Christian parents named Agathon and Politia, who had long prayed for a child. She was raised to dedicate herself to God, spending much of her time in prayer and the study of the Scriptures. The accounts relate that she was born on a Friday, which gave her the name Paraskevi.
  - when: After her parents' deaths
    title: Renunciation and preaching
    body: Following the death of her parents, she distributed all of her inheritance to the poor and consecrated her virginity to Christ. Emulating the Apostles, she began to travel through towns and villages preaching the Gospel to the pagans, converting many to Christianity.
  - when: Reign of Antoninus Pius (138-161)
    title: Arrest and the cauldron
    body: She was arrested for refusing to worship the idols. The accounts relate that a red-hot helmet was placed on her head and she was cast into a cauldron of boiling oil and pitch, from which the tradition holds she emerged unharmed. When the emperor looked into the cauldron, she cast some of the hot liquid into his face and he was burned; on his appeal she healed him, and he released her.
  - when: During her later travels
    title: The serpent and the governor Asclepius
    body: Continuing to preach, she came to a city whose governor was named Asclepius. According to the tradition she was given over to a great serpent in a cave to be devoured, but she made the Sign of the Cross over the creature and it died, whereupon Asclepius and the people of the city believed in Christ.
  - when: 2nd century
    title: Martyrdom under Tarasius
    body: She was finally arrested by a Roman official named Tarasius and, after enduring further tortures, was beheaded. Sources differ on the precise year of her death, giving accounts ranging across the second century.
sections:
  - heading: Name and Identity
    body:
      - Her name, Paraskevi, is the ordinary Greek word for Friday, literally the day of preparation before the Sabbath; the tradition connects this name to her having been born on a Friday. She is distinguished in the calendar as Paraskevi of Rome, commemorated on July 26, from other saints of the same name.
      - The anchor record classes her as a Venerable-Martyr, reflecting both her ascetic, consecrated life and her death for the faith.
  - heading: Relics & Shrines
    body:
      - Tradition holds that her relics were brought to Constantinople, where accounts report they were exhibited for pilgrims around the year 1200.
      - Her tomb is remembered as a place of healing, where accounts describe cures granted to the blind, the lame, and the infertile.
  - heading: Miracles & Traditions
    body:
      - "Traditional Accounts: The lives of Paraskevi gather a sequence of miraculous deliverances and signs: her survival of the red-hot helmet and the cauldron of boiling oil and pitch, the burning and subsequent healing of the emperor, and the death of the serpent at the Sign of the Cross, which is said to have converted the governor Asclepius and his city. These episodes are transmitted as hagiographical tradition rather than documented record."
      - In iconography she is frequently depicted holding a pair of eyes, often on a dish, a visual sign of her renown as a healer of diseases of the eyes.
patronage:
  - Healing of the eyes and of blindness
