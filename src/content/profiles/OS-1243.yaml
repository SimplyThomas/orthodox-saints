  - when: "597"
    title: Landing in Kent
    body: Augustine and his companions land in Kent and are received by King Ethelbert, whose conversion follows.
  - when: "597"
    title: Archbishop of Canterbury
    body: Augustine is consecrated bishop and establishes his see at Canterbury, becoming its first archbishop.
  - when: "604"
    title: Bishops for London and Rochester
    body: He consecrates Mellitus as bishop of London and Justus as bishop of Rochester.
  - when: c. 604
    title: Repose
    body: Augustine reposes on May 26, having arranged for the consecration of his successor, Laurence.
