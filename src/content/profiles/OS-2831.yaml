id: OS-2831
lifespan: d. c. 627
liturgicalTitle: Our Father among the Saints Justus, Bishop of Rochester and Archbishop of Canterbury
overview:
  - Saint Justus was a member of the Gregorian mission sent from Rome to evangelize the Anglo-Saxons, and he became the first Bishop of Rochester and later the fourth Archbishop of Canterbury.
  - He probably arrived in England with the second group of missionaries dispatched in 601 at the request of Augustine of Canterbury, though some accounts place him with the original party of 597.
  - After surviving a pagan backlash that briefly drove him into exile in Gaul, he was restored to his see and eventually elevated to the archbishopric, from which he oversaw the further spread of the faith into Northumbria. He reposed on November 10, most likely between 627 and 631.
timeline:
  - when: "601"
    title: Arrival in England
    body: Justus probably came to England with the second group of missionaries sent to reinforce the Gregorian mission at the request of Augustine of Canterbury, though some writers place him with the original 597 party.
  - when: "604"
    title: Consecrated Bishop of Rochester
    body: Augustine consecrated Justus as bishop over a province centered on Rochester. A charter dated April 28, 604, purporting to be from King Æthelberht, records a grant of land near Rochester to Justus's church; its authenticity is debated, though recent scholarship argues it preserves authentic details.
  - when: "614"
    title: Council of Paris
    body: Justus attended the Council of Paris in Gaul, an involvement historians variously attribute to chance or to diplomatic necessity.
  - when: "616"
    title: Flight to Gaul
    body: Following the death of King Æthelberht of Kent, a pagan backlash against Christianity forced Justus and Mellitus to flee to Gaul, likely seeking refuge with the Frankish king Chlothar.
  - when: "617"
    title: Restored to Rochester
    body: By 617 Justus had been reinstalled in his bishopric under the new king.
  - when: "624"
    title: Archbishop of Canterbury
    body: Justus became the fourth Archbishop of Canterbury, receiving his pallium from Pope Boniface V. He consecrated Paulinus as the first Bishop of York before Paulinus accompanied Æthelburg to Northumbria.
  - when: c. 627
    title: Repose
    body: According to Bede, Justus died on November 10, most likely between 627 and 631.
sections:
  - heading: The Gregorian Mission and Rochester
    body:
      - Justus was one of the missionaries sent from Rome to continue the work begun by Augustine of Canterbury among the Anglo-Saxons. He most probably arrived with the reinforcing party of 601, though some modern writers place him with the original mission of 597.
      - In 604 Augustine consecrated him bishop over a province including Rochester, making him its first bishop. A charter dated April 28, 604, attributed to King Æthelberht, records a grant of land near Rochester to his church; scholars continue to debate the document's authenticity, while some recent work argues it contains genuine early material.
      - Together with Mellitus, Justus signed a letter urging the Celtic bishops to adopt the Roman method of calculating the date of Easter, part of the mission's effort to bring the churches of Britain into common practice with Rome.
  - heading: Exile and Restoration
    body:
      - When King Æthelberht died in 616, a resurgence of paganism threatened the young Christian community, and Justus, together with Mellitus, fled across the sea to Gaul, likely seeking the protection of the Frankish king Chlothar.
      - "The exile proved brief: by 617 Justus had been reinstated in his bishopric under the new king of Kent."
  - heading: Archbishop of Canterbury
    body:
      - In 624 Justus was raised to the archbishopric of Canterbury, becoming the fourth to hold the see. Pope Boniface V sent him the pallium confirming his office.
      - As archbishop he consecrated Paulinus as the first Bishop of York, who then accompanied the Kentish princess Æthelburg north to Northumbria, extending the mission's reach into that kingdom.
  - heading: Relics & Shrines
    body:
      - Justus reposed on November 10, according to Bede most likely between 627 and 631. In the 1090s his remains were translated to a shrine placed beside the high altar of St Augustine's Abbey in Canterbury.
      - He was canonized in the period before the formal papal canonization process, and his feast is kept on November 10 across several Christian traditions. In the Orthodox Church he is honored among the Pre-Schism Western Saints and the Saints of the British Isles.
