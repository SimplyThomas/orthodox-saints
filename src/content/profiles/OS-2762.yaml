id: OS-2762
lifespan: c. 689 – c. 759
liturgicalTitle: Our Venerable Father Othmar, First Abbot of Saint Gall
overview:
  - Othmar (c. 689 – c. 759) was the first abbot of the Abbey of Saint Gall and the figure who transformed the hermitage of Saint Gall into an organized monastic community. Said to have been of Alemannic descent and born near what is now Saint Gallen in present-day Switzerland, he was serving as a local priest when he was recruited to take charge of the site and the relics of Saint Gall.
  - Around 719 Waltram (also given as Waltraf) of Thurgau appointed Othmar superior over the cell of Saint Gall and custodian of Gall's relics. Othmar gathered the monks into a properly constituted monastery, at first following the Rule of Saint Columban and later, in 747, introducing the Rule of Saint Benedict, which governed the abbey until its secularization in 1805.
  - Under his abbacy the community grew markedly — the register of monastic professions recorded fifty-three monks by the end of his tenure — and he founded a school, a hospital, an almshouse, and what is described as the first leprosarium in Switzerland, while caring for the poor and the sick. He died in unjust confinement on Werd Island in Lake Constance after resisting nobles who sought to seize monastery property.
sections:
  - heading: Founding and Organization of Saint Gall
    body:
      - The monastery grew from the hermitage established at the cell of Saint Gall. According to the abbey's own tradition, Waltraf, a Thurgau gentleman and judge, recruited the local Alemannic priest Othmar to establish a more organized monastery on the site. To secure the endowment, Waltraf approached the Frankish leader Charles Martel, who provided financial backing to build the facility.
      - Othmar unified the monks into a formal community and served as its first abbot. He initially placed the house under the Rule of Saint Columban, the older Irish monastic rule associated with Gall's own background, before the shift to Benedictine observance later in his abbacy.
      - He also modernized the physical fabric of the monastery, extending Saint Gall's original hermit cell and adopting the Carolingian architectural style of the day.
  - heading: Adoption of the Benedictine Rule
    body:
      - "In 747 Othmar introduced the Rule of Saint Benedict, replacing the earlier Rule of Saint Columban. The change was tied to the abbey's growing ties with the Frankish rulers: after Charles Martel's death his son Pepin the Short continued to support the house, granting it privileges, letters of protection, and an assured income."
      - The Benedictine Rule adopted under Othmar remained in effect at Saint Gall until the monastery's secularization in 1805.
  - heading: Charitable Institutions and the School
    body:
      - Othmar established a range of institutions that outlasted him. He founded a hospital and a school, which became the foundation on which the celebrated abbey library, the Stiftsbibliothek, was later built. He also established an almshouse and what is recorded as the first leprosarium in Switzerland.
      - Care for the poor and the sick was a hallmark of his abbacy, and the St. Gall School founded during his tenure marked the beginning of the abbey's long reputation as a center of learning.
  - heading: Conflict, Exile, and Death
    body:
      - When the Frankish mayor Carloman renounced his throne in 747, he visited Othmar and gave him a letter of recommendation to his brother Pepin the Short, whom Othmar met in person.
      - In 759 the counts Warin and Ruodhart sought to seize monastery property. When Othmar resisted, they captured him while he was traveling toward Constance and imprisoned him, first at Bodmann castle and then on Werd Island (Wörth) in Lake Constance, near the Rhine at Stein am Rhein. He died there after about six months of confinement, aged roughly seventy.
  - heading: Relics and Veneration
    body:
      - Othmar's body was transferred to the Abbey of Saint Gall in 769, ten years after his death. He was canonized in 864 by Solomon I, Bishop of Constance, and solemnly entombed in 867.
      - His feast is kept on November 16. In art he is depicted holding a wine barrel, a reference to a legend of an inexhaustible barrel that never emptied while his body was being carried across the lake.
