id: OS-2147
lifespan: died November 4, 1584
liturgicalTitle: The Holy and Blessed Simon of Yurievets, Fool-for-Christ
overview:
  - Blessed Simon of Yurievets was a sixteenth-century Fool-for-Christ who lived in the Povolzhsk (Volga) region of Russia. Born in the city of Yurievets and forsaken by his parents, he embraced the ascetic discipline of foolishness for Christ, enduring poverty, exposure, and ill-treatment while concealing his holiness.
  - He went barefoot in both winter and summer, clothed only in a shirt, so that his skin became blackened and withered from fasting, and he often prayed on church porches. Tradition holds that through his ascetic labors he received from God the gift of clairvoyance. He died on November 4, 1584, and was buried at the Theophany Monastery in Yurievets; his veneration was formally established in 1635.
sections:
  - heading: Ascetic Life
    body:
      - Simon was born in Yurievets, a city in the Povolzhsk (Volga) region, and was abandoned by his parents. He took up the ascetic calling of foolishness for Christ, a form of holiness in which the saint conceals inner virtue beneath outward disregard for comfort and reputation.
      - He maintained extreme self-denial, going barefoot and wearing only a shirt throughout the year, so that his skin became blackened and withered from fasting. He frequently prayed on the porches of churches. According to his life, thoughtless people often treated him cruelly and at times beat him, yet he never complained and prayed for those who mistreated him.
      - The sources relate that through his ascetic exploits Simon received from God the gift of clairvoyance, foreseeing many things and predicting the future.
    heading_ok: true
  - heading: Death
    body:
      - Shortly before his death, Simon went to the house of the military commander Theodore Petelin. Not knowing the saint, Petelin in a fit of anger ordered him to be beaten. Simon fell gravely ill as a result. He summoned a priest, made his confession, received the Holy Mysteries, and died on November 4, 1584.
      - His body was buried at the Theophany Monastery in Yurievets. Petelin later repented of his actions.
  - heading: Veneration
    body:
      - In 1635, Patriarch Joasaph ordered Igumen Dionysius of the Theophany Monastery to compile an account of the life and miracles of Blessed Simon. The patriarch gave his blessing for an icon of the saint to be painted and formally established his feast day, observed on November 4.
      - Contemporaries reported miraculous signs associated with the saint.
