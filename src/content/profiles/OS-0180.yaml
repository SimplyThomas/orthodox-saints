  - when: September 1920
    title: Arrest of Andrew Dalnikov
    body: Father Andrew is arrested in the Semirechye region and charged with counter-revolutionary activity and related offenses.
  - when: "1920"
    title: Martyrdom of both priests
    body: Andrew Dalnikov dies in the Pishpek (Bishkek) concentration camp; Theophan Sokolov is executed by firing squad at Verny in the autumn of the same year.
  - when: August 2000
    title: Glorification
    body: Both are numbered among the New Martyrs and Confessors of Russia at the Jubilee Bishops' Council of the Russian Orthodox Church.
