id: OS-0583
liturgicalTitle: The Holy Martyrs Papias, Diodorus and Claudianus
lifespan: d. c. 250
overview:
  - Papias, Diodorus, and Claudianus were three martyrs who suffered together at Perge in Pamphylia, in Asia Minor, about the year 250, during the persecution under the emperor Decius. They are commemorated on February 3.
  - The accounts preserve their names together with the place and time of their martyrdom; they are venerated among the martyrs who gave their lives for Christ in that persecution.
