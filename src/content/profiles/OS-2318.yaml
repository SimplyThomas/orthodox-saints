    note: Leading hesychast teacher; the founder is reckoned among his circle of disciples, and the two are sometimes confused in tradition.
  - name: St. Romylos of Ravanica
    note: A disciple of Gregory of Sinai named in some accounts among Gregory the Younger's teachers.
