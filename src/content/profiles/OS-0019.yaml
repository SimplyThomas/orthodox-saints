id: OS-0019
lifespan: Traditionally c. 270 – December 6, 343
overview:
  - Nicholas of Myra, often called Nicholas the Wonderworker, was a 4th-century bishop of Greek descent from the maritime city of Patara in the region of Lycia in Anatolia, in what is now Antalya Province, Turkey. By tradition the son of wealthy Christian parents named Theophanes and Nonna, he was dedicated to God from childhood and distributed his inheritance to the poor.
  - He served as Bishop (in some accounts Archbishop) of Myra in Lycia, where he became known for his care for the poor and for numerous miracles attributed to his intercession. Imprisoned during the persecution under Diocletian, he was released following the accession of Constantine. An early list names him among the bishops who attended the First Council of Nicaea in 325, where tradition holds that he stood against the teaching of Arius.
  - Widely venerated across most Christian traditions, he is the patron of many countries—notably Greece and Russia—as well as of numerous cities and occupational groups, most prominently seafarers. His legendary habit of secret gift-giving became the basis, through the Dutch Sinterklaas, of the folklore of Santa Claus.
sections:
  - heading: Historical Context
    body:
      - Little is known with historical certainty about Nicholas's life. He is established as having been bishop of Myra in southern Asia Minor in the 4th century, and he may have participated in the Council of Nicaea in 325. Much of what is related of him comes through synaxarion accounts and later tradition.
      - By tradition he was ordained a reader by his uncle, Bishop Nicholas of Patara, and later elevated to the priesthood before becoming Bishop of Myra. The synaxarion relates that even as bishop he remained a great ascetic, appearing to his flock as an image of gentleness, kindness, and love.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: As a historical matter, the record is sparse; Nicholas is firmly known as bishop of Myra and is reputed especially for his care for the poor."
      - "Traditional Accounts: He is said to have rescued three girls from being forced into prostitution by secretly dropping a sack of gold coins through their window on each of three nights, providing dowries that saved their family from poverty and sin. Other early stories tell of his calming a storm at sea and saving three innocent soldiers from wrongful execution—an account that also appears as his delivering three men unjustly condemned to death by taking the executioner's sword. The synaxarion further relates that he saved drowning sailors, rescued those in captivity, and through his prayers delivered Myra from a terrible famine. A traditional account holds that as a newborn he stood unsupported in the baptismal font for three hours, honoring the Trinity."
  - heading: Relics & Shrines
    body:
      - His relics were transferred to the city of Bari in 1087, on account of which he is also known as Nicholas of Bari. By tradition the relics flowed with a curative myrrh.
  - heading: Legacy
    body:
      - Nicholas's reputation for secret gift-giving gave rise, through the Dutch celebration of his feast day as patron saint of sailors (Sinterklaas), to the folklore of Santa Claus—the name deriving from "Saint Nick." He remains among the most popular and widely venerated saints.
