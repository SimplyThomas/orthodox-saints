id: OS-0019
lifespan: c. 270 – 6 December 343
overview:
  - Nicholas the Wonderworker was the fourth-century Bishop of Myra in Lycia (southern Asia Minor, in modern Turkey), one of the most widely venerated saints of the Eastern Orthodox Church. Born to a wealthy Christian family in the Lycian port city of Patara, he distributed his inherited fortune to the poor and became renowned for secret acts of charity.
  - Tradition records that he was imprisoned during the persecution under the emperor Diocletian and released after Constantine the Great came to power. He is reputed to have attended the First Ecumenical Council at Nicaea in 325, though no contemporary document names him among the bishops present.
  - His reputation for generosity, his rescue of the condemned and the imperiled, and the myrrh-streaming relics venerated after his death made him an immensely popular intercessor across the Orthodox world. His legendary gift-giving is the historical root of the modern Santa Claus figure, which passed into Western custom by way of the Dutch Sinterklaas tradition.
sections:
  - heading: Early Life and Charity
    body:
      - By tradition Nicholas was born in Patara, a Mediterranean port of Lycia, to pious and wealthy parents; accounts give their names variously, most commonly as Theophanes and Nonna. When his parents died, Nicholas gave away the whole of his inheritance to the poor.
      - The most famous account of his charity concerns an impoverished man who, unable to provide dowries for his three daughters, was in danger of selling them into servitude or prostitution. On three separate nights Nicholas secretly threw a purse of gold through the window of the man's house, providing each daughter a dowry in turn and saving them from ruin. According to the synaxarion, he sought to perform this charity unseen.
      - The synaxarion relates that his uncle, the Bishop of Patara, ordained him a reader and later a priest, and that as a young man he made pilgrimage to the Holy Land and Egypt.
  - heading: Bishop of Myra
    body:
      - Nicholas became Bishop (Archbishop) of Myra in Lycia as the fourth century opened. The synaxarion recounts that he was chosen following the death of the previous archbishop through a divine revelation that named him.
      - During the persecution under the emperor Diocletian he was imprisoned and, by tradition, tortured, but was preserved and later released after Constantine the Great rose to power and restored him to his see.
      - He is reputed to have been present at the First Ecumenical Council of Nicaea in 325. An early list records him as an attendee, but his name appears in no surviving documents of the era, and contemporaries such as Athanasius and Eusebius do not mention him. A widely repeated tradition holds that he confronted — and even struck — the heretic Arius at the council, was briefly stripped of his episcopal insignia, and was restored after several of the Fathers shared a vision of Christ and the Theotokos returning to him the Gospel book and the omophorion.
  - heading: Relics and Shrines
    body:
      - Nicholas died at Myra on 6 December, in a year given by tradition as 343 (other accounts place his death between 342 and 352), in advanced age. A church was built over his burial site under the emperor Theodosius II, and his relics were venerated as incorrupt and as streaming a curative myrrh from which many received healing.
      - After Myra fell to the Saracens in 1034, several Italian cities sought to secure his relics. In 1087 merchants and forces from Bari, Italy, removed the major bones of his skeleton from the sarcophagus and transported them to the Basilica di San Nicola in Bari, where they remain principally housed. Venetian sailors later gathered the remaining fragments, establishing a secondary relic collection at Venice.
      - Further portions of his relics are reported in many places, including Rimini (the left arm), Moscow (the Cathedral of Christ the Savior), Saint Petersburg (the Alexander Nevsky Lavra), Bucharest (the right hand, at the Church of Saint George the New), and several monasteries in Greece.
  - heading: Miracles and Traditions
    body:
      - "Historically Documented: The earliest accounts record Nicholas's secret almsgiving — most famously the gift of gold that rescued three daughters from servitude — and his charitable distribution of his entire inheritance to the poor."
      - "Traditional Accounts: The synaxarion attributes numerous wonders to him. He is said to have saved three innocent men from execution by staying the executioner's already-raised sword; to have appeared in a dream to the emperor Constantine to halt the unjust execution of military officers; to have calmed a storm and revived a mortally injured sailor at sea; and to have delivered Myra from famine through his prayers. Such accounts are related as tradition rather than as documented history."
      - By tradition the newborn Nicholas stood upright in the baptismal font for three hours, honoring the Trinity, and on his pilgrimage the closed doors of the church on Mount Sion in Jerusalem opened of their own accord.
  - heading: Veneration and Legacy
    body:
      - "Nicholas became one of the most beloved saints of the Orthodox world, honored as a patron of Greece and Russia and especially of sailors and seafarers. In Russia his devotion was widespread: nearly all Russian churches maintained a shrine in his honor, the prince Askold is said to have been baptized as Nicholas in 866, and Saint Olga is credited with building the first Russian church dedicated to him in Kiev."
      - "He is honored with three feast days: 6 December (his repose), 9 May (the translation of his relics to Bari), and 29 July (his nativity). On his December feast it became customary to give gifts to children — the historical origin of the Santa Claus custom, which entered Western culture through the Dutch Sinterklaas tradition."
      - In Western tradition he was additionally invoked as patron of merchants, archers, repentant thieves, children, brewers, pawnbrokers, toymakers, the unmarried, and students.
