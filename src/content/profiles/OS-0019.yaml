    body: By tradition Nicholas is born in Patara, a port city of Lycia in Asia Minor, to a wealthy Christian family.
  - when: Early 4th century
    title: Consecrated Bishop of Myra
    body: After distributing his inheritance to the poor and making pilgrimage to the Holy Land and Egypt, Nicholas becomes Bishop of Myra in Lycia.
  - when: 284–305
    title: Imprisonment under Diocletian
    body: During the Diocletianic persecution Nicholas is imprisoned and, by tradition, tortured, then released after Constantine the Great comes to power.
  - when: "325"
    title: First Council of Nicaea
    body: Nicholas is reputed to have attended the First Ecumenical Council, though no contemporary document names him; tradition recounts his confrontation with Arius.
  - when: 6 December 343
