id: OS-0859
lifespan: 1866 – 1949
liturgicalTitle: Our Venerable Father Seraphim of Vyritsa
sources:
  - OCA Synaxarion (oca.org), Lives of the Saints
  - https://www.oca.org/saints/lives/0579/03/21/103710-venerable-seraphim-of-vyritsa
  - https://www.johnsanidopoulos.com/2010/05/holy-and-venerable-father-seraphim-of.html
overview:
  - Seraphim of Vyritsa, born Vasily Nikolaevich Muraviev, was a Russian merchant who, after a successful business career, entered monastic life and became one of the most widely sought spiritual elders of the early Soviet period. Sources place his birth in the Yaroslavl province in the mid-1860s, with the OCA giving 1865 and the Mystagogy account giving March 31 (Old Style) / April 13 (New Style), 1866.
  - After being tonsured at the Saint Alexander Nevsky Lavra in Petrograd, he served as confessor to the monks and later, settled at the village of Vyritsa, drew large numbers seeking his counsel through years of persecution and the Second World War. He reposed in 1949 and was glorified by the Russian Orthodox Church in 2000.
timeline:
  - when: c. 1865–1866
    title: Birth in Yaroslavl province
    body: Born to a family of peasant background in the Yaroslavl province. The OCA names his parents as Nicholas and Chione and records that, following his father's death when he was about ten, a neighbor brought him to Saint Petersburg, where he worked as a store clerk.
  - when: Late 1880s
    title: Marriage and business career
    body: At about twenty-four he married Olga and established himself as a furrier, becoming very wealthy. The couple had children; after the death of their daughter, according to the OCA, Basil and his wife agreed to live together as brother and sister.
  - when: "1920"
    title: Tonsure at the Alexander Nevsky Lavra
    body: Having distributed much of his wealth to monasteries, he entered the Saint Alexander Nevsky Lavra in St. Petersburg. The Mystagogy account dates his entry to September 13, 1920, and his tonsure, together with his wife Olga, on October 19, 1920, under Archimandrite Nikolay Yarushevich, with the monastic name Barnabas (Varnava); Olga was tonsured Christiana.
  - when: "1921"
    title: Ordination and the Great Schema
    body: He was ordained a hieromonk in 1921 and later received the Great Schema with the name Seraphim, in honor of Saint Seraphim of Sarov. He served as Father Confessor to the monks of the Lavra, hearing confessions at great length.
  - when: 1930s
    title: Move to Vyritsa
    body: Suffering from illness, and with the blessing of Metropolitan Seraphim, he settled at the village of Vyritsa near Petrograd. The OCA records that after returning from the Soviet camps in 1933 he settled there for the remainder of his life.
  - when: "1949"
    title: Repose
    body: He reposed at Vyritsa, commemorated on March 21 (Old Style) / April 3 (New Style), 1949.
  - when: "2000"
    title: Glorification
    body: He was glorified as a saint by the Russian Orthodox Church in 2000, the OCA specifying August of that year.
sections:
  - heading: From Merchant to Monk
    body:
      - Before his monastic life, Vasily Muraviev was a prosperous merchant in Saint Petersburg, working in the fur trade. The OCA records that around the age of thirty he began distributing most of his wealth to monasteries, and that he entered monastic life only once his son had matured.
      - His tonsure at the Alexander Nevsky Lavra came amid the upheaval that followed the Russian Revolution. He and his wife Olga entered monastic communities together; she was tonsured Christina and later received the schema name Seraphima, while he was tonsured Barnabas and later took the schema name Seraphim.
  - heading: Ministry as Confessor and Elder
    body:
      - As confessor to the monks of the Lavra, he heard confessions extensively, the Mystagogy account noting that he would sometimes spend two days without any break. This labor, together with the strain of his ascetic life, contributed to the illnesses recorded in his later years, including intercostal neuralgia, rheumatism, and venous congestion of the legs.
      - The OCA relates that he received the gifts of clairvoyance and healing, and that many people came to him seeking help and advice, including a recorded instance in 1927 in which he counseled Bishop Alexei and foretold his future patriarchate. At Vyritsa he became widely sought as a spiritual elder.
      - From the mid-1930s he undertook a new ascetic labor (podvig), praying on his knees upon a rock over a period of years in imitation of Saint Seraphim of Sarov, a practice the Mystagogy account records he continued daily through the years of the Second World War.
  - heading: Persecution
    body:
      - His monastic life unfolded under Soviet persecution of the Church. The OCA records that he was arrested fourteen times beginning in 1929 and maintained his ministry through that period, returning from the camps in 1933 to settle at Vyritsa.
companions:
  - name: Seraphim of Sarov
    note: The wonderworker of Sarov, whom he took as his namesake at the Great Schema and whose ascetic prayer on a rock he imitated.
    href: saint/OS-0043
  - name: Elder Barnabas of Gethsemane
    note: Spiritual father at the Gethsemane Skete of the Holy Trinity-St. Sergius Lavra who guided the young Vasily Muraviev in the years before his own monastic tonsure.
    href: saint/OS-2891
