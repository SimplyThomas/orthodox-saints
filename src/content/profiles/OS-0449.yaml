      note: "Nephew: son of Stephen the First-Crowned, who later himself held the archiepiscopal see of Serbia."
      href: saint/OS-0617
    - name: Vukan Nemanjić
      note: "Brother: the eldest son of Stefan Nemanja and Prince of Zeta, one of the feuding brothers Sava reconciled."
