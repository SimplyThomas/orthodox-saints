celebration:
  intro: Ways to keep St Sava's Day (Savindan), the Serbian feast of schools.
  ideas:
    - idea: "Mark the day as the students' feast: bless the children's studies, tidy the school corner, and pray for a good year of learning."
    - idea: If your family keeps a slava, this is the great national example — cut and share the slava-bread (slavski kolač) and koljivo, explaining the family patron-saint custom.
    - idea: Have the children write out a favorite verse or a good resolution for the school term and keep it by their books through the year.
    - idea: Learn a little Serbian history — that Sava, a prince who became a monk, gave his people schools, hospitals, and their Church — and find Serbia on a map.
    - idea: "Do an almsgiving tied to education: donate books or school supplies to a child who needs them."
