id: OS-2146
lifespan: Dates unknown
overview:
  - Saints John, Stephen, and Isaiah of Georgia are three saints of the Georgian Orthodox Church commemorated together on November 4. They are remembered for lives of dedicated service, confession, and holiness, and are kept as a single joint commemoration.
  - The historical record for the three is exceptionally sparse. No birth or death dates, century, monastery names, or glorification date survive in the accessible sources; the tradition is preserved only in a brief synaxarion notice and a footnote to a liturgical-calendar article. Their profile is accordingly short and hedged.
sections:
  - heading: Commemoration and Identity
    body:
      - The Orthodox Church in America calendar for November 4 lists 'Saints John, Stephen, and Isaiah of Georgia' among the day's commemorations, noting that they were canonized by the Georgian Church. The OCA synaxarion frames them among those Christians who dedicated their earthly lives to glorifying God and serving others, relating that in a single lifetime they performed all the spiritual feats of the venerable and devout fathers, confessors, and martyrs.
      - The rank ascribed to the three differs by source. The OCA styles them 'Venerable,' the register used for monastics, while the Wikipedia article on November 4 in Eastern Orthodox liturgics styles them 'Holy and Righteous,' a rank applied to laypeople of exceptional holiness. The two sources are not reconciled.
  - heading: Tradition of Service at the Holy Sepulchre
    body:
      - By tradition, John, Stephen, and Isaiah are believed to have lived in Jerusalem and guarded the Tomb of Christ. It is held that the Georgian Church honored them in recognition of their dedicated service at the Tomb of the Savior, and that for several centuries the Georgian Church has glorified them and sought their intercessions. This account is preserved as a hagiographic footnote rather than a documented biography.
      - The wider historical setting lends the tradition plausibility. Georgian Christians served as custodians at the Church of the Holy Sepulchre for an extended period; the 14th-century German pilgrim Ludolf von Sudheim recorded that the keys to the Chapel of the Holy Sepulchre were in the hands of the Georgians, and that pilgrims supplied food, alms, candles, and lamp oil to the Georgian guardians at the south door of the church.
      - Throughout the Middle Ages the Georgian Orthodox Church maintained a substantial presence in the Holy Land, supported by royal patronage that funded institutions such as the Monastery of the Cross in Jerusalem. This institutional commitment is the general context within which the three saints are said to have served, though no source directly ties them to a named foundation.
