id: OS-2083
liturgicalTitle: The Righteous Matushka Olga of Kwethluk, Wonderworker of Alaska
lifespan: 1916 – 1979
overview:
  - Righteous Olga Michael was born on February 3, 1916 (January 21 on the Julian calendar), in the Yup'ik village of Kwethluk on a tributary of the Kuskokwim River in the Alaska Territory. Her Yup'ik name, Arrsamquq, is variously glossed as "the quiet" or "the unassuming one"; at baptism she received the name Olga, and she was raised in the village's Orthodox parish, the Church of St. Nicholas. Among Yup'ik-speaking faithful she is now also called Tanqilria, the Yup'ik word used of a saint.
  - In 1935 she married Nicolai Michael, the village storekeeper and postmaster, who in 1963 was ordained to the priesthood — Kwethluk's own priest — and eventually reached the rank of archpriest. Together they raised thirteen children, eight of whom lived to adulthood. As matushka, the priest's wife, Olga became central to the life of parish and village — a midwife in a place far from hospitals, a maker of parkas and boots she quietly gave away, a baker of prosphora, and a gentle counselor to those in trouble, above all to women who had suffered abuse.
  - Diagnosed with cancer in 1978, she continued to care for others until near the end, and died peacefully at home on November 8, 1979, surrounded by her family. Those who buried her recall an unseasonal November thaw that opened the frozen river to mourners from downriver villages and brought birds into the winter sky. In the decades that followed, people far beyond Alaska reported her appearing in dreams and visions as a healing presence, particularly to survivors of abuse and to women facing difficult pregnancies.
  - The Holy Synod of the Orthodox Church in America numbered her among the saints in November 2023; her relics were uncovered at Kwethluk in November 2024, and the rite of glorification was celebrated on June 19–20, 2025, at St. Nicholas Church in Kwethluk with Metropolitan Tikhon presiding. She is the first North American woman and the first Yup'ik person to be glorified as an Orthodox saint. Her feast day is October 27.
