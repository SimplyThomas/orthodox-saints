influence:
  heading: Influence in America
  intro: "Glorified only in June 2025, St. Olga already draws pilgrims to her Kuskokwim River village, and the first churches bearing her name are beginning to appear."
  places:
    - name: St. Nicholas Church
      kind: Church
      place: Kwethluk, Alaska
      note: "Her lifelong village parish, where her priest-husband served; her relics were uncovered in November 2024 and enshrined here, and the church hosted her glorification in June 2025. It is now the goal of a growing pilgrimage to Kwethluk."
    - name: St. Olga Church (planned)
      kind: Church
      place: Kwethluk, Alaska
      note: "The Diocese of Sitka and Alaska and the Kwethluk community are planning and fundraising for a new church — the diocese hopes a cathedral — named for St. Olga to house her relics, with a pilgrim hostel and a Yup'ik cultural center alongside."
    - name: Saint Olga of Alaska Orthodox Church
      kind: Church
      place: Hillsdale, Michigan
      note: "A new Orthodox Church in America mission named for St. Olga, which held its first Divine Liturgy in October 2025 — among the first communities in the Lower 48 dedicated to her."
