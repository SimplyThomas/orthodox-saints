influence:
  heading: Influence in America
  intro: "Fr. Vasily's twelve missionary years in the New World left their deepest mark in Alaska, where the church he built for his kayak-borne parish still stands."
  places:
    - name: Church of the Nativity of the Theotokos
      kind: Church
      place: Afognak, Alaska
      note: "The church he built for his Afognak flock beginning in 1901. The village was abandoned after the 1964 earthquake and tsunami, but the church survived and is listed on the National Register of Historic Places."
    - name: Nativity of the Theotokos Church
      kind: Church
      place: Port Lions, Alaska
      note: "The living successor of his Afognak parish. When the community relocated to Port Lions after the 1964 tsunami, it carried the iconostasis and royal doors from his church into the new one; the parish remains active in the OCA Diocese of Alaska."
    - name: Nativity of the Virgin Mary Church
      kind: Church
      place: Osceola Mills, Pennsylvania
      note: "The Orthodox parish, founded in 1893, of the central-Pennsylvania mining town to which Fr. Vasily was transferred in 1906 after Alaska; it remains an active OCA parish."
