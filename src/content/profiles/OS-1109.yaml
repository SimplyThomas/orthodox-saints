    title: Birth in the Chelm region
    body: Born in Tertyn, in the Hrubieszow district of the Chelm region of southeastern Poland, to Alexander Martysz, a judge who later became a priest.
  - when: "1884"
    title: Boyhood journey to New York
    body: Accompanies his father to New York, where by the account of his life Bishop Vladimir foretells that the boy will become a priest.
