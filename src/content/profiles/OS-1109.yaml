    title: Seminary, marriage, and ordination
    body: Graduates in July 1899 from the seminary at Chelm, whose rector was the future Patriarch Tikhon of Moscow; marries Olga Nowik and is ordained deacon, then priest on December 10, 1900; departs for America that December.
  - when: 1900 – 1906
    title: Missionary in Alaska
    body: Serves at Afognak with care of Spruce and Woody Islands near Kodiak; a church of the Nativity of the Theotokos is built at Afognak in 1901; daughters born at Afognak and Kodiak.
  - when: 1906 – 1912
    title: United States and Canada
    body: Serves parishes in Pennsylvania, Connecticut, and New York, then at Edmonton and Vostok in western Canada, becoming dean of Alberta and Manitoba; returns to Europe in 1912.
  - when: 1914 – 1919
    title: War evacuation
    body: Evacuated into Russia during the First World War, living at the Saint Andronicus Monastery in Moscow and serving a parish at Valdai; returns to Sosnowiec in September 1919.
  - when: 1919 – 1921
    title: Head of the Polish Orthodox military chaplaincy
    body: Assigned in September 1919 to oversee Orthodox affairs in the War Department; organizes the Orthodox military chaplaincy and in 1921 becomes its head with the rank of colonel; elevated to archpriest.
  - when: "1925"
    title: Autocephaly and decoration
    body: Takes part in the efforts crowned by the autocephaly of the Orthodox Church of Poland; decorated with the Order of Polonia Restituta.
  - when: "1936"
    title: Retirement
    body: Retires from the head of the Orthodox chaplaincy of the Polish army and settles at Teratyn, near his birthplace.
  - when: May 4, 1945
    title: Martyrdom
    body: On Great and Holy Friday his household is attacked by armed men; refusing to flee, he is beaten and tortured for hours and killed by gunshot; buried at Teratyn.
  - when: "1963"
    title: Reinterment in Warsaw
    body: His remains are transferred in October to the Orthodox cemetery in the Wola district of Warsaw.
  - when: March 20, 2003
    title: Glorification
    body: The Holy Synod of the Autocephalous Orthodox Church of Poland promulgates the Act of his canonization; his relics are enshrined in the Church of Saint John Climacus in Warsaw, and the glorification rites are celebrated in Chelm on June 7-8, 2003.
