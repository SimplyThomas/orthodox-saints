id: OS-1917
lifespan: Died September 28, 1541
overview:
  - Herodion of Iloezersk (also rendered Irodion; known as Herodion of Elias Lake) was a sixteenth-century Russian monastic and a disciple of Saint Cornelius of Komel. After the death of his teacher in 1537, he withdrew to Elias Lake (Lake Ilo), some 20 kilometers from White Lake in the Beloozero region, where he built himself a cell and established a church dedicated to the Nativity of the Most Holy Theotokos.
  - The community that grew around his settlement became known as the Elias Lake (Iloezersk) Ozadsk hermitage. Herodion led a life of strict asceticism marked by fasting, nightly prayer vigils, and reception of Holy Communion each Saturday. He died on September 28, 1541, as a schemamonk and was buried in the chapel he had built. His veneration developed locally and was documented and liturgically recognized by the mid-seventeenth century.
liturgicalTitle: Our Venerable Father Herodion, Abbot of Iloezersk
patronage:
  - Monasticism
  - Elias Lake / Iloezersk region
timeline:
  - when: "1537"
    title: Death of his teacher
    body: Saint Cornelius of Komel, Herodion's spiritual mentor, died on May 19, 1537. After his death, Herodion left for Elias Lake.
  - when: c. 1537–1541
    title: Foundation at Elias Lake
    body: Herodion settled on a peninsula (or island) at Elias Lake, roughly 20 kilometers from White Lake, built a cell, and established a church in honor of the Nativity of the Most Holy Theotokos. The Iloezersk Ozadsk hermitage grew around this settlement.
  - when: September 28, 1541
    title: Repose
    body: Having been forewarned of his death, according to tradition, by an angel, Herodion died as a schemamonk and was buried in the chapel he had constructed.
  - when: "1653"
    title: Documentation of his life
    body: At the direction of Nikon of Novgorod (later Patriarch of Moscow), Archimandrite Metrophanes (Mitrofan) of the Kirill-Beloozero (White Lake) Monastery compiled an account of Herodion's life and miracles, following a reported miracle from his relics. Annual liturgical commemoration was subsequently established.
sections:
  - heading: Life and Monastic Foundation
    body:
      - Herodion was a disciple of Saint Cornelius of Komel, one of the most influential monastic founders of northern Russia, who died on May 19, 1537. After the death of his mentor, Herodion sought solitude and settled at Elias Lake (Lake Ilo), some 20 kilometers (several versts) from White Lake in the Beloozero region.
      - On a peninsula at the lake he built himself a cell and established a church dedicated to the Nativity of the Most Holy Theotokos. Around this settlement grew the community later known as the Elias Lake (Iloezersk) Ozadsk hermitage, also called the Iloezersk Nativity-of-God hermitage.
      - "His manner of life was one of strict asceticism: he kept the fasts rigorously, maintained nightly prayer vigils, and received Holy Communion every Saturday. He died on September 28, 1541, as a schemamonk, and was buried in the chapel he had built; his relics were preserved there."
  - heading: Veneration and Documentation
    body:
      - Herodion's veneration developed locally and organically rather than through a recorded formal glorification by a church council. According to the accounts, his relics became a focus of reported miracles.
      - In 1653, an ecclesiastical inquiry into his life and miracles was carried out by Metrophanes (Mitrofan), archimandrite of the Kirill-Beloozero (White Lake) Monastery, who served in that office from 1652 to 1660. The investigation was undertaken at the direction of Nikon, then archbishop of Novgorod and later Patriarch of Moscow, who is said to have witnessed a miracle connected with the saint. A brief hagiographic account was compiled at that time, annual liturgical commemoration was established, and a church was erected at the site in his honor. By these means his veneration was officially recognized within the Russian Orthodox Church by the mid-seventeenth century, with his feast kept on September 28.
  - heading: Miracles and Traditions
    body:
      - Traditional accounts relate that an angel forewarned Herodion of his approaching death.
      - A further tradition holds that after his death a man named Sophonios struck the saint's grave disrespectfully with his staff and was immediately blinded. He is said to have recovered his sight after praying to Herodion, and this event is remembered as the occasion for the creation of the first icon of the saint.
