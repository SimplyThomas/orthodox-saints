lifespan: 1903-1961
liturgicalTitle: The Holy Hieromartyr Hilarion Felea of Arad
overview:
  - "Saint Hilarion Felea (Romanian: Ilarion Felea) was a Romanian Orthodox priest, professor, and theological writer who served in the Transylvanian city of Arad and died in 1961 in the Aiud prison under the communist regime. He is commemorated as a hieromartyr."
  - Trained in theology, literature, and philosophy at Sibiu, Cluj, and Bucharest, he combined a long pastoral ministry at the Arad cathedral with an academic career as a professor of dogmatics and apologetics and as a prolific editor and publicist of church periodicals.
  - Arrested repeatedly during the early decades of communist rule and ultimately sentenced to twenty years of hard labor, he was imprisoned at Aiud, where he died on September 18, 1961. The Romanian Orthodox Church canonized him in 2025, and his feast is kept on September 18.
