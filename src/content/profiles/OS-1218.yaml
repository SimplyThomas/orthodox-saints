  - name: Apostles Silas and Silvanus
    note: Paul's companion on the second missionary journey, present at Philippi at her conversion and afterward lodged in her home.
    href: saint/OS-1608
  - name: Apostle Timothy of the Seventy
    note: Paul's companion at Philippi when Lydia received the faith, who likewise lodged with her household.
    href: saint/OS-0512
