id: OS-0596
liturgicalTitle: The Holy Hieromartyr Abramius, Bishop of Arbela
lifespan: 4th century
overview:
  - Abramius, also called Abraham, was bishop of Arbela in Assyria and a hieromartyr of the fourth century. He is commemorated on February 4.
  - By the accounts he was seized during the persecution of the Christians under the Persian king Shapur II. When he was commanded to renounce Christ and to worship the sun, he answered that it was folly to forsake the Creator and to worship the creature instead. For this confession he was put to death.
