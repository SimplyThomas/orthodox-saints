works:
  - title: De Laude Virginitatis (In Praise of Virginity)
    desc: His principal prose treatise, addressed to a community of nuns, surveying the lives of saints who exemplified chastity.
  - title: Carmen de Virginitate
    desc: A verse recasting of the same material on virginity.
  - title: Aenigmata (Riddles)
    desc: A set of one hundred and one riddles in Latin hexameters; the longest, De creatura, runs to some eighty-three lines.
  - title: Epistola ad Acircium
    desc: A letter to King Aldfrith of Northumbria, with treatises on the number seven and on the rules of meter and prosody.
  - title: Epistola ad Geruntium
    desc: A letter to Geraint, king of Dumnonia, on the reckoning of Easter and the customs of the Britons.
  - title: Old English poetry and songs
    desc: Vernacular verse set to music, reported by William of Malmesbury and still popular in King Alfred's day, but not surviving.
