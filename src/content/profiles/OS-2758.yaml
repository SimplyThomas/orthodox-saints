id: OS-2758
lifespan: c. 350 – c. 410/417
liturgicalTitle: Our Venerable Mother Melania the Elder of Rome
overview:
  - Melania the Elder (c. 350 – c. 410/417) was a wealthy Roman noblewoman who, widowed young, gave herself to the ascetic life, used her fortune to support Orthodox monks and clergy exiled to Palestine, and founded a monastic community on the Mount of Olives.
  - Related to Paulinus of Nola and born into a family of consular rank, she travelled from Rome to the Egyptian desert and then to Jerusalem, becoming a patron and spiritual companion of leading ascetics of the age, including Evagrius of Pontus and Rufinus of Aquileia.
  - She was the paternal grandmother of Saint Melania the Younger. Her memory is kept on June 8, and she is venerated in both the Eastern Orthodox Church and the Anglican Communion.
sections:
  - heading: Early Life and Widowhood
    body:
      - Melania was born around the year 350, by tradition in Hispania, into a family of extraordinary wealth and privilege; her father Marcellinus held consular rank, and she was related to Paulinus of Nola. At about fourteen years of age she married a patrician, identified in the sources as a member of the gens Valeria.
      - "By the age of twenty-two she had suffered severe loss: her husband and two of her three sons had died, leaving her a widow of considerable means. Her surviving son was Valerius Publicola. Having become a Christian in Rome, Melania resolved on a radical change of life, leaving Publicola in the care of guardians and travelling to Alexandria with servants to join the Christian ascetics of Egypt."
  - heading: Ascetic Life in Egypt and Support of the Exiled
    body:
      - For roughly six months Melania lived among the monks of the desert region near Alexandria, today known as the Nitrian Desert (Wadi Natroun), drawing on her wealth and influence to assist monks, priests, and bishops there.
      - After the death of Bishop Athanasius of Alexandria in 373, persecution broke out and many monks were exiled to Diocaesaraea in Palestine. Melania followed these displaced communities and provided them with crucial financial support. When local authorities briefly imprisoned her, they released her at once on recognizing her social rank — an illustration of how her noble standing shielded her even as she openly aided persecuted religious figures.
  - heading: Foundation on the Mount of Olives
    body:
      - Melania relocated to Jerusalem, where she established a convent for herself and a monastery on the Mount of Olives associated with Rufinus of Aquileia, a monk and theologian who became her close spiritual companion. This double monastery ranks among the earliest organized Christian monastic communities in the Holy Land.
      - As a supporter of the theology of Origen, she became caught up in the bitter ecclesiastical controversies of the 390s. Jerome, once a lavish admirer, turned against her and punned on her name — Melania means 'black' — calling her 'black in name and black in nature,' while Palladius of Galatia by contrast described her as a very learned lady.
  - heading: Return to Rome and Final Years
    body:
      - Around the year 400 Melania journeyed to Rome to visit her son Publicola, who had married Caeionia Albina, daughter of the Roman nobleman Caeionius Rufius Albinus. During this period she also visited her kinsman Paulinus of Nola and his wife Therasia, bringing them a relic of the True Cross.
      - According to Augustine of Hippo, Melania was in North Africa when her son Valerius died in 406. She herself died either before 410 or around 417 — the sources differ — having lived roughly sixty-five to seventy years.
  - heading: Family
    body:
      - Melania was the paternal grandmother of Saint Melania the Younger, who likewise embraced monastic life and renounced great wealth. Through her son Valerius Publicola and his wife Caeionia Albina, the two Melanias belonged to the same distinguished Roman family.
  - heading: Influence and Legacy
    body:
      - Beyond her monastic foundations, Melania significantly shaped prominent Christian thinkers of her time. She served as spiritual mentor to Evagrius of Pontus, whose writings were later preserved in the Eastern Orthodox Philokalia; she is credited with persuading him to travel to Egypt to join the desert ascetics and with maintaining correspondence with him throughout his monastic career.
      - She is honored in both the Eastern Orthodox Church and the Anglican Communion. Her feast on June 8 is her traditional Western commemoration; Eastern observance may differ, and she does not appear on every Orthodox calendar.
timeline:
  - when: c. 350
    title: Birth
    body: Born, by tradition in Hispania, into a family of consular rank and great wealth; related to Paulinus of Nola.
  - when: c. 364
    title: Marriage
    body: At about age fourteen, marries a patrician of the gens Valeria.
  - when: c. 372
    title: Widowhood
    body: By about age twenty-two, her husband and two of three sons have died; her surviving son is Valerius Publicola.
  - when: c. 372–373
    title: Journey to Egypt
    body: Leaves her son with guardians and travels to Alexandria, living about six months among the monks of the Nitrian Desert and supporting monks, priests, and bishops.
  - when: "373"
    title: Support of the exiled
    body: After the death of Athanasius of Alexandria, follows monks exiled to Diocaesaraea in Palestine and funds them; briefly imprisoned, then released on recognition of her rank.
  - when: c. 378
    title: Monastery on the Mount of Olives
    body: Settles in Jerusalem, founding a convent and a monastery associated with Rufinus of Aquileia, her spiritual companion.
  - when: 390s
    title: Origenist controversy
    body: As a supporter of Origen's theology, becomes embroiled in ecclesiastical dispute; Jerome, formerly an admirer, turns against her.
  - when: c. 400
    title: Return to Rome
    body: Visits her son Publicola in Rome and her kinsman Paulinus of Nola, bringing a relic of the True Cross.
  - when: "406"
    title: Death of her son
    body: While she is in North Africa, her son Valerius dies, as recorded by Augustine of Hippo.
  - when: c. 410–417
    title: Repose
    body: Dies, having lived approximately sixty-five to seventy years; sources vary on the exact date.
