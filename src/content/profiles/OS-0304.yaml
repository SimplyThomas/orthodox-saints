id: OS-0304
liturgicalTitle: The Holy New Hieromartyr Stephen (Kreidich), Priest of Robchik
lifespan: 1874 - 1937
overview:
  - Stephen Kreidich was a parish priest of Robchik in the Bryansk region who was put to death during the Soviet persecution of the Church in 1937. He is venerated as a New Hieromartyr and is numbered among the Synaxis of New Martyrs and Confessors of Russia, with his commemoration kept on September 7.
  - Born in 1874 to a Belarusian peasant family, he served the Church for many years before his ordination and was arrested, sentenced to the labor camps, and finally shot during the campaign against clergy in the late 1930s.
timeline:
  - when: "1874"
    title: Birth
    body: Born in the village of Vavulichi in Grodno Governorate, into a Belarusian peasant family. He served the Church as a psalmist and choir singer for many years before his ordination.
  - when: "1932"
    title: Ordained priest
    body: Ordained to the priesthood and assigned to the church of the village of Robchik in the Bryansk region, where he served as parish priest.
  - when: "1936"
    title: Arrest and sentence
    body: Arrested by the Soviet authorities and charged with agitation against the collective farms and with religious instruction of the young. He was sentenced to seven years in the corrective-labor camps and transferred to the Karlag camp system in the Karaganda region.
  - when: "1937"
    title: Martyrdom
    body: Condemned to death by a tribunal of the NKVD and shot, together with Metropolitan Eugene (Zernov) and other imprisoned clergy. He is commemorated as a New Hieromartyr on September 7.
  - when: "2000"
    title: Glorification
    body: Numbered among the New Martyrs and Confessors of the Russian Church at the Jubilee Council of the Russian Orthodox Church.
sections:
  - heading: Martyrdom under the Soviet persecution
    body:
      - Stephen Kreidich's death belongs to the wave of repression against the Russian Orthodox clergy in the 1930s. After serving his Bryansk parish for only a few years, he was arrested on charges typical of the period, including resistance to collectivization and the religious teaching of children, and was sent to a labor camp.
      - While imprisoned in the Karlag system in the Karaganda region, he was condemned anew and executed by shooting alongside Metropolitan Eugene (Zernov) and a small group of fellow clergy, sharing in their martyrdom.
patronage:
  - Those who suffer persecution for the faith
  - Parish clergy
