id: OS-2900
lifespan: 4th century – c. 430
overview:
  - Alypius of Thagaste (4th century – c. 430) was a North African churchman, the lifelong friend of Augustine of Hippo and later bishop of their shared native town of Thagaste. Born into an aristocratic family in Thagaste, a Roman town in Africa Proconsularis (in modern Algeria), he first knew Augustine as his student at Carthage, where the two formed a deep friendship.
  - "He shared many of the stages of Augustine's spiritual journey: an early attraction to Manichaeism, a legal career that took him to Rome as a magistrate, and finally the move to Milan in 384, where both men came under the preaching of Bishop Ambrose. Alypius was present at the decisive moment of Augustine's conversion and was baptized alongside him by Ambrose at the Easter vigil in 387."
  - Returning with Augustine to Africa, he helped establish an early monastic community at Thagaste and, from around 394, served as the town's bishop. He became one of Augustine's closest allies in the councils that contested the Donatist schism and the Pelagian controversy. He is venerated in both the Eastern Orthodox and Roman Catholic churches, and reposed around 430.
liturgicalTitle: Our Father among the Saints Alypius, Bishop of Thagaste
sections:
  - heading: Early Life and Friendship with Augustine
    body:
      - Alypius was born in the 4th century at Thagaste into an aristocratic family. He became a student of Augustine at Carthage, and there the two men developed the deep friendship that would shape both of their lives. During these years Alypius was drawn to Manichaeism, valuing the sect's strict ethical standards on chastity; according to Augustine's Confessions, he held that marriage would interfere with the search for wisdom.
      - "Augustine's Confessions preserves a well-known episode of Alypius's youth: friends brought him to the violent gladiatorial games, which he was determined to resist. Overcome by the roar of the crowd, he opened his eyes, was caught up in the spectacle, and only later came to repent of the fascination it had held over him. Alypius trained in law and served as a magistrate in Rome."
  - heading: Milan and Conversion
    body:
      - "In 384 Alypius joined Augustine in Milan, where both heard the preaching of Bishop Ambrose. He was present during the garden scene that Augustine recounts as the climax of his conversion: Augustine ran to find Alypius where he had left him, and there took up the Epistles of St. Paul. Alypius thus stood at Augustine's side at the decisive turning point rather than as a mere onlooker."
      - In the narrative of the Confessions the two men's wills are shown struggling in parallel, and Alypius made his own decision for the Christian life alongside Augustine, to the joy of Augustine's mother Monica. At the Easter vigil in April 387 Alypius was baptized by Ambrose together with Augustine and Augustine's son Adeodatus.
  - heading: Return to Africa and Episcopate
    body:
      - After their baptism Alypius and Augustine returned to Thagaste, where Alypius helped Augustine establish a monastic community described as the first monastery in North Africa. When Augustine became a priest at Hippo, Alypius moved there and joined the monastic life. Around 394, following a pilgrimage to the Holy Land where he met Jerome, Alypius became Bishop of Thagaste.
      - The Life of Saint Melania the Younger recalls Alypius, before his consecration, as an eloquent and learned presbyter at Thagaste who edified all who heard him teach; Melania and her husband Pinianos, who had given away their great fortune, adorned his church with rich offerings and endowed it with several villages. Around 395 Alypius wrote to Paulinus of Nola requesting a copy of Eusebius's Ecclesiastical History, a correspondence that has been thought to lie behind Augustine's later Confessions.
  - heading: Councils and Controversies
    body:
      - As bishop, Alypius took an active part in the African councils that addressed the Donatist schism. In 411 he was chosen, together with Possidius and Augustine, to represent the Catholic bishops at the conference with the Donatists at Carthage. He also attended the Council of Milevi in Numidia in 416 and composed a written report on that council for Pope Innocent I, part of the African churches' engagement with the Pelagian controversy.
  - heading: Veneration and Legacy
    body:
      - Alypius is venerated in both the Eastern Orthodox and Roman Catholic churches. Pope Gregory XIII added him to the Roman Martyrology in 1584. His feast is kept on August 15 in the Roman Catholic calendar, on August 17 by the Canons Regular of St. Augustine, and on May 16 together with Possidius by the Augustinian Friars. He died around 430.
      - Because of his prominence in Augustine's Confessions, where he appears across several books as Augustine's closest companion, Alypius is remembered above all as the faithful friend who accompanied Augustine through doubt, conversion, and the labors of the African episcopate.
