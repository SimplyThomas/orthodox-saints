sections:
  - heading: A Family of Saints
    body:
      - Florentina belonged to one of the most consequential Christian families of Visigothic Spain. Her brothers were Leander, Archbishop of Seville; Isidore of Seville, the encyclopedist and Doctor who succeeded Leander as archbishop; and Fulgentius, bishop of Cartagena and Astigi. All four siblings are venerated as saints by both the Catholic and Eastern Orthodox Churches.
      - The family was connected to Visigothic royalty and was influential in the conversion of the Visigothic kings from Arianism to the catholic (Orthodox) faith. Sources place the siblings' origins around the year 560 in Cartagena.
      - As guardian after their parents' death, Leander formed Florentina in the monastic life, and the bond between the siblings shaped her vocation and her community, which lay in the city where Fulgentius served as bishop.
  - heading: Abbess and Community
    body:
      - Florentina led a community of consecrated women as its abbess. Later sources identify the community with the convent of Santa Maria de Valle near Ecija (Astigis).
      - "Medieval tradition greatly magnified her role, claiming she directed as many as forty convents and a thousand nuns. Modern historians treat this figure with caution: it seems unlikely given the few functioning monastic institutions in the region during her lifetime, and is best read as a later expression of her reputation rather than a documented headcount."
  - heading: Writings Addressed to Her
    body:
      - Florentina is remembered in part through the works her brothers composed for her guidance. Her brother Leander wrote for her the treatise De institutione virginum et contemptu mundi (On the Formation of Nuns and the Contempt of the World), one of only two surviving works attributed to him.
      - The tradition also holds that her brothers addressed treatises on the virginal life to her, marking her as a figure around whom the family's teaching on consecrated virginity took shape.
  - heading: Relics & Shrines
    body:
      - Portions of Florentina's relics rest in the cathedral at Murcia, while most are preserved at Berzocana, Spain, where she is venerated together with her brother Fulgentius. She is regarded as the patroness of the diocese of Plasencia.
  - heading: Veneration
    body:
      - Florentina's feast is kept on June 20, with an alternative date of August 28 cited in some sources. Her veneration in the Eastern Orthodox Church rests on her universal pre-schism recognition as a saint alongside her brothers rather than on any formal modern glorification act, no record of which was located.
      - Her commemoration does not appear in the OCA synaxarion for June 20, and no dedicated OrthodoxWiki article was found, reflecting her status as a pre-schism Western saint venerated across both traditions.
