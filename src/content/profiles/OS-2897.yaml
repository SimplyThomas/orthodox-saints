id: OS-2897
lifespan: c. 560 – c. 612
overview:
  - Florentina of Cartagena was a consecrated virgin and abbess in Visigothic Spain, the youngest of four siblings all venerated as saints. She was born around the mid-sixth century in Cartagena, in the Roman province of Hispania, into a distinguished Hispano-Roman Christian family of high social rank.
  - "Her three brothers each became a bishop: Leander, later Archbishop of Seville; Isidore, who succeeded Leander in that see; and Fulgentius, bishop of Cartagena and Astigi (Ecija). After the early death of their parents, Leander became Florentina's guardian and directed her toward the ascetic life."
  - Under Leander's guidance she gathered virgins who wished to forsake the world and formed them into a religious community, later identified with the convent of Santa Maria de Valle near Ecija, of which she became abbess. She reposed around the year 612.
liturgicalTitle: Our Venerable Mother Florentina of Cartagena
patronage:
  - Diocese of Plasencia
  - Consecrated virgins
  - Nuns
