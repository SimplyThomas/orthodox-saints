liturgicalTitle: The Holy Virgin Martyr Juliana of Nicomedia, and Those Martyred With Her
sources:
  - OCA Synaxarion (oca.org), Lives of the Saints
  - https://www.oca.org/saints/lives/2025/12/21/103601-virgin-martyr-juliana-of-nicomedia-and-500-men-and-130-women-wit
  - https://orthodoxwiki.org/Juliana_of_Nicomedia
