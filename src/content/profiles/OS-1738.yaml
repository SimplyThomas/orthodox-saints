flagReasons:
  - claim: The mountain monastery is, in later tradition, identified with the community on Mount Mela in the region of Pontus.
    detail: This contradicts the anchor row, whose Region of Origin is Palestine / Holy Land. The Pontus identification derives only from the Sumela Monastery context source (Mount Mela = Sumela, near Trebizond), which does not name Christopher and is geographic background, not a source on the saint. The anchor wins on conflict, so locating him in Pontus is unsupported relative to the governing row. The claim is hedged ('in later tradition') but still asserts a region that conflicts with the anchor.
