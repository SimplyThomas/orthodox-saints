liturgicalTitle: The Righteous Tola, Judge of Israel
overview:
  - Tola was one of the judges of Israel, named in the Book of Judges as the son of Puah, of the tribe of Issachar. According to the scriptural account he arose after the death of Abimelech and judged Israel for twenty-three years, dwelling at Shamir in the hill country of Ephraim, where he was also buried.
  - "Among the Old Testament figures, Tola is one of the least documented: the biblical text records none of his deeds, devoting only two verses to his entire tenure. In the Orthodox calendar he is numbered among the Holy Forefathers, the ancestors and righteous of Israel commemorated in the weeks before the Nativity of Christ."
sections:
  - heading: Biblical Account
    body:
      - Tola appears in Judges 10:1-2, where he is described as "the son of Puah, the son of Dodo, a man of Issachar." He is counted among the so-called minor judges of Israel — figures such as Shamgar, Jair, Ibzan, Elon, and Abdon — of whom the text preserves little beyond name, lineage, tenure, and burial place, in contrast to the extended narratives given to the major judges.
      - The account states that Tola arose to deliver Israel following the death of Abimelech and judged Israel for twenty-three years. He lived at Shamir in the hill country of Ephraim and was buried there. He was succeeded in the office of judge by Jair. No specific deeds or military exploits are recorded of him.
  - heading: Commemoration Among the Forefathers
    body:
      - Tola is venerated in the Orthodox tradition among the Holy Forefathers, the righteous ancestors and forebears of Christ according to the flesh who lived before and under the Law. This commemoration, observed on the Sundays before the Nativity during the Nativity Fast, gathers the patriarchs, prophets, judges, and kings of Israel in preparation for the feast of the Incarnation. He is listed in the synaxarion on December 14.
