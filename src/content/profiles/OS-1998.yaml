    body: After the persecution following Stephen's martyrdom, Philip evangelizes in Samaria with great success and converts Simon Magus.
  - when: 1st century
    title: Baptism of the Ethiopian eunuch
    body: Directed by an angel to the Jerusalem-Gaza road, Philip explains Isaiah to an Ethiopian court official and baptizes him; the Spirit then carries him to Azotus.
  - when: 1st century
    title: Settling at Caesarea
    body: Philip preaches through the cities to Caesarea Maritima and settles there with his four prophesying daughters; Paul and his companions later visit him (Acts 21:8-9).
