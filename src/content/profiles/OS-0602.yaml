id: OS-0602
lifespan: 1st–2nd century
overview:
  - Saint Bucolus (also spelled Boukolos) was an early bishop of Smyrna in Asia Minor, traditionally remembered as a disciple of the Apostle and Evangelist John the Theologian. By the grace of God he brought many pagans to baptism, gave spiritual guidance to his flock, and defended the Christian faith.
  - He is most notably remembered for consecrating Saint Polycarp of Smyrna as his successor before reposing in peace. Through this line of succession he stands at the head of one of the best-documented episcopal sees of the apostolic and sub-apostolic age. His feast is kept on February 6.
liturgicalTitle: Our Father among the Saints Bucolus, Bishop of Smyrna
patronage:
  - The city and church of Smyrna (modern Izmir, Turkey)
