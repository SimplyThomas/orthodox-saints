id: OS-1941
liturgicalTitle: The Righteous Warrior Theodore Ushakov, Admiral of the Russian Fleet
lifespan: 1745 - 1817
overview:
  - Theodore Ushakov was a Russian admiral, one of the foremost naval commanders of the late eighteenth and early nineteenth centuries, who in his retirement lived a life of piety and charity near the Sanaksar Monastery. Born in 1745, he entered the Imperial Russian Navy and rose to command the Black Sea Fleet, distinguishing himself in the Russo-Turkish War of 1787-1792 and in the Mediterranean campaign against France.
  - After his withdrawal from service he settled near the Sanaksar Monastery in Mordovia, where he attended the services, gave generously to the monastery and to the poor, and was buried beside its church on his repose in 1817. He was glorified by the Russian Orthodox Church in the early twenty-first century and named a patron of the Russian Navy. He is distinct from his relative Saint Theodore of Sanaksar, a monastic saint of the previous generation.
