id: OS-1168
liturgicalTitle: Our Venerable Father Isidore, Fool-for-Christ and Wonderworker of Rostov
lifespan: d. 1474
overview:
  - >-
    Isidore of Rostov, surnamed Tverdislov, was a fool-for-Christ who lived and
    died in the Russian city of Rostov in the fifteenth century. By the accounts
    preserved in the synaxarion he was of Western and well-to-do background, born
    in the German lands to wealthy parents and raised in the Latin confession.
    Embracing the Orthodox faith, he gave away his inheritance, took up the staff
    of a wanderer, and at length settled at Rostov, where he assumed the difficult
    ascetic path of holy foolishness.
  - >-
    At Rostov he built himself a crude hut and lived without shelter from filth,
    snow, rain, and cold, enduring every outrage while concealing great gifts of
    unceasing prayer and wonderworking beneath an outward show of folly. He is
    surnamed Tverdislov, "Constant of Word," from his manner of speaking. He
    reposed in 1474, and the Church of the Ascension was later raised over his
    grave, where his relics are venerated. He is commemorated on May 14, and is
    distinct from the Martyr Isidore of Chios honored the same day.
sections:
  - heading: Western birth and conversion
    body:
      - >-
        According to the tradition recorded in the Orthodox calendar, Isidore was
        born in the German lands, by some accounts near Brandenburg, to a wealthy
        family and was raised in Roman Catholicism. From his youth he is said to
        have led an unsullied life and shown a compassionate understanding. The
        sources do not specify where he received the Orthodox faith, but having
        embraced it he distributed his wealth to the poor and, desiring the Kingdom
        of God, left his home to live as a pilgrim, traveling through many lands and
        cities before coming to Russia.
  - heading: The fool-for-Christ at Rostov
    body:
      - >-
        Settling at Rostov, Isidore built a rickety hut of branches for himself and
        chose the manner of life that the Apostle Paul describes when he speaks of
        the apostles as fools for Christ's sake. By night he gave himself to
        unceasing prayer, allowing himself little sleep; by day he wandered the
        streets and marketplaces of the city in voluntary foolishness, bearing
        insults and hardship. Beneath this hidden life the synaxarion relates that
        he received the grace to work miracles.
  - heading: Repose and veneration
    body:
      - >-
        Isidore reposed in 1474. By tradition his death was made known when an
        unusual fragrance spread through the city near his hut. A church of the
        Ascension of the Lord was built at the place of his burial in Rostov, and
        his relics rest there as a source of healing. Later accounts relate that a
        stone church replaced the earlier wooden chapel in the sixteenth century and
        that a shrine was set over his tomb in the nineteenth.
related:
  - name: Martyr Isidore of Chios
    note: A distinct saint commemorated on the same day, May 14
patronage:
  - Converts to the Orthodox faith from the West
  - Those who embrace voluntary poverty and ascetic life
