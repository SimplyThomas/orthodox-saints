id: OS-2852
lifespan: c. 626 – 680
overview:
  - Bathild (also Balthild or Bathilde) was a seventh-century queen of the Franks, born in England around 626. As a young girl she was seized and sold into slavery in Francia, entering the household of Erchinoald, the mayor of the palace of Neustria. Her bearing and diligence there drew the notice of the Frankish court, and King Clovis II took her as his wife around 649.
  - As queen she was known for humility, charity, and generous almsgiving. She bore Clovis three sons — Clotaire III, Childeric II, and Theuderic (Thierry) III — all of whom became kings. After Clovis's death (dated between 655 and 658), Bathild served as regent during the minority of her eldest son, governing capably for several years. Drawing on her own experience of bondage, she moved against the slave trade, forbidding the sale of Christian slaves and working to redeem those already enslaved.
  - A generous patron of monastic life, she endowed the abbeys of Chelles and Corbie and supported other religious houses. In her later years she withdrew to the Abbey of Chelles near Paris, where she lived as a nun in obedience and humble service until her death on 30 January 680. She is venerated in both the Eastern Orthodox and Roman Catholic Churches, with a feast day of January 30.
liturgicalTitle: The Holy Right-believing Queen Bathild, Nun of Chelles
sections:
  - heading: From Slavery to the Throne
    body:
      - By her vita, Bathild was an Anglo-Saxon girl who was taken from her native England — by tradition, carried off by raiders — and sold into slavery in Francia. She served in the household of Erchinoald, the mayor of the palace of Neustria, one of the highest officials of the Frankish realm.
      - "When Erchinoald was widowed and sought to marry her, Bathild avoided the union: accounts relate that she hid herself, disguised in shabby dress among the lower servants, until he had married another. Not long afterward she came to the notice of King Clovis II, who asked for her hand. Their marriage is dated around 649. As queen she was remembered as humble and modest, and celebrated for her charitable service and generous donations."
  - heading: Queen-Regent and the Freeing of Slaves
    body:
      - After the death of Clovis II, Bathild acted as regent for her young son during his minority, and her contemporaries regarded her as a capable stateswoman. She used her authority to attack the slave trade of which she herself had once been a victim.
      - According to her hagiography she abolished the trading of Christian slaves and worked to free children who had been sold into bondage. Sources credit her with forbidding the purchase of Christian slaves and the sale of Frankish subjects, and with redeeming many captives; one tradition holds that any slave who set foot in her lands was thereby made free. In this charity she worked closely with Saint Eligius (Eloi) of Noyon, with whom she shared the labor of buying and freeing slaves. She also supported churchmen such as Saints Ouen and Léger, opposed the sale of church offices, and strengthened monastic discipline. Following a power struggle with the mayor Ebroin, she withdrew from public life to the Abbey of Chelles.
  - heading: Monastic Patronage and Foundations
    body:
      - Bathild was a major benefactor of monastic life. From her donations the abbeys of Corbie and Chelles were founded, and the monasteries of Jumièges, Jouarre, and Luxeuil were also likely established or endowed through her.
      - She refounded and richly endowed the Abbey of Chelles near Paris around 657–660, on the site of an earlier chapel attributed to Queen Clotilde, giving the first of two great endowments that enabled the abbey and a large new Church of the Holy Cross to be built. When she retired there she brought a second endowment to the community.
  - heading: Withdrawal to Chelles and Repose
    body:
      - In her later years — accounts place her retirement in the mid-660s, once her son had come of age — Bathild entered the Abbey of Chelles as a nun. There she lived under the authority of the abbess (named in the sources as Bertille/Berthille), performing the humblest tasks and caring for the sick, and was remembered for the perfection of her monastic virtues.
      - She died at Chelles on 30 January 680 and was buried in the abbey. Her hagiography was written soon after her death, probably by a nun of the community. By tradition she was granted, near her death, a vision of a ladder set before the Church of the Mother of God whose summit reached to heaven.
  - heading: Relics & Shrines
    body:
      - Bathild was buried at the Abbey of Chelles, and her personal possessions were treated there as relics — among them religious vestments, including a chasuble embroidered with a pectoral cross and the image of a necklace, still displayed in the museum at the site. Her relics remain enshrined in the abbey church.
      - Her official cult began when her remains were transferred to a new church in 833, under the auspices of the Emperor Louis the Pious. She was later canonized by Pope Nicholas I, around 860.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: The elevation and translation of her relics in 833 and her formal canonization by Pope Nicholas I mark the establishment of her public veneration. Her early vita, composed at Chelles, is the principal historical witness to her life."
      - "Traditional Accounts: Many miracles are said to have been worked through her intercession after her death. According to William of Malmesbury, some of her relics were deposited at Glastonbury in England. A later tradition also names her as godmother to Saint Radegonde (of Celles), whose relics were said to be interred with hers."
