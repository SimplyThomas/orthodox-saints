id: OS-2850
lifespan: c. 592 – 8 May 652
overview:
  - Saint Itta of Metz (also called Ida, Itte, or Iduberga; c. 592 – 652) was a Frankish noblewoman of the Merovingian era, the wife of Pepin of Landen and mother of Saint Gertrude of Nivelles. Born at Metz in the Kingdom of Austrasia, she descended from senatorial families originating in Aquitaine.
  - After the death of her husband around 640, Itta withdrew from the royal court to embrace a religious life alongside her daughter Gertrude. About 647, at the urging of Bishop Amandus of Maastricht, she founded the Abbey of Nivelles, becoming its co-founder and, by tradition, its first leader before entrusting its governance to her daughter.
  - Through her children she became a matriarch of the family that would give rise to the Carolingian dynasty. She is commemorated as a saint on 8 May.
patronage:
  - Itteville
timeline:
  - when: c. 592
    title: Birth at Metz
    body: Itta is born at Metz in the Kingdom of Austrasia, into senatorial families originating in Aquitaine. Her father was likely Arnoald, Bishop of Metz.
  - when: c. 610s
    title: Marriage to Pepin of Landen
    body: She marries Pepin of Landen (c. 580–640), who served as Mayor of the Palace under the Merovingian kings. Their children include Grimoald the Elder, Gertrude, Begga, Bavo (Allowin), and Modesta.
  - when: c. 640
    title: Widowhood
    body: After Pepin's death around 640, Itta withdraws from the capital to pursue a religious life together with her daughter Gertrude.
  - when: c. 647
    title: Foundation of Nivelles
    body: Advised by Bishop Amandus of Maastricht, who came preaching the word of God, she founds the Abbey of Nivelles as a monastic community and, by tradition, appoints her daughter Gertrude as abbess.
  - when: 8 May 652
    title: Repose
    body: Itta dies at the Abbey of Nivelles at about the age of sixty. Gertrude thereafter takes the whole burden of governing the community upon herself.
sections:
  - heading: Family and Descendants
    body:
      - Itta married Pepin of Landen, Mayor of the Palace of the Merovingian kings. Her siblings included Modoald, Bishop of Trier, and Severa, an abbess.
      - Her children were Grimoald the Elder (616–657), later Mayor of the Palace; Saint Gertrude of Nivelles (c. 628–659); Begga (613–693), Abbess of Andenne, who married Ansegisel; Bavo, also called Allowin, who became a hermit and was venerated as a saint; and Modesta (died c. 660), who entered religious life.
      - Through her daughter Begga, Itta became the grandmother of Pepin of Herstal and an ancestor of Charlemagne, making her a matriarch of the family from which the Carolingian dynasty arose.
  - heading: Foundation of Nivelles
    body:
      - Around 647, following her husband's death, Itta founded the Abbey of Nivelles at the urging of Bishop Amandus of Maastricht, who supported the establishment of the monastic community.
      - Originally a house of nuns, Nivelles became a double monastery after Irish monks from Mont Saint-Quentin Abbey, sent by Abbot Foillan, arrived to assist its operations. Under their influence the community adopted the severe asceticism characteristic of Irish monasticism, with separate sections for monks and nuns under unified leadership.
      - By tradition Itta appointed her daughter Gertrude as abbess. Upon Itta's death, Gertrude assumed sole responsibility for governing both the spiritual and administrative affairs of the monastery.
  - heading: Relics and Shrines
    body:
      - Itta is honored as the patron saint of Itteville in France, a place founded on a farm she had established.
      - Her principal shrine is associated with the Collegiate Church of Saint Gertrude in Nivelles, Belgium, where her daughter is also venerated.
