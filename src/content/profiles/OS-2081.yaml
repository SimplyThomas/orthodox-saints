    body: Athanasius, loving the monastic life, secretly leaves his parental home, but is forcibly brought back by his father.
  - when: Later
    title: Entry into Medikion
    body: With his father's consent, Athanasius enters the Medikion Monastery, where he becomes a companion of Saint Nicetas.
  - when: ca. 814
    title: Repose
    body: Athanasius reposes. A cypress tree is said to grow on his grave, through which many healings are reported.
