id: OS-2274
lifespan: d. 274
liturgicalTitle: The Holy Martyr Phaedrus
overview:
  - Phaedrus is an early martyr of the Church commemorated on November 29, of whom no detailed biography survives. He is remembered chiefly through the manner of his death and his continued liturgical commemoration.
  - According to the surviving tradition he was put to death in 274 by having hot resin poured over him. His martyrdom is placed at Ancyra, the capital of the Roman province of Galatia (modern Ankara, Turkey), during the persecution of Christians under the emperor Aurelian (270–275), with the governor Felix presiding.
  - Phaedrus is grouped in the November 29 commemoration alongside two fellow martyrs of Ancyra in the same year, Philoumenos of Ancyra and Valerian. Where a fuller vita survives for Philoumenos, the sources record for Phaedrus little beyond his name, the year of his death, and the method of his execution.
timeline:
  - when: "274"
    title: Martyrdom at Ancyra
    body: Phaedrus is put to death by having hot resin poured over him, during the persecution of the emperor Aurelian under the governor Felix at Ancyra in Galatia.
sections:
  - heading: Historical Context
    body:
      - The martyrdom is set during the reign of the emperor Aurelian (270–275), remembered in the Church's calendars for a renewed persecution of Christians. The three martyrs of Ancyra commemorated on November 29 — Phaedrus, Philoumenos, and Valerian — are all assigned to the year 274 and to the same governor, Felix, who is named as presiding over the trials.
      - "Ancyra (modern Ankara) was the capital of the Roman province of Galatia. For Phaedrus specifically the sources preserve only the essentials: his name, the year, and that he was killed by having hot resin poured over him."
  - heading: Commemorated With
    body:
      - Phaedrus is listed within a single November 29 commemoration together with Martyr Philoumenos of Ancyra and Martyr Valerian, all three martyred in 274. The calendars record their deaths by different means — Phaedrus by hot resin, Valerian by the sword, and Philoumenos after prolonged torture and loss of blood.
      - A fuller account survives only for Philoumenos, described as a bread merchant (in some accounts a traveling grain merchant from Lycaonia) arrested at Ancyra after being denounced as a Christian. His narrative supplies the shared setting — Aurelian's persecution under the governor Felix — against which Phaedrus and Valerian are commemorated, though no comparable biographical detail for the latter two has come down.
  - heading: Veneration
    body:
      - "Distinct liturgical texts for Phaedrus survive, including a Troparion in Tone 3 and a Kontakion in Tone 2. These are standard martyrial formularies: the Troparion honors him as a martyr who received an incorruptible crown and overcame his adversaries, and the Kontakion hails him as a bright star announcing Christ and enlightening the faithful."
      - The existence of these proper texts indicates that Phaedrus has been commemorated as a martyr in his own right, and not merely as a name appended to the feast of Philoumenos.
