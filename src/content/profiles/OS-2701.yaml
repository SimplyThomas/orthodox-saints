timeline:
  - when: 7th century
    title: Birth in Tegeingl
    body: Winifred is born in Tegeingl, in present-day Flintshire, to the nobleman Tyfid ap Eiludd and his wife Wenlo, a niece of Saint Beuno.
  - when: c. 660
    title: Death at Gwytherin
    body: After years at Holywell and then at Gwytherin in Denbighshire, where she served as nun and abbess, Winifred dies.
  - when: "1138"
    title: Translation to Shrewsbury
    body: Prior Robert translates Winifred's relics from Gwytherin to Shrewsbury Abbey, which becomes a major pilgrimage site.
  - when: "1540"
    title: Destruction of Shrewsbury Abbey
    body: Shrewsbury Abbey is destroyed under Henry VIII.
  - when: "1991"
    title: Discovery of the oak reliquary
    body: Fragments of an eighth-century oak reliquary are discovered, providing evidence that Winifred was recognized as a saint shortly after her death.
