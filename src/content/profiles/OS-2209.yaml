id: OS-2209
lifespan: died c. 302–306
liturgicalTitle: The Holy and Glorious Martyr Platon of Ancyra
overview:
  - Platon of Ancyra was an early-fourth-century martyr from the city of Ancyra in Galatia (Asia Minor) and the brother of the physician-martyr Antiochus. While still a young man, he left his home and traveled through various cities, preaching Christian teaching to pagan audiences.
  - He was noted for the persuasiveness and beauty of his speech and for his command of Greek philosophy, which he turned to commend the Gospel. His public preaching led to his arrest, and after refusing repeated inducements and enduring prolonged torture and imprisonment, he was beheaded under the persecution of the Roman authorities. He is commemorated on November 18.
sections: []
timeline:
  - when: Late 3rd century
    title: Origins in Ancyra
    body: Platon is born in the city of Ancyra in Galatia, the brother of Antiochus, later venerated as a physician-martyr (commemorated July 16).
  - when: As a young man
    title: Travels and preaching
    body: He departs his home and travels through various cities, proclaiming Christian teaching to pagan audiences with notable eloquence and learning.
  - when: c. 302–306
    title: Arrest and interrogation
    body: His preaching leads to his arrest and presentation before the governor Agrippinus at a temple of Zeus, who attempts flattery, offers a marriage incentive, and threatens torture; Platon refuses to renounce Christ.
  - when: c. 302–306
    title: Imprisonment and martyrdom
    body: After severe beatings and a prolonged imprisonment, by tradition lasting many days without food or water, Platon again refuses to sacrifice and is beheaded by order of Agrippinus.
