id: OS-2862
lifespan: c. 611 – 683
overview:
  - Pope Leo II was a seventh-century Bishop of Rome, a Sicilian by birth remembered for his learning and his skill in sacred chant. His principal act was to confirm the acts of the Sixth Ecumenical Council (Constantinople III, 680–681), which condemned the Monothelite heresy, and to circulate its decrees throughout the Western Church. He is venerated as a pre-schism Western saint in the Orthodox Church, with a feast day of July 3.
  - Though he was elected only a few days after the death of his predecessor Pope Agatho in January 681, his consecration was delayed some nineteen months, and his active pontificate lasted less than a single year. Within that brief span he settled a long dispute with the see of Ravenna, translated the relics of martyrs into a church he built to shelter them, and reformed the chant of the Roman Church.
liturgicalTitle: Our Father among the Saints Leo, Pope of Rome
patronage:
  - Sacred chant and church music
  - Defense of Orthodox doctrine
timeline:
  - when: c. 611
    title: Birth in Sicily
    body: Leo was born in Sicily around 611, the son of a man named Paul.
  - when: Jan 681
    title: Elected to the papacy
    body: He was elected Bishop of Rome a few days after the death of Pope Agatho on January 10, 681, though the Sixth Ecumenical Council had only just concluded in Constantinople.
  - when: Aug 17, 682
    title: Consecration
    body: His consecration was delayed roughly nineteen months—until August 17, 682—a gap attributed to negotiations with Emperor Constantine IV over imperial confirmation of papal elections.
  - when: 682–683
    title: Confirmation of the Sixth Ecumenical Council
    body: During his brief pontificate Leo confirmed the acts of the Council of Constantinople condemning Monothelitism and circulated its decrees throughout the West, including to Spain.
  - when: Jun 28, 683
    title: Repose
    body: Leo died in Rome on June 28, 683, at about the age of seventy-two, and was buried at St. Peter's. He was succeeded by Pope Benedict II.
sections:
  - heading: Life and Pontificate
    body:
      - Leo was a Sicilian, the son of Paul, born around the year 611. Sources note his learning and his particular skill in sacred chant. He was elected to succeed Pope Agatho a few days after the latter's death on January 10, 681, but his consecration did not take place until August 17, 682—a delay of roughly one year and seven months, generally explained by negotiations with Emperor Constantine IV concerning imperial confirmation of papal elections.
      - His active pontificate accordingly lasted less than a year, ending with his death on June 28, 683. He was buried at St. Peter's and succeeded by Pope Benedict II.
  - heading: The Sixth Ecumenical Council
    body:
      - Leo's chief accomplishment was his confirmation of the acts of the Sixth Ecumenical Council, held at Constantinople in 680–681 under papal legates, which condemned the Monothelite heresy—the teaching that Christ possessed only a single, divine will. He circulated the council's decrees throughout the Western Church, and in Spain they were formally accepted at the Synod of Toledo in 684.
      - In confirming the council, Leo addressed the condemnation of his predecessor Pope Honorius I. He clarified that Honorius was condemned not for actively teaching the heresy but for his negligence in failing to oppose it—charging that Honorius, rather than sanctifying the Roman Church with apostolic tradition, had by his inaction permitted its purity to be polluted. This distinction later became central to debates over papal authority.
  - heading: Relations with Ravenna
    body:
      - Leo secured from Emperor Constantine IV the revocation of an edict that had granted the Archbishops of Ravenna autocephalous, self-governing status, curtailing their bids for ecclesiastical independence. He abolished the tax that Ravenna had paid to Rome in exchange for receiving the pallium, while requiring that archbishops-elect travel to Rome for their consecration.
  - heading: Relics, Churches, and Chant
    body:
      - In response to Lombard raids that threatened the Roman catacombs, Leo transferred the relics of numerous martyrs into a church he built to receive and protect them. He also dedicated the churches of St. Paul and of Saints Sebastian and George.
      - Noted for his musical ability, Leo reformed the chant of the Roman Church and composed sacred hymns for the Divine Office.
  - heading: Veneration
    body:
      - Leo II is venerated as a pre-schism Western saint in the Orthodox Church, with his feast kept on July 3. In the Roman tradition his commemoration was later observed on June 28, the day of his repose.
