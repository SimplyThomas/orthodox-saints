flagReasons:
  - claim: The profile states the Sixth Ecumenical Council had 'only just concluded' at the time of Leo's election in January 681.
    detail: The dossier external sources describe the council as running '680–681' and Leo being elected shortly after January 10, 681, but do not state the council had concluded by then. Historically the Third Council of Constantinople concluded in September 681, eight months after Leo's January 681 election — meaning the council was still in session at the time of his election. The dossier provides no support for the claim that it 'had only just concluded' when Leo was elected; the timeline entry's concessive framing ('though') presupposes a conclusion that is not grounded in the dossier.
  - claim: The profile characterises the Honorius distinction as central to 'debates over papal authority', whereas the source specifies 'debates on papal infallibility'.
    detail: "The external source (Wikipedia, Pope Honorius I entry) explicitly states this distinction was 'later central to debates on papal infallibility.' The profile substitutes the broader concept 'papal authority' for the more specific 'papal infallibility.' These are distinct theological topics: papal infallibility concerns whether a pope can err in matters of faith, not the general scope of papal authority. No dossier source supports the broader 'papal authority' framing."
