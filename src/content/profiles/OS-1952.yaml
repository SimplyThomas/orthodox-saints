id: OS-1952
lifespan: 13th century
overview:
  - Venerable Ammon the Recluse was a monk of the Kiev Caves monastery (the Kyiv Pechersk Lavra) who lived, by tradition, in the 13th century. He is distinguished by the monastic designation "Lover of Labor," and is remembered for undertaking pilgrimages to Mount Athos and to Jerusalem before returning to the ascetic life at the Caves.
  - Upon his return he became known for his ascetic exploits and was regarded, in the words of the synaxarion, as "an image of holy life for the brethren." He was buried in the Far Caves of Saint Theodosius within the Kiev Caves monastery complex, where his relics repose among the assembly of the Caves fathers.
liturgicalTitle: Our Venerable Father Ammon the Recluse, Lover of Labor, of the Kiev Caves
sections:
  - heading: Life and Ascetic Labors
    body:
      - The sources preserve little of Ammon's origins, giving no birth or death dates. He is remembered as a monk of the Kiev Caves monastery who received the monastic designation "Lover of Labor," a title reflecting his industry in the ascetic life.
      - Ammon journeyed as a pilgrim to Mount Athos and to Jerusalem. After returning to the Kiev Caves, he became famous for his exploits and was described as an image of holy life for the brethren, guiding others by his example.
  - heading: Identity
    body:
      - 'Ammon of the Kiev Caves is commemorated on October 4, the same date as the Venerable Ammon of Egypt (c. 350), a disciple of Saint Anthony the Great. The two are distinct: the Eastern Orthodox liturgical calendar identifies the Caves saint as "Saint Ammon, recluse, of the Far Caves in Kiev," placing him in the 13th century on the authority of Russian Orthodox sources.'
  - heading: Relics & Shrines
    body:
      - Ammon was buried in the Far Caves of Saint Theodosius at the Kiev Caves monastery, where his relics repose. He is counted among the fifty-three saints whose relics rest in the Far Caves, a company of monks spanning roughly the 12th to 14th centuries.
