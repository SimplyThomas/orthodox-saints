id: OS-2720
lifespan: c. 710 - 782
liturgicalTitle: Our Venerable Mother Lioba, Abbess of Tauberbischofsheim
sources:
  - OrthodoxWiki
  - OCA Synaxarion (oca.org)
  - https://en.wikipedia.org/wiki/Leoba
  - https://www.stgregoryoc.org/st-lioba-abbess/
