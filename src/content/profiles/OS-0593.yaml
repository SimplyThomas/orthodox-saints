id: OS-0593
lifespan: 1481–1532
overview:
  - Cyril of Novoezersk (also Cyril of New Lake) was a sixteenth-century Russian monastic founder and disciple of Saint Cornelius of Komel. By tradition he was born in 1481 at Galich in the Kostroma region into the noble Bely family, and at the age of fifteen secretly left home to enter the monastic life under Cornelius, who tonsured him.
  - After his tonsure he spent roughly twenty years as a wandering ascetic, journeying among monasteries and wilderness places across the Moscow, Novgorod, and Pskov regions. Following a vision he attributed to the Mother of God at the Tikhvin Monastery, he was directed toward the White Lake (Belozersk) region, where around 1517 he established a monastery on an island in New Lake (Novoye Ozero).
  - He served as abbot (hegumen) of the community he founded and was glorified as a wonderworker. He reposed in 1532. His relics were discovered in the mid-seventeenth century during excavation for a church foundation, and he is commemorated on February 4 and on November 7 (the finding of his relics).
liturgicalTitle: Our Venerable Father Cyril, Abbot and Wonderworker of Novoezersk
patronage:
  - Monastics and monastic founders
  - The New Lake (Novoezersk) monastic community near Belozersk
timeline:
  - when: "1481"
    title: Birth at Galich
    body: By tradition Cyril was born on February 4, 1481, at Galich in the Kostroma region, into the noble Bely family.
  - when: c. 1496
    title: Tonsure under Cornelius of Komel
    body: At about the age of fifteen he secretly left home and entered monastic life under Saint Cornelius of Komel, who performed his tonsure. By tradition his parents later embraced the monastic life themselves, his mother becoming the nun Elena.
  - when: c. 1496–1516
    title: Years of wandering
    body: With his abbot's blessing he spent roughly twenty years as a wandering ascetic among the monasteries and wilderness regions of Moscow, Novgorod, and Pskov.
  - when: c. 1517
    title: Foundation of the New Lake monastery
    body: Drawn by a vision and, by tradition, by the sight of a pillar of fire over an island in New Lake (Novoye Ozero) near Belozersk, he founded the Kirillo-Novoezersky Monastery, building cells and churches dedicated to the Resurrection of Christ and to the Theotokos Hodegetria.
  - when: "1532"
    title: Repose
    body: Cyril reposed in 1532, having served as abbot of the monastery he founded. He is commemorated on February 4.
