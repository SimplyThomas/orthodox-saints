overview:
  - "Saint Evanthia is a venerable ascetic of the Orthodox Church commemorated on September 1. She is named among the saints of that day, but almost nothing of her life is recorded: the surviving sources preserve her name and her monastic title alone, without an account of her era, region, or deeds."
  - Her designation as 'Venerable' marks her as a monastic, a woman who pursued the ascetic life. Beyond this, the historical record is silent, and no reliable narrative of her life has come down to us.
