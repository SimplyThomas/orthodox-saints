id: OS-2699
lifespan: 5th–early 6th century (reposed c. 505–535)
overview:
  - Illtud was an early Welsh monastic teacher active in the late 5th and early 6th centuries, remembered above all as the founder of the monastery and school at Llanilltud Fawr (Llantwit Major) in Glamorgan, a leading centre of learning in Celtic Christianity in sub-Roman Britain.
  - The earliest reliable notice of him appears in the Vita Sancti Sampsonis, written c. 600 at Dol in Brittany, which describes him as the most accomplished of the Britons and a master of scripture and the liberal arts. Much of the more detailed material about his life comes from a late-12th-century Life and is legendary in character.
  - He is venerated as a pre-schism Western saint, with a feast day of 6 November. His cult is not attested before the 11th century, though the many Welsh and Breton place-names dedicated to him suggest much earlier popular reverence.
liturgicalTitle: Our Venerable Father Illtud, Abbot of Llanilltud Fawr
overview_note: ""
sections:
  - heading: Sources and Reliability
    body:
      - There are few dependable sources for Illtud's life. The first reliable mention is in the Vita Sancti Sampsonis, composed around 600 at Dol in Brittany, which calls him the most accomplished of all the Britons and credits him with expertise in the Old and New Testaments, geometry, rhetoric, grammar, arithmetic, and philosophy, and describes him as a disciple of a Bishop Germanus (likely Germain of Paris rather than Germanus of Auxerre).
      - A far more elaborate Life of St. Illtud, written about 1140, supplies the biographical narrative most often repeated, including its Arthurian and conversion episodes. Because this account is late, much of the surviving material is legendary and has been flagged for review.
  - heading: Life and Conversion
    body:
      - According to the 12th-century Life, Illtud was born in the 5th century at Ewyas, on the Wales–England border in the region of Monmouthshire and Herefordshire. The same source names his father as Bicanus, described as a minor Breton prince, and his mother as Rieingulid, daughter of Anblaud, a king of Lesser Britain (Brittany); it further alleges that Illtud was a cousin of the legendary King Arthur.
      - Though intended for the religious life, Illtud is said to have first pursued a military career. He married a woman named Trynihid and served under King Arthur and later under a King Poulentus in western Britain, earning the epithet 'Illtud the Knight.' By tradition, his conversion followed an incident in which his hunting party trespassed on the lands of Abbot Cadoc and the ground opened and swallowed the entire party except for Illtud. Moved to repentance, he drove out his wife and withdrew as a hermit in the Vale of Glamorgan.
  - heading: The Monastery and School of Llanilltud Fawr
    body:
      - Illtud founded a monastery and school at what is now Llantwit Major (Llanilltud Fawr) in Glamorgan, remembered as the first major Welsh monastic school and a hub of Celtic Christianity in sub-Roman Britain. One tradition dates the foundation of the monastery and college, sometimes called Bangor Illtyd, to around 508 in the Hodnant valley.
      - Later accounts describe the institution at its height as comprising seven halls, hundreds of houses, and well over a thousand students, attracting scholars from across the Celtic world. His pupils are said to have included Saint David, Samson of Dol, the historian Gildas, Paul Aurelian, and the bard Taliesin, with some traditions adding Saint Patrick.
      - "The site suffered repeated destruction: a Viking raid in 987 and Norman damage in the late 11th century, after which it was recorded as restored, though diminished, in 1111. It continued as a monastic school until the Reformation and was dissolved in 1539. The 13th-century church of St Illtyd now stands near the original site and houses the Llanilltud Collection of Celtic stones, including a 9th-century Celtic cross bearing the names of Samson and Illtud among other saints."
  - heading: Relics & Shrines
    body:
      - By legend Illtud died at Llantwit Major and was buried west of Brecon at the church of Llanilltud (Capel Illtud, demolished in the late 20th century), on moorland known as Mynydd Illtud. A megalithic monument there, called Bedd Gwyl Illtyd ('Grave of St. Illtud's Eve'), was historically visited by pilgrims on the eve of his festival.
      - His principal shrines are at Llanilltud Fawr in Glamorgan and at Loc Ildut in Sizun, Finistère, Brittany, where an annual 'pardon of Ildut' is held on the last Sunday of July. Roughly 24 Welsh and 24 Breton place-names commemorate him.
  - heading: Legendary Traditions
    body:
      - Several late traditions attach Illtud to Arthurian legend. A medieval Welsh document names him among three knights—alongside Cadoc and Peredur—to whom King Arthur is said to have entrusted the Holy Grail, and some scholars have attempted to identify him with Sir Galahad.
      - These accounts belong to the later legendary layer surrounding the saint and are not supported by the earliest witness to his life.
  - heading: Veneration
    body:
      - Illtud is venerated in the Roman Catholic Church, the Anglican Communion, and, as a pre-schism Western saint, in the Eastern Orthodox Church, with a feast day of 6 November. No formal cult evidence predates the 11th century, and the density of place-name dedications is taken to point to a much earlier popular reverence.
      - He does not appear among the commemorations of the OCA Synaxarion for 6 November, and no formal act of glorification by an Eastern Orthodox jurisdiction was found in the sources consulted; his Orthodox veneration rests on his standing as a pre-schism Western saint.
timeline:
  - when: 5th century
    title: Birth at Ewyas
    body: By the late-12th-century Life, Illtud is born at Ewyas on the Wales–England border, son of the Breton prince Bicanus and Rieingulid.
  - when: Early career
    title: Illtud the Knight
    body: He marries Trynihid and serves as a soldier under King Arthur and later King Poulentus in western Britain, earning the title 'Illtud the Knight.'
  - when: Conversion
    title: Withdrawal to Glamorgan
    body: After an incident on the lands of Abbot Cadoc, he repents, drives out his wife, and becomes a hermit in the Vale of Glamorgan.
  - when: c. 508
    title: Foundation of Llanilltud Fawr
    body: He establishes the monastery and school at Llantwit Major, which becomes a leading centre of Celtic Christian learning; his pupils are said to include David, Samson of Dol, and Gildas.
  - when: c. 505–535
    title: Repose
    body: Illtud dies, by tradition at Llantwit Major, and is remembered as buried near Brecon at Mynydd Illtud.
  - when: c. 600
    title: First reliable notice
    body: The Vita Sancti Sampsonis, written at Dol, calls him the most accomplished of the Britons—the earliest dependable mention of him.
