    note: Joseph's lifelong ascetic companion on Mount Athos.
works:
  - title: Letters of Elder Joseph the Hesychast
    desc: A body of some sixty-five published letters of spiritual counsel preserved and circulated by his disciples, treating watchfulness, the Jesus Prayer, devotion to the Mother of God, the temptations of Great Lent, and divine love.
