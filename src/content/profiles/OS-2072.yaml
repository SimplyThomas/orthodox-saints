id: OS-2072
lifespan: 12th–13th century
liturgicalTitle: Our Venerable Father Theophilus the Recluse of the Kiev Near Caves
overview:
  - Theophilus the Recluse was a monastic ascetic of the Kiev Caves monastery who struggled as a hermit and was buried in the Near Caves (the Antoniev Caves) of the Kiev Caves Lavra, where his relics repose. He is also known as Theophilus the Wonderworker.
  - Very little has been preserved about his life and ascetic exploits beyond his reputation as a miracle-worker; the general service to the Fathers of the Kiev Caves names him "resplendent in miracles." He is dated to the 12th–13th century and commemorated on October 24.
sections:
  - heading: Historical Context
    body:
      - Theophilus lived and struggled at the Kiev Caves monastery, whose Near Caves were founded in 1057 when Saint Anthony established the community. The Near Caves are an underground complex extending some 383 metres at depths of 5–20 metres; over time their living quarters and underground chapels became places of seclusion for the monks and, ultimately, their burial places. They contain 79 surviving burials of venerated monastic saints, over which stands the Church of the Elevation of the Cross (built 1700–1704 in the Ukrainian Baroque style).
      - As a recluse (hermit), Theophilus belonged to the strictest ascetic form of the monastery's life, sealing himself in seclusion. He shares his October 24 commemoration with two other recluses buried in the Near Caves, Arethus the Recluse and Sisoes the Recluse, all three of whom are held up in the liturgical service as models of ascetic struggle.
    heading_note: ""
  - heading: Commemoration
    body:
      - Theophilus is commemorated individually on October 24. He is also numbered among the Synaxis of the Venerable Fathers of the Near Caves of Saint Anthony, celebrated on September 28, and is commemorated collectively with all the Fathers of the Kiev Caves on the second Sunday of Great Lent.
      - "The Synaxis of the Near Caves Fathers was originally observed on the first Saturday after the leave-taking of the Exaltation of the Cross. It was formalized after relics were rediscovered and restored following earthquake damage in 1670, and in 1886 Metropolitan Platon moved the observance to September 28 to distinguish it from the Far Caves commemoration on August 28. The Synaxis lists roughly eighty monastic fathers, among whom are two distinct saints named Theophilus: Theophilus the Recluse (October 24) and Theophilus the Mourner (December 29)."
  - heading: Relics & Shrines
    body:
      - The relics of Theophilus repose in the Near Caves (Antoniev Caves) of the Kiev Caves Lavra, and he is listed in the Synaxis of the saints whose relics rest in the Near Caves of Venerable Anthony.
      - On May 24, 1853, an inscription was discovered on an eleventh-century crypt in one of the branches of the Near Caves, reading "Lord, preserve Thy servants Theodosius and Theophilus," which brought to light the names of Near Caves fathers including a Theophilus.
  - heading: Traditional Accounts
    body:
      - The troparion appointed for Theophilus praises his compunction and monastic fruitfulness, saying that "by a flood of tears you made the desert fertile, and your longing for God brought forth fruits in abundance" — imagery associating him with the ascetic discipline of tears. Beyond his designation as a wonderworker, no specific miracles have been preserved in his surviving account.
timeline:
  - when: "1057"
    title: Founding of the Near Caves
    body: Saint Anthony establishes the community whose Near Caves (Antoniev Caves) would later hold Theophilus's relics.
  - when: 12th–13th century
    title: Ascetic life
    body: Theophilus struggles as a recluse at the Kiev Caves monastery and is buried in the Near Caves.
  - when: May 24, 1853
    title: Discovery of the crypt inscription
    body: An eleventh-century inscription reading "Lord, preserve Thy servants Theodosius and Theophilus" is found in a branch of the Near Caves, recording the names of Near Caves fathers including a Theophilus.
  - when: "1886"
    title: Synaxis moved to September 28
    body: Metropolitan Platon relocates the commemoration of the Near Caves Fathers to September 28 to distinguish it from the Far Caves Synaxis on August 28.
