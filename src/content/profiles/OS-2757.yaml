id: OS-2757
lifespan: Late 3rd century – c. 350
liturgicalTitle: The Righteous Basil the Elder of Caesarea
overview:
  - Basil the Elder was a fourth-century lawyer and rhetorician of Caesarea in Cappadocia, remembered above all as the head of one of the most remarkable households in Christian history. Husband of Saint Emilia (Emmelia) and son of Saint Macrina the Elder, he was the father of a family from which the Church numbers several saints, including Basil the Great, Gregory of Nyssa, Macrina the Younger, and Peter of Sebaste.
  - Noted in the tradition for his upright character and his standing as a teacher of rhetoric and law, he raised his children with the help of his mother in a home shaped by the faith of confessors who had endured the imperial persecutions. He is commemorated on the Greek calendar on May 30 together with his wife and his mother.
sections:
  - heading: Family and Household
    body:
      - Basil the Elder was the son of Saint Macrina the Elder, a woman of Neocaesarea in Pontus who by tradition had received the teaching of Saint Gregory Thaumaturgus and who, with her husband, had fled to the shores of the Black Sea during the persecution of Christians under Galerius. Raised in this confessing family, Basil was assisted by his mother in the upbringing of his own children.
      - "He married Emilia (Emmelia) of Caesarea, a woman of a wealthy family whose own father is remembered as a martyr. With her support and that of his mother, the couple settled in Caesarea. Sources record that they had nine children (some accounts say ten), of whom several are venerated as saints: Basil the Great, Gregory of Nyssa, Peter of Sebaste, Naucratius, and Macrina the Younger."
      - Through these children the household exercised a lasting influence on Christian theology and monasticism. After Basil's death, the family's inheritance was in time turned toward monastic use, and his widow Emilia, drawn by the example of their eldest daughter Macrina the Younger, embraced an ascetic life in a community of women who held their possessions in common.
  - heading: Vocation and Character
    body:
      - Basil the Elder is described as a well-known lawyer and rhetorician of Caesarea, esteemed for his learning and for the virtue of his life. His profession placed him among the educated class of Cappadocia, and the rhetorical and legal culture of his household is reflected in the formation of his sons, who became leading figures in fourth-century Christian thought.
      - The synaxarion remembers him not for public office or dramatic events but for the sanctity of his family life, in which the piety inherited from his mother's generation of confessors was handed on to children who would themselves be counted among the saints.
  - heading: Legacy
    body:
      - Basil the Elder is honored chiefly as the father of a house of saints, a family whose members shaped the theology, ascetic life, and pastoral leadership of the Church in the fourth century. His death is placed around the year 350.
      - In the Church's memory he stands alongside his mother, Saint Macrina the Elder, and his wife, Saint Emilia, as a link in a chain of household holiness spanning three generations, from the confessors of the persecutions to the great Cappadocian teachers and their sister Macrina the Younger.
timeline:
  - when: Late 3rd century
    title: Birth in a confessing family
    body: Basil is born as the son of Saint Macrina the Elder, whose family had endured and fled the persecution of Christians under Galerius before returning to Pontus.
  - when: Early 4th century
    title: Marriage to Emilia
    body: He marries Emilia (Emmelia) of Caesarea, daughter of a martyr, and settles in Caesarea in Cappadocia with the support of his wife and his mother.
  - when: c. 330
    title: A household of saints
    body: The couple's children, among them Basil the Great (born around 330), Gregory of Nyssa, Macrina the Younger, Peter of Sebaste, and Naucratius, are raised in the family home; several are later venerated as saints.
  - when: c. 350
    title: Death
    body: Basil the Elder dies around the year 350; in time the family property is turned toward monastic use and his widow Emilia takes up the ascetic life.
