id: OS-1086
liturgicalTitle: The Holy Prophet Jeremiah
lifespan: 7th - 6th c. BC
overview:
  - >-
    The Prophet Jeremiah is one of the four great prophets of the Old Testament,
    remembered for his long and sorrowful ministry to the kingdom of Judah in the
    decades surrounding the Babylonian conquest of Jerusalem. He was the son of the
    priest Helkiah (Hilkiah) and came from a priestly family of Anathoth, a village
    near Jerusalem in the territory of Benjamin. His prophesying, which began in the
    reign of King Josiah and continued under several of Josiah's successors, called
    Judah to repentance and foretold the destruction of the city and the Temple as
    the consequence of the people's idolatry and faithlessness.
  - >-
    According to the synaxarion, Jeremiah was called to prophetic service while
    still young, and labored for many years amid mockery, imprisonment, and physical
    abuse. He warned of the coming subjugation to Babylon, performed symbolic acts
    such as wearing a wooden and then an iron yoke, and was cast into a miry pit by
    those who hated his message. After the fall of Jerusalem he lamented over the
    ruined city, and by tradition was carried down into Egypt by Jews fleeing the
    Babylonians, where he met a violent death. The Orthodox Church commemorates him
    on May 1.
timeline:
  - when: 7th c. BC
    title: Birth at Anathoth
    body: >-
      Jeremiah was born into a priestly family at Anathoth near Jerusalem, in the
      land of Benjamin, the son of the priest Helkiah (Hilkiah).
  - when: 7th c. BC
    title: Call to prophecy
    body: >-
      By tradition Jeremiah was called to the prophetic office while still young —
      the synaxarion places his calling at the age of fifteen — when the Lord
      revealed that he had been chosen as a prophet even before his birth.
  - when: 7th-6th c. BC
    title: Ministry to Judah
    body: >-
      Jeremiah prophesied through the reign of King Josiah and his successors,
      denouncing idolatry, standing at the city gates and the entrance of the Temple,
      and foretelling the Babylonian invasion. He was mocked, beaten, imprisoned, and
      cast into a pit, from which the official Habdemelek (Ebed-Melech) rescued him.
  - when: c. 587 BC
    title: Fall of Jerusalem
    body: >-
      Jerusalem fell to King Nebuchadnezzar of Babylon, and the Temple was destroyed.
      Jeremiah remained amid the ruins of the city and lamented the disaster.
  - when: 6th c. BC
    title: Exile to Egypt and death
    body: >-
      By tradition Jeremiah was taken down into Egypt by Jews who had fled there, to
      Tahpanhes (called Daphnae in Greek), where he continued to prophesy and was put
      to death, the tradition relating that he was stoned.
sections:
  - heading: A prophet of priestly family
    body:
      - >-
        Jeremiah belonged to a priestly house of Anathoth, a town in the territory of
        Benjamin a short distance from Jerusalem. His father is named in the
        scriptural and synaxarion accounts as Helkiah (Hilkiah), a priest. This
        priestly background placed Jeremiah close to the worship of the Temple even as
        his message turned increasingly against the false confidence the people placed
        in the Temple while abandoning the covenant.
      - >-
        The Orthodox tradition reckons his life roughly six hundred years before the
        birth of Christ, in the seventh and sixth centuries BC. His ministry is
        associated with the reign of King Josiah of Judah and continued under Josiah's
        successors, spanning the turbulent final decades of the kingdom before its
        destruction.
  - heading: The ministry and its sufferings
    body:
      - >-
        Jeremiah's preaching warned Judah that its idolatry and unfaithfulness would
        bring the judgment of subjugation to Babylon. To make the warning vivid, the
        tradition relates that he wore first a wooden yoke and then an iron one,
        carrying it among the people as a sign of the bondage to come. His message was
        deeply unpopular, and he endured mockery, beating, and imprisonment.
      - >-
        Among the trials recounted of him, the prophet's enemies cast him into a pit —
        described in the synaxarion as filled with mire and foul creatures — where he
        nearly perished. He was drawn out through the intervention of the God-fearing
        court official Habdemelek (the Ebed-Melech of Scripture), only to be confined
        again. When Nebuchadnezzar took Jerusalem, the prophet was released and
        remained near the ruined city in mourning.
  - heading: Egypt, death, and later traditions
    body:
      - >-
        After the catastrophe, according to the tradition, Jeremiah was carried into
        Egypt by Jews who fled the Babylonians, settling at Tahpanhes, a place known in
        Greek as Daphnae. There, the synaxarion relates, he continued to prophesy and
        was at last put to death by stoning; the Church keeps his memory on the first
        of May.
      - >-
        Several traditions cluster around the prophet beyond the events of his life.
        One, drawing on the Second Book of Maccabees, holds that Jeremiah hid the Ark
        of the Covenant with the Tablets of the Law in a cave to preserve them from the
        invaders. Another tradition relates that, long after his death, his relics were
        transferred to Alexandria. The Books of Jeremiah and of Lamentations are
        ascribed to him in the scriptural and liturgical tradition.
related:
