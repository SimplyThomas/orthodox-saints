    body: Marcian settles as a hermit in the desert near Cyrrhus in Syria, building a small cell and devoting himself to prayer, Psalmody, reading, and strict fasting.
  - when: 4th century
    title: Disciples and monastery
    body: Drawn by reports of his holy life, ascetics gather around him; he establishes a monastery while preserving his own solitude, and teaches visitors, turning many from heresy to the Orthodox faith.
  - when: c. 388
    title: Repose
    body: Marcian dies in peace, having directed his disciple Eusebius to bury him secretly and far from his cell to forestall veneration and disputes over his relics.
  - when: c. 444
    title: Recorded by Theodoret
    body: Theodoret of Cyrrhus includes Marcian among the thirty ascetics of his Historia Religiosa, preserving his life as a model of Syrian desert monasticism.
