id: OS-1046
liturgicalTitle: The Holy New Martyr Lazarus the Shepherd of Bulgaria
lifespan: 1774 – April 23, 1802
overview:
  - Lazarus was a New Martyr of the Ottoman period, a young Bulgarian shepherd who was falsely accused, tortured, and put to death for refusing to deny Christ and embrace Islam. He is commemorated on April 23. By tradition he was born in 1774 and died in 1802 at the age of twenty-eight.
  - According to the synaxarion he was born at Gabrovo in Bulgaria to pious and God-loving parents. As a young man he left his homeland and went to Soma in Asia Minor, near Pergamon, where he worked as a shepherd.
timeline:
  - when: "1774"
    title: Birth at Gabrovo
    body: Lazarus was born at Gabrovo in Bulgaria to pious and God-loving parents.
  - when: before 1802
    title: Shepherd in Asia Minor
    body: As a young man he left Gabrovo and settled at Soma in Asia Minor, near Pergamon, where he earned his living as a shepherd.
  - when: "1802"
    title: False accusation
    body: The synaxarion relates that while Lazarus slept in the fields, his sheepdog set upon a passing Muslim woman; he ran to her aid and called the dog off, but her dress was torn. Angered, the woman went home and accused him before her relatives, who in turn charged him before a Turkish judge with attempting to assault her.
  - when: April 1802
    title: Imprisonment and martyrdom
    body: Lazarus was imprisoned and beaten to force his conversion to Islam, enduring severe torments. Refusing to deny Christ, he was put to death on April 23, 1802, at the age of twenty-eight.
sections:
  - heading: Trial and Death
    body:
      - The charge against Lazarus arose from a chance encounter in the fields and a false report; offered his freedom in exchange for accepting Islam, he refused. The synaxarion relates that he was held in prison and beaten over a period of days, subjected to severe torments before he was finally executed.
      - He is numbered among the New Martyrs of the Ottoman era and is honored especially among the saints of Bulgaria. The Church commemorates him on April 23.
family:
  heading: Family
  intro: The synaxarion records only that his parents were devout.
