sections:
  - heading: Formation and Monastic Career
    body:
      - Ceolfrith entered monastic life around 660 at Gilling Abbey in North Yorkshire, where he was noted for his commitment to reading, to labour, and to monastic discipline. After some four years he joined the Benedictine monks of Saint Wilfrid at Ripon, and was ordained a priest at the age of twenty-seven. He later studied under Abbot Botolph before joining Benedict Biscop's community at Wearmouth around 672–673.
      - Benedict Biscop recruited Ceolfrith as his most zealous assistant from the very first foundation of the Wearmouth monastery. When the sister house of Saint Paul at Jarrow was established in 685, Ceolfrith was appointed its superior, arriving with a company of monks that included the boy Bede. Benedict Biscop stipulated that the two sites should function as one monastery in two places. After the death of Abbot Eosterwini, Ceolfrith became sole abbot of both houses at once — an unprecedented honour.
  - heading: A Centre of Learning
    body:
      - Under Ceolfrith's leadership the twin monasteries were transformed into a major centre of learning and book production. By 690 the libraries had become doubled in extent, and during his tenure a distinctive house style of half-uncial script emerged, which accelerated the copying of manuscripts. By the time of his death in 716 the combined monasteries are said to have housed some 600 monks.
      - During an outbreak of plague in Northumbria, tradition relates that Ceolfrith and the young Bede both remained healthy and cared for the infected brethren while maintaining the monastic offices. Bede, who had entered Ceolfrith's care at the age of seven in 686, remained loyal to the abbot until his death and spent his whole life at Jarrow as a monk and scholar under his patronage.
  - heading: The Codex Amiatinus
    body:
      - Ceolfrith's most significant achievement was the commissioning of three great single-volume Bibles, known as pandects, based on Cassiodorus's Codex Grandior which he had brought from Rome. The commission is dated to 692, when the monastery secured a grant of additional land to raise the roughly 2,000 head of cattle needed to produce the necessary vellum. One of these three copies survives as the Codex Amiatinus, now held in the Laurentian Library in Florence, and is the oldest surviving complete text of the Latin Vulgate Bible.
      - Scholars have suggested that Bede himself was involved in preparing, and possibly partly inscribing and correcting, the manuscripts. In 716 Ceolfrith personally set out to carry the Codex Amiatinus to Rome as a gift for Pope Gregory II. He died on the journey, but his companions completed the mission. The manuscript later appeared in the ninth century at the abbey of San Salvatore on Monte Amiata in Tuscany, whose 1036 relic list wrongly described it as written in the hand of the blessed Pope Gregory; it passed to Florence in 1786, where it remains.
  - heading: The Easter Question
    body:
      - Ceolfrith's authority extended beyond his own monastery. After 711, King Nechtan mac Der-Ilei of the Picts sought his guidance on the reform of the calculation of Easter. By 716 both the Picts and the Columban clergy of Iona had adopted the Roman observance of Easter.
  - heading: Veneration
    body:
      - Ceolfrith is venerated as a pre-schism Western saint, commemorated on 25 September, and is listed in Orthodox calendars as a Venerable monastic. No formal act of Orthodox glorification or canonisation document has been identified for him; his veneration rests on his standing listing among the saints of the undivided Church.
