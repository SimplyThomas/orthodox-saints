id: OS-2833
lifespan: c. 642 – 716
overview:
  - Ceolfrith (c. 642–716) was an Anglo-Saxon abbot of the double monastery of Monkwearmouth–Jarrow in the Kingdom of Northumbria, and the teacher and guardian in Christ of the Venerable Bede, who entered his care as a boy of seven.
  - "Under his rule the twin houses became one of the foremost centres of learning and book production in early medieval Europe: he doubled the size of the libraries and oversaw a distinctive house style of half-uncial script. His most enduring achievement was the commissioning of three complete single-volume Vulgate Bibles, one of which survives as the Codex Amiatinus, the oldest surviving complete Latin Bible."
  - Sensing his approaching death, Ceolfrith resigned his office in 716 and set out for Rome bearing the Codex Amiatinus as a gift for Pope Gregory II. He died on the journey at Langres in Burgundy; his companions completed the mission. He is venerated as a pre-schism Western saint, commemorated on 25 September.
liturgicalTitle: Our Venerable Father Ceolfrith, Abbot of Wearmouth and Jarrow
patronage:
  - Biblical scholarship
  - Manuscript copyists
  - Monastic libraries
  - Teachers
