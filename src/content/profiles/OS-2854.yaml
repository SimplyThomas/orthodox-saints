    body: Procopius foretells a catastrophe near Veliky Ustyug, associated with a meteorite fall along with a tornado and conflagration, and (per the synaxarion) prays before an icon on June 25 for the city's protection.
  - when: "1303"
    title: Repose at Veliky Ustyug
    body: Procopius dies on July 8 after roughly sixty years as a fool-for-Christ.
  - when: "1547"
    title: Canonization
    body: The Russian Orthodox Church canonizes Procopius at the Council of 1547.
  - when: 18th century
    title: Discovery of the relics
    body: His incorrupt relics are found near the Church of the Entrance of the Theotokos into the Temple in Veliky Ustyug and placed in open view, remaining so for about two hundred years.
  - when: "1818"
    title: Universal celebration established
    body: His universal liturgical celebration is formally established.
  - when: 1960s
    title: St. Prokop Church, Hamburg
    body: The Russian Orthodox Church Outside of Russia builds a church in Hamburg, Germany, honouring the Lübeck-born saint.
