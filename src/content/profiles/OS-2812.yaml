id: OS-2812
lifespan: c. 550 – 13 March 656
overview:
  - Saint Mochaemhoc, latinized as Pulcherius and also recorded as Mochoemog or Mo Chóemóc mac Béoáin, was an early Irish abbot who founded the monastery of Liathmore in what is now County Tipperary. His Latin name Pulcherius ("the fair one") renders his Irish epithet Cóemóc.
  - Born about 550, he was a nephew and foster-son of Saint Íte of Killeedy, who raised him until he was twenty. He trained under Saint Comgall at Bangor Abbey before establishing his own monastic foundations, and he is remembered among the wider circle of sixth- and seventh-century Irish monastic saints. He reposed at Liathmore on 13 March 656, and his feast is kept on that day.
liturgicalTitle: Our Venerable Father Mochaemhoc, Abbot of Liathmore
timeline:
  - when: c. 550
    title: Birth in Ireland
    body: Born to Beoanus, a craftsman from Connemara in Connaught who had settled in Hy-Conall-Gaura, County Limerick, and to Nesse, a sister of Saint Íte of Killeedy.
  - when: childhood to c. 570
    title: Fostered by Saint Íte
    body: Raised by his aunt Saint Íte of Killeedy until the age of twenty.
  - when: c. 570
    title: Study at Bangor
    body: Sent to Bangor Abbey in County Down, where he studied under the abbot Saint Comgall.
  - when: 7th century
    title: Foundation of Liathmore
    body: After first building monastic cells at Anatrim, he founded the monastery of Liath-Mochoemoc (Liathmore) in County Tipperary, near Lake Lurgan, on a forest site granted by a local chieftain.
  - when: 13 March 656
    title: Repose at Liathmore
    body: Died at the monastery of Liathmore; commemorated on 13 March.
sections:
  - heading: Family and Formation
    body:
      - His father, Beoanus, was a skilled craftsman originally from Connemara in Connaught who settled in Hy-Conall-Gaura, County Limerick; his mother, Nesse, was a sister of Saint Íte of Killeedy. Through her, Mochaemhoc was both nephew and foster-son of Íte, who raised him until the age of twenty.
      - At twenty he was sent to Bangor Abbey in County Down to study under its abbot, Saint Comgall. Following Comgall's guidance he first built monastic cells at Anatrim before undertaking his own foundation.
  - heading: Foundation of Liathmore
    body:
      - A local chieftain granted Mochaemhoc a site in the forest near Lake Lurgan, where he founded the monastery of Liath-Mochoemoc, later known as Liathmore, in County Tipperary. The monastery took his name.
      - The site lies in the townland of Leigh, about 1.7 miles east of Two-Mile Borris. It preserves two churches and the foundations of a round tower whose circular base measured about 15 feet 6 inches in diameter; the tower is thought to have collapsed and been dismantled before 1500. The smaller church is the earlier, dating to the early medieval period, while the larger church was begun in the 12th century and includes a Romanesque doorway with a sheela-na-gig carving. The site is a National Monument of Ireland, administered under the Diocese of Cashel and Emly.
  - heading: Associations and Traditional Accounts
    body:
      - Mochaemhoc is remembered as a friend of Saints Colmán of Dromore and Fursey. Tradition names Saint Dagán among his pupils; accounts relate that, together with Saint Cainnech of Aghaboe, he restored Dagán to life after a decapitation.
      - Tradition also records a dispute with King Faílbe Flann mac Áedo Duib (reigned 619–634). It is said that afterward all the saints of Ireland appeared to the king in visions in support of Mochaemhoc, and that another opposing king was struck with pain and the loss of sight in one eye. These episodes are preserved in the hagiographical tradition rather than in contemporary record.
  - heading: Sources and Legacy
    body:
      - The life of Mochaemhoc is documented in John Colgan's Acta Sanctorum Hiberniae (1645), Alban Butler's Lives of the Irish Saints (1823), the Monks of Ramsgate's Book of Saints (1921), and Walsh and Conyngham's Ecclesiastical History of Ireland (1885). A church bearing his name stands in the Barony of Ida, County Kilkenny.
