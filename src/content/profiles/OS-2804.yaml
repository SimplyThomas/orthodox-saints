id: OS-2804
lifespan: c. 1795 – 5 April 1820
overview:
  - New Martyr Panagiotis of the Peloponnese was a young Greek Christian who was beheaded at Jerusalem on 5 April 1820, at the age of twenty-five, for refusing to renounce Christ and convert to Islam. Born in the Peloponnese, he was raised in servitude in Asia Minor and met his death during the Paschal season, confessing the Resurrection to the end.
  - His life is preserved chiefly through a single account recorded by the missionary Joseph Wolff in his journal of 1839; wider English-language documentation is scarce. He is venerated as a New Martyr, though the anchor record notes that no fixed calendar feast has been established here and that a formal glorification act and date have not been located.
liturgicalTitle: The Holy New Martyr Panagiotis of the Peloponnese
sections:
  - heading: Origins and Servitude
    body:
      - Panagiotis was originally from the Peloponnese but was raised in Magnesia of Asia Minor, where he served as a servant to a Turkish nobleman named Osman Effendi.
      - While accompanying his master on a journey to Jerusalem, Panagiotis unknowingly entered the Mosque of Omar (the Dome of the Rock), a site forbidden to non-Muslims. This unintended act became the occasion of the accusation that led to his death.
  - heading: Martyrdom
    body:
      - When the Pasha of Damascus visited Jerusalem, Panagiotis was accused of desecrating the mosque by having entered it. Summoned before the Pasha, he was given the choice to convert to Islam or face death.
      - Under intense pressure and torture — his captors broke one hand at the wrist and cut off the fingers of the other in an effort to terrorize him into apostasy — Panagiotis repeatedly declared, in substance, that Christ is risen and that he feared nothing. He refused every offer to spare his life on condition that he recite the Islamic creed, and remained steadfast even when fellow Christians urged him to convert.
      - He was beheaded on 5 April 1820, at the age of twenty-five, near the Monastery of Saint John the Baptist by the Pillars of David.
  - heading: Relics & Shrines
    body:
      - Following his execution, a Greek convent — likely the Patriarchate of Jerusalem — paid 5,000 piastres to retrieve his body. He was subsequently buried at the Cemetery of Holy Zion by the fathers of the Holy Sepulchre.
  - heading: Sources and Documentation
    body:
      - The account of his martyrdom was recorded by the Reverend Joseph Wolff, a missionary, in his journal of 1839, and survives principally through that transmission.
      - "English-language documentation of the saint outside this source is limited: no Wikipedia or OrthodoxWiki article was located, and a Greek Orthodox Archdiocese chapel entry (contentid=2166) could not be retrieved. No formal glorification act or date has been identified in the accessible sources; his designation as a New Martyr reflects his veneration as a martyr for the faith."
