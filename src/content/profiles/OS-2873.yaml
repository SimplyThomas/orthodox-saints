id: OS-2873
lifespan: Late 4th–early 5th century (Byzantine Egypt)
overview:
  - Amma Theodora was one of the three Desert Mothers whose teachings are preserved in the Alphabetical collection of the Apophthegmata Patrum (the Sayings of the Desert Fathers), alongside Ammas Syncletica of Alexandria and Sarah of the Desert. According to tradition she was the widow of a tribune who withdrew to the Egyptian desert, where she became the amma of a monastic community of women and was renowned for her spiritual discernment.
  - Her recorded sayings emphasize humility above all other ascetic labour and were sought out by monastics and clergy alike; the tradition reports that even Theophilus, Archbishop of Alexandria (in office 385–412), came to her for counsel. She flourished in the late fourth and fifth centuries, the period in which the sayings of the desert began to be gathered into written collections.
  - She is to be distinguished from the penitent Theodora of Alexandria (commemorated Sep 11, OS-1820), with whom she is frequently conflated. Motifs proper to the penitent Theodora — notably fleeing to the desert disguised as a man to join a community of monks — are sometimes wrongly attached to Amma Theodora, who was a widow and the mother of a women's community. Her own feast day is not securely attested in the Eastern Orthodox calendar; this profile has not undergone clergy or source review.
liturgicalTitle: Our Venerable Mother Theodora, one of the Desert Mothers
patronage:
  - Monastics
  - Ascetics
  - Spiritual counsel
  - Humility
timeline:
  - when: Late 4th c.
    title: Widowhood and withdrawal to the desert
    body: By tradition the widow of a tribune, Theodora renounced the world and withdrew to the Egyptian desert, becoming the amma (spiritual mother) of a community of women ascetics near Alexandria.
  - when: 385–412
    title: Consulted by Archbishop Theophilus
    body: The tradition reports that Theophilus, Archbishop of Alexandria during these years, and various of the Desert Fathers sought out Amma Theodora for spiritual advice, a mark of the renown of her discernment.
  - when: Late 4th–5th c.
    title: Her sayings enter the Apophthegmata Patrum
    body: Theodora's teachings were gathered among the sayings of three ammas and twenty-seven abbases in the Alphabetical and Systematic collections of the Sayings of the Desert Fathers, which originated as oral tradition in Coptic before being transcribed into Greek.
sections:
  - heading: Teaching on Humility
    body:
      - Theodora's best-known teaching subordinates all ascetic effort to humility. She held that neither asceticism, nor vigils, nor any kind of suffering are able to save a person — only true humility can do so.
      - She illustrated the point with a parable of a hermit who sought to drive the demons from his cell. The demons agreed to depart only if he could name a single virtue they themselves lacked; unable to claim even one such virtue for himself, the hermit was left with humility alone, which she presents as the virtue victorious over the demons.
  - heading: Sayings in the Apophthegmata Patrum
    body:
      - Theodora is one of only three women — with Syncletica of Alexandria and Sarah of the Desert — whose sayings were included in the Alphabetical and Systematic collections of the Apophthegmata Patrum. The collection as a whole preserves sayings attributed to twenty-seven abbases and three ammas, drawn from oral tradition first circulating in Coptic and later written down in Greek from the late fourth century onward.
      - "Among her preserved sayings is a counsel on patience under insult: a devout person, when reviled, answered that he might have replied in kind, but that the law of God closed his mouth. Another records a rejoinder to a Manichaean who disparaged the body — that if one imposes the law of God on the body, it is shown to belong to its Creator. These sayings are edited in John Wortley's critical translation of the Alphabetical Sayings (St Vladimir's Seminary Press, 2014)."
  - heading: Identity and Conflation
    body:
      - Amma Theodora is repeatedly conflated with the penitent Theodora of Alexandria (Sep 11, OS-1820). Details belonging to the penitent — her flight to the desert disguised as a man to join a community of monks — are sometimes wrongly transferred to the amma, who was instead a widow and the leader of a women's monastic community.
      - Scholars have noted that the later legend of Apollinaris Syncletica was probably built upon the figures of Syncletica and Theodora of Alexandria, whose traditions were deliberately linked to enhance Syncletica's spiritual authority — evidence that Amma Theodora was a figure of sufficient early renown to be invoked in hagiographical narrative.
  - heading: Commemoration
    body:
      - No fixed feast day for Amma Theodora is securely attested in the Eastern Orthodox calendar as distinct from the penitent Theodora of Alexandria (Sep 11). In the Western Anglican tradition she is honoured collectively with Ammas Sarah and Syncletica on January 5. Her Orthodox commemoration and canonical status warrant clergy and source review before publication.
