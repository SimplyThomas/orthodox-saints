liturgicalTitle: The Holy Prophet Samuel
overview:
  - Samuel stands in the Old Testament as the fifteenth and last of the judges of Israel and as a prophet whose ministry bridged the era of the judges and the rise of the monarchy. The son of Elkanah of Ramathaim-Zophim in the hill country of Ephraim and descended from the tribe of Levi, his birth answered the prayer of his mother Hannah, who had been childless; the name Samuel is understood to mean one besought from God.
  - In fulfillment of a vow, Hannah brought the young child to the sanctuary at Shiloh and entrusted him to the high priest Eli, under whose care Samuel grew into the prophetic office. He came to be acknowledged throughout Israel as a trustworthy prophet of the Lord, and it fell to him to anoint Israel's first two kings, Saul and David, making his ministry the hinge between the period of the judges and the kingdom.
timeline:
  - when: Birth
    title: Born in answer to Hannah's prayer
    body: Samuel was born to Elkanah and Hannah at Ramathaim-Zophim. Hannah, who had been childless, had vowed to dedicate the child to God, and his name is explained as meaning besought from God.
  - when: Childhood
    title: Dedicated at Shiloh under Eli
    body: In keeping with her vow Hannah brought the young Samuel to the sanctuary at Shiloh and gave him into the care of the high priest Eli, who at that time judged Israel. While still a boy he received a revelation foretelling judgment upon the house of Eli on account of the wickedness of Eli's sons.
  - when: Maturity
    title: Judge and prophet of Israel
    body: Samuel succeeded Eli, who died when the Philistines defeated Israel, slew his sons Hophni and Phinehas, and captured the Ark of the Covenant. As the last of the judges Samuel exercised his office on a circuit among Israelite towns and was recognized as a prophet of the Lord.
  - when: Later ministry
    title: Anointed Saul and David
    body: At the people's demand for a king, Samuel anointed Saul as Israel's first king. After Saul's disobedience to God, Samuel denounced him and afterward anointed David, to whom he gave refuge during Saul's pursuit.
  - when: Death
    title: Repose in old age
    body: Samuel died in extreme old age and, according to the biblical account, was buried at Ramah.
sections:
  - heading: Relics & Shrines
    body:
      - According to the Orthodox synaxarion, the relics of the Prophet Samuel were transferred from Judea to Constantinople in the year 406.
  - heading: Veneration
    body:
      - Samuel is venerated as a prophet across Jewish, Christian, and Islamic tradition. In the Eastern Orthodox Church his feast is observed on August 20, a date shared by the Roman Catholic and Lutheran calendars; the Armenian Apostolic Church commemorates him on July 30.
