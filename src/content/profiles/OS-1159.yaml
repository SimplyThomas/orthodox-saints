id: OS-1159
liturgicalTitle: The Holy Virgin-Martyr Glyceria of Heraclea
lifespan: d. c. 177
overview:
  - >-
    Saint Glyceria was a virgin-martyr of the second century who suffered for
    Christ at Heraclea in Thrace during the reign of the emperor Antoninus
    (138-161). Born into an illustrious family - her father Macarius having been a
    high-ranking Roman official - she embraced Christianity as a young woman and,
    when commanded to sacrifice to the idols, openly confessed Christ before the
    pagan assembly.
  - >-
    The synaxarion relates that she endured many torments by the help of God:
    fire that would not burn her, stones that would not strike her, and wounds
    healed in prison by an angel. Her steadfastness moved her jailer to faith and
    his own martyrdom, and she received the crown of martyrdom when she was given
    to wild beasts. Her relics were glorified by a flow of healing myrrh, and she
    is commemorated on May 13.
timeline:
  - when: "early life"
    title: Noble birth and conversion
    body: >-
      Glyceria was born into a distinguished family; her father Macarius had
      served as a high Roman official. After losing both parents at an early age,
      she came to live at Trajanopolis in Thrace, where, falling in with
      Christians, she was converted to the faith and attended church daily.
  - when: "the imperial edict"
    title: Confession before the idol of Zeus
    body: >-
      When the prefect Sabinus received the imperial order that all should offer
      sacrifice, he appointed a day for the people to worship the idol of Zeus.
      Glyceria entered the temple, signed her forehead with the Cross, and by her
      account a peal of thunder was heard and the statue of Zeus crashed down and
      shattered to pieces.
  - when: "imprisonment"
    title: Torments and the angel
    body: >-
      Enraged, Sabinus had her stoned, but the stones did not strike her; she was
      imprisoned, and angels sustained her. Taken to Heraclea, she was cast into a
      red-hot furnace which was at once extinguished, her head was flayed, and she
      was thrown onto sharp stones, but an angel appeared in the prison and healed
      her of her wounds.
  - when: c. 177
    title: Martyrdom by wild beasts
    body: >-
      Glyceria was sentenced to be devoured by wild beasts. One lioness loosed
      upon her crept up and lay meekly at her feet; a second pounced and killed
      her, yet did not tear her apart. Bishop Dometius and the local Christians
      reverently buried her, and her relics were glorified by a flow of healing
      myrrh.
sections:
  - heading: Laodicius the jailer
    body:
      - >-
        Her prison-keeper, Laodicius, having seen the saint healed of her wounds,
        at first did not recognize her and, fearing she had escaped, was about to
        take his own life until she stopped him. Shaken by the miracle, he
        believed in Christ and asked her prayers that he too might suffer for the
        faith; he was beheaded, becoming a martyr alongside her.
related:
  - name: Martyr Laodicius the Jailer
    note: Her prison-keeper, converted by the miracle of her healing and beheaded for Christ
patronage:
  - Those tormented or imprisoned for the faith
  - Young women confessing Christ before hostile authority
