id: OS-0047
lifespan: 18th century (c. 1719/1731 – c. 1803)
overview:
  - St. Xenia of St. Petersburg was an eighteenth-century Russian fool-for-Christ who took on a life of voluntary poverty and homelessness after the sudden death of her husband. Born Xenia Grigoryevna Petrova, she lived in St. Petersburg, where she became one of the city's most beloved ascetics.
  - Her husband, Colonel Andrei Feodorovich Petrov, was an army officer who served as a court chorister (a chanter associated with St. Andrew Cathedral). He died suddenly, by tradition without receiving the sacraments, an event that deeply troubled the young widow and turned her decisively toward the ascetic life.
  - Widowed at about the age of twenty-six, Xenia distributed all her possessions to the poor, adopted her late husband's name and clothing, and spent roughly forty-five years wandering the streets of St. Petersburg. She is remembered for the gift of clairvoyance and for her foretelling of significant events, and she is invoked today for marriage, employment, and homes.
sections:
  - heading: Foolishness for Christ
    body:
      - After her husband's death, Xenia renounced worldly life entirely. She began wearing his clothing and insisted that she be addressed by his name, Andrei Feodorovich, declaring that it was she who had died and not her husband — an act understood as a sign of spiritual rebirth. In time she clothed herself in the rags of his uniform, in its red and green colors.
      - When her conduct drew the attention of authorities and her sanity was questioned, officials determined that she was in her right mind and entitled to dispose of her property as she saw fit. Having given away her possessions, she wandered the poorest districts of Petersburg as a homeless pilgrim. According to her epitaph she was widowed at the age of twenty-six and served as a pilgrim for forty-five years.
      - Xenia refused shelter at night. Instead she withdrew to the fields outside the city, where she prayed through the night without sleep. By tradition she secretly aided the construction of a church at the Smolensk Cemetery, carrying bricks there during the night so that no one would know who had helped.
  - heading: Clairvoyance and Prophecy
    body:
      - The accounts relate that Xenia possessed the gift of clairvoyance and foretold significant events affecting the citizens of Petersburg and even the royal family. Among the deaths she is said to have foretold were those of Empress Elizabeth in 1761 and of John (Ioann) Antonovich in 1764.
      - Those who turned to her in prayer were said to receive healing from illness and deliverance from their afflictions, and she became especially known for helping those seeking work. By tradition, mothers believed that her prayers and her kisses upon their children would bring the child good fortune.
  - heading: Relics & Shrines
    body:
      - St. Xenia was buried in the Smolensky Cemetery of St. Petersburg. After her death her grave became a place of pilgrimage. So many visitors took earth from her grave — dirt said to bring healing — that it had to be replaced; by tradition this was done each year. By the 1820s people were flocking to her grave to pray.
      - An ornate chapel was eventually built over her grave; it has stood since 1902. She is honored as a patron saint of St. Petersburg, and by tradition some forty churches and chapels bear her name worldwide.
  - heading: Veneration and Canonization
    body:
      - St. Xenia was canonized by the Russian Orthodox Church Outside Russia on September 24, 1978. The Russian Orthodox Church officially canonized her on June 6, 1988, during its Local Council. The Romanian Orthodox Church added her to its calendar in July 2020.
      - She is commemorated on January 24 (Old Style), corresponding to February 6 on the New Calendar.
