overview:
  - Saint Akaki Asistavi is a saint of the Georgian Orthodox Church, commemorated on May 7. Beyond his name, his Georgian identity, and his fixed feast day, no narrative of his life survives in the standard English-language sources; the Orthodox Church in America's synaxarion preserves his commemoration while noting that no information about him is available.
  - His rank, dates, and place of activity are not recorded in the consulted sources, and he is best understood as one of the many obscure local saints of the Georgian Church whose veneration has outlasted the details of their lives. Entries circulating under his name elsewhere frequently substitute the life of the unrelated third-century martyr Acacius, who shares both the name and the May 7 date; that material does not pertain to the Georgian saint and is not reproduced here.
