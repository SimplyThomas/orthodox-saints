id: OS-2787
lifespan: 1st century – c. 112
overview:
  - Eleuchadius was a Greek philosopher of the Roman-era Eastern Mediterranean who, according to the hagiographic tradition of Ravenna, was converted to Christianity by Saint Apollinaris, the first bishop of that city. He went on to serve as the third bishop of Ravenna in the early second century.
  - Succeeding Saint Adheritus, he is traditionally reckoned to have held the see from about 100 to 112, a tenure of roughly twelve years, and to have died at Ravenna in 112. He is venerated as a saint in both the Eastern Orthodox and Roman Catholic Churches, with a feast day of February 14.
liturgicalTitle: Our Father among the Saints Eleuchadius, Bishop of Ravenna
sections:
  - heading: Life and Episcopate
    body:
      - Born in Roman Greece in the first century, Eleuchadius was by training a Greek philosopher. The tradition of the Ravennate church holds that he was brought to the Christian faith through the preaching of Saint Apollinaris of Ravenna, a native of Antioch who, according to the same tradition, had accompanied the Apostle Peter to Rome before being sent to evangelize Ravenna.
      - Eleuchadius succeeded Saint Adheritus, the second bishop, to become the third bishop of Ravenna. He is traditionally assigned an episcopate running from approximately 100 to 112, and is said to have died at Ravenna in the latter year. In the local succession he was followed by Saint Marcian.
      - The early Christian records of Ravenna rest heavily on the Liber pontificalis ecclesiae Ravennatis, compiled in the ninth century by the historian Andreas Agnellus. That source contains confusions and conflations later corrected by scholars, and historical certainty diminishes for the earliest figures of the see; the dates attached to Eleuchadius are therefore traditional rather than firmly documented.
  - heading: Relics & Shrines
    body:
      - Eleuchadius was initially buried outside the walls of Classe, the port district near Ravenna. His remains were subsequently transferred to the Basilica of San Michele Maggiore in Pavia.
      - There, beneath the high altar (dated 1383), his relics rest together with those of Saint Ennodius. The date of the translation of his relics is not recorded in the available sources.
  - heading: Veneration
    body:
      - Eleuchadius is honored as a saint by both the Roman Catholic Church and the Eastern Orthodox Church, and his memory is recalled within the episcopal succession of Ravenna alongside Saint Marcian.
      - He is attested primarily within the Western hagiographic tradition and through the Liber pontificalis ecclesiae Ravennatis; no dedicated Orthodox synaxarion entry for him was located beyond his commemoration on February 14.
