    detail: "Wikipedia on Arsenije I says Arsenius 'aided royal monastery construction at Sopoćani and Gradac,' but the dossier's external source on Sopoćani specifically notes: 'The article does not mention Archbishop Arsenius I by name in connection with Sopoćani's construction.' The profile presents Arsenius as actively supporting Sopoćani construction, which is not confirmed by the Sopoćani article and is only asserted by the Arsenije I Wikipedia article. The profile does accurately quote the Sopoćani Wikipedia source in the body ('founded by Stefan Uroš I and built between 1259 and 1270'), but the claim that Arsenius supported it is not independently corroborated. This is partially supported by the anchor (the Arsenije I article mentions it) but the dossier flags the contradiction."
  - claim: Arsenius took part in the relocation of Saint Sava's relics to Mileševa.
    detail: "The dossier's Mileševa external source explicitly states: 'No mention of Arsenius I's direct role in this translation appears in the Mileševa Wikipedia article.' The dossier notes only the Arsenije I Wikipedia article asserts this. The profile states it as fact without qualification, but this is not independently corroborated by the Mileševa source."
