id: OS-2169
lifespan: 6th–7th century (Eustolia d. 610; Sopatra d. 625)
liturgicalTitle: Our Venerable Mothers Eustolia and Sopatra of Constantinople
overview:
  - Saints Eustolia and Sopatra were two monastic women of Constantinople commemorated together on November 9, remembered as the founders and successive guides of a women's monastery in the imperial capital. Eustolia was a Roman who came to Constantinople and lived a strict ascetic life, while Sopatra, described in the hagiographical tradition as a daughter of the Emperor Maurice, became her disciple and successor.
  - Eustolia, a native of Rome, entered a women's monastery in Constantinople and gained the love and respect of the sisters through her virtuous and disciplined life; laypeople sought her out for advice and consolation. When Sopatra attached herself to Eustolia as a spiritual daughter, the two established a monastic community known for its strict Rule. Eustolia died in 610, and Sopatra led the community until her own death in 625.
sections:
  - heading: Life and Monastic Foundation
    body:
      - According to the synaxarion, Eustolia was born to pious Roman parents and entered a monastery at a young age, giving herself to fasting and vigils. She later left Rome for Constantinople in order to venerate the holy churches of the capital, and there entered one of its women's monasteries, where her strict manner of life won her wide esteem.
      - Sopatra met Eustolia at the church of the Most Holy Theotokos at Blachernae. Moved by the encounter, she begged Eustolia to receive her as a spiritual daughter and guardian of her soul, and submitted her will to Eustolia's direction. The tradition relates that Sopatra converted a palace building given to her by her father into a monastery, which the two women organized together with other pious companions under a demanding monastic Rule.
      - After Eustolia's death in 610, Sopatra succeeded her as head of the community and guided it for a further fifteen years until her own repose in 625.
  - heading: Historical Context
    body:
      - The hagiographical tradition, preserved in the Orthodox synaxaria, identifies Sopatra as a daughter of the Emperor Maurice, who reigned from 582 to 602 before being deposed and executed by the usurper Phocas. This places the foundation of the monastery in the setting of the late-sixth-century imperial court and the church of the Theotokos at Blachernae, one of the most venerated Marian shrines of Constantinople.
      - The imperial parentage attributed to Sopatra is a point of genuine historical uncertainty. Byzantine sources naming the surviving daughters of Maurice list them as Anastasia, Theoktista, and Cleopatra, and no daughter named Sopatra appears among his documented children. The connection to Maurice rests on the hagiographical tradition rather than on the secular historical record.
timeline:
  - when: 582–602
    title: Reign of Emperor Maurice
    body: The hagiographical tradition places Sopatra as a daughter of Maurice, whose reign forms the historical backdrop of the monastery's foundation.
  - when: c. late 6th century
    title: Eustolia comes to Constantinople
    body: Eustolia, a Roman ascetic, leaves Rome to venerate the churches of Constantinople and enters a women's monastery there, becoming known for her strict life.
  - when: early 7th century
    title: Sopatra becomes Eustolia's disciple
    body: Meeting Eustolia at the church of the Theotokos at Blachernae, Sopatra submits herself as a spiritual daughter, and the two establish a monastic community under a strict Rule.
  - when: "610"
    title: Repose of Eustolia
    body: Eustolia dies, and Sopatra succeeds her as leader of the monastery.
  - when: "625"
    title: Repose of Sopatra
    body: After guiding the community for about fifteen years, Sopatra dies. The two are commemorated together on November 9.
