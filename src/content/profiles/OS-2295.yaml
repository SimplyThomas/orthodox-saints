id: OS-2295
lifespan: Date uncertain; the surviving accounts point to the early-church era of Roman Alexandria.
overview:
  - Theodore was an archbishop of Alexandria in Egypt who confessed Christ and died a martyr's death. He is commemorated on December 3.
  - According to the account preserved by the Church, he was a bold and effective preacher whose public proclamation of the faith provoked the hostility of the city's pagan population, who seized, mocked, and ultimately killed him.
  - The historical record of his life is sparse. The Orthodox Church in America's Life of the saint expressly notes that precise details of his life and deeds have not come down to us, while affirming that his name has been preserved for perpetual veneration.
liturgicalTitle: The Holy Hieromartyr Theodore, Archbishop of Alexandria
sections:
  - heading: Life and Ministry
    body:
      - Theodore was born in Alexandria, Egypt, and served as archbishop of that city. The synaxarion describes him as a fiery preacher, powerful in word and in the work of the Church.
      - Alexandria is remembered as a city famous for its many martyrs and confessors, from the holy Evangelist Mark, its protomartyr, to Saint Athanasius the Great, a pillar and confessor of the faith. Theodore's ministry is set within this tradition of Alexandrian witness.
  - heading: Martyrdom
    body:
      - Theodore's bold proclamation of the faith aroused the enmity of the city's pagan population. According to the account, during one of his sermons an angry crowd surrounded and seized him, beating and jeering at him while he offered no resistance.
      - In mockery of Christ's Passion, they placed a crown of thorns upon his head and paraded him through the streets of Alexandria. They then led him to the seacoast and cast him from a cliff into the sea, but, as the account relates, the wind and the waves carried him back to dry land.
      - Unrepentant, the pagans brought him before the city's prefect, who ordered severe tortures. Throughout his sufferings the only sound that came from Theodore was prayer to God; he made no complaint and offered no resistance. He was finally beheaded with a sword by Roman soldiers, put to death, as the account observes, in the manner of the Apostle Paul.
  - heading: Sources and Uncertainty
    body:
      - The Orthodox Church in America's Life of the saint is the principal source of these details, and it explicitly acknowledges that historical records do not give precise information about Theodore's life and deeds.
      - "External reference works consulted did not yield a dedicated account matching this hagiographic profile: general encyclopedic entries list several Alexandrian patriarchs named Theodore without identifying one as this hieromartyr. No source assigns a specific century, though the described circumstances — a pagan crowd, the crown-of-thorns mockery, execution by Roman soldiers, and torture ordered by a prefect — are consistent with the early-church era of Roman Alexandria."
