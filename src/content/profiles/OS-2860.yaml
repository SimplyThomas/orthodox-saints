id: OS-2860
lifespan: Died c. 107 (reigned as Bishop of Rome c. 99–107)
overview:
  - Evaristus was one of the earliest bishops of Rome, serving in the sub-apostolic age at the close of the first century and the beginning of the second. Later Roman tradition counts him as the fourth successor of the Apostle Peter, following Clement I, and names Alexander I as his successor.
  - According to the Liber Pontificalis he was a Greek by birth, the son of a Greek Jew named Judah from Bethlehem in Judaea. Eusebius of Caesarea places the start of his episcopate in the third regnal year of the emperor Trajan and gives him a tenure of roughly nine years, dating his death to about 107 or 108.
  - He is venerated as a saint in both the Eastern Orthodox Church and the Catholic Church, and is traditionally honored as a martyr of the primitive Roman Church, though the historical circumstances of his death are not established with certainty. His feast is kept on October 26.
liturgicalTitle: The Holy Hieromartyr Evaristus, Bishop of Rome
timeline:
  - when: 1st century
    title: Origins in Bethlehem
    body: By the account of the Liber Pontificalis, Evaristus is born in Bethlehem of Judaea, the son of a Greek Jew named Judah, during the period of the Roman Empire.
  - when: c. 99–100
    title: Becomes Bishop of Rome
    body: Evaristus succeeds Clement I as bishop of the Roman Church. Eusebius dates the beginning of his episcopate to the third regnal year of the emperor Trajan.
  - when: c. 99–107
    title: Organizational reforms
    body: The Liber Pontificalis credits his tenure with dividing the churches of Rome as tituli among the presbyters, ordaining seven deacons to assist the bishop's preaching, and decreeing that marriage be celebrated publicly with a priest's blessing. Later scholarship regards some of these attributions as uncertain, possibly reflecting later institutional developments.
  - when: c. 107–108
    title: Death and burial
    body: After about nine years Evaristus dies and is buried in the Vatican, near the tomb of the Apostle Peter beneath what would become Saint Peter's Basilica. He is succeeded by Alexander I. His episcopate roughly coincides with the death of the Apostle John, marking the close of the Apostolic Age.
sections:
  - heading: Historical Context
    body:
      - Evaristus belongs to the shadowy line of early Roman bishops known almost entirely through later succession lists rather than contemporary record. Eusebius of Caesarea and Irenaeus of Lyons confirm that he followed Clement in the Roman succession, but little else about him is documented with certainty. His episcopate is generally placed within the reign of Trajan, spanning roughly the years 99 to 107.
      - The Liber Pontificalis preserves the fullest ancient account of his life, describing his Greek and Judaean origins and his death 'crowned with martyrdom.' Modern historians treat these details cautiously, since the work was compiled long after his lifetime.
  - heading: Attributed Contributions
    body:
      - "Ancient tradition, chiefly the Liber Pontificalis, associates several organizational measures with his tenure: the assignment of definite churches (tituli) to the presbyters of Rome, the ordination of seven deacons to assist the bishop in preaching, and a decree that marriages be celebrated openly and with a priest's blessing according to apostolic custom."
      - Scholars including the compilers of the Catholic Encyclopedia caution that these attributions are questionable. Such arrangements may represent later developments in the Roman Church's structure retrospectively credited to Evaristus. Two decretals ascribed to him in the Pseudo-Isidorian collection are recognized as forgeries.
  - heading: Martyrdom and Legacy
    body:
      - The Liber Pontificalis numbers Evaristus among the bishops crowned with martyrdom, and later writers such as the French historian Alexis-François Artaud de Montor likewise assumed he died a violent death. The Roman Martyrology, however, lists him without the designation of martyr, and his martyrdom is described as traditional rather than historically proven.
      - His episcopate is often taken to mark the end of the Apostolic Age, coinciding with the death of the last surviving apostle, John. He is commemorated on October 26 in both the Eastern Orthodox and Catholic calendars.
  - heading: Relics & Shrines
    body:
      - Evaristus was interred in the Vatican, near the resting place of the Apostle Peter, within the area beneath the present Saint Peter's Basilica.
