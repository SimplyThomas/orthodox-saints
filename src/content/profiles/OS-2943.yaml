eyebrow: Feast Companions · The Soldier-Martyrs
overview:
  - The Two Theodores are the soldier-martyrs Theodore the Recruit (Tyro) and Theodore Stratelates ("the General"), among the most beloved warrior-saints of the Orthodox Church. Though martyred separately in the early fourth century, they are paired throughout Byzantine hymnography and iconography — often shown together on horseback as defenders of the faith — so that tradition speaks of them together as the Two Theodores.
  - Theodore the Recruit, a young soldier, confessed Christ and set fire to a temple of the Mother of the gods; after torture he was cast into the fire. His memory is bound to the first Saturday of Great Lent and the miracle of the kolyva (boiled wheat), by which he warned the faithful against food defiled by the emperor Julian. Theodore Stratelates, a commander at Heraclea renowned for his courage and eloquence, likewise confessed Christ, destroyed the idols entrusted to him, and was beheaded under Licinius.
  - The Church honors them as patrons of soldiers and of all who face danger, and as models of the courage that confesses Christ before the powers of the age. Their shared soldierly witness and their close pairing in the services of the Church make them a natural companion-commemoration.
