id: OS-2222
lifespan: c. 780/797 – c. 842
overview:
  - "Gregory the Decapolite was a Byzantine monk of the ninth century, born in Irenopolis in the Isaurian Dekapolis (a region of Asia Minor, near modern İkizçınar, Turkey). Sources differ on his birth year: Francis Dvornik placed it between 780 and 790, while Cyril Mango argued for 797 as the earliest possible date. His parents were named Sergios and Maria, and he had at least one brother who also became a monk."
  - According to his hagiography, Gregory began schooling at the age of eight. When his parents arranged a marriage for him around 815–816, he fled to the mountains to pursue a spiritual life, encountering there a former bishop of Irenopolis who had abandoned his see in opposition to the renewed iconoclasm of the period.
  - Gregory spent years in monastic and eremitic life before undertaking extensive travels across the Byzantine world — through Asia Minor and Greece to Rome and Sicily, and later to Constantinople — where he became known for his asceticism and his opposition to iconoclasm. He is venerated as a wonderworker, and his feast is kept on November 20 in both the Eastern Orthodox and Roman Catholic Churches.
liturgicalTitle: Our Venerable Father Gregory of the Decapolis, the New Wonderworker
sections:
  - heading: Early Life and Monastic Formation
    body:
      - Gregory was raised in a devout family and, according to his hagiography, showed religious devotion and knowledge of Scripture from childhood. He began his schooling at the age of eight.
      - Around 815–816, when his parents arranged his marriage, Gregory departed secretly for the mountains to pursue an ascetic life. There he met a former bishop of Irenopolis who had resigned his office in opposition to the revival of iconoclasm. Gregory subsequently entered the monastery where his brother resided but left after conflicts with its pro-iconoclast abbot.
      - He then relocated to the monastery of his maternal uncle Symeon, where he remained for about fourteen years before requesting permission to live as a hermit around 830. During his hermitage, his hagiography reports that he experienced visions of the Tabor light and a miraculous healing.
  - heading: Travels Across the Byzantine World
    body:
      - Beginning around 832–833, Gregory embarked on a series of extensive journeys. His route led from Ephesus to Prokonnesos, Ainos, and Christoupolis, then to Thessalonica and Corinth on the Greek mainland, and westward to Rome by way of Rhegion and Naples, where he stayed for three months.
      - He continued to Syracuse in Sicily, where he lived in isolated contemplation in a harbor tower, and on his return passed through Otranto, where local residents mistook him for an Arab spy.
      - At Thessalonica he taught pupils, among them the young monk Joseph the Hymnographer, whom he encountered at the monastery there. Around 836–837, possibly accompanied by Joseph, Gregory traveled to Constantinople, staying at the Antypas Church or the Church of Saints Sergius and Bacchus and visiting the monastic community on Mount Olympus in Bithynia. In Constantinople he preached against iconoclasm, which the Emperor Leo V had reinstated in 815.
  - heading: Final Years and Death
    body:
      - Gregory's final years were marked by serious illness. He died on November 20, most likely in 842, though some sources suggest 841 or an earlier date. (An alternative tradition recorded by OrthodoxWiki places his repose as early as 816, but the more detailed scholarly account gives c. 842.)
      - Around 850, his remains were transferred to a monastery that Joseph the Hymnographer founded near the grave of John Chrysostom in the Church of the Holy Apostles in Constantinople.
  - heading: Relics & Shrines
    body:
      - Gregory's tomb in Constantinople became a site of pilgrimage, with reports of miracles.
      - After the Ottoman conquest of Constantinople in 1453, his relics were relocated to the Danube region. In 1498, Barbu Craiovescu, Ban of Wallachia, acquired the relics and moved them to Bistrița Monastery in present-day Romania, where they remain today.
  - heading: Writings and Legacy
    body:
      - The detailed hagiography of Gregory is attributed to the monk-writer Ignatios the Deacon, though its authorship is disputed. His only surviving written work is a sermon concerning the conversion of a Muslim to Christianity.
      - A later relative was Patriarch Euthymius I of Constantinople in the early tenth century. Gregory is known as 'the New Miracle-Worker' and is venerated for the gifts of prophecy and wonderworking attributed to his ascetic devotion. Historical images depict him as a monk with a trim, round white beard.
