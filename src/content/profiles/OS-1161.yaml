lifespan: d. c. 1522
liturgicalTitle: The Holy and Righteous Virgin Glyceria of Novgorod
overview:
  - Glyceria of Novgorod was a maiden of Great Novgorod, remembered as the daughter of Panteleimon, an official of Legoscha Street. Very little of her earthly life was recorded; her veneration rests almost entirely on events that followed her death around the year 1522.
  - Fifty years after her repose, the discovery of her incorrupt body and a series of healings reported at her tomb led to her recognition as a righteous saint. She is distinguished from the early virgin-martyr Glyceria of Heraclea and is commemorated on May 13.
timeline:
  - when: c. 1522
    title: Repose in Great Novgorod
    body: Glyceria, daughter of Panteleimon of Legoscha Street, died at Great Novgorod and was buried near the stone church of the Holy Martyrs Florus and Laurus. Few particulars of her life were preserved.
  - when: July 14, 1572
    title: Uncovering of the relics
    body: Roughly fifty years after her death, her coffin was found behind the church of Saints Florus and Laurus and her body was reported incorrupt. According to the account, an elderly woman had earlier told Archbishop Leonid of Novgorod of a healing she had received at the time of Glyceria's burial.
  - when: July 14, 1572
    title: Translation and first healings
    body: Archbishop Leonid of Novgorod, with his clergy, solemnly placed the relics in the church of Saints Florus and Laurus. On the same day the four-year-old son of Bogdan Suvorov was healed of an illness at the tomb, and further healings followed; these accounts formed the basis of her canonization.
sections:
  - heading: Relics & Shrines
    body:
      - Glyceria's relics were enshrined in the church of the Holy Martyrs Florus and Laurus in Great Novgorod, where they had been uncovered. Her veneration spread beyond Novgorod over time.
      - By tradition, a chapel in her honor was built in the Tikhvin church of the Moscow Simonov Monastery in the middle of the nineteenth century. After 1917 the whereabouts of her relics are reported to have become unknown.
family:
  heading: Family
  figures:
    - name: Panteleimon of Legoscha Street
      note: Father — an official of Legoscha Street in Great Novgorod, named in her tradition as her father; not himself a commemorated saint.
      commemorated: false
related:
  - name: Virgin Martyr Glyceria at Heraclea
    note: Distinct — the early virgin-martyr of Heraclea (2nd c.) with whom this 16th-century righteous maiden of Novgorod shares a name and is expressly not to be confused.
