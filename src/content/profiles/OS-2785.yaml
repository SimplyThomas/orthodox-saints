id: OS-2785
lifespan: Martyred 11 September, traditionally 258 (3rd century)
liturgicalTitle: The Holy Martyrs Protus and Hyacinthus of Rome
overview:
  - Protus and Hyacinthus were Christian martyrs of Rome, traditionally remembered as brothers and as eunuch chamberlains in the household of the holy Basilla. According to their legend they were baptized alongside Saint Eugenia, became learned in the sacred Scriptures, and served as her companions in the faith.
  - Their tradition holds that they were arrested for confessing Christ, scourged, and beheaded. The Eastern Orthodox calendar commemorates them on September 11, and together with Eugenia on December 24.
  - They belong to the persecutions of the third century; the surviving narrative sets their death under Emperor Gallienus (260–268), while a later dating places their beheading on 11 September 258 under the persecution associated with Valerian.
sections:
  - heading: Life and Martyrdom
    body:
      - The earliest narrative of the two saints is a Latin text, the Passion of the Martyr Saints Protus and Hyacinth (BHL 2667), composed in Italy between roughly 450 and 499. It describes them as eunuch chamberlains to Saint Eugenia who were baptized alongside her and devoted themselves zealously to the study of sacred Scripture. Before returning to Rome with Eugenia, they are said to have spent time among the Egyptian hermits.
      - According to the account preserved by the OCA in the life of the Nun-Martyr Eugenia of Rome, Protus and Hyacinthus were Eugenia's original servants, who accompanied her in men's clothing to an Egyptian monastery. As her companions in faith they were later sent to instruct the young noblewoman Basilla. When they were forced into a pagan temple, tradition relates that the idol fell down and was shattered.
      - Their tradition holds that they refused to renounce their faith and were first scourged and then beheaded. One dating gives the day of their death as 11 September 258; the narrative more broadly sets it in the reign of Emperor Gallienus (260–268). Eugenia herself was martyred on Christmas Day under Gallienus, surviving attempts by drowning, fire, and a pit before being killed by the sword.
  - heading: Relics & Shrines
    body:
      - The Chronograph of 354 records the burial of the two martyrs in the cemetery (coemeterium) of Basilla on the Via Salaria, later identified as the Catacomb of Sant'Ermete. When Pope Leo IV (847–855) transferred the remains of Roman martyrs to churches within the city, only the grave of Protus was found, and his relics were moved to San Salvatore on the Palatine Hill.
      - In 1845 Father Giuseppe Marchi discovered the still-undisturbed grave of Saint Hyacinth in a crypt of the same catacomb. The marble-sealed niche contained ashes and pieces of burned bone wrapped in the remains of costly cloth, with an original Latin inscription confirming the traditional date, while fragments bearing the words 'grave of the Martyr Protus' confirmed that both saints had originally shared the burial chamber. By June 1933 the remains of Hyacinth had been relocated to the chapel of the Propaganda College in Rome.
      - Major shrines associated with the martyrs exist at San Giovanni dei Fiorentini and at the Propaganda College, both in Rome.
  - heading: Name and Historical Notes
    body:
      - The name of Protus appears in several variant forms, including 'Protatius,' 'Proteus,' and 'Proto'; in England it became corrupted to 'Saint Pratt.' In iconography the two saints are represented as two young men holding the crowns of martyrdom.
      - Scholars note that the elaborate Passion narrative is likely a novelistic creation, composed to furnish a hagiography for saints whose genuine historical details were unknown and to link them to the likely-fictitious Saint Eugenia. Their historical veneration and burial, however, are attested by the fourth-century Chronograph of 354 and by the archaeological discovery of their graves.
timeline:
  - when: c. 450–499
    title: Passion narrative composed
    body: The Latin Passion of the Martyr Saints Protus and Hyacinth (BHL 2667) is written in Italy, describing them as eunuch chamberlains and companions of Saint Eugenia.
  - when: 11 September 258 (traditional)
    title: Scourging and beheading
    body: By tradition the two martyrs are scourged and beheaded for refusing to renounce Christ; the broader narrative sets their death under Emperor Gallienus (260–268).
  - when: "354"
    title: Burial recorded
    body: The Chronograph of 354 documents their interment in the cemetery of Basilla on the Via Salaria, later identified as the Catacomb of Sant'Ermete.
  - when: 847–855
    title: Relics of Protus translated
    body: Under Pope Leo IV only the grave of Protus is found; his relics are moved to San Salvatore on the Palatine Hill.
  - when: "1845"
    title: Grave of Hyacinth discovered
    body: Father Giuseppe Marchi finds the undisturbed grave of Saint Hyacinth in the catacomb, its inscription confirming the traditional date and that both saints had shared the burial chamber.
  - when: June 1933
    title: Hyacinth's relics relocated
    body: The remains of Hyacinth are moved to the chapel of the Propaganda College in Rome.
