lifespan: Old Testament era
overview:
  - Righteous Jesse was a resident of Bethlehem in Judah and the father of King David. From his lineage, the prophet Isaiah foretold that the Messiah would spring, giving Jesse a foundational place in the ancestry of Christ.
  - The son of Obed and grandson of Ruth and Boaz, Jesse belonged to the Tribe of Judah and came from a prominent family of sheep farmers and breeders. He is honored among the Holy Forefathers of Christ, commemorated on the Sunday before the Nativity.
  - His enduring significance rests on Isaiah's prophecy of a rod springing from the stem of Jesse (Isaiah 11:1), read in the Christian tradition as a foretelling of the incarnation and expressed visually in the iconographic 'Tree of Jesse.'
liturgicalTitle: The Holy and Righteous Forefather Jesse, Father of King David
sections:
  - heading: Family and Lineage
    body:
      - Jesse was the son of Obed and the grandson of Ruth and Boaz, placing him within the line of Judah. He resided in Bethlehem, where his family were established sheep farmers and breeders.
      - Biblical accounts differ on the number of his sons. The Book of Samuel indicates eight sons, naming Eliab, Abinadab, and Shammah as the first three; the Book of Chronicles lists seven — Eliab, Abinadab, Shimea, Nethanel, Raddai, Ozem, and David — together with two daughters, Zeruiah and Abigail.
      - Through his daughters he was grandfather to Abishai, Joab, and Asahel (sons of Zeruiah) and to Amasa (son of Abigail). His youngest son, David, became king of Israel.
  - heading: The Anointing of David
    body:
      - The prophet Samuel came to Bethlehem to anoint the next king of Israel from among Jesse's sons. After examining the seven eldest and finding none chosen, Samuel asked whether any sons remained.
      - David, the youngest, was tending the sheep and was summoned; he was ultimately chosen and anointed. Later, when King Saul was troubled by melancholy and sought a harpist for his court, Jesse sent David with gifts, and David entered Saul's service.
  - heading: The Tree of Jesse
    body:
      - The prophecy of Isaiah 11:1 — 'And there shall come forth a rod out of the stem of Jesse, and a Branch shall grow out of his roots' — was interpreted in the Christian tradition as foretelling the coming of Christ, with Jesse standing as the patriarchal root of the Messianic line.
      - "This gave rise to the iconographic 'Tree of Jesse,' in which Jesse is typically depicted as the largest figure, reclining or sleeping at the base, with the tree of Christ's ancestry emerging from his body. Isaiah 11:10 similarly names him: 'In that day the root of Jesse, who stands as a signal for the peoples.'"
      - The Latin Vulgate rendering of the passage, using virga (rod) and flos (flower), fostered a linguistic association with Virgo (Virgin) that shaped how the Theotokos came to be integrated into the visual tradition. Jesse also appears in psalter illustrations, connecting him to David's authorship of the Psalms.
  - heading: Commemoration
    body:
      - Jesse is honored among the Holy Forefathers, the Old Testament ancestors 'who lived before and under the Law,' commemorated on the Sunday before the Nativity of Christ. The feast emphasizes the ancestral line leading to Christ and the fulfillment of God's covenant with Abraham.
      - As the father of King David, Jesse holds a particular place among these forebears, who include the patriarchs Adam, Abraham, Isaac, and Jacob, prophets such as Moses and Isaiah, and righteous figures including Ruth, Esther, and Hannah.
  - heading: Relics & Shrines
    body:
      - The Tomb of Jesse and Ruth is located in Hebron, where it functions as a synagogue and receives numerous pilgrims annually, particularly during the feast of Shavuot. The site underwent a major restoration in 2009.
