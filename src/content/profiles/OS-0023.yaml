sections:
  - heading: Early Life and Formation
    body:
      - John was born around 347 at Antioch in Roman Syria. His father, a high-ranking military officer (named Secundus in one tradition), died shortly after John's birth, and his mother Anthusa raised him.
      - He received a classical education in rhetoric under the orator Libanius and studied theology under Diodorus of Tarsus, a leading figure of the Antiochene school. Sources also name the philosopher Andragatius among his teachers and credit an encounter with Bishop Meletius, around 367, with turning him toward the ascetic life.
      - Baptised between 368 and 373 and tonsured a reader, he joined ascetic communities near Antioch and around 375 attempted a solitary, eremitic life in mountain caves. The severity of this regimen permanently injured his stomach and kidneys, compelling his return to the city after roughly two years.
  - heading: Ministry at Antioch
    body:
      - Meletius of Antioch ordained John deacon in 381, and Bishop Flavian ordained him presbyter in 386. Over the next twelve years his preaching at Antioch won enormous popularity, marked by an eloquent, practically minded exposition of Scripture and a persistent emphasis on almsgiving and care for the poor.
      - In 387, following riots over imperial statues at Antioch, he delivered the twenty-one homilies known as On the Statues; the sources relate that his preaching during the crisis converted many pagans.
  - heading: Archbishop of Constantinople
    body:
      - In autumn 397 John was appointed Archbishop of Constantinople — by report without his prior knowledge — and was ordained bishop on 26 February 398. As archbishop he refused lavish entertainments, reduced the expenses of the episcopal household, addressed clerical misconduct, and founded hospitals.
      - His reforms and his denunciations of aristocratic excess alienated the wealthy and the court. Empress Eudoxia took his rebukes of extravagant dress personally, while Theophilus of Alexandria opposed him, in part over the controversy concerning Origenism and the affair of the "Tall Brothers."
  - heading: Deposition and Exile
    body:
      - In 403 Theophilus orchestrated the Synod of the Oak, which deposed and banished John; he was almost immediately recalled after public outcry and an earthquake. The peace was short-lived. After a statue of Eudoxia was erected near Hagia Sophia and he objected to the celebrations honouring it — comparing the empress to Herodias — he was permanently exiled.
      - He departed for Cucusus, a remote settlement on the Armenian frontier, around 404. Pope Innocent I protested on his behalf, but John was ordered further onward toward Pityus on the eastern Black Sea. He died during the journey at Comana Pontica in 407, aged about sixty, by report with the words "Glory be to God for all things."
  - heading: Writings
    body:
      - John was a prolific author whose works exemplify the Antiochene school's grammatical and historical method of scriptural exegesis. His most celebrated composition is the treatise On the Priesthood (De Sacerdotio).
      - His scriptural commentaries include ninety homilies on Matthew, eighty-eight on John, fifty-five on Acts, fifty-nine on the Psalms, and homilies on the complete Pauline epistles. Among his other works are the twenty-one homilies On the Statues, eight homilies Adversus Judaeos, and roughly 238 letters, including seventeen addressed to the deaconess Olympias. A Paschal Homily attributed to him is read at every Pascha, and he is associated with the revision of the prayers and rubrics of the Divine Liturgy that bears his name.
  - heading: Relics & Shrines
    body:
      - John's relics remained at Comana Pontica until 438, when Emperor Theodosius II had them translated to the Church of the Holy Apostles in Constantinople on 27 January 438, an act the sources connect with Archbishop Proclus. With the translation his name was admitted into the liturgical diptychs of the Eastern patriarchates.
      - During the Fourth Crusade in 1204 most of the relics were taken to Rome. On 27 November 2004 Pope John Paul II returned a portion of the relics to the Orthodox Church.
  - heading: Legacy
    body:
      - The surname "Chrysostom" (golden-mouthed), bestowed after his death, fixed his reputation as a preacher. He is commemorated as one of the Three Holy Hierarchs, honoured together with Basil the Great and Gregory the Theologian.
      - His memory was championed in the West as well as the East; Pope Innocent I pressed for his rehabilitation in his own lifetime, and in 1908 Pope Pius X named him patron saint of preachers.
patronage:
  - Preachers — named their patron saint by Pope Pius X in 1908.
