id: OS-0023
lifespan: c. 347 – 407
overview:
  - John Chrysostom was a fourth- and early-fifth-century archbishop of Constantinople, theologian, and preacher whose surname "Chrysostom" — Greek for "golden-mouthed" — was bestowed posthumously in recognition of his eloquence. He is numbered among the Three Holy Hierarchs alongside Basil the Great and Gregory the Theologian.
  - Born around 347 in Antioch in Roman Syria, he was educated in classical rhetoric under Libanius and in theology under Diodorus of Tarsus in the Antiochene school. After a period of severe asceticism that permanently damaged his health, he served as deacon and then presbyter at Antioch, where twelve years of preaching established his reputation.
  - Appointed Archbishop of Constantinople in 397 and ordained the following year, he pursued clergy reform, refused lavish living, and cared for the poor — provoking powerful opposition that culminated in his deposition and exile. He died in exile in 407 at Comana Pontica, reportedly with the words "Glory be to God for all things." The Divine Liturgy that bears his name is celebrated to this day.
