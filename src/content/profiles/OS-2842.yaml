id: OS-2842
lifespan: c. 331 – 378
overview:
  - "Satyrus of Milan (Italian: San Satiro; also attested as Uranius Satyrus) was the brother of Saint Ambrose of Milan and of Saint Marcellina. Born around 331 at Augusta Treverorum (modern Trier), he trained as a lawyer at Rome and rose to public office, but set aside his career to manage the temporal affairs of the church of Milan after his brother's unexpected elevation to the episcopate."
  - When Ambrose became Archbishop of Milan in 374, Satyrus at once resigned his administrative post and took charge of the diocese's secular and worldly matters, so that his brother could devote himself entirely to his episcopal duties. He died unexpectedly at Milan in 378, and Ambrose preached his funeral oration, On the Death of a Brother (De excessu fratris Satyri).
  - He is commemorated on September 17. His relics are preserved in the Basilica of Sant'Ambrogio in Milan, and the church of Santa Maria presso San Satiro in Milan bears his memory.
liturgicalTitle: The Righteous Satyrus of Milan
patronage:
  - Sacristans
timeline:
  - when: c. 331
    title: Birth at Trier
    body: Satyrus is born around 331 at Augusta Treverorum (modern Trier), in Gallia Belgica, into a Roman family; his father held a significant administrative position, possibly a praetorian prefect of Gaul.
  - when: c. 353–354
    title: The family moves to Rome
    body: Following the death of their parents (around 354), the three siblings — Marcellina, Ambrose, and Satyrus — relocate to Rome, where they are raised and educated. Marcellina, the eldest, takes responsibility for the upbringing of her younger brothers.
  - when: Adulthood
    title: Career as advocate and official
    body: Trained as a lawyer at Rome, Satyrus practices as an advocate, holds office, and is appointed prefect to one of the Roman provinces.
  - when: "374"
    title: Resigns office to serve the church of Milan
    body: When Ambrose is unexpectedly appointed Archbishop of Milan, Satyrus resigns his prefecture and moves to Milan to take over the management of the diocese's temporal affairs, relieving his brother of worldly cares.
  - when: "378"
    title: Death at Milan
    body: Recently returned from a journey to Africa and Sicily, Satyrus falls ill and dies unexpectedly at Milan. Ambrose delivers his funeral oration at the burial and a second oration on the resurrection a week later.
sections:
  - heading: Family
    body:
      - "Satyrus was one of three exceptionally close siblings: his elder sister Marcellina, who took religious vows under Pope Liberius around 353, and his brother Ambrose, the future Archbishop of Milan. All three came to be venerated as saints. Ambrose describes the three as inseparable in body and undivided in affection."
      - The family was Roman and originated at Trier (Augusta Treverorum) in Gallia Belgica. Their father held high office — variously identified as a praetorian prefect of Gaul or an official named Uranius, a name that may explain the full form 'Uranius Satyrus.' After their parents' death, Marcellina, as the eldest, took charge of raising her two younger brothers.
  - heading: Service to the Church of Milan
    body:
      - "Before his brother's episcopate, Satyrus pursued a public career: trained as an advocate at Rome, he held office and was appointed prefect over a Roman province. When Ambrose was unexpectedly made Bishop of Milan in 374, Satyrus immediately gave up his appointment to manage his brother's secular affairs."
      - By assuming administration of the archdiocese's worldly and temporal matters, Satyrus ensured that nothing distracted Ambrose from his episcopal duties. In Ambrose's funeral oration he is remembered for exceptional piety and faith, simplicity and modesty, chastity — he never married and preserved the gifts of baptism inviolate — together with justice, integrity, courage, and frugality.
  - heading: The Shipwreck
    body:
      - Ambrose's oration relates that during a voyage Satyrus's ship encountered severe danger. Fearing to die without the Sacrament, he asked those he knew to be initiated Christians to give him the divine Sacrament, had it bound in a napkin tied about his neck, and cast himself into the sea, relying on faith alone for protection. According to the account, he survived and reached port safely.
  - heading: Death and Funeral Orations
    body:
      - Satyrus had recently returned from a journey to Africa and Sicily when he fell ill and died at Milan in 378. His brother Ambrose eulogised him with the funeral sermon On the Death of a Brother (De excessu fratris Satyri), delivering a first oration at the burial and a second oration on the resurrection a week later. It is counted among the earliest of Christian panegyrics.
      - A note in the Nicene and Post-Nicene Fathers text of the oration places his death on October 17, 379, though traditional sources and the commemorated date give c. 378.
  - heading: Relics & Shrines
    body:
      - Satyrus's relics are preserved in the Basilica of Sant'Ambrogio in Milan. His memory is also carried by the church of Santa Maria presso San Satiro in Milan. In the Archdiocese of Milan he is honoured as the patron saint of sacristans.
