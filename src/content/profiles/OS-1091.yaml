id: OS-1091
liturgicalTitle: The Holy Hieromartyr Macarius, Metropolitan of Kiev and All Rus
lifespan: died 1497
overview:
  - >-
    Macarius was Metropolitan of Kiev and All Rus at the close of the fifteenth century, a
    hierarch whose pastoral service ended in martyrdom during a Tatar raid in 1497. Before his
    elevation he served as archimandrite of the Holy Trinity monastery in Vilnius (the
    "Vilensk" monastery), and in 1495, after the death of Metropolitan Jonah of Kiev, he was
    chosen and ordained to the vacant see by an assembly of hierarchs.
  - >-
    His brief tenure fell in a period when the metropolitan See of Kiev lay in lands subject to
    the Grand Duchy of Lithuania and was exposed to repeated incursions. While visiting his
    flock and serving the divine services, Macarius was killed by raiding Tatars, sealing his
    episcopal ministry with a martyr's death. The Church venerates him as a hieromartyr, and his
    relics came to be honored as incorrupt and wonderworking.
timeline:
  - when: "1495"
    title: Election and ordination as Metropolitan of Kiev
    body: >-
      Following the death of Metropolitan Jonah of Kiev, Macarius, then archimandrite of the
      Vilensk Holy Trinity monastery, was chosen and ordained in his place by an assembly of
      hierarchs: Vassian of Vladimir, Luke of Polotsk, Vassian of Turov, and Jonah of Lutsk.
    source: https://www.oca.org/saints/lives/2026/05/01/101259-hieromartyr-macarius-metropolitan-of-kiev
  - when: "1495"
    title: Confirmation from Constantinople
    body: >-
      Papers of blessing were sent from Constantinople by the Patriarch Niphon, confirming the
      election of Macarius to the metropolitan See of Kiev.
    source: https://www.oca.org/saints/lives/2026/05/01/101259-hieromartyr-macarius-metropolitan-of-kiev
  - when: May 1, 1497
    title: Martyrdom by Tatars
    body: >-
      Invading Tatars killed Metropolitan Macarius of Kiev and All Rus in the village of
      Strigolovo, at the River Vzhischa, where the saint was conducting divine services. Many of
      his flock were killed with him or taken into captivity.
    source: https://www.oca.org/saints/lives/2026/05/01/101259-hieromartyr-macarius-metropolitan-of-kiev
sections:
  - heading: From archimandrite to metropolitan
    body:
      - >-
        Before his elevation to the episcopate, Macarius governed the Holy Trinity monastery in
        Vilnius as its archimandrite. When the metropolitan See of Kiev fell vacant on the death
        of Metropolitan Jonah, an assembly of hierarchs — named in the synaxarion as Vassian of
        Vladimir, Luke of Polotsk, Vassian of Turov, and Jonah of Lutsk — chose and ordained him
        to fill it in 1495.
      - >-
        His election was confirmed from Constantinople, where the Patriarch Niphon sent papers of
        blessing recognizing Macarius as Metropolitan of Kiev. He thus took up the leadership of
        the Orthodox flock in the western lands of Rus during an unsettled time.
  - heading: Martyrdom and relics
    body:
      - >-
        On May 1, 1497, while Macarius was visiting his flock and serving the divine services,
        Tatars raiding the region attacked. He was killed in the village of Strigolovo by the
        River Vzhischa; many of those gathered with him were slain alongside him or carried off
        into captivity.
      - >-
        The Church remembers him as a hieromartyr — a bishop who died for Christ in the course of
        his pastoral duty. By tradition his relics were found incorrupt and were glorified by God
        with miracles; they came to rest at Kiev in the cathedral church dedicated to Saint
        Vladimir.
patronage:
  - Bishops and clergy who serve their flock in time of danger
  - Those facing violence or captivity
