id: OS-0018
lifespan: died c. 306
overview:
  - Theodore the Recruit, surnamed Tyro (Tiro), was a soldier martyred at Amasea in Pontus (modern Amasya, in Asia Minor) during the persecutions of the early fourth century. The epithet Tyro is generally understood to refer to his service in the Cohors Tyronum military unit rather than to his youth, though he is traditionally remembered as a young recruit.
  - Serving under the commander Brincus, Theodore openly confessed his faith in Christ when ordered to take part in pagan sacrifice. Given time to reconsider, he instead set fire to a pagan temple — identified in the sources as a temple of the goddess Rhea, Cybele, or Magna Mater — and was arrested, tortured, and condemned to death by burning. He is reckoned among the great military saints of Byzantium.
  - He is among the most widely venerated military martyrs of the Christian East, commemorated on February 17 and on the First Saturday of Great Lent, the latter feast tied to a miracle by which, according to tradition, he preserved the faithful from food defiled by pagan sacrifice during the reign of Julian the Apostate.
timeline:
  - when: c. 306
    title: Confession and martyrdom at Amasea
    body: Ordered to sacrifice to the pagan gods, Theodore confessed his faith in Christ in a loud voice. Given time to reconsider, he prayed instead and set fire to a pagan temple. Brought before the governor, he maintained his confession, was imprisoned and condemned to death by fire, and perished on a pyre, traditionally on February 17.
  - when: 4th century
    title: Burial and translation to Euchaita
    body: His body, recovered unburned, was buried beneath a widow's house in Euchaita. By tradition his relics were translated there by the empress Eusebia before her death (c. 360); Euchaita became a major pilgrimage centre, also called Theodoropolis.
  - when: reign of Julian the Apostate (361–363)
    title: The kollyva miracle
    body: According to tradition, when the emperor ordered marketplace food sprinkled with blood from pagan sacrifices to defile Christians during the Lenten fast, Theodore appeared in a vision to Archbishop Eudoxius of Constantinople, directing the faithful to eat boiled wheat (kollyva) mixed with honey instead. This gave rise to the commemoration on the First Saturday of Great Lent.
  - when: 12th–13th century
    title: Later translations of relics
    body: Portions of his relics were carried westward, reaching Brindisi (where he became patron) and Venice (1267); his head is enshrined at Gaeta, Italy.
sections:
  - heading: Life and Martyrdom
    body:
      - The sources place Theodore as a soldier stationed at Amasea in Pontus, in the region of Asia Minor, serving under a commander named Brincus during a persecution of Christians. Some accounts suggest he originally came from the East, with Syria or Armenia proposed as his homeland.
      - When an edict required sacrifice to the pagan gods, Theodore refused, professing his belief in the divinity of Jesus Christ. The authorities delayed his sentence to give him opportunity to recant. Instead, he burned a pagan temple — variously named in the sources as dedicated to Rhea, to Cybele, or to Magna Mater — an act that led to his arrest and torture.
      - Imprisoned and, by tradition, left to starve, he was condemned to death by fire. After making the sign of the cross he mounted the pyre and died, traditionally on February 17, in approximately 306 under the emperor Galerius (305–311). Some sources give the year as 287. Witnesses are said to have seen his soul ascend to heaven.
  - heading: Names and Epithets
    body:
      - He is surnamed Tyro or Tiro, a name the sources connect to his service in the Cohors Tyronum military unit rather than to his age. He is also called Theodore of Amasea, after the place of his martyrdom, and Theodore of Euchaita, after the place where his body was enshrined.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: Saint Gregory of Nyssa delivered a panegyric at Theodore's feast, a homily that preserves early biographical details of the saint. His cult spread widely, with churches dedicated to him at Constantinople, Jerusalem, Damascus, Venice, and Rome, where a church on the Palatine Hill was made collegiate by Pope Felix IV."
      - "Traditional Accounts: While imprisoned, the Lord Jesus Christ is said to have appeared to comfort and encourage him. On the pyre, tradition relates that the flames were cooled by the Holy Spirit so that he was not consumed by burning but gave up his soul. The best-known tradition is the kollyva miracle under Julian the Apostate: appearing in a vision to Archbishop Eudoxius of Constantinople, Theodore directed the faithful to avoid marketplace food defiled with sacrificial blood and to eat boiled wheat sweetened with honey instead. From this the First Saturday of Great Lent became known as Theodore Saturday."
  - heading: Relics & Shrines
    body:
      - "Theodore's body, recovered unburned, was first buried at Euchaita, where his relics were enshrined and the town became a pilgrimage centre known as Theodoropolis. In later centuries portions of his relics traveled west: to Brindisi, where he became patron saint, and to Venice in 1267. His head is enshrined at Gaeta, Italy."
      - His veneration left a wide artistic and architectural footprint, including some fifteen churches dedicated to him in Constantinople and a series of thirteenth-century stained-glass panels depicting his martyrdom in the choir of Chartres Cathedral.
  - heading: Veneration and Feast Days
    body:
      - In the Eastern Orthodox Church Theodore is commemorated on February 17 and on the First Saturday of Great Lent. The Lenten commemoration recalls the kollyva miracle, and the blessing and sharing of boiled wheat mixed with honey continues as a liturgical tradition on that day. A local feast on July 27 is observed on the Croatian island of Korčula. In the Roman Martyrology his feast is November 9.
patronage:
  - Soldiers and military service, reflecting his identity as one of the great soldier-martyrs of Byzantium
  - Invoked against storms
