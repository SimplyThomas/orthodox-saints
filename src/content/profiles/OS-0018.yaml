celebration:
  intro: Ways to honor St Theodore the Recruit and his koliva.
  ideas:
    - idea: Make koliva together — boil wheat berries and mix with honey, nuts, pomegranate, and raisins — a hands-on kitchen activity tied to his koliva miracle.
    - idea: 'Teach the wheat-and-resurrection lesson as you cook: the grain falls into the ground and "dies" to bear fruit (John 12:24).'
    - idea: "Tell the story simply: in the first week of Lent he warned the faithful to eat blessed boiled wheat rather than food secretly defiled by Julian the Apostate."
    - idea: Bring your koliva to church to be blessed on the First Saturday of Lent, then share it.
    - idea: Watch a kid-friendly explainer about koliva before making it, connecting the food to its meaning.
  sources:
    - label: Ascetic Life of Motherhood
      url: https://www.asceticlifeofmotherhood.com/koliva
