id: OS-2270
lifespan: 18th century (disputed; martyrdom reported 1748)
overview:
  - Hristo of Bulgaria is a martyr commemorated by the Orthodox Church on November 28. The Orthodox Church in America's Lives of the Saints carries the name as a commemorative placeholder, noting that no biographical information is presently available.
  - Several Orthodox calendar sources identify this November 28 commemoration with the New Martyr Christos the Gardener, martyred at Constantinople in 1748. Because that identification introduces tensions of origin and feast day with the received entry, it is presented here as a reported association rather than an established fact.
liturgicalTitle: The Holy Martyr Hristo of Bulgaria
sections:
  - heading: The Commemoration
    body:
      - The saint is listed under November 28 as "Martyr Hristo of Bulgaria," of Bulgarian origin and of an era the received record leaves unspecified. The entry survives as a name preserved in the calendar; the Orthodox Church in America's account offers no accompanying life, stating that no information is available.
      - The commemoration appears across multiple Orthodox calendars, including those associated with the Moscow Patriarchate, the Russian Orthodox Church Outside Russia, and the Orthodox Church in America.
  - heading: A Reported Identification
    body:
      - The English-language Orthodox liturgical calendar for November 28 lists a "New Martyr Christos the Gardener of Albania, at Constantinople (1748)," and explicitly links that figure to the Orthodox Church in America's entry for Martyr Hristo, treating the two as the same saint.
      - According to a hagiographic summary drawn from the New Martyrology compiled by St. Nikodemos the Hagiorite, Christos was born in Albania and came to Constantinople around the age of forty, where he worked as a gardener and sold his produce in the marketplace. During a dispute over the price of apples, a customer is said to have falsely accused him of having expressed a wish to embrace Islam, bringing forward false witnesses before a judge. When examined, Christos is reported to have affirmed that he was a Christian, denied ever having said such a thing, and declared that he would not abandon the Orthodox faith whatever he might be made to suffer. He was condemned and put to death for refusing to apostatize, and is venerated among the New Martyrs who died under Ottoman rule.
  - heading: Points of Uncertainty
    body:
      - The reported identification is not without difficulty. The received commemoration names the saint as of Bulgaria, whereas the New Martyr Christos the Gardener is described as Albanian, martyred at Constantinople.
      - "There is also a discrepancy of feast day: the hagiographic summary of Christos the Gardener gives his commemoration as February 12, while the entry under discussion falls on November 28. It is not settled whether these refer to a single saint or to distinct figures. In the absence of a fuller surviving life, the November 28 commemoration is best treated as an honest stub whose further identification remains open."
timeline:
  - when: c. 1748 (reported)
    title: Martyrdom at Constantinople
    body: By the account associated with Christos the Gardener, the saint was falsely accused of intending to convert to Islam, refused to renounce Christ, and was executed under Ottoman rule. The identification of this figure with the November 28 commemoration is reported rather than certain.
