id: OS-0466
liturgicalTitle: The Holy Martyrs Speusippus, Eleusippus and Meleusippus, and their Grandmother Leonilla
overview:
  - Speusippus, Eleusippus, and Meleusippus were triplet brothers, by tradition of Cappadocia, who together with their grandmother Leonilla are venerated as martyrs of the second century. They are commemorated on January 16.
  - By the accounts they suffered during the persecution under the emperor Marcus Aurelius, who reigned from 161 to 180. One tradition places their martyrdom in Gaul, another in Cappadocia. Their grandmother Leonilla, who had received baptism in her old age, had led the three brothers to the Christian faith and shared with them in their martyrdom.
patronage:
  - Remembered for the handing-on of the faith within a family, Leonilla having come to baptism late in life and brought her grandsons to Christ.
