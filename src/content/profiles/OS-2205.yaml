    body: Appointed abbot roughly six months before Sergius's death on 25 September 1392, then withdraws to his cell; Savva of Storozhevsk leads the monastery in the interim.
  - when: c. 1398–1400
    title: Resumes the abbacy
    body: After Savva departs to found his own monastery near Zvenigorod, the brethren persuade Nikon to resume leadership of the Trinity Monastery.
  - when: "1408"
    title: Monastery burned by Khan Edigei
    body: The community flees with relics and books during the invasion; on their return they find the monastery destroyed, and Nikon directs its rebuilding.
