id: OS-2205
lifespan: c. 1352–1426
overview:
  - Nikon of Radonezh (born c. 1352 at Yuryev-Polsky) was a Russian monastic, disciple, and eventual successor of Saint Sergius of Radonezh as abbot of the Holy Trinity Monastery. As a young man he sought out Sergius, who initially declined to receive him and directed him instead to Saint Athanasius at the monastery in Serpukhov, where he was tonsured and, by tradition, ordained to the priesthood around the age of thirty.
  - After returning to the Trinity Monastery, Nikon became Sergius's cell-attendant and was named his successor roughly six months before Sergius's death in 1392. He led the community through the devastation of Tatar raids, oversaw the monastery's rebuilding, uncovered the incorrupt relics of Saint Sergius in 1422, and commissioned the iconographers Andrei Rublev and Daniel Chorny to decorate the new Trinity Cathedral. Under his leadership the Trinity Monastery became a dominant center of Russian spiritual life and a major pilgrimage destination. He died on 17 November 1426 and was formally canonized by the Russian Orthodox Church in 1547.
liturgicalTitle: Our Venerable Father Nikon, Abbot of Radonezh
sections:
  - heading: Early Life and Monastic Formation
    body:
      - Nikon was born around 1352 (some accounts give 1355) at Yuryev-Polsky. Having heard of the monastic reputation of Saint Sergius of Radonezh, he sought him out as a young man. According to the tradition, Sergius did not immediately receive him but sent him to Saint Athanasius at the monastery of the Theotokos in Serpukhov, where Nikon was tonsured into the monastic schema after demonstrating persistence.
      - He became known as a zealot of obedience for his humble adherence to the tasks assigned him, and by tradition was ordained to the priesthood at about the age of thirty. Athanasius later blessed him to return to Sergius, who received him warmly and eventually had him dwell in his own cell for spiritual instruction. Accounts of his return to the Trinity Monastery place it around 1375.
  - heading: Succession and Withdrawal
    body:
      - About six months before his death on 25 September 1392, Sergius appointed Nikon as his successor and withdrew into seclusion. After Sergius died, Nikon at first served as abbot but found the burden heavy and retreated to his cell. During this period Saint Savva of Storozhevsk led the monastery, until around 1398–1400, when Savva departed to found his own monastery near Zvenigorod.
      - The brethren then persuaded Nikon to resume the abbacy, which he accepted while reserving time each day for contemplative silence.
  - heading: Restoration of the Monastery
    body:
      - Nikon led the community through repeated devastation. The monastery suffered a Tatar raid in late 1392 and was burned during Khan Edigei's invasion of 1408, which compelled the brethren to flee with the relics, books, and vessels; on their return they found the monastery destroyed. Nikon directed all of the reconstruction.
      - By tradition, during the threatened invasion of 1408 Nikon prayed fervently and received a vision of the hierarchs Peter and Alexis of Moscow alongside Sergius, assuring him that the monastery would survive and flourish. A wooden Trinity church was consecrated on 25 September 1411, the anniversary of Sergius's death. Between 1409 and 1411 Nikon expanded the monastery's holdings by purchasing estates in Dmitrov and Radonezh. He then oversaw the building of a stone cathedral over Sergius's tomb.
  - heading: The Trinity Cathedral and Andrei Rublev
    body:
      - Nikon commissioned the iconographers Andrei Rublev and Daniel Chorny (Daniel the Black) to decorate the interior of the new stone Trinity Cathedral, work dated to roughly 1422–1425. For this church Rublev painted his renowned Icon of the Holy Trinity (the Hospitality of Abraham), understood to reflect the spiritual vision central to Sergius's life.
      - Through these works and the rebuilding, Nikon made the Trinity Monastery a dominant center of Russian spiritual life and a major destination for pilgrims.
  - heading: Uncovering of Saint Sergius's Relics
    body:
      - On 5 July 1422, during excavation for the new cathedral, workers uncovered the incorrupt relics of Saint Sergius of Radonezh. The community rejoiced and placed them in a new reliquary within the church. This date is commemorated as one of Nikon's associated feasts (6 July).
  - heading: Repose and Canonization
    body:
      - Nikon died in November 1426 (17 November), after receiving Communion and blessing the brethren, and was buried near the reliquary of Saint Sergius, by the southern wall of the Trinity Cathedral. Hieromonk Pachomius the Logothete composed his service and life under the hierarch Jonah (1448–1461).
      - In 1547 the Russian Orthodox Church established his universal celebration at the Council of Moscow (the Makaryev Sobor). A church was built over his grave in 1548, rebuilt in 1623, with his relics placed in a crypt. The 500-year anniversary of his repose was commemorated in 1976 at the Trinity-Sergius Lavra.
  - heading: Relics & Shrines
    body:
      - Nikon was buried near the southern wall of the Trinity Cathedral, close to the reliquary of Saint Sergius. A stone church dedicated to him was built over his grave in 1548 and rebuilt in 1623; his relics were placed in a crypt.
