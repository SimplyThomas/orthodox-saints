id: OS-2887
lifespan: c. 978 – 20 February 1054
overview:
  - Yaroslav the Wise (baptismal name George) was Grand Prince of Kiev and a son of St. Vladimir the Great, the enlightener of Rus'. Born about 978, he governed Rostov in his youth and moved to Novgorod in 1010, founding the city of Yaroslavl on the Volga during this period.
  - After Vladimir's death in 1015 he prevailed in a protracted civil war against his half-brother Sviatopolk I, securing his rule over Kiev by 1019. His long reign is remembered as a high point of Kievan Rus', during which the Church flourished, learning advanced, and the first written law of the East Slavs was set down.
  - A great builder of churches, he raised the Cathedral of Holy Wisdom (Saint Sophia) at Kiev and founded monasteries dedicated to Saint George and Saint Irene. Reposed in 1054, he was locally venerated for centuries and glorified for church-wide veneration by the Russian Orthodox Church in 2016.
patronage:
  - Church builders
  - Lawgivers and rulers
  - Kiev
  - Rus'
timeline:
  - when: c. 978
    title: Birth
    body: Born a son of Vladimir the Great; his mother is variously identified as Rogneda of Polotsk or Anna Porphyrogenita. His baptismal name was George, in honor of Saint George.
  - when: "1010"
    title: Prince of Novgorod
    body: Transferred from Rostov to govern Novgorod following the death of his brother. During this period he founded the city of Yaroslavl on the Volga River.
  - when: 1015-1019
    title: War for Kiev
    body: After Vladimir's death in 1015, contended in a bloody civil war against his half-brother Sviatopolk I, who was backed by Duke Boleslaw I the Brave of Poland. He defeated Sviatopolk in 1016, lost ground in 1018, and firmly established his rule over Kiev by 1019.
  - when: "1019"
    title: Marriage to Ingegerd
    body: Married Ingegerd Olofsdotter, daughter of Olof Skotkonung, king of Sweden, receiving Ladoga as a marriage gift.
  - when: 1030-1031
    title: Frontier campaigns
    body: Captured Tartu in Estonia in 1030, renaming it Yuryev after his patron saint, and in 1031 recovered the Cherven cities from the Poles. He built a line of forts, including Yuriev, Bohuslav, Kaniv, Korsun, and Pereyaslavl, to defend against the Pechenegs.
  - when: "1036"
    title: Victory over the Pechenegs
    body: Won a decisive victory over the Pechenegs near Kiev, an occasion he commemorated with major church building.
  - when: "1037"
    title: Foundation of Saint Sophia
    body: According to the Primary Chronicle, sponsored the construction of the Saint Sophia Cathedral at Kiev, dedicated to Holy Wisdom.
  - when: "1051"
    title: Elevation of Metropolitan Hilarion
    body: Elevated Hilarion of Kiev as metropolitan, challenging the Byzantine practice of appointing only Greeks to episcopal sees. Hilarion's discourse is regarded as the first work of Old East Slavic literature.
  - when: 20 February 1054
    title: Repose
    body: Died at Vyshgorod at about 76 years of age and was entombed in a white marble sarcophagus within Saint Sophia's Cathedral at Kiev.
  - when: 3 February 2016
    title: Church-wide glorification
    body: The Council of Bishops of the Russian Orthodox Church established church-wide veneration of the Right-believing Prince Yaroslav the Wise, with a feast day of February 20.
sections:
  - heading: Rule and the Law of Rus'
    body:
      - Yaroslav's reign consolidated Kievan Rus' after years of fratricidal conflict. Having secured Kiev by 1019, he defended the realm's southern frontier against the nomadic Pechenegs, building a chain of forts and winning a decisive battle near Kiev in 1036.
      - He promulgated the Russkaya Pravda, the first code of laws among the East Slavs. This written law, together with his patronage of learning and the Church, gave his reign its enduring reputation and his epithet, 'the Wise.'
  - heading: Builder of Churches
    body:
      - To mark his victory over the Pechenegs, Yaroslav sponsored the construction of the Saint Sophia Cathedral, and he also established the monasteries of Saint George and Saint Irene. In 1051 he elevated Hilarion as metropolitan of Kiev, asserting the young Church's standing against the Byzantine custom of appointing only Greek bishops; Hilarion's discourse counts as the first work of Old East Slavic literature.
      - The Cathedral of Holy Wisdom at Kiev, dedicated to Hagia Sophia, was among the largest churches built in Europe in the 11th century and remains one of the oldest well-preserved examples of Kievan Rus' architecture. Its design features five naves and thirteen domes, built of local brick and pink slate, and its interior preserves some 3,260 square meters of 11th-century mosaics and frescoes, including a fresco depicting Yaroslav's whole family. The Primary Chronicle records its foundation in 1037; other traditions and later scholarship propose earlier dates under Vladimir the Great.
  - heading: Family and European Ties
    body:
      - Through his marriage to Ingegerd of Sweden and the marriages of his children, Yaroslav bound the house of Kiev to the ruling families of Europe. His daughter Elisiv married Harald Hardrada; Anastasia married Andrew I of Hungary; and Anne married Henry I of France, serving as regent during their son's minority.
      - A family fresco within Saint Sophia's Cathedral depicts Yaroslav, his wife Irene (Ingegerd), their four daughters and six sons. The cathedral served as the burial place of Yaroslav and his descendants.
  - heading: Relics & Shrines
    body:
      - Yaroslav was entombed in a white marble sarcophagus in the Saint Sophia Cathedral at Kiev. The chronicler Adam of Bremen named him a saint as early as 1075.
      - The fate of his relics is uncertain. When the sarcophagus was examined in 1936 it held the skeletal remains of two individuals, one male and confirmed as Yaroslav; when it was reopened in 2009 it was found to contain only a single female skeleton. Yaroslav's remains appear to have been lost, possibly removed before the Second World War and taken abroad.
