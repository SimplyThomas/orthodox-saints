id: OS-2874
lifespan: Egypt, 4th century – reposed c. 400
overview:
  - Venerable Peter the Pionite, also called Peter of Egypt, was a Desert Father of 4th-century Egyptian monasticism and a disciple of Abba Lot. He is remembered chiefly through the sayings preserved under his name in the Apophthegmata Patrum (the Sayings of the Desert Fathers).
  - He spent many years as a hermit in the Desert of the Cells (Kellia) in Lower Egypt, and is commemorated in the Orthodox Church on January 27 (February 9 on the Old Calendar), where he appears as "Venerable Peter of Egypt, disciple of Abba Lot." The synaxarion tradition relates that he reposed in peace in deep old age, around the year 400.
liturgicalTitle: Our Venerable Father Peter the Pionite, Disciple of Abba Lot
sections:
  - heading: Discipleship under Abba Lot
    body:
      - Peter was a disciple of Abba Lot of Egypt, an ascetic who lived in the 4th–5th centuries near Arsinoe (Al-Fayoum) beside a marshy lake in Lower Egypt and who, the tradition records, "directed many brethren on the path to salvation." Abba Lot is himself commemorated on October 22.
      - "Lot belonged to the wider circle of the great Egyptian ascetics: he was a disciple of St. Joseph of Panephysis, a companion of St. Arsenius the Great and St. Agathon, and he dwelt near St. Anthony the Great, opposing Origenist teachings. Peter's formation as a monk took place within this milieu of the classical Desert Fathers."
  - heading: Life in the Desert of the Cells
    body:
      - Peter lived for many years in the Desert of the Cells, known as Kellia, a monastic settlement in the Nitrian Desert roughly 65 km south of Alexandria. Founded in 338 by St. Amun under the spiritual direction of St. Anthony the Great, Kellia extended over some 125 square kilometers and was designed for a semi-eremitic life of extreme solitude, in which, as one description records, "no one can catch sight of another nor can a voice be heard."
      - The settlement grew to perhaps 600 monks in the 390s and to thousands by the 5th and 6th centuries before declining and being abandoned in the 9th century; archaeological excavations begun in 1964 uncovered over 1,500 structures. It was in this environment of strict withdrawal that Peter passed his long ascetic life.
  - heading: Sayings in the Apophthegmata Patrum
    body:
      - Peter the Pionite is counted among the named Desert Fathers and Mothers of the Alphabetical Collection of the Apophthegmata Patrum, which gathers sayings attributed to individual elders. Several sayings are preserved under his name.
      - On asceticism, when elderly brothers once offered him wine diluted with water, he declined it, saying that this "is just as bad as spiced wine" — a mark of his lifelong strict self-discipline. On discretion, he taught that questioning visitors about their circumstances can open the door to idle gossip, cautioning against needless inquiry.
      - On humility and obedience, when invited to dine with senior monks he accepted without reluctance, explaining that among the elders he was "the youngest of all and the most humble in thought." On divine action, he warned against pride when God works through one's intercession, urging gratitude at being counted worthy to serve God's purposes. On spiritual authority, he held that those still overcome by the passions cannot truly teach others struggling with the same, saying that "it is shameful for him to teach, before he has been freed from that passion."
  - heading: Identity and Commemoration
    body:
      - Peter is commemorated on January 27 (February 9 on the Old Calendar), where Orthodox calendars list him as "Venerable Peter of Egypt, disciple of Abba Lot," a number of them assigning him to the 5th century. His feast is not everywhere firmly fixed, and the entry warrants clergy and source review.
      - He is to be distinguished from Peter of Dios, who appears as a separate figure among the named Desert Fathers of the Apophthegmata Patrum.
