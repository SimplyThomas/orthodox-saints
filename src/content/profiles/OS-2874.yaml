  - claim: Peter lived for many years as a hermit in the Desert of the Cells (Kellia), not in Scetis as stated in the anchor brief.
    detail: The anchor brief explicitly identifies Peter as 'A Desert Father of Scetis.' Scetis (Wadi El Natrun) and Kellia (the Cells) are different monastic settlements. The external source (Sanidopoulos) does support Kellia, but the anchor wins per the verification rule. The profile places him in Kellia throughout (also in the Life in the Desert of the Cells section and the timeline), directly contradicting the anchor.
