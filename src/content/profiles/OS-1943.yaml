id: OS-1943
liturgicalTitle: The Holy Martyrs Rusticus the Presbyter and Eleutherius the Deacon
lifespan: 1st century
overview:
  - Rusticus the Presbyter and Eleutherius the Deacon are commemorated together as disciples and companions of Saint Dionysius the Areopagite, the first bishop of Athens. Rusticus held the office of presbyter and Eleutherius that of deacon, and the two are remembered as the clergy who shared in Dionysius's ministry and ultimately in his martyrdom.
  - According to the Orthodox tradition recorded in the synaxarion, the pair suffered martyrdom at Athens during the persecution of the emperor Domitian, who reigned from 81 to 96. They are commemorated on October 3, the same feast as Saint Dionysius the Areopagite with whom they are joined.
timeline:
  - when: 81-96 (reign of Domitian)
    title: Martyrdom at Athens
    body: During the persecution of Christians under the emperor Domitian, Rusticus the Presbyter and Eleutherius the Deacon suffered martyrdom at Athens, sharing the fate of their teacher Dionysius the Areopagite.
sections:
  - heading: Companions of Dionysius the Areopagite
    body:
      - The two martyrs are remembered primarily through their association with Saint Dionysius the Areopagite, whom the Apostle Paul appointed bishop of Athens. The fuller synaxarion tradition relates that Dionysius was accompanied in his ministry by the Presbyter Rusticus and the Deacon Eleutherius, and that the three were seized and beheaded together under Domitian.
      - Their feast is kept on October 3 alongside Dionysius, and Rusticus and Eleutherius are venerated as the clergy who stood with him to the end.
  - heading: Identity and Tradition
    body:
      - There are conflicting traditions about where Dionysius and his companions met their death. The Orthodox synaxarion entry dedicated to Rusticus and Eleutherius places their martyrdom at Athens during the Domitianic persecution, while a fuller narrative of Dionysius describes the three preaching westward and being martyred in Gaul.
      - In the Western (Latin) church a priest named Rusticus and a deacon named Eleutherius are likewise commemorated as martyred companions, there joined to Saint Denis of Paris. Since at least the ninth century the legends of Dionysius the Areopagite and Denis of Paris have been conflated, and later scholarship has worked to distinguish them. The Orthodox commemoration on October 3 follows the tradition that locates this pair at Athens with Dionysius the Areopagite.
companions:
  - name: Dionysius the Areopagite
    note: Bishop of Athens whose disciples and fellow martyrs Rusticus and Eleutherius were; commemorated with them on October 3.
