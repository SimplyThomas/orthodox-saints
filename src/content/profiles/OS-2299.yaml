influence:
  heading: Influence in America
  intro: "Sixteen years of mission work from New York left St. Alexander a cathedral he built and a ring of immigrant parishes his labors helped gather."
  places:
    - name: "St. Nicholas Russian Orthodox Cathedral"
      kind: Cathedral
      place: "New York, New York"
      note: "Fr. Alexander initiated and carried through the construction of this church on East 97th Street, raising funds across America and in Russia — Tsar Nicholas II was among the first donors. Completed in 1902, it became the diocesan cathedral in 1903 and remains a center of Russian Orthodoxy in the United States."
    - name: "St. Andrew's Russian Orthodox Cathedral"
      kind: Cathedral
      place: "Philadelphia, Pennsylvania"
      note: "The oldest Orthodox parish in Philadelphia, whose nascent congregation Fr. Alexander served at its first service in 1897; its first church building was consecrated by Archbishop Tikhon in 1902."
    - name: "Holy Trinity Church"
      kind: Church
      place: "Yonkers, New York"
      note: "Organized in 1898 among Slavic immigrants north of New York City and counted among the parishes established through Fr. Alexander's missionary efforts from his New York base."
