id: OS-2299
liturgicalTitle: The Holy New Hieromartyr Alexander Hotovitzky, Missionary to America
lifespan: 1872 – 1937
overview:
  - Alexander Alexandrovich Hotovitzky was a Russian priest who spent the prime of his ministry as a missionary in North America before returning to Russia, where he died a martyr during the Soviet persecution of the Church. Born on February 11, 1872, in Kremenets in Volhynia, he was the son of an archpriest who served as rector of the Volhynia Theological Seminary. After studies at the Volhynia Seminary, he graduated from the Saint Petersburg Theological Academy in 1895 with a master's degree, and was sent as a lay missionary to the Diocese of the Aleutians and North America.
  - Beginning as a reader at the newly established Saint Nicholas Church in New York City, he married Maria Scherbuhina, a graduate of the Pavlovsk Institute of Saint Petersburg, was ordained deacon, and then was ordained to the priesthood on February 25, 1896, by Bishop Nicholas (Ziorov) at the diocesan cathedral in San Francisco. For some eighteen years he served Saint Nicholas as its pastor, becoming one of the central organizers of Orthodox life in the United States. He was instrumental in establishing new parishes in cities such as Philadelphia, Yonkers, and Passaic, edited the diocesan journal the American Orthodox Messenger, and led the fundraising and construction of the new Saint Nicholas Cathedral in New York, completed in 1902. Much of this work was carried out under Bishop Tikhon (Bellavin), the future Patriarch of Moscow, with whom Hotovitzky's life would remain intertwined.
  - Recalled to Russia in 1914, Hotovitzky served first as rector of the Orthodox congregation in Helsinki, Finland, and from 1917 at the Cathedral of Christ the Saviour in Moscow, where he again worked alongside the now-Patriarch Tikhon and took part in the All-Russian Church Council of 1917-18. Under the Bolshevik regime he was repeatedly arrested, imprisoned, and exiled for his defense of the Church and its property. Following a final arrest during the Great Purge of 1937 he perished; some accounts state that he was shot on August 19, 1937, while the church record notes only that the documentary trail ends with his arrest. He is numbered among the New Martyrs and Confessors of Russia, glorified by name by the Moscow Patriarchate in December 1994, and is commemorated on December 4.
sections:
  - heading: Formation and the Call to America
    body:
      - Alexander Hotovitzky was born into the clergy of Volhynia, in western Ukraine; his father, Archpriest Alexander, was rector of the Volhynia Theological Seminary at Kremenets, where the son received his first schooling. He went on to the Saint Petersburg Theological Academy, taking his master's degree in 1895, and in the same year volunteered for the North American mission — arriving in New York not yet ordained, and serving first as a reader at the young Saint Nicholas parish in the city.
      - After his marriage to Maria Scherbuhina he was ordained deacon, and on February 25, 1896, Bishop Nicholas (Ziorov) ordained him to the priesthood at the cathedral in San Francisco, then the see of the diocese. He returned to New York as pastor of Saint Nicholas, the parish he would serve for nearly two decades.
  - heading: Ministry in New York
    body:
      - From his base at Saint Nicholas, Hotovitzky became one of the most active figures in the Russian Orthodox mission. He traveled among the growing immigrant communities of the eastern seaboard, and the sources credit him with a leading role in founding parishes in Philadelphia, Yonkers, and Passaic, among other towns. He served the diocesan mutual aid society, which supported struggling immigrant families, in turn as its treasurer, secretary, and president.
      - He was also the mission's chief literary voice. As editor of the American Orthodox Messenger, the diocesan journal published in Russian and English, he shaped the public presentation of Orthodoxy in America for years, writing and editing for a readership that spanned new immigrants and curious Americans alike.
      - His American ministry coincided with the tenure of Bishop Tikhon (Bellavin), under whose leadership Orthodoxy in North America was significantly consolidated, and the two men worked closely — a collaboration that would resume, in far darker times, in Moscow.
  - heading: Building Saint Nicholas Cathedral
    body:
      - The crowning work of Hotovitzky's New York years was the new Saint Nicholas Cathedral on East 97th Street. He led the fundraising campaign for the building, gathering donations small and great — Tsar Nicholas II himself contributed five thousand rubles — and oversaw the construction of the Muscovite-baroque church that still stands. The cathedral was completed in 1902, and in 1903 it became the diocesan cathedral when the see was moved from San Francisco to New York under Archbishop Tikhon.
      - In 1905, at the thanksgiving service marking the Treaty of Portsmouth that ended the Russo-Japanese War, the cathedral and its pastor stood at the center of Russian church life in America. He served there until his recall to Russia on February 26, 1914, after eighteen years of American ministry.
  - heading: Helsinki and Moscow
    body:
      - After his recall in 1914, Hotovitzky was appointed rector of the Orthodox congregation in Helsinki, Finland, where he served as an assistant to Archbishop Sergius (Stragorodsky), the future Patriarch, and labored to strengthen the small Orthodox flock in an overwhelmingly Lutheran land.
      - In August 1917 he was transferred to the Cathedral of Christ the Saviour in Moscow, arriving as the revolution gathered. He took part in the All-Russian Church Council of 1917-18, which restored the Patriarchate and elected his old American bishop, Tikhon, as Patriarch of Moscow, and through the civil-war years he served as one of the Patriarch's close collaborators.
  - heading: Arrests, Trial, and Exile
    body:
      - "Under Soviet rule Hotovitzky's defense of the Church made him a marked man. He was arrested briefly in May 1920 and again in November 1921. In March 1922, when the state ordered the confiscation of church valuables, he was a central figure in his parish's resolution opposing the seizure of consecrated vessels; for this he was tried in November 1922 with more than a hundred others and sentenced on December 13, 1922, to ten years' imprisonment, with confiscation of property and loss of civil rights."
      - Amnestied in October 1923, he was arrested again and exiled in September 1924 to the Turukhan region of Siberia for three years on account of his "anti-Soviet" views. On his return he was elevated to the rank of protopresbyter, served as a close assistant to Metropolitan Sergius in the administration of the battered church, and in the 1930s was rector of the Church of the Deposition of the Robe on Donskaya Street in Moscow.
  - heading: Final Arrest and Death
    body:
      - In the summer or autumn of 1937, at the height of the Great Purge, Hotovitzky was arrested a final time — and there the documentary record ends. The church account states plainly that no official trace of his fate survives, that the place of his burial is unknown, and that the consistent testimony of oral reports is that he died a martyr. Other published accounts state that he was shot on August 19, 1937, and name the Donskoye cemetery in Moscow as the place where his remains were taken. The uncertainty is itself part of his martyrdom, shared with the countless victims of that year whose deaths were hidden by the state that caused them.
  - heading: Glorification
    body:
      - Hotovitzky is numbered among the New Martyrs and Confessors of Russia, whom the Russian Orthodox Church Outside Russia glorified collectively in 1981; the Moscow Patriarchate glorified him by name at its Bishops' Council in December 1994, and his glorification is celebrated on December 4. His memory is kept on both continents of his ministry — a chapel in the crypt of the Uspenski Cathedral in Helsinki bears his name, and a street beside his old parish territory in New Jersey has been designated Saint Alexander Hotovitzky Way.
