id: OS-2821
lifespan: early 6th century – 1 May 596
overview:
  - Saint Asaph was a sixth-century Welsh bishop, remembered as the disciple and successor of Saint Kentigern at the monastery of Llanelwy in north-east Wales. The community and the later cathedral and diocese that grew from it came to bear his name, giving rise to the town and see of St Asaph.
  - Born in the early sixth century in what is now northern Wales, Asaph joined the monastic community founded by Kentigern during the latter's exile from Strathclyde. When Kentigern was recalled to Scotland after 573, Asaph was consecrated bishop of Llanelwy in his place, becoming, by tradition, the first Welsh bishop of that see.
  - He is venerated in the Eastern Orthodox Church, the Roman Catholic Church, and the Anglican Communion. His principal feast is kept on 1 May, with commemorations also noted on 5 May and 11 May.
liturgicalTitle: Our Father among the Saints Asaph, Bishop of Llanelwy
patronage:
  - Diocese of St Asaph
timeline:
  - when: early 6th century
    title: Birth in northern Wales
    body: According to the Bonedd y Saint, Asaph was born in what is now northern Wales, said to be the son of King Sawyl Penuchel of the Old North and of Gwenaseth, daughter of Rhufon Rhufoniog. He is also described as a grandson of Pabo Post Prydain.
  - when: c. 545
    title: Disciple at Llanelwy
    body: He entered the monastery of Llanelwy — 'the church on the River Elwy' — founded by Saint Kentigern during his exile from Strathclyde, at the confluence of the rivers Clwyd and Elwy.
  - when: after 573
    title: Consecrated bishop
    body: Following the Battle of Arfderydd (573), when Kentigern was recalled to Strathclyde by Riderch Hael, King of Strathclyde, Asaph was consecrated bishop to succeed him at Llanelwy.
  - when: 1 May 596
    title: Repose
    body: He died at St Asaph, in what is historically Flintshire (now Denbighshire). His major shrine was later St Asaph Cathedral.
sections:
  - heading: The Monastery of Llanelwy
    body:
      - The monastery of Llanelwy was founded around 545 by Saint Kentigern during his exile from his Scottish see of Strathclyde. It stood at the confluence of the rivers Clwyd and Elwy in north-east Wales, and its buildings were described as made of smoothed wood, after the fashion of the Britons.
      - "By tradition the community numbered 965 disciples, organized into three groups: three hundred worked the outlying lands, three hundred served in the monastic offices, and three hundred and sixty-five attended the divine services in rotating choirs so that worship continued without interruption."
  - heading: Succession to Kentigern
    body:
      - When Riderch Hael, King of Strathclyde, invited Kentigern to return to Scotland, Kentigern appointed Asaph bishop of Llanelwy in his place. Asaph thus became the first Welsh bishop of the see, which afterward took his name.
      - The diocese was established in the mid-sixth century through Kentigern's foundation; Kentigern is reckoned its first bishop and Asaph its second, though the see itself became known by Asaph's name. Originally the diocese coincided with the Welsh principality of Powys, but it later lost territory through Mercian encroachment and the building of Offa's Dyke around 798.
  - heading: Relics & Shrines
    body:
      - Asaph's major shrine was St Asaph Cathedral in Flintshire, dedicated jointly to Saints Asaph and Cyndeyrn (Cyndeyrn being another name for Kentigern).
      - A church was first built on or near the cathedral site by Kentigern in the sixth century (some accounts credit Saint Elwy in 560). The earliest parts of the present building date from the thirteenth century, a new structure begun after the original stone cathedral was burnt by the soldiers of King Edward I during the Second Welsh War in 1282.
      - Numerous Welsh place names carry the 'asa' prefix associated with his name — including Llanasa, which he is said to have founded, as well as Ffynnon Asa, Onnen Asa, and Pantasa. Their clustering near Holywell has suggested to some that he may have kept a hermitage there.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: The Roman Martyrology describes Asaph as 'bishop and abbot of Elvae (Elwy) in Wales, after whom the see is named.' His feast is kept on 1 May, with commemorations also recorded on 5 May and 11 May."
      - "Traditional Accounts: A pivotal miracle is related of his youth. As Kentigern stood praying in the icy river, he sent the young Asaph to fetch burning wood for warmth; instead the boy carried live coals to him in his apron, which did not burn him. The wonder was taken to reveal Asaph's sanctity to Kentigern."
      - "Traditional Accounts: A story of a ring recovered from a fish's belly, associated with King Riderch Hael and Queen Languoreth, is said to resemble almost exactly a legend concerning King Maelgwn of Gwynedd and Saint Asaph, and the two accounts may have become confused."
