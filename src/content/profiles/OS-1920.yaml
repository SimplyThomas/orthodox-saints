id: OS-1920
lifespan: c. 448 – 557
overview:
  - Kyriakos the Anchorite was a Palestinian monastic figure of the fifth and sixth centuries, born about 448 in the Greek city of Corinth to the priest John and his wife Eudokia (Eudoxia). Through his relative Bishop Peter of Corinth he was appointed a reader in the church, but as a teenager he was moved by hearing a sermon on Christ's words in Matthew 16:24 to leave his home and sail for Jerusalem before the age of eighteen.
  - After venerating the holy sites, he entered monastic life in Palestine, first at a monastery near Sion under the hegumen Abba Eustorgius and then at the Lavra of St. Euthymius the Great, who tonsured him and placed him under the guidance of St. Gerasimus of the Jordan. He became known for an austere ascetic regimen, long silence, priestly and liturgical service, and a very long life, eventually withdrawing deep into the Judean wilderness as a solitary anchorite.
  - In the theological controversies of his day he was a firm opponent of Origenism, opposing it through prayer and teaching. He died in 557 at roughly 108 or 109 years of age. His life was recorded by the sixth-century Palestinian monk and hagiographer Cyril of Scythopolis, whose account is among the earliest and most reliable sources for his biography. He is commemorated in the Eastern Orthodox Church on September 29.
liturgicalTitle: Our Venerable Father Kyriakos the Anchorite
patronage:
  - Monastics
  - Hermits and anchorites
  - Ascetic struggle
timeline:
  - when: c. 448
    title: Birth in Corinth
    body: Born in the Greek city of Corinth to the priest John and his wife Eudokia; through his relative Bishop Peter of Corinth he was made a reader in the church.
  - when: Before age 18
    title: Departure for Jerusalem
    body: Moved by a sermon on Matthew 16:24, he left home and sailed to Jerusalem, then entered a monastery near Sion under Hegumen Abba Eustorgius.
  - when: Young adulthood
    title: Tonsure under Euthymius the Great
    body: He joined the Lavra of St. Euthymius the Great, who tonsured him into the monastic schema and placed him under St. Gerasimus of the Jordan. At the monastery of Theoctistus he took up an extreme asceticism, eating only every other day of bread and water and reading the Psalter through the night.
  - when: c. age 27
    title: Ten years of silence
    body: After the death of Gerasimus, he spent about ten years in near-total silence in a solitary cell, communicating only with a monk named Thomas until Thomas departed for Alexandria as an ordained bishop.
  - when: c. age 37
    title: Ordination as deacon
    body: He was ordained deacon. Amid monastic divisions he moved to the Souka monastery of Chariton, arriving on September 28.
  - when: At Souka
    title: Priesthood and long service
    body: After several years he was ordained priest and served as canonarch for eighteen years, spending thirty years in all at this monastery.
  - when: c. age 70
    title: Withdrawal to the wilderness
    body: He withdrew with his disciple John into the Natoufa wilderness, and, when crowds sought him out after a reported healing, moved successively to the Rouva and Sousakim wildernesses to keep his solitude.
  - when: c. age 80
    title: The Cave of St. Chariton
    body: He settled in a cave that had earlier been inhabited by St. Chariton. At about age 99 he returned once more to Sousakim with John.
  - when: "557"
    title: Repose
    body: He died at approximately 108 to 109 years of age at the Cave of St. Chariton in Palestine.
sections:
  - heading: Monastic Life and Asceticism
    body:
      - "At the monastery of Theoctistus, Kyriakos adopted an especially austere rule of life: he prayed fervently, slept little, ate only every other day, and nourished himself with bread and water. In his cell he read through the Psalter each night, interrupting his reading only to go to church at midnight."
      - His monastic career spanned several major Palestinian communities. After his years at the Lavra of Euthymius and the monastery of Theoctistus, he joined the Souka monastery of Chariton, where he was ordained priest, served as canonarch for eighteen years, and remained for some thirty years in total. He was ordained deacon at about age 37 and priest during his years at Souka.
      - In his later life he pursued ever-greater solitude as an anchorite, moving with his disciple John through the Natoufa, Rouva, and Sousakim wildernesses and finally settling in a cave once inhabited by St. Chariton. His extreme longevity and lifelong ascetic struggle became the defining features of his memory.
  - heading: Opposition to Origenism
    body:
      - Kyriakos was a firm opponent of Origenism, which he opposed through prayer and teaching, and he is credited with turning many back to the Orthodox faith. According to tradition, the Theotokos appeared to him to strengthen him in these efforts.
      - Tradition also relates that he predicted the deaths of Nonnus and Leontius of Byzantium, after which, it is said, the movement ceased to spread.
  - heading: Sources and Legacy
    body:
      - The principal source for Kyriakos's life is the Life composed by Cyril of Scythopolis, a sixth-century Palestinian monk and hagiographer who wrote complete accounts of seven Palestinian monastic figures. Scholars regard the historical information in Cyril's works as precise and accurate, making the Life of Kyriakos one of the earliest and most reliable accounts of the saint and a primary source for sixth-century Palestinian monastic life.
      - Beyond the Eastern Orthodox commemoration on September 29, he is remembered on November 10 in the Coptic Orthodox tradition and on January 21 in the Armenian Apostolic tradition. In Serbia his feast is associated with the close of the grape harvest and observed as a Slava tradition.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: The narrative details of his life, including his ascetic practices, ordinations, and monastic movements, derive from the Life written by Cyril of Scythopolis, generally regarded as a reliable sixth-century source."
      - "Traditional Accounts: By tradition, while living as an anchorite around age 70 he healed the son of a local inhabitant, which drew crowds seeking his help and prompted his further withdrawal. Tradition further holds that the Theotokos appeared to him to strengthen him against Origenism and that he foretold the deaths of Nonnus and Leontius of Byzantium."
