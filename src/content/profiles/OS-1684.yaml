id: OS-1684
lifespan: late 15th century - 10 August 1515
liturgicalTitle: The Blessed Laurence, Fool-for-Christ and Wonderworker of Kaluga
overview:
  - Blessed Laurence of Kaluga was a fool-for-Christ who lived in the principality of Kaluga, in central Rus', during the early sixteenth century. He is remembered for a life of hidden ascetic poverty and for a tradition that credits his intervention with the defense of the city against a Crimean Tatar assault in 1512.
  - By tradition he was descended from the noble Khitrov family, yet he renounced any worldly standing to live in extreme simplicity, going barefoot in both winter and summer and clothed only in a shirt and a sheepskin coat. He was venerated as a wonderworker, and his repose on 10 August 1515 is the date on which he is commemorated.
timeline:
  - when: May 1512
    title: The defense of Kaluga
    body: During a Crimean Tatar assault on Kaluga, the synaxarion relates that Laurence, then at the home of Prince Simeon, called out for his axe and declared that he must defend the prince. He is said to have appeared suddenly aboard the prince's vessel on the Oka, encouraging the soldiers, who won the victory that same hour.
  - when: 10 August 1515
    title: Repose
    body: Blessed Laurence reposed on 10 August 1515, which fell on the feast of his patron, the martyr Laurence of Rome, and on which day he is commemorated.
  - when: "1565"
    title: Early reference under Ivan the Terrible
    body: A donation document of Tsar Ivan the Terrible refers to the Monastery of the Nativity of Christ 'where Laurence, the Fool-for-Christ lies,' an early witness to his veneration.
  - when: August 2018
    title: Discovery of relics
    body: Some of the saint's relics were identified in the Central Museum of the Armed Forces in Moscow, and a portion was returned to the monastery in Kaluga.
sections:
  - heading: Life and Asceticism
    body:
      - Laurence dwelt near a forest church dedicated to the Nativity of Christ, set on a high hill about half a verst from old Kaluga. According to the tradition recorded in his life, an underground passage connected his dwelling to the church so that he could attend the services. He also resided at the home of Prince Simeon of Kaluga.
      - "His ascetic life was marked by severe poverty and physical hardship: he went barefoot through both winter and summer and wore only a shirt and a sheepskin coat. The synaxarion relates that he healed many diseases of the eyes through his prayers."
  - heading: Veneration and Monastery
    body:
      - Prince Simeon of Kaluga (died 1518), who by tradition credited Laurence with saving his life, built a monastery in his memory on the site of the saint's ascetic labors. It became known as the Monastery of the Nativity of Christ, or the Svyato-Lavrentiev (St. Laurence) Monastery.
      - His veneration appears to have been established by the second half of the sixteenth century. In iconography he is depicted holding an axe, in reference to the account of the defense of Kaluga.
  - heading: Relics & Shrines
    body:
      - Blessed Laurence was buried at the monastery built in his honor in Kaluga. In August 2018 some of his relics were discovered in a storeroom of the Central Museum of the Armed Forces in Moscow, and a portion was transferred to the monastery in Kaluga where his body had once been buried.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: A donation document of Tsar Ivan the Terrible from 1565 names the Monastery of the Nativity of Christ as the place where Laurence the Fool-for-Christ lies, and a first posthumous miracle is recorded under the year 1621, the healing of the paralyzed boyar Kologrivov."
      - "Traditional Accounts: The most prominent tradition associated with the saint is his sudden appearance aboard Prince Simeon's vessel during the 1512 Tatar attack, after which his iconography customarily shows him bearing an axe."
patronage:
  - Diseases of the eyes
