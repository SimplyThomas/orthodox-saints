    title: Birth
    body: Barbara is born to the wealthy pagan Dioscorus; sources name her birthplace as either Heliopolis in Roman Phoenicia/Syria or Nicomedia in Bithynia.
  - when: 3rd century
    title: Conversion and baptism
    body: Confined to a tower, she rejects idol worship and is instructed and baptized by a priest who arrives from Alexandria disguised as a merchant.
  - when: 3rd century
    title: Martyrdom
    body: After her father discovers her faith, she is tortured by the prefect Martianus and beheaded, traditionally by her father's own hand; the Christian woman Juliana suffers and is beheaded with her.
  - when: 6th century
    title: Relics to Constantinople
    body: By tradition her relics are transferred to Constantinople.
