    body: Born to the pagan senator Marcus and his wife Julia.
  - when: 230–235
    title: Baptism
    body: Baptized, together with his companion Valerian, by Bishop Pontian of Rome, during whose episcopate he came to the faith; he subsequently brought his father Marcus and the household to baptism.
  - when: c. 222–235
    title: Appointed senator
    body: After his father's death, appointed by the emperor Alexander Severus to Marcus's place in the senate at the age of twenty.
  - when: 235–238
    title: Martyrdom
    body: Suffered martyrdom for his Christian faith under the emperor Maximian (Maximinus Thrax).
