id: OS-0484
liturgicalTitle: Our Venerable Father Alexei of Teklati
lifespan: b. 1852
overview:
  - Alexei (Shushania) of Teklati was a Georgian hieromonk and confessor of the late nineteenth and twentieth centuries. He is commemorated on January 18.
  - By the accounts he was born on September 23, 1852, in the village of Nokalakevi, in the Senaki district of Samegrelo, in western Georgia, to a pious Christian couple. His father died in 1868, and at the age of sixteen the young man received his father's blessing to take up the support of his family.
  - He afterward embraced the monastic life as a hieromonk, and is remembered as a confessor and spiritual guide who bore illness with patience.
