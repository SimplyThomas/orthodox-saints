    title: Birth in Northumbria
    body: Born into a noble Northumbrian family; trained in monastic life at Lindisfarne before traveling to Ireland to study.
  - when: "664"
    title: Plague and the vow of pilgrimage
    body: A plague at Rath Melsigi killed most of his companions and brought Egbert near death at twenty-five. He vowed, if spared, to live as a perpetual peregrinus and never settle in Britain again.
  - when: "684"
    title: Appeal to King Ecgfrith
