id: OS-2711
lifespan: c. 800 – 862
patronage:
  - Hampshire
  - Winchester
  - Southwark
  - Drought and rain
overview:
  - Swithun (also spelled Swithin; Old English Swīþhūn) was a ninth-century Bishop of Winchester in the kingdom of Wessex. Born during the reign of Egbert of Wessex (died 839), he was consecrated bishop on 30 October 852 and led the see until his death, which the anchor records in 862 and modern scholarship dates to 2 July 863.
  - Little survives from his own lifetime — he is scarcely mentioned in contemporary documents and appears as a witness to only nine charters, the earliest dated 854 — yet he became one of the most widely venerated of the Anglo-Saxon saints after his relics were translated in 971. He is remembered for his humility, his care for the poor, and the building and repair of churches in his diocese.
  - In the Eastern Orthodox Church he is venerated as a pre-schism Western saint, with a feast on 2 July, the date of his repose. He is the patron of Hampshire, Winchester, and Southwark, and is popularly invoked against drought — a role reflected in the enduring English weather legend attached to his July feast.
liturgicalTitle: Our Father among the Saints Swithun, Bishop of Winchester
timeline:
  - when: c. 800
    title: Birth in Wessex
    body: Swithun is born during the reign of Egbert of Wessex (died 839). Details of his early life survive only in a late and historically unreliable hagiography.
  - when: 30 October 852
    title: Consecrated Bishop of Winchester
    body: He is consecrated bishop and leads the see of Winchester, appearing as a witness to nine charters during his episcopate, the earliest dated 854.
  - when: 2 July 862/863
    title: Repose at Winchester
    body: Swithun dies and, by his own request, is buried in a humble grave outside the north wall of his cathedral. The anchor gives the year as 862; modern scholarship favours 863, while one manuscript of the Anglo-Saxon Chronicle records 861.
  - when: 15 July 971
    title: Translation of the relics
    body: More than a century after his death, his remains are moved from their outdoor grave — by then almost forgotten — into an indoor shrine in the Old Minster, organised by Bishop Æthelwold and King Edgar as part of the Benedictine reform. Numerous miracles are reported.
  - when: "1093"
    title: Shrine moved to the Norman cathedral
    body: His shrine is transferred to the new Norman cathedral at Winchester and later installed on a feretory platform above the high altar; the thirteenth-century retrochoir is built to accommodate pilgrims.
  - when: 1476–1538
    title: Relocation and destruction of the shrine
    body: The shrine is relocated within the retrochoir in 1476 and demolished in 1538 during the English Reformation. A modern replacement now stands on the original site in Winchester Cathedral.
sections:
  - heading: Life and Episcopate
    body:
      - Swithun was born in Wessex during the reign of Egbert (died 839) and was consecrated Bishop of Winchester on 30 October 852. Contemporary records are sparse — he is scarcely mentioned in any document of his own time and survives chiefly as a witness to nine charters, the earliest from 854.
      - "According to a late eleventh-century hagiography — regarded as unreliable by the scholar Michael Lapidge — he was ordained priest by Helmstan, Bishop of Winchester (838–c. 852), and was appointed tutor to Prince Æthelwulf, whom he is said to have influenced to grant a tenth of his royal lands to the Church. Tradition remembers him for his humility: he made his diocesan journeys on foot rather than on horseback, and invited the poor rather than the rich to his banquets. He supervised the building of new churches and the repair of existing ones throughout his diocese."
      - The date of his death is not securely fixed. The anchor records 862; modern scholarship favours 2 July 863, while the Canterbury manuscript (MS F) of the Anglo-Saxon Chronicle places it under 861. Later legends are demonstrably unhistorical — Thomas Rudborne's fifteenth-century Historia major wrongly claimed that Swithun accompanied Alfred the Great to Rome in the 850s.
  - heading: Relics & Shrines
    body:
      - By his own wish, Swithun was buried not within his cathedral but in a humble grave outside its north wall, where — in words recorded by William of Malmesbury — passers-by would walk over the grave and raindrops from the eaves would fall upon it.
      - More than a century later, on 15 July 971, his remains were translated into an indoor shrine in the Old Minster at Winchester. The move was organised by Bishop Æthelwold and King Edgar the Peaceful as part of the Benedictine reform under Archbishop Dunstan; contemporary writers agreed it followed the saint's own desire, expressed in a vision. The shrine was moved to the new Norman cathedral in 1093, later set on a feretory platform above the high altar, and relocated within the retrochoir in 1476 before being demolished in 1538 during the Reformation. A modern shrine now stands on the original site in Winchester Cathedral.
      - "His relics were eventually dispersed: his head was taken to Canterbury Cathedral in the Middle Ages, and Peterborough Abbey held an arm."
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: The translation of 971 was accompanied by a great number of reported miracles. Bishop Æthelwold ordered the monks to interrupt whatever they were doing and go to church to give praise whenever a miracle occurred — sometimes, it was said, three or four times a night. By tradition, Swithun appeared in a vision warning that if the community ceased to honour the miracles, the miracles would cease."
      - "Traditional Accounts: His best-known legend is the restoration of broken eggs: workmen had maliciously smashed a basket of eggs belonging to a poor woman, and the saint miraculously made them whole again. Related stories of the Winchester egg-woman and of Queen Emma's ordeal are also attached to him. In iconography he is depicted as a bishop holding a bridge, with broken eggs at his feet."
  - heading: The St Swithun's Day Weather Legend
    body:
      - 'A popular English rhyme holds that the weather on his feast sets the pattern for the following forty days: "St Swithun''s day if thou dost rain, for forty days it will remain; St Swithun''s day if thou be fair, for forty days ''twill rain nae mare." One theory traces the legend to a heavy shower on the day of the 971 translation, though it cannot be documented before the seventeenth or eighteenth century.'
      - "The saying has some partial meteorological basis, since around mid-July the jet stream tends to settle into a pattern lasting into late August, but it is often wrong: the Guinness Book of Records notes the prediction failed badly in 1913 and 1924. Similar legends attach to other saints across Europe, including St Médard in France, the Seven Sleepers in Germany, and Sampson the Hospitable in Russia. Swithun is chiefly regarded as a saint to whom one prays in time of drought."
  - heading: Veneration and Legacy
    body:
      - Swithun's feast is kept on different days in different traditions. In England the principal feast is 15 July, the day of the 971 translation; his repose on 2 July is observed in Norway and formerly in medieval Wales, and is also his date in the Roman Martyrology. In the Eastern Orthodox Church, which venerates him as a pre-schism Western saint, OrthodoxWiki gives 2 July. The Church of England keeps him with a Lesser Festival on 15 July.
      - He does not appear on the Orthodox Church in America's July 2 calendar, whose commemorations for that day are otherwise occupied; his Orthodox observance derives from broader listings of pre-schism Western saints rather than the main Eastern Synaxarion.
      - He is the patron of Hampshire, Winchester, and Southwark. More than forty churches across southern England bear his name, with further notable dedications at Stavanger Cathedral in western Norway and at churches in Lincoln and Worcester.
