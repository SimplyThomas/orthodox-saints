flagReasons:
  - claim: Teilo drove out an 'Irish chieftain' named Bwya
    detail: The external source (Wikipedia/Saint Teilo) explicitly calls Bwya 'an Irish pirate,' not a chieftain. The profile substitutes 'chieftain' without grounding.
  - claim: Teilo is patron of 'Wales' (in the patronage array)
    detail: The only explicit patronage named in the sources is 'Patron Saint of the city of Cardiff.' No source identifies him as patron of Wales as a whole.
  - claim: Teilo is patron of 'Llandeilo Fawr' (in the patronage array)
    detail: No source in the dossier identifies Teilo as the patron saint of Llandeilo Fawr. He founded a monastery there and died there, but formal patronage of the settlement is not stated.
