timeline:
  - when: first half 10th c.
    title: Monastery founded
    body: The Deep Stream monastery, dedicated to the Transfiguration, is founded near Triglia by Saint Basil during the reign of Constantine VII Porphyrogennitos.
  - when: 10th c.
    title: Third abbot
    body: Luke, having entered as a monk, becomes the third igoumen of the community.
  - when: late 10th c.
    title: Repose
    body: Luke reposes in peace at the monastery.
