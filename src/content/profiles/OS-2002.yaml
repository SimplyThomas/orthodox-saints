flagReasons:
  - claim: Profile states Bede describes her as 'constantly attentive to the needs of her community'; the dossier gives the description as 'constantly planning for the needs of her community'.
    detail: The external dossier (Wikipedia, drawing on Bede) gives the characterisation as 'upright in life and constantly planning for the needs of her community.' The profile substitutes 'constantly attentive to' for 'constantly planning for,' which shifts the meaning from active foresight and administration to passive responsiveness. The profile attributes this language to Bede, so the paraphrase misrepresents the source.
