id: OS-2002
lifespan: 7th century (died 11 October, after c. 685)
overview:
  - Ethelburga of Barking (Æthelburh) was a seventh-century Anglo-Saxon abbess, remembered as the first head of the monastery of Barking in Essex. She was the sister of Saint Earconwald (Erkenwald), who became Bishop of London in 675 and who founded the double monastery at Barking for her while establishing a separate house at Chertsey for himself. Her name derives from Old English meaning "noble fortress."
  - The principal historical source for her life is Bede's Ecclesiastical History of the English People (Book IV, chapters 6-10), which itself drew on a lost Life written at Barking Abbey. Bede describes her as upright in life and constantly attentive to the needs of her community, and records a series of miracles associated with her and her monastery, especially during the plague of 664. She is venerated on 11 October in the Eastern Orthodox Church, the Roman Catholic Church, and the Church of England.
liturgicalTitle: Our Venerable Mother Ethelburga, First Abbess of Barking
sections:
  - heading: Historical Context
    body:
      - Barking Abbey's traditional founding date is 666, though evidence suggests the community may have existed by around 660-664, with Ethelburga already leading it during the plague of 664. Founded as a double monastery under her brother Earconwald's patronage, it became one of the notable religious houses of early Anglo-Saxon England.
      - Around 675 Ethelburga founded All Hallows Berkyngechirche, now known as All Hallows by the Tower, in the City of London, on land given by her brother. The Hodilred Charter, dated variously to 685-687 or 691-693, granted her forty hides to expand Barking Abbey; if the charter is genuine, she was still living after 685.
      - According to Bede, Saint Hildelith had been recruited by Earconwald to teach Ethelburga, and Hildelith succeeded her as abbess, being confirmed in that office by 709.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: Bede records several miracles connected with Ethelburga and her community. During the plague of 664 a brilliant light from heaven is said to have illuminated the place where the community's cemetery would be sited. A nun named Tortgyth reportedly saw a figure ascending to heaven on cords brighter than gold in the days before Ethelburga's death. Other accounts in Bede describe a maidservant's thirst relieved by a spring that burst from the ground during travel, a too-short building beam miraculously lengthened by Ethelburga and Earconwald, a disabled nun who prayed at her relics, and a thegn's wife healed of blindness at her tomb. When Hildelith translated her relics, witnesses were said to perceive a heavenly light and a fragrance of wonderful sweetness."
      - "Traditional Accounts: Later medieval writers expanded her legend. Goscelin of Saint-Bertin compiled a Life of Ethelburga around 1087 at the commission of Abbess Aelfgifu. John of Tynemouth's Nova Legenda Angliae (1366) records further miracles, including Danish raiders repelled by a wolf, bear, and lion said to have defended the abbey, intruders struck with madness or blindness, a man resurrected at her tomb, and Abbess Aelfgifu receiving visions approving the translation of the relics."
  - heading: Relics & Shrines
    body:
      - "Ethelburga was buried at Barking Abbey, most likely in the nuns' cemetery. Her relics were translated on several occasions: first by Hildelith, later by Abbess Aelfgifu (c. 1066-1086), and again by Abbess Mabel de Bosham (1215-1247). At the dissolution of the monasteries in 1539 her relics occupied the central position in the abbey's saints' chapel, alongside those of Hildelith and Saint Wulfhilda. Three grave slabs at Abbey Green today commemorate Ethelburga, Hildelith, and Wulfhilda."
      - Several churches bear her name. St Ethelburga the Virgin in Bishopsgate in the City of London, founded around 675, survived the Great Fire of 1666 and the Blitz but was damaged in a 1993 bombing and now serves as a centre for international reconciliation. Others include St Ethelburga's at Great Givendale near Pocklington in the East Riding of Yorkshire, and the Church of St Mary and St Ethelburga with St Erconwald in Barking, near the original abbey site.
timeline:
  - when: c. 660-666
    title: Barking Abbey founded
    body: Ethelburga's brother Earconwald founds the double monastery at Barking in Essex for her, with the traditional founding date given as 666. Evidence suggests the community may already have existed by 660-664, with Ethelburga leading it.
  - when: "664"
    title: The plague and the cemetery light
    body: During the plague of 664 Ethelburga leads the community; Bede records a brilliant heavenly light illuminating the site chosen for the community's cemetery.
  - when: c. 675
    title: Founding of All Hallows in London
    body: Ethelburga founds All Hallows Berkyngechirche, now All Hallows by the Tower, in the City of London, on land given by her brother, who becomes Bishop of London the same year.
  - when: 685-693
    title: The Hodilred Charter
    body: A charter, dated between 685-687 and 691-693, grants Ethelburga forty hides to expand Barking Abbey; if genuine, it indicates she was still living after 685.
  - when: 11 October (year uncertain)
    title: Repose
    body: Ethelburga dies on 11 October; Bede provides no specific year. Hildelith succeeds her as abbess, confirmed in office by 709.
