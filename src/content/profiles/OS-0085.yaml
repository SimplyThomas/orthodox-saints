id: OS-0085
lifespan: 1st century BC – 1st century AD
overview:
  - The Prophet Zachariah and the Righteous Elizabeth were the aged, childless parents of St. John the Forerunner. Zachariah was a Jewish priest belonging to the priestly division (course) of Abijah, who served in the Temple at Jerusalem during the reign of King Herod. Elizabeth, his wife, descended from the daughters of Aaron, so that their son John was of priestly Aaronic lineage on both sides.
  - According to the Gospel of Luke, both Zachariah and Elizabeth were righteous before God, yet they had no children, for Elizabeth was barren and both were advanced in years. While Zachariah performed his priestly duties at the altar of incense in the Temple, the angel Gabriel appeared to him and announced that Elizabeth would bear a son to be named John, who would serve as the forerunner of the Lord.
  - Zachariah questioned the angel's word, given his and his wife's old age, and for his doubt Gabriel struck him mute, declaring that he would not speak until the prophecy was fulfilled. Elizabeth conceived as foretold and bore a son. At the circumcision on the eighth day, relatives expected the child to be named after his father, but Elizabeth insisted on the name John; when Zachariah wrote in confirmation that this was to be the child's name, his speech was restored, and he uttered a prophetic blessing.
  - By tradition, Zachariah was later slain in the Temple. According to apocryphal accounts, he was murdered by Herod's soldiers during the massacre of the infants when he refused to disclose the hiding place of his son. The two are commemorated together as righteous parents of the Forerunner and are venerated across multiple Christian traditions.
sections:
  - heading: Family
    body:
      - Zachariah and Elizabeth were both of priestly families. The Gospel of Luke describes Elizabeth as a relative of Mary, the mother of Jesus. Because Zachariah was a priest of the course of Abijah and Elizabeth was numbered among the daughters of Aaron, their son John was a descendant of Aaron on both his father's and his mother's side.
  - heading: The Benedictus
    body:
      - After his speech was restored at the naming of his son, Zachariah delivered a prophetic blessing known as the Benedictus, or the Song of Zachariah, recorded in the Gospel of Luke.
  - heading: Traditional Accounts
    body:
      - By tradition, Zachariah was slain in the Temple. Apocryphal sources relate that he was murdered by Herod's soldiers during the massacre of the infants, when he refused to reveal where his son John was hidden. He is venerated as both a saint and a martyr.
      - Scholars have noted that Luke's account of John's miraculous birth parallels Old Testament narratives of conception to barren and aged parents, particularly the birth of the prophet Samuel, on which the Gospel narrative appears to be modeled.
