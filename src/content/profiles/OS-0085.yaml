id: OS-0085
lifespan: 1st century BC – 1st century AD
overview:
  - The Prophet Zachariah and the Righteous Elizabeth were the aged, childless parents of Saint John the Forerunner (the Baptist). Zachariah was a priest of the division of Abijah serving in the Temple at Jerusalem, and Elizabeth was descended from the priestly family of Aaron; tradition holds her to be the sister of Saint Anna, mother of the Most Holy Theotokos. The Gospel of Luke describes both as righteous and blameless before God, observing the divine commandments, yet their marriage had remained barren and both were advanced in years.
  - While Zachariah served his priestly duty and was chosen by lot to burn incense at the altar, the angel Gabriel appeared and announced that Elizabeth would conceive a son named John, who would go before the Lord in the spirit and power of Elijah. When Zachariah doubted, he was struck mute until the child's birth. At the circumcision on the eighth day, Elizabeth insisted the boy be named John against family custom; when Zachariah confirmed the name in writing, his speech returned and he prophesied in the canticle known as the Benedictus (Luke 1). By Eastern Orthodox tradition Zachariah was later slain in the Temple, and Elizabeth fled with the infant John into the wilderness. Their feast is kept on September 5.
sections:
  - heading: Family and Priestly Lineage
    body:
      - Zachariah belonged to the course of Abijah (also spelled Abia), one of the priestly divisions established by King David, and is named in tradition as the son of Barach. His wife Elizabeth descended from the priestly family of Aaron; the Gospel of Luke calls her one 'of the daughters of Aaron.' Eastern Orthodox tradition further identifies Elizabeth as the sister of Saint Anna, the mother of the Most Holy Theotokos, making Elizabeth a relative of Mary, mother of Jesus.
      - The Gospel describes both Zachariah and Elizabeth as 'righteous before God' and 'blameless' in keeping the divine commandments. Their marriage had nonetheless remained childless because Elizabeth was barren and both were well advanced in years.
  - heading: The Annunciation to Zachariah
    body:
      - While serving his priestly duty at the Temple in Jerusalem, Zachariah was chosen by lot to burn incense at the altar. During this act an angel of the Lord — identified as Gabriel — appeared and announced that Elizabeth would conceive a son to be named John, who would be great in the sight of the Lord and would go before Him in the spirit and power of Elijah, serving as the forerunner of the Lord.
      - When Zachariah expressed doubt, the angel struck him mute, unable to speak until the day these things should be performed; Orthodox tradition reads this as a consequence of his weakness of faith. The theologian Adam C. English has dated this encounter to September 24, based on computations from the Jewish calendar and the observance of the Day of Atonement.
  - heading: The Birth and Naming of John
    body:
      - After Elizabeth conceived, she remained in seclusion for five months. In the sixth month of her pregnancy Mary visited her; at the sound of Mary's greeting the child leaped in Elizabeth's womb, and Elizabeth, filled with the Holy Spirit, proclaimed, 'Blessed are you among women, and blessed is the fruit of thy womb.' Mary remained with her about three months.
      - At the child's circumcision on the eighth day, relatives expected him to be named after his father, but Elizabeth insisted he be called John, a name borne by no one in their family. When Zachariah wrote on a tablet, 'His name is John,' his speech was immediately restored, and inspired by the Holy Spirit he blessed the Lord God of Israel and prophesied concerning his son as the Forerunner — the canticle known as the Benedictus.
  - heading: Death and Later Life
    body:
      - By Eastern Orthodox tradition, drawn in part from the second-century Gospel of James, Zachariah was killed during Herod's persecution. When he refused to reveal the hiding place of his son, he was murdered by Herod's command, stabbed between the Temple and the altar. This martyrdom in the Temple, alongside the flight of Elizabeth, became established in Orthodox tradition and iconography.
      - Elizabeth hid herself and the infant John in the hills to escape Herod's murderers. Tradition relates that as their pursuers approached, the hill opened up and concealed mother and child. Elizabeth died forty days after Zachariah, and John dwelt in the wilderness until the day of his appearance to Israel.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: In 2003 scholars deciphered a fourth-century inscription on the Tomb of Absalom in Jerusalem reading, 'This is the tomb of Zachariah, the martyr, the holy priest, the father of John,' an early witness to the veneration of Zachariah as martyr."
      - "Traditional Accounts: The Gospel of James (second-century apocrypha) recounts Zachariah's refusal to betray his son's hiding place and his murder by Herod's soldiers. Orthodox tradition also relates that the hills opened to hide Elizabeth and the infant John from their pursuers."
  - heading: Relics & Shrines
    body:
      - Multiple locations have claimed the relics of the Prophet Zachariah. These include the church of San Zaccaria in Venice, the Gandzasar monastery in Nagorno-Karabakh, and Constantinople's Hagia Sophia, to which they were said to have been brought by the prefect Ursus on September 4, 415.
  - heading: Veneration
    body:
      - Eastern Orthodox, Lutheran, and Armenian traditions observe the feast of the Prophet Zachariah on September 5, on which day the Righteous Elizabeth is commemorated with him. The Roman Catholic Church honors Zachariah on September 23. Elizabeth is additionally commemorated in the Eastern Orthodox Church on March 30 in connection with the feast of the Visitation.
timeline:
  - when: September (by tradition)
    title: Annunciation to Zachariah
    body: While burning incense at the Temple altar, Zachariah is told by the angel Gabriel that Elizabeth will bear a son named John; doubting, he is struck mute.
  - when: Sixth month of Elizabeth's pregnancy
    title: The Visitation
    body: Mary visits Elizabeth; the child leaps in Elizabeth's womb and she, filled with the Holy Spirit, blesses Mary. Mary remains about three months.
  - when: Eighth day after John's birth
    title: Birth and naming of John
    body: Elizabeth names the child John against family custom; when Zachariah confirms the name in writing, his speech returns and he prophesies the Benedictus.
  - when: 1st century AD
    title: Death of Zachariah
    body: By tradition Zachariah is slain between the Temple and the altar by Herod's command for refusing to reveal his son's hiding place; Elizabeth flees with the infant into the hills and dies forty days later.
  - when: September 4, 415
    title: Translation of relics to Constantinople
    body: Relics of the Prophet Zachariah are said to have been brought to the Hagia Sophia in Constantinople by the prefect Ursus.
patronage:
  - Parents and married couples who are childless or barren
  - The aged awaiting the fulfillment of a promise
