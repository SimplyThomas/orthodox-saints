    title: Annunciation to Zachariah
    body: While serving at the altar of incense in the Temple at Jerusalem, the priest Zachariah is met by the angel Gabriel, who foretells the birth of a son, John, and strikes him mute for his doubt.
  - when: 1st century BC
    title: Birth and naming of John
    body: Elizabeth bears a son. At the circumcision on the eighth day she names him John; Zachariah confirms the name in writing, his speech is restored, and he utters the Benedictus.
  - when: 1st century AD
    title: Death of Zachariah
    body: By tradition Zachariah is slain in the Temple; apocryphal accounts place his death at the hands of Herod's soldiers during the massacre of the infants.
