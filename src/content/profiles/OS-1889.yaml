id: OS-1889
status: draft
lifespan: 6th century (active during the reign of Justinian, 527–565)
liturgicalTitle: The Holy and Righteous Peter the Former Tax-Collector
overview:
  - Saint Peter the Tax-Collector, sometimes called Peter the Publican or Peter the Former Merciless, was the chief collector of taxes in the Roman province of Africa during the reign of the emperor Justinian (527–565). He is remembered as a wealthy official who, by reputation, was harsh, greedy, and unkind to the poor, only to undergo a thorough conversion that turned him into a model of almsgiving and self-renunciation.
  - His story is preserved as a 'beneficial tale' associated with Saint John the Merciful (John the Almsgiver), Patriarch of Alexandria, who recounted it to encourage generosity. The Orthodox Church commemorates him on September 22 (with October 5 noted in some calendars); a January 20 feast is observed in Greek usage.
sections:
  - heading: From Hard-Hearted Official to Penitent
    body:
      - "As the principal tax-collector in Africa under Justinian, Peter held both wealth and authority, and the sources describe him as cruel and merciless toward those in need — in some accounts he was nicknamed 'the Miser.' The pivotal moment of his life came through a vision. By tradition, he saw himself brought before a divine judgment in which his deeds were weighed upon scales: demons heaped his many evil acts on one side, while the angels found on theirs only a single loaf of bread, which he had once thrown grudgingly at an importunate beggar. That one reluctant act of giving was enough to hold the balance against his vices."
      - Reflecting on the vision, Peter reasoned that if a single loaf given against his will could weigh so heavily, then deeds of charity done willingly and from the heart would profit him far more. He repented and changed his manner of life entirely, distributing alms liberally to the needy and feeding and clothing many.
  - heading: The Garment and Voluntary Slavery
    body:
      - A further vision deepened his resolve. According to the tale, after Peter gave away a costly garment — in one telling, his own expensive cloak to a shipwrecked man who had asked for clothing — he beheld in a dream Christ Himself clothed in the very garment the saint had given away, who thanked him for his kindness. Understanding that his charity reached Christ in the person of the poor, Peter resolved to surrender everything.
      - He distributed his substance to the poor and ordered his servant to sell him into slavery, directing that the proceeds also be given to the needy; one account specifies a price of thirty pieces of silver. For many years Peter labored humbly and without complaint for his master, performing menial work and bearing the contempt of his fellow slaves.
  - heading: Discovery, Departure, and Repose
    body:
      - Peter's hidden identity was eventually disclosed when tradesmen who had known him recognized him and revealed who he was to his master. Unwilling to be honored, Peter fled. As he departed, the sources relate that a deaf and mute gatekeeper, commanded by Peter in the name of Jesus Christ to open the gates, immediately received the gifts of hearing and speech.
      - By tradition he is said to have returned to Constantinople, with which his story is associated in some accounts, and to have reposed there.
patronage:
  - Those moved to repentance and generous almsgiving
companions:
  - name: Saint John the Merciful (John the Almsgiver)
    note: Patriarch of Alexandria, who preserved and recounted the tale of Peter to encourage almsgiving.
