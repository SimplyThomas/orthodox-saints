id: OS-2017
lifespan: 18th–19th centuries (Anthony reposed 1815; Jacob's dates unrecorded)
liturgicalTitle: Our Father among the Saints Anthony, Metropolitan of Chqondidi, and Our Venerable Father Jacob, Elder of Chqondidi
overview:
  - Saints Anthony and Jacob of Chqondidi are a pair of Georgian saints commemorated together on October 13. Anthony, of princely Georgian descent, served as a bishop and later Metropolitan of Chqondidi, while Jacob, described as Anthony's spiritual son, devoted friend, and helper, was revered as an elder.
  - Anthony was a son of Otia Dadiani, prince of Egrisi (modern Samegrelo), of the House of Dadiani. Though prepared from childhood for a diplomatic career, he rejected it to become a monk, and rose through the episcopate to lead the Chqondidi see, where he was noted for his preaching, his care for the poor, and his opposition to the slave trade. He reposed in 1815 and was buried at the Nakharebou Monastery, which he had built.
  - Saint Jacob, a hieromonk, is remembered as Anthony's close companion and helper. No independent biographical dates survive for him; he is honored as one who, in the words of the synaxarion, dwelt as a saint in this world.
sections:
  - heading: Family and Early Life
    body:
      - Anthony was born into the ruling House of Dadiani. His father was Otia Dadiani (died 1757), prince of Egrisi (Mingrelia), and his mother was Gulkan (Princess Gulkan Chkheidze), daughter of Prince Shoshita III, Duke of Racha. The family had six children—five sons and one daughter—who received their primary Christian education from their mother.
      - Anthony's sister Mariam (died 1778) married King Solomon I ("the Great") of Imereti as his second wife, bearing him children including Princess Darejan and Prince Alexander. After the death of Anthony's father, his elder brother Katsia raised the young Anthony.
      - The family prepared Anthony for diplomatic service through intensive studies in philosophy, literature, the fundamentals of poetry and art, and foreign languages, particularly Turkish and Persian. Anthony rejected the diplomatic career for which he had been groomed and was tonsured a monk.
  - heading: Monastic Formation and Studies
    body:
      - Anthony studied at Martvili Monastery in Egrisi. The monastery, in the village of Martvili in Samegrelo, stood on an ancient site once marked by a sacred oak (Mingrelian chkoni, "oak"); its Martvili–Chkondidi Cathedral, first built in the late 7th century and rebuilt in the 10th under King Giorgi II, was the same complex where Anthony pursued his studies after tonsure.
      - He encountered French missionaries teaching Scholastic philosophy and rejected their teaching, recognizing what he regarded as heresy in their approach. To deepen his learning he traveled to Tbilisi, to the court of King Erekle II, whose wife, Queen Darejan, was Anthony's cousin.
  - heading: Episcopate and Ministry
    body:
      - Anthony was consecrated bishop of Tsageri, in lower Svaneti, in 1761 (one account dates his tenure at Tsageri to 1760–1777). He later became Metropolitan of Chqondidi.
      - He was known for eloquent sermons and established daily meals for the poor at his Chqondidi residence, a practice continued by his successors. In 1788 he approved land grants to the Martvili, Nakharebou, and Sairme monasteries and secured tax exemptions for them, and he enriched Nakharebou Monastery with sacred objects, icons, and lands. Between 1792 and 1794 he convened Church councils that condemned slave traders.
      - In 1789 he left Chqondidi for the Nakharebou Monastery, which he had built. He reposed there in 1815 at an advanced age.
  - heading: Saint Jacob of Chqondidi
    body:
      - Saint Jacob, a hieromonk, is described as Anthony's spiritual son, devoted friend, and helper. The tradition holds that he dwelt as a saint in this world and was received into the Heavenly Kingdom. No independent biographical dates are recorded for him.
  - heading: Relics & Shrines
    body:
      - Saint Anthony was buried at the Nakharebou Monastery, which he had founded and endowed.
