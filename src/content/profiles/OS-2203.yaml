id: OS-2203
lifespan: 1493–1585
overview:
  - "Saint Sergius of Malopinega was a married parish priest of the northern Russian lands, born in 1493 with the secular name Simeon. He belonged to a noble Novgorodian family: his father, Markian Stephanovich Nekliud, was descended from Novgorod boyars who migrated north after Ivan III's conquest of Great Novgorod, and both of his parents were pious and well-educated."
  - Ordained a presbyter at the age of thirty, he served two churches in the Malopinega district — the church of the Transfiguration of the Lord and the church of the Great Martyr George — for thirty-two years. He labored over the conversion of the pagan Chud people and was remembered for his humility, quiet strength, and exceptional mercy toward the poor.
  - Near the end of his life he received the great schema with the monastic name Sergius, and he died on November 16, 1585. He was buried, according to his own instructions, near the altar of the Transfiguration church, where a chapel was later raised over his grave and numerous miracles were recorded.
liturgicalTitle: The Righteous Priest Sergius of Malopinega
timeline:
  - when: "1493"
    title: Birth
    body: Born with the secular name Simeon into a noble Novgorodian family in the Pinega region of the Russian north; his father was Markian Stephanovich Nekliud, of Novgorod boyar stock, and his mother Apollinaria was likewise of noble lineage.
  - when: "1523"
    title: Ordination to the priesthood
    body: Ordained presbyter at the age of thirty and assigned to two newly established churches in Malopinega — the church of the Transfiguration of the Lord and the church of the Great Martyr George — serving both parish duties and missionary work among pagan populations.
  - when: "1584"
    title: Reception of the schema
    body: "In his final years he received the great schema with the monastic name Sergius. Sources differ on the exact date: the OCA account implies he took the schema in mid-life after thirty-two years as a priest, while Russian sources place the tonsure in 1584, shortly before his death."
  - when: Nov 16, 1585
    title: Repose
    body: Died on November 16, 1585, having served as a presbyter for thirty-two years. Following his own instructions, he was buried near the altar of the Transfiguration church.
  - when: After 1585
    title: Veneration at his grave
    body: A chapel was built over his grave, and a hand-written manuscript recorded the numerous miracles that occurred there, giving rise to his local veneration.
sections:
  - heading: Family and Background
    body:
      - Sergius came from a distinguished Novgorodian family. His father, Markian Stephanovich Nekliud, was descended from Novgorod boyars who migrated north after Ivan III's conquest of Great Novgorod; he later became a monk under the name Matthew and served as igumen of the Resurrection monastery in Keurola. His mother, Apollinaria, was also of noble lineage and ended her life as a schemanun with the name Pelagia.
      - His parents were pious and well-educated, and he received a strong home schooling and religious upbringing, becoming well-versed in scriptural learning.
  - heading: Pastoral and Missionary Labors
    body:
      - Ordained presbyter at the age of thirty, Sergius served the churches of the Transfiguration of the Lord and the Great Martyr George in the Malopinega district for thirty-two years. Alongside his ordinary priestly duties he labored extensively over the conversion of the pagan Chud people to Orthodoxy.
      - He was remembered for his humility, quiet strength, and exceptional mercy, being deeply charitable toward the poor.
  - heading: Relics and Shrine
    body:
      - In accordance with his own instructions, Sergius was buried near the altar of the Transfiguration church in Malopinega. A chapel was subsequently built over his grave.
      - A hand-written manuscript preserved accounts of the numerous miracles that occurred at his grave, which sustained his local veneration.
  - heading: Veneration
    body:
      - No formal act of glorification is recorded in the sources consulted; his veneration appears to be of long-standing local origin, attested by the manuscript tradition of miracles at his grave. He is commemorated on November 16 and among the Assembly of Vologda Saints, indicating regional recognition within the Russian Orthodox Church.
      - "Sources differ on his liturgical title: the Orthodox Church in America lists him as 'Righteous,' reflecting his largely married priestly life, while some Russian sources apply the title 'Venerable' (преподобный) in view of his reception of the schema."
