id: OS-0439
liturgicalTitle: The Holy Virgin-Martyrs Neonilla, Domnina and Parthena of Edessa
overview:
  - Neonilla, Domnina, and Parthena were three virgins associated with the city of Edessa who are commemorated together among the martyrs. Their feast is kept on January 12, and in some calendars on the first Sunday after Theophany.
  - Little is recorded of them. The synaxarion preserves their names and their connection to Edessa but relates almost nothing of their lives; the accounts note that nothing is known of Neonilla and Domnina, and only a few details are kept concerning Parthena. By the tradition received in the Church they suffered for Christ as virgin-martyrs.
status: reviewed
sources:
  - OCA Synaxarion (oca.org), Jan 12
