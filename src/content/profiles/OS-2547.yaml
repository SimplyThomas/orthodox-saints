  intro: Joseph the All-Comely was the firstborn son of Jacob by Rachel, sold into Egypt by his brothers yet raised up to preserve them in the famine.
  figures:
    - name: Righteous Patriarch Jacob
      note: His father, who loved him above his brothers and mourned him as dead.
      href: saint/OS-2349
    - name: Righteous Foremother Rachel
      note: His mother, who died bearing his younger brother Benjamin.
      href: saint/OS-2546
    - name: Righteous Asenath
      note: His wife, daughter of Potiphera the priest of On, mother of Manasseh and Ephraim.
      href: saint/OS-2548
    - name: Righteous Benjamin
      note: His full younger brother, the only other son of Rachel.
      href: saint/OS-2345
    - name: Righteous Patriarch Judah
      note: His elder half-brother, who pleaded for his life and offered himself as surety for Benjamin.
      href: saint/OS-2764
