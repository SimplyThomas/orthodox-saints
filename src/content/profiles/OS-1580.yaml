    body: Some 20,000 Christians are recorded as burned alive in a church at Nicomedia by order of the emperor Maximian. Hermolaus, Hermippus, and Hermocrates are among the few who survive, afterward living in hiding in remote places. The massacre is commemorated separately on December 28.
  - when: c. 305
    title: The conversion of Pantaleon
    body: Hermolaus, a priest of the Nicomedia church, leads the young court physician Pantaleon back to the Christian faith, persuading him that Christ is the better physician.
  - when: c. 305
    title: Martyrdom
    body: Hermolaus, Hermippus, and Hermocrates are put to death under Maximian, shortly before the beheading of Pantaleon.
