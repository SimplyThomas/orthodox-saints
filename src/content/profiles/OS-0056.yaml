id: OS-0056
lifespan: 9th century BC (traditionally born c. 900 BC)
overview:
  - The Holy Prophet Elijah (also rendered Elias) is an Old Testament prophet whose ministry unfolded in the northern Kingdom of Israel during the reign of King Ahab, traditionally placed around 900 years before the Incarnation of Christ. He is remembered as a prophet of fire who confronted the idolatry promoted by Ahab and his wife Jezebel.
  - By tradition he came from the town of Tishbe in Gilead and is for that reason sometimes called "the Tishbite." His Hebrew name has been variously translated as "my God is the Lord," "whose God is the Lord," or "the strong Lord" — a meaning understood to reflect his lifelong challenge to the worship of Baal.
  - "Elijah is venerated as a model of the monastic, contemplative, and ascetic life, having dedicated himself from his youth to virginity, fasting, prayer, and meditation. He is one of the few figures in Scripture said not to have died: according to 2 Kings he was taken up alive into heaven in a fiery chariot. His feast is kept on July 20."
sections:
  - heading: Life and Ministry
    body:
      - Elijah first appears in 1 Kings 17:1, delivering a divine message to Ahab, king of Israel. He announced a drought of three and a half years as divine punishment for the widespread idolatry that Queen Jezebel had introduced into the kingdom.
      - During the drought God sustained the prophet first by ravens at the brook Cherith, which brought him food. When the brook dried up, God directed him to Zarephath, a town in Phoenicia, where a widow received him; her supply of flour and oil did not run out for the duration of the famine. While there, Elijah restored the widow's deceased son to life through prayer.
      - The central episode of his public ministry took place on Mount Carmel, where Elijah challenged the 450 prophets of Baal to a public sacrifice. Fire fell from heaven and consumed the sacrifice, the stones of the altar, the earth, and even the water in the surrounding trench. The people proclaimed the truth of God, and the prophets of Baal were afterward put to death at Elijah's order.
      - Fleeing the threats of Jezebel, Elijah traveled forty days to Mount Horeb. There God revealed himself not in the wind, the earthquake, or the fire, but in a still, small voice.
  - heading: His Being Taken Up
    body:
      - Rather than experiencing death, Elijah was uniquely taken into heaven. According to 2 Kings, a chariot of fire and horses of fire appeared, and he was lifted up by a whirlwind into heaven.
      - His mantle fell to his successor Elisha, who received a double portion of his prophetic spirit and continued his work.
  - heading: In Christian Tradition
    body:
      - The New Testament identifies John the Baptist as fulfilling the prophecy of Malachi concerning Elijah's return, going forth "in the spirit and power of Elijah." Elijah also appeared together with Moses at the Transfiguration of Christ on Mount Tabor.
      - Orthodox theology teaches that Elijah will serve as a forerunner of the Second Coming of Christ, proclaiming repentance before the Antichrist. His appearance at the Transfiguration is understood to emphasize this role, connecting him to eschatological expectation. According to Saint Epiphanius, when Elijah was born his father Sobach saw in a vision angels of God around the child, swaddling him with fire and feeding him with flames — an account understood to prefigure his fiery ministry.
      - He is also commemorated, together with all the righteous of the Old Testament, on the Sunday of the Holy Fathers.
  - heading: Veneration and Legacy
    body:
      - Churches throughout Russia were dedicated to Elijah, establishing deep veneration among Orthodox Christians, and he came to be regarded as the model of the contemplative life in Orthodoxy. He is also honored as the spiritual founder of the Carmelite Order in the Western Church.
      - In Greece and surrounding regions, chapels and monasteries dedicated to the Prophet Elias are characteristically found on mountaintops, which themselves are often named after him. Historically, ancient sites of the cult of Zeus — associated with mountains and with power over rain, thunder, lightning, and wind — came to be dedicated to Elias, including Mount Olympus and Mount Lykaion. In Lebanon his feast is a major public holiday marked with fireworks.
  - heading: Customs & Traditions
    body:
      - His feast on July 20 is kept at countless hilltop chapels dedicated to "Profitis Ilias," a custom especially strong in Greece. Hilltop chapels throughout the Orthodox world are frequently dedicated to him.
      - The Eastern Orthodox Church observes his feast on July 20, or on August 2 for those following the Julian calendar tradition.
timeline:
  - when: c. 900 BC
    title: Birth in Tishbe of Gilead
    body: By tradition Elijah was born in Tishbe of Gilead approximately 900 years before the Incarnation, during the reign of King Ahab. Saint Epiphanius relates that at his birth his father Sobach saw angels swaddling the child with fire.
  - when: Reign of Ahab
    title: Proclamation of the drought
    body: Appearing before Ahab (1 Kings 17:1), Elijah declared a drought of three and a half years as punishment for the idolatry introduced by Jezebel. He was sustained by ravens at the brook Cherith.
  - when: During the famine
    title: The widow of Zarephath
    body: Directed to Zarephath in Phoenicia, Elijah was received by a widow whose flour and oil did not fail; he raised her dead son to life through prayer.
  - when: During Ahab's reign
    title: The contest at Mount Carmel
    body: Elijah challenged the 450 prophets of Baal; fire fell from heaven and consumed the sacrifice, altar, earth, and water. The people proclaimed God's truth and the prophets of Baal were put to death.
  - when: After Carmel
    title: Mount Horeb and the still, small voice
    body: Fleeing Jezebel's threats, Elijah traveled forty days to Mount Horeb, where God revealed himself not in wind, earthquake, or fire, but in a still, small voice.
  - when: End of his ministry
    title: Taken up in a fiery chariot
    body: Elijah was taken alive into heaven in a chariot of fire and horses of fire, lifted up by a whirlwind. His mantle fell to Elisha, who received a double portion of his spirit.
