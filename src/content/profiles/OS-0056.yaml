celebration:
  intro: Ways to honor the Prophet Elias with children — keeping to the saint, not the folk fire-customs.
  ideas:
    - idea: Take a family hike up a hill and say a prayer at the top — chapels to the Prophet Elias traditionally crown mountaintops, recalling how he met God on the mountain.
    - idea: Craft a fiery chariot and horses from paper, retelling his ascension into heaven in the whirlwind of fire.
    - idea: Make raven crafts or bake raven-shaped rolls, remembering the ravens that brought him bread by the brook Cherith.
    - idea: Bake and share bread in memory of the widow of Zarephath, whose flour and oil never ran out during the drought, and give food to the hungry.
    - idea: Read the account from 1–2 Kings in an illustrated children's Bible and talk about the prophet's zeal for God.
