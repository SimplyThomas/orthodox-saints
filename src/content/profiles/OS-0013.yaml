id: OS-0013
lifespan: c. 270 – c. 306
overview:
  - Demetrius of Thessalonica was a young officer of the early fourth-century Roman Empire who, by tradition, was born around 270 in Thessalonica, Macedonia, to a Christian family of senatorial standing. After the death of his father, he was appointed proconsul of the Thessalonica district under the emperor Galerius Maximian, around 305.
  - Rather than enforcing the persecution of Christians as his office demanded, Demetrius openly professed Christ and taught the faith publicly, converting many of the city's inhabitants. Simeon Metaphrastes characterized him as 'a second Apostle Paul' for Thessalonica, recalling Paul's own missionary work there. When the emperor learned of his Christian identity, Demetrius was imprisoned and, around 306, run through with spears in his underground cell.
  - He came to be venerated as the first and foremost patron and protector of Thessalonica. From the seventh century, a flow of fragrant myrrh associated with his tomb earned him the epithet Myroblyte, the Myrrh-streamer. His feast is kept on October 26.
sections:
  - heading: Life and Martyrdom
    body:
      - By tradition Demetrius was born to a noble family of the Roman province of Macedonia, his parents secret Christians who had him baptized and instructed in the faith within a concealed church in the family residence. He held a high position under Galerius Maximian, Caesar of the eastern part of the empire, and after his father's death was appointed proconsul of the Thessalonica district, around 305.
      - His office charged him with persecuting Christians, but upon taking it up he instead professed Christ openly. He became instrumental in converting many Thessalonians and in dismantling pagan practice in the city. When the emperor discovered both his faith and the success of his preaching, he ordered Demetrius imprisoned. The synaxarion relates that an angel appeared to comfort and encourage him during his captivity.
      - Around 306 the emperor's soldiers executed Demetrius by piercing him with lances in his underground cell. Christians buried his body in secret. By some accounts the place of his imprisonment and burial was a bath.
  - heading: The Martyr Nestor
    body:
      - The account of Demetrius's death is closely tied to that of a young Christian named Nestor. By tradition Nestor sought Demetrius's blessing to face Lyaeus (also given as Lyaios), a giant gladiator who was being put forward as the champion of paganism.
      - Following Demetrius's prayers, Nestor defeated Lyaeus in single combat, by one account throwing him onto the soldiers' spears. Enraged, the emperor ordered Nestor's execution; he was beheaded outside the city. By tradition Christians buried the two saints together in the place where Demetrius had been held.
  - heading: Relics & Shrines
    body:
      - By tradition Demetrius initially had no physical relics, and an empty shrine known as a ciborium was constructed in his honor. Relics later associated with him are said to have appeared, and according to several accounts a church was built over his grave, with incorrupt relics discovered during a later reconstruction.
      - From the seventh century a flow of fragrant myrrh was found emanating from his tomb, giving rise to the epithet Myroblyte, or Myrrh-gusher. The basilica of Hagios Demetrios in Thessaloniki, where his relics rest in the crypt, dates from the mid-fifth century.
      - Historians have hypothesized that his veneration transferred to Thessalonica from Sirmium when Thessalonica replaced it as the principal military base of the region, around 441 to 442.
  - heading: Patronage and Legacy
    body:
      - Demetrius came to be regarded as the first recognized patron and protector of Thessalonica, both spiritually and in the city's defense. After Thessalonica endured repeated Slavic attacks, he was credited with many miraculous interventions to defend it, and tradition holds that he interceded against Slavic peoples, Bulgarians, Arabs, Saracens, and others.
      - He also became associated with agricultural patronage. According to historians this role was inherited from the pagan goddess Demeter following the decline of the Eleusinian Mysteries.
      - His feast is kept on October 26 in the Eastern Orthodox Church; the Serbian Orthodox Church observes Mitrovdan on November 8. In the Roman Catholic calendar he is commemorated on April 9 and October 8.
