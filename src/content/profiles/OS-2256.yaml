id: OS-2256
lifespan: 5th century
overview:
  - James the Solitary was a fifth-century ascetic of Syria and a disciple of Saint Maron, the elder from whom the Maronite tradition takes its name. After receiving instruction from Maron, he withdrew to pursue a solitary, open-air ascetic life on a mountain near the city of Cyrrhus in Syria.
  - "According to his vita he endured grievous illness while maintaining a severe regimen: he wore chains, took food only in the evening, and prayed constantly. He came to be regarded for his spiritual wisdom and, in the accounts, for gifts of healing, authority over demons, and even the raising of the dead. He is commemorated on November 26 in the Orthodox calendar, and is also observed by Western Rite Orthodox communities and by Byzantine Rite Eastern Catholic Churches."
liturgicalTitle: Our Venerable Father James the Solitary of Syria
sections:
  - heading: Historical Context
    body:
      - James belonged to the distinctive Syrian ascetic movement associated with Saint Maron (commemorated February 14), whose followers practiced a life of prayer and meditation in the open air, exposed to sun, rain, hail, and snow. This was, in the words of the contemporary historian Theodoret of Cyrrhus, a new type of asceticism that soon gained wide acceptance in Syria and Lebanon.
      - Theodoret, himself bishop of Cyrrhus, documented this movement in his Religious History, composed around 440. He records fifteen men and three women who followed the open-air ascetic practice, many of them trained or guided by Maron; the most prominent among Maron's disciples was Abraham of Cyrrhus, called the Apostle of Lebanon. Maron died around 410, placing James's own life and asceticism in the early-to-mid fifth century. In 452 a monastery was founded at Maron's tomb, known as Bet Maroun, which became the chief monastery of northern Syria.
  - heading: Asceticism and Spiritual Gifts
    body:
      - "James practiced his asceticism without shelter on a mountain near Cyrrhus. His vita emphasizes the severity of his discipline: chains worn upon the body, a single evening meal, and unceasing prayer, all borne alongside serious physical illness."
      - Through these austerities he was held to have attained advanced spiritual maturity, and the tradition credits him with supernatural gifts of healing, power over demons, and the raising of the dead. He was also remembered for wisdom and counsel; one account relates that he advised the Byzantine emperor Leo on matters connected with the Council of Chalcedon. He is said to have fallen asleep in the Lord peacefully.
timeline:
  - when: c. 410
    title: Death of Saint Maron
    body: Maron, James's teacher and the elder of the Syrian open-air ascetic movement, dies around this time, placing James's own asceticism in the early-to-mid fifth century.
  - when: 5th century
    title: Solitary life near Cyrrhus
    body: James withdraws to a mountain near Cyrrhus in Syria, living without shelter and practicing severe asceticism—chains, a single evening meal, and constant prayer—while enduring illness.
  - when: "451"
    title: Council of Chalcedon
    body: By tradition, James counsels the Byzantine emperor Leo on matters related to the Council of Chalcedon.
  - when: "452"
    title: Founding of Bet Maroun
    body: A monastery is established at Maron's tomb, becoming the chief monastery of northern Syria and a center of the tradition to which James belonged.
