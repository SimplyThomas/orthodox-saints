id: OS-2200
lifespan: Died November 15, 1457
overview:
  - Saint Philip of Rabanga was a fifteenth-century Russian monastic and one of the closest disciples of Saint Dionysius of Glushitsa. After years of formation under Dionysius, he withdrew to the wilderness northeast of Vologda and founded the Savior-Transfiguration (Spaso-Preobrazhensky) Monastery near the Rabanga River, serving as its first abbot.
  - He belongs to the monastic movement of the Northern Thebaid, in which the disciples of Dionysius of Glushitsa spread across the Vologda region to establish new communities. He is venerated in the Russian Orthodox Church as a venerable (prepodobny) saint, commemorated on November 15 (Old Style; November 28 New Style).
liturgicalTitle: Our Venerable Father Philip of Rabanga
timeline:
  - when: c. 1420s–1437
    title: Formation at Glushitsa
    body: Philip took monastic vows at the Glushitsa Monastery under the spiritual direction of Saint Dionysius of Glushitsa, becoming one of his closest disciples and remaining there until his teacher's death in 1437.
  - when: After 1437
    title: Departure for solitude
    body: Following Dionysius's death, Philip remained briefly under his successor Amfilokhy before departing to seek greater solitude.
  - when: c. 1440s
    title: Hermitage on the Rabanga
    body: He established a hermitage cell about 32 versts (roughly 34 km) northeast of Vologda, at a bend in the Rabanga River, a tributary of the Sukhona. Local residents gradually gathered around him, forming a community.
  - when: "1447"
    title: Founding of the monastery
    body: With the blessing of Archbishop Efrem of Rostov, the Transfiguration Church was consecrated, establishing the Savior-Transfiguration Rabangsky Monastery, of which Philip served as founding abbot (igumen).
  - when: November 15, 1457
    title: Repose
    body: Philip died and was buried near the monastery church in an undisturbed grave (pod spodom).
sections:
  - heading: Life and Monastic Formation
    body:
      - Philip entered monastic life at the Glushitsa Monastery, where he was tonsured and placed under the spiritual direction of Saint Dionysius of Glushitsa (commemorated June 1), one of the greatest ascetics of the Russian North. He was counted among Dionysius's closest disciples and remained at Glushitsa until his teacher's death in 1437.
      - After Dionysius reposed, Philip stayed for a time under his successor Amfilokhy before leaving in search of greater solitude. He settled about 32 versts (roughly 34 km) northeast of Vologda, at a bend in the Rabanga River, a tributary of the Sukhona, where he established a hermitage cell.
  - heading: Foundation of the Rabanga Monastery
    body:
      - Local residents gradually gathered around Philip seeking spiritual guidance, and a community formed at his hermitage. He obtained the blessing of Archbishop Efrem of Rostov to establish a formal monastery.
      - The Transfiguration Church was consecrated in 1447, creating the Savior-Transfiguration (Spaso-Preobrazhensky) Rabangsky Monastery, near Kadnikov to the northeast of Vologda. Philip served as its founding abbot (igumen).
  - heading: Legacy and the Northern Thebaid
    body:
      - Philip's foundation belongs to the wider monastic movement of the Northern Thebaid, in which the disciples of Dionysius of Glushitsa spread across the Vologda region to found new communities. Dionysius himself (1363–1437), founder of the Pokrovsky Monastery and the Sosnovets Hermitage, was canonized in 1547 and is remembered as one of the spiritual fathers of that movement.
      - A Troparion and Kontakion are dedicated to Philip's memory in the Orthodox liturgical tradition.
  - heading: Relics & Shrines
    body:
      - Philip's remains were buried near the monastery church in an undisturbed grave (pod spodom). In 1744, a two-story stone church honoring the Transfiguration was constructed over his relics.
      - The monastery functioned until 1764, when it was converted to a parish church serving the village of Rabangskaya Sloboda. The church was demolished in the 1930s.
