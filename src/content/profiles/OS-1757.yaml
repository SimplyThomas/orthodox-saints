lifespan: 1810–1829
liturgicalTitle: Our Venerable Mother Martha, Schema-nun of Diveyevo
overview:
  - Venerable Schema-nun Martha of Diveyevo, born Maria Semenovna Milyukova on February 10, 1810, was a Russian monastic of the Nizhny Novgorod region and a spiritual child of Saint Seraphim of Sarov. Born into a peasant family that lived in close association with the Elder of Sarov, she entered the Diveyevo community as a young girl and lived there only about six years before her early death at the age of nineteen.
  - Though she spent little time in the monastery, she became one of the most venerated figures associated with the founding generation of Diveyevo, remembered for the severity of her ascetic labors and her unceasing prayer. Saint Seraphim is recorded as having tonsured her into the great schema, and after her repose she was numbered among the saints of Diveyevo.
timeline:
  - when: February 10, 1810
    title: Birth
    body: Born Maria Semenovna Milyukova in the village of Pozhidovo (later Malinovka), Ardatovsky district, Nizhny Novgorod governorate, into a peasant family that lived in close connection with Saint Seraphim of Sarov. She had an older sister, Praskovya, and a brother, Ivan.
  - when: November 21, 1823
    title: Received at Diveyevo
    body: At the age of thirteen she visited Saint Seraphim at Sarov together with her sister. The Elder did not permit her to return home but directed her to remain in the Diveyevo community, where she joined the sisters gathered under Mother Alexandra.
  - when: c. 1823–1829
    title: Monastic labors
    body: She shared in the heavy physical work of establishing the new community, carrying bricks and stone for the Church of the Nativity, storing timber and materials, and grinding flour, while maintaining a discipline of unceasing prayer. Accounts relate that she surpassed the other sisters in the severity of her ascetic struggles.
  - when: August 21, 1829
    title: Repose
    body: She died at the age of nineteen after a brief illness described as a stomach ailment, having lived about six years in the community. Saint Seraphim later disclosed to the sisters that he had tonsured her into the schema, with the monastic name Martha.
  - when: 2000–2004
    title: Glorification
    body: She was glorified for local veneration in 2000 by the Nizhny Novgorod diocese, and her veneration was extended more widely by the Russian Orthodox Church.
sections:
  - heading: Schema Tonsure
    body:
      - By the accounts preserved at Diveyevo, Saint Seraphim of Sarov personally tonsured Maria into the great schema, the highest degree of Orthodox monastic profession, giving her monastic vestments. After her death he is said to have revealed this tonsure to the sisters, who had not known of it during her lifetime, and to have instructed that she be recorded as a nun who had been found worthy of the schema.
  - heading: Relics & Shrines
    body:
      - Her relics rest in the Church of the Nativity of the Theotokos at the Holy Trinity–Saint Seraphim–Diveyevo Monastery in the Nizhny Novgorod region, where she is venerated together with the other saints connected to the community.
