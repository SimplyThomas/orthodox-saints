flagReasons:
  - claim: He labored / was a missionary among the peoples of the Volga region.
    detail: This derives only from the anchor brief ('a missionary among the peoples of the Volga'). External sources (Russian Wikipedia) do not corroborate missionary activity for Theodoritus and instead attribute Mordvinian/Volga missionary work to a different Ryazan archbishop, Misail (mid-17th century). The profile hedges with 'The synaxarion remembers him as', but the claim remains unverified by external sources; flagged for review.
