id: OS-2771
lifespan: c. 649 – c. 656
overview:
  - Saint Dentelin of Soignies, also known as Dentelin of Mons, was a seventh-century child-saint of the Frankish nobility of Hainaut, the youngest of the four children of Saints Vincent Madelgarius and Waltrude. Born about the year 649 in the region then known as the pagus Hainoensis, in the Kingdom of Austrasia, he reposed in childhood at approximately the age of seven, around the year 656.
  - "Though he left no deeds of his own on account of his early death, Dentelin was venerated as a saint, and his passing is remembered as a turning point in his family: the grief of losing him is traditionally connected with the decision of his parents to separate and embrace the monastic life. He is commemorated on March 16, with local feasts observed at the several places that held his relics."
patronage:
  - Children
  - The sick and suffering
sections:
  - heading: A Saintly Household
    body:
      - "Dentelin was born into one of the most remarkable saintly families of Merovingian Gaul. His father was Saint Vincent Madelgarius, a nobleman of Strépy who later founded the monasteries of Hautmont and Soignies, and his mother was Saint Waltrude, patroness of Mons, who was known for ransoming captives. All four of their children were venerated as saints: Dentelin's siblings were Landry (Landericus) of Soignies, later reckoned Bishop of Metz, and the sisters Aldetrude and Madelberte, both associated with the abbey of Maubeuge."
      - The family's sanctity extended across generations. Dentelin's grandparents were Saint Walbert and Saint Bertille, and his aunt was Saint Aldegund, the first abbess of Maubeuge. The child thus belonged to a kinship network in which monastic foundation and personal holiness were a shared inheritance.
  - heading: Death and Its Consequence
    body:
      - Dentelin died young, at about seven years of age, around the year 656. According to the tradition of the family, his death moved his parents deeply and is remembered as the occasion on which Vincent and Waltrude resolved to separate and each pursue a distinct monastic vocation. Vincent received the monastic habit and eventually became abbot of Soignies, while Waltrude withdrew to a religious life at Mons.
  - heading: Relics & Shrines
    body:
      - After his death Dentelin's body was first laid in the family tomb at Cousolre, and afterward moved to the Church of Saint-Vincent in Soignies, where it was displayed alongside the remains of his father. His relics were later carried to Rees, in the Duchy of Cleves in Germany, where many miracles came to be attributed to his intercession, especially on behalf of the sick and suffering.
      - "The saint's veneration is reflected in the several local feast days kept at the places connected with his relics: May 16 at Soignies, July 14 at Rees, and March 14 at Emmerich am Rhein. A medieval seal is said to depict Saint Vincent together with his two sons, Landry and Dentelin."
