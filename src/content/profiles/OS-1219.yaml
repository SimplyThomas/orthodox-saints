      note: The father, who received Murom to bring it the Christian faith; died 1129.
    - name: Michael
      note: Constantine's son, sent ahead as an emissary and killed by the pagans of Murom.
    - name: Theodore
      note: Constantine's son, who assisted him in spreading the faith among the people of Murom.
