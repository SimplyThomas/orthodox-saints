id: OS-0869
liturgicalTitle: The Holy and Righteous Passion-Bearer Basil of Mangazea
lifespan: c. 1587 - 1600
sources:
  - OCA Synaxarion (oca.org), Lives of the Saints
  - en.wikipedia.org
  - https://www.oca.org/saints/lives/2020/03/23/100874-righteous-basil-of-mangazea-in-siberia
  - https://www.johnsanidopoulos.com/2010/03/saint-basil-of-mangazeya-12-year-old.html
overview:
  - Righteous Basil of Mangazea was a young clerk in the Siberian trading town of Mangazea who, by tradition, was falsely accused of theft and killed though innocent on Pascha of the year 1600. He is venerated as a passion-bearer, having borne unjust suffering and death without renouncing his innocence.
  - Born in Yaroslavl and sent east to work for a merchant on the far Siberian frontier, Basil died as a boy. His relics, reported to be incorrupt when revealed decades later, became a center of veneration, and he is remembered as the first saint to be glorified in Siberia.
timeline:
  - when: c. 1587
    title: Birth in Yaroslavl
    body: By the accounts of his life, Basil was born around 1587 in the old town of Yaroslavl; one tradition names his father as Theodore, a merchant of modest means. From childhood he was noted for frequent attendance at church and devotion to God.
  - when: c. 1599
    title: Journey to Mangazea
    body: At about the age of twelve, Basil set out to earn his living and, after a long and dangerous journey through the forests, came to Mangazea, a Russian trading settlement in Siberia on the River Taz. There he entered the service of a local merchant, working as a clerk.
  - when: "1600"
    title: False accusation and death on Pascha
    body: According to his life, thieves robbed the merchant's shop during the Paschal Matins service. The merchant accused Basil, and the governor had the boy arrested and tortured to force a confession. Maintaining that he was innocent, Basil was struck a fatal blow with a ring of keys and died on Pascha of 1600. His body was placed in a rough coffin and lowered into a nearby marsh, weighted with stones.
  - when: "1652"
    title: Revelation of the relics
    body: Decades after his death, the location of the grave was made known and the coffin was recovered from the marsh; the relics were reported to be incorrupt. A chapel was built over the grave, and veneration of Basil spread.
  - when: "1670"
    title: Translation to Holy Trinity Monastery
    body: The relics were moved to the church of the Holy Trinity Monastery near Turukhansk.
  - when: "1719"
    title: Reliquary sent by Metropolitan Philotheus
    body: Metropolitan Philotheus of Siberia sent a carved reliquary to the monastery for the saint's relics.
  - when: "1787"
    title: Transfer to the new stone church
    body: A new stone church was built at the Holy Trinity Monastery, and the relics were transferred there.
sections:
  - heading: Life and Death
    body:
      - Basil came from Yaroslavl to the remote Siberian frontier town of Mangazea, a settlement on the River Taz, where he found employment with a merchant and served as a clerk. His life records that he kept to prayer and the church amid the rough conditions of the trading post.
      - The accounts of his life relate that during the Paschal Matins service the merchant's shop was robbed. Rather than seek the true culprits, the merchant accused Basil, and the governor had him seized and tortured. Through the tortures the boy continued to declare his innocence, and he was at last struck dead with a ring of keys. He died on Pascha of 1600, still a youth. His body was concealed in a marsh, weighted down with stones.
  - heading: Relics & Shrines
    body:
      - The grave's location was revealed decades after the burial, and when the coffin was recovered from the marsh the relics were found to be incorrupt. A chapel was raised over the site.
      - In 1670 the relics were translated to the church of the Holy Trinity Monastery near Turukhansk. Metropolitan Philotheus of Siberia sent a carved reliquary to the monastery in 1719, and when a new stone church was completed at the monastery in 1787 the relics were transferred into it.
  - heading: Veneration and Legacy
    body:
      - Basil of Mangazea is honored as the first saint to be glorified in Siberia, and his veneration stands at the head of the saints associated with the Tobolsk diocese.
      - His life reports that healings and other wondrous events accompanied the revelation of his relics, and a chapel built over them became a place where pilgrims sought his intercession. He is commemorated on March 23.
  - heading: Sources and Uncertainty
    body:
      - The accounts of Basil's life differ on some details. The interval between his death and the revelation of his relics is given as forty-two years in one account and as fifty-two years (with the revelation dated to 1652) in another; the date of his death on Pascha 1600 is consistently reported.
related:
  - name: St. Philotheos, Metropolitan of Tobolsk
    note: Enlightener of Siberia, who honored Basil's relics by sending a carved reliquary to the Holy Trinity Monastery near Turukhansk in 1719.
