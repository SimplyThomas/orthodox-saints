lifespan: 14th century – 1392
liturgicalTitle: Our Venerable Father Methodius, Abbot of Peshnosha
overview:
  - Methodius of Peshnosha was a fourteenth-century Russian monastic who trained as a disciple of Saint Sergius of Radonezh and went on to found the Peshnosha monastery in the wooded country beyond the River Yakhroma. After several years under Sergius's guidance, he withdrew with his teacher's blessing into a solitary, marshy place where he built a cell, and the disciples who gathered around him formed the nucleus of a new community.
  - On Sergius's counsel he organized the settlement into a monastery with its own church, taking a direct hand in the building work himself. He became its igumen (abbot) in 1391 and reposed the following year. Numbered among the saints at the Moscow Council of 1549, he is commemorated on June 4 and June 14.
timeline:
  - when: 14th century
    title: Disciple of Sergius of Radonezh
    body: In his youth Methodius went to Saint Sergius of Radonezh and spent several years under his spiritual guidance before seeking a more solitary life.
  - when: 14th century
    title: Withdrawal beyond the Yakhroma
    body: With Sergius's blessing he withdrew to a marshy forest place beyond the River Yakhroma and built himself a cell, where disciples soon gathered around him.
  - when: "1391"
    title: Igumen of Peshnosha
    body: After Sergius advised him to formalize the community into a monastery and church, Methodius labored at the construction and became igumen of the monastery in 1391.
  - when: "1392"
    title: Repose
    body: Methodius reposed in 1392 and was buried at the monastery he had founded; the day is recorded variously as June 4 and June 14.
sections:
  - heading: The Founding of Peshnosha
    body:
      - "The monastery's name, Peshnosha, is traditionally derived from Methodius's own labor: he carried timber on foot along the river while building the church and cells. This hands-on toil in a difficult, marshy setting became a defining feature of the foundation's early history."
      - About two versts from the monastery Methodius kept a place of withdrawal for prayer. Saint Sergius came there for spiritual conversation with his former disciple, and the spot accordingly became known as Beseda, the "Conversation-place."
  - heading: Veneration and Glorification
    body:
      - Methodius was regarded as a saint at Peshnosha from the day of his death, with his memory kept at the monastery and in the surrounding villages. His wider local veneration grew in the late seventeenth and early eighteenth centuries.
      - He was formally numbered among the saints at the Moscow Council of 1549. His June 14 commemoration coincides with that of Saint Methodios, Patriarch of Constantinople.
  - heading: Relics & Shrines
    body:
      - Methodius was buried at the Peshnosha monastery. A church dedicated to Saints Sergius of Radonezh and Methodius of Peshnosha was built over his relics in 1732.
