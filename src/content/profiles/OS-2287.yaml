id: OS-2287
lifespan: 12th century (d. c. 1176)
overview:
  - Athanasius the Resurrected One was a monk of the Near (Antoniev) Caves of the Kiev Caves Lavra in the twelfth century, remembered for a reported death and revival that reshaped the remainder of his life.
  - After a prolonged and grave illness he was believed to have died, and the brethren prepared his body for burial. When the igumen arrived on the third day to conduct the funeral, they found him sitting upright and weeping. He would say nothing of what he had witnessed beyond an urgent counsel to seek salvation, obey the igumen, repent unceasingly, and pray.
  - He then withdrew into solitary reclusion in the cave for twelve years, keeping complete silence, weeping continually, and eating only bread and water on alternating days. He reposed peacefully around 1176 and was buried in the Antoniev Cave, where his relics were venerated.
liturgicalTitle: Our Venerable Father Athanasius the Resurrected One, Recluse of the Near Caves of Kiev
patronage:
  - Kiev Caves monastics
  - Repentance
  - Recovery from grave illness
timeline:
  - when: 12th century
    title: Monastic life at the Near Caves
    body: Athanasius lived as a hermit at the Near (Antoniev) Caves of the Kiev Caves Lavra, a contemporary of Archimandrite Saint Polycarp (commemorated July 24).
  - when: 12th century
    title: Illness, death, and revival
    body: After a prolonged grave illness he was believed dead and prepared for burial. When the igumen came to conduct the funeral, the community found him sitting up and weeping. He counseled the brethren to seek salvation, obey the igumen, repent each hour, and pray to Christ, His Mother, and Saints Anthony and Theodosius.
  - when: 12 years
    title: Reclusion in the cave
    body: Following his revival he lived twelve additional years in solitary cave-dwelling, keeping complete silence with the community, weeping continuously, and eating only bread and water on alternating days.
  - when: c. 1176
    title: Repose
    body: Near death he summoned the brethren, repeated his earlier spiritual counsel, and departed peacefully. He was buried in the Antoniev Cave.
sections:
  - heading: Death and Revival
    body:
      - According to the accounts of the Kiev Caves, Athanasius suffered a prolonged and grave illness that led to his apparent death, and the brethren prepared his body for burial. When the igumen arrived to conduct the funeral, the community discovered the deceased monk sitting upright and weeping.
      - Pressed about what he had witnessed, Athanasius declined to elaborate, saying only that they should seek salvation, obey the igumen in everything, repent each hour, and pray to the Lord Jesus Christ, to His All-Pure Mother, and to Saints Anthony and Theodosius, that they might end their lives in the monastery. He then asked to be left alone to pray.
  - heading: Life of Reclusion
    body:
      - After his revival Athanasius spent twelve years enclosed in solitary reclusion within the cave. He maintained complete silence with the rest of the community, wept continually, and consumed only bread and water, and that only on alternating days.
      - Near the end of his life he assembled the brethren and repeated the spiritual counsel he had given at his revival before departing peacefully, around the year 1176.
  - heading: Relics & Shrines
    body:
      - Athanasius was buried in the Antoniev (Near) Cave of the Kiev Caves Lavra, where his relics were venerated.
  - heading: Miracles & Traditions
    body:
      - "Traditional Accounts: A monk named Babylas, who had suffered from a severe leg infirmity for many years, is said to have been healed at Athanasius's relics after the saint appeared to him in a vision, saying, 'Come to me, and I shall heal you.'"
      - "Note on identity: A distinct saint also named Athanasius the Recluse is commemorated on December 2 from the Far (Theodosius) Caves; he is remembered for a heavenly light shining in his cell and the gift of healings. The two saints named Athanasius should not be conflated."
  - heading: Commemoration
    body:
      - His feast is kept on December 2, with additional commemorations on September 28 and on the Second Sunday of Great Lent.
