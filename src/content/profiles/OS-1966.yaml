id: OS-1966
lifespan: 759–861
overview:
  - Gregory of Khandzta (759–861) was a Georgian monastic founder and one of the principal architects of monastic life in the Tao-Klarjeti region during the period of Arab domination. Born in Kartli into an aristocratic family, he was educated broadly in ecclesiastical and secular learning before choosing the monastic life over the priesthood his family expected of him.
  - Settling in the Klarjeti wilderness, he established Khandzta Monastery around 782 and, with the support of Georgian feudal lords and the Bagratid dynasty, made it the center of monastic life in the region. His disciples went on to found further monasteries, and he oversaw an influential network of ascetic communities and manuscript workshops that helped shape Georgian ecclesiastical culture and the movement toward church autocephaly.
  - He died at Khandzta in 861 at an advanced age. His life was recorded in 951 by the monk Giorgi Merchule in a hagiography celebrated as a landmark of Georgian literature.
liturgicalTitle: Our Venerable Father Gregory, Archimandrite and Builder of Khandzta and Shatberdi
patronage:
  - Georgia
  - Georgian monasticism
  - monastic founders
