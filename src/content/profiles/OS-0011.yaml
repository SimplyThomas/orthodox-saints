id: OS-0011
lifespan: 1st century BC (Apostolic Age); by tradition Joachim lived 80 years and Anna 79 years, both reposing before the Annunciation
overview:
  - Righteous Joachim and Anna are venerated in the Orthodox Church as the parents of the Theotokos and, through her, the grandparents of Christ, for which they bear the title 'Ancestors of God.' Their story is drawn not from the canonical Gospels — which do not name Mary's parents — but from early Christian tradition, principally the second-century apocryphal Gospel of James (the Protoevangelium of James).
  - By tradition Joachim was of the tribe of Judah and a descendant of King David, while Anna was the daughter of Matthan the priest, of the tribe of Levi. The couple lived in Nazareth and remained childless through a long marriage. After enduring public reproach for their barrenness, each received the announcement of a coming child from an angel, and they conceived Mary in their old age — a narrative consciously paralleling the Old Testament accounts of Sarah and Abraham and of Hannah, the mother of the prophet Samuel.
  - Their joint feast, the Synaxis of Saints Joachim and Anna, is kept on September 9, the day after the Nativity of the Theotokos. Anna is additionally commemorated at her Dormition on July 25 and at the Conception of the Theotokos on December 9. Saint Anna is especially invoked by the childless.
sections:
  - heading: Family and Lineage
    body:
      - By tradition Joachim descended from the tribe of Judah and the line of King David, to whom God had revealed that the Savior of the world would be born of his seed; some accounts name his father as Barpathir. Anna was the daughter of Matthan the priest, of the tribe of Levi and the lineage of Aaron, and of his wife Mary.
      - Tradition relates that Anna had two sisters. One, named Mary, bore a daughter Salome in Bethlehem; the other, called Zoia (and elsewhere Sobe), bore Elizabeth, the mother of John the Forerunner, likewise in Bethlehem. By this account the Theotokos and Elizabeth, and thus Christ and John the Baptist, were kin.
      - The synaxarion relates that Joachim and Anna were married in Nazareth and were known for extraordinary charity, devoting one portion of their substantial income to their own needs, one to the poor, and one to the Temple — a practice Joachim is said to have maintained from the age of fifteen, his flocks multiplying abundantly in consequence.
  - heading: The Annunciation of Mary's Birth
    body:
      - The couple had long been barren. By the account of the Gospel of James, when Joachim came to offer sacrifice at the Temple his gift was refused on account of his childlessness, which was interpreted as a sign of divine displeasure; tradition adds that the High Priest — named Issachar in one recension — publicly shamed him. In grief both spouses withdrew, Joachim taking his flocks to a mountain (some accounts speak of forty days of fasting in the desert) while Anna prayed in her garden.
      - The Archangel Gabriel then appeared to each of them separately, announcing the birth of 'a daughter most blessed, by whom all the nations of the earth will be blessed.' Returning to the city, they embraced at its gate — the meeting at the Golden Gate of Jerusalem, which became a celebrated subject in Christian art and is read as an image of Mary's very conception. Mary was conceived shortly thereafter.
  - heading: Mary's Dedication and the Repose of Her Parents
    body:
      - When Mary reached the age of three, Joachim and Anna brought her to the Temple and dedicated her to its service. Tradition holds that they visited her regularly over the following years.
      - The anchor tradition records that Joachim lived eighty years and Anna seventy-nine, both reposing before the Annunciation to the Theotokos; Anna is said to have died peacefully in Jerusalem. Some accounts add that, after being widowed, Anna moved to Jerusalem near the Temple and acquired property in Gethsemane and the valley of Josaphat, establishing a family tomb.
  - heading: Relics & Shrines
    body:
      - Tradition holds that during the reign of the Emperor Justinian (variously given as Justinian I, 527–565, or Justinian II, who reigned 685–695 and again 705–711) a church was built in Constantinople in honor of Saint Anna. By one account Saint Anna appeared to the pregnant wife of Justinian II, after which her body and her maphorion (veil) were translated to the imperial city.
      - Relics attributed to Saint Anna are distributed across the Orthodox world. On Mount Athos, portions — including parts of her hand and feet — are kept at Stavronikita Monastery and at Saint Anna's Skete; further fragments are venerated at monasteries in Lamia and Sourota, and a wrist at the church of Saint Paul Outside the Walls in Rome.
      - In the West, where her veneration is also ancient, relics said to be hers were dispersed during the Crusades to numerous churches, and Düren in Germany became a major pilgrimage center after a papal decree of 1506.
timeline:
  - when: 1st century BC
    title: Marriage in Nazareth
    body: Joachim, of the tribe of Judah and the line of David, marries Anna, daughter of the priest Matthan of the tribe of Levi; the couple settle in Nazareth and remain childless for many years.
  - when: 1st century BC
    title: Reproach and the angelic announcement
    body: After Joachim's offering is refused at the Temple on account of their childlessness, the couple withdraw in grief; the Archangel Gabriel appears to each separately to announce the coming birth of a blessed daughter.
  - when: 1st century BC
    title: Meeting at the city gate
    body: Joachim and Anna are reunited and embrace at the gate of Jerusalem — the meeting at the Golden Gate — and Mary is conceived shortly thereafter.
  - when: 1st century BC
    title: Conception and Nativity of the Theotokos
    body: The conception of the Theotokos is commemorated on December 9 and her Nativity on September 8; the Synaxis of Joachim and Anna follows on September 9.
  - when: Mary's third year
    title: Entry of the Theotokos into the Temple
    body: Joachim and Anna bring the child Mary to the Temple and dedicate her to its service.
  - when: Before the Annunciation
    title: Repose of Joachim and Anna
    body: By tradition Joachim reposes at eighty years and Anna at seventy-nine, both before the Annunciation; Anna's Dormition is commemorated on July 25.
  - when: 6th–8th centuries
    title: Veneration at Constantinople
    body: A church is built in Constantinople in honor of Saint Anna, and by tradition her body and maphorion are translated there during the reign of an emperor named Justinian.
patronage:
  - Saint Anna is especially invoked by the childless and by those longing for children.
  - By Western tradition Joachim is regarded as a patron of fathers, grandfathers, grandparents, and married couples.
