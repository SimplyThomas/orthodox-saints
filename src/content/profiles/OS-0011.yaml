id: OS-0011
lifespan: 1st century BC
overview:
  - Joachim and Anna are venerated in the Eastern Orthodox tradition as the parents of the Theotokos and the maternal grandparents of Jesus. According to tradition, they bore their daughter Mary in old age after a long period of childlessness.
  - Their names are not recorded in the canonical gospels, where Mary's parents go unnamed. They are drawn instead from early Christian tradition, principally the apocryphal Gospel of James, which is the earliest source to name them.
  - Joachim is said to have been of the tribe of Judah and a descendant of King David, while Anna was the daughter of Matthan, a priest of the tribe of Levi. St. Anna is especially invoked by the childless.
sections:
  - heading: Sources and Tradition
    body:
      - The story of Joachim and Anna was told for the first time in the second-century apocryphal Gospel of James, also called the Protoevangelium of James, written in Koine Greek around the middle of that century. It remains the oldest and most influential source for their lives.
      - By tradition, Joachim was a rich and pious man who regularly gave to the poor. The Gospel of James relates that his sacrifice at the temple was rejected, the couple's childlessness being interpreted as a sign of divine displeasure. Joachim withdrew to the desert, where he fasted and did penance for forty days. Angels then appeared to both Joachim and Anna to promise them a child, after which Joachim returned to Jerusalem and embraced Anna at the city gate.
      - In the Western church the Gospel of James fell under a cloud in the fourth and fifth centuries when it was condemned by Jerome and by Popes Damasus I, Innocent I, and Gelasius I. Despite this, its stories were incorporated almost entirely into the Gospel of Pseudo-Matthew, which popularised them, and the cycle of legends was later included in the Golden Legend of Jacobus de Voragine.
      - The narrative parallels the Old Testament account of Samuel, whose mother Hannah had also been childless. An ancient belief held that a child born of an elderly mother who had given up hope was destined for great things.
  - heading: Lineage
    body:
      - Saint Joachim was the son of Barpathir and was of the tribe of Judah, a descendant of King David, to whom God had revealed that the Savior of the world would be born from his seed.
      - Saint Anna was the daughter of Matthan the priest, who was of the tribe of Levi. By a tradition attested in a sermon of John of Damascus, Anna married once. Her sister Sobe was the mother of Elizabeth.
  - heading: Veneration and Feast Days
    body:
      - The Eastern Orthodox Church commemorates Joachim and Anna together on September 9, the Synaxis of Joachim and Anne, the day after the Nativity of Mary. The Dormition of St. Anna is kept on July 25, and her Conception of the Theotokos on December 9.
      - Dedications to Anne in Eastern Christianity occur as early as the sixth century.
