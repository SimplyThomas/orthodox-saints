id: OS-2328
liturgicalTitle: The Holy Martyrs Menas the Most Eloquent, Hermogenes, and Eugraphus of Alexandria
overview:
  - Menas, Hermogenes, and Eugraphus are three martyrs of Alexandria commemorated together in the Orthodox calendar on December 10. According to the synaxarion, they suffered for their faith in Christ under the emperor Maximian (305-313).
  - Their commemoration is preserved as a single feast of the three together. Menas is given the epithet "the Most Eloquent" for the gift of eloquence with which the sources credit him, while Hermogenes and Eugraphus are remembered for joining his confession of Christ.
timeline:
  - when: Reign of Maximian (305-313)
    title: Menas sent to Alexandria
    body: According to the synaxarion, the emperor Maximian sent Menas from Athens to Alexandria as an official to suppress the riots that had arisen between Christians and pagans. Distinguished for his gift of eloquence, Menas instead openly preached the Christian Faith and converted many pagans to Christ.
  - when: Reign of Maximian (305-313)
    title: Hermogenes sent to try the saints, and converts
    body: Learning of Menas's preaching, Maximian sent Hermogenes, a pagan official, to Alexandria to place the saints on trial. The sources relate that Hermogenes was struck by Menas's endurance under torture and by his miraculous healing after the torments, and so came to believe in Christ.
  - when: Reign of Maximian (305-313)
    title: Martyrdom of the three
    body: The accounts relate that Maximian himself came to Alexandria, personally stabbed Eugraphus, the secretary of Menas, and gave orders that Menas and Hermogenes be beheaded.
  - when: 9th century
    title: Relics transferred to Constantinople
    body: By tradition the relics of the martyrs, cast into the sea in an iron chest, were afterwards found and transferred to Constantinople in the ninth century. The finding of the relics is associated with February 17.
sections:
  - heading: The Three Martyrs
    body:
      - The sources identify three distinct figures commemorated together. Menas, called "the Most Eloquent," was the imperial official sent from Athens to Alexandria. Hermogenes was the pagan official dispatched to put the saints on trial, who converted after witnessing Menas's witness under torture. Eugraphus was the secretary of Menas, and according to the accounts was killed personally by Maximian.
  - heading: Veneration and Legacy
    body:
      - The synaxarion relates that the emperor Justinian built a church in the name of the holy Martyr Menas of Alexandria, and that Saint Joseph the Hymnographer composed a canon in honor of the martyrs.
      - The three are commemorated together on December 10, with the finding and transfer of their relics associated with February 17.
