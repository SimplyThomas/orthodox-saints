sources:
  - OCA Synaxarion (oca.org), Lives of the Saints
  - https://www.oca.org/saints/lives/2016/04/20
  - https://www.oca.org/saints/troparia/2022/04/20/108040-saint-joseph-of-serbia
  - https://orthodoxwiki.org/List_of_Serbian_saints
overview:
  - "Joseph of Serbia is a saint venerated in the Serbian Orthodox tradition and commemorated on April 20. Almost nothing of his life has been preserved in the accessible record: the surviving sources establish his commemoration date and his association with the Serbian Church but supply no dates of birth or repose, no place of activity, and no narrative of his life."
  - The principal witness to his veneration is the liturgical hymnography appointed for his feast, which preserves his memory where a biography does not. The Orthodox Church in America's Lives of the Saints lists him among the commemorations of April 20 but notes that no information about him is available, and the standard English-language List of Serbian saints does not catalogue him, underscoring how obscure the commemoration has become.
sections:
  - heading: Liturgical Commemoration
    body:
      - The hymnography appointed for Joseph of Serbia addresses him as 'Father' and praises ascetic struggle, unceasing prayer, and spiritual combat — the register customarily used for a monastic saint. The Troparion (Tone 8) takes the common form for a venerable father, beginning by praising the preservation of the divine image through the taking up of the cross and the following of Christ, with disregard for the flesh and care for the immortal soul. The Kontakion (Tone 2) develops the theme of ascetic warfare, describing the saint arming himself with purity of soul and wielding unceasing prayer as a spear against the armies of demons.
      - Because no biographical synaxarion entry survives, this hymnography is effectively the sole sustained source for how he is remembered; it characterizes his sanctity in ascetic terms rather than recording the events of his life.
  - heading: State of the Record
    body:
      - The accessible Orthodox reference sources do not preserve the particulars of Joseph's life. The OCA synaxarion entry for the day states that no information is available, and OrthodoxWiki's List of Serbian saints contains no April 20 Joseph, listing instead only the distinct Metropolitan Joseph the New of Temisvar (commemorated September 15). No birth date, date of repose, monastery, see, or defining events could be recovered, and his commemoration remains among the more obscure within the Serbian calendar.
