lifespan: d. 1549
liturgicalTitle: Our Venerable Father Adrian, Abbot of Ondrusov
overview:
  - Adrian of Ondrusov was a sixteenth-century Russian monastic and monastery founder of the Lake Ladoga region. Born into a noble family as Andrew Zavalushin, he held a rich estate known as Andreevschina before abandoning it for the monastic life. His conversion is traced to an encounter with Saint Alexander of Svir, after which he was tonsured at the Valaam Monastery and eventually founded his own community on the shore of Lake Ladoga.
  - He died in 1549, killed by robbers while traveling near the village of Obzha. He is venerated as a monastic saint of the northern Russian forest, with feasts marking both his repose and the later discovery of his relics.
timeline:
  - when: "1493"
    title: Encounter with Alexander of Svir
    body: While hunting, the nobleman Andrew Zavalushin met Saint Alexander of Svir. Afterward he sought the ascetic's spiritual guidance and helped supply the material needs of the hermits living nearby.
  - when: Late 15th–early 16th c.
    title: Tonsure at Valaam
    body: Forsaking his estate, Andrew was tonsured a monk at the Valaam Monastery on Lake Ladoga and received the name Adrian. With Saint Alexander's blessing he later withdrew to live in solitude.
  - when: Early 16th c.
    title: Founding of Ondrusov Monastery
    body: Adrian settled on a peninsula of Lake Ladoga, where he built a church dedicated to Saint Nicholas the Wonderworker and gathered a community, establishing the Ondrusov Monastery.
  - when: August 1549
    title: Godfather to a royal child
    body: Held in regard by Tsar Ivan the Terrible, who endowed his community, Adrian served as godfather for the Tsar's daughter Anna.
  - when: August 26, 1549
    title: Killed by robbers
    body: While returning to his monastery, Adrian was killed by robbers near the village of Obzha.
  - when: May 17, 1551
    title: Discovery of his relics
    body: His brethren found his body and buried it within the wall of his church; the synaxarion relates that it was found incorrupt. This day is kept as the feast of the translation of his relics.
sections:
  - heading: Ministry Among Brigands
    body:
      - The synaxarion preserves accounts of Adrian's dealings with the bandits who haunted the islands and shores of Lake Ladoga. By tradition, an ataman of robbers named Ondrusa, who led a band on the island of Sala, was promised Adrian's intercession before God and in time repented and entered the monastic life.
      - A second brigand named Cyprian is said to have likewise been converted, afterward founding a monastery of his own and being glorified by miracles. Adrian's own death at the hands of robbers, despite these reconciliations, is the basis for his veneration as a monastic martyr in some reckonings.
  - heading: Relics & Veneration
    body:
      - Adrian is commemorated on August 26, the day of his repose, and on May 17, which marks the discovery and translation of his relics. His relics were interred in the church he had built at Ondrusov.
      - He is venerated as a saint of the Valaam and Lake Ladoga monastic tradition, associated with the wider circle of ascetics gathered around Saint Alexander of Svir in the northern Russian wilderness.
companions:
  - name: St. Alexander of Svir
    note: Spiritual father; the elder of Svir whose meeting drew the nobleman Andrew to the monastic life, under whose blessing Adrian was tonsured at Valaam and withdrew to found Ondrusov Monastery.
