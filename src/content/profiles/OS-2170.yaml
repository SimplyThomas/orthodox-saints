id: OS-2170
liturgicalTitle: Our Father among the Saints Nectarios, Metropolitan of Pentapolis, the Wonderworker of Aegina
lifespan: 1846 - 1920
overview:
  - Nectarios of Pentapolis was a Greek hierarch, teacher, and monastic founder of the modern era, born Anastasios Kephalas in 1846 and remembered both for the slander he bore patiently and for the wonders attributed to him after his death. After serving in Egypt under the Patriarchate of Alexandria, where he was consecrated Metropolitan of Pentapolis, he was unjustly removed from his office and returned to Greece, where he labored as a preacher and as director of an ecclesiastical school in Athens.
  - In 1904 he founded the Holy Trinity Convent on the island of Aegina, where he spent his last years and where he reposed in 1920. He was glorified as a saint by the Ecumenical Patriarchate of Constantinople in 1961 and is among the most widely venerated saints of the modern Orthodox world, invoked especially by the sick. His feast is kept on 9 November.
