sections:
  - heading: Early Life and Education
    body:
      - Nectarios was born Anastasios Kephalas on 1 October 1846 in Selymbria, in Thrace, the child of pious but not wealthy parents. At the age of fourteen he moved to Constantinople to work and continue his education, and in 1866 he became a teacher on the island of Chios. On 7 November 1876, at the age of thirty, he became a monk in the Monastery of Nea Moni on Chios, and some years afterward he was ordained deacon and received the name Nectarios. He went on to study at the University of Athens, graduating in 1885.
  - heading: Egypt and the Slander
    body:
      - After his studies he went to Alexandria, was ordained priest, and served the Church of Saint Nicholas in Cairo. In 1889 the Patriarch Sophronios consecrated him Metropolitan of Pentapolis, an ancient see under the jurisdiction of Alexandria. Within about a year, however, jealous clerics accused him of ambition toward the patriarchal throne, and through their slander he was removed from his office and sent away from Egypt without trial or explanation. The tradition holds that he bore this injustice with patience and without recrimination.
  - heading: Athens and Aegina
    body:
      - Returning to Greece, Nectarios served as a preacher and then, for some fifteen years, as director of the Rizarios Ecclesiastical School in Athens, where priests were trained. During these years he developed the school and published a number of theological and educational works. In 1904, at the request of several nuns, he established the Holy Trinity Monastery on the island of Aegina, which he personally administered after resigning his post at the school in December 1908.
      - He spent his last years on Aegina among the community he had founded. He reposed on the evening of 8 November 1920 at the age of seventy-four, following a period in hospital, and his commemoration was set on 9 November.
  - heading: Glorification and Veneration
    body:
      - Nectarios was officially recognized as a saint by the Ecumenical Patriarchate of Constantinople on 20 April 1961. When his relics were exhumed in 1953, the tradition relates that they gave off a sweet fragrance. He came to be among the most widely venerated saints of the modern Orthodox world, and a great many miracles have been attributed to his intercession, particularly the healing of serious illnesses.
      - Among his writings are theological commentaries and treatises on repentance, confession, and the person of Christ, and he is traditionally credited with composing the hymn 'Agni Parthene.'
patronage:
  - Those suffering from serious illness
