timeline:
  - when: "1794"
    title: The Valaam mission arrives
    body: Ten monks reach Kodiak to preach to the peoples of Russian America; among them is Saint Herman.
  - when: "1796"
    title: The Protomartyr Juvenaly
    body: Hieromonk Juvenaly is killed while preaching in the interior — the first martyr of American soil.
  - when: "1815"
    title: Peter the Aleut
    body: A young Aleut is tortured to death for refusing to renounce the Orthodox faith.
  - when: "1840s"
    title: Innocent and Jacob Netsvetov
    body: Saint Innocent and the native priest Saint Jacob Netsvetov translate and preach among the Aleut and Yup'ik.
  - when: "1970"
    title: Glorification of Saint Herman
    body: Herman of Alaska is glorified — the first saint canonized in North America.
