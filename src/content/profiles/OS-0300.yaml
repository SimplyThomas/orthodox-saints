id: OS-0300
liturgicalTitle: The Holy New Hieromartyr Leo, Archimandrite of the St. Alexander Nevsky Lavra
lifespan: 1889–1937
overview:
  - Archimandrite Leo (in the world Leonid Mikhailovich Egorov) was a monk of the St. Alexander Nevsky Lavra in Petrograd who became a leading figure in the city's church life during the early Soviet years. A university-educated missionary, he helped found the Alexander Nevsky Brotherhood and led pastoral and charitable work among workers and the poor before the Soviet authorities suppressed such activity.
  - Arrested repeatedly through the 1920s and early 1930s, he was finally sentenced to a labor camp and was shot in 1937 during the Soviet persecution of the Church. He was glorified as a hieromartyr by the Russian Orthodox Church in 2003 and is numbered among the Synaxis of the New Martyrs and Confessors of Russia. He is commemorated on September 7.
timeline:
  - when: "1889"
    title: Birth
    body: Born Leonid Mikhailovich Egorov on February 26, 1889.
  - when: "1915"
    title: Monastic tonsure
    body: Tonsured a monk at the St. Alexander Nevsky Lavra with the name Leo (Lev), having studied history and philology at Saint Petersburg University and at the Petrograd Theological Academy. He was later ordained hierodeacon and hieromonk.
  - when: "1919"
    title: Alexander Nevsky Brotherhood
    body: Helped found the Alexander Nevsky Brotherhood, which carried on missionary and charitable work among workers and the poor of Petrograd.
  - when: "1922"
    title: First arrest and exile
    body: First arrested on June 16, 1922, and deported from Petrograd, spending roughly two years in exile.
  - when: "1926"
    title: Archimandrite
    body: Elevated to the rank of archimandrite and appointed dean of monastic residences in Leningrad, later serving as rector of the Feodorovskaya Icon Cathedral.
  - when: "1932"
    title: Mass arrest and sentencing
    body: Arrested in the mass arrest of Brotherhood members in February 1932 and sentenced in March 1932 to a ten-year term, after which he was sent to a Siberian labor camp.
  - when: "1937"
    title: Martyrdom
    body: Executed by firing squad on September 20, 1937, during the height of the Soviet persecution.
  - when: "2003"
    title: Glorification
    body: Glorified as a hieromartyr by the Holy Synod of the Russian Orthodox Church and numbered among the New Martyrs and Confessors of Russia.
sections:
  - heading: The Alexander Nevsky Brotherhood
    body:
      - Established in 1919, the Alexander Nevsky Brotherhood gathered clergy and laity around the Lavra for missionary and charitable work at a time when the Soviet state was moving to prohibit such activity. Archimandrite Leo was among its central figures, and the brotherhood's prominence made its members targets of repeated arrests through the 1920s and into the 1930s.
  - heading: Arrests and martyrdom
    body:
      - Across the 1920s and early 1930s Archimandrite Leo was arrested several times, exiled, and finally caught up in the mass arrest of brotherhood members in 1932. Sentenced to a long labor-camp term, he was held in the Siberian camp system until he was shot in 1937, one of many clergy and monastics put to death in that year of intensified persecution.
patronage:
  - Those who suffer persecution for the faith
  - Monastics and missionaries
