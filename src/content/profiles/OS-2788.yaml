id: OS-2788
lifespan: 3rd century (traditional dating varies; some sources place him in the 1st century)
overview:
  - Saint Fronto (also rendered Front, Frontón, Frontone, or Frontus) is venerated as the first bishop of Périgueux and an early missionary of the Christian faith in Aquitaine. Though traditional accounts once placed his life in the 1st century, scholarly sources now often assign him to the 3rd century.
  - By tradition he evangelized the region of Périgord, traveling the Roman road from Lyon to Bordeaux and sending forth disciples to spread the faith across the surrounding countryside. He is commemorated on October 25 and is venerated by both the Catholic and Orthodox churches.
  - According to tradition he was the bishop who sent Saint Frontasius and his companions as missionaries and buried their relics. His own relics rested for centuries in the cathedral at Périgueux that bears his name.
liturgicalTitle: Our Father among the Saints Fronto, First Bishop of Périgueux
patronage:
  - Périgueux
  - Périgord
timeline:
  - when: 3rd century (traditional)
    title: Birth
    body: By the account preserved in his hagiography, Fronto was born at Lanquais in Gaul; other traditions give his birthplace as Lycaonia in Asia Minor. He is said to have studied letters in Périgord, with particular interest in the psalms.
  - when: 3rd century (traditional)
    title: Mission to Périgueux
    body: After a period of oppression by a local official, tradition holds that Fronto traveled to Egypt and then to Rome, where the hagiography states he was ordained and sent to evangelize Périgueux. He is said to have preached along the Roman road from Lyon to Bordeaux, sending out disciples to the surrounding region.
  - when: c. 100 (per one tradition) / 3rd century
    title: Repose
    body: Fronto died at Périgueux of natural causes. His remains were enshrined in the cathedral of Saint-Front in that city.
  - when: "1261"
    title: Examination of relics
    body: Bishop Pierre de Saint-Astier conducted a formal examination (inventio) of Fronto's body, confirming that the Norman raiders of 845 had not removed the relics.
  - when: "1575"
    title: Destruction of relics
    body: During the Wars of Religion, Huguenots seized the relics, transported them to the Château de Tiregand in Creysse, and cast them into the Dordogne River.
sections:
  - heading: Historical Context
    body:
      - Fronto is remembered as an early missionary bishop in Roman Gaul. Tradition connects his mission to the network of Roman roads, holding that he evangelized the inhabitants of the region while traveling the route from Lyon to Bordeaux.
      - "The sources preserve differing accounts of his origins. One tradition holds that he was born in Lycaonia in Asia Minor; another, drawn from his hagiography, gives his birthplace as Lanquais in Gaul. His dating is likewise uncertain: French tradition long celebrated him as 'the legendary evangelizer of Périgord in the 1st century,' while modern scholarship often places his life in the 3rd century."
  - heading: Legacy
    body:
      - "Fronto is honored as the first bishop of Périgueux, and the city's cathedral bears his name (Saint-Front). His memory endured across Latin Christendom: numerous French communes and Italian towns are named after him, including Frontone, Frontino, and Sanfront."
      - He is depicted in medieval art, including a 13th-century vault key at Beaumont-du-Périgord and a stained glass window at Saint-Pierre-de-Chignac in the Dordogne. He was recognized as a saint under the pre-Congregation process, an early form of canonization predating the formal Congregation for the Causes of Saints.
  - heading: Relics & Shrines
    body:
      - Fronto's relics rested for centuries in the Cathedral of Saint-Front at Périgueux. In 1261, Bishop Pierre de Saint-Astier examined the body and confirmed that the Norman raiders of 845 had left the relics intact.
      - In 1575, during the Wars of Religion, Huguenots seized the relics, carried them to the Château de Tiregand at Creysse, and threw them into the Dordogne River, where they were lost.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: The medieval veneration of Fronto is attested by the cathedral dedicated to him, the 1261 examination of his relics, and the numerous places across France and Italy that bear his name."
      - "Traditional Accounts: According to his hagiography, Fronto encountered Saint Peter the Apostle in Rome, was ordained priest, and was sent to evangelize Périgueux accompanied by seventy disciples. Places of worship consecrated to him are often associated with a fountain whose water was said to have protective and curative properties. Scholars note that the 8th-century hagiography appears to have fused two distinct figures — Front, the Périgord hermit, and Fronton of Nitria in Egypt."
