id: OS-0000
status: reviewed
humanReviewed: true
lifespan: Eternally begotten of the Father; incarnate c. 5 BC – c. AD 33
liturgicalTitle: Our Lord, God, and Saviour Jesus Christ
overview:
  - In Orthodox Christianity, Jesus Christ is not one of the saints. He is the incarnate Son and Word (Logos) of God, the Second Person of the Holy Trinity, of one essence with the Father and the Holy Spirit, through whom all things were made. The saints are holy because they share, by grace, in His holiness; He is holy by nature. For this reason every saint's life points beyond itself to Him, and this profile stands not as one entry among the others but as the center to which they all refer.
  - "The Church confesses Him as fully God and fully man: one Person (hypostasis) in two natures, divine and human, united without confusion, change, division, or separation, as the Fourth Ecumenical Council proclaimed at Chalcedon in 451. Begotten of the Father before all ages, in the last days He was conceived by the Holy Spirit and born of the Virgin Mary, taking on the whole of human nature — body, soul, mind, and will — so that the whole of it might be healed and restored. “What is not assumed is not healed,” as the Fathers taught."
  - By His life, His teaching, His voluntary Passion, His death upon the Cross, His descent into Hades, and His Resurrection on the third day, He trampled down death and opened the way to eternal life. Ascending in His glorified humanity to the Father, He sent the Holy Spirit upon the Church at Pentecost. Orthodox theology understands salvation as theosis — the participation of the human person in the divine life — made possible because God became man so that man might become god by grace.
  - "This master profile gathers what the Church holds concerning Christ: His names and titles, the chronology of His earthly life, the world into which He was born, His miracles and teachings, His Passion and Resurrection, the theology defended by the Ecumenical Councils, the feasts and icons through which the Church celebrates Him, and the family and disciples who surrounded Him. Many sections proper to a saint — canonization, patronage, relics of the body — do not apply, for the tomb was found empty and the One commemorated here is the Lord of the saints Himself."
