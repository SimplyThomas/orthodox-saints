works:
  - title: The Sermon on the Mount
    desc: The Beatitudes and the new law of the Kingdom (Matthew 5–7).
  - title: The Lord's Prayer
    desc: The prayer He taught His disciples — "Our Father, who art in heaven."
  - title: The Parables of the Kingdom
    desc: The Sower, the Prodigal Son, the Good Samaritan, the Lost Sheep, and many more.
  - title: The Bread of Life Discourse
    desc: His teaching on the Eucharist and Himself as the living bread (John 6).
  - title: The Good Shepherd Discourse
    desc: "“I am the good shepherd: the good shepherd giveth his life for the sheep” (John 10)."
  - title: The Farewell Discourse
    desc: The final words and high-priestly prayer at the Mystical Supper (John 13–17).
  - title: The Olivet Discourse
    desc: His teaching on the last things and His coming again (Matthew 24–25).
