timeline:
  - when: Before all ages
    title: The eternal generation from the Father
    body: The Son and Word of God is begotten of the Father before all ages, not made, of one essence with the Father. Through Him all things were made. He is the eternal Logos who, in time, would take flesh for the salvation of the world.
  - when: c. 5 BC
    title: The Annunciation
    body: The Archangel Gabriel announced to the Virgin Mary at Nazareth that she would conceive and bear the Son of the Most High. At her free assent — "Be it unto me according to thy word" — the Word was conceived by the Holy Spirit. The Church keeps this feast on March 25.
  - when: c. 5–4 BC
    title: The Nativity at Bethlehem
    body: Born of the Virgin in a cave at Bethlehem and laid in a manger, He was worshipped by shepherds and by the Magi from the East. The Feast of the Nativity is kept on December 25.
  - when: 40 days after the Nativity
    title: The Meeting in the Temple
    body: Brought to the Temple in Jerusalem, the infant Christ was received in the arms of the elder Symeon, who called Him "a light to lighten the Gentiles." The Feast of the Meeting (Presentation) is kept on February 2.
  - when: Infancy
    title: The Flight into Egypt
    body: Warned in a dream, Joseph took the Child and His Mother into Egypt to escape Herod's slaughter of the infants of Bethlehem, returning to Nazareth after Herod's death.
  - when: Childhood to c. AD 29
    title: The hidden years at Nazareth
    body: Apart from His being found teaching in the Temple at twelve years of age, the Gospels pass over His childhood and youth in silence. He grew "in wisdom and stature," living in obedience in the household of Nazareth.
  - when: c. AD 29
    title: The Baptism in the Jordan
    body: Coming to John the Forerunner, Christ was baptized in the Jordan. The Spirit descended as a dove and the Father's voice bore witness — the first open revelation of the Holy Trinity. The Feast of Theophany is kept on January 6.
  - when: c. AD 29
    title: The forty days' temptation
    body: Led by the Spirit into the wilderness, He fasted forty days and overcame the threefold temptation of the devil, beginning His public ministry.
  - when: c. AD 29–33
    title: The public ministry
    body: Throughout Galilee, Judea, and beyond, He proclaimed the Kingdom of God, called the Twelve, taught in parables, healed the sick, cast out demons, raised the dead, and revealed Himself through signs.
  - when: c. AD 32
    title: The Transfiguration on Mount Tabor
    body: Before Peter, James, and John, He was transfigured in uncreated light, with Moses and Elijah beside Him and the Father's voice from the cloud. The Feast of the Transfiguration is kept on August 6.
  - when: c. AD 33
    title: The Entry into Jerusalem
    body: He entered Jerusalem on a donkey to the cry of "Hosanna," acclaimed as the Messiah days before His Passion — commemorated on Palm Sunday.
  - when: c. AD 33
    title: The Mystical Supper
    body: On the eve of His Passion He instituted the Eucharist, giving His Body and Blood to the disciples and washing their feet — the night kept on Holy Thursday.
  - when: c. AD 33
    title: The Passion and Crucifixion
    body: Betrayed, condemned under Pontius Pilate, scourged, and crucified on Golgotha, He died upon the Cross and was laid in a new tomb. The Church keeps these days as Holy Friday and Holy Saturday.
  - when: c. AD 33
    title: The descent into Hades
    body: In death His soul descended to Hades and broke its gates, raising up Adam and all the righteous who awaited Him — the victory depicted in the icon of the Resurrection (the Anastasis).
  - when: c. AD 33
    title: The Resurrection
    body: On the third day He rose bodily from the dead, trampling down death by death. Pascha, the Feast of feasts, is the moveable center of the whole liturgical year.
  - when: 40 days after Pascha
    title: The Ascension
    body: After appearing to the disciples over forty days, He ascended in His glorified humanity to the right hand of the Father, blessing them on the Mount of Olives.
  - when: 50 days after Pascha
    title: Pentecost
    body: He sent the Holy Spirit upon the apostles in tongues of fire, founding the Church and inaugurating the age in which the saints are made holy by His grace.
sections:
  - heading: Names and Titles
    body:
      - The Scriptures and the Church address Christ by many names, each disclosing something of who He is. "Jesus" (Yeshua, "the Lord saves") is His human name; "Christ" (the Anointed One, Messiah) is His office as the promised King, Priest, and Prophet. He is Emmanuel, "God with us"; the Word (Logos) of God; the Son of God and the Son of Man.
      - He names Himself in the Gospel of John through the great "I AM" sayings — the Bread of Life, the Light of the World, the Door, the Good Shepherd, the Resurrection and the Life, the Way and the Truth and the Life, the True Vine — each echoing the divine Name revealed to Moses.
      - The Church further confesses Him as the Lamb of God who takes away the sin of the world, the New Adam, the Great High Priest, the Bridegroom of the Church, the King of Kings and Lord of Lords, the Alpha and the Omega, the Sun of Righteousness, and Pantocrator, the Ruler of all — the title borne by His great icon in the dome of the church.
  - heading: Historical Context
    body:
      - Christ was born in the days of Herod the Great, in a Judea under the rule of the Roman Empire, and was crucified under the procurator Pontius Pilate during the reign of Tiberius Caesar. The Holy Land of His time was a meeting of worlds — Roman administration and roads, Greek language and culture, and the religious life of Second Temple Judaism centered on the Temple in Jerusalem and the synagogues of the towns.
      - The Jewish people awaited the Messiah promised by the prophets, though expectations varied — many looked for a king who would free them from Rome. Among the parties of the day were the Pharisees, who upheld the oral tradition and the resurrection; the Sadducees, the priestly aristocracy of the Temple; and others such as the Zealots and the Essenes.
      - Christ's ministry moved through Galilee — Nazareth, Cana, Capernaum, Bethsaida, the shores of the Sea of Galilee — and southward through Samaria and Judea to Jerusalem, with journeys to the regions of Tyre, Sidon, and the Decapolis. He spoke Aramaic, knew the Hebrew Scriptures, and lived among a people for whom the Law and the Prophets were the framework of all life.
  - heading: The Miracles
    body:
      - The Gospels record many signs by which Christ revealed His divine authority and His compassion. He healed the sick — lepers, the paralyzed, the blind, the deaf, the woman with the issue of blood — often by a word or a touch, and forgave sins, which belongs to God alone.
      - He showed mastery over creation, stilling the storm, walking upon the water, multiplying loaves and fishes to feed thousands, turning water into wine at the wedding in Cana, and drawing a great catch of fish. He cast out demons, freeing those long bound.
      - "He raised the dead: the daughter of Jairus, the son of the widow of Nain, and Lazarus, four days in the tomb. These signs were not displays of power for their own sake but revelations of the Kingdom breaking in, foreshadowing His own Resurrection and the restoration of all things."
  - heading: The Teachings
    body:
      - The heart of Christ's preaching was the Kingdom of God — its nearness, its hidden growth, and the repentance and faith by which one enters it. In the Sermon on the Mount He gave the Beatitudes and the Lord's Prayer, calling His disciples to a righteousness of the heart that surpasses outward observance.
      - He taught largely in parables — the Sower, the Prodigal Son, the Good Samaritan, the Lost Sheep, the Talents, the Pearl of Great Price — short stories that conceal and reveal the mystery of the Kingdom. He taught on prayer, forgiveness, almsgiving and fasting, marriage, wealth and poverty, humility, and the love of God and neighbor as the summing-up of the Law.
      - In the great discourses of the Gospel of John — on the Bread of Life, the Good Shepherd, and the farewell words to His disciples — He spoke most directly of His unity with the Father, the gift of the Holy Spirit, and the new commandment that His disciples love one another as He has loved them.
  - heading: The Passion, Death, and Resurrection
    body:
      - The center of the Gospel is the Passion. Entering Jerusalem to acclaim, Christ cleansed the Temple, gave His final teachings, and at the Mystical Supper instituted the Eucharist. In the Garden of Gethsemane He prayed in agony, "not my will, but thine, be done," and was betrayed by Judas and arrested.
      - Tried before the Sanhedrin and condemned under Pontius Pilate, He was scourged, mocked, crowned with thorns, and crucified between two thieves on Golgotha. From the Cross He forgave His executioners, entrusted His Mother to the beloved disciple, and gave up His spirit. He was buried in the new tomb of Joseph of Arimathea.
      - 'On the third day He rose from the dead, the tomb found empty and the grave-cloths laid aside. He appeared to the Myrrh-bearing women, to Peter, to the two on the road to Emmaus, to the Eleven, and to many others. His Resurrection is the foundation of the Christian faith and the pledge of the general resurrection: "Christ is risen from the dead, trampling down death by death, and upon those in the tombs bestowing life."'
  - heading: Theology of the Incarnate Word
    body:
      - "The Church's faith in Christ was confessed and defended against many errors. He is one Person in two natures: true God and true man. The union of the natures is real and permanent, yet without confusion or change (against the Monophysites) and without division or separation (against Nestorius). Because the one who is born of the Virgin is God the Word, she is rightly called Theotokos, the Mother of God."
      - "Having two natures, Christ has two natural wills and two energies, human and divine, the human freely conforming to the divine — as the Sixth Ecumenical Council taught against Monothelitism. In Gethsemane this is shown when His human will yields wholly to the will of the Father."
      - "The purpose of the Incarnation is the salvation of mankind. By His death He offered Himself for the life of the world; by His descent into Hades He freed the dead; by His Resurrection He conquered death. The Fathers express this as a wondrous exchange: God became man that man might become god by grace — theosis. He will come again in glory to judge the living and the dead, and of His Kingdom there shall be no end."
  - heading: The Ecumenical Councils and the Defence of Christ
    body:
      - The Seven Ecumenical Councils articulated the Church's faith in Christ against the heresies of their age. The First Council (Nicaea, 325) confessed the Son as "of one essence with the Father" against Arius, who made Him a creature; the Second (Constantinople, 381) completed the Creed and affirmed the divinity of the Holy Spirit.
      - The Third (Ephesus, 431) upheld the title Theotokos against Nestorius; the Fourth (Chalcedon, 451) confessed one Person in two natures against Eutyches and the Monophysites; the Fifth (Constantinople, 553) clarified this teaching further.
      - The Sixth (Constantinople, 680–681) confessed two wills and two energies in Christ against the Monothelites; and the Seventh (Nicaea, 787) defended the holy icons, teaching that because the Word truly became flesh, He may be depicted, and the honor given the image passes to its prototype.
  - heading: The Feasts of the Lord
    body:
      - The liturgical year is built around the feasts of Christ. Pascha, the Resurrection, is the "Feast of feasts," the moveable center from which the whole calendar is reckoned; the weeks of Great Lent prepare for it, and the Paschal season extends to Pentecost.
      - Among the Great Feasts of the Lord are the Nativity (December 25), Theophany / the Baptism (January 6), the Meeting in the Temple (February 2), the Transfiguration (August 6), the Entry into Jerusalem (Palm Sunday), the Ascension (forty days after Pascha), and Pentecost (fifty days after Pascha). The Exaltation of the Cross (September 14) and the Annunciation (March 25) are also numbered among the Twelve Great Feasts.
      - Each feast is not merely the remembrance of a past event but the entry of the worshipping Church into its abiding reality, celebrated with its own hymns, Scripture readings, and iconography.
  - heading: Icons of Christ
    body:
      - Because the Word truly became flesh, the Church writes His image in icons, confessing the Incarnation against those who would forbid it. The honor shown the icon, the Fathers teach, passes to the One depicted.
      - The principal icon of Christ is the Pantocrator, "Ruler of All," showing Him as Teacher and Judge with the book of the Gospel, crowned in the dome of the church. The icon "Not Made by Hands" (the Mandylion) preserves the tradition of His true likeness. Other types depict the events of His life — the Nativity, the Baptism, the Transfiguration, the Crucifixion, the Resurrection (the Anastasis, His descent into Hades), and the Ascension — as well as Christ the Good Shepherd, the Bridegroom, and Christ Emmanuel.
  - heading: The Relics of the Passion
    body:
      - "Christ left no bodily relics, for He rose from the dead and the tomb was found empty; this distinguishes Him from every saint. What the Church venerates are the instruments and witnesses of His Passion — chief among them the Precious and Life-giving Cross, found by the Empress Helena and celebrated at its Exaltation."
      - Other objects associated by tradition with the Passion include the Holy Sepulchre in Jerusalem, the Crown of Thorns, the Holy Lance, the Nails, and various shroud and chalice traditions. The Church distinguishes between what is well attested and what rests on later or local tradition, and venerates these things always for the sake of the One to whom they point.
family:
  heading: The Holy Family and the Ancestors of God
  intro: The kindred of Christ according to the flesh, through His Mother the Theotokos and the household of Nazareth, together with the kinsmen who surrounded His birth and ministry.
