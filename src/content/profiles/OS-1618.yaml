id: OS-1618
lifespan: 11th century (died 1082)
liturgicalTitle: Our Father among the Saints Arsenius, Bishop of Ninotsminda
overview:
  - Arsenius of Ninotsminda (Arsen Ninotsmindeli, died 1082) was a Georgian bishop, monk, translator, calligrapher, and theologian of the eleventh century. He is venerated as a saint of the Georgian Orthodox Church.
  - Tonsured a monk in Jerusalem, he later returned to Georgia and was consecrated bishop of Ninotsminda. Drawn to a contemplative life, he resigned his see and joined the Georgian community at the Iveron Monastery on Mount Athos, where he assisted in the translation of Scripture and theological literature. He is commemorated on July 31.
timeline:
  - when: 11th century
    title: Monastic tonsure in Jerusalem
    body: Arsenius was tonsured a monk in Jerusalem. He was subsequently active at the Otkhta monastery in the region of Tao-Klarjeti.
  - when: 11th century
    title: Bishop of Ninotsminda
    body: He returned to Georgia, where he was consecrated bishop of Ninotsminda.
  - when: 11th century
    title: Resignation of the see
    body: Longing for a life of solitude, Arsenius petitioned King Davit Kuropalates for permission to resign from his episcopal position. The king granted the request, and Arsenius set out for monastic life together with John Grdzeslidze, a man of letters.
  - when: 11th century
    title: Iveron Monastery, Mount Athos
    body: Saints John the Iberian and Euthymius (Ekvtime) of Athos invited Arsenius and his companion to the Georgian Iveron Monastery on Mount Athos. There Arsenius assisted Saint Ekvtime in his translations of the Holy Scriptures and many theological books, laboring for many years.
  - when: "1082"
    title: Repose and burial
    body: Arsenius reposed peacefully at an advanced age on Mount Athos. He was initially buried at the monastery's church of Saint Simeon the Stylite. Saint George the Hagiorite (George of the Holy Mountain) later translated his relics to the ossuary of the monastery's catholicon, near the grave of Euthymius.
sections:
  - heading: Scholar and Translator
    body:
      - Arsenius is remembered as a brilliant translator, writer, calligrapher, and theologian. At the Iveron Monastery he assisted Saint Euthymius (Ekvtime) of Athos in rendering the Holy Scriptures and numerous theological works into Georgian, contributing to the monastery's role as a major center of Georgian literary and translation activity.
      - His earlier monastic career included activity at the Otkhta monastery in Tao-Klarjeti before his journey to Mount Athos.
  - heading: Relics & Shrines
    body:
      - Following his repose on Mount Athos, Arsenius was first buried at the Iveron Monastery's church of Saint Simeon the Stylite. Saint George the Hagiorite subsequently transferred his relics to the ossuary of the monastery's catholicon, where they were laid near the resting place of Euthymius of Athos.
companions:
  - name: Euthymius of Athos (Ekvtime)
    note: Abbot of the Iveron Monastery whom Arsenius assisted in translating Scripture and theological works.
    href: saint/OS-1165
  - name: John the Iberian
    note: Founder of the Georgian Iveron Monastery who, with Euthymius, invited Arsenius to Mount Athos.
    href: saint/OS-1165
  - name: George the Hagiorite
    note: Later figure of the Iveron Monastery who translated Arsenius's relics to the catholicon's ossuary.
    href: saint/OS-1438
  - name: John Grdzeslidze
    note: Georgian man of letters who accompanied Arsenius from Georgia to the monastic life.
