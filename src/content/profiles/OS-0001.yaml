id: OS-0001
lifespan: c. 18 BC – after c. 33 AD
overview:
  - The Most Holy Theotokos, the Virgin Mary, is venerated in the Orthodox Church as the Mother of God who bore Christ. She holds the foremost place among the saints, honored above all created beings, including the angels. Within the Orthodox order of the saints she stands first — preceding the Angels, Prophets, Apostles, Fathers, and Martyrs — and is the saint first invoked in any need.
  - By tradition she was born around 18 BC in Herodian Judea to Joachim and Anna. Joachim is held to have descended from the tribe of the Prophet-King David, and Anna from the priestly line of Aaron. The couple had remained childless for many years, a condition that carried public stigma in Hebrew society; the synaxarion relates that the High Priest rejected Joachim's sacrifice on account of their childlessness. After persevering in prayer, they received the Archangel Gabriel's announcement that they would bear a daughter through whom the salvation of the world would come.
  - Raised in a devout Jewish family, Mary was likely a relative of Elizabeth, the wife of the priest Zechariah. The angel Gabriel announced to her in Nazareth that she would conceive Jesus through the Holy Spirit, and she gave birth to him in Bethlehem. After Christ's Ascension she remained under the care of the Apostle John the Theologian, residing near the Mount of Olives, and was a source of consolation to the Apostles as the Church was established in Jerusalem. Orthodox tradition holds that she died a natural death — the Dormition — after c. 33 AD, with sources placing her repose either in Jerusalem or in Ephesus.
timeline:
  - when: c. 18 BC
    title: Nativity in Nazareth
    body: By tradition Mary was born in Nazareth, a small Galilean city, to Joachim and Anna, who had been childless for many years before the Archangel Gabriel announced her conception. Her nativity is commemorated on September 8.
  - when: c. 1 BC
    title: Annunciation in Nazareth
    body: The angel Gabriel announced to Mary in Nazareth that she would conceive Jesus through the Holy Spirit. The feast of the Annunciation is kept on March 25.
  - when: c. 1 AD
    title: Nativity of Christ in Bethlehem
    body: Mary gave birth to Jesus in Bethlehem. Forty days afterward she brought him to the Temple for purification.
  - when: c. 30 AD
    title: Wedding at Cana
    body: Mary witnessed Jesus's first miracle at the wedding at Cana.
  - when: c. 33 AD
    title: The Crucifiction and in the upper room after the Ascension
    body: Mary was present at Jesus's cucifiction. In Acts 1:12–26 Mary is the only person besides the eleven apostles mentioned by name as abiding in the upper room after the Ascension.
  - when: after c. 33 AD
    title: The Dormition
    body: Tradition holds that the Archangel Gabriel announced her impending departure while she resided in Jerusalem, and that the Apostles were miraculously gathered to her deathbed. Three days after her burial, when the Apostle Thomas arrived late and the tomb was opened, only the burial wrappings were found. The Dormition is commemorated on August 15.
sections:
  - heading: Family
    body:
      - By tradition Mary's parents were Joachim and Anna. Joachim is held to have descended from the tribe of the Prophet-King David, while Anna came from the priestly line of Aaron. Anna had been barren and far advanced in years before conceiving Mary. The couple are said to have vowed to dedicate any child God granted them to Temple service.
      - Mary was likely a relative of Elizabeth, the wife of the priest Zechariah. The Archangel Gabriel announced to Joachim and Anna that they would bear a daughter through whom the salvation of all the world would come.
  - heading: Titles and the Council of Ephesus
    body:
      - The title Theotokos (Θεοτόκος) means 'God-bearer' or 'Birth-giver to God' in Greek. Among Mary's other titles are Aeiparthenos ('ever-virgin') and Panagia ('the All-Holy'). The fuller liturgical designation is 'Our All-holy, immaculate, most blessed and glorified Lady, the Theotokos and Ever-Virgin Mary.'
      - The Third Ecumenical Council at Ephesus in 431 officially recognized the title Theotokos, affirming that Mary's son Jesus is fully God as well as fully human, and rejecting the alternative 'Christotokos' proposed by Nestorius. The Fifth Ecumenical Council of 553 affirmed that she was 'always a virgin.' Orthodox tradition maintains she remained virgin before, during, and after Christ's birth, a teaching consistently referenced by Church Fathers including Cyril of Alexandria, John of Damascus, and Ambrose of Milan.
      - Orthodox believers regard her as superior to all created beings, though not divine. Icons depicting her bear the abbreviations 'ΜΡ ΘΥ,' representing the Greek for 'Mother of God.'
  - heading: Place among the saints
    body:
      - Within the Orthodox tradition, the order of the saints begins with the Theotokos, followed by the Angels, Prophets, Apostles, Fathers, and Martyrs — giving her precedence even over the angels. The OCA life of her nativity states that she 'surpassed in purity and virtue not only all mankind, but also the angels.'
      - "According to a tradition documented by Saint Ambrose of Milan, she embodied exceptional virtue: 'She was a Virgin not only in body, but also in soul, humble of heart, circumspect in word, wise in mind.' Her manner of life is described as emphasizing fasting, prayer, modest dress, and avoidance of public appearance except for attendance at the temple."
  - heading: The Dormition
    body:
      - After Christ's Ascension, the Mother of God remained under the care of the Apostle John the Theologian, residing near the Mount of Olives. She served as a source of consolation to the Apostles and to all believers, recounting the Annunciation, Christ's conception, his childhood, and his earthly ministry, and the Apostles held her in extraordinary reverence as they established the Church in Jerusalem.
      - At the time of her Dormition, while she resided in Jerusalem, the Archangel Gabriel announced her impending departure, and the Apostles were miraculously gathered to surround her deathbed. The tradition relates that the Light of Divine Glory shone forth as Christ descended surrounded by hosts of angels, and the Most Holy Virgin gave her soul into the hands of her Son. Three days after her burial, when the Apostle Thomas arrived late and asked that the tomb be opened, the Apostles found only the burial wrappings. She is said afterward to have appeared to the gathered Apostles, declaring, 'Rejoice! I am with you all the days of your lives.'
  - heading: Relics & Shrines
    body:
      - The Church preserves what tradition holds to be her grave wrappings in the Blachernae church, where they are credited with miraculous healings.
  - heading: Feasts
    body:
      - "Five of the twelve Great Feasts of the Orthodox liturgical year are associated with the Mother of God. Four major feasts are dedicated to her: the Nativity of the Theotokos (September 8), the Presentation, or Entrance, into the Temple (November 21), the Annunciation (March 25), and the Dormition (August 15)."
      - Her nativity, kept on September 8, is described in the OCA life as the turning point at which 'the grace of the Kingdom of God, a Kingdom of Truth, piety, virtue and everlasting life' began to come to earth. Many of her icons — among them the Vladimir, Kazan, and Tikhvin images — carry their own commemorations.
  - heading: Customs & Traditions
    body:
      - The Dormition Fast (August 1–14) precedes her summer feast. During this fast the Paraklesis, the supplicatory canon to the Mother of God, is chanted. In many places flowers and fragrant herbs are blessed at the Dormition.
patronage:
  - The foremost intercessor in the Orthodox tradition, honored above all the saints and the first to be invoked in any need.
