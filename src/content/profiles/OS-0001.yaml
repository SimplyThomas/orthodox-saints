id: OS-0001
lifespan: 1st century (born c. 18 BC, in Herodian Judea; reposed after c. 33 AD)
overview:
  - The Most Holy Theotokos, the Virgin Mary, is the Mother of God who bore Christ. In Eastern Orthodox tradition she is honored above all other saints and is regarded as the foremost intercessor, the first to be invoked in any need.
  - 'The title Theotokos (Greek Theotokos, "God-bearer" or "Birth-giver to God") was formally affirmed at the Third Ecumenical Council in Ephesus in 431. Its significance is Christological: it confesses that Jesus Christ is fully divine and fully human, the two natures united in one person.'
  - Orthodox tradition holds that she remained ever-virgin — before, during, and after the birth of Christ — and venerates her as superior to all created beings, while maintaining that she is not divine and that this honor is veneration rather than worship.
  - She came from Palestine and the Holy Land, and the events of her life — her betrothal to Joseph, the Annunciation, the Nativity in Bethlehem, the Flight into Egypt, her presence at the Crucifixion, and her gathering with the apostles after the Ascension — are commemorated throughout the Church's calendar and hymnography.
patronage:
  - Foremost intercessor, invoked first in any need
timeline:
  - when: c. 18 BC
    title: Birth
    body: By the chronology of the sources, Mary was born approximately 18 BC in Herodian Judea.
  - when: 1st century
    title: Annunciation
    body: The Angel Gabriel announced to Mary that she would bear Christ, an event commemorated as one of the Great Feasts on March 25.
  - when: 1st century
    title: Nativity of Christ
    body: Mary gave birth to Jesus in Bethlehem, followed by the Flight into Egypt.
  - when: c. 33 AD
    title: Crucifixion
    body: Mary was present at the Crucifixion of Christ.
  - when: after c. 33 AD
    title: Repose (Dormition)
    body: After gathering with the apostles following the Ascension, she reposed, traditionally placed either in Jerusalem or Ephesus; the Church commemorates her death and glorification as the Dormition on August 15.
sections:
  - heading: Titles and Theology
    body:
      - Her full title in Orthodox tradition is "Our All-holy, immaculate, most blessed and glorified Lady, the Theotokos and Ever-Virgin Mary." The designation Panagia ("All-Holy") emphasizes her obedience and cooperation with the will of God.
      - The term "immaculate" expresses that she is pure and spotless; Orthodox tradition distinguishes this from the Roman Catholic doctrine of the Immaculate Conception, which it does not accept. "Ever-Virgin" affirms her virginity before, during, and after the birth of Christ.
      - Orthodox veneration honors her as the finite dwelling place of the infinite God. The approach to her is described as doxological, and her veneration is held to be honor rather than worship.
  - heading: Liturgical Commemoration
    body:
      - "Five of the twelve Great Feasts are dedicated to the Theotokos. Four major liturgical feasts mark her life: the Nativity of the Theotokos (September 8), her Entrance or Presentation into the Temple (November 21), the Annunciation (March 25), and the Dormition (August 15)."
      - Hymns to the Theotokos, the Theotokia, form an essential part of the Divine Services, alongside standing hymns known as Akathists, the veneration of her icons, and liturgical poetry. In iconography she is depicted with three stars, representing her perpetual virginity.
  - heading: The Dormition
    body:
      - The Dormition of the Theotokos, observed on August 15, is a Great Feast commemorating Mary's death, resurrection, and glorification, with her bodily elevation into the heavenly kingdom in the fullness of spiritual and bodily existence. Orthodox tradition teaches that she died as all humanity does — "falling asleep," as the name of the feast indicates.
      - By tradition the apostles were miraculously summoned to her repose; Thomas arrived late, and when he later opened her tomb, her body was no longer present — understood as a sign of the future resurrection. The Church distinguishes this feast, the Dormition, from the Western Assumption.
      - "Theologically, her dormition is held to demonstrate her participation in eternal salvation: she truly died and was raised by her Son as the Mother of Life, participates in the eternal life of paradise, and serves as a model for believers."
  - heading: Customs & Traditions
    body:
      - The Dormition Fast (August 1–14) precedes her summer feast. During this period the Paraklesis, the supplicatory canon, is chanted to her. The 14-day preparatory fast permits fish on the Transfiguration (August 6).
      - In many places flowers and fragrant herbs are blessed at the Dormition, and in some parishes flowers are blessed before the Liturgy. The feast's services include Vespers with three Old Testament readings and the Divine Liturgy on the feast day.
  - heading: Icons
    body:
      - Many icons of the Theotokos — among them the Vladimir, Kazan, and Tikhvin icons — carry their own commemorations in the Church's calendar.
