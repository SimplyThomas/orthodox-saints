lifespan: d. 434
liturgicalTitle: Our Father among the Saints Maximian, Patriarch of Constantinople
overview:
  - Maximian was Patriarch of Constantinople from 431 to 434, elevated to the see in the aftermath of the Council of Ephesus and the deposition of Nestorius. Born in Rome to wealthy and devout parents, he led an ascetic life and was known for his learning, modesty, and charity before his ordination.
  - His brief tenure was largely occupied with restoring order and communion to a Church divided by the Nestorian controversy, and the sources remember him as a guileless man who governed peaceably until his repose.
timeline:
  - when: Before 431
    title: Ascetic life and ordination
    body: Born in Rome of wealthy and pious parents, Maximian pursued a monastic, ascetic manner of life apart from worldly affairs. He gained a reputation for sanctity in part by funding, at his own expense, tombs and burials for holy persons. He was ordained presbyter by Patriarch Sisinnius I of Constantinople.
  - when: 25 October 431
    title: Elevation to the patriarchal throne
    body: Following the deposition of Nestorius by the Council of Ephesus, which had left the churches of Constantinople in confusion, Maximian was chosen after a period of deliberation and installed as Patriarch. His selection had the support of Emperor Theodosius II and the faithful, and Pope Celestine I wrote favorably on his elevation.
  - when: 431–434
    title: Governance and reconciliation
    body: Maximian worked toward the reunion of the Church after the Nestorian schism, sending synodical letters seeking communion and encouraging Cyril of Alexandria to set aside obstacles to reconciliation. His patriarchate saw movement toward the reconciliation between Cyril of Alexandria and John of Antioch with the Eastern bishops.
  - when: 21 April 434
    title: Repose
    body: Saint Maximian reposed peacefully in office. The synaxarion places his death on April 21, 434, on Great and Holy Thursday; he was succeeded by Proclus.
sections:
  - heading: Historical Context
    body:
      - Maximian's accession came at a moment of acute crisis for the Church of Constantinople. The Council of Ephesus in 431 had condemned and deposed his predecessor Nestorius, whose teaching on the person of Christ had provoked a wide schism, and the capital's churches were in disorder.
      - In his administration the sources align him with his predecessors John Chrysostom, Atticus, and Sisinnius I, and emphasize his efforts to heal the breach with the Eastern bishops led by John of Antioch. Of his correspondence, his letters to Saint Cyril of Alexandria are reported to survive.
companions:
  - name: Cyril of Alexandria
    note: Contemporary; Maximian corresponded with Cyril and encouraged him to set aside obstacles to reconciliation with the Eastern bishops after the Council of Ephesus. His letters to Cyril are reported to survive.
    href: saint/OS-0476
  - name: Patriarch Sisinnius I
    note: Ordaining hierarch; Sisinnius I of Constantinople ordained Maximian presbyter before Maximian's own elevation to the patriarchal throne.
    href: saint/OS-2501
