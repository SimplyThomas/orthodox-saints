id: OS-2166
lifespan: Died early 4th century, under the emperor Maximian (reigned 286–305)
overview:
  - Martyr Alexander of Thessalonica was a Christian of Thessalonica who was put to death for confessing the faith during the reign of the emperor Maximian (284–305). Arrested by pagan authorities, he not only acknowledged that he was a Christian but, when ordered to offer sacrifice to the gods, overturned the idolatrous offering in indignation.
  - For this act of defiance and his refusal to comply with the demand to sacrifice, the emperor ordered that Alexander be beheaded. According to the synaxarion, both Maximian and the executioner then witnessed an angel bearing the martyr's soul up to heaven, after which the emperor permitted the Christians of the city to bury Alexander's body with honor.
  - He is a genuinely obscure martyr for whom the Orthodox synaxarion is the principal surviving account. The Orthodox Church commemorates him on November 9 and also on May 26.
liturgicalTitle: The Holy Martyr Alexander of Thessalonica
sections:
  - heading: Martyrdom
    body:
      - Alexander was arrested by pagans specifically for confessing the Christian faith. Brought before the authorities, he openly admitted that he was a Christian. When he was then commanded to offer sacrifice to the gods, he did not merely refuse but overturned the idolatrous sacrifice in indignation, a direct and public rejection of the imperial cult.
      - The emperor gave orders that Alexander be beheaded, both for overturning the sacrifice and for refusing to comply with the pagan religious demands. The synaxarion relates that following the execution the emperor and the executioner alike witnessed an angel come forth to carry the martyr's soul up to the heavens.
      - According to the same account, Maximian afterward granted the Christians permission to give Alexander's body a respectful burial in Thessalonica, which they carried out with celebration.
  - heading: Historical Context
    body:
      - Maximian ruled as Roman emperor during the Tetrarchy, first as Caesar and then as Augustus, and adhered to the traditional Roman religion. Thessalonica was a major city within his sphere and an active site of Christian persecution in this period; the martyrdoms of Saints Demetrius and Nestor at Thessaloniki are also associated with his reign.
      - The Diocletianic persecution included an edict ordering public sacrifices under penalty of death, in force in Thessalonica by 304. This is the setting in which a Christian who refused to sacrifice and overturned an altar would have faced immediate capital punishment, consistent with the account of Alexander's arrest and beheading.
      - On the November 9 synaxarion Alexander is listed among a number of other saints commemorated the same day, including the Martyrs Onesiphorus and Porphyrius, Venerable Matrona of Constantinople, Venerable Theoktiste of Lesbos, and Saint Nectarius of Pentapolis, among others.
