id: OS-2136
lifespan: 4th century
overview:
  - Akepsimas the Hermit of Cyrrhus was a fourth-century ascetic who, according to the synaxarion tradition, spent some sixty years as a solitary in the Syrian desert not far from the city of Cyrrhus, devoting himself to fasting, silence, and prayer.
  - Late in life he was called out of his solitude at the command of the patriarch and consecrated a bishop, dying afterward at an advanced age. He is commemorated on November 3.
  - He is to be distinguished from the Hieromartyr Akepsimas of Persia (a bishop martyred with the presbyter Joseph and the deacon Aeithalas), who is commemorated on the same day but is an entirely separate figure.
liturgicalTitle: Our Venerable Father Akepsimas, Hermit of Cyrrhus
sections:
  - heading: Historical Context
    body:
      - "Akepsimas belonged to the flourishing world of Syrian asceticism centered on Cyrrhus, a city and diocese in northern Syria that was home to a large number of hermits during the fourth and fifth centuries. The region's Christian density was remarkable: Theodoret, its fifth-century bishop, reported that his comparatively small diocese contained some 800 churches, and Cyrrhus itself housed a basilica preserving relics of Saints Cosmas and Damian, earning the city the name 'Hagioupolis' (Holy City) as a pilgrimage destination."
      - Akepsimas is named among the many holy hermits associated with the territory of Cyrrhus, alongside figures such as Maron (patron of the Maronite Church), Zebinas, Polychronius, Eusebius, Thalassius, Maris, and James the Wonderworker.
  - heading: Sources & Documentation
    body:
      - The fullest ancient witness to Akepsimas is Theodoret of Cyrrhus, whose Religious History (Philotheos Historia / Historia Religiosa), completed around 444, gathers the biographies of thirty ascetics of the region as models of the monastic life; Akepsimas appears as the fifteenth of these subjects and is dated to the late fourth century. Theodoret composed the work at the request of a high official named Sporacius, and it remains an important document for understanding the role of early monastics in Syrian society and church life.
      - Beyond Theodoret's account and the brief synaxarion notice, the surviving digital record of this saint is sparse; the details of his solitary years, episcopal consecration, and death rest on the short narrative summary preserved in the liturgical tradition.
timeline:
  - when: 4th century
    title: Life as a desert solitary
    body: By the tradition preserved in the synaxarion, Akepsimas lived for about sixty years as a hermit in the desert near Cyrrhus in Syria, given to fasting, silence, and prayer.
  - when: Late in life
    title: Consecration as bishop
    body: At the command of the patriarch he was drawn out of his solitude and consecrated a bishop, dying afterward at a venerable old age.
