id: OS-2703
lifespan: c. 633 – 709
overview:
  - Wilfrid of York (also Wilfrith or Wilfred, c. 633–709) was a Northumbrian bishop, one of the most influential and contentious churchmen of the Anglo-Saxon Church. Born to a noble family in Northumbria, he became a leading advocate for Roman ecclesiastical practice over the older Celtic and Saxon customs, and was the first Saxon to hold the see of York.
  - He is best remembered for his role at the Synod of Whitby (664), where he was chosen to present the Roman position on the calculation of Easter; his advocacy secured the adoption of Roman practice. Over a long and turbulent career he served as Bishop of York and later of Hexham, endured three expulsions from his see amid disputes with kings and fellow churchmen, and became the first Englishman to appeal a decision to the papacy in Rome.
  - Beyond his ecclesiastical controversies, Wilfrid was a builder of churches, a founder and reformer of monasteries who introduced the Rule of Saint Benedict to England, and a missionary who preached to the pagan South Saxons and to the Frisians. He died in 709 at Oundle and was buried at his monastery of Ripon. He is venerated in the Orthodox, Roman Catholic, and Anglican traditions, with a feast on October 12 (and also April 24).
liturgicalTitle: Our Father among the Saints Wilfrid, Bishop of York
timeline:
  - when: c. 633
    title: Birth in Northumbria
    body: Wilfrid is born, around 633, to a noble Northumbrian family.
  - when: c. 648
    title: Enters monastic life
    body: At about the age of fourteen he enters the monastery of Lindisfarne, having first been at the royal court; sources associate this with the court of King Oswiu.
  - when: 653–658
    title: Journey to Rome and study at Lyon
    body: He travels toward Rome with Benedict Biscop, studying at Lyon under Archbishop Annemund and learning Roman methods of Easter calculation and the collecting of relics.
  - when: "658"
    title: Receives the monastery of Ripon
    body: Granted the monastery at Ripon, he establishes the Rule of Saint Benedict there and introduces Roman practices.
  - when: "664"
    title: Synod of Whitby
    body: Chosen to argue the Roman case on the dating of Easter, his advocacy secures the adoption of Roman practice over Celtic and Saxon custom; he is appointed Bishop of Northumbria and consecrated in Gaul by Bishop Agilbert.
  - when: "669"
    title: Installed as Bishop of York
    body: He is installed as Bishop of York, becoming the first Saxon to hold that see, and serves until 678.
  - when: "678"
    title: First expulsion and appeal to Rome
    body: King Ecgfrith expels him from his see; Wilfrid becomes the first Englishman to appeal to the papacy. A synod under Pope Agatho (October 679) orders his restoration. In the same period he travels to Frisia, attempting the conversion of the Frisians at the court of King Aldgisl.
  - when: 680–686
    title: Mission to Sussex
    body: Exiled again despite the papal decree, he spends about five years at Selsey, converting the pagan South Saxons and founding Selsey Abbey and an episcopal see on land granted by King Æthelwealh.
  - when: "691"
    title: Third expulsion
    body: King Aldfrith expels him again amid disputes over the subdivision of dioceses and over land; he goes on to serve as Bishop of Leicester in Mercia.
  - when: "706"
    title: Restoration and Hexham
    body: Under King Osred I he is restored to Ripon and Hexham, serving as Bishop of Hexham from 706 until his death.
  - when: "709"
    title: Repose at Oundle
    body: He dies at Oundle, aged about seventy-five, and is buried at his monastery of Ripon; his body is at once venerated.
sections:
  - heading: The Synod of Whitby and the Roman cause
    body:
      - The central controversy of Wilfrid's era was the divergence between Roman and Celtic (Ionan) practice, above all the method of calculating the date of Easter. Having studied Roman usage at Lyon and in Rome, Wilfrid returned to Northumbria as a committed champion of the Roman calculation.
      - At the Synod of Whitby in 664, Wilfrid was chosen to present the Roman position. His argument carried the day, securing the adoption of Roman practice over the older Celtic and Saxon customs, and the speech he delivered made him famous. In the same year he was appointed Bishop of Northumbria and was consecrated in Gaul by Bishop Agilbert.
  - heading: Disputes, expulsions, and appeals to Rome
    body:
      - Wilfrid's career was marked by repeated conflict with kings and fellow churchmen, chiefly over the reorganization and subdivision of dioceses and over monastic lands. Installed as Bishop of York in 669, he was expelled in 678 by King Ecgfrith. The reasons given include his quarrel with the king, his encouragement of Queen Æthelthryth in her monastic vocation, and opposition from Abbess Hilda.
      - In response, Wilfrid became the first Englishman to challenge a royal or ecclesiastical decision by petitioning the papacy. A synod under Pope Agatho in October 679 ordered his restoration, but on his return King Ecgfrith briefly imprisoned and then exiled him despite the papal decree. A third expulsion followed in 691 under King Aldfrith. Through these upheavals he also served as acting Bishop of Lindisfarne after the death of Cuthbert in 687 and as Bishop of Leicester in Mercia. He was finally restored under King Osred I in 706 and served as Bishop of Hexham until his death.
  - heading: Missions and monastic foundations
    body:
      - Wilfrid was an energetic missionary and monastic reformer. In Sussex he spent about five years at Selsey converting the pagan South Saxons, founding Selsey Abbey on land granted by King Æthelwealh and establishing an episcopal see there. In 678 he traveled to Frisia, attempting the conversion of the Frisians at the court of King Aldgisl, and he later supported the Frisian missions of Willibrord.
      - He introduced the Rule of Saint Benedict to English monasteries and established or controlled a network of houses, including Ripon, Hexham, Selsey, and Oundle. On his continental journeys he was received by King Dagobert II in Austrasia and by the Lombard King Perctarit in Italy, and he made several journeys to Rome to press his appeals.
  - heading: Churches and craftsmanship
    body:
      - Wilfrid was a notable builder who brought continental architectural and artistic tastes to Northumbria. He built churches at Hexham and Ripon in a distinctive continental basilica style, with porticus, crypts, and glazed windows; the church at Hexham is reported to have had a capacity of some two thousand and to have used stone taken from Hadrian's Wall.
      - He also commissioned rich furnishings, including silk altar cloths worked with gold thread and gospel books written in gold letters on purple parchment with gem-encrusted covers.
  - heading: Relics & Shrines
    body:
      - Immediately after his death Wilfrid's body was venerated, and his relics were kept at Ripon. They remained there until 948, when King Eadred destroyed the church. Archbishop Oda of Canterbury then held relics, which were placed in the High Altar in 948 and, after a fire at the cathedral, moved to a separate shrine following 1067.
      - Secondary relics may have been preserved at Ripon by Archbishop Oswald. Shrines associated with Wilfrid are recorded at Ripon, at Sompting in Sussex, and in Frisia. After the Norman Conquest some forty-eight churches were dedicated to him, with relics reported at eleven sites.
  - heading: Veneration and legacy
    body:
      - Wilfrid is venerated in the Orthodox, Roman Catholic, and Anglican churches. He is honored as patron of the Roman Catholic dioceses of Middlesbrough and Leeds.
      - His life was recorded soon after his death by Stephen of Ripon, who wrote the Vita Sancti Wilfrithi around 715, an important source for the history of the early English Church.
