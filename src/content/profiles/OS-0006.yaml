id: OS-0006
lifespan: 1st century (traditionally born c. 1–16 AD in Antioch; died c. 84–100 AD)
overview:
  - Saint Luke was a first-century physician, evangelist, and companion of the Apostle Paul, traditionally numbered among the Seventy Apostles. A native of Syrian Antioch, he is remembered as the author of the third Gospel and the Acts of the Apostles, two works that together account for a substantial portion of the New Testament.
  - Trained in the Greek medical arts, Luke is called 'the most dear physician' by Paul in the Epistle to the Colossians. He accompanied Paul through much of his missionary labor and remained with him during his Roman imprisonments, when other coworkers had departed.
  - Beyond his writings, later Christian tradition venerates Luke as the first iconographer, crediting him with painting the earliest images of the Mother of God and of the Apostles Peter and Paul. His feast is kept on October 18.
sections:
  - heading: Life and Background
    body:
      - Luke was a native of Syrian Antioch, as recorded by the early historian Eusebius. He was trained and practiced professionally as a physician; Paul refers to him as 'the most dear physician.' His medical training is reflected throughout his writings in specialized terminology comparable to that of ancient physicians such as Galen and Hippocrates.
      - "His ethnic background was Greek (Hellenistic) rather than Jewish: Paul distinguishes him from 'those of the circumcision.' Some scholars have proposed that he may instead have been a Hellenized Jew, but the more common reading holds him a gentile who acquired his knowledge of Jewish matters either as a proselyte or through close association with the Apostles. By ancient tradition he was unmarried."
      - Luke became one of the Seventy Apostles sent out by Christ to preach the Kingdom of Heaven, and he became a close companion and missionary partner of the Apostle Paul.
  - heading: Companion of Paul
    body:
      - Luke joined Paul at Troas and traveled with him into Europe, a journey reflected in the so-called 'we' passages of Acts (16:10–17; 20:5–21:18; 27:1–end), which document his firsthand presence with the Apostle. He rejoined Paul in Philippi and accompanied him on the perilous voyage to Italy.
      - He was present during Paul's Roman imprisonments and remained with him through his final captivity. When Paul's other coworkers had forsaken him, only Luke stayed to assist in his ministry, a fidelity captured in Paul's words, 'Only Luke is with me' (2 Timothy 4:11).
  - heading: Writings
    body:
      - Luke authored the Gospel that bears his name, written around 62–63 AD in Rome under Paul's guidance, providing a firmer historical basis for Christian teaching. He also wrote the Acts of the Apostles, also dated to about 62–63 AD, which documents the activity of the Apostles following Christ's Ascension and centers on the Jerusalem Council of 51 AD.
      - Both works are dedicated to Theophilus and share an identical style and vocabulary, with consistent medical language throughout. Together the two books, often called Luke–Acts, comprise roughly a quarter of the New Testament.
  - heading: Luke the Iconographer
    body:
      - From the eighth century, Christian tradition credits Luke as the first icon painter. He is said to have painted the earliest images of the Virgin Mary and the Christ Child, including the Hodegetria, as well as icons of the Apostles Peter and Paul. By tradition the Virgin Mary blessed these works, saying, 'Let the grace of Him Who was born of Me and My mercy be with these Icons.'
      - Later sources, including Nicephorus Callistus in the fourteenth century, repeat the attribution. A picture of the Virgin Mary in Rome's Santa Maria Maggiore is ascribed to him, a tradition traceable to AD 847 and thought to copy sixth-century originals. The Black Madonna of Częstochowa is likewise attributed to his hand.
  - heading: Later Mission and Repose
    body:
      - After the martyrdom of Peter and Paul, tradition relates that Luke preached in Achaia, Libya, Egypt, and the Thebaid. He is held to have written his Gospel in Achaia and ultimately to have suffered martyrdom in Thebes.
      - Jerome's account states that he died filled with the Holy Spirit; by that tradition he reposed at the age of seventy-four. The synaxarion holds him to have died traditionally aged eighty-four.
  - heading: Relics & Shrines
    body:
      - Luke's remains were transferred to Constantinople in 357 AD; Jerome records the translation during the reign of Emperor Constantius, together with relics of the Apostle Andrew.
      - His relics were later transferred to Padua in Italy, to the Abbey of Santa Giustina, possibly during the Crusade of 1204. His skull is kept in St. Vitus Cathedral in Prague. In 1992 a rib was returned to the Orthodox cathedral in Thebes.
      - In 2001 a scientific carbon-14 analysis of the remains found them consistent with a person of Syrian descent, in keeping with his traditional origin in the region of Antioch.
timeline:
  - when: c. 1–16 AD
    title: Birth in Antioch
    body: Luke is born, by tradition between 1 and 16 AD, into a Greek family of Antioch in Roman Syria.
  - when: c. 51 AD
    title: Jerusalem Council
    body: The Apostolic council at Jerusalem, an event that later stands at the center of his Acts of the Apostles.
  - when: c. 52 AD
    title: Rejoins Paul at Philippi
    body: Having met Paul at Troas around the events of Acts 16:10, Luke travels into Europe and rejoins him at Philippi.
  - when: c. 62–63 AD
    title: Gospel and Acts written
    body: Luke composes his Gospel in Rome under Paul's guidance and writes the Acts of the Apostles.
  - when: c. 84–100 AD
    title: Repose
    body: Luke dies, by tradition aged eighty-four (Jerome gives seventy-four), and by tradition suffers martyrdom in Thebes, Achaea.
  - when: 357 AD
    title: Translation to Constantinople
    body: His relics are transferred to Constantinople during the reign of Emperor Constantius, together with those of the Apostle Andrew.
  - when: c. 1204 AD
    title: Translation to Padua
    body: His relics are moved to the Abbey of Santa Giustina in Padua, possibly during the Fourth Crusade.
  - when: 1992 AD
    title: Rib returned to Thebes
    body: A rib of the saint is returned to the Orthodox cathedral in Thebes.
