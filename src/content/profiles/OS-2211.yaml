id: OS-2211
lifespan: c. 296 – 303
overview:
  - Barulas was a young boy, remembered in the tradition as about seven years old, who was martyred at Caesarea in Palestine around 303, during the persecution of the emperor Diocletian. He is commemorated on November 18 together with the deacon-martyr Romanus of Caesarea, in whose passion the sources place him.
  - According to the account, Barulas was among a crowd witnessing the torture of Saint Romanus when the Eparch Asclypiades questioned the child about his faith. The boy confessed Christ and denounced the pagan gods, and when he would not renounce his confession he was tortured and beheaded. He is venerated as a child-martyr in the Eastern Orthodox, Roman Catholic, and Armenian Apostolic churches.
liturgicalTitle: The Holy Martyr Barulas the Youth of Caesarea
sections:
  - heading: Confession and Martyrdom
    body:
      - The tradition recounts that Barulas was present in a crowd watching the torture of Saint Romanus of Caesarea when the Eparch Asclypiades turned to question the child about what he believed. Barulas declared that he worshiped Christ and condemned the idols, saying that the pagan gods were demons who had created nothing. His bold answers are said to have shamed the idolaters looking on.
      - Unable to persuade the boy to abandon his confession, Asclypiades ordered him tortured and then executed by beheading. The synaxarion relates that his mother stood by throughout his ordeal and encouraged him not to fear death, telling him that he would not die but live forever; after his execution she buried his body.
  - heading: Historical Context
    body:
      - Barulas's death is set within the Diocletianic Persecution of 303–304, the last and most severe imperial campaign against Christians in the Roman world, which fell heavily on Palestine and its capital at Caesarea.
      - The sources connect him with Romanus of Caesarea, a deacon of Palestine who, during the same persecution, rebuked worshipers at a pagan festival and was seized, tortured, and finally strangled in prison. Both are commemorated on November 18. The Latin poet Prudentius linked the two martyrdoms in verse, presenting Barulas as Romanus's companion in death, and Eusebius of Caesarea recorded Romanus's passion in his work on the martyrs of Palestine.
  - heading: Historical Uncertainty
    body:
      - Scholars have questioned whether Barulas and Romanus were in fact martyred together. Their pairing is preserved chiefly through the poetry of Prudentius, and some historians regard the association as a literary construction rather than a documented historical link, describing the connection as probably arbitrary and noting that legendary elements may have entered the account.
      - The core tradition of a child confessor put to death at Caesarea is retained across several churches, while the precise circumstances of his death and its relationship to the passion of Romanus remain uncertain.
timeline:
  - when: c. 296
    title: Birth
    body: By the tradition that reckons him about seven years old at his death, Barulas was born around 296 in Palestine.
  - when: "303"
    title: Confession before Asclypiades
    body: While witnessing the torture of Saint Romanus at Caesarea, Barulas confessed Christ and denounced the pagan gods before the Eparch Asclypiades.
  - when: "303"
    title: Martyrdom
    body: Refusing to renounce his faith, Barulas was tortured and beheaded; his mother, who had encouraged him, buried his body.
