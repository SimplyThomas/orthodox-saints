liturgicalTitle: Our Venerable Father Abramius the Lover-of-Labor of the Kiev Near Caves
overview:
  - Abramius the Lover-of-Labor was a monk of the Kiev Caves Monastery (Kyiv Pechersk Lavra) whose epithet preserves the memory of his diligent manual service to the monastic brotherhood. Because so little was committed to writing about the early ascetics of the Caves, the details of his life have not survived, and even his lifetime can only be approximated.
  - He is counted among the venerable fathers whose relics rest in the Near Caves, the underground complex associated with Saint Anthony of the Caves. His individual commemoration falls on August 21, and he is honored again with the wider company of the Near Caves fathers in their common synaxis.
sections:
  - heading: Dating and Sources
    body:
      - The chronology of Abramius is uncertain, a difficulty common to the early monastics of the Caves owing to the scarcity of written records. He is most often associated with the period of the Mongol-Tatar invasions in the thirteenth century, though this is not certain. Archbishop Sergius (Spassky) placed him in the twelfth to thirteenth centuries, while the Orthodox Encyclopedia situates his life between the second half of the thirteenth century and the beginning of the fourteenth.
      - The earliest surviving notice of him is in the Teraturgim of Hieromonk Athanasius (Kalophoisky), a seventeenth-century work, in which he is named the Venerable Elder Abraham, the Lover of Labor. Later writers, including Archbishop Philaret (Gumilevsky), drew on this tradition in describing his life.
  - heading: Monastic Labor
    body:
      - According to the account preserved by Archbishop Philaret (Gumilevsky), Abramius toiled in a cave toward the end of his life, and after his prayers he worked to prepare everything necessary for the Brotherhood of the Caves. It is this combination of unceasing prayer and practical service to his fellow monks that earned him the title Lover of Labor.
  - heading: Relics and Commemoration
    body:
      - His relics rest in the Near (Anthony's) Caves of the Kiev Caves Lavra. Beyond his individual feast on August 21, he is commemorated within the Synaxis of all the Venerable Fathers of the Kiev Caves whose relics lie in the Near Caves, kept on September 28, and on the Second Sunday of Great Lent.
