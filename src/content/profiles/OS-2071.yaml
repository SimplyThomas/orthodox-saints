id: OS-2071
lifespan: 13th century
liturgicalTitle: Our Venerable Father Sisoes the Recluse of the Kiev Near Caves
overview:
  - Sisoes the Recluse was a thirteenth-century hermit of the Near Caves (the Caves of Saint Anthony) at the Kiev Caves monastery in present-day Ukraine. He pursued the ascetic life of strict enclosure (zatvornichestvo) and, upon his repose, was buried among the reclusive fathers in the Near Caves.
  - "Almost nothing of his individual biography survives in the accessible sources: no birth or death date and no specific life events are recorded. What remains is a single liturgical characterization from the general service to the Fathers of the Kiev Caves, where he is called 'radiant in fasting,' a phrase that preserves the memory of his ascetic labor."
  - He is commemorated on October 24, together with two other recluses of the Near Caves, and among all the venerable fathers of the Near Caves in their general synaxis.
timeline:
  - when: 13th century
    title: Ascetic life at the Near Caves
    body: Sisoes struggled as a recluse at the Kiev Caves monastery, following the enclosed ascetic path (zatvornichestvo) established there in the earliest decades of the Lavra.
  - when: 13th century
    title: Repose and burial
    body: Upon his death he was buried in the Near Caves (the Caves of Saint Anthony), where his relics rest among the reclusive fathers.
  - when: October 24
    title: Feast day
    body: His individual commemoration is kept on October 24, shared with the recluses Arethus and Theophilus of the Near Caves.
  - when: September 28 and the Second Sunday of Great Lent
    title: General synaxis
    body: He is also commemorated in the general commemoration of all the venerable fathers of the Near Caves.
sections:
  - heading: The Recluses of the Near Caves
    body:
      - The Near Caves, also called the Caves of Saint Anthony, form part of the Kyiv Pechersk Lavra. Saint Anthony relocated there in 1057 after first settling in the Far Caves, and the narrow underground corridors, roughly one to one and a half metres wide, held living cells and chapels carved into the earth.
      - From the earliest decades of the Lavra, monks who withdrew into strict enclosure in individual cells were venerated as a distinct ascetic class alongside the coenobitic brothers. Sisoes belonged to this tradition of reclusion, and his memory is preserved chiefly through the collective liturgical service to the fathers of the Caves rather than through a separate written life.
      - The relics of many Caves saints are venerated in the Near Caves, among them Nestor the Chronicler, Kuksha, Alipy, and Agapetus of Pechersk. Sisoes was buried in the same complex.
  - heading: Joint Commemoration on October 24
    body:
      - "On October 24 the Church commemorates three recluses of the Near Caves together: Arethus the Recluse of the twelfth century, a native of Polotsk, likewise called 'radiant in fasting'; Sisoes the Recluse of the thirteenth century, called 'radiant in fasting'; and Theophilus the Recluse of the twelfth to thirteenth century, called 'resplendent in miracles' in the general service to the fathers of the Caves."
      - Grouping several recluses of the same monastery on a single day reflects the common practice of the Near Caves Paterikon, in which the many zatvorniki are remembered in clusters.
