liturgicalTitle: Our Venerable Father Nicanor, the Wonderworker of Mount Calistratus
overview:
  - Saint Nicanor, the Wonderworker of Mount Calistratus, is a venerable monastic commemorated in the Eastern Orthodox calendar on August 7. He is associated with Mount Calistratus (also spelled Callistratus) in Greece and is honored under the title of wonderworker.
  - Almost nothing of his life is preserved in the available synaxaria. The Orthodox Church in America's Lives of the Saints lists his commemoration for August 7 but records no biographical detail, and the broader liturgical tradition retains little more than his name, monastic standing, and reputation for miracles.
sections:
  - heading: Commemoration and Sources
    body:
      - Nicanor is remembered as a venerable (monastic) saint and wonderworker connected with Mount Calistratus in Greece. The Orthodox Church in America's synaxarion entry for his feast day notes the commemoration without supplying a narrative of his life.
      - Eastern Orthodox liturgical lists for August 7 place him among the post-schism Orthodox saints and give his repose variously as 1419 or 1549; the surviving record does not resolve the discrepancy, and no birth date, place of origin, or detailed account of his monastic life has been preserved in the reachable sources.
