id: OS-2845
lifespan: d. c. 434
overview:
  - "Saint Caprasius of Lérins (French: Caprais) was a hermit of fifth-century Gaul who is counted, with Saint Honoratus of Arles, among the founders of the island monastery of Lérins off the Mediterranean coast of Provence. Born in the fourth century into what a source describes as a rich and distinguished Gaulish family, he set aside worldly prospects to take up the solitary life on the Lérins islands."
  - He became the spiritual teacher of the young Honoratus, who together with his brother Venantius sought the hermitic life under his guidance. The three set out on a pilgrimage toward the Holy Land to visit the holy places of Palestine and the monastic settlements of Syria and Egypt, but the death of Venantius at Methoni in Messenia cut the journey short and returned Caprasius and Honoratus to Gaul.
  - Settling first in the hills near Fréjus and then on Lérins itself, they sought to imitate the Desert Fathers, and the community that gathered around them grew into the influential Lérins Abbey. Caprasius later served as abbot; he is venerated in both the Eastern Orthodox and Roman Catholic traditions, with a feast day on June 1.
sections:
  - heading: Founding of Lérins
    body:
      - After returning from the interrupted eastern pilgrimage, Caprasius and Honoratus first established themselves in the hills near Fréjus before withdrawing to the island of Lérins, where they wished to imitate the Desert Fathers. The community that formed there was shaped by the monastic rule of Saint Pachomius the Great and developed into Lérins Abbey.
      - "Sources present the foundation as a hermit-to-abbot progression: Caprasius the established hermit and teacher, and Honoratus his disciple, whose spiritual reputation drew followers from across Roman Gaul and Brittany until a monastic community formed around him. The abbey's foundation on the island is placed at around the year 410. According to later scholarship, Caprasius may not have been the community's official leader, possibly on account of his advanced age or of Honoratus's greater charisma; the anchor tradition nonetheless records that he served as abbot of Lérins."
  - heading: Sources and Legacy
    body:
      - The principal historical source for the life of Caprasius is a laudatio composed after his death by Hilarius of Arles, himself a former monk of Lérins and later bishop of Arles.
      - Caprasius reposed in the first half of the fifth century (c. 434). His memory is preserved especially through Lérins, which became one of the formative monastic centers of the Western Church.
  - heading: Relics & Shrines
    body:
      - The relics of Caprasius are preserved at the Abbey of San Caprasio in Aulla, in Tuscany. The abbey was dedicated to San Caprasio in 1077, and he is honored there as patron of the town and as a patron saint of pilgrims.
