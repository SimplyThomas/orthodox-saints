id: OS-0048
lifespan: c. 1881 – 1952
overview:
  - Matrona of Moscow (born Matrona Dimitrievna Nikonova) was a blind peasant woman of the late Russian Empire and Soviet era, venerated in the Orthodox Church as a righteous wonderworker. Sources place her birth around 1881–1885 (the exact date is uncertain) in the village of Sebino, Tula Governorate, roughly 300 km south of Moscow, the fourth child of the peasants Dimitry Ioannovich and Natalia Nikitichna Nikonov.
  - Born blind, with sealed eyelids over empty eye sockets, she became known from childhood for spiritual insight, prophecy, and healing. At about seventeen she lost the use of her legs and remained seated for the remaining fifty years of her life. Through the upheavals of the Russian Revolution, the Soviet anti-religious campaigns, and the Second World War she received and counseled a constant stream of visitors, eventually settling in Moscow, where she lived in various lodgings to avoid the authorities.
  - She died on 2 May 1952. Her grave quickly became a place of pilgrimage, and in 1999 she was canonized by the Russian Orthodox Church. Her relics now rest at the Intercession (Pokrovsky) Convent in Moscow, today among the most-visited shrines in Russia.
sections:
  - heading: Early Life
    body:
      - Matrona was born in the village of Sebino in Tula Province to a peasant family, the fourth of their children. Accounts agree that she was born completely blind, with eyelids closed over empty eye sockets, and that a cross-shaped raised birthmark appeared on her chest, which her mother interpreted as a heavenly sign.
      - "By tradition, signs of her calling were noted from infancy: witnesses at her baptism reported that a pillar of fragrant, thin smoke appeared above her, and it was said that as an infant she fasted on Wednesdays and Fridays. From a young age she was described as perceiving the thoughts and sins of those around her, and accounts hold that by the age of seven or eight she had begun to manifest prophetic and healing gifts."
  - heading: Healing and Counsel
    body:
      - People from the surrounding villages and from more distant regions traveled to seek her intercession. The synaxarion and biographical accounts relate that she gave blessed water to the afflicted and was associated with numerous healings.
      - Though blind, she was said to possess detailed knowledge she could not have acquired by sight — of churches, icons, and even distant architecture. Accounts describe her providing knowledge of Florence and Rome (including the Palazzo Pitti) to help a student complete a thesis, despite never having left Russia, and predicting marriages and other unions.
      - At about seventeen she lost the use of her legs and was thereafter seated; sources record that she bore this for the remaining fifty years of her life without complaint.
  - heading: Revolution, Soviet Era, and War
    body:
      - Tradition holds that Matrona foretold the Russian Revolution in detail, describing the desecration of churches and the persecution of Christians. After the events of 1917 she became homeless, and in 1925 — by one account under pressure from communist relatives because of the continuous stream of visitors — she left her village. She had moved to Moscow by 1925, living with various friends and relatives and changing lodgings to avoid the atheist authorities.
      - Despite the religious persecution of the period, sources emphasize that no one ever betrayed her whereabouts to the authorities, and she continued to provide spiritual counsel throughout the Soviet era. During the Second World War (1941–1945) she was said to make unseen visits to the battle fronts, bringing people news of their relatives and friends.
      - Accounts relate that she predicted her own death three days in advance. She died on 2 May 1952, at approximately seventy years of age, in Khimki, Moscow Oblast.
  - heading: Relics & Shrines
    body:
      - After her death Matrona's grave immediately became a place of pilgrimage, with long lines of visitors; sources locate the early shrine at the Danilov Monastery in Moscow. On 8 March 1998 her relics were translated, an event commemorated as her glorification feast.
      - Following her canonization, her relics were transferred to the Church of the Protecting Veil of Our Lady at the Intercession (Pokrovsky) Convent in Moscow, which continues to serve as a pilgrimage destination drawing very large numbers of the faithful and ranks among the most-visited shrines in Russia.
  - heading: Veneration
    body:
      - Matrona was canonized by the Russian Orthodox Church in 1999, under Patriarch Alexei II of Moscow; sources give the date as 2 May 1999. Her feast is kept on 2 May (civil calendar), corresponding to 19 April, with her glorification commemorated on 8 March. In 2018 the Romanian Orthodox Church added her to its calendar.
