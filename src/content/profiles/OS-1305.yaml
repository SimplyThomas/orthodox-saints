id: OS-1305
overview:
  - Gelasius is venerated as a martyr, commemorated on June 6. According to the surviving account, he lived during a period of fierce persecution, gave away all his property and possessions to the poor, and devoted himself to comforting fellow Christians who were imprisoned and facing martyrdom.
  - Few details of his life are preserved. No geographical location, historical dates, or century are recorded in the sources, and he is described even in the synaxarion as a saint of whom little further is known. He was tried before a governor, confessed Christ, and was put to death by beheading.
sources:
