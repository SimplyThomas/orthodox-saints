works:
  - title: The Institutes of Cenobitic Life
    desc: Twelve books describing the customs of Palestinian and Egyptian monasticism and treating the eight principal passions and their remedies.
    date: c. 417–419
  - title: The Conferences of the Desert Fathers
    desc: Twenty-four dialogues recording the spiritual teaching of the Egyptian elders on prayer, discernment, and the inner life.
  - title: On the Incarnation of the Lord
    desc: A doctrinal work written against the teaching of Nestorius.
    date: c. 431
