id: OS-2133
lifespan: 4th century (traditionally dated to c. 355, under Shapur II, r. 309/310–379)
overview:
  - Acindynus, Pegasius, Aphthonius, Elpidephorus, Anempodistus, and the seven thousand commemorated with them were Christians of the Sasanian Persian empire who suffered martyrdom during the persecution of King Shapur II (reigned 309/310–379). The named leaders held positions as courtiers in Shapur's service while secretly professing the Christian faith.
  - According to their synaxarion account, the group was denounced to the king by envious pagans. Brought to trial, they openly confessed their faith in the Holy Trinity and endured torture, imprisonment, and execution. In the course of their martyrdom the sources report that some seven thousand accompanying Christians were killed, together with the torturer Aphthonius (who converted when boiling lead failed to harm the martyrs) and the king's own mother, who is said to have embraced the faith.
  - The Orthodox Church commemorates the martyrs together on November 2.
sections:
  - heading: Historical Setting
    body:
      - The martyrdom is set within the great persecution of Christians launched by the Sasanian king Shapur II. After the Roman emperor Constantine I embraced Christianity, Shapur came to regard his Christian subjects with suspicion as potential agents of a hostile foreign power, and persecution intensified during his wars against Rome.
      - Contemporary and later accounts describe the persecution as vast in scale. The 5th-century church historian Sozomen estimated upwards of sixteen thousand documented martyrs, with many more unrecorded. Named victims of the wider persecution include Shemon Bar Sabbae, patriarch of the Church of the East, his successors Shahdost and Barba'shmin, and Bishop Barbasceminus of Seleucia-Ctesiphon, executed with sixteen of his clergy in 346.
      - Within this setting the courtiers Acindynus, Pegasius, and Anempodistus, who had served at Shapur's court as secret Christians, were denounced and brought before the king.
  - heading: Trial and Martyrdom
    body:
      - Standing before the king, the martyrs fearlessly confessed their faith, declaring the Most Holy Trinity, one in essence and undivided, to be their true homeland and life. Shapur ordered them beaten with whips, and they were subjected to further tortures and imprisonment.
      - Their synaxarion relates that during their sufferings the torturer Aphthonius witnessed a miracle when boiling lead failed to harm the martyrs; he confessed Christ and was immediately executed. The accounts also describe the king ordering the martyrs sewn into skins and cast into the sea, from which they were delivered, and record visions said to have sustained them in prison.
      - The king commanded that Acindynus, Pegasius, Anempodistus, and Elpidephorus be led outside the city for execution. Elpidephorus, described as a royal noble, denounced the slaughter of innocent Christians and was beheaded; during the procession the soldiers are said to have killed some seven thousand accompanying believers. The remaining named martyrs were burned in a furnace, together, by tradition, with a company of soldiers and the king's mother, who had come to believe. Christians afterward recovered the bodies, found them unharmed by the fire, and buried them with reverence.
  - heading: Traditional Accounts
    body:
      - "The fuller synaxarion narrative carries several elements preserved as tradition: the appearance of Christ with a face radiant as the sun and of comforting angels during the martyrs' imprisonment; the failure of boiling lead to harm them, which converted the torturer Aphthonius; the martyrs being sewn into animal skins and cast into the sea, from which Saint Aphthonius is said to have appeared with three angels to lead them to safety; and the conversion of twenty-eight (in some accounts) soldiers and of the king's mother, who suffered with them. The details and the number of the seven thousand are handed down through the hagiographical tradition rather than independent historical record."
timeline:
  - when: 309/310–379
    title: Reign of Shapur II
    body: Shapur II rules the Sasanian empire; after Constantine I's conversion he grows distrustful of Christian subjects and persecution intensifies during his wars with Rome.
  - when: c. 355 (traditional)
    title: Denunciation and trial
    body: The courtiers Acindynus, Pegasius, and Anempodistus, secret Christians at Shapur's court, are denounced by pagans, brought before the king, and confess their faith in the Holy Trinity.
  - when: During the persecution
    title: Conversion of Aphthonius
    body: The torturer Aphthonius, witnessing the martyrs unharmed by boiling lead, confesses Christ and is executed.
  - when: During the persecution
    title: Execution of Elpidephorus and the seven thousand
    body: Elpidephorus, a royal noble, denounces the killing of Christians and is beheaded; the accounts report some seven thousand accompanying believers slain during the procession to execution.
  - when: During the persecution
    title: Burning of the martyrs
    body: The remaining named martyrs are burned in a furnace, by tradition with a company of soldiers and the king's mother; Christians recover their bodies unharmed by the fire and bury them.
