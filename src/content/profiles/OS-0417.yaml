    note: His fellow-soldier and Christian friend, whose zeal moved him to convert and who, by tradition, recorded the account of his martyrdom.
  - name: Venerable Euthymius the Great
    note: By tradition born in 376 to parents who prayed for a child at the church of St. Polyeuktos in Melitene.
