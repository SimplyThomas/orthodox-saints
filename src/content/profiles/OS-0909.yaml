id: OS-0909
liturgicalTitle: Our Venerable Father Hypatius the Healer of the Kiev Caves
overview:
- Venerable Hypatius the Healer was a monk of the Kiev Caves who is remembered for his strict ascetic life and for the gift of healing he received in his service to the sick. The surviving synaxarion notices of his life are brief, and they do not record his birth, his repose, or the precise dates of his labors.
- According to these accounts, Hypatius attained spiritual renown through severe fasting and prayerful vigilance. He stood at prayer through the night, slept very little, and ate only bread and water. He devoted himself entirely to caring for the infirm, and the sick of various illnesses often turned to his intercession.
sections:
- heading: Ascetic Life and Healing
  body:
  - The accounts of Hypatius emphasize the rigor of his monastic discipline. He kept vigil by night, taking little sleep, and restricted his food to bread and water. This austerity is presented as the foundation of the spiritual gift attributed to him.
  - Hypatius is said to have devoted himself wholly to the service of the sick and to have received from God the gift of healing. Those suffering from various illnesses sought his prayers, and it is for this ministry that he is surnamed 'the Healer.'
- heading: Relics and Commemoration
  body:
  - The relics of Venerable Hypatius repose in the Far Caves of the Kiev Caves Lavra, associated with Saint Theodosius. He is numbered among the holy fathers of the Far Caves and is commemorated collectively with them on August 28, the Synaxis of the Saints of the Far Caves, in addition to his individual feast on March 31.
