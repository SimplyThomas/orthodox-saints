  - name: James the Confessor, Bishop of Catania
    note: Later holder of the same see of Catania, an eighth-century confessor of the holy icons.
    href: saint/OS-0856
patronage:
  - Sicily and the church of Catania
  - Those who pray for clean or healthful water
