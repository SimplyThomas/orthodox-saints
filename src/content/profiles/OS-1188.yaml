lifespan: d. 1594/1595
liturgicalTitle: The Holy Hieromartyr Theodore, Bishop of Vršac
overview:
  - Theodore (Teodor Nestorović) was the Serbian Orthodox Bishop of Vršac, in the Banat region, during the late sixteenth century. He is remembered as the hierarch who led the Banat Uprising of 1594, a Serbian revolt against Ottoman rule that broke out amid the Long War between the Habsburg Empire and the Ottoman Empire (1593–1606).
  - After the rebellion was suppressed, Theodore was captured and put to death with great brutality. The Serbian Orthodox Church venerates him as a hieromartyr, a bishop who died for the faith and for his people, and commemorates him on May 16 (Julian calendar).
timeline:
  - when: 1593–1594
    title: Leads the Banat Uprising
    body: As bishop of Vršac, Theodore took up the leadership of a Serbian revolt against Ottoman occupation in the Banat. According to the sources, he organized the uprising together with figures such as Sava Ban and the voivode Velja Mironić, and the rebels are said to have carried images of Saint Sava as their war banners. The insurgents won initial successes and liberated a number of towns and villages of the Banat, including Vršac.
  - when: "1594"
    title: Defeat and flight to Transylvania
    body: The uprising was ultimately defeated by Ottoman forces. By tradition, Theodore and a large body of people withdrew across the border into Transylvania to escape reprisals.
  - when: 1594/1595
    title: Capture and martyrdom
    body: According to the accounts, the Ottoman commander Sinan Pasha of the Temešvar Eyalet secured Theodore's return through a promise to spare the civilian population, and then seized him. He was subjected to an extremely cruel death—the sources relate that he was flayed and burned.
  - when: "1994"
    title: Canonization
    body: The Serbian Orthodox Church formally canonized Theodore on May 29, 1994, recognizing him as Saint Hieromartyr Theodore, Bishop of Vršac.
sections:
  - heading: Historical Context
    body:
      - The Banat Uprising took place during the early years of the Long War (1593–1606), in which the Habsburg Empire and its allies fought the Ottoman Empire across the Balkans and Hungary. The Serbian population of the Banat, then under Ottoman administration, rose in revolt in hope of relief from Ottoman pressure.
      - Theodore's leadership of the revolt as a serving bishop has made him an enduring figure in Serbian memory, where his martyrdom is held up as an example of suffering under Ottoman rule. The accounts that survive emphasize his role as both ecclesiastical shepherd and rallying leader of his people rather than preserving a full biography of his earlier life.
