id: OS-0634
lifespan: died c. 316
overview:
  - Blaise (Greek Βλάσιος) was Bishop of Sebaste in Lesser Armenia (modern Sivas, Turkey) in the early fourth century, and is remembered as both a hieromartyr and an unmercenary healer. By tradition he trained and practiced as a physician before his consecration, and was said to heal the ailments of both people and animals, especially infants, without taking payment.
  - During the persecution under the Emperor Licinius, carried out locally by the governor Agricola (also given as Agricolaus), Blaise withdrew to a cave on Mount Argeos to pray in solitude. The synaxarion relates that wild beasts came to him there in herds to receive his blessing, and that he healed those among them that were sick. He was arrested at the cave around 316.
  - "He is invoked especially for ailments of the throat and for the protection of livestock, a patronage rooted in two episodes from his vita: the healing of a boy choking to death on a fishbone, and the return of a poor widow's pig that had been carried off by a wolf. After torture he was beheaded, and is counted among the most widely venerated saints of the later Christian world."
sections:
  - heading: Bishop and Healer
    body:
      - According to tradition Blaise was born in Sebastea and trained as a physician, practicing medicine — sources report with miraculous results — before he was consecrated Bishop of Sebaste. The Eastern tradition numbers him among the unmercenaries, healers who gave their services without payment, and records that he healed the diseases of both men and beasts, especially infants.
      - When persecution came under Licinius, enforced in the region by the governor Agricola, Blaise withdrew to a cave on Mount Argeos for prayer and solitude. There, the synaxarion relates, wild animals came to him to be blessed, and he tended those that were sick — an episode that became central to his iconography and to his patronage of livestock.
  - heading: Arrest, Miracles, and Martyrdom
    body:
      - Blaise was arrested at the cave around 316. As he was being led to prison, a mother brought her son who was choking to death on a fishbone, and Blaise healed him; this episode is the origin of his invocation against throat ailments. During his imprisonment a poor widow whose pig had been stolen by a wolf brought him food, and the saint blessed her, after which the wolf returned the animal.
      - The governor Agricola pressed Blaise to renounce Christianity. When the saint refused, he was beaten, his flesh was torn with iron combs resembling the tools used to comb wool, and he was finally beheaded. He is recorded as having died in 316. Two children and seven women who were martyred with him are commemorated alongside him.
  - heading: Veneration and Legacy
    body:
      - Blaise is counted among the Fourteen Holy Helpers (or Fourteen Holy Martyrs), and became one of the most popular saints of the Middle Ages. His veneration, originally Eastern, had spread to Europe by the ninth century.
      - The Eastern Orthodox Church commemorates him on February 11; in the Latin Church his feast is February 3, and the Armenian Apostolic Church keeps it in January. The note in the anchor record cautions that he is distinct from the Martyr Blaise the Shepherd of Caesarea in Cappadocia.
  - heading: Relics & Shrines
    body:
      - Multiple churches claimed relics of Blaise, including those at Taranto and at a Black Forest abbey. Dubrovnik (Ragusa), of which he is patron saint, preserves what tradition holds to be his skull, a fragment of bone from his throat, and his right and left hands, kept in reliquaries. A basilica on Monte San Biagio in Maratea, Italy, also claims his remains.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: The biographical details of Blaise's life derive from legendary Acts that lack independent historical verification. The New Advent Catholic Encyclopedia notes that it can perhaps be assumed only that he was a bishop and suffered martyrdom at the beginning of the fourth century, with the fuller narrative resting on tradition rather than corroborated record."
      - "Traditional Accounts: The vita relates the wild beasts coming to the saint's cave for his blessing, the healing of the boy choking on a fishbone, and the widow's pig restored by the wolf. From these accounts derive his patronage of throats and of livestock. The Western Blessing of Saint Blaise applies two candles — blessed at the feast of the Presentation and held crossed over the throat — or consecrated oil, with prayers for protection from throat ailments. His iconography typically shows him with the iron combs of his torture, surrounded by wild beasts, or tending a choking child; the wool-comb imagery also made him a patron of wool combers."
patronage:
  - Ailments and diseases of the throat
  - Protection of livestock and domestic animals
  - Wool combers
  - City of Dubrovnik (Ragusa)
