    title: Birth (by later account)
    body: By later tradition, Dodo is born, said to belong to the Georgian noble house of Andronikashvili; he embraces the monastic life from an early age. The date is approximate and reported only in later sources.
  - when: Early life
    title: Hermit at Ninotsminda
    body: Before his association with David, Dodo labors as a hermit at Ninotsminda in the Kakheti region, seeking solitude and poverty.
  - when: 6th century
    title: Joins David at Gareji
    body: Learning of David of Gareji's miraculous works, Dodo travels to the Gareji wilderness, becomes David's companion, and helps develop the rock-hewn monastic settlement.
  - when: 6th century
    title: Monastic foundations
    body: Together with the disciple Lukiane, Dodo expands the original lavra and founds further communities, including 'Dodo's Rka' (the horn of Dodo) and Natlismtsemeli, dedicated to John the Baptist.
  - when: c. 623
    title: Repose (by later account)
    body: By later tradition his death occurs around 623. The date is approximate; the secure dating of his life is the sixth century.
