id: OS-1078
sources:
  - OCA Synaxarion (oca.org), Lives of the Saints
  - https://orthodoxwiki.org/Nectarius_of_Optina
  - https://www.oca.org/saints/lives/2000/04/29/149001-venerable-nectarius-of-optina
lifespan: c. 1853 – 1928
liturgicalTitle: Our Venerable Father Nectarius, Elder of Optina
overview:
  - Nectarius of Optina was a Russian hieromonk and the last of the celebrated Optina Elders, a succession of monastic spiritual fathers attached to Optina Monastery whose counsel drew pilgrims from across late imperial Russia. Born Nicholas Tikhonov in the city of Yelets in the Orel province, he entered Optina in 1876 and spent his formative decades under the guidance of the monastery's foremost elders before himself being chosen to continue their tradition.
  - His eldership coincided with the collapse of the old order and the Bolshevik suppression of monastic life. Arrested when Optina was closed and exiled to a village in the Bryansk region, he continued to receive visitors until his repose in 1928. He was glorified as a saint at the end of the twentieth century, and his relics were returned to Optina.
timeline:
  - when: c. 1853
    title: Birth in Yelets
    body: Born Nicholas, son of Basil and Elena Tikhonov, in the city of Yelets in the Orel province. The year of his birth is uncertain and is variously given as 1853, 1857, or 1858.
  - when: "1876"
    title: Entry to Optina
    body: Entered Optina Monastery, where he came under the spiritual direction of Elder Ambrose and, for some twenty years, of Anatolius (Zertsalov), his principal spiritual father.
  - when: "1887"
    title: Monastic tonsure
    body: Received the mantia and the monastic name Nectarius.
  - when: 1894–1898
    title: Ordination
    body: Ordained deacon in 1894 and ordained hieromonk in 1898 by Bishop Macarius of Kaluga.
  - when: "1913"
    title: Chosen as elder
    body: When the Optina monks gathered to choose a new elder, the office was first offered to Archimandrite Agapit, who instead nominated Hieromonk Nectarius. Nectarius at first declined but was directed to accept, becoming the last of the great Optina Elders.
  - when: "1923"
    title: Closure of Optina and arrest
    body: Before Pascha the Bolsheviks closed Optina Monastery. Nectarius was arrested and held in the prison hospital at Kozelsk, then released and resettled in the home of a peasant in the village of Kholmischcha in the Bryansk region.
  - when: "1928"
    title: Repose
    body: Reposed on April 29, 1928, at Kholmischcha.
sections:
  - heading: Relics & Shrines
    body:
      - On July 16, 1989, the relics of Nectarius were translated to Optina Monastery and placed in the Cathedral of the Entry of the Mother of God into the Temple.
  - heading: Glorification
    body:
      - Nectarius was glorified by the Russian Orthodox Church Outside Russia in 1990. Within the Moscow Patriarchate, local veneration was authorized on June 13, 1996, and he was glorified for general veneration on August 7, 2000.
      - He is commemorated on April 29 and, together with all the Optina Elders, on October 11.
companions:
  - name: Saint Ambrose of Optina
    note: The renowned Optina elder under whose direction the young Nectarius first came at the monastery
