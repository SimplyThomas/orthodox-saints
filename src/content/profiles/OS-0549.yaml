id: OS-0549
liturgicalTitle: The Holy Hieromartyr Theodore of Ajara
lifespan: 9th century
overview:
  - Theodore of Ajareli was a Georgian priest venerated as a hieromartyr, commemorated on January 26. He is remembered for an act of self-sacrifice in the defense of his homeland during a time of invasion.
  - By the tradition received in the Georgian Church, when his land was threatened by invaders he deliberately misled them, leading them astray to save his people, and for this he was put to death. Little more is preserved of his life in the available accounts.
status: reviewed
