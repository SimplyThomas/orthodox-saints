id: OS-1740
lifespan: ""
overview:
  - Venerable Christodoulos the Philosopher was a Georgian churchman from the village of Sakara in the Imereti region of Georgia. He is remembered as a great Church figure and philosopher distinguished by his exceptional command of the Holy Scriptures and his fluency in several languages.
  - To prepare himself for comparative theological work, Christodoulos studied other religious traditions in depth, even memorizing the Koran, so that his learning in Scripture, languages, and philosophy could be placed in the service of Christian teaching. Church historians hold that he labored first in Georgia, then on Mount Athos, and afterward on the island of Patmos. He is commemorated on August 18.
liturgicalTitle: Our Venerable Father Christodoulos the Philosopher
sections:
  - heading: The Theological Debate
    body:
      - According to the OCA Synaxarion, the Persian king Iamame arranged a theological debate between Muslims and Christians and invited Christodoulos to take part. Christodoulos debated the king himself and prevailed.
      - A pagan astrologer was then brought forward to take the king's place as interlocutor, but he too proved unable to match the philosopher. Finally a renowned scholar was summoned, yet Christodoulos again prevailed, drawing on his command of both Scripture and the Koran and employing his skill in logic and rhetoric.
  - heading: Monastic Labors
    body:
      - Church historians believe Christodoulos labored first in Georgia, then relocated to Mount Athos, and subsequently to the island of Patmos.
      - Historical records indicate that he labored with the monks of the Iviron Monastery on Mount Athos. This connection is attested in the work Pilgrimage by the 19th-century historian Archbishop Timote. Iviron, established between roughly 980 and 983 by the Georgian monks John the Iberian and John Tornike, was a center of Georgian religious culture during the Middle Ages, placing Christodoulos within the broader Georgian monastic tradition at Athos.
      - He is distinct from Christodoulos of Patmos (died 1093), the founder of the Monastery of Saint John the Theologian on Patmos.
