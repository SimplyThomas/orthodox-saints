flagReasons:
  - claim: Llanon is a village named after Non.
    detail: Neither Wikipedia nor OrthodoxWiki explicitly states that Llanon is named after Non. Wikipedia calls it 'what is now called Llanon' without attribution; OrthodoxWiki merely mentions 'Llanon' as where David was raised. The naming claim is an unsupported inference.
  - claim: The Chapel of St Non (Capel Non) marks the traditional site of David's birth.
    detail: Wikipedia says 'The Chapel of St Non marks her birthplace at Capel Non in Pembrokeshire' — i.e., Non's birthplace, not David's. OrthodoxWiki says 'The birthplace in South Wales is now called Capel Non' without specifying whose birthplace. The profile reverses the attribution.
  - claim: Non is patroness of Mothers.
    detail: The dossier does not support this patronage. Wikipedia lists her as 'patroness of raped women and the village of Pelynt'; OrthodoxWiki makes no mention of patronage of mothers. 'Mothers' is an unsupported addition.
