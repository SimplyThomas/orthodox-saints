  - name: St. Sisoes the Great
    note: Fellow Desert Father of the Egyptian desert whose sayings are gathered alongside Pimen's in the Apophthegmata Patrum.
    href: saint/OS-1482
  - name: St. Arsenius the Great
    note: Fellow Desert Father of Scetis whom Abba Pimen revered; their counsels stand together in the Sayings of the Desert Fathers.
