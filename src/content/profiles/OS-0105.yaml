  - when: c. 490
    title: Repose
    body: Victorius dies on the first of September around the year 490; he is succeeded in the see of Le Mans by Turibius.
  - when: from the 7th century
    title: Veneration at his basilica
    body: A basilica dedicated to the saint becomes the center of his veneration at Le Mans.
