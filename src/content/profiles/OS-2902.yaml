    title: Birth at Nola
    body: Felix is born at Nola in Campania to Hermias, a retired Syrian centurion.
  - when: c. 249–251
    title: Confession under Decius
    body: During the persecution of Decius, Felix is arrested and beaten for the faith after Bishop Maximus withdraws to the mountains; by tradition he is freed to aid the ailing bishop.
  - when: "251"
    title: Death of Decius
    body: Felix and Maximus emerge from hiding after the emperor's death.
  - when: after 251
    title: Declines the episcopate
    body: Following the death of Maximus, Felix refuses election as bishop in favor of the senior priest Quintus and remains a priest, farming and giving to the poor.
  - when: c. 260
    title: Repose
    body: Felix dies at Nola, some accounts placing his death under the emperor Valerian; he is buried at Cimitile.
