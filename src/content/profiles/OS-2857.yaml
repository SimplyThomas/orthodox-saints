  - claim: During his solo hermit period, Niphon lived on a diet of grass and berries
    detail: The dossier's grass-and-berries detail comes exclusively from the shared period with Serapion. External source 1 says 'Together they shared... their food consisted of grass and berries'; external source 2 similarly attributes the diet to the joint life. No source attests this diet for Niphon's solo anchorite period before Serapion's arrival.
