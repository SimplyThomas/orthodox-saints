    title: A landowner of Bethlehem
    body: Boaz, son of Salmon and a relative of Elimelech, lives as a wealthy landowner in Bethlehem of Judea.
  - when: Harvest season
    title: Ruth gleans in his fields
    body: Ruth the Moabite gathers grain among Boaz's harvesters; hearing of her loyalty to Naomi, he shows her kindness and protection.
  - when: At the threshing floor and city gate
    title: Redemption and marriage
    body: After a nearer kinsman declines the claim, Boaz redeems Elimelech's estate at the city gate and takes Ruth as his wife.
  - when: Old Testament era
    title: Birth of Obed
    body: Boaz and Ruth have a son, Obed, who becomes the father of Jesse and grandfather of King David, placing Boaz in the ancestry of Christ.
