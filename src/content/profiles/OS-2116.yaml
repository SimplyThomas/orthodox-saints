timeline:
  - when: "1253"
    title: Birth
    body: Born the youngest son of King Stefan Uroš I and Queen Helen, and grandson of the first-crowned King Stephen.
  - when: "1282"
    title: Becomes king
    body: Succeeds to the throne after his brother Stefan Dragutin transfers power to him; rules as King of all Serbian and Maritime lands.
  - when: c. 1285
    title: Novo Brdo silver mining
    body: Establishes Novo Brdo as a major silver-mining center, strengthening the kingdom's economy.
  - when: "1291"
    title: Victory over Bulgarian lords
    body: Defeats the Bulgarian feudal lords Darman and Kudelin; founds Vitovnica Monastery the same year.
  - when: "1299"
    title: Peace with Byzantium
    body: Concludes a peace treaty with the Byzantine Empire, sealed by marriage to Simonis, daughter of Emperor Andronikos II, retaining conquered Macedonian lands as dowry.
  - when: "1312"
    title: Jerusalem foundation and Gallipoli
    body: Establishes the Serbian Monastery of the Holy Archangels in Jerusalem; Serbian troops aid Andronikos II against Turkish forces at the Battle of Gallipoli.
  - when: "1321"
    title: Gračanica and death
    body: Founds Gračanica Monastery; dies on October 29, 1321, at the age of 68.
  - when: c. 1460
    title: Translation of relics
    body: His remains are carried from Hilandar to Bulgaria and eventually transferred to St Nedelya Church in Sofia.
