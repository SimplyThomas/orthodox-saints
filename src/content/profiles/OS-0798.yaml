- when: early life
  title: Origins in Burgundy
  body: Felix was born in the Frankish kingdom of Burgundy and was ordained a priest in Gaul before undertaking his mission to England.
- when: c. 630
  title: Sent to the East Angles
  body: Archbishop Honorius of Canterbury consecrated Felix and sent him to East Anglia to assist King Sigeberht in establishing Christianity, making Felix the first bishop of the kingdom of the East Angles.
