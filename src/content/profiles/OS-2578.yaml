id: OS-2578
lifespan: 1st century (died between c. AD 54 and 80)
patronage:
  - Missionary work
  - Preaching to Greek-speaking peoples
  - Asia Minor
overview:
  - Philip was one of the Twelve Apostles of Christ, a native of Bethsaida in Galilee, the same city as the Apostles Andrew and Peter. He bore a Greek name and is thought to have spoken Greek, a background that positioned him as a bridge to Greek-speaking communities. According to the Gospel of John, Jesus found and called Philip directly (John 1:43), without the intermediary of John the Baptist mentioned in some other apostolic callings.
  - Philip figures more prominently in the Gospel of John than in the Synoptic Gospels, though the lists of the Twelve in Matthew, Mark, Luke, and Acts consistently name him fifth. After the Ascension he preached across Galilee, Greece, Phrygia, and neighboring regions, and by tradition was martyred by crucifixion at Hierapolis in Phrygia. He is commemorated on November 14 and again among the Synaxis of the Twelve Apostles on June 30.
sections:
  - heading: Gospel Episodes
    body:
      - Several episodes in the Gospel of John center on Philip. Having been called by Jesus, Philip in turn introduced Nathanael (identified in tradition with the Apostle Bartholomew) to Christ. During the feeding of the five thousand, Jesus tested Philip by asking how the crowd might be fed (John 6:6). Philip also facilitated a group of Greek pilgrims who wished to meet Jesus, bringing their request to Andrew. At the Last Supper, Philip asked Jesus to show the disciples the Father, prompting Christ's teaching on the unity of the Father and the Son.
      - The synaxarion relates that Philip possessed a deep knowledge of the Scriptures and awaited the coming of the Messiah before he was called.
  - heading: Apostolic Mission and Martyrdom
    body:
      - After the Ascension, according to tradition preserved in the Acts of Philip, the apostle was sent to preach in Greece, Phrygia, and Syria, accompanied by his sister Mariamne and the Apostle Bartholomew. Sources record his preaching across Galilee, Greece, Parthia, and other regions, including Azotus and the cities of Hierapolis in Syria and Hierapolis in Phrygia, and relate that his preaching was accompanied by miracles.
      - At Hierapolis in Phrygia, Philip and Bartholomew were crucified upside-down on the orders of the local prefect (named in the synaxarion as Amphipatos). The tradition recounts that an earthquake occurred during the crucifixion and that Philip preached from his cross. Through his prayers those present were spared, and Philip died upon the cross. His sister Mariamne buried him and continued to preach. Historical sources place his death between about AD 54 and 80.
  - heading: Relics & Shrines
    body:
      - "Philip's relics are venerated in the crypt of the Basilica of Santi Apostoli in Rome. In 2011 the Italian archaeologist Francesco D'Andria reported the discovery of the apostle's tomb during excavations at ancient Hierapolis: a first-century tomb, found empty of relics, at the center of a fifth-century basilica complex."
