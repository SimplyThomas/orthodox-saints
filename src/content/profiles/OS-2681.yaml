id: OS-2681
lifespan: Reposed 235, Sardinia
liturgicalTitle: The Holy Hieromartyr Pontian, Pope of Rome
overview:
  - Pontian was Bishop of Rome from 21 July 230 to 28 September 235, the eighteenth to hold the see, succeeding Urban I. A native of Rome, he was the son of a man named Calpurnius, and his episcopate began peacefully during the reign of the emperor Severus Alexander.
  - In 235 the emperor Maximinus Thrax opened a persecution directed against the leaders of the Church. Pontian was arrested and exiled to the mines of Sardinia, a condition regarded as a de facto death sentence because of the brutality of the labor, and he died there of mistreatment and privation later that year.
  - He is remembered as the first Bishop of Rome to resign his office, stepping down on 28 September 235 so that an orderly succession could proceed while he faced certain death in exile. In the Eastern Orthodox Church his feast is kept on 13 August, the day of his burial in Rome.
timeline:
  - when: 21 July 230
    title: Elected Bishop of Rome
    body: Pontian, a Roman and son of Calpurnius, succeeded Urban I as the eighteenth Bishop of Rome. His pontificate began during the peaceful reign of the emperor Severus Alexander.
  - when: c. 230–231
    title: Roman synod on Origen
    body: Pontian presided over a synod at Rome that concurred with the condemnation of the teachings of Origen already issued by Demetrius I of Alexandria.
  - when: "235"
    title: Exile to Sardinia under Maximinus Thrax
    body: When Maximinus Thrax began a persecution targeting Church leaders, Pontian and the rival claimant Hippolytus were both arrested and banished to the Sardinian mines.
  - when: 28 September 235
    title: Resignation of the episcopate
    body: Pontian resigned his office — recorded in the Liberian Catalogue as 'discinctus est' — the first Bishop of Rome to do so, allowing an orderly succession. Anterus followed him.
  - when: October 235
    title: Death in the mines
    body: Pontian died in Sardinia from the mistreatment and hardship of the mines.
  - when: 236 (13 August)
    title: Return and burial in Rome
    body: Under Pope Fabian, Pontian's body was retrieved from Sardinia and buried in the papal crypt of the Catacomb of Callistus on the Appian Way; the date of his deposition, 13 August, became his feast.
sections:
  - heading: Historical Context
    body:
      - Pontian led the Roman Church during a period bracketed by relative calm and sudden violence. Under Severus Alexander the community was left largely undisturbed, but the accession of Maximinus Thrax in 235 brought a persecution aimed specifically at the clergy and leaders of the Church rather than the faithful at large. It was in this campaign that Pontian was seized and deported.
      - During his tenure the doctrinal controversy over Origen of Alexandria reached Rome. Pontian convened a synod, dated variously to about 230–232, which endorsed the condemnation of Origen's teaching that had been pronounced by Demetrius I of Alexandria — an early instance of Rome acting in concert with the Alexandrian church on a question of doctrine.
  - heading: The Schism of Hippolytus and its Reconciliation
    body:
      - "For nearly two decades the Roman Church had been divided by the party of Hippolytus, who had headed a rival faction. Pontian and Hippolytus were exiled together to Sardinia in 235, and the shared condition of their banishment appears to have brought the long schism to an end: Hippolytus reconciled with Rome before his death."
      - The two men died in the Sardinian mines, and their common suffering in exile is remembered as the occasion that healed the division. In the West both are honored together on 13 August.
  - heading: Relics & Shrines
    body:
      - Pope Fabian had his remains and those of Hippolytus brought back from Sardinia to Rome, probably in 236. Pontian was interred in the papal crypt of the Catacomb of Callistus on the Appian Way.
      - His original tomb slab was discovered in 1909, bearing a Greek inscription reading 'PONTIANOS EPISK MARTUR' — 'Pontian, Bishop, Martyr.' He is listed under 13 August in the 'Depositiones martyrum' of the Chronography of 354. Churches dedicated in his honor include San Ponziano in Rome, with others at Spoleto, Lucca, and Carbonia in Sardinia.
  - heading: Commemoration
    body:
      - The Eastern Orthodox Church observes Pontian's feast on 13 August, the day of his deposition in Rome. In the West his feast was long kept on 19 November before being moved; the Roman Martyrology and the Catholic Church now commemorate him together with Hippolytus on 13 August.
