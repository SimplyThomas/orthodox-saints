    body: By tradition Lazarus settles in Cyprus, where the Apostles Paul and Barnabas ordain him first bishop of Kition (Larnaca).
  - when: c. 890
    title: Relics rediscovered
    body: His tomb is found at Kition in a marble coffer inscribed 'Lazarus, the friend of Christ.'
  - when: "898"
