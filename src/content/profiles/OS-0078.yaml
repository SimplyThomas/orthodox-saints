patronage:
  - Invoked in grief and bereavement and in the face of death, as the friend of Christ raised from the tomb whose resurrection foreshadows the general resurrection.
  - Honored as patron of the city of Larnaca in Cyprus, the site of his episcopate, repose, and tomb.
