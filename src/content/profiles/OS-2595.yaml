  - when: 1 January 1931
    title: Birth in Crete
    body: Born Constantine (Konstantinos) Saridakis at Ethia in Crete, the eighth child of a poor and faithful family. The Nazi occupation of his childhood left him without formal education.
  - when: c. 1948
    title: Monastic tonsure
    body: At about the age of seventeen he entered a monastery near his village and was tonsured a monk, receiving the name Sophronios.
  - when: "1954"
    title: Onset of leprosy
    body: While serving in the Greek military he contracted leprosy (Hansen's disease) and was transferred to the Saint Barbara Hospital for Infectious Diseases in Athens.
  - when: 1957–1964
    title: Discipleship under Saint Nikephoros the Leper
    body: Saint Nikephoros the Leper arrived at the Athens hospital in 1957 and became his spiritual guide until Nikephoros's death in 1964.
  - when: "1975"
