id: OS-0052
lifespan: 1906–1991
liturgicalTitle: Our Venerable Father Porphyrios the Kafsokalyvite, the Wonderworker
overview:
  - St. Porphyrios of Kafsokalivia (1906–1991), born Evangelos Bairaktaris, was a Greek Athonite elder renowned for spiritual discernment and clairvoyance. Born in the village of Agios Ioannis in the Evia province, he received only two years of formal schooling and worked from childhood on the family farm, in coal mines, and as a grocer's assistant before being drawn to monasticism after reading about Saint John the Hut-Dweller.
  - Tonsured a monk at fourteen at the Athonite skete of Kafsokalyvia, he was later ordained priest and served for roughly three decades as a hospital chaplain in Athens. He counseled countless visitors who sought his guidance, and after returning to Mount Athos in 1984 he resumed monastic life in his original cell, where he reposed in 1991.
  - He was glorified by the Ecumenical Patriarchate of Constantinople in 2013 and is venerated as a Wonderworker, with his feast kept on December 2.
