id: OS-1108
liturgicalTitle: The Holy, Glorious Great Martyr Xenia of Kalamata, the Newly-Revealed
lifespan: c. 291 - 318
overview:
  - >-
    Xenia of Kalamata was a Christian woman of the Peloponnese, in southern
    Greece, who is venerated as a great martyr for confessing Christ and
    refusing to renounce her faith during the persecutions of the late third and
    early fourth centuries. The tradition places her birth at Kalamata around the
    year 291 and her martyrdom there on May 3, 318. She is commemorated on May 3.
  - >-
    According to her synaxarion, Xenia was born to devout Christian parents named
    Nicholas and Despina, who had come from Italy. She drew the attention of the
    local magistrate, called Dometian (or Domitianos), who sought to take her as
    his wife. When she refused him because he would not accept Christ and remained
    an idolater, she was imprisoned, abused, and subjected to severe tortures
    before being put to death. The account relates that numerous miracles
    accompanied her sufferings, leading pagan onlookers to embrace Christianity.
  - >-
    Although she was held in obscurity for centuries, Xenia is known in Orthodox
    tradition as "the Newly-Revealed," after her veneration was renewed in the
    twentieth century. She should not be confused with Saint Xenia of Rome
    (also called Eusebia) or with the much later Saint Xenia of Saint Petersburg,
    the fool-for-Christ; these are distinct saints.
timeline:
  - when: c. 291
    title: Birth at Kalamata
    body: >-
      By tradition Xenia was born at Kalamata in the Peloponnese to Christian
      parents, Nicholas and Despina, who are said to have come from Italy.
  - when: early 4th c.
    title: Refusal of the magistrate and imprisonment
    body: >-
      The local magistrate Dometian sought to marry her; when she refused him on
      account of his idolatry and her confession of Christ, she was imprisoned
      and subjected to abuse and torture.
  - when: May 3, 318
    title: Martyrdom at Kalamata
    body: >-
      The synaxarion relates that after enduring severe tortures, during which
      miracles were reported, Xenia was put to death, receiving the crown of
      martyrdom.
  - when: 20th c.
    title: Renewal of veneration as "the Newly-Revealed"
    body: >-
      Her veneration was renewed in the twentieth century after her account was
      identified in the multi-volume Greek synaxarion; a chapel was built in her
      honor near Kalamata in 1993.
sections:
  - heading: Martyrdom under persecution
    body:
      - >-
        Xenia's surviving account belongs to the genre of the early martyr-lives
        and is preserved in the Greek synaxaria. By tradition she was sought in
        marriage by Dometian, the magistrate (eparch) of Kalamata, who is
        described as a pagan. Her refusal to renounce Christ and join herself to
        an idolater led to her arrest.
      - >-
        The synaxarion describes a series of tortures inflicted on her, and
        relates that miracles accompanied her sufferings — including the healing
        of her wounds and the destruction of pagan idols — which moved a number
        of onlookers to confess Christ. She was ultimately put to death, by
        tradition on May 3 of the year 318.
  - heading: "The Newly-Revealed Martyr"
    body:
      - >-
        Xenia is distinguished in Orthodox usage by the title "the
        Newly-Revealed," reflecting that her memory had largely faded for
        centuries before being renewed in the twentieth century. Orthodox sources
        recount that she made herself known to a Greek-American priest, Father
        George Nasis of the Annunciation Greek Orthodox Church in New York, who
        had an icon of her painted depicting her holding a cross. Her account was
        subsequently located in the "Megas Synaxaristes," the large multi-volume
        Greek collection of saints' lives.
      - >-
        A chapel dedicated to her was built west of the city of Kalamata in 1993
        as a dependency of the parish of the Holy Trinity.
patronage:
  - Those who suffer for confessing the faith
  - The city and region of Kalamata
