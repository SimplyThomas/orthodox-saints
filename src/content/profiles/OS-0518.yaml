id: OS-0518
liturgicalTitle: The Holy Hieromartyr Clement, Bishop of Ancyra, and the Martyr Agathangelus
lifespan: Clement c. 258 – c. 312
overview:
  - Clement was the bishop of Ancyra, the chief city of the Roman province of Galatia in Asia Minor, who according to his synaxarion endured roughly twenty-eight years of imprisonment and torture during the Great Persecution before being martyred. He is commemorated on January 23 together with Agathangelus, a younger companion who joined him in confession and shared in his sufferings.
  - By tradition Clement was born at Ancyra in 258 to a pagan father and a Christian mother. Orphaned young, he was raised in the Christian faith and led an ascetic life from boyhood. Sources relate that he advanced through the ranks of reader and deacon and was consecrated bishop of Ancyra at about the age of twenty. With the outbreak of the persecution under Diocletian his long ordeal of arrest, interrogation, and torment began.
  - The accounts describe Clement being carried from one place to another over many years — passing through Rome, Nicomedia, Amasea, and Tarsus — and being subjected to repeated tortures by a succession of governors and officials, yet never renouncing Christ. Agathangelus, a convert won during this imprisonment, attached himself to Clement and sought to die with him. The synaxarion relates that Clement was finally beheaded at the altar while serving the Liturgy, and that Agathangelus was likewise put to the sword.
sections:
  - heading: Early Life and Episcopate
    body:
      - The tradition records that Clement lost his father in infancy and his mother — named in some accounts Euphrosyne — when he was about twelve, after which he was raised by a Christian woman who brought him up in the faith. From boyhood he is said to have embraced an ascetic and disciplined life.
      - He was ordained reader and deacon and, while still a young man, was chosen and consecrated bishop of Ancyra. His episcopate fell during the reign of Diocletian, when the imperial persecution of Christians was at its height.
  - heading: Long Confession and Martyrdom
    body:
      - "Clement's distinguishing feature in the synaxarion is the extraordinary length of his confession: a span of some twenty-eight years of imprisonment and torture, during which he was moved between cities and handed from one persecutor to another. The accounts name the emperors Diocletian and Maximian and several provincial governors among those who tried and tormented him."
      - Agathangelus, who by tradition had been baptized by Clement during his imprisonment, escaped death with an earlier group of confessors and deliberately rejoined the bishop in order to suffer with him, accompanying him by ship toward Nicomedia. According to the tradition Clement was at last beheaded as he stood before the altar offering the Liturgy, together with the deacons Christopher and Chariton, while Agathangelus was beheaded by the sword on a separate day, November 5.
