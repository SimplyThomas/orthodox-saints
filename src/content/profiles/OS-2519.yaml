overview:
  - The Holy Martyr Diogenes is an early Christian martyr commemorated by the Orthodox Church on December 5. The accessible sources preserve only that he was put to death by stoning; his origin, the place and date of his martyrdom, and the other circumstances of his life are not recorded. The synaxarion attaches to his memory a commemorative verse contrasting his persecutors, described as men clothed in error, with the stones in which the martyr was, by his death, arrayed.
