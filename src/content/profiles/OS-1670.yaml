id: OS-1670
lifespan: 4th century (traditional)
overview:
  - The Martyrs Eleutherius and Leonidas of Constantinople, together with many infants commemorated alongside them, are a group
    of Christians who, according to the synaxarion, were put to death by fire during a persecution of the Church. The Orthodox
    Church commemorates them on August 8.
  - Almost nothing of their lives survives beyond the bare fact of their martyrdom. The sources record that they suffered at
    a youthful age and that many infants died with them, but they preserve no narrative of their backgrounds, no name for the
    persecuting authority, and no account of the circumstances that led to their arrest and execution.
  - Where a date is ventured, later liturgical references place the martyrdom in the 4th century, while the saints' own row
    records them among the Pre-Nicene martyrs. The persecution itself is unspecified in the surviving record.
sections:
  - heading: Sources and Uncertainty
    body:
      - "This is a genuinely thin commemoration: no extended hagiographic life of Eleutherius and Leonidas has survived. The OCA
        Synaxarion entry is essentially complete in a single sentence, relating only that the martyrs, along with many infants,
        were cast into a fire at a youthful age during one of the persecutions against Christians."
      - External references add little. The Eastern Orthodox liturgical listings for August 8 give the place as Constantinople
        and, in one case, assign the martyrdom to the 4th century; the saints are also noted among the commemorations falling
        within the Afterfeast of the Transfiguration. No source supplies the name of the persecutor, a specific year, or further
        biographical detail.
      - Because the record is so spare, this profile deliberately remains short. The Church venerates the group as a single named
        commemoration, holding the witness of these martyrs and the infants who died with them even where their individual histories
        are lost.
patronage:
  - Infants and young children
