id: OS-1963
lifespan: mid-13th century – 1281
overview:
  - Saint Charitina, Princess of Lithuania (died 1281), was a noblewoman of the pagan Grand Duchy of Lithuania who became a nun and later abbess of the Convent of Saints Peter and Paul in Novgorod. Because her hagiography did not survive, very little is known of her life with certainty.
  - According to the surviving tradition, oppressive paganism and civil strife in her homeland led her to leave Lithuania and seek refuge in Russia, settling at Novgorod. Notably she turned eastward toward Orthodox Novgorod rather than westward toward the Catholic lands, a choice later readers have taken to reflect her spiritual orientation.
  - She is remembered for a strict ascetic life marked by humility, purity, and temperance, and for her leadership of her community as abbess. She is commemorated on October 5, and is to be distinguished from the martyr Charitina of Amisos, also commemorated on that day.
liturgicalTitle: Our Venerable Mother Charitina, Princess of Lithuania, Abbess of Novgorod
sections:
  - heading: Historical Context
    body:
      - Charitina was born in the mid-thirteenth century into the nobility of Lithuania, at a time when the region was still largely pagan and the Grand Duchy of Lithuania was being consolidated under Mindaugas. She is described as a descendant of the Lithuanian royal house, and by tradition her departure from her homeland was prompted by the oppressive paganism and civil unrest of the period.
      - Rather than travel westward into the neighboring Catholic lands, she made her way east to Novgorod, then a major center of Orthodox Christianity. There she entered the Convent of the Holy Apostles Peter and Paul, a community built on Sinich (Sinichya) Hill that had been founded in the twelfth century.
  - heading: Monastic Life and Leadership
    body:
      - "At the Peter and Paul monastery Charitina embraced a strict, ascetic manner of life. The sources describe her chiefly through three qualities: humility, purity, and strict temperance or abstinence, and note that she treated all the members of the community as her sisters."
      - On account of her virtuous life she was elevated to abbess of the convent. She reposed in peace in the year 1281 and was interred within the monastery church of Saints Peter and Paul, where she came to be revered as a saint.
  - heading: Iconography
    body:
      - According to the Iconographers' Manual, Saint Charitina is depicted as a maiden in a single garment, without the monastic mantiya. This detail has been understood as symbolizing her rejection of the material symbols of authority, despite her royal background.
  - heading: Question of Her Identity
    body:
      - Because no hagiography of Charitina survives, her precise place in the Lithuanian nobility is debated. In 2009 the Lithuanian historian Algimantas Bučys proposed that she may have been the daughter of Prince Tautvilas, suggesting she fled to Novgorod after her father was killed by Treniota. Other accounts connect her family to the house of Mindaugas.
      - It has also been suggested that she was betrothed to a prince of Novgorod, though scholars caution that this may reflect a confusion with Euphrosyne of Suzdal, who was betrothed to Fyodor, son of Yaroslav II of Vladimir. No specific details of her canonization process are recorded in the surviving sources.
  - heading: Relics & Shrines
    body:
      - Charitina's relics remained at the Church of the Apostles Peter and Paul in Novgorod until the Russian Revolution, after which they were lost.
      - In 2024, during the restoration of the Church of the Apostles Peter and Paul in Veliky Novgorod (a project that ran from 2023 to 2026), the relics were rediscovered. According to the local diocese of the Russian Orthodox Church, she had been buried in a log coffin, which had decomposed, and a veil embroidered with gold and silver threads was found in the area of the frontal bone. Although researchers initially excavated on the south side of the church, the relics were ultimately found on the northwest side, where they had historically been known to lie. The relics were subsequently housed in the Spassky Cathedral of St. George's Monastery.
