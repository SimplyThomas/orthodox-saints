status: draft
eyebrow: Synaxis · The Optina Elders
feastNote: Commemorated together on October 11 · each with his own feast
overview:
  - The Synaxis of the Optina Elders gathers the startsy — the spirit-bearing elders — of the Optina Hermitage (Optina Pustyn) near Kozelsk in the Kaluga region of Russia, who through the nineteenth and early twentieth centuries made the monastery the spiritual heart of the Russian Church. From Leonid and Macarius through Ambrose to Nectarius, an unbroken line of elders received all who came — peasants and nobles, bishops and doubters — offering the counsel, discernment, and consoling love for which Optina became famous.
  - The eldership at Optina renewed in Russia the ancient tradition of spiritual fatherhood carried west from Mount Athos and the Philokalic revival of St Paisius Velichkovsky. Under the elders the monastery undertook the translation and printing of patristic texts, drawing to itself the leading minds of the age; Gogol, Dostoevsky, the Kireyevskys, and Tolstoy all made their way to Optina, and the elder Ambrose is widely recognized behind Dostoevsky's Elder Zosima.
  - The line was broken only by the Revolution. The monastery was suppressed by the Soviet authorities, and its last elders confessed the faith amid persecution, some ending their lives in prison or exile. The Optina Elders were numbered together among the saints in 2000, and Optina, reopened, again receives pilgrims at their relics.
