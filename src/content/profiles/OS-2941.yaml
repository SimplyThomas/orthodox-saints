timeline:
  - when: "1821"
    title: The skete is founded
    body: A hermitage of St John the Forerunner is built beside Optina under Abbot Moses, a home for the elders.
  - when: "1829"
    title: Eldership begins
    body: St Leonid settles at Optina, inaugurating the unbroken line of startsy.
  - when: 1846–1891
    title: The age of St Ambrose
    body: Under Elder Ambrose, Optina becomes the spiritual heart of Russia; pilgrims come by the thousand for a word of counsel.
  - when: 1917–1923
    title: Persecution and closure
    body: The monastery is suppressed by the Soviet state; the last elders confess the faith in prison and exile.
  - when: "2000"
    title: Glorification
    body: The Synaxis of the Optina Elders is numbered among the saints of the Russian Church.
