id: OS-1376
lifespan: c. 468 – c. 510
patronage:
  - Hartland, Devon
overview:
  - Nectan of Hartland was a sixth-century hermit and martyr of Welsh origin who settled in the north of Devon, in south-western England. According to hagiographic tradition he was the eldest of the many children of Brychan, the legendary king of Brycheiniog (modern Brecknock) in Mid Wales, whose offspring became a celebrated holy family venerated across Wales, Cornwall, and Devon. Inspired by the example of Saint Anthony the Great of Egypt, Nectan left Wales while still young to pursue the eremitic life.
  - He sailed with companions to the northern coast of Devon and made his hermitage at Hartland, in a wooded valley beside a spring, where he lived for several years in solitary asceticism. He was killed by robbers who had stolen cattle given to him in gratitude; when he pursued them and sought to convert them to Christianity, they attacked and beheaded him. He is venerated as a martyr and is the patron saint of Hartland, where a substantial medieval cult grew around his shrine. He is honored by the Eastern Orthodox Church, the Catholic Church, and the Anglican Communion, and is commemorated on June 17.
liturgicalTitle: The Holy Martyr Nectan of Hartland
