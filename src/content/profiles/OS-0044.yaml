id: OS-0044
lifespan: c. 1756 – November 15, 1837
liturgicalTitle: Our Venerable Father Herman of Alaska, the Wonderworker
overview:
  - St. Herman of Alaska was a Russian Orthodox monk-missionary who spent the latter part of his life on Kodiak Island and Spruce Island in Russian America, where he is remembered for his life of deep prayer and for protecting the indigenous Alaskan peoples from exploitation. He was the first saint glorified by the Orthodox Church in America.
  - Born around 1756 in Russia, he trained as a monk at Sarov and Valaam before being sent in 1793 as one of a party of monks to bring Orthodox Christianity to Alaska, arriving at Kodiak Island in 1794. Though he never accepted ordination to the priesthood, he became head of the mission and lived most of his remaining years as a hermit on Spruce Island, where the native Alutiiq people called him 'Apa,' meaning 'Grandfather.'
