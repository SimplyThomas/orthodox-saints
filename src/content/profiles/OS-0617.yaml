id: OS-0617
lifespan: c. 1198 – 1271
overview:
  - "Saint Sava II was the third Archbishop of Serbia, serving from 1263 until his death in 1271. Born Predislav, he was a member of the Nemanjić dynasty: a son of King Stefan the First-Crowned and his Byzantine wife Eudokia Angelina, and a nephew of Saint Sava I, the first Serbian Archbishop, whose monastic name he later took."
  - He embraced monastic life in imitation of his sainted uncle, was appointed Bishop of Hum, and eventually assumed the leadership of the Serbian Church. He guided it through the middle of the thirteenth century until his repose, and is venerated as a saint with a feast day on February 8.
liturgicalTitle: Our Father among the Saints Sava II, Archbishop of Serbia
patronage:
  - The Serbian Orthodox Church
timeline:
  - when: c. 1198
    title: Birth
    body: Born Predislav, the middle son of King Stefan the First-Crowned of the Nemanjić dynasty and his Byzantine wife Eudokia Angelina.
  - when: "1227"
    title: Death of his father
    body: King Stefan the First-Crowned, having taken monastic vows during his final illness, died; his eldest son Stefan Radoslav succeeded as King and was crowned at Žiča by Archbishop Sava I.
  - when: As a monk
    title: Monastic profession and episcopate
    body: Predislav took the monastic name Sava after his uncle, Saint Sava I, distinguished himself by his ascetic practices, and was appointed Bishop of Hum.
  - when: "1263"
    title: Archbishop of Serbia
    body: Became the third Archbishop of Serbia, succeeding Arsenije I (Saint Arsenius). He shepherded the Church with dedication until his repose. Some sources give 1266 as the date of his accession.
  - when: "1271"
    title: Repose
    body: Died after guiding the Serbian Church; he was succeeded as Archbishop by Danilo I. Some sources variously date his death to 1268, 1269, or 1271.
sections:
  - heading: Family and Lineage
    body:
      - Sava II belonged to the Nemanjić dynasty. His father was King Stefan the First-Crowned and his mother was the Byzantine princess Eudokia Angelina. He had two older brothers, Stefan Radoslav and Stefan Vladislav, a half-brother, Stefan Uroš I, and two sisters, of whom only Komnena is known by name.
      - His uncle was Saint Sava I, the first Archbishop of Serbia, whose monastic name Predislav adopted and whose ascetic example he sought to follow.
  - heading: Episcopal Ministry
    body:
      - Before leading the Serbian Church, Sava II served as Bishop of Hum. He became the third Serbian Archbishop, in the line of succession after Arsenije I (Saint Arsenius) and before Danilo I.
      - "Accounts of the exact years of his episcopate vary: his accession is most often dated to 1263, though some sources give 1266, and his repose is placed variously in 1268, 1269, or 1271."
  - heading: Relics & Shrines
    body:
      - His holy relics are preserved at the Patriarchate of Peć, the seat of the ancient Serbian Patriarchate.
      - He is depicted in a fresco at the Visoki Dečani Monastery.
  - heading: Veneration
    body:
      - The Serbian Orthodox Church celebrates Sava II as a saint. His feast is kept on February 8 (corresponding to February 21 on the Julian calendar).
