id: OS-2826
lifespan: 6th century
overview:
  - "Saint Ismael of Wales (Welsh: Isfael; Old Welsh: Ysmail; anglicized Ishmael or Ysfael) was a 6th-century Welsh bishop and saint, remembered as bishop of Rhos and a successor of Saint David at Menevia (St Davids). Despite the anglicized form's resemblance to the biblical figure, Isfael is a native Welsh name understood to mean 'under prince.'"
  - He was the son of Budic (Budig ap Cybydan), a native of Cornouaille who became king of Armorica in Brittany, placing Ismael within a prominent Breto-Welsh dynasty with strong ecclesiastical ties. According to Rhygyfarch's hagiography of Saint David, Ismael was counted among the three principal disciples of Dewi Sant, and the Book of Llandaff also numbered him among the students of Dubricius and Teilo.
  - He is venerated as a pre-schism Celtic saint in the Eastern Orthodox Church and in the Anglican Communion, with his principal feast on June 16 (and a commemoration on June 25 at Uzmaston). Several Welsh parish churches bear his name, chiefly St Ishmael's in Pembrokeshire.
liturgicalTitle: Our Father among the Saints Ismael, Bishop of Rhos
sections:
  - heading: Discipleship and Episcopate
    body:
      - According to Rhygyfarch's hagiography of Saint David, Ismael was one of the three principal disciples of Dewi Sant. The Book of Llandaff additionally included him among the students of Dubricius and Teilo, tying his formation to the leading figures of the Welsh 'Age of the Saints.'
      - He is said to have succeeded David as bishop of Menevia (St Davids), though he does not appear in the parish records for that see. The scholar William Jenkins Rees suggested that Ismael was at most a suffragan (auxiliary) bishop under Teilo, and that his own see lay in Rhos, at present-day St Ishmaels in Pembrokeshire.
  - heading: The See at Rhos
    body:
      - "The parish church of St Ishmael's (Welsh: Llanisan-yn-Rhos), set in a valley near the Milford Haven Waterway in Pembrokeshire, honours the saint. During the Age of the Saints it may have served as the diocesan seat for the Rhos cantref."
      - Historical records indicate that Llanismael was reckoned one of the principal dioceses of Dyfed under medieval Welsh law, second only to Menevia (modern St Davids). After the Norman conquest the area was absorbed into the Lordship of Haverfordwest; the medieval church building, a Grade II listed structure, reflects the site's early ecclesiastical prominence.
  - heading: Dedications and Legacy
    body:
      - Multiple Welsh parish churches bear Ismael's name, including St Ishmael's in both Pembrokeshire and Carmarthenshire, together with churches at Camrose, Rosemarket, Uzmaston, and Haroldston St Issells.
      - A valley or inlet in Carmarthen Bay was formerly known as 'St. Ismael's Scar.' He is venerated in the Eastern Orthodox Church and the Anglican Communion, with feast days on June 16 and June 25 (at Uzmaston).
  - heading: Veneration in Orthodoxy
    body:
      - Ismael is received in the Eastern Orthodox Church as a pre-schism Western (Celtic) saint accepted by consensus rather than by a modern glorification decree; no hagiographic source records a formal Orthodox act of glorification for him.
      - He does not appear on the Eastern OCA synaxarial calendar for June 16, and neither OrthodoxWiki nor the Mystagogy resources carry an entry for him. The surviving grounding for his life rests on Welsh sources and the medieval hagiographic tradition.
timeline:
  - when: c. 6th century
    title: Birth into a Breto-Welsh royal family
    body: Ismael is born a son of Budic (Budig ap Cybydan), a native of Cornouaille and eventual king of Armorica in Brittany. His mother may have been Arianwedd (or Anowed), a sister of Saint Teilo.
  - when: 6th century
    title: Disciple of David and Teilo
    body: He is trained under the leading Welsh saints, counted by Rhygyfarch among the three principal disciples of Saint David and by the Book of Llandaff among the students of Dubricius and Teilo.
  - when: 6th century
    title: Episcopal ministry in Rhos
    body: Ismael is remembered as a successor of David at Menevia, though likely serving as a suffragan bishop under Teilo, with his own see at Rhos (St Ishmaels, Pembrokeshire).
  - when: June 16
    title: Principal feast
    body: His feast is kept on June 16, with a further commemoration on June 25 at Uzmaston; he is venerated in both the Eastern Orthodox Church and the Anglican Communion.
