id: OS-0071
lifespan: Traditionally c. 281 – c. 304 (4th century)
overview:
  - "Saint Anastasia, surnamed the Deliverer-from-Potions (Greek: Pharmakolytria), is venerated as a Great Martyr of the early fourth century. By tradition she was a Roman noblewoman who devoted herself to caring for imprisoned confessors before suffering martyrdom during the persecutions under the emperor Diocletian. Her name, meaning 'resurrection,' is noted in the synaxarion tradition."
  - She is remembered chiefly for ministering in secret to Christians held in Roman prisons — feeding them, tending their wounds, and ransoming captives — and for healing many who had been harmed by potions, poisons, and other noxious substances, from which she received her distinctive epithet. She is honored as a patroness of healers, physicians, apothecaries, and pharmacists.
  - Her feast is kept on December 22 in the Greek Orthodox tradition; the Roman calendar commemorates her on December 25, and the Syriac tradition on September 28. Several of the surviving accounts of her life are recognized as legendary in character, and the dataset's underlying material should be regarded as subject to clergy and source review.
patronage:
  - Pharmacists and apothecaries
  - Physicians and healers
  - Those harmed by poisons, potions, and spells
timeline:
  - when: c. 281
    title: Birth
    body: By tradition Anastasia was born into a Roman family of distinction; her father is named in the accounts as Praetextatus (a Roman man of high rank), and her mother Fausta is described as a Christian, in some versions secretly so.
  - when: Youth
    title: Education under Chrysogonus
    body: A learned and devout Christian named Chrysogonus is said to have served as her teacher and spiritual director, guiding her in the faith and, after her mother's death, sustaining her by correspondence.
  - when: Adulthood
    title: Marriage to a pagan husband
    body: After her mother's death she was given in marriage to a pagan, named in the accounts as Publius (Publius Patricius). The tradition relates that the marriage ended when her husband drowned at sea while traveling, leaving her a widow.
  - when: Widowhood
    title: Ministry to prisoners and the poor
    body: As a widow she distributed her wealth to the poor and, by tradition disguised as a beggar, visited the prisons to feed Christian captives, tend their wounds, and ransom them. Her healing of those afflicted by potions and poisons earned her the name Pharmakolytria.
  - when: During the persecution
    title: Martyrdom of Chrysogonus
    body: In the persecution under Diocletian, her teacher Chrysogonus was summoned to Aquileia, interrogated, and beheaded; the tradition relates that a priest named Zoilos recovered his remains.
  - when: c. 304
    title: Martyrdom
    body: After imprisonment and many torments, Anastasia was put to death. The accounts relate that she was stretched between four pillars and burned alive. The synaxarion places her martyrdom in the early fourth century during Diocletian's persecution.
sections:
  - heading: Historical Context
    body:
      - Anastasia is placed in the era of the Diocletianic persecution, the last and most severe imperial campaign against Christians, which the accounts identify as the setting for both her charitable ministry and her death. Tradition associates her origins with Rome and the wider Italian and Pannonian world of the late third and early fourth centuries.
      - Several of the surviving vitae are recognized as legendary, and one account is described as resting on no firm historical foundation. The narrative tradition is nonetheless ancient and widespread, and her veneration is attested across the Greek, Latin, and Syriac churches.
  - heading: Ministry to Confessors
    body:
      - The defining feature of her life as recorded is her service to imprisoned Christians. The accounts relate that, after being widowed and giving away her wealth, she went about — by tradition in the guise of a beggar — to feed prisoners, dress their wounds, and ransom captives held during the persecution.
      - Her care extended to those harmed by potions, poisons, spells, and other injurious substances, many of whom she is said to have healed. From this came her epithet Pharmakolytria, 'the Deliverer from Potions,' and her later patronage of physicians and apothecaries.
      - The tradition also names a pious widow, Theodote, who became her companion and assistant, and who with her three sons is said to have died by fire.
  - heading: Relics & Shrines
    body:
      - By tradition her body, recovered after her martyrdom by a woman the accounts name Apollonia (Apollinaria), was interred in a house later converted into a basilica. In the fifth century her relics are said to have been translated to Constantinople, where a church was built in her honor.
      - Her head and one of her hands were later enshrined at the Monastery of Saint Anastasia the Pharmakolytria in Chalkidiki, Greece. The tradition relates that relics stolen from this monastery in 2012 were not recovered.
      - Other relics are associated with Zadar Cathedral in Croatia, said to have been brought there by Saint Donatus; a partial translation to Sremska Mitrovica, Serbia, in 1976; and relics held at Benediktbeuern Abbey in Bavaria.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: Anastasia is one of the virgin martyrs commemorated by name in the Roman Canon of the Mass, and she receives a special commemoration in the second Mass of Christmas Day — a distinction described as unique in the Roman liturgy."
      - "Traditional Accounts: The vita relates that Chrysogonus foretold the drowning of her pagan husband, a prophecy said to have been fulfilled. During her own imprisonment, the spirit of the martyred Theodote is said to have appeared to her nightly with encouragement. Another tradition holds that when Anastasia was set to be drowned at sea with other prisoners, Theodote's spirit guided the vessel to shore, where 120 men were converted, baptized, and afterward martyred. A further tradition relates that Saint Andrew the Fool-for-Christ visited her church in Constantinople seeking to be cured, and that she appeared to him in a dream."
  - heading: Veneration & Legacy
    body:
      - Anastasia is venerated across the Christian East and West. Her principal feast falls on December 22 in the Greek Orthodox calendar, December 25 in the Roman calendar, and September 28 in the Syriac tradition.
      - "Her enduring legacy is twofold: as a model of charitable service to the persecuted and imprisoned, and as the heavenly patroness invoked by healers and pharmacists, reflected in her surname, the Deliverer-from-Potions."
