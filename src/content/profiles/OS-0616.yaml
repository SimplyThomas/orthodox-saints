timeline:
  - when: c. 520 BC
    title: Call to prophecy
    body: In the eighth month of the second year of Darius the Great, the word of the Lord came to Zachariah, the son of Berechiah, beginning his prophetic ministry as a contemporary of Haggai.
  - when: c. 519 BC
    title: Night visions
    body: On the twenty-fourth day of the eleventh month, Zachariah received the sequence of eight night visions, including the flying scroll from which his epithet 'Sickle-Seer' derives.
  - when: c. 515 BC
    title: Dedication of the Second Temple
    body: By tradition Zachariah returned from Babylon as an elderly man shortly before the dedication of the rebuilt temple in Jerusalem.
related:
  - name: Prophet Haggai
    note: Contemporary prophet of the return from exile whose ministry the Book of Ezra associates with Zachariah's, both rousing the people to rebuild the Second Temple.
