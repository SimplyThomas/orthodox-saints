id: OS-2786
lifespan: 3rd century; died c. 257–258
overview:
  - Basilla of Rome (also recorded as Basilissa or Babilla) was a young Roman noblewoman of the 3rd century who converted to Christianity and was put to death for her faith during the persecutions of the emperor Valerian. In the tradition attached to her commemoration she is associated with Saint Eugenia of Rome, who is credited with her conversion, and she chose martyrdom rather than enter a pagan marriage.
  - "Unlike several figures in the same hagiographic cycle, Basilla is regarded as a genuinely historical person: the early Christian burial ground on the Via Salaria known as the coemeterium of Basilla (later the Catacomb of Sant'Ermete) bears her name, and it was there that the martyrs Protus and Hyacinth were interred. In the Eastern Orthodox Church she is commemorated on September 11 together with those two martyrs; the Roman Catholic Church keeps her feast on May 20."
liturgicalTitle: The Holy Martyr Basilla of Rome
sections:
  - heading: Life and Martyrdom
    body:
      - According to the traditional account, Basilla belonged to a Roman noble family; some versions describe her as a niece of the emperor Gallienus. Having embraced Christianity, she refused a marriage to a pagan suitor, and when she remained steadfast in that refusal she was denounced as a Christian. She was executed by beheading during the persecution under Valerian, her death placed around 257–258.
      - The hagiographic sources preserve differing details of her story. One strand ties her closely to Saint Eugenia of Rome, who is said to have brought her to the faith. Another names Pope Cornelius as the one who baptized her and identifies her pagan suitor as a patrician named Pompeius, who betrayed her to the authorities when she would not marry him. These accounts are drawn from later hagiographic tradition, and several of their particulars are legendary.
  - heading: Historical Context
    body:
      - "Basilla's commemoration belongs to a cluster of Roman martyrs venerated together — the martyrs Protus and Hyacinth and the nun-martyr Eugenia of Rome. Protus and Hyacinth are among the better-documented martyrs of this circle: their deaths, by scourging and beheading on 11 September 258, are recorded in the Chronograph of 354, and in 1845 Father Giuseppe Marchi discovered the undisturbed grave of Hyacinth with an inscription confirming the September 11 date."
      - By contrast, the more elaborate Passion narrative that binds the group together — casting Protus and Hyacinth as chamberlains to Eugenia — is a later literary composition (written roughly 450–499) with no independent historical support, and Eugenia herself does not appear in the earliest Roman martyr catalogue. Basilla stands apart from these legendary elements because her historicity is anchored in the cemetery that carries her name.
  - heading: Relics & Shrines
    body:
      - Basilla was first buried in the cemetery and catacombs of Saint Hermes on the Via Salaria near Rome — the same district as the coemeterium of Basilla where Protus and Hyacinth were laid. Her body was later translated to the Basilica of Santa Prassede in the 9th century. In 1654 relics identified as hers were discovered and subsequently interred at the Hôtel-Dieu de Bayeux.
