works:
  - title: The Fountain of Knowledge
    desc: A three-part theological synthesis comprising the Philosophical Chapters, Concerning Heresy, and An Exact Exposition of the Orthodox Faith.
  - title: An Exact Exposition of the Orthodox Faith
    desc: The culminating section of The Fountain of Knowledge, summarizing the teaching of the Cappadocian Fathers and long regarded as a principal textbook of Orthodox theology.
  - title: Apologetic Treatises against those Decrying the Holy Images
    desc: Three treatises composed in defense of the veneration of icons against the iconoclastic edicts of Emperor Leo III.
  - title: Oktoechos
    desc: Liturgical hymnody associated with John, who perfected the canon form in Byzantine worship.
celebration:
  intro: Ways to honor St John of Damascus.
  ideas:
    - idea: Venerate the family icons together and talk simply about why we honor — not worship — them, since John defended the holy icons; pair it with an icon-coloring page.
    - idea: Tell the "Three-Handed" icon story — his hand was cut off and restored by the Theotokos, and he added a silver hand to her icon in thanksgiving.
    - idea: "Make it a music day: sing a familiar hymn and thank God for the church's chanters, since John helped shape the Church's chant."
    - idea: Have children make a small "thank-you" gift or note for a chanter, priest, or helper who serves the Church.
    - idea: Tie a small act of giving to his feast in the Nativity Fast, remembering he left wealth and high office to become a monk.
