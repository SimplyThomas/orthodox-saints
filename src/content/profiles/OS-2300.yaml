lifespan: c. 675/676 - December 4, 749
liturgicalTitle: Our Venerable Father John of Damascus
overview:
  - John of Damascus was an eighth-century Syrian theologian, hymnographer, and monk, remembered above all as the foremost defender of the holy icons during the early iconoclastic controversy. Born into a prominent Damascene Christian family around 675 or 676, he served for a time in the administration of the Umayyad Caliphate before withdrawing to the monastic life at the Monastery of Saint Sabbas near Jerusalem.
  - His theological synthesis, gathered in The Fountain of Knowledge and its culminating section An Exact Exposition of the Orthodox Faith, became a principal textbook of Greek Orthodox theology and exerted a lasting influence on later medieval thought. He also perfected the canon form in Byzantine liturgical hymnody, much of which remains in liturgical use. He reposed at Saint Sabbas on December 4, 749, the date on which the Orthodox Church commemorates him.
