id: OS-0022
lifespan: c. 329 – 25 January 390
liturgicalTitle: Our Father among the Saints Gregory the Theologian, Archbishop of Constantinople
overview:
  - Saint Gregory the Theologian, also known as Gregory of Nazianzus, was a fourth-century Cappadocian bishop and one of the most influential theologians of the early Church. Born around 329 at Arianzus, near Nazianzus in Cappadocia, he served briefly as Archbishop of Constantinople and is celebrated above all as a master expositor of the doctrine of the Holy Trinity.
  - Together with Basil the Great and John Chrysostom he is honored as one of the Three Hierarchs, and he numbers among the Cappadocian Fathers. He received the rare epithet "the Theologian" — an honor shared in the Orthodox tradition only with John the Apostle and Symeon the New Theologian — in recognition of his defense of Nicene orthodoxy against Arianism.
  - His five great discourses on the Trinity, delivered at Constantinople, are regarded as having summed up and closed the theological controversies of his century. His orations were later cited as authoritative by the Council of Ephesus in 431, and the Council of Chalcedon in 451 formally designated him "the Theologian."
sections: []
timeline:
  - when: c. 329
    title: Birth at Arianzus
    body: Gregory is born around 329 at Arianzus, near Nazianzus in Cappadocia, into a wealthy Christian family.
  - when: c. 348–358
    title: Studies at Athens
    body: He spends about a decade studying rhetoric at Athens under Himerius and Proaeresius, befriending Basil the Great and encountering the future emperor Julian.
  - when: c. 361
    title: Ordained presbyter
    body: He is ordained presbyter of Nazianzus at his father's request, initially against his will.
  - when: "372"
    title: Consecrated Bishop of Sasima
    body: Basil the Great consecrates Gregory Bishop of Sasima, a posting Gregory dismisses and largely declines to occupy.
  - when: "379"
    title: Arrives in Constantinople
    body: At the request of the synod of Antioch he comes to Constantinople to defend Nicene orthodoxy, preaching at the Anastasia church.
  - when: "380"
    title: Enthroned at Constantinople
    body: With the arrival of Emperor Theodosius I he is enthroned as bishop of Constantinople, replacing the Arian Demophilus.
  - when: "381"
    title: First Council of Constantinople
    body: He presides over the Second Ecumenical Council, then resigns when the canonicity of his transfer is challenged, delivering his farewell address.
  - when: 25 January 390
    title: Repose at Arianzus
    body: After years of poetry and theological writing at Arianzus, Gregory dies on 25 January 390.
  - when: "950"
    title: Translation of relics
    body: His relics are transferred to Constantinople and enshrined in the Church of the Holy Apostles.
  - when: "2004"
    title: Relics returned to Istanbul
    body: Pope John Paul II returns the relics to St. George's Cathedral, the seat of the Ecumenical Patriarchate.
