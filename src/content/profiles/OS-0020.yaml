id: OS-0020
lifespan: c. 270 – 348
overview:
  - Spyridon was a fourth-century bishop of Trimythous (Tremithus) on Cyprus, remembered as a simple shepherd-bishop and a worker of many wonders. Born around 270 in the Cypriot village of Ashia (also spelled Assia), he worked as a shepherd and farmer, married, and had a daughter named Irene. He was known for his piety and his generosity toward neighbors, the poor, and the homeless, to whom he devoted his resources.
  - After his wife's death, Spyridon and his daughter both entered the monastic life, and he was made Bishop of Trimythous during the reign of Constantine the Great while continuing to live humbly. Though without formal education, he took part in the First Ecumenical Council at Nicaea in 325, where he is remembered for countering the arguments of Arius and converting a pagan philosopher to the Orthodox faith. He died peacefully at Trimythous in 348.
  - Spyridon is venerated as a wonderworker, and his relics, found incorrupt, are kept today on the island of Corfu, where he is the patron saint. He is also regarded as the patron of potters and of the city of Piraeus.
sections:
  - heading: Life and Episcopate
    body:
      - Spyridon was born around 270 in the village of Ashia on Cyprus. He began life as a shepherd and farmer and was not formally educated. He married and had a daughter named Irene. According to the sources he was known for great piety and for devoting his resources to helping his neighbors, the poor, and the homeless, keeping an open storeroom for those in need and distributing his harvest to the destitute.
      - Following the death of his wife, both Spyridon and his daughter entered the religious life. During the reign of Constantine the Great he became Bishop of Trimythous (also called Tremithus, today Tremetousia in the Larnaca District of Cyprus). The orthodoxwiki source records that he had earlier been arrested and exiled during a persecution around 295. As bishop he maintained his humble manner of life.
  - heading: The First Council of Nicaea
    body:
      - At the First Ecumenical Council at Nicaea in 325, Spyridon was instrumental in countering the theological arguments of Arius and his followers, despite his lack of formal learning. The sources relate that he engaged and converted a pagan philosopher who was defending Arianism. The OCA life records him declaring that there is one God who created man from dust, and that this is believed without rationalization because the mystery cannot be grasped by human reason, after which the philosopher was converted.
      - "He is remembered for illustrating the doctrine of the Trinity using a brick or potsherd: that one single object could hold three distinct elements — fire, water, and clay — as a figure of one God in three Persons. By tradition he also met Saint Nicholas of Myra at the Council."
  - heading: Miracles and Traditions
    body:
      - "Historically Documented: The sources attribute many wonders to Spyridon during his episcopate, including healing the sick and those with incurable illnesses, casting out demons, raising the dead, and commanding the natural elements, such as calling forth rain in time of drought. He is also said to have destroyed pagan idols. These accounts establish his title as the Wonderworker."
      - "Traditional Accounts: The synaxarion and later tradition relate further wonders. By tradition he possessed foreknowledge, retrieved jewelry from his deceased daughter's grave, and, during a famine, transformed a snake into gold coins to help a poor man. After his repose, when his relics were moved to Constantinople, the body was said to remain intact with a scent of basil. On Corfu he is known as the walking saint, because his silk slippers are said to wear out each year and are replaced on his feast day. An August 11 commemoration on Corfu marks his protection of the island during the 1716 Turkish invasion."
  - heading: Relics & Shrines
    body:
      - Spyridon died at Trimythous in 348 and was buried in the Church of the Holy Apostles. During the seventh-century Arab (Saracen) conquest of Cyprus, around the 650s, his body was disinterred and found incorrupt, and it was transported to Constantinople. After the fall of Constantinople to the Ottomans in 1453, the relics were carried westward — by way of Serbia, according to the orthodoxwiki account — and brought to Corfu by Georgios Kalohairetis (also given as the monk Kalohairetis).
      - His incorrupt relics remain on Corfu in the Church of Saint Spyridon, where he is venerated as the island's patron. According to the OCA, his right hand is kept in Rome. On Corfu the incorrupt relics are carried in solemn procession four times a year in thanksgiving for the island's deliverances.
