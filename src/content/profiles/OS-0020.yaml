celebration:
  intro: Ways to honor St Spyridon of Corfu at home.
  ideas:
    - idea: Fry a batch of loukoumades (Greek honey puffs), a festive favorite on Corfu where he is the beloved patron, and enjoy them warm.
    - idea: Tell his story of holy simplicity — a humble shepherd who became a bishop yet kept his plain shepherd's cap — and talk about staying humble and generous.
    - idea: Recount the miracle at the Council of Nicaea, where the unlettered shepherd-bishop confounded a clever philosopher with simple faith.
    - idea: Because he was known for open-handed generosity, set aside a family gift for someone in need in his honor.
    - idea: Venerate and light a candle before his icon and sing his troparion.
