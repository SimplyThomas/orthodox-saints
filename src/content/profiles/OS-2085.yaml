    title: Enters the Monastery of the Caves
    body: He came to the Kiev Caves Monastery as a young man, by one account a novice of about seventeen, under the influence of Saint Theodosius. He received monastic tonsure from Igumen Stephen and was later ordained a hierodeacon.
