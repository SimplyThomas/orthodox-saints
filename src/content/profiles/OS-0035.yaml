celebration:
  intro: Ways to honor St Symeon the New Theologian.
  ideas:
    - idea: Turn off the lights, light a single candle, and talk about Christ as the Light no darkness overcomes — a hands-on way into his theme of the divine Light.
    - idea: For older children, compare a lamp or the sun (things God made) with the grace-light the saints experienced.
    - idea: Make a paper lantern or a decorated votive holder to keep by the icons.
    - idea: Keep a gentle bedtime examination — "what am I sorry for today?" — and a family act of mutual forgiveness before sleep.
    - idea: Learn the Jesus Prayer, "Lord Jesus Christ, Son of God, have mercy on me," which his tradition of the heart carries forward.
