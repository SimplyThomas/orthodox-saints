    title: Soldier under Julian the Apostate
    body: John served in the Roman army during the reign of Julian the Apostate. Compelled to take part in the persecution of Christians, he instead secretly aided them, freeing those arrested, warning others of danger, and helping them flee.
  - when: during Julian's reign
    title: Arrest and imprisonment
    body: When his support for Christians was discovered, John was arrested and imprisoned at Constantinople to await execution.
