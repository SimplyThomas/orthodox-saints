id: OS-0882
liturgicalTitle: The Holy New Martyr George of Sofia
lifespan: c. 1407 – 1437 (martyred at age thirty)
overview:
  - George the New Martyr of Sofia was a Christian soldier serving in the Ottoman army who openly confessed his faith in Christ and was put to death for refusing to embrace Islam. He suffered at Adrianople in 1437 and is commemorated as a new martyr, the title given to those who died for Christ under Ottoman rule.
  - According to the synaxarion, when his fellow soldiers mocked Christ in his hearing, George rose to defend the Christian faith. Arrested for his confession, he was questioned repeatedly and offered both rewards and threats, but he would not renounce Christ and was burned to death.
timeline:
  - when: "1437"
    title: Confession of faith at Adrianople
    body: Stationed as a soldier in the Ottoman army at Adrianople, George defended Christ when his Muslim comrades mocked the faith. His open confession led to his arrest.
  - when: "1437"
    title: Interrogation and martyrdom
    body: George was questioned repeatedly and pressed with offers of reward and with threats of death, but he remained steadfast. A fire was prepared, and he approached it without fear; he was burned to death on March 26, 1437, at the age of thirty.
sections:
  - heading: Life and Martyrdom
    body:
      - George served as a Christian in the Ottoman army during the first decades of Ottoman rule in the Balkans. The synaxarion places his martyrdom at Adrianople (Edirne) in 1437, when, according to the account, his fellow soldiers mocked Christ in his presence and he answered them in defense of the Christian faith.
      - Brought to trial, George was interrogated more than once and was urged to abandon Christ in exchange for reward, or else to face execution. He refused to deny his faith. The account relates that when the fire was made ready he went toward it bravely, and he was burned to death at the age of thirty.
  - heading: Identity and Commemoration
    body:
      - This George, sometimes called the Elder or Older New Martyr George of Sofia, is distinguished in the sources from a later namesake, George the goldsmith of Sofia (also associated with Kratovo), who suffered in 1515 and is commemorated on February 11. The two are distinct persons.
      - George the New Martyr of Sofia is commemorated on March 26.
patronage:
  - Soldiers
  - Those who confess the faith under persecution
companions:
  - name: George the New Martyr of Sofia (the goldsmith)
    note: A distinct later new martyr of Sofia (d. 1515), commemorated February 11.
