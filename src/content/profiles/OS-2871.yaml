id: OS-2871
lifespan: fl. mid–late 3rd century; bishop until c. 303
overview:
  - Theoteknus (Theotecnus) was bishop of Caesarea Maritima, the metropolitan see of Roman Palestine, during the second half of the third century. He is known almost entirely through a single episode preserved in Eusebius of Caesarea's Ecclesiastical History, in which he intervened on behalf of the soldier Marinus on the eve of Marinus's martyrdom.
  - According to Eusebius, when Marinus was granted a few hours to decide between his Christian faith and his military advancement, Theoteknus led him into the church and set before him the book of the Gospels and a sword, telling him to choose. Marinus chose the Gospels and went on to be martyred, and Theoteknus is remembered in Orthodox tradition for this act of pastoral guidance.
  - He is to be distinguished from the martyr Theotecnus of Antioch. A firm feast day for the bishop is not established in the surviving sources, and his commemoration awaits further review.
liturgicalTitle: Our Father among the Saints Theoteknus, Bishop of Caesarea in Palestine
timeline:
  - when: 253–268
    title: Episcopate under Gallienus
    body: Theoteknus holds the see of Caesarea Maritima during the reign of the emperor Gallienus, a period in which, as Eusebius notes, peace had been restored to the churches. He follows Domnus in the succession of the see.
  - when: c. 262
    title: The trial of Marinus
    body: When a vacancy for the rank of centurion opens at Caesarea, a rival challenges the eligibility of the soldier Marinus on the ground that, as a Christian, he cannot lawfully sacrifice to the emperors. The judge grants Marinus three hours to reflect. Informed of the case, Theoteknus takes Marinus by the hand, leads him into the church, and points to the sword at his side while placing the Gospels before him, bidding him choose. Marinus takes up the Gospels; returning to the tribunal, he is condemned and put to death. The senator Astyrius afterward bears away the body and gives it burial.
  - when: c. 303
    title: End of the episcopate
    body: Theoteknus's tenure ends around the outset of the Diocletianic persecution; he is succeeded by Agapius, who holds the see until about 312 and is followed by the historian Eusebius of Caesarea.
sections:
  - heading: Episcopate at Caesarea
    body:
      - Theoteknus governed Caesarea Maritima, the chief see of Roman Palestine, in the later third century. The surviving episcopal succession places him after Domnus and before Agapius of Caesarea, who held the see from about 303 to about 312 and is said to have trained the church historian Eusebius, his own successor.
      - Because his tenure ran up to roughly 303, the beginning of the Diocletianic persecution, he is variously classed among both third- and fourth-century bishops of the Roman Empire.
  - heading: The Martyrdom of Marinus
    body:
      - The one detailed account of Theoteknus comes from Book VII of Eusebius's Ecclesiastical History. In the reign of Gallienus, when the churches were at peace, a distinguished soldier named Marinus at Caesarea stood in line for promotion to centurion, an office marked by the Roman vine-branch. A rival objected that Marinus, being a Christian, could not lawfully hold the dignity because Christians refused to sacrifice to the emperors. The judge Achaeus confirmed that Marinus was a Christian and gave him three hours to consider his position.
      - Learning of the case, Theoteknus went to Marinus, took him by the hand, and led him up to the church. There he drew back his cloak a little to point to the sword hanging at Marinus's side, and at the same moment laid the book of the Gospels before him, telling him to choose which of the two he wished. Marinus stretched out his right hand and took the Gospels, and Theoteknus urged him to hold fast to God and to depart in peace, strengthened for what he had chosen.
      - Returning to the tribunal after the appointed hours with even greater zeal, Marinus was at once led away and put to death. Eusebius adds that a senator of high rank, Astyrius (Asterius), took the body upon his own shoulders and gave it a costly burial; by tradition Astyrius was himself soon afterward condemned and beheaded for the act. The anchor description of Theoteknus as burying Marinus appears to fold the senator's role into the bishop's; the documented part of Theoteknus's role is the spiritual intervention before the martyrdom.
  - heading: Identity and Commemoration
    body:
      - Theoteknus of Caesarea is distinct from the martyr Theotecnus of Antioch. Marinus and Astyrius are commemorated together in the Eastern Orthodox tradition on August 7 (and in the Roman calendar on March 3), but no separate, firmly established feast for the bishop Theoteknus is attested in the available sources. His commemoration and details accordingly stand in need of clergy and source review.
