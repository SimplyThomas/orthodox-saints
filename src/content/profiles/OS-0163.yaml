id: OS-0163
liturgicalTitle: Our Father among the Saints Natalis, Priest of Casale
overview:
  - Natalis was a sixth-century priest who served in Casale, a city in Piedmont in north-western Italy. He is venerated as a righteous man of great sanctity, and his feast is kept on September 3. He is counted among the pre-schism Latin saints of the Orthodox Patriarchate of Rome.
  - According to tradition, Natalis was a native of Benevento in Campania (southern Italy), who at some point came to serve as a priest in Casale in Piedmont. Beyond his southern Italian origin and his priestly ministry in Casale, the historical record is extremely sparse; no chronicle or hagiographic account of his deeds or the circumstances of his holiness has survived. His veneration rests on a consistent local tradition of sanctity.
