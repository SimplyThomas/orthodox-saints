flagReasons:
  - claim: Saint Anthony the founder is listed among the 'more than seventy burials preserved in the Near Caves.'
    detail: The Near Caves external source lists 79 surviving burials including Nestor, Alipy, Grigory, Agapit, Nikolai Sviatosha, Kuksha, and Ilya Muromets — but Anthony is not among them. The Anthony of the Caves external source explicitly states 'He requested that his remains be hidden and was reportedly buried in his cave, though no relics have ever been discovered.' The profile's own Relics section repeats this directly, creating an internal contradiction with the overview's inclusion of Anthony among 'preserved' burials.
  - claim: Theodosius 'is chiefly commemorated among the fathers of the Far Caves.'
    detail: No external source in the dossier mentions the Far Caves or associates Theodosius with them. The Theodosius of the Caves Wikipedia article used as a source discusses his role at the Lavra but does not reference the Far Caves. This claim is not grounded in the dossier.
