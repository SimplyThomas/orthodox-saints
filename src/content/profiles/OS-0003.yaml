timeline:
  - when: c. 5 AD
    title: Birth in Bethsaida
    body: By tradition Andrew is born around 5 AD in Bethsaida of Galilee into a Jewish family, the son of Jonah (also called John) and brother of Simon Peter; he works as a fisherman and lives in Capernaum at the start of Jesus's ministry.
  - when: c. 27–30 AD
    title: Called as First Disciple
    body: Initially a disciple of John the Baptist, Andrew recognizes Jesus as the Messiah, follows him, and brings his brother Simon Peter to him, becoming the First-Called of the apostles.
  - when: c. 38 AD
    title: Foundation of the See of Byzantium
    body: By tradition Andrew founds the see of Byzantium and appoints Saint Stachys as its first bishop, establishing the apostolic succession later claimed by the Church of Constantinople.
  - when: c. 60 AD
    title: Martyrdom at Patras
    body: Andrew is crucified at Patras in Achaia under the governor Aegeas during the reign of Nero, bound rather than nailed to the cross; the Catholic Encyclopedia dates his death to November 30, AD 60.
  - when: c. 357 AD
    title: Translation of Relics to Constantinople
    body: Most of Andrew's relics are transferred from Patras to Constantinople by order of Emperor Constantius II and deposited in the Church of the Holy Apostles.
  - when: "1208"
    title: Relics Taken to Amalfi
    body: Following the sack of Constantinople, the relics of Saint Andrew and Saint Peter remaining in the city are taken to Amalfi, Italy, by Cardinal Peter of Capua the Elder; most remain in Amalfi Cathedral.
  - when: September 24, 1964
    title: Skull Returned to Patras
    body: Pope Paul VI orders the Vatican relic of Saint Andrew returned to Patras as a gesture toward the Greek Orthodox Church; the skull is formally presented on this date.
  - when: January 19, 1980
    title: Cross Returned to Patras
    body: The cross on which Andrew was martyred is returned to Patras, where it is kept with his skull and finger in the Cathedral of Saint Andrew.
