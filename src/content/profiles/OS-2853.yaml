id: OS-2853
lifespan: c. 1481–1571
overview:
  - Venerable Theodorite of Kola (c. 1481–1571) was a Russian monk and missionary remembered as the enlightener of the Sami (Lapp) people of the Kola Peninsula in the far north. Entering the Solovetsky Monastery as a boy, he spent decades in monastic formation and asceticism before undertaking a long missionary labour among the indigenous population of the Russian Arctic.
  - Working alongside fellow ascetics, he learned the native tongue, translated Christian prayers, and baptized many of the Sami, founding a monastery at the mouth of the Kola River. He later served as an abbot and archimandrite at monasteries in central Russia and was sent by Tsar Ivan the Terrible on a diplomatic mission to Constantinople.
  - He reposed on August 17, 1571, at the Solovetsky Monastery where his monastic life had begun. His feast is kept on August 17.
liturgicalTitle: Our Venerable Father Theodorite of Kola, Enlightener of the Lapps
timeline:
  - when: c. 1481
    title: Birth in Rostov
    body: Born at Rostov the Great; his secular name is not recorded. Sources report that he received a strong theological education and studied Greek.
  - when: c. 1493–1494
    title: Enters the Solovetsky Monastery
    body: Came to the Solovetsky Monastery as a boy — by one account at age thirteen — and received monastic tonsure under the guidance of Elder Zosima, spending years in spiritual training.
  - when: "1509"
    title: Ordained hierodeacon
    body: Ordained a deacon by the Archbishop of Novgorod (named as Serapion in one source) after some fifteen years of monastic formation.
  - when: c. 1530s–1540s
    title: Mission among the Sami
    body: Settled near the mouth of the Kola River and, together with Elder Metrophanes, laboured among the Lapp (Sami) people, learning their language and translating prayers to teach the faith.
  - when: c. 1540
    title: Founds the Trinity Monastery at Kola
    body: Established a monastery at the mouth of the Kola River during roughly two decades of missionary work; this foundation is associated with the origins of the town of Kola.
  - when: 1551–1554
    title: Abbot at Suzdal
    body: Served as igumen and archimandrite of the Savior–Saint Euthymius (Spaso-Evfimiev) Monastery at Suzdal, where he enforced strict monastic discipline.
  - when: 1557–1558
    title: Mission to Constantinople
    body: Sent by Tsar Ivan the Terrible to Constantinople in connection with recognition of the tsar's title; sources place the journey in 1557 or 1558 and add visits to Mount Athos and Jerusalem.
  - when: August 17, 1571
    title: Repose at Solovki
    body: Departed to the Lord at the Solovetsky Monastery, where his monastic life had begun.
  - when: August 30, 2002
    title: Local glorification
    body: Local diocesan glorification took place after centuries of official obscurity.
sections:
  - heading: Early Life and Monastic Formation
    body:
      - Theodorite was born about 1481 at Rostov the Great; his secular name is unknown. Sources report that he received a good theological education and studied Greek.
      - He came to the Solovetsky Monastery as a boy and received monastic tonsure under Elder Zosima, developing spiritually over many years. After his early training he visited a number of monasteries to learn from experienced ascetics, spending time at the White Lake (Beloozero) region, including two years at White Lake Monastery and a period living as a solitary in the surrounding forest. When Zosima sensed his approaching death, he summoned Theodorite back to care for him during his final illness.
  - heading: Mission to the Sami
    body:
      - Theodorite travelled to the mouth of the Kola River and undertook missionary efforts among the Lapp (Sami) people together with Elder Metrophanes. The monks learned the local language and translated prayers in order to teach the indigenous population the Christian faith.
      - Sources record that he laboured among the Lapps for about twenty years, conducting missions in summer among Sami settlements and in winter among those wintering near the Kola, and that he founded a monastery at the mouth of the Kola River (dated to around 1540) associated with the beginnings of the town of Kola. Russian sources credit him with baptizing over two thousand Sami.
  - heading: Later Monastic Leadership and the Mission to Constantinople
    body:
      - Theodorite was ordained to the priesthood in Novgorod and afterward served as an abbot, and as archimandrite and igumen of the Savior–Saint Euthymius Monastery at Suzdal, where accounts describe him enforcing strict discipline and opposing corruption, which earned him powerful enemies.
      - In connection with Tsar Ivan the Terrible's title, he was sent to Constantinople to seek recognition from the Eastern patriarchs; sources date the journey to 1557 or 1558 and add that he visited Mount Athos and Jerusalem. Accounts relate that he declined the offered gifts and ecclesiastical honours, asking only for monastic solitude. He also experienced periods of confinement, and later settled at the Priluki (Spaso-Prilucsk) Monastery in Vologda, keeping contact with the Sami he had converted and visiting them again.
  - heading: Final Years and Repose
    body:
      - Theodorite spent his final years at the Solovetsky Monastery, where his monastic life had begun, and reposed there on August 17, 1571.
      - Though revered during his lifetime, he faced official obscurity for centuries, which Russian sources connect with his association with the 'non-possessors' movement that was condemned in the mid-sixteenth century. Local diocesan glorification took place on August 30, 2002, and a monument was later erected at Kandalaksha.
  - heading: Legacy
    body:
      - Theodorite is credited with creating the first written form of the Sami language and producing early translations of liturgical texts, such as the Creed and the Lord's Prayer, into Sami, drawing on the earlier script that Saint Stephen of Perm had devised for the Komi language.
      - He is remembered together with Saint Tryphon of Pechenga as one of the northern missionaries who brought Christianity to the peoples of the Kola Peninsula and the Russian Arctic.
