lifespan: d. 619
liturgicalTitle: Our Father among the Saints Laurence, Archbishop of Canterbury
overview:
  - Saint Laurence of Canterbury was a companion of Saint Augustine and the second Archbishop of Canterbury, who laboured to strengthen and unite the young English Church. Before joining the mission to England he was a monk in Rome, though nothing else is recorded of his early life.
  - He arrived in Kent as part of the Gregorian mission and later succeeded Augustine as archbishop, a tenure chiefly remembered for his efforts to reach a settlement with the Celtic churches over the dating of Easter and for the reconversion of King Eadbald after the pagan reaction that followed the death of King Æthelberht. He reposed in 619.
  - He is venerated in the Orthodox tradition as a Pre-Schism Western saint, commemorated on February 3 (also given as February 2).
sections:
  - heading: The Gregorian Mission to England
    body:
      - Laurence was a monk at Rome before travelling to England as part of the mission sent by Pope Gregory I. He landed at Thanet in Kent with Augustine in 597, though some sources place his arrival in 601, suggesting he was not among the first group of missionaries.
      - After the conversion of King Æthelberht, Augustine sent Laurence back to Rome to report to Pope Gregory. Accompanied by Peter of Canterbury, he departed sometime after July 598 and returned by June 601, bringing back Gregory's answers to a set of questions on the ordering of the new Church, known as the Libellus responsionum.
  - heading: Archbishop of Canterbury
    body:
      - Around 604 Laurence succeeded Augustine as Archbishop of Canterbury. To ensure continuity, Augustine had consecrated him before his death, even though such a consecration was prohibited by canon law. Laurence never received a pallium from Rome, which potentially left his standing questionable in Roman eyes; he received papal recognition as archbishop from Pope Boniface IV in 610. In 613 he consecrated the monastery church that Augustine had built in Canterbury.
      - "His archiepiscopate is mainly remembered for two matters: his unsuccessful effort to secure a settlement with the Celtic church, and his reconversion of King Eadbald. Laurence wrote to the Celtic bishops urging them to celebrate Easter on the Roman date. In 609 the bishop Dagan refused to eat with Laurence or even share a roof with the archbishop, owing to the differences between the two churches."
  - heading: The Reconversion of King Eadbald
    body:
      - When King Æthelberht died in 616, his son Eadbald abandoned Christianity in favour of Anglo-Saxon paganism, and the pagan reaction forced many missionaries, including Mellitus and Justus, to flee to Gaul.
      - According to Bede, Laurence had been prepared to give up when he was visited by Saint Peter in a dream or vision. Saint Peter chastised and whipped him, leaving marks on his body that remained visible. Laurence showed these marks to Eadbald, who was converted on the spot. The historian Nicholas Brooks holds that the king was converted during Laurence's archiepiscopate, within a year of his succeeding his father.
  - heading: Relics & Shrines
    body:
      - Laurence reposed on 2 February 619 (his death is traditionally dated to February 3) and was buried in the abbey of Saints Peter and Paul in Canterbury, alongside Augustine; the abbey was later renamed St Augustine's. His relics were translated to the new abbey church in 1091, and his shrine stood in the axial chapel of the church, flanking that of Augustine.
      - A Vita was written about the time of his translation by Goscelin, though it is based mainly on the account in Bede.
timeline:
  - when: "597"
    title: Arrival in Kent
    body: Laurence landed at Thanet in Kent with Augustine as part of the Gregorian mission; some sources place his arrival in 601.
  - when: after 598–601
    title: Mission to Rome
    body: Augustine sent Laurence, with Peter of Canterbury, to report to Pope Gregory I; he returned by June 601 bringing the Libellus responsionum.
  - when: c. 604
    title: Succeeds Augustine
    body: Laurence became the second Archbishop of Canterbury, having been consecrated by Augustine before his death to ensure continuity.
  - when: "609"
    title: Dispute with the Celtic church
    body: Bishop Dagan refused to eat with Laurence or share a roof with him, reflecting the divisions over Easter and other differences.
  - when: "610"
    title: Papal recognition
    body: Laurence received recognition as archbishop from Pope Boniface IV.
  - when: "613"
    title: Consecration of the monastery church
    body: He consecrated the monastery church that Augustine had built at Canterbury.
  - when: "616"
    title: Pagan reaction and reconversion of Eadbald
    body: After Æthelberht's death his son Eadbald reverted to paganism; Bede recounts that a vision of Saint Peter moved Laurence to confront the king, who was then converted.
  - when: "619"
    title: Repose
    body: Laurence died and was buried in the abbey of Saints Peter and Paul (later St Augustine's) in Canterbury; his relics were translated to the new abbey church in 1091.
