id: OS-0051
lifespan: 1924–1994
overview:
  - Saint Paisios the Athonite (1924–1994) was a Greek monk of Mount Athos who became one of the most widely sought spiritual elders of the twentieth century, known for practical and loving counsel offered to the thousands of pilgrims who came to him.
  - Born Arsenios Eznepides in Pharasa, Cappadocia, he was baptized by Saint Arsenios the Cappadocian, who is said to have foretold his monastic future. After the Greco-Turkish population exchange his family resettled in Konitsa, Epirus, where he trained as a carpenter before entering monastic life.
  - He spent most of his adult life on Mount Athos, settling at the Panagouda hermitage in 1979, where his renown grew enormously. He reposed on July 12, 1994, and was glorified as a saint by the Ecumenical Patriarchate of Constantinople in 2015.
sections:
  - heading: Early Life and Background
    body:
      - He was born Arsenios Eznepides on August 7, 1924, by the Old Style calendar, in Pharasa (Çamlıca) in Cappadocia, Asia Minor; some sources give the date as July 25, 1924. He was baptized and named by Saint Arsenios the Cappadocian, who according to tradition prophesied at the baptism that the child would become a monk, and gave him his own name in honour of that godfather-baptizer.
      - Following the Greco-Turkish population exchange, the Eznepides family resettled in Konitsa in Epirus, Greece. There Arsenios completed intermediate school and learned the trade of carpentry.
  - heading: Military Service
    body:
      - Arsenios enlisted in the Hellenic Army in 1945 during the Greek Civil War, serving as a radio operator. He is said to have voluntarily taken front-line duty in order to spare married men with families, and was remembered for bravery and self-sacrifice.
      - In 2017 he was proclaimed patron saint of the military communications corps of the Hellenic Army and of signalmen generally.
  - heading: Monastic Life
    body:
      - He arrived at Mount Athos in 1950 and came under the spiritual direction of Fr. Kyril at Koutloumousiou Monastery. On March 27, 1954, he was tonsured a Rassophore monk at Esphigmenou Monastery under the name Averkios. On March 12, 1957, he received the Small Schema at Philotheou Monastery under Elder Symeon and was renamed Paisios (one account places the Small Schema in 1956).
      - Between 1958 and 1962 he worked to support the faithful of northern Greece against Protestant proselytism, and afterward spent roughly two years at Saint Catherine's Monastery on Mount Sinai. He returned to Mount Athos in 1964, residing at the Skete of Iviron and at Katounakia.
      - In 1966 he underwent lung surgery in which part of a lung was removed, and in the same year began a lifelong association with the sisterhood at Souroti and received the Great and Angelic Schema from Elder Tikhon at a hermitage near Stavronikita Monastery. In 1979 he moved to the Panagouda hermitage, a dependency of Koutloumousiou Monastery, where his renown grew enormously and he received thousands of pilgrims while maintaining intense nighttime prayer.
  - heading: Final Years and Repose
    body:
      - On October 5, 1993, Paisios left Mount Athos permanently because of his deteriorating health. He received Holy Communion for the last time on July 11, 1994, and died the following day, July 12, 1994, at the age of 69, at the Monastery of St. John the Theologian in Souroti, near Thessaloniki.
      - In accordance with his own wishes he was buried at that monastery, next to the tomb of Saint Arsenios the Cappadocian. Thousands of pilgrims visit his tomb each year.
  - heading: Writings
    body:
      - Paisios authored multiple volumes of 'Spiritual Counsels,' covering family life, spiritual struggle, prayer, and the virtues, as well as a biography of Saint Arsenios the Cappadocian and numerous letters. His teachings became foundational reading across the Orthodox world.
  - heading: Glorification
    body:
      - On January 13, 2015, the Holy Synod of the Ecumenical Patriarchate of Constantinople formally glorified Elder Paisios as a saint, in what was described as one of the swiftest canonization processes in recent Church history. His feast day was set as July 12, the day of his repose.
      - On October 2, 2023, the Ecumenical Patriarchate also declared him patron saint of Australia.
