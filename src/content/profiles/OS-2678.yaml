id: OS-2678
lifespan: Late 1st century (Aquileia) – c. 154 (Rome)
overview:
  - Pius I was Bishop of Rome in the mid-second century, traditionally reckoned the ninth successor of the Apostle Peter. He succeeded Pope Hyginus and was followed by Pope Anicetus, governing the Roman church for roughly a decade around 140–154 (sources variously give 142–157 or 146–161).
  - His episcopate fell during the reigns of the emperors Antoninus Pius and Marcus Aurelius, a period when several influential teachers later judged heretical — Valentinus, Cerdon, and Marcion — were active in Rome, and Pius is remembered for opposing their doctrines. The apologist Justin Martyr also taught Christian doctrine in the city during these years.
  - He is venerated as a saint in both the Eastern Orthodox and Catholic Churches, with a feast on July 11. The Orthodox calendar commemorates him as a hieromartyr, though modern Roman Catholic scholarship has withdrawn the martyrdom designation for lack of evidence.
liturgicalTitle: The Holy Hieromartyr Pius, Pope of Rome
patronage: []
timeline:
  - when: c. late 1st century
    title: Birth in Aquileia
    body: Pius was born at Aquileia in northern Italy, the son of a man named Rufinus, also of Aquileia.
  - when: c. 140
    title: Accession to the see of Rome
    body: Pius succeeded Hyginus as Bishop of Rome, becoming by tradition the ninth successor of Saint Peter.
  - when: c. 140–154
    title: Episcopate under Antoninus Pius and Marcus Aurelius
    body: During his tenure he is credited with opposing the Gnostic teacher Valentinus and the figures Cerdon and Marcion, and with associated church governance in Rome.
  - when: c. 154
    title: Repose
    body: Pius died at Rome around 154 and was buried at what became St. Peter's Basilica; Anicetus succeeded him.
sections:
  - heading: Family and background
    body:
      - Ancient sources — the Muratorian Fragment, the Liberian Catalogue, and pseudo-Tertullian — identify Pius as the brother of Hermas, the author of the early Christian work The Shepherd of Hermas. The Muratorian Fragment (c. 170) states that Hermas wrote The Shepherd 'very recently, in our times, in the city of Rome, while bishop Pius, his brother, was occupying the chair of the church.'
      - Hermas describes himself as a former slave, sold to a woman named Rhode at Rome. This has led scholars to speculate that both brothers may have been freedmen, though the description could reflect low social status rather than literal servitude. Scholars debate whether the three witnesses to the sibling relationship reported it independently or drew on a common lost source such as the ecclesiastical history of Hegesippus.
  - heading: Episcopate and controversies
    body:
      - Pius governed the Roman church during a period of doctrinal conflict. Valentinus, Cerdon, and Marcion each came to Rome during his tenure, and tradition credits Pius with excommunicating them and actively opposing Valentinian and Gnostic teaching.
      - Later tradition also attributes to him a decree that Easter should be celebrated only on Sundays and the building of Santa Pudenziana, reckoned among the oldest churches in Rome. He is recorded as buried at St. Peter's Basilica.
  - heading: Martyrdom and veneration
    body:
      - "The Orthodox calendar venerates Pius as a hieromartyr, and earlier editions of the Roman Breviary likewise treated him as a martyr. Modern Roman Catholic scholarship, however, found no grounds for the martyrdom: his feast, originally ranked as a martyr's commemoration in the Tridentine calendar, was reduced in the 1955 and 1960 revisions and removed from the General Roman Calendar in the 1969 revision."
      - Both the Eastern Orthodox and Catholic Churches continue to honor him as a saint, with his feast kept on July 11. In Orthodox usage the martyr title remains traditional.
