id: OS-2834
lifespan: died c. 637 (reign began c. 627; martyred possibly in the early 640s)
liturgicalTitle: The Holy Right-believing King and Passion-Bearer Sigeberht of East Anglia
overview:
  - "Sigeberht (Old English: Sigebryht) was a seventh-century king of the East Angles who converted to Christianity while in exile in Gaul, returned to rule his kingdom, and did much to establish the faith and learning among the East Angles before abdicating to become a monk. Dragged from his monastery to face a Mercian army, he went into battle carrying only a staff and was slain, and is venerated as a martyr-king."
  - He was likely either a younger son or stepson of Rædwald of East Anglia (r. 599–624). The stepson theory is supported by his name, which is without comparison in the East Anglian Wuffingas dynasty but resembles East Saxon naming patterns, suggesting his mother may earlier have married an Essex prince. During the reign of Eorpwald he was exiled to Gaul, possibly to secure the succession of Rædwald's own descendants.
  - The principal historical source for his life is Bede's Ecclesiastical History of the English People, completed in 731. He is venerated in the Eastern Orthodox Church, in Catholicism, and in the Anglican Communion, having been canonized pre-congregation. In the calendar of the Romanian Orthodox Archdiocese of Great Britain and Ireland his feast is kept on September 27; other traditions commemorate him on January 16, January 25, or October 29.
sections:
  - heading: Exile, Conversion, and Return
    body:
      - While in Gaul during his long exile, Sigeberht underwent Christian conversion and baptism and became devoted to learning, being strongly impressed by the religious institutions and the schools for the study of reading and writing that he encountered there.
      - "Following the assassination of Eorpwald around 627, Sigeberht returned to East Anglia and became king. He appears to have gained the kingdom by military means, as his prowess as a commander was later remembered. He ruled jointly with Ecgric, described as his kinsman (Latin: cognatus), who may have been either a son or a nephew of Rædwald."
      - His Christian faith proved strategically advantageous, aligning him with Edwin of Northumbria and Eadbald of Kent, both Christian rulers of significant power.
  - heading: Establishing the Church and Schools
    body:
      - Sigeberht established Christianity throughout East Anglia with the assistance of Saint Felix of Burgundy, who had been sent by Archbishop Honorius of Canterbury. Felix became the region's first bishop, with his see at Dommoc (variously identified as Dunwich, Walton, or Felixstowe).
      - On the model he had witnessed in Gaul, Sigeberht established a school in his kingdom so that boys could be taught reading and writing in Latin; Felix obtained teachers from Kent to staff it.
      - Around 633 Sigeberht granted the Irish monk Saint Fursey a monastery site in an old Roman fort called Cnobheresburg, typically identified as Burgh Castle near Great Yarmouth. Fursey and Felix together effected a large number of conversions and established many churches in the kingdom. The church Sigeberht helped to found survived roughly two centuries under successive bishops until the Danish Great Heathen Army invaded East Anglia in the 860s.
  - heading: Abdication and Martyrdom
    body:
      - At some point during his reign Sigeberht abdicated his secular powers to Ecgric in order to pursue the religious life, retiring to a monastery later identified as Beodricesworth (modern Bury St Edmunds) in the Lark valley.
      - At an unknown date, possibly the early 640s, a Mercian army attacked East Anglia. Despite his monastic vows, Sigeberht was dragged from the monastery to the battlefield. Bede records that he went into battle carrying only a staff, refusing to bear arms.
      - Sigeberht, Ecgric, and many of the East Angles were slain and their army routed, and he came to be honoured as a Christian martyr. According to tradition he was among the kings later avenged by the slaying of Penda in 654.
timeline:
  - when: c. 627
    title: Return from exile and accession
    body: After the assassination of Eorpwald, Sigeberht returns from exile in Gaul, where he had been converted and baptized, and becomes king of the East Angles, ruling jointly with his kinsman Ecgric.
  - when: c. 630s
    title: Establishment of the Church and a school
    body: With Saint Felix of Burgundy, sent by Archbishop Honorius of Canterbury, Sigeberht establishes Christianity across East Anglia and founds a school for teaching Latin letters, modelled on what he had seen in Gaul.
  - when: c. 633
    title: Grant to Saint Fursey
    body: Sigeberht grants the Irish monk Saint Fursey a monastery site at the old Roman fort of Cnobheresburg (identified with Burgh Castle near Great Yarmouth).
  - when: c. 637 (or early 640s)
    title: Abdication and martyrdom
    body: Having abdicated to Ecgric and entered a monastery, Sigeberht is dragged out to face a Mercian army. Carrying only a staff, he is slain with Ecgric and much of the East Anglian host, and is venerated thereafter as a martyr-king.
