lifespan: "Metrophanes: c. 1855 – 1900"
liturgicalTitle: The Holy Hieromartyr Metrophanes, First Priest of China, and the Holy Martyrs of China
overview:
  - Metrophanes Chang (Chang Tzi-tzung; Chinese name Chang Yangji) was the first ordained priest of Chinese descent in the Russian Orthodox mission at Peking, and the central figure among a body of native Orthodox Christians killed during the Boxer Rising of 1900. He is commemorated together with his family and some two hundred and twenty-two faithful of the Peking Mission who refused to renounce Christ, a group remembered collectively as the Martyrs of China.
  - The Orthodox presence in Peking traced its origin to a mission the Russian Church established in 1685, rooted in a community descended from the Albazinian captives. By the close of the nineteenth century this mission had produced a native clergy and laity who, during the anti-foreign and anti-Christian violence of the Boxer movement in the summer of 1900, were given the choice of apostasy or death.
timeline:
  - when: "1855"
    title: Birth
    body: Metrophanes was born on December 10, 1855, in Qing-dynasty China.
  - when: "1880"
    title: Ordained the first Chinese Orthodox priest
    body: At about the age of twenty-five he was ordained to the priesthood by Bishop Nicholas of Japan, becoming the first Orthodox priest of Chinese descent. He served the Peking Mission for roughly fifteen years.
  - when: June 1, 1900
    title: Mission church destroyed
    body: As the Boxer Rising reached Peking, his church and the mission print shop were destroyed.
  - when: June 7, 1900
    title: Martyrdom of his son Isaiah
    body: His son Isaiah, who had served as a soldier and was about twenty-three years old, was beheaded for confessing himself a Christian.
  - when: June 10, 1900
    title: Martyrdom of Metrophanes
    body: After Boxers reached his home, where some seventy Christians had taken shelter, Metrophanes was stabbed in the chest and fell beneath a date tree. His young son John and Isaiah's betrothed, Maria, were killed the same day.
  - when: June 12, 1900
    title: Martyrdom of Presbytera Tatiana
    body: His wife Tatiana was beheaded at a Boxer encampment, by some accounts near the Andingmen gate.
sections:
  - heading: The Peking Mission
    body:
      - The Russian Orthodox mission in Peking dated to 1685 and grew out of a community descended from Albazinian captives resettled in the Chinese capital. Over the following two centuries it gradually built up a native congregation, and in Metrophanes it gained its first Chinese-born priest, ordained by Bishop Nicholas of Japan. His pastoral work spanned roughly fifteen years and included the upkeep of a mission press, destroyed at the outbreak of the violence in 1900.
  - heading: The Boxer Rising and the martyrdom
    body:
      - The Boxer movement of 1900 directed its hostility against foreigners and Chinese Christians alike, and those it seized were pressed to renounce their faith on pain of torture and death. Two hundred and twenty-two members of the Peking Mission, led by Metrophanes, refused. The accounts record that some seventy Christians had gathered for safety at the priest's house when it was attacked.
      - Metrophanes and members of his household were among those killed. His son Isaiah, a soldier, was beheaded on June 7; Metrophanes himself was stabbed in the chest on June 10, the same day his young son John was killed after being grievously mutilated, and his son Isaiah's betrothed Maria also died; his wife Tatiana was beheaded on June 12. One son, Sergei, survived the rising and later became an archpriest of the Church.
  - heading: Relics & Shrines
    body:
      - By tradition the bodies of the martyrs were gathered and, in 1903, laid under the altar of a church built in their memory at the site of the Peking Mission.
  - heading: Veneration
    body:
      - The Holy Synod of the Russian Orthodox Church approved the local veneration of the Chinese Martyrs in 1902. Church-wide veneration was subsequently blessed, with the Bishops' Council confirming their commemoration on February 3, 2016. Their common feast is kept on June 11.
patronage:
  - China and the Orthodox Christians of China
