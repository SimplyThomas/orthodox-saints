works:
  - title: Catechetical Lectures
    desc: Eighteen instructions delivered to catechumens preparing for baptism, expounding the creed and the Christian life.
  - title: Mystagogical Catecheses
    desc: Five instructions for the newly baptized explaining the sacraments of baptism, chrismation, and the Eucharist.
  - title: Letter to Constantius
    desc: A letter to the Emperor Constantius recording the appearance of a luminous cross over Jerusalem in 351.
