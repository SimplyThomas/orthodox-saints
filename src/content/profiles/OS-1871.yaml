    title: Birth of Michael
    body: Michael Vsevolodovich is born, a son of Vsevolod Olgovich Chermny; some sources give 1179 or 1195.
  - when: "1206"
    title: Prince of Pereyaslavl
    body: Michael takes up the first of his many princely seats.
  - when: "1223"
    title: Battle of the Kalka River
    body: Michael participates in the early clash between the princes of Rus' and the Mongols.
  - when: 1236–1239
    title: Grand Prince of Kiev
    body: Michael holds Kiev as Grand Prince for the first time, ruling again in 1241–1243.
  - when: "1246"
    title: Martyrdom at the Golden Horde
    body: Summoned to Saray, Michael and his councilor Theodore refuse the pagan rites and are tortured and beheaded; Michael dies on September 20 at Saray, near modern Astrakhan.
  - when: before 1271
    title: Canonization at Rostov
    body: Michael is canonized as a martyr.
