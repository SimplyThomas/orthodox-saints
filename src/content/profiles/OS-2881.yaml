flagReasons:
  - claim: Nektarios is identified as Theophanes's 'elder' brother
    detail: No source in the dossier explicitly identifies which brother was the elder. The anchor and external texts consistently say 'his brother' or 'brothers' without specifying relative age. The johnsanidopoulos source names 'Nektarios and Theophanes' (Nektarios first), but naming order is not a statement of birth order.
  - claim: Patronage includes 'Meteora'
    detail: No source in the dossier names Theophanes as a patron of Meteora. The association is inferred from his geographical role as monastery founder there, but no source states a patronage over the place.
