id: OS-2905
lifespan: Died 13 April 396
overview:
  - Saint Ursus was bishop of Ravenna in the late fourth century, remembered above all as the builder of the city's first cathedral, which was named the Basilica Ursiana in his honor. By tradition he was born into a noble family of Sicily and converted to Christianity, drawing the opposition of his pagan relatives — his father's resistance is described as violent — after which he fled to Ravenna.
  - Elected bishop following the death of his predecessor Liberius III, Ursus held the see for a tenure traditionally reckoned at roughly twenty to twenty-six years. He co-consecrated Saint Bassianus of Lodi and is remembered for reviving the observance of the feasts of the saints, a custom that had lapsed in his day. He is venerated as a saint in both the Eastern Orthodox and Roman Catholic Churches, with his feast kept on 13 April.
liturgicalTitle: Our Father among the Saints Ursus, Bishop of Ravenna
patronage:
  - Against faintness
  - Against kidney disease
timeline:
  - when: 4th century
    title: Birth and conversion in Sicily
    body: By tradition Ursus was born into a noble pagan family in Sicily and converted to Christianity, angering his relatives; his father's opposition is described as violent.
  - when: 4th century
    title: Flight to Ravenna
    body: To escape his family's displeasure, Ursus fled to Ravenna, where he would later be raised to its episcopal see.
  - when: c. 370
    title: Election as bishop of Ravenna
    body: Following the death of his predecessor Liberius III, Ursus was elected bishop of Ravenna. His tenure is traditionally reckoned at some two to two and a half decades, though the dates are disputed.
  - when: "385"
    title: Foundation of the Basilica Ursiana
    body: According to the primary chronology, Ursus founded the Ravenna Cathedral, the city's first cathedral, which was named the Basilica Ursiana in his honor.
  - when: 13 April 396
    title: Repose
    body: According to the chronicler Andreas Agnellus, Ursus died on 13 April 396, a day that in that year coincided with Easter Sunday. He was buried at the Basilica Ursiana.
sections:
  - heading: The Basilica Ursiana
    body:
      - Ursus's most significant achievement was the founding of the Ravenna Cathedral, the first cathedral of the city, which was originally called the Basilica Ursiana after him. The primary chronology places its foundation in 385, during his episcopate.
      - The original basilica did not survive intact. It was sacked during the Battle of Ravenna in 1512 and afterward underwent substantial reconstruction, and in the eighteenth century it was completely redesigned in the Baroque style. The cathedral continues to house sarcophagi of early Christian figures connected with Ravenna's episcopal history. A painting by Vincenzo Camuccini depicts Saint Ursus consecrating the cathedral of Ravenna.
  - heading: Episcopate and legacy
    body:
      - Ursus co-consecrated Saint Bassianus of Lodi, linking his ministry to the wider network of Italian bishops of his era. He is also remembered for reviving the celebration of the feasts of the saints, a devotional custom that had fallen away in his time.
      - The chronology of his episcopate is disputed. The primary reckoning dates his tenure to roughly 370–396, while an alternate chronology proposes about 405–431 in order to align with claims that he was directly succeeded by Peter Chrysologus. He is venerated in both the Eastern Orthodox and Roman Catholic Churches on 13 April, and his cult belongs to the era of early, pre-Congregation canonizations. He is also known by the names Orso and Ours, and is invoked as a patron against faintness and against kidney disease.
