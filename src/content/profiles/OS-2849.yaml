id: OS-2849
lifespan: 6th century (died c. 560/561)
overview:
  - Saint Caesaria the Younger was a sixth-century abbess of the women's monastery of Saint-Jean at Arles in Gaul, appointed around 525 to succeed her aunt, Saint Caesaria the Elder. She was the probable niece of Bishop Caesarius of Arles, who founded the community and entrusted its governance to the women of his family.
  - Under her leadership the convent grew to some two hundred nuns and became renowned as a centre of prayer, ascetic discipline, and the copying of Scripture and theological texts. She is remembered as a teacher who championed the literacy of nuns and a moderate, sustainable asceticism.
  - "Her influence extended beyond Arles: she transmitted the monastic Rule of Caesarius to Queen Radegund's new foundation at Poitiers and left surviving letters that scholars regard as among the most scripturally saturated writings of Merovingian Gaul. She is commemorated on January 12 together with Caesaria the Elder and the Caesarian family of Arles."
liturgicalTitle: Our Venerable Mother Caesaria the Younger, Abbess of Arles
patronage:
  - Nuns
  - Monastics
  - Scribes and copyists
  - Christian education
timeline:
  - when: c. 525
    title: Appointed abbess of Arles
    body: Caesaria the Younger was appointed by Bishop Caesarius of Arles to succeed her aunt, Caesaria the Elder, as abbess of the women's monastery of Saint-Jean, which she then governed for roughly three and a half decades.
  - when: June 22, 534
    title: Revised monastic rule
    body: Caesarius issued a revised rule for the community, granting the nuns the right to elect their own abbess in future generations.
  - when: "542"
    title: A community of about 200 nuns
    body: By the time of Caesarius's death, some two hundred nuns were in Caesaria's care. She encouraged Cyprian of Toulon to write the bishop's biography.
  - when: c. 552–557
    title: Rule sent to Poitiers
    body: She sent a copy of the Regula virginum, together with an encouraging letter, to Queen Radegund, who used it for her foundation of the Holy Cross Abbey at Poitiers.
  - when: c. 560/561
    title: Death and succession
    body: Caesaria the Younger died around 560, and was succeeded as abbess by Liliola.
sections:
  - heading: Historical Context
    body:
      - The monastery of Saint-Jean was established at Arles by Bishop Caesarius for his sister, Caesaria the Elder, who had trained under the monastic foundation of John Cassian at Marseille. Originally built outside the city walls, the convent was destroyed in warfare, rebuilt within the walls, and dedicated on August 26, 512.
      - Caesaria the Elder governed the community for over a decade before her death around 525, when she was buried in the adjacent basilica of Saint Mary. Caesaria the Younger, the probable niece of Caesarius, was appointed to succeed her and led the monastery through the middle decades of the sixth century.
  - heading: Leadership and Contributions
    body:
      - The community observed permanent enclosure and a disciplined common life of psalmody, fasting, vigils, and reading, alongside needlework and service to the poor. Nuns abstained from meat except in illness.
      - Caesaria made the copying of manuscripts a hallmark of the monastery. Cyprian of Toulon wrote that under her governance the virgins of Christ, amid psalms, fasts, vigils, and readings, beautifully copied out the holy books with their mother herself as teacher. The community produced copies of Scripture, sermons, and theological texts.
      - She advocated for the literacy of nuns and a moderate, sustainable asceticism, recommending the regular reading of the Gospels and the memorization of the Psalms. She was noted by contemporaries for her diligent meditation on the divine volumes.
  - heading: Writings and Legacy
    body:
      - Caesaria commissioned Cyprian of Toulon to compose a biography of Caesarius after the bishop's death in 542, an act that helped preserve the memory of the founder of Arlesian monasticism.
      - Between roughly 552 and 557 she transmitted the Rule of Caesarius to Queen Radegund's monastery at Poitiers, extending the influence of the Arlesian tradition into the Frankish kingdom. Her accompanying letter to Radegund and Richild, preserved in a tenth- or eleventh-century manuscript, has been described by scholars as the most densely scriptural of all surviving letters from Merovingian Gaul.
      - Her monastic rule and correspondence have been preserved and studied by scholars including Germanus Morin and Maria McCarthy. The monastery she led continued to operate until the French Revolution in 1789.
  - heading: Family
    body:
      - Caesaria the Younger was the probable niece of Bishop Caesarius of Arles and the successor of Caesaria the Elder, the bishop's sister, who had been the first abbess of the monastery. The governance of the community thus passed within the Caesarian family of Arles.
      - She was educated in the monastery from her youth, and after her death around 560 she was succeeded as abbess by Liliola.
