id: OS-1676
lifespan: 1st century
overview:
  - Matthias was an apostle of the early Christian Church, chosen to take the place of Judas Iscariot among the Twelve after Judas's betrayal and death. According to the Acts of the Apostles, he had accompanied Jesus from His baptism by John until His Ascension, qualifying him as a witness to the whole of Christ's earthly ministry.
  - "His selection was unique among the apostles: rather than being called during Jesus's earthly ministry, he was chosen after the Ascension. Peter proposed to the assembled disciples, numbering about 120, that a candidate be named to fill the vacant apostolic place. Two men were put forward, Joseph called Barsabbas (also known as Justus) and Matthias, and after the disciples prayed for the Lord to reveal His choice, they cast lots; the lot fell to Matthias, and he was numbered with the eleven apostles."
  - By the account preserved in the OCA Synaxarion, Matthias was born at Bethlehem of the Tribe of Judah and studied the Law of God in his youth under the guidance of Saint Simeon the God-Receiver. He came to faith when the Lord Jesus Christ revealed Himself to the world, recognizing Him as the promised Messiah. After his calling he preached Christ and ultimately suffered for the faith.
liturgicalTitle: The Holy, Glorious and All-Praised Apostle Matthias
timeline:
  - when: 1st century
    title: Companion of Christ's ministry
    body: Matthias was among those who followed Jesus from His baptism by John the Baptist until the Ascension, making him a witness to the whole of Christ's public ministry.
  - when: After the Ascension
    title: Chosen by lot to replace Judas
    body: Peter proposed to the roughly 120 assembled disciples that the vacant apostolic place left by Judas Iscariot be filled. Two candidates were named, Joseph called Barsabbas and Matthias; after prayer, the disciples cast lots and the lot fell to Matthias, who was numbered with the eleven.
  - when: 1st century
    title: Missionary preaching
    body: Matthias preached the Gospel. Differing ancient traditions place his labors in Judaea, Cappadocia, the coasts of the Caspian Sea near the port of Hyssus, and the interior of Ethiopia in the region of Colchis.
  - when: 1st century
    title: Martyrdom
    body: "Tradition records that Matthias suffered for the faith. Accounts differ: one holds he was stoned and then beheaded at Jerusalem, another that he was crucified, while Hippolytus of Rome reports he died of old age."
