id: OS-2875
lifespan: Late 3rd–early 4th century
overview:
  - Bryaena (also transliterated Bryainē) was the abbess of a women's monastery at Nisibis in Mesopotamia in the late third and early fourth centuries, and the aunt of the virgin-martyr Febronia, whom she raised within the community. She is commemorated on June 25.
  - She governed a convent of some fifty ascetics under a strict rule and is remembered chiefly through the account of her niece's martyrdom during the persecution of Diocletian (284–305), recorded by the nun Thomais, a fellow sister and eyewitness.
sections:
  - heading: Abbess of Nisibis
    body:
      - Bryaena led a community of about fifty ascetic women near Nisibis in Mesopotamia. The convent followed the rule laid down by its former abbess, the blessed Platonida, which set aside every Friday for prayer and the reading of the sacred books alone, with no other work undertaken on that day.
      - The reading of Scripture on these days was ordinarily assigned to her niece Febronia, whose spiritual life became widely known in the city and drew visitors to the convent.
  - heading: Guardian of Saint Febronia
    body:
      - Febronia was the daughter of Bryaena's brother and had been raised in the monastery from childhood. Concerned above all for her niece's salvation, Bryaena assigned her a stricter form of life than the other sisters, including a severe fast in which she ate only once every other day and rested seated upright rather than in a bed.
      - According to the sources, mindful of Febronia's exceptional beauty, Bryaena had her read the sacred books to the community from behind a curtain, so that the sisters would not be distracted by her appearance.
  - heading: The Persecution and Its Aftermath
    body:
      - When a detachment of soldiers approached the convent during the persecution under Diocletian, most of the inhabitants hid; only Bryaena, her helper Thomais, and Febronia—who was gravely ill at the time—remained. Fearing that her niece might fall into the hands of the torturers, Bryaena prayed fervently that the Lord would preserve her and strengthen her in the confession of Christ.
      - After Febronia's martyrdom, Bryaena collapsed at the sight of her niece's mutilated remains. Recovering, she ordered the convent gates opened so that the faithful could come to venerate the martyr, and she received into the community Hieria, a converted pagan widow who had been drawn to the faith through Febronia, in her niece's place. Thereafter a solemn feast was kept at the convent each year on the day of Febronia's death.
