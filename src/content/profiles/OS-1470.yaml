    title: Martyrdom at Caesarea
    body: According to the synaxarion, Theodotus and Theodotia are put to death at Caesarea in Cappadocia under the emperor Trajan for refusing to sacrifice to idols. Some liturgical sources give the year as 108 and name a companion martyr, Hyacinth.
