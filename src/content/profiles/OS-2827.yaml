id: OS-2827
lifespan: Died c. 550
overview:
  - "Saint Padarn (Latin: Paternus or Padarnus; Welsh: Padarn; Breton: Padern) was an early sixth-century British abbot-bishop who founded the monastery and church of Llanbadarn Fawr in Ceredigion, Wales. He is counted among the principal saints of Wales alongside Saints David and Teilo, and is venerated in the Eastern Orthodox Church, the Roman Catholic Church, and the Anglican Communion."
  - According to the Vita Sancti Paterni, Padarn was Armorican (Breton) by race, the son of Petran and Guean, both of whom dedicated themselves to the religious life; his father left Brittany for Ireland. Scholarly opinion on his origins varies, some favouring a Breton and others a Welsh background, with the possibility of later confusion between several Breton saints bearing the same name.
  - His principal foundation, the monastery at Llanbadarn Fawr near Aberystwyth, became the seat of a new diocese with Padarn as its first bishop. He is commemorated on April 15.
liturgicalTitle: Our Father among the Saints Padarn, Bishop of Llanbadarn Fawr
patronage:
  - Ceredigion
  - Llanbadarn Fawr
timeline:
  - when: c. 524
    title: Journey to Ireland and monastic formation
    body: Padarn travelled to Ireland to join his father and a fellowship of monks led by his cousin Saint Cadvan, who were journeying to Britannia. He became a student at Illtud's school, Cor Tewdws.
  - when: 6th century
    title: Foundation of Llanbadarn Fawr
    body: Padarn founded a monastery at Llanbadarn Fawr near Aberystwyth, which became the seat of a new diocese with him as first bishop.
  - when: c. 550
    title: Repose
    body: After returning late in life to Letavia (Brittany), where he built a monastery and served as a bishop of Armorica, Padarn died around 550.
sections:
  - heading: Origins and Formation
    body:
      - "The Vita Sancti Paterni describes Padarn as Armorican by race, born to his father Petran and mother Guean, both of whom embraced the religious life; his father departed Brittany for Ireland. Scholars have disagreed over his true origins: Thomas Wakeman identified him as a nephew of Hoel of Cornouaille, while Canon G. H. Doble and Emrys George Bowen favoured a Welsh origin, suggesting later confusion with other Breton saints of the same name."
      - Around 524 Padarn travelled to Ireland to join his father and a company of monks led by his cousin Saint Cadvan who were journeying to Britannia. He studied at Illtud's school, known as Cor Tewdws, before establishing his own monastic foundation.
  - heading: Llanbadarn Fawr and the Welsh Episcopate
    body:
      - Padarn founded the monastery at Llanbadarn Fawr near Aberystwyth, which became the seat of a new diocese with him as its first bishop. The settlement takes its name from him — 'the great church of Padarn' — and dates from the sixth century, predating the neighbouring town of Aberystwyth; Aberystwyth's castle was itself originally named after Llanbadarn, indicating the settlement's early prominence.
      - The mother church he founded is commemorated in Saint Padarn's Church, a partly Romanesque parish church on the original site; the present structure dates to 1257.
      - The Vita relates that Padarn travelled to Jerusalem together with Saints David and Teilo to be ordained bishops by the patriarch, who is said to have given the three the gift of tongues so that all who heard them understood in their own language. The patriarch gave Padarn a crozier and a finely woven tunic. On their return the three saints amicably divided Britannia into three bishoprics.
  - heading: Return to Brittany
    body:
      - Late in life Padarn returned to Letavia (Brittany), where the Vita reports that his fame filled the region. He made peace with Bishop Samson at Vannes, built a monastery there, and became the seventh bishop of Armorica alongside six other regional bishops.
      - "He appears to be identical with Saint Paternus of Avranches in Normandy. Three solemnities honoured him in Armorica: the day of unity with six chief saints (the Kalends of November), his date of death, and his episcopal ordination (the twelfth day before the Kalends of July)."
  - heading: Miracles and Traditional Accounts
    body:
      - The Vita recounts a dispute with King Maelgwn Gwynedd, who sought to cheat Padarn of monastic property. Two of Maelgwn's heralds were defeated by a trial by ordeal of boiling water, and the king himself was afflicted with sickness and blindness until he asked forgiveness and bestowed lands on Padarn's community, described as reaching from the mouth of the river Rheidiol upwards to where it meets the head of the river Clarach.
      - The most celebrated episode concerns King Arthur, who attempted to seize Padarn's tunic. When Arthur returned in rage, the earth is said to have opened and swallowed him up to his chin until he repented and begged forgiveness, thereafter taking Padarn as his continual patron. Padarn's vita is notable as one of only a small number of insular and Breton saints' lives that mention King Arthur independently of Geoffrey of Monmouth's Historia Regum Britanniae.
  - heading: Dedications
    body:
      - Churches dedicated to Padarn include Saint Padarn's Church at Llanbadarn Fawr, a church in Llanberis in Gwynedd, and three churches in Radnorshire.
  - heading: Sources and Veneration
    body:
      - OrthodoxWiki carries no dedicated hagiographic article on Padarn of Ceredigion; he appears in its Timeline of Saints (feast April 15) and among the Western Saints before the AD 1054 Schism.
      - Wikipedia records his feast as April 16, while the database entry commemorates him on April 15.
