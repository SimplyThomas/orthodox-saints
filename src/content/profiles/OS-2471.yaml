      note: First bishop of Karpasia, ordained within the circle of Saint Epiphanius of Salamis; Synesius's immediate predecessor in the see.
patronage:
  - Patron saint of the village of Rizokarpaso and protector of the Karpas Peninsula in Cyprus.
