id: OS-0069
lifespan: c. 1690 – 27 May 1730
overview:
  - John the Russian (c. 1690 – 9 June [O.S. 27 May] 1730) was a Russian Orthodox soldier taken captive during the Russo-Turkish war and held as a slave in Asia Minor, where he lived out his life in the village of Prokopion near Caesarea. He is venerated in Eastern Orthodoxy as a Righteous Confessor of the Faith and Wonderworker.
  - Born in the south of Russia to Orthodox parents, he was conscripted into the army of Peter I as a simple soldier and was captured during the Prutsk campaign. Brought to the household of a Turkish cavalry commander, he refused under threats, torture, and beatings to abandon his Christian faith, after which his master assigned him to care for the household stable, which also served as his living quarters.
  - He reposed on 27 May 1730 at about forty years of age. His relics, regarded as incorrupt, were carried by refugees from Cappadocia to Euboea, Greece, after the Asia Minor Disaster of 1922–24, where they remain a major shrine and pilgrimage site. His feast day is commemorated on 27 May (O.S.).
sections:
  - heading: Captivity and Life in Prokopion
    body:
      - Upon reaching maturity, John was called to serve as a simple soldier in the army of Peter I. During the Prutsk campaign of the Russo-Turkish war he was taken prisoner and ended up as a slave of a Turkish cavalry commander, who brought him to the village of Prokopion, near Caesarea in Asia Minor.
      - As with other captured Christian soldiers, John was threatened, tortured, and subjected to pressure to convert to Islam, all of which he resisted while enduring humiliation and beatings. According to the sources, his master's heart softened on account of John's firm faith, and John was assigned to care for the master's stable, which also became his living quarters.
      - By tradition, John regarded his corner of the stable as a small paradise where he could freely pray, recalling the cave and manger of Christ's nativity. He is said to have left his bed to keep vigil at the nearby Church of the Great Martyr George, and on Saturdays and feast days to receive Holy Communion.
  - heading: Repose
    body:
      - Foreseeing his end, John summoned a priest from the church he had attended and asked to receive Communion. The sources relate that the priest, fearing to bring the Eucharist openly into the stable, hollowed out the core of an apple, lined the cavity with beeswax, and concealed the Communion inside in order to bring it to him.
      - After receiving Communion, John reposed on 27 May 1730, at about forty years of age.
  - heading: Relics & Shrines
    body:
      - John's relics were brought from the village of Prokopion to Euboea by refugees from Ürgüp in Cappadocia, following the Asia Minor Disaster of 1922–24. For several decades they were kept in the church of Saints Constantine and Helen at New Prokopion, Euboea.
      - In 1951 the relics were transferred to a new church dedicated to St. John the Russian, within the Monastery of Saint John the Russian. The sources describe the body as small, clothed in a garment resembling that of an altar server, with a dark face covered by a gold mask and one exposed, darkened hand.
      - The shrine draws pilgrims from across Greece, particularly on his feast day. John is also widely venerated on Mount Athos, particularly in the Russian monastery of St. Panteleimon. His major shrine is the Church of Saint John the Russian in Prokopi, Euboea, Greece.
