sections:
  - heading: Captivity and Witness
    body:
      - After his capture in the Prut Campaign, John was sold to an Ottoman cavalry commander (Ağa) in Prokopion, near Caesarea in Cappadocia. His captors attempted to force his conversion to Islam through mockery, threats, and torture, but he resisted, according to tradition declaring that he would rather surrender his head than change his faith. In time his master ceased these attempts.
      - Assigned to care for the animals, John lived in the stable, slept on the hay with only an old coat, and made his quarters a place of prayer. He worked diligently by day, prayed and fasted strictly, secretly attended the cave-church of the Great Martyr George by night, and received Holy Communion on Saturdays and feast days. Despite his own poverty he is said to have assisted the poor. His master came to recognize that his own prosperity was bound up with John's presence and spiritual integrity.
  - heading: Miracles & Traditions
    body:
      - "Traditional Accounts: The best-known account concerns a dish of pilaf (pilau). While his master was away on pilgrimage to Mecca, John is said to have prayed over a plate of the rice dish for it to be delivered to his master; the plate vanished, and the Ağa later found the steaming pilaf in his locked residence in Mecca, the copper plate engraved with his own name and matching those of his household."
      - "Historically Documented: Some three and a half years after his death, his relics were found incorrupt and were placed in the Church of the Great Martyr George, where they became venerated for reported miraculous healings. The shrine on Euboea continues to draw thousands of pilgrims, particularly on his feast day."
  - heading: Relics & Shrines
    body:
      - John was first buried at the Church of St. George in Prokopion. His relics were later found incorrupt and enshrined there for veneration. In 1881 a portion of his relics was transferred to the Monastery of St. Panteleimon on Mount Athos, where his right hand is kept and where he receives particular veneration.
      - After the Greek-Turkish population exchange of 1924, the inhabitants of Prokopion carried his relics with them to the island of Euboea (Evia) in Greece, settling in a town they named Prokopi. In 1951 the relics were enshrined in a new church dedicated to him there, now the Church of St. John the Russian, which has become a major site of Orthodox pilgrimage.
