id: OS-0069
lifespan: c. 1690 – 27 May 1730
overview:
  - John the Russian was an 18th-century Russian soldier who was taken captive and enslaved in Asia Minor, where he became revered for his steadfast Orthodox faith under the conditions of bondage. Born around 1690 in Little Russia (the Cossack Hetmanate, within the Russian Tsardom) and raised in Christian piety, he was conscripted as a simple soldier into the army of Peter the Great.
  - During the Russo-Turkish War, in the Prut (Prutsk) Campaign of 1711, John was taken prisoner and sold into slavery to an Ottoman cavalry commander who lived in the village of Prokopion (Ürgüp) in Cappadocia, Asia Minor. Despite mockery, threats, and torture intended to force his conversion to Islam, he refused, declaring that he would sooner surrender his head than change his faith.
  - Set to work tending his master's animals, John lived in the stable, slept on the hay, and turned his humble quarters into a place of prayer. He kept strict fasting, secretly attended services at the nearby cave-church of the Great Martyr George, and received Holy Communion on Saturdays and feast days. In time his diligence, humility, and integrity won the respect of his master and household. He died on 27 May 1730 (Old Style), and his incorrupt relics, later carried to the Greek island of Euboea after the 1924 population exchange, made him one of the most venerated saints of the post-Byzantine period.
