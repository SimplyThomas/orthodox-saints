id: OS-2023
lifespan: Died October 15, 1373
overview:
  - Saint John (Ioann) was a monk of Suzdal who became the first bishop of the joint Diocese of Suzdal and Nizhny Novgorod. Consecrated in 1350, he is remembered for his humility, his compassion toward the poor and sick, and the miracles reported at his tomb.
  - As a young man he entered one of the monasteries of Suzdal, where his virtuous and humble manner of life became widely known. On account of this reputation he was chosen to lead the newly organized diocese, at the request of Prince Konstantin Vasilievich of Suzdal-Nizhny Novgorod.
  - His episcopal ministry was marked by charitable works, advocacy on behalf of the poor before the ruling princes, and missionary activity among the pagan Mordvin people. He reposed peacefully in seclusion at the Bogolyubsky Monastery, and is venerated by the Russian Orthodox Church in the rank of hierarchs.
liturgicalTitle: Our Father among the Saints John, Bishop of Suzdal and Nizhny Novgorod
patronage:
  - The poor and destitute
  - The sick
timeline:
  - when: "1350"
    title: Consecrated bishop
    body: John was consecrated by the Patriarch of Constantinople at Nizhny Novgorod, at the request of Prince Konstantin Vasilievich of Suzdal-Nizhny Novgorod, becoming the first bishop of the joint Diocese of Suzdal and Nizhny Novgorod.
  - when: October 15, 1373
    title: Repose
    body: After Suzdal was incorporated into the Moscow Diocese, John took monastic vows and withdrew to the Bogolyubsky Monastery, where he lived in seclusion until his peaceful death. Numerous miracles were later reported at his grave.
  - when: August 20, 1879
    title: Translation of relics
    body: The relics of Saints Feodor and John were transferred into new silver reliquaries.
  - when: "1998"
    title: Relics moved within Suzdal
    body: The relics were moved from the Cathedral of the Nativity of the Theotokos to the Church of the Kazan Icon in Suzdal.
sections:
  - heading: Pastoral Ministry and Charity
    body:
      - Chosen for the episcopacy on account of his exemplary conduct, John devoted his ministry to works of mercy. He showed particular love toward the destitute and the sick, and actively advocated with the princes to reduce the taxes borne by the poor.
      - He established poor houses and hospices for the care of the sick. He also gave priority to missionary work, laboring for the conversion of the pagan Mordvin people to Christianity.
  - heading: Historically Documented
    body:
      - John served as the founding bishop of the combined Diocese of Suzdal and Nizhny Novgorod from his consecration in 1350 until his repose in 1373. He is venerated by the Russian Orthodox Church in the rank of hierarchs, and is commemorated on October 15 (his repose) and August 20 (the translation of his relics).
      - Russian sources note that the historical record concerning John is meager and at times contradictory, particularly regarding his origins and early life.
  - heading: Traditional Accounts
    body:
      - According to tradition, Prince Boris of Suzdal witnessed an angel of God attending the saint during the Divine Liturgy, an event regarded as a divine attestation of his sanctity.
      - Numerous miracles and healings were reported at his grave following his death.
  - heading: Relics & Shrines
    body:
      - In 1879 the relics of Saints Feodor and John were placed in new silver reliquaries. In 1998 John's relics were moved from the Cathedral of the Nativity of the Theotokos to the Church of the Kazan Icon in Suzdal.
