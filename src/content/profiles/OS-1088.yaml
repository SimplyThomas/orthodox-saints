lifespan: d. 1814
liturgicalTitle: The Holy New Martyr Euthymius of Mount Athos
overview:
  - Euthymius of Mount Athos was an Orthodox monk martyred at Constantinople in 1814. Born in the Peloponnese and baptized Eleutherius, he abandoned his intended monastic vocation while traveling abroad, embraced Islam under social pressure, and was renamed Reschid. Tormented by remorse, he escaped to Mount Athos, was received back into the Orthodox Church, and took monastic vows under the name Euthymius.
  - Resolving to atone for his apostasy through public confession, he returned to Constantinople, declared his Christian faith before the Ottoman authorities, and was beheaded on March 22, 1814. He is commemorated on May 1 together with two other Athonite new martyrs of the same era, Ignatius and Acacius.
timeline:
  - when: Early life
    title: Birth and upbringing in Demitsana
    body: Eleutherius was born in Demitsana in the Peloponnese to Panagiotes and Maria, the youngest of five children alongside George, Christos, John, and Katerina. After schooling in his hometown, he and his brother John traveled to Constantinople intending to study at the Patriarchal Academy, and later moved to Jassy in Romania, where their father conducted business.
  - when: Before 1814
    title: Apostasy and return
    body: While at Bucharest awaiting passage to Mount Athos, with his journey delayed by conflict between Russia and Turkey, he abandoned his monastic plan. Traveling onward in the company of Muslims, he turned from Orthodoxy, embraced Islam, was circumcised, and was given the name Reschid. Conscience-stricken and eventually found wearing a cross, he escaped with the help of the Russian embassy to Mount Athos, where at the Great Lavra he was chrismated, received back into the Church, and tonsured a monk as Euthymius.
  - when: March 19, 1814
    title: Return to Constantinople
    body: Inspired by reading the New Martyrologion of Saint Nikodemos the Hagiorite to seek martyrdom in expiation of his apostasy, Euthymius arrived in Constantinople in the company of the monk Gregory.
  - when: March 22, 1814
    title: Confession and martyrdom
    body: After receiving Holy Communion on Palm Sunday, he set aside his monastic garb, dressed as a Muslim, and went to the palace of the Grand Vizier. There he openly confessed his Christian faith, denounced Mohammed, and trampled his turban underfoot. Refusing the Vizier's promises and threats to recant, he was beaten, imprisoned, and put to the sword around midday; when the first blows failed, the executioner cut his throat.
sections:
  - heading: Commemoration and Companions
    body:
      - Euthymius is commemorated on May 1 together with the New Martyrs Ignatius and Acacius, both also monks of Mount Athos who suffered in the same period, though the three were martyred separately and in different years. Their joint commemoration reflects a wider current of Athonite new-martyr witness during Ottoman rule, in which monks deliberately confessed Christ before the authorities, a practice encouraged by collections such as the New Martyrologion of Saint Nikodemos the Hagiorite.
  - heading: Relics & Shrines
    body:
      - The head of Saint Euthymius is preserved at the Monastery of Saint Panteleimon on Mount Athos.
companions:
  - name: New Martyr Ignatius of Mount Athos
    note: Fellow Athonite new-martyr — commemorated with him on May 1; the Bulgarian-born monk whom Euthymius met at Bucharest and who was hanged at Constantinople in October 1814.
    href: saint/OS-1089
  - name: New Martyr Acacius of Mount Athos and Seres
    note: Fellow Athonite new-martyr — commemorated with him on May 1; beheaded at Constantinople in 1816 after returning from apostasy, his relics venerated beside Euthymius's on the Holy Mountain.
    href: saint/OS-1090
patronage:
  - Those returning to the faith after apostasy or lapse
  - Penitents
