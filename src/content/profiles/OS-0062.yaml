celebration:
  intro: Ways to honor St Stylianos, protector of children.
  ideas:
    - idea: Place his icon in the child's room or over the crib, since he is the beloved protector of children and infants, and say a short prayer for the little ones each night.
    - idea: Make his feast a day to pray for children — your own, godchildren, the sick, the unborn, and couples longing for a child.
    - idea: Celebrate the name-day of anyone named Stylianos or Styliani with the festal greeting and a treat.
    - idea: Look at his icon together (he is shown cradling a swaddled baby) and let children point out the child in his arms.
    - idea: Do a kindness for a family with a new baby — a meal, hand-me-downs, or babysitting — in his spirit of guarding the young.
