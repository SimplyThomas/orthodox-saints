overview:
  - Gregory (Orologas) of Kydonies was a hierarch of the Ecumenical Patriarchate who served as Metropolitan of Kydonies (Aivali/Ayvalık) in Asia Minor from 1908 until his death in 1922. Born Anastasios in 1864 at Manisa (Magnesia) in the Ottoman Empire, he was educated at the Theological School of Halki and served in the dioceses of Thessaloniki, Serres, and Drama before his consecration to the episcopate.
  - During the Asia Minor Catastrophe of 1922 he remained with his flock rather than flee, having first organized the evacuation of some 20,000 Greek Orthodox residents of Kydonies. Arrested and tortured by advancing Turkish forces, he died on October 3, 1922. The Church of Greece declared him a saint and ethnomartyr in 1992, and he is commemorated among the hierarchs of the Asia Minor Catastrophe together with Saint Chrysostomos of Smyrna.
