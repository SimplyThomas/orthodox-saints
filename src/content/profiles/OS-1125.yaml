id: OS-1125
liturgicalTitle: Saint Alexis Toth, Confessor and Defender of Orthodoxy in America
lifespan: 1853 – 1909
overview:
  - Alexis Georgievich Toth was a Carpatho-Russian priest whose return to the Orthodox Church set in motion one of the largest movements of Eastern-rite Catholics into Orthodoxy in North America. Born among the Rusyn people of the Carpathian region of the Austro-Hungarian Empire, he came to the United States in 1889 as a Greek Catholic (Uniate) pastor and, after being refused by the local Latin hierarchy, led his Minneapolis parish and ultimately many thousands of his countrymen back to the Orthodox faith of their ancestors. He is commemorated on May 7, the day of his repose, and is also known as Saint Alexis of Wilkes-Barre.
  - Toth was born into a poor Carpatho-Russian clerical family near Presov (Eperjes), in what is today eastern Slovakia; most accounts give his birth as March 14, 1853, in the village of Kobylnice, though the synaxarion gives March 18, 1854. His father and brother were priests and an uncle was a Uniate bishop. He studied at a Latin Catholic seminary, at the Greek Catholic seminary in Ungvar, and read theology at the university in Prague. He married Rosalie Mihalics in 1878 and was ordained a Greek Catholic priest the same year, but his wife and their only child died soon after, leaving him a widower. Before his emigration he served as diocesan chancellor and secretary to the Bishop of Presov, directed an orphanage, and taught Church History and Canon Law at the Greek Catholic seminary in Presov.
  - "Sent to minister to Rusyn immigrants, Toth arrived in the United States on November 15, 1889, and within weeks was serving St. Mary's Greek Catholic parish in Minneapolis. When he presented himself to Archbishop John Ireland of St. Paul and Minneapolis, he was rejected: Ireland did not regard Toth or his Eastern bishop as truly Catholic and forbade him to function as a priest in the city. This rebuff, together with longstanding tension over the standing of Eastern-rite Catholics in America, led Toth and his parish to seek union with the Russian Orthodox Church. He was received into Orthodoxy through the ministry of Bishop Vladimir (Sokolovsky), and over the following years he became the foremost gatherer of Slavic immigrants into the Orthodox Church, by tradition bringing more than twenty thousand Carpatho-Russian and Galician Uniates into Orthodoxy."
  - Toth was elevated to the rank of protopresbyter and continued his missionary labors among immigrant communities, laboring longest among the coal-mining parishes of Pennsylvania from his base in Wilkes-Barre. He reposed on May 7, 1909, in Wilkes-Barre, Pennsylvania, and was buried at St. Tikhon's Monastery in South Canaan, Pennsylvania, where his relics rest today. He was glorified as a saint by the Orthodox Church in America on May 29, 1994, and is venerated as a confessor and defender of Orthodoxy in America.
sections:
  - heading: Early Life and Formation
    body:
      - Alexis Toth was born into the Rusyn (Carpatho-Russian) people of the Carpathian foothills, then subjects of the Austro-Hungarian Empire, in a family that had served the church for generations — his father and brother were priests, and an uncle was a bishop of the Uniate church. The family was poor, but Alexis received an excellent education and was at home in Carpatho-Russian, Hungarian, Russian, German, and Latin, and could read Greek.
      - His training spanned the two worlds his people straddled — a year at a Latin Catholic seminary, three years at the Greek Catholic seminary in Ungvar (Uzhhorod), and theological study at the university in Prague. In 1878 he married Rosalie Mihalics, herself a priest's daughter, and was ordained a Greek Catholic priest; the early deaths of his wife and their only child left him a widower for the rest of his life. His abilities were quickly recognized at home — from 1879 he served as secretary to the Bishop of Presov and administrator of the diocesan chancery, directed an orphanage, and from 1881 taught Church History and Canon Law at the Presov seminary.
  - heading: Conflict in Minneapolis
    body:
      - "Eastern-rite Catholic clergy in late nineteenth-century America occupied an uncertain place: their married priesthood and distinct liturgical tradition were viewed with suspicion by the Latin hierarchy, and there was no Uniate bishop in America to whom they could answer. When Toth, a widowed Greek Catholic priest newly arrived to serve St. Mary's parish in Minneapolis, made the customary call upon the local Latin bishop, Archbishop John Ireland, in December 1889, he was met with anger rather than welcome. By Toth's own account Ireland threw his priestly credentials onto the table and protested his presence in the city, declaring that he did not consider Toth or his bishop to be genuinely Catholic and refusing him faculties to serve in Minneapolis. Ireland went further, directing local parishes to have nothing to do with Toth or his people, and Toth's letters to his own bishop in Europe went unanswered."
      - The crisis was not Toth's alone. In October 1890, eight of the ten Uniate priests then serving in America met at Wilkes-Barre, Pennsylvania, under his chairmanship to consider their position, at a time when the American Latin bishops were pressing Rome to recall the Eastern-rite clergy altogether.
      - Sources differ on the precise sequence and dating of the return that followed. According to one account the parish, finding itself without recognized standing, contacted the Russian consul in San Francisco in December 1890 to be put in touch with a Russian Orthodox bishop, and in February 1891 Toth traveled with his church warden Paul Podany to meet Bishop Vladimir (Sokolovsky) of the Russian mission. The synaxarion places the formal reception of Toth and 361 of his parishioners on March 25, 1891; other accounts date it to March 1892. The Holy Synod of Russia confirmed the parish's acceptance in July 1892. In either telling, St. Mary's of Minneapolis became the first of the immigrant Uniate parishes to return to Orthodoxy under his leadership.
  - heading: Mission to the Immigrants
    body:
      - Toth's reception of St. Mary's was the beginning of a much wider movement. He traveled among the Carpatho-Russian and Galician immigrant settlements scattered through the industrial towns and coal regions of the northeastern United States, preaching, instructing, and gathering parishes that had come as Uniates into communion with the Orthodox Church. From December 1892 his labors centered on Wilkes-Barre, Pennsylvania, in the heart of the anthracite country, and he is credited as instrumental in the formation or return of seventeen parishes. The tradition credits his labors with the return of more than twenty thousand Eastern-rite Catholics to Orthodoxy by his death, a movement that continued to swell long after it.
      - The cost of the return was real. The Minneapolis parish was poor, and in the first years, before support arrived from Russia, Toth supported himself by working in a bakery — while still giving alms, contributing to church construction, and helping seminarians. To teach the people he hoped to reunite with Orthodoxy, he wrote a plain-spoken catechetical pamphlet, "Where to Seek the Truth," which circulated widely among the immigrant communities.
      - His work unfolded alongside that of the other builders of Orthodox life in America in this period, and the diocese he served would later be led by Saint Tikhon, the future Patriarch of Moscow. Toth was honored with elevation to protopresbyter and continued his missionary service until his death.
  - heading: Honors and Final Years
    body:
      - The Russian Church recognized what his labors had wrought. The Holy Synod awarded him a jeweled miter, and Tsar Nicholas II conferred on him the Order of Saint Vladimir and the Order of Saint Anna for distinguished service. In 1907, when a bishop was being sought for the growing American church, Toth was considered for the episcopacy but declined, urging that a younger and healthier man be chosen.
      - From the end of 1908 his health failed under a combination of illnesses. He sought recovery at the southern New Jersey seashore, then returned to Wilkes-Barre, where he was confined to bed for two months. He reposed on Friday, May 7, 1909 (April 24 on the Old Calendar).
  - heading: Relics & Shrines
    body:
      - Toth was buried at St. Tikhon's Monastery in South Canaan, Pennsylvania — the monastery whose founding era he had witnessed — and his relics rest there today, making the monastery a place of pilgrimage for the church his labors helped to build.
  - heading: Glorification
    body:
      - Toth was glorified as a saint by the Orthodox Church in America on May 29, 1994, under the title Saint Alexis Toth, Confessor and Defender of Orthodoxy in America. His feast is kept on May 7, the day of his repose, and he is remembered as the father of the return movement that carried tens of thousands of Carpatho-Russian and Galician immigrants into the Orthodox Church.
timeline:
  - when: "1853"
    title: Birth
    body: Born March 14 in Kobylnice near Presov, in the Austro-Hungarian Empire (today eastern Slovakia); the synaxarion gives March 18, 1854.
  - when: "1878"
    title: Marriage and ordination
    body: Married Rosalie Mihalics and was ordained a Greek Catholic priest; his wife and only child died soon after.
  - when: "1881"
    title: Seminary professor at Presov
    body: Already the bishop's secretary and chancery administrator, he began teaching Church History and Canon Law at the Greek Catholic seminary of Presov.
  - when: "1889"
    title: Arrival in America
    body: Arrived in the United States on November 15 and began serving St. Mary's parish in Minneapolis by the end of the month.
  - when: "1889"
    title: Rejected by Archbishop Ireland
    body: In December, Archbishop John Ireland refused to recognize Toth and forbade him to serve as a priest in the city.
  - when: "1890"
    title: Wilkes-Barre meeting
    body: In October, eight of the ten Uniate priests in America met at Wilkes-Barre under Toth's chairmanship to weigh their standing; in December the Minneapolis parish contacted the Russian consul in San Francisco.
  - when: 1891–1892
    title: Return to Orthodoxy
    body: Toth and 361 parishioners of St. Mary's were received into the Russian Orthodox Church by Bishop Vladimir (Sokolovsky) — on March 25, 1891, by the synaxarion's account, or in March 1892 by others; the Holy Synod confirmed the reception in July 1892.
  - when: "1892"
    title: Mission from Wilkes-Barre
    body: From December, extended his missionary labors to Wilkes-Barre, Pennsylvania, and the surrounding coal region; seventeen parishes were formed or returned through his efforts.
  - when: "1907"
    title: Declines the episcopacy
    body: Considered for episcopal office in the American mission but declined, recommending a younger, healthier candidate.
  - when: "1909"
    title: Repose
    body: Reposed on May 7 in Wilkes-Barre, Pennsylvania, after months of illness; buried at St. Tikhon's Monastery.
  - when: "1994"
    title: Glorification
    body: Glorified as a saint by the Orthodox Church in America on May 29; his relics rest at St. Tikhon's Monastery in South Canaan, Pennsylvania.
