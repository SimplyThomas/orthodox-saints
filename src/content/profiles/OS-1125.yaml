influence:
  heading: Influence in America
  intro: "The movement St. Alexis led returned some seventeen Uniate parishes and tens of thousands of Carpatho-Rusyn immigrants to Orthodoxy, and the communities that keep his memory stretch from Minneapolis to his shrine in Pennsylvania."
  places:
    - name: St. Mary's Orthodox Cathedral
      kind: Cathedral
      place: Minneapolis, Minnesota
      note: "His first American parish: here in March 1891 Fr. Alexis and 361 parishioners were received into the Orthodox Church, the first fruit of his movement. The parish is today a cathedral of the OCA's Diocese of the Midwest."
    - name: St. Tikhon's Monastery
      kind: Monastery
      place: South Canaan, Pennsylvania
      note: "St. Alexis was buried at the monastery in 1909 and glorified there at the Memorial Day pilgrimage of 1994; his mostly incorrupt relics rest at the monastery, where pilgrims venerate him each year."
    - name: St. Alexis of Wilkes-Barre Orthodox Church
      kind: Church
      place: Clinton, Connecticut
      note: "An OCA Diocese of New England community founded as a mission in 1994, the year of his glorification, and elevated to parish status in 2004."
    - name: St. Alexis of Wilkes-Barre Mission
      kind: Church
      place: Palm Coast, Florida
      note: "An OCA Diocese of the South mission named for the confessor, serving Flagler County on Florida's Atlantic coast."
