overview:
  - "The Three Virgin-Martyrs of Chios are a group of three women commemorated together by the Orthodox Church on June 9 as martyrs of the Greek island of Chios. Almost nothing of their history has been preserved: their individual names are not recorded, and the century in which they suffered is unknown. The liturgical calendars that carry their commemoration note only that they were put to death by the sword."
  - Because so little survives, the three virgins are remembered chiefly through the bare fact of their commemoration on June 9 rather than through any detailed account of their lives. They should not be confused with the company of canonical virgins also commemorated on the same date — Thekla, Mariamna, Martha, Maria, and Ennatha — who are a distinct group.
sections:
  - heading: Commemoration and Identity
    body:
      - In the Orthodox liturgical calendar for June 9, the three virgins of Chios appear in a brief entry rendered in English as “Holy Three Virgin-Martyrs of Chios, by the sword.” The synaxarion preserves no names for them, no fixed date, and no narrative of their suffering beyond the manner of their death and their association with the island of Chios.
      - The same day's commemorations include a separate group, the Holy Five Canonical Virgins (Thekla, Mariamna, Martha, Maria, and Ennatha), and the calendars treat the two groups as distinct. A note about a service (acolouthia) recorded in a manuscript in the Library of Paris is, in the sources consulted, attached to a different June 9 commemoration rather than securely to the three virgins of Chios, so the manuscript witness for these three remains uncertain.
