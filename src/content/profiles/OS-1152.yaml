    note: Archbishop of Constantinople; Epiphanius was summoned to a council against him but refused to take part in his condemnation.
    href: saint/OS-0023
  - name: Saint Sabinus, Archbishop of Cyprus
    note: Disciple whom Epiphanius tonsured a monk and who shared his ascetic struggle before becoming a bishop in Cyprus; commemorated the same day, May 12.
    href: saint/OS-1155
  - name: Saint Polybius, Bishop in Cyprus
    note: Disciple who accompanied Epiphanius on his journeys and wrote an account of his life and miracles; commemorated the same day, May 12.
    href: saint/OS-1156
  - name: St. Philo, Bishop of Karpasia
    note: A bishop in Cyprus whom Epiphanius ordained, belonging to the circle of saints around him.
