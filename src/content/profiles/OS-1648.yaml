id: OS-1648
liturgicalTitle: Our Father among the Saints Theoctistus, Bishop of Chernigov
lifespan: died 1123
overview:
  - Saint Theoctistus, Bishop of Chernigov, was a twelfth-century hierarch of Kievan Rus' who rose from the monastic community of the Kiev Caves (Kievo-Pechersk) monastery to the episcopate. Renowned as a spiritual elder before his elevation, he served as abbot of the Caves monastery and then as bishop of Chernigov until his death in 1123.
  - His tenure spanned a period of building and ordering of the Church in Rus', and he is remembered both for his monastic ascetic reputation and for his participation in one of the most significant liturgical events of the age, the transfer of the relics of the holy Princes Boris and Gleb.
timeline:
  - when: "1103"
    title: Made abbot of the Kiev Caves monastery
    body: Already known as a spiritual elder of the Kievo-Pechersk monastery, Theoctistus was made igumen (abbot) of the community in 1103.
  - when: "1108"
    title: Built the stone refectory
    body: Through the generosity of the pious prince Gleb Vseslavich, Theoctistus built a stone trapeza (dining hall, or refectory) at the Caves monastery.
  - when: February 11, 1110
    title: Vision of the fiery pillar
    body: By tradition, a fiery pillar appeared at the monastery, rising from the ground to the sky over the stone dining hall before settling over the grave of Saint Theodosius and vanishing eastward.
  - when: "1113"
    title: Consecrated Bishop of Chernigov
    body: Theoctistus was consecrated Bishop of Chernigov.
  - when: May 2, 1115
    title: Transfer of the relics of Boris and Gleb
    body: He participated in the transfer of the relics of the holy Princes Boris and Gleb to Vyshgorod.
  - when: August 6, 1123
    title: Repose
    body: He died on the Feast of the Transfiguration; because of the feast his memory is kept on August 5. By one account he was buried at the Caves monastery.
sections:
  - heading: Monastic Life and Abbacy
    body:
      - Before his episcopacy, Theoctistus lived as an ascetic at the Kiev Caves (Kievo-Pechersk) monastery, where he gained renown as a spiritual elder. The synaxarion relates that he healed Saint Niketas (Nikita), the future Bishop of Novgorod, through his prayers.
      - In 1103 he was made igumen (abbot) of the Caves monastery. During his abbacy, in 1108, he built a stone trapeza, a dining hall or refectory, through the generosity of the pious prince Gleb Vseslavich. By tradition, on February 11, 1110, a fiery pillar was seen at the monastery, rising over the stone dining hall and then settling over the grave of Saint Theodosius before vanishing toward the east.
  - heading: Episcopate at Chernigov
    body:
      - In 1113 Theoctistus was consecrated Bishop of Chernigov. On May 2, 1115, he took part in the transfer of the relics of the holy Princes Boris and Gleb to Vyshgorod.
      - Near his cathedral in Chernigov he consecrated a church dedicated to the holy Princes Boris and Gleb, which Prince David of Chernigov had built in the year 1120.
  - heading: Repose
    body:
      - Saint Theoctistus died on August 6, 1123, the Feast of the Transfiguration, and because of the feast his memory is kept on August 5. According to one of the lists of the saints, he was buried at the Caves monastery.
companions:
  - name: Niketas the Recluse, Bishop of Novgorod
    note: Whom Theoctistus, then an elder of the Kiev Caves, is said to have healed through his prayers.
    href: saint/OS-0569
related:
  - name: Passion-bearers Boris & Gleb
    note: Princely martyrs whose relics Theoctistus helped transfer to Vyshgorod in 1115 and to whom he consecrated a church.
    href: saint/OS-0236
  - name: St. Theodosius of the Kyiv Caves
    note: Foundational father of the Kiev Caves; the fiery pillar of 1110 was seen to settle over his grave during Theoctistus's abbacy.
    href: saint/OS-2745
  - name: St. Anthony of the Kyiv Caves
    note: Founder of the Kiev Caves monastery, the community Theoctistus led as abbot before his episcopate.
    href: saint/OS-0136
