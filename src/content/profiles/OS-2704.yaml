id: OS-2704
lifespan: c. 674 – 11 April 714
overview:
  - Guthlac of Crowland (c. 674–714) was a Mercian nobleman who abandoned a military career to become a monk and, later, a hermit in the fenland of eastern England. Settling on the island of Croyland (modern Crowland, Lincolnshire) in 699, he lived out the remainder of his life in ascetic solitude until his death in 714.
  - His life was recorded within a generation of his death by the monk Felix of Crowland, whose Latin Vita made Guthlac one of the best-documented figures of Anglo-Saxon monasticism. For his solitary struggles and his reported combats with demons, later tradition styled him 'the English Saint Anthony.'
  - As a pre-schism Western saint, Guthlac is venerated in the Orthodox Church, with his principal feast on April 11. The monastic community that grew up around his hermitage became Crowland Abbey, a house dedicated jointly to the Virgin Mary, Saint Bartholomew, and Guthlac himself.
liturgicalTitle: Our Venerable Father Guthlac, Hermit of Crowland
patronage:
  - Hermits
  - Monastics
timeline:
  - when: c. 674
    title: Birth in Mercia
    body: Guthlac was born around 674 in the Kingdom of Mercia to Penwalh (Penwald), a Mercian noble, and his wife Tette. His sister Pega also came to be venerated as a saint. The Antiochian Orthodox Church gives his dates as 673–714.
  - when: c. 690s
    title: Military service
    body: As a young man Guthlac served as a soldier in the army of King Æthelred of Mercia (reigned 675–704) before turning to the religious life.
  - when: c. 698
    title: Monk at Repton
    body: At about the age of 24 he entered Repton Abbey in Derbyshire, a double monastery governed by an abbess. After roughly two years he resolved to pursue the stricter path of a hermit.
  - when: "699"
    title: Arrival at Croyland
    body: On St Bartholomew's Day, 699, Guthlac came to the fenland island of Croyland. He built an oratory and cells within a plundered burial mound and adopted a severe regimen, wearing animal skins and taking only barley bread and a small cup of water after sunset.
  - when: c. 716 (foretold)
    title: Sheltering Æthelbald
    body: Guthlac gave refuge to Æthelbald, a kinsman fleeing his cousin Ceolred, and, according to Felix, prophesied that Æthelbald would become king. Æthelbald reigned over Mercia from 716 to 757.
  - when: 11 April 714
    title: Repose
    body: Guthlac died on 11 April 714, aged about 40. Felix records that a sweet, nectar-like odour emanated from his mouth at death and that his soul departed in a beam of light; his sister Pega, arriving to perform the funeral rites, found the island filled with a fragrance like ambrosia.
  - when: 1136 and 1196
    title: Translation of relics
    body: His remains were relocated in 1136 and finally enshrined above the main altar of Crowland Abbey in 1196. A commemoration of the translation of his relics is kept on August 30.
sections:
  - heading: From Soldier to Hermit
    body:
      - Born into the Mercian nobility, Guthlac first followed the expected path of a young aristocrat, serving in the army of King Æthelred of Mercia. In his mid-twenties he abandoned arms for the cloister, entering the double monastery of Repton in Derbyshire under its abbess.
      - After some two years as a monk he sought a still more austere life and withdrew to the remote fen-island of Croyland in 699. There he established a hermitage within a disturbed burial mound, subsisting on barley bread and water taken only once a day after sunset, and clothing himself in animal skins.
  - heading: Ascetic Struggles
    body:
      - Guthlac's reputation rests largely on the account of his spiritual combats given by his biographer Felix. Felix relates that the hermit was assailed by demons whose 'sibilant speech' Guthlac could understand from time he had earlier spent among the Celtic Britons.
      - The demons are described as ferocious and terrible in shape, with great heads, long necks, and thin faces, filling the space between earth and heaven with their discordant bellowing. For enduring such trials in solitude, Guthlac was later called 'the English Saint Anthony,' after the great Egyptian father of monasticism.
  - heading: Royal Connection
    body:
      - During his years at Croyland, Guthlac sheltered Æthelbald, a future King of Mercia, who was then a fugitive from his cousin Ceolred. Felix records that Guthlac foretold Æthelbald's eventual accession to the throne.
      - Æthelbald reigned as king of Mercia from 716 to 757. In keeping with the promise he had made, he founded Crowland Abbey in 716, honouring the hermit whose prophecy had encouraged him in adversity.
  - heading: Crowland Abbey and Legacy
    body:
      - A monastic community developed at Guthlac's hermitage during the 8th century, and the abbey came to be dedicated jointly to the Virgin Mary, Saint Bartholomew, and Saint Guthlac. By the 10th century the house had gained considerable prominence; a nobleman and cleric named Thurcytel, kin to the Archbishop of York, became abbot and greatly enriched it, and the community adopted the Benedictine rule around 971.
      - Crowland Abbey produced the celebrated Croyland Chronicle before being dissolved in 1539 during the English Reformation, though part of the church continued in use as a parish church. Guthlac's cult spread through Felix's 8th-century Latin Vita, Old English prose translations, and the illustrated 13th-century Guthlac Roll. His life is also noted in connection with Bede's Ecclesiastical History of the English People, and an Akathist hymn is dedicated to him.
  - heading: Relics & Shrines
    body:
      - Guthlac's remains were relocated in 1136 and finally placed above the main altar of Crowland Abbey in 1196. A secondary commemoration on August 30 marks the translation of his relics, indicating their formal enshrinement.
