flagReasons:
  - claim: Æthelbald is described as Guthlac's kinsman fleeing his cousin Ceolred
    detail: Wikipedia identifies Æthelbald only as 'future King of Mercia (r. 716–757), who was fleeing his cousin Ceolred.' The dossier nowhere says Æthelbald was Guthlac's kinsman. The profile's 'a kinsman' grammatically describes Æthelbald as kin to Guthlac, but no source in the dossier establishes this relationship. The sections text ('a future King of Mercia, who was then a fugitive from his cousin Ceolred') correctly omits the kinship claim; the timeline's 'a kinsman' is an unsupported addition.
