status: reviewed
eyebrow: Synaxis · Witnesses of the Resurrection
feastNote: Commemorated on the third Sunday of Pascha, the Sunday of the Myrrh-bearers
overview:
  - The Synaxis of the Holy Myrrh-bearing Women commemorates the women who followed Christ, stood by His Cross when the apostles had fled, and came to the tomb at dawn on the first day of the week bearing sweet spices to anoint His body — and so became the first witnesses and heralds of the Resurrection. With them the Church honors the two secret disciples, Joseph of Arimathea and Nicodemus, who took the Lord's body from the Cross and laid it in the tomb.
  - Coming to the sepulchre while it was still dark, the women found the stone rolled away and were told by an angel, "He is not here, for He is risen." They were the first to hear the good news and the first to proclaim it to the apostles; for this Mary Magdalene is called "equal to the apostles" and "apostle to the apostles." The Most Holy Theotokos is numbered first among them.
  - The Church keeps their memory on the third Sunday of Pascha, holding them up as the image of faithful love that does not abandon Christ in His suffering and is rewarded with the first joy of the Resurrection. They are especially honored as patrons of steadfast women, of those who mourn, and of all who tend the bodies of the departed.
