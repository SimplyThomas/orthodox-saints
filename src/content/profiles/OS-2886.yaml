lifespan: 1076–1132
liturgicalTitle: The Holy Right-believing Prince Mstislav-Theodore the Great, Grand Prince of Kiev
overview:
  - Mstislav I Vladimirovich, called 'Mstislav the Great,' was Grand Prince of Kiev from 1125 until his death in 1132. Born in February 1076 in Turov, he was the eldest son of Vladimir II Monomakh and Gytha of Wessex, a daughter of King Harold II of England; through his mother he was a direct descendant of English royalty. His Christian (baptismal) name was Theodore.
  - A ruler noted for both political weight and personal piety, he was a prolific builder of churches across his domains and a defender of the Rus' land in numerous campaigns. Orthodox hagiographic tradition names him 'Holy Prince Mstislav-Theodore the Great.' He was canonized as a saint before the 13th century, and is commemorated on April 15, the anniversary of his death.
  - He was the father of St. Vsevolod-Gabriel of Pskov and of St. Rostislav-Michael, Great Prince of Kiev. Contemporary chroniclers recorded that after his death 'the land of Rus was torn apart,' marking the onset of the state's rapid fragmentation.
sections:
  - heading: Reign and Rule
    body:
      - Mstislav governed Novgorod from 1088 to 1093, then briefly held Rostov (1093–1095) before returning to Novgorod, where he ruled until 1117. In 1117 his father, Grand Prince Vladimir Monomakh, gave him Kievan Belgorod as his udel (land-holding), effectively making him co-ruler.
      - On his father's death in 1125 Mstislav inherited the Kievan throne, reigning as Grand Prince for seven years until 1132. During his rule he distributed principalities to his sons, giving Smolensk to his son Rostislav in 1125 — a grant that marked the beginning of Smolensk's political separation.
  - heading: Church Building
    body:
      - Mstislav's piety expressed itself in extensive church-building throughout his domains. In Novgorod he commissioned St. Nicholas Cathedral in 1113 and the Cathedral of St. Anthony Cloister in 1117, both of which still stand.
      - As Grand Prince he completed important religious structures in Kiev, including the family sepulchre at Berestovo and the Church of the Assumption of the Mother of God in Podol. He built the Dormition cathedral at Smolensk in 1101 and founded the Theodorov (Theodore) Monastery at Kiev, which later gave spiritual guidance to his descendants.
  - heading: Military Campaigns
    body:
      - "Mstislav led war on many fronts in defense of the Rus' land: against the Cumans (1093, 1107, 1111, 1129), the Estonians (1111, 1113, 1116, 1130), the Lithuanians (1131), and the Principality of Polotsk (1127, 1129)."
      - In 1096 he won a significant victory over his uncle Oleg of Chernigov along the Koloksha River.
  - heading: Legacy
    body:
      - Mstislav's veneration reflects both his political significance and his piety. Chroniclers marked his death as a turning point, writing that with him gone 'the land of Rus was torn apart,' as the unified Kievan state began to fragment among its princes.
      - His son Vsevolod (in baptism Gabriel) became Prince of Novgorod and Pskov and is venerated as a saint; on Mstislav's death in 1132 his brother, Prince Yaropolk of Kiev, fulfilled Mstislav's last wishes concerning Vsevolod. Another son, Rostislav (in baptism Michael), Great Prince of Kiev, is likewise venerated as a saint.
