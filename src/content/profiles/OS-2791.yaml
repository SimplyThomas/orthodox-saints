id: OS-2791
lifespan: Died c. 305–306 at Alexandria
liturgicalTitle: The Holy Hieromartyr Phileas, Bishop of Thmuis
overview:
  - Phileas was an Egyptian bishop of the early fourth century, martyred at Alexandria during the Diocletianic persecution (c. 305–306). Born into a distinguished, noble, and wealthy family of Thmuis, a city of Lower Egypt in the Thebaid, he was noted for his learning and eloquence and had held various public offices in his native city before his conversion to Christianity and his appointment as its bishop.
  - Arrested and taken to Alexandria for trial before the governor Culcianus (Culcian), he was pressed by the judge, and by his own kin, counselors, and magistrates present, to renounce Christ and offer pagan sacrifice. He refused, affirming Christ's divinity and declaring an unchangeable resolution to die for Jesus Christ. He was condemned and beheaded together with Philoromus, a Christian imperial official who had publicly defended him at the trial.
  - He is commemorated in the Eastern Church on February 4 (also given as November 26); the Roman calendar keeps his feast on February 4. His passion is recorded by Eusebius of Caesarea, who preserved excerpts of a prison letter Phileas wrote to his diocese, and his memory is noted by St. Jerome; a narrative of the martyrdom also survives among the papyri of the Chester Beatty Library.
sections:
  - heading: Background and Episcopate
    body:
      - Phileas came from a distinguished and wealthy family of Thmuis, a city in Lower Egypt within the region known as the Thebaid. Sources describe him as eloquent and learned, and he had held various public offices in his native city before entering the Church. Eusebius of Caesarea distinguishes him by his wealth, high birth, honours, learning, and eloquence.
      - His conversion to Christianity led to his appointment as Bishop of Thmuis. St. Jerome, in his On Illustrious Men, records that Phileas composed a finely written work in praise of martyrs, and Eusebius credits both Phileas and his companion Philoromus with a manly, courageous, and philosophic mind.
  - heading: Trial and Martyrdom
    body:
      - During the Diocletianic persecution Phileas was arrested and transported to Alexandria to be tried before the governor Culcianus. At the trial the judge sought to persuade him to offer pagan sacrifice, emphasizing his family obligations and social standing; when questioned directly whether Christ was God, Phileas affirmed Christ's divinity and cited miraculous evidence.
      - According to the accounts, his wife and relatives, together with counselors and magistrates present, begged him to recant and save his life, but he remained steadfast, declaring his unchangeable resolution to die for Jesus Christ. Alban Butler's account relates that before execution Phileas reaffirmed his willingness, expressing gratitude for becoming co-heir with Christ.
      - Philoromus, an official who held high imperial office at Alexandria — a tribune and treasurer-general who administered justice daily under a military guard, and who was secretly a Christian — publicly supported Phileas and criticized those attempting to coerce his apostasy. This intervention led to a death sentence for both men, and the two were beheaded by the sword.
  - heading: The Prison Letter and Sources
    body:
      - Eusebius of Caesarea preserves, in his Ecclesiastical History, extensive excerpts from a letter Phileas wrote from prison in Alexandria to his diocese at Thmuis. In it Phileas described the tortures inflicted on fellow martyrs, who were tied to pillars, their bodies stretched out with engines and torn with iron hooks, and he quoted scripture on the martyrs willingly embracing death for the sake of religion, enduring all kinds of pains because perfect love casts out fear.
      - "The martyrdom is attested through a convergence of sources: Eusebius and St. Jerome among the ancient writers, later accounts by Alban Butler and Nathaniel Lardner, and a narrative of the passion surviving among the papyri of the Chester Beatty Library. Lardner noted scholarly disagreement over the precise date of the martyrdom, which is variously placed around 305–306 or as late as 311–312."
  - heading: Commemoration
    body:
      - Phileas is commemorated together with the Martyr Philoromus. The Eastern feast falls on February 4 (also recorded as November 26), while the Roman calendar keeps their memory on February 4.
