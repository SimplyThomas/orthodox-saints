  - name: Saint Leucius of Volokolamsk
    note: Disciple — a monk formed under Paphnutius at Borovsk who later founded the Dormition Monastery on the Ruza and served as spiritual elder to Daniel of Pereyaslavl.
    href: saint/OS-1725
