flagReasons:
  - claim: The profile places the Zarzma monastery 'in the region of Samtskhe, in the historic province of Klarjeti,' treating these as the same or nested geographic entity.
    detail: "Samtskhe and Klarjeti are distinct historic Georgian provinces, not nested regions. Both external sources place the monastery in Samtskhe (OCA: Michael's vision sends the monks 'to Samtskhe'; Wikipedia: 'located in the Samtskhe-Javakheti region of southwest Georgia'). Klarjeti is where Serapion's family originated, not where the monastery stands. The profile conflates the two without any source support for treating Klarjeti as an umbrella region containing Samtskhe."
