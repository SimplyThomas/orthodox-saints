timeline:
  - when: after 705
    title: Wimborne Abbey founded
    body: Cuthburh, sister of King Ine of Wessex, establishes the double monastery of Wimborne in Dorset, where Thecla is later educated under Abbess Tetta.
  - when: "748"
    title: Arrival in Germany
    body: Chosen by Tetta to assist Saint Boniface, Thecla travels to Germany with her kinswoman Lioba and others, settling at Bischofsheim.
  - when: after 750
    title: Abbess of Kitzingen
    body: After governing Ochsenfurt, Thecla becomes abbess of Kitzingen following the death of its abbess Hadelonga.
  - when: c. 790
    title: Death at Kitzingen
    body: Thecla dies at Kitzingen Abbey.
  - when: 1524-1525
    title: Relics dispersed
    body: Her enshrined relics at Kitzingen are scattered during the German Peasants' War.
