id: OS-0070
lifespan: 1840–1924
overview:
  - St. Arsenios of Cappadocia (1840–1924) was a Greek Orthodox priest-monk who served the village of Pharasa (Farasa) and its neighboring communities in Cappadocia, Asia Minor, under Ottoman rule. Born Theodorus Annitsalichos in Kephalochori in the Pharasa region, he was orphaned young and educated at Niğde and Smyrna, where he acquired Greek, Church studies, Armenian, Turkish, and French.
  - Tonsured a monk with the name Arsenios at the Monastery of the Holy Forerunner of Phlavianai near Caesarea around the age of twenty-six, he was consecrated archimandrite in 1870 and returned to serve as parish priest in Pharasa. He was widely regarded as a healer and spiritual guide, sought by Christian and Muslim villagers alike, and he secretly taught the Greek language to local children. After a pilgrimage to the Holy Land he was known to his people as 'Hadjiephentis.'
  - He baptized the infant who would become St. Paisios of Mount Athos, serving as his godfather and giving the child his own name. During the population exchange between Greece and Turkey he led his parish to Corfu, where he reposed in 1924, three months after arriving. He was glorified by the Ecumenical Patriarchate of Constantinople in 1986; his life was later written by St. Paisios.
sections:
  - heading: Early Life and Education
    body:
      - He was born Theodorus Annitsalichos in 1840 in Kephalochori, in the Pharasa region of Cappadocia, then part of the Ottoman Empire. Both of his parents died when he was young, and he was raised by a maternal aunt.
      - He was educated first at Niğde, in the care of a paternal aunt, and afterward at Smyrna. Over the course of his studies he learned Greek, Church studies, Armenian, Turkish, and French.
  - heading: Monastic Life and Priestly Ministry
    body:
      - Around the age of twenty-six he entered the Monastery of the Holy Forerunner of Phlavianai, near Caesarea, where he was tonsured a monk and given the name Arsenios. In 1870, at the age of thirty, he was consecrated archimandrite.
      - He served as priest in Pharasa and the neighboring villages, becoming the respected spiritual guide of the local community. Under Ottoman rule he secretly taught the Greek language to the village children. He worked alongside the mayor of Pharasa — the father of the future St. Paisios — and after a pilgrimage to the Holy Land the villagers gave him the title 'Hadjiephentis.' He was described as a teacher and physician of souls and bodies.
  - heading: Healing Ministry
    body:
      - He was renowned as a healer who attended both Greek Christian and Turkish Muslim patients, employing prayer and the reading of the Gospel rather than medical prescriptions. One account relates that he restored speech to a mute Turkish man through Gospel prayer.
  - heading: Connection to St. Paisios of Mount Athos
    body:
      - St. Arsenios baptized the infant who would become St. Paisios of Mount Athos, serving as his godfather and bestowing on the child his own name despite the parents' objection. St. Paisios later compiled a biographical account of his godfather, titled 'Saint Arsenios the Cappadocian,' drawn from eyewitness testimony.
  - heading: Departure from Cappadocia and Repose
    body:
      - During the population exchange between Greece and Turkey, St. Arsenios led his parish from Cappadocia to Corfu. He reposed on November 10, 1924, at the age of eighty-four, in Kerkyra (Corfu), three months after arriving in Greece.
  - heading: Glorification and Legacy
    body:
      - He was recognized as an Orthodox saint by Ecumenical Patriarch Demetrios I of Constantinople in 1986. His feast is kept on November 10.
      - He is venerated as a wonderworker and spiritual forefather of St. Paisios, who wrote his life.
  - heading: Relics & Shrines
    body:
      - His relics are kept at the Monastery of Souroti, near Thessalonica. A portion of his relics is also venerated at the Greek Orthodox Church of the Prophet Elias in Frankfurt, Germany.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: Accounts of his ministry record that he healed both Christian and Muslim patients through prayer and Gospel readings, including a case in which a mute Turkish man was given speech."
      - "Traditional Accounts: Apparitions and miracles have been reported near his relics since 1970. By tradition the village of Pharasa was repeatedly preserved from violence through his intercession."
