id: OS-1976
lifespan: 18th century (reposed 1763)
liturgicalTitle: Our Venerable Father Joseph the Elder and Wonderworker of Khevi
overview:
  - Venerable Joseph the Elder of Khevi was an 18th-century Georgian monastic elder and priest, venerated as a wonderworker in the high Caucasus region of Khevi in northern Georgia. Little is recorded of his life; the Church holds as certain only that he was a native of Khevi and served as a priest in that village.
  - He is remembered above all for his perilous ascents to the Bethlehem Hermitage, a cave high on the ice-covered cliffs of Mount Kazbegi, from which he retrieved a relic said to be a piece of the tent of the patriarch Abraham and presented it to King Erekle. Historian David Batonishvili records his love of holy objects, his keeping of the strictest fasts, and his outstanding virtues. Having attained clairvoyance and the gift of miracles, he reposed peacefully in 1763 and is commemorated on October 7.
sections:
  - heading: Life and Context
    body:
      - Joseph was a native of Khevi, a mountainous region of northern Georgia over which towers Mount Kazbegi, the country's highest peak. He served as a priest in his home village. The people of Khevi were noted throughout history for their steadfastness in the Christian faith, building churches and monasteries deliberately in remote mountainous places, as though reaching them should demand the greatest zeal.
      - According to the historian David Batonishvili, Joseph was especially known for his love of holy objects, for keeping the strictest of fasts, and for his outstanding virtues. Tradition holds that he attained the heights of clairvoyance and miracle-working before his peaceful repose in 1763.
  - heading: The Bethlehem Hermitage
    body:
      - Joseph was famed for his climbs to the Bethlehem Hermitage (also called the Jerusalem or Betlemi Cave), a cave on the ice-covered vertical cliff of Mount Kazbegi at roughly 13,450 feet, reputed to be among the highest consecrated ground in the world. The hermitage, whose entrance sits on an andesite cliff some 300 to 400 meters above the rock base, could only be reached by climbing chains let down from its height. Researchers believe the monastic complex dates to the 6th or 7th centuries.
      - According to the Georgian chronicle known as the Life of Kartli (Kartlis Tskhovreba), the cave was used throughout history to store sacred objects and treasures of the Church. Georgian tradition maintains that both the tent of the patriarch Abraham and the manger of Christ were kept there for many centuries. The chronicle also records that a hundred young Khevsian soldiers hid in the cave during the invasion of Timur Leng (Tamerlane). Joseph climbed to the hermitage and returned with a piece said to be from the tent of the patriarch Abraham, which he presented to King Erekle.
  - heading: Relics and Shrines
    body:
      - Holy Trinity Monastery, near the Bethlehem Cave, once preserved the cross of Saint Nino, now kept in Tbilisi. A 1948 expedition led by Alexandra Dzhaparidze explored the cave and found a hanging metal chain some 5.5 meters long at the entrance, medieval church artifacts, a banner dated to the 10th or 11th century, and coins from the 15th to 18th centuries, consistent with the cave's active use during Joseph's lifetime. In 2000, an expedition of Georgian mountaineers together with Bishop Nicoloz of Bodbe ascended to restore the cave's consecrated status and to serve the Divine Liturgy there.
  - heading: Miracles and Traditions
    body:
      - "Historically Documented: The historical record preserves little of Joseph's life beyond his origin in Khevi, his priestly service there, and his retrieval of the relic of Abraham's tent from the Bethlehem Cave, which he presented to King Erekle, as recorded by the historian David Batonishvili."
      - "Traditional Accounts: Georgian tradition holds that Joseph attained clairvoyance and the working of miracles, and that the Bethlehem Cave preserved the tent of the patriarch Abraham and the manger of Christ for many centuries. No specific act of glorification is documented in the available sources; his commemoration on October 7 rests on traditional Georgian veneration rather than a recorded synodal act."
timeline:
  - when: 6th–7th c.
    title: Bethlehem Hermitage established
    body: By tradition, the monastic cave-complex on Mount Kazbegi to which Joseph would later climb dates to this period, according to researchers.
  - when: 18th c.
    title: Life and priesthood in Khevi
    body: Joseph, a native of Khevi in northern Georgia, serves as a priest in his village and becomes known for his ascetic virtues, strict fasting, and love of holy objects.
  - when: 18th c.
    title: Retrieval of Abraham's tent
    body: Joseph climbs to the Bethlehem Hermitage on the cliffs of Mount Kazbegi and returns with a piece said to be from the tent of the patriarch Abraham, presenting it to King Erekle.
  - when: "1763"
    title: Repose
    body: Having attained the gifts of clairvoyance and miracle-working, Joseph reposes peacefully. He is commemorated on October 7.
