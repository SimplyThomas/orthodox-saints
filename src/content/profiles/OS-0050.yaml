id: OS-0050
lifespan: 1896–1966
overview:
  - St. John of Shanghai and San Francisco (born Mikhail Borisovich Maximovitch on June 4, 1896, in the village of Adamovka, Kharkov Governorate of the Russian Empire) was a bishop of the Russian Orthodox Church Outside Russia known for his rigorous asceticism and for shepherding his flock through successive exiles from China to Western Europe and the United States.
  - Born to the aristocratic family of Boris and Glafira Maximovitch, he showed early religious devotion, collecting icons and church books and reading extensively in the lives of the saints. He was educated at Poltava Military School, took a law degree from Kharkov Imperial University in 1918, and completed theological studies at the University of Belgrade in 1925.
  - Tonsured a monk in 1926 by Metropolitan Anthony (Khrapovitsky) and given the name John, he was consecrated bishop in 1934 and assigned to Shanghai, later serving as Archbishop of China, of Western Europe (with his cathedra in Paris), and finally of San Francisco. He died on July 2, 1966, in Seattle while accompanying the Kursk-Root Icon, and his relics were found incorrupt. He was glorified by the Russian Orthodox Church Outside Russia in 1994, a glorification universally recognized by the Moscow Patriarchate in 2008.
sections:
  - heading: Early Life and Formation
    body:
      - Mikhail Borisovich Maximovitch was born on June 4, 1896, in Adamovka, a village in the Izyumsky Uyezd of the Kharkov Governorate (present-day eastern Ukraine), to the aristocratic family of Boris and Glafira Maximovitch. As a child he was noted for an early religious devotion, gathering icons and church books and reading extensively in the lives of the saints.
      - He attended the Poltava Military School from 1907 to 1914 and earned a law degree from Kharkov Imperial University in 1918. He subsequently obtained a theology degree from the University of Belgrade in 1925.
      - In 1926 he was tonsured a monk and ordained a hierodeacon by Metropolitan Anthony (Khrapovitsky), receiving the monastic name John, and on November 21, 1926, he was consecrated hieromonk by Bishop Gabriel of Chelyabinsk. He adopted extreme ascetic practices, reportedly ceasing to sleep in a bed and eating only once a day.
  - heading: Episcopal Ministry and Contributions
    body:
      - John was consecrated a bishop on May 28, 1934, with Metropolitan Anthony (Khrapovitsky) as principal consecrator, and was assigned to the Diocese of Shanghai. Twelve years later, in 1946, he was named Archbishop of China. In Shanghai he worked to restore Orthodox unity, built a cathedral dedicated to the icon of the 'Surety of Sinners,' and established churches, hospitals, and orphanages.
      - When the Communists took power in China in 1949, he led his community into exile, and Russian emigres relocated by way of Tubabao Island in the Philippines. There he assisted approximately 5,000 refugees, and he traveled to Washington, D.C., to lobby officials to amend immigration law; President Truman signed bill H.R. 4567 on June 16, 1950, permitting some 4,000 Far Eastern Europeans to resettle in America. He also established the parish of Saint John the Forerunner in Washington.
      - Assigned Archbishop of Western Europe in 1951 with his cathedra first in Paris and later in Brussels, he studied and celebrated a restored Gallican liturgy in France and consecrated Jean-Nectaire (Kovalevsky) as the first modern bishop of the Orthodox Church of France.
      - In 1962 he was assigned to the Diocese of San Francisco, succeeding Archbishop Tikhon. There he completed the Holy Virgin Cathedral on Geary Boulevard, dedicated to the Theotokos, Joy of All Who Sorrow, though he faced litigation over the construction finances and was eventually exonerated.
  - heading: Relics & Shrines
    body:
      - St. John died on July 2, 1966 (June 19 on the Julian calendar), in Seattle, Washington, at the age of seventy, while accompanying the Kursk-Root Icon on tour. He was entombed beneath the altar, in the crypt, of the Holy Virgin Cathedral in San Francisco.
      - His relics were discovered incorrupt at his death and again upon exhumation in 1993. Following his glorification, portions of his relics were distributed to many places, including Spain, Serbia, Russia, Mount Athos, Greece, South Korea, Bulgaria, Romania, Canada, the United Kingdom, North Macedonia, and elsewhere.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: Seraphim Rose and Herman Podmoshensky documented approximately 100 miracles attributed to the saint's intercessions."
      - "Traditional Accounts: During his lifetime he was known for what accounts describe as powers of healing and clairvoyance."
  - heading: Glorification and Legacy
    body:
      - St. John was glorified by the Russian Orthodox Church Outside Russia on July 2, 1994, the 28th anniversary of his death. The Moscow Patriarchate recognized the canonization universally on July 2, 2008.
      - His ministry spanned the Russian emigration across three continents, and his role in resettling Far Eastern refugees in the United States left a lasting institutional and pastoral legacy in the Russian diaspora.
