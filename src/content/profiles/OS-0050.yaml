id: OS-0050
lifespan: 1896–1966
overview:
  - Saint John of Shanghai and San Francisco (1896–1966) was a bishop of the Russian Orthodox Church Outside Russia (ROCOR), born Mikhail Borisovich Maximovitch on June 4, 1896, in the village of Adamovka in the Izyumsky Uyezd of the Kharkov Governorate of the Russian Empire, in present-day eastern Ukraine.
  - Born to the pious aristocratic family of Boris and Glafira Maximovitch, he was given the baptismal name Michael, after the Holy Archangel Michael. In his youth Michael was sickly and had a poor appetite, but he displayed an intense religious interest.
  - As a diocesan bishop he served widely, from China to France to the United States, becoming Archbishop of Shanghai and San Francisco. He reposed on June 19 (Old Style) / July 2 (New Style), 1966.
sections:
  - heading: Early Life and Education
    body:
      - Michael was born on June 4, 1896, in the village of Adamovka in Kharkiv province to his parents Boris and Glafira Maximovitch, described as pious aristocrats. In his youth he was sickly and had a poor appetite, yet showed an intense religious interest from an early age.
      - He was educated at the Poltava Military School (1907–14) and afterward studied at Kharkiv Imperial University.
  - heading: Episcopal Ministry
    body:
      - He served as a diocesan bishop of the Russian Orthodox Church Outside Russia (ROCOR), with a ministry that extended widely from China to France to the United States, ultimately as Archbishop of Shanghai and San Francisco.
  - heading: Glorification and Legacy
    body:
      - He departed this life on June 19 (Old Style) / July 2 (New Style), 1966.
      - He was officially glorified by the Russian Orthodox Church Abroad on July 2, 1994, and his glorification was later recognized for universal veneration by the Patriarchate of Moscow on July 2, 2008.
      - He is venerated as a saint in the Eastern Orthodox Church.
  - heading: Relics & Shrines
    body:
      - His relics are recorded as incorrupt.
