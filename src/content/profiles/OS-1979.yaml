flagReasons:
  - claim: The profile presents Orlov and Orletsa as the same place (or alternate names for one another) via the parenthetical 'Orlov (Orletsa)'.
    detail: "The OCA dossier source (the synaxarion the profile itself cites) explicitly lists them as two sequential, distinct stops: 'moving to Orlov (a merchant-founded city), then Orletsa.' Presenting Orletsa as a parenthetical alternate name for Orlov contradicts that text; there is no source in the dossier that treats them as the same place."
