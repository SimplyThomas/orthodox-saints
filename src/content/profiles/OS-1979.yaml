id: OS-1979
lifespan: c. 1546 – 1612
overview:
  - Venerable Tryphon of Vyatka (c. 1546–1612) was a Russian monastic founder, missionary, and archimandrite whose labors established organized monastic life in the Vyatka region of northeastern Russia. Born to a prosperous peasant family in the far northern Mezen country, he was christened Trophimos (in Russian, Trofim Dmitrievich Podvizaev) and was the youngest son of Demetrios (Dimitry) and Pelagia.
  - Orphaned young when his father died, and resisting his family's wish that he marry, he left home to pursue the monastic life. After a period of ascetic wandering and service in the Russian north and along the Kama River, he was tonsured at the Holy Transfiguration Monastery at Pyshkor in Perm, receiving the name Tryphon.
  - He is remembered for his missionary preaching among the pagan Ostyak and Voguli peoples and for founding a series of monasteries, chief among them the Dormition Monastery at Khlynov (Khynov, modern Kirov) around 1580, of which he served as archimandrite. He reposed on October 8, 1612; his relics were later uncovered, and he was formally canonized by the Russian Orthodox Church in 1903. He is venerated as a patron of the Vyatka region.
liturgicalTitle: Our Venerable Father Tryphon, Archimandrite of Vyatka
sections:
  - heading: Early Life and Calling
    body:
      - Tryphon was born around 1546 in the village of Malaya Nemnyuzhka (also recorded as Malaya Nemyushka or Malaya Nemnyuga) in the Pinega district, part of the remote northern Mezen province — a location later identified with Sovpolye in the Mezensky District of Arkhangelsk Oblast. His secular name was Trofim (Trophimos) Dmitrievich Podvizaev, and he was the youngest son of the well-off peasants Dimitry and Pelagia.
      - His father died while he was young, and he was raised under the guidance of his mother and older brothers. According to the accounts of his life, he was drawn to monasticism after hearing his parish priest teach about preserving purity of body and spirit, and he resisted his family's intention to arrange a marriage for him.
      - Following his monastic inclination, he left home and lived for a time in the Russian north — by various accounts at Veliky Ustyug with a strict parish priest devoted to fasting and prayer, and at Orlov (Orletsa) along the Kama River, where the synaxarion relates that he endured hunger and cold while living on a church porch.
  - heading: Monastic Profession and Ascetic Life
    body:
      - At about the age of twenty-two he received monastic tonsure at the Holy Transfiguration Monastery at Pyshkor in Perm (the Pyskorskoye Monastery on the Kama River), taking the name Tryphon under the abbot Varlaam (Barlaam).
      - He was known for severe asceticism, and by tradition wore a hair shirt and chains. The accounts of his life relate that during a grave illness brought on by his ascetic labors he experienced a heavenly vision and attributed his healing to Saint Nicholas.
  - heading: Missionary Work and Monastic Foundations
    body:
      - Seeking solitude, Tryphon established a monastery honoring the Dormition of the Theotokos on the Chusovaya River. He is remembered for preaching the Christian faith among the pagan Ostyak and Voguli peoples of the region.
      - Around 1580 he relocated to Khlynov (Khynov, modern Kirov) in the Vyatka diocese, where he founded a Dormition Monastery dedicated to the Mother of God and served as its archimandrite. He is also credited with founding the Theophany Monastery at Slobodsk (Slobodsk).
  - heading: Conflict and Repose
    body:
      - The accounts relate that disagreements over strict monastic discipline led his disciples, headed by his successor Jonah (Jonas), to depose him. Tryphon then traveled through various Russian cities; in time Jonah repented, and Tryphon returned to his monastery.
      - He reposed peacefully at an advanced age on October 8, 1612, at Khlynov, and was buried in his monastery.
  - heading: Relics and Canonization
    body:
      - His relics were uncovered some decades after his death; the sources place this discovery in 1648, and the Russian account records their uncovering on June 2, 1684 during the construction of a stone cathedral. The uncovering led to liturgical services in his honor.
      - He was formally canonized by the Holy Synod of the Russian Orthodox Church in 1903. He is venerated in the Vyatka and Perm dioceses as a patron of the Vyatka region, and his feast is kept on October 8 (October 8/21).
  - heading: Miracles & Traditions
    body:
      - "Traditional Accounts: The accounts of his life relate that during a severe illness caused by his ascetic practices, Tryphon received a heavenly vision and was healed through the intercession of Saint Nicholas."
      - "Traditional Accounts: One account (related in the Mystagogy tradition) tells that while he lived in poverty at Orlov, wealthy merchants — identified with the Stroganov family — threw him down a steep riverbank as a cruel prank. He fell into deep snowdrifts but was unharmed; when the men came to retrieve him and removed their boots to shake off the snow, they found the monk cheerful and seemingly radiating warmth. They asked his forgiveness, which he granted."
