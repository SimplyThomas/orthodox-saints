id: OS-2839
lifespan: c. 368 – c. 419/420
overview:
  - Eustochium (full name Eustochium Julia) was a Roman consecrated virgin of the fourth and early fifth centuries, born about 368 in Rome to the senator Toxotius and Saint Paula. Her family claimed descent from the Julian clan, though modern genealogists dispute this. She had three sisters — Blaesilla, Paulina, and Rufina — and one brother, Toxotius.
  - When Saint Jerome arrived in Rome from Palestine in 382, Eustochium and her mother placed themselves under his spiritual and educational direction. Around 384 she made a vow of perpetual virginity, and on that occasion Jerome addressed to her his celebrated letter on the guarding of virginity (De custodia virginitatis, Epistle 22), the most substantial of his surviving treatises on the ascetic life.
  - In 386 she accompanied Jerome and Paula to Egypt, visiting the hermits of the Nitrian Desert, and then settled permanently with them at Bethlehem. There she and Paula founded four monasteries and a hospice near the birthplace of Christ, and after her mother's death in 404 Eustochium succeeded her in directing the community of virgins. She died about 419 or 420 and was succeeded by her niece, Paula the Younger.
liturgicalTitle: Our Venerable Mother Eustochium of Bethlehem
