sections:
  - heading: Learning and Scholarship
    body:
      - Eustochium was among the most learned of Jerome's circle. She spoke Latin and Classical Greek with equal ease and could read the scriptures in Hebrew, and at Bethlehem she devoted much of her time to the study of scripture under Jerome's guidance.
      - Jerome testified that both she and Paula performed the most menial services of the community even as they pursued this learning. He dedicated his commentaries on the prophets Isaiah and Ezekiel to her and composed numerous letters for her instruction.
  - heading: Community at Bethlehem
    body:
      - Near the site of Christ's birth, Paula and Eustochium built four monasteries and a hospice between 386 and 389. One monastery housed monks under Jerome's direction; the other three sheltered Paula, Eustochium, and the virgins who gathered around them, all worshipping in one shared oratory.
      - On her mother's death in 404 Eustochium took over the direction of the three women's convents. Paula's generous almsgiving had left the community in financial difficulty, but Eustochium continued its work with Jerome's encouragement and advice.
  - heading: The Attack of 417
    body:
      - In 417 a crowd of ruffians attacked and pillaged the monasteries of Bethlehem, destroying one by fire and killing and maltreating some of the residents. The assault was alleged to have been instigated by Patriarch John II of Jerusalem and by the Pelagians, against whose teaching Jerome had written sharp polemics.
      - Jerome and Eustochium reported the outrage by letter to Pope Innocent I, who severely reproved the patriarch.
  - heading: Veneration
    body:
      - Eustochium is venerated by the Eastern Orthodox Church, the Roman Catholic Church, the Eastern Catholic Churches, and the Anglican Communion, with her feast kept on 28 September. She is sometimes numbered among the early Desert Mothers.
      - In 2022 she was officially added to the liturgical calendar of the Episcopal Church on 28 September, commemorated alongside her mother, Paula.
