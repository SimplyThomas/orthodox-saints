celebration:
  intro: Ways to honor St Paraskevi of Rome.
  ideas:
    - idea: Make it a day to pray for healthy eyesight — she is long invoked for ailments of the eyes — remembering anyone in the family with eye trouble.
    - idea: If a nearby church dedicated to Agia Paraskevi has a holy-water spring, visit after the feast and let the children reverence her icon.
    - idea: Keep a name-day for those called Paraskevi or Voula with icon, candle, flowers, and a festal treat.
    - idea: Talk with children about her name, which means "Preparation" (Friday), and the days of the week in the Church's rhythm.
    - idea: Read her life together and do a small kindness for someone sick or elderly.
  sources:
    - label: John Sanidopoulos
      url: https://www.johnsanidopoulos.com/2013/07/the-wondrous-saint-paraskevi.html
