    body: Miriam guards her brother on the river and brings their mother to nurse him for Pharaoh's daughter.
  - when: —
    title: The Song at the Sea
    body: After the Red Sea crossing she takes a timbrel and leads the women of Israel in praise as 'Miriam the Prophetess' (Exodus 15:20).
  - when: —
    title: Stricken and healed at Hazeroth
    body: Struck with leprosy for speaking against Moses, she is set outside the camp seven days and then restored (Numbers 12).
  - when: —
    title: Death at Kadesh
    body: She dies in the Wilderness of Zin and is buried at Kadesh (Numbers 20:1).
