influence:
  heading: Influence in America
  intro: "Mardarije's footprint in America centers on the Libertyville monastery he built, which remains the heart of Serbian Orthodox life on the continent."
  places:
    - name: St. Sava Monastery
      kind: Monastery
      place: Libertyville, Illinois
      note: "He purchased the land and founded the monastery in 1923 as the seat of Serbian church life in America, asked in his will that the Serbian bishops in America be enthroned there, and was buried there in 1935. His relics, found incorrupt in May 2017, rest in the monastery church, where his glorification was celebrated that July."
    - name: Serbian Orthodox Diocese of America and Canada
      kind: Institution
      place: Libertyville, Illinois
      note: "Consecrated in 1926 as the first bishop of the newly created American-Canadian diocese, he organized scattered Serbian parishes into one church structure; today's Serbian Orthodox dioceses in North America descend from it."
