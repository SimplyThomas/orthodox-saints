lifespan: d. 1385
liturgicalTitle: Our Father Among the Saints Dionysius, Archbishop of Suzdal
overview:
  - Dionysius of Suzdal was a fourteenth-century Russian hierarch and monastic founder who began his religious life as a monk of the Kiev Caves monastery, where he was tonsured under the baptismal name David. Carrying with him an icon of the Mother of God that he had received as a blessing connected with the founders of the Kiev Caves, he settled on the Volga near Nizhny Novgorod, dug out a cave hermitage, and gathered a community that grew into a monastery dedicated to the Ascension of the Lord.
  - Drawn from the monastic life into the governance of the Russian Church, he was consecrated bishop and later raised to archbishop of Suzdal, opposing heresy and disorder during a turbulent period of disputed metropolitan succession. Appointed metropolitan for Russia by the Patriarch of Constantinople near the end of his life, he was arrested in Kiev and died in confinement.
timeline:
  - when: early 14th c.
    title: Tonsure at the Kiev Caves
    body: He was tonsured a monk at the Kiev Caves monastery, taking the name Dionysius, and received an icon of the Mother of God associated with the monastery's founders, Saints Anthony and Theodosius.
  - when: "1335"
    title: Founding of the Ascension monastery
    body: After dwelling as a hermit in a cave he had dug on the Volga shore near Nizhny Novgorod, he founded a monastery in honor of the Ascension of the Lord as brethren gathered around him. Some accounts place his arrival from Kiev and the first cave settlement somewhat earlier, around 1328-1330.
  - when: "1352"
    title: Missionary sending
    body: He sent out twelve monks to the upper cities and surrounding countryside to undertake missionary work and to establish further monasteries.
  - when: "1374"
    title: Consecration as bishop
    body: He was consecrated bishop, taking up the pastoral governance of the Suzdal region.
  - when: "1379"
    title: Dispute over the metropolitan election
    body: He contested the election of the archimandrite Mityaya as Metropolitan and opposed the heretical Strigolniki movement then disturbing the Russian Church.
  - when: "1382"
    title: Raised to archbishop
    body: He received the title of archbishop from Patriarch Nilus of Constantinople.
  - when: "1384"
    title: Appointed metropolitan for Russia
    body: Patriarch Nilus appointed him metropolitan for Russia.
  - when: October 15, 1385
    title: Repose in captivity
    body: On his return to Kiev he was arrested by Prince Vladimir Olgerdovich and imprisoned, dying in confinement; he was buried in the Kiev Caves.
sections:
  - heading: The Ascension monastery near Nizhny Novgorod
    body:
      - The community Dionysius founded on the steep Volga shore some distance from Nizhny Novgorod grew from a single cave hermitage into a monastery whose later identity preserved the name Pechersky, linking it to the Kiev Caves cloister from which he had come even though the rebuilt site had no caves of its own.
      - Among those formed under his guidance were Saints Euthymius of Suzdal and Macarius of Zheltovod, both later venerated in their own right. The monastery he established was destroyed by a landslide in 1597 and rebuilt the same year a short distance upstream of the original site.
  - heading: Feast and commemoration
    body:
      - He is commemorated on June 26, the feast of Saint David of Thessalonica, the patron whose name he had borne at baptism before his monastic tonsure.
companions:
  - name: Euthymius of Suzdal
    note: Disciple formed under Dionysius's guidance at his Nizhny Novgorod monastery, later abbot and wonderworker of Suzdal.
    href: saint/OS-0914
  - name: Venerable Makarios, Abbot of Zheltovod and Unzha
    note: Disciple formed under Dionysius's guidance at his Nizhny Novgorod monastery, later a noted monastic founder.
    href: saint/OS-1578
