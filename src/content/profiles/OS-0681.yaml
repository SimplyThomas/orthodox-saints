id: OS-0681
liturgicalTitle: Our Father among the Saints Leo the Great, Pope of Rome
lifespan: c. 400 – 10 November 461
overview:
  - Leo the Great was Bishop of Rome from 440 to 461 and is counted among the most consequential of the early popes. A Roman of Tuscan origin who served as a deacon and archdeacon before his election, he governed the Western Church through two decades of doctrinal crisis and barbarian invasion, and his name became permanently joined to the dogmatic settlement of the Fourth Ecumenical Council of Chalcedon.
  - His Tome to Flavian set out the Orthodox confession of the two natures of Christ, divine and human, united in one person, and was acclaimed by the Council of Chalcedon in 451 with the words "Peter has spoken through Leo." He is remembered also for going out to meet Attila the Hun in 452 and turning him back from the gates of Italy. He is venerated as a confessor and, because he belongs to the undivided Church, is honored in both the Eastern Orthodox and the Western traditions.
