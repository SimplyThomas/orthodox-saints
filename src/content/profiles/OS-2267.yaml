id: OS-2267
lifespan: c. 1340s – November 28, 1394
patronage:
  - Iconographers
  - Monastics
  - Rostov
overview:
  - Saint Theodore, Archbishop of Rostov (died 1394), was a nephew of Saint Sergius of Radonezh who entered monastic life as a boy and rose to become a monastery founder, iconographer, and hierarch of the Russian Church. Born John, he was the son of Stephen, Saint Sergius's brother, who served in an important post under Prince Andrew of Radonezh before being widowed and becoming a monk.
  - Brought at the age of twelve to Saint Sergius's monastery, John was tonsured with the name Theodore and there learned Greek and the painting of icons. With his uncle's blessing he founded the Simonov Monastery on the Moskva River, guided a generation of ascetics, served as confessor to Great Prince Demetrios of the Don, and undertook church missions to Constantinople before being consecrated Archbishop of Rostov in 1387.
timeline:
  - when: c. 1350s
    title: Tonsure at the monastery of Saint Sergius
    body: Left a widower, Stephen (brother of Saint Sergius of Radonezh) became a monk and brought his twelve-year-old son John to the monastery. Saint Sergius, who foresaw the boy's ascetical life, tonsured him with the name Theodore on the feast of Saint Theodore the Hair-Shirt Wearer (April 20). At the monastery Theodore learned the Greek language and how to paint icons.
  - when: "1370"
    title: Founding of Simonov Monastery
    body: With the blessing of Saint Sergius, Theodore built a church in honor of the Nativity of the Most Holy Theotokos and founded a monastery on the banks of the Moskva River at a place called Simonovo. He built a cell five versts from the Moscow Kremlin and attracted disciples, pursuing new ascetical labors.
  - when: "1379"
    title: Relocation to Novoe Simonovo
    body: Metropolitan Alexis authorized construction of a Dormition church at Novoe Simonovo, with foundations laid in 1379; the monastery relocated northeast a short distance. The original site became the burial ground for warriors killed at the Battle of Kulikovo, including Alexander Peresvet.
  - when: "1384"
    title: First journey to Constantinople
    body: On his first journey to Constantinople on church business, Patriarch Neilos made Theodore an Archimandrite, and Simonov Monastery was placed directly under the Patriarch, becoming stavropegial (under patriarchal jurisdiction).
  - when: "1387"
    title: Consecration as Archbishop of Rostov
    body: Theodore was consecrated Archbishop and occupied the See of Rostov, where he founded the Nativity of the Theotokos Monastery. He occupied himself with iconography, adorning Simonov Monastery and many Moscow churches with icons he painted himself.
  - when: November 28, 1394
    title: Repose
    body: The blessed repose of the saint occurred on November 28, 1394. His relics are kept in the Rostov Dormition Cathedral.
sections:
  - heading: Family and Formation
    body:
      - Theodore was born John, the son of Stephen, brother of Saint Sergius of Radonezh, who held an important position under Prince Andrew of Radonezh. After being widowed, Stephen entered monastic life and brought his twelve-year-old son to Saint Sergius's monastery.
      - Saint Sergius tonsured the boy with the name Theodore on the feast of Saint Theodore the Hair-Shirt Wearer (April 20), foreseeing his ascetical calling. At the monastery Theodore acquired the Greek language and the art of icon painting, formation that shaped his later work as both a hierarch and an iconographer.
  - heading: Monastic Founder and Spiritual Father
    body:
      - With Saint Sergius's blessing, Theodore founded the Simonov Monastery on the Moskva River, building first a church of the Nativity of the Theotokos and later a cell five versts from the Moscow Kremlin, where disciples gathered. As Igoumen and then Archimandrite, he guided many notable ascetics.
      - Among those tonsured at Simonov Monastery were Saints Cyril (commemorated June 9) and Therapon (commemorated May 27), the future founders of two famous monasteries at White Lake. Great Prince Demetrios of the Don (Dmitry Donskoy) chose Theodore as his father confessor.
      - According to a later account, the Simonov Monastery was said to take its name from Simeon Khovrin, a boyar of Greek extraction who took monastic vows there under the name Simon, having formerly owned the land. The monastery grew into one of the richest and most famous in the region, comprising several major churches and many icons; a white-stone cathedral was built at the site in 1405.
  - heading: Missions to Constantinople and Episcopacy
    body:
      - Theodore made multiple journeys to Constantinople on church business. On his first, in 1384, Patriarch Neilos elevated him to Archimandrite and placed Simonov Monastery directly under patriarchal jurisdiction as a stavropegial house.
      - In 1387 he was consecrated Archbishop and occupied the See of Rostov, where he also founded the Nativity of the Theotokos Monastery. Throughout his episcopacy he continued to paint icons, adorning both Simonov Monastery and many churches of Moscow with his own work.
  - heading: Relics and Veneration
    body:
      - Saint Theodore reposed on November 28, 1394, and his relics rest in the Rostov Dormition Cathedral. Though he was venerated locally in the fifteenth century, his general veneration was discontinued in the nineteenth century before being formally restored in 1912.
      - Liturgical texts honor him as a hierarch raised from youth by labor, abstinence, fasting, and prayer, ascending to the hierarchal throne, and celebrate his building of the monastery of the Nativity of the Theotokos.
