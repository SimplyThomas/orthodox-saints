works:
  - title: Textbooks on theology, philosophy, and poetics
    desc: Academic works composed during his teaching career at the Kiev Theological Academy, written in Latin, Russian, and Polish.
  - title: Homilies and sermons
    desc: Preaching that, by report, addressed both doctrinal questions and social conditions, including the relationship between landowners and serfs.
  - title: Polemical works against Catholicism
    desc: Writings defending Orthodoxy in the context of the Uniate pressures within the Polish-Lithuanian Commonwealth.
