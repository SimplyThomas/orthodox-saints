id: OS-2847
lifespan: c. 551 – 624
overview:
  - Austregisilus (also rendered Outrille or Aoustrille) was a bishop of Bourges in Merovingian Gaul, born about 551 and dying in 624. Educated for court service, he was trained as a courtier and served King Gontram (Guntram) at Chalon-sur-Saône before turning to the monastic life.
  - He entered the abbey of Saint-Nizier at Lyon, where he was eventually made abbot, and was ordained priest before his election as bishop of Bourges in 612. He held the see for twelve years, until his death, and took part in the Council of Paris in 614.
  - "He is remembered particularly for the disciples formed under his direction: Saint Amand of Maastricht studied under him as a young ascetic at Bourges, and Sulpicius the Pious, whom he ordained and appointed to head the episcopal school, succeeded him as bishop. He is venerated as a saint in both the Eastern Orthodox and Roman Catholic traditions."
liturgicalTitle: Our Father among the Saints Austregisilus, Bishop of Bourges and Confessor
