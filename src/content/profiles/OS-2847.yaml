sections:
  - heading: From Court to Cloister
    body:
      - Austregisilus was educated and trained as a courtier, and served at the court of the Merovingian king Gontram at Chalon-sur-Saône. He afterward left royal service for the monastic life, entering the abbey of Saint-Nizier at Lyon.
      - At Saint-Nizier he rose to become abbot and was ordained priest. In 612 he was elected bishop of Bourges, and he governed the see until his death twelve years later. In 614 he was among the bishops who attended the Council of Paris.
  - heading: Teacher and Legacy
    body:
      - Austregisilus is remembered above all as a former of clergy and ascetics. Saint Amand of Maastricht (born about 584 in Lower Poitou), after time as a monk on the Île d'Yeu, came to Bourges and became his pupil; sources relate that Amand lived for some years in a cell near the cathedral on a diet of bread and water before his own missionary labours.
      - He also ordained Sulpicius the Pious as cleric and then deacon, and appointed him director of the episcopal school. When Austregisilus died about 624, Sulpicius was recalled to Bourges to succeed him as bishop, suggesting Austregisilus had prepared him for that leadership.
      - His memory is kept in France, especially at Bourges and Lyon. Two French villages bear his name, Saint-Outrille and Saint-Aoustrille, and a statue of him stands in the church at Frontenas.
  - heading: Veneration
    body:
      - Austregisilus is honoured by both the Roman Catholic and Eastern Orthodox churches on 20 May; Orthodox communities following the Old Calendar commemorate him on 2 June. He is listed among the pre-schism Western saints in the Eastern Orthodox liturgical calendar.
      - In iconography he is depicted as a knight on horseback wearing a religious habit over his armour, with a figure falling from a horse before him.
