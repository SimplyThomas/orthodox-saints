id: OS-0951
liturgicalTitle: Our Father among the Saints Eutychius, Archbishop of Constantinople
lifespan: c. 512 - 582
overview:
  - Eutychius was Patriarch of Constantinople across two terms, from 552 to 565 and again from 577 to 582, in the reigns of the emperors Justinian I, Justin II, and Tiberius II Constantine. He is best remembered for presiding over the Second Council of Constantinople, recognized in the Orthodox Church as the Fifth Ecumenical Council, held in 553.
  - Born in Phrygia in Asia Minor and formed as a monk at Amasea, he was deposed and exiled by Justinian for refusing to accept the emperor's adoption of the Aphthartodocetist teaching. After more than a decade in exile he was restored to his see, where he served until his repose. He is commemorated on April 6 and is venerated as a hierarch and confessor.
timeline:
  - when: c. 512
    title: Birth in Phrygia
    body: Eutychius was born around the year 512 at Theium in the province of Phrygia in Asia Minor. By one account his father Alexander was a soldier who served under the Byzantine commander Belisarius, and his mother Synesia was the daughter of the priest Hesychius of Augustopolis.
  - when: c. 542
    title: Monastic life at Amasea
    body: After early education and advanced studies, Eutychius entered a monastery at Amasea to dedicate his life to monastic discipline, becoming a monk around the age of thirty.
  - when: "552"
    title: Elevation to the patriarchate
    body: On the death of Patriarch Menas in August 552, Eutychius was nominated by the Emperor Justinian I as Patriarch of Constantinople. Tradition relates that Menas had approved him as a successor, and that the Apostle Peter confirmed the appointment in a vision to Justinian.
  - when: "553"
    title: The Fifth Ecumenical Council
    body: Eutychius presided over the Second Council of Constantinople, the Fifth Ecumenical Council, which met from May 5 to June 2, 553. He held the first place in the assembly, and the council issued its decrees concerning the Three Chapters.
  - when: "562"
    title: Consecration of Hagia Sophia
    body: In 562 Eutychius consecrated the rebuilt church of Hagia Sophia in Constantinople.
  - when: "565"
    title: Deposition and exile
    body: When Justinian embraced Aphthartodocetism, the teaching that Christ's body was incorruptible and incapable of suffering, Eutychius refused to comply. On January 22, 565, soldiers carried him away from the patriarchal residence, and he was sent into exile, residing in monasteries on Principus Island and at Amasea for about twelve years.
  - when: "577"
    title: Restoration to the see
    body: After Justinian's death, the Emperor Justin II and the future Tiberius II Constantine recalled Eutychius to Constantinople in October 577. His return is described as triumphal, with crowds gathering to receive him, and he resumed the patriarchate.
  - when: "582"
    title: Repose
    body: Eutychius died on the Sunday after Easter, dated to early April 582, at about the age of seventy. Before his death he gathered his clergy and is reported to have confessed his belief in the physical resurrection of the body. He is commemorated on April 6.
sections:
  - heading: Patriarch and Council Father
    body:
      - Eutychius occupied the see of Constantinople at a turbulent moment in the Christological controversies of the sixth century. His first patriarchate coincided with Justinian's effort to reconcile divided parties through the condemnation of the Three Chapters, the writings associated with Theodore of Mopsuestia, Theodoret of Cyrus, and Ibas of Edessa. As presiding bishop of the Second Council of Constantinople in 553, Eutychius stood at the center of this work, sharing the first place in the assembly that produced the council's decrees.
      - His tenure also saw the consecration of the rebuilt Hagia Sophia in 562, the great church of the imperial capital, marking a high point of his early years as patriarch.
  - heading: Confession and Exile
    body:
      - The conflict that defined Eutychius's witness arose toward the end of Justinian's reign, when the emperor adopted Aphthartodocetism, a teaching that held the body of Christ to have been incorruptible and incapable of suffering even before the Resurrection. Eutychius refused to give his assent.
      - "His refusal led to his removal: in 565 soldiers seized him and he was sent into exile, where he remained for roughly twelve years in monasteries on Principus Island and at Amasea. He was recalled and restored to his see in 577 under Justin II and Tiberius II Constantine, and the sources describe his return to Constantinople as a public triumph."
  - heading: Traditional Accounts
    body:
      - By tradition, during his years in exile Eutychius was credited with miraculous healings of the body and with the gift of prophecy. These accounts belong to the synaxarion tradition surrounding his life rather than to the documented record of his public acts as patriarch.
