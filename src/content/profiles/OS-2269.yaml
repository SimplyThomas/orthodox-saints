id: OS-2269
liturgicalTitle: The Holy New Hieromartyr Seraphim (Chichagov), Metropolitan of Leningrad
lifespan: 1856–1937
overview:
  - Seraphim (Chichagov), Metropolitan of Leningrad, was a Russian hierarch whose life spanned a distinguished military career, a second vocation as a priest, monk, and bishop, and finally martyrdom under the Soviet state. Born Leonid Mikhailovich Chichagov into an aristocratic military family, he served as an artillery officer and was decorated for valor in the Russo-Turkish War of 1877–1878 before resigning his commission and entering the priesthood. As a monk he authored an extensive chronicle of the Diveyevo convent and a biography of Seraphim of Sarov, work that contributed to that elder's canonization in 1903. Raised to the episcopate, he governed a succession of dioceses and in 1928 became Metropolitan of Leningrad. Arrested in his old age and accused of anti-Soviet activity, he was shot at the Butovo firing range in 1937. He was glorified by the Russian Orthodox Church in 1997 among the New Martyrs and Confessors of Russia.
timeline:
  - when: "1856"
    title: Born in St. Petersburg
    body: Leonid Mikhailovich Chichagov was born into an aristocratic Russian military family; his grandfather was Admiral Pavel Chichagov of the Napoleonic Wars. After his father's death he was enrolled in the Corps of Pages military academy and went on to the Artillery Academy.
  - when: 1877–1878
    title: Service in the Russo-Turkish War
    body: As an artillery officer he took part in the campaigns of the Russo-Turkish War, including the fighting around Shipka Pass and the Siege of Plevna, and was decorated for courage with the Cross of St. George. Moved by the suffering of wounded soldiers, he studied medicine and later published a two-volume work on medical subjects.
  - when: "1879"
    title: Marriage to Natalia Dokhturova
    body: On 8 April 1879 he married Natalia Dokhturova, daughter of General Dmitry Dokhturov, with whom he had four daughters. His meetings with John of Kronstadt, who became his spiritual mentor, turned him toward the priesthood.
  - when: 1890–1893
    title: Resignation and ordination
    body: He resigned his military commission on 15 April 1890 and moved to Moscow to study theology. He was ordained a deacon on 26 February 1893 and a priest two days later, devoting his own resources to the renovation of churches.
  - when: 1895–1898
    title: Widowhood and monastic tonsure
    body: His wife died in 1895. Some years later he was tonsured a monk, receiving the name Seraphim after Seraphim of Sarov, and entered upon monastic life, eventually being elevated to archimandrite.
  - when: 1896–1903
    title: Chronicle of Diveyevo and the canonization of St. Seraphim of Sarov
    body: He compiled an extensive history of the Seraphim-Diveyevo convent, published in 1896, and a biography of Seraphim of Sarov drawn from interviews with nuns who had known him. This research helped prepare the documents for the elder's canonization, and in 1903 Chichagov took part in directing the canonization ceremony.
  - when: 1904–1917
    title: Episcopal ministry
    body: Consecrated Bishop of Sukhumi in 1904, he subsequently governed the dioceses of Orel, Kishinev (Chisinau), and Tver, opening orphanages, hospitals, and parish councils and contending against sectarianism.
  - when: "1928"
    title: Metropolitan of Leningrad
    body: After the upheavals of the Revolution and Civil War, including periods of arrest and exile, he was appointed Metropolitan of Leningrad (Petrograd) and Gdov in 1928, returning to his native city.
  - when: "1933"
    title: Retirement
    body: By 1933 his health had seriously declined under the strain of Soviet persecution of the clergy, and he retired from active administration of the see.
  - when: "1937"
    title: Arrest and execution at Butovo
    body: In his old age he was arrested for the last time, charged with anti-Soviet (monarchist) propaganda. He was sentenced by an NKVD troika and shot at the Butovo firing range in 1937.
  - when: "1997"
    title: Glorification among the New Martyrs of Russia
    body: He was canonized on 23 February 1997 by the Council of Bishops of the Russian Orthodox Church in Moscow, numbered among the New Martyrs and Confessors of Russia.
sections:
  - heading: From officer to priest
    body:
      - Born in 1856, Leonid Chichagov came from a family long associated with Russian military service; he trained at the Corps of Pages and the Artillery Academy and entered the army as an officer. During the Russo-Turkish War of 1877–1878 he saw heavy fighting and was decorated for bravery, earning the Cross of St. George at Plevna along with several foreign honors.
      - His acquaintance with John of Kronstadt, who became his spiritual director, drew him toward the Church. In 1890 he resigned his commission and settled in Moscow, where he studied theology, and in 1893 he was ordained first a deacon and then a priest. After the death of his wife in 1895 he embraced monasticism, taking the name Seraphim.
  - heading: Scholar of Diveyevo and the canonization of St. Seraphim of Sarov
    body:
      - As a monk, Seraphim devoted himself to the history of the Seraphim-Diveyevo convent, gathering testimonies and documents and publishing an extensive chronicle in 1896. He also composed a biography of Seraphim of Sarov founded on the recollections of nuns who had known the elder.
      - This scholarship furnished much of the documentary basis for the glorification of Seraphim of Sarov, and in 1903 Chichagov took an active part in organizing the canonization, a celebration attended by the Imperial family.
  - heading: Bishop, metropolitan, and martyr
    body:
      - Consecrated to the episcopate in 1904, Seraphim governed in turn the dioceses of Sukhumi, Orel, Kishinev, and Tver, and was active in charitable and pastoral works. The Revolution brought repeated arrests, imprisonment in Taganka, and exile.
      - In 1928 he was made Metropolitan of Leningrad. His preaching was treated by the authorities as anti-Soviet, and after his retirement in 1933 the persecution of the clergy continued to close in around him. Arrested again in his eighties, he was sentenced by an NKVD troika and shot at the Butovo firing range in 1937.
      - The Russian Orthodox Church glorified him on 23 February 1997, by the act of its Council of Bishops in Moscow, among the New Martyrs and Confessors of Russia.
