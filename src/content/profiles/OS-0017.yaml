id: OS-0017
lifespan: c. 289 – c. 304
overview:
  - Marina the Great Martyr, known in the Western tradition as Margaret of Antioch, was a young Christian woman of Antioch in Pisidia (Asia Minor) who was martyred during the persecutions of the late third and early fourth centuries. The anchor tradition places her in the pre-Nicene era of the third century.
  - By tradition the daughter of a pagan priest, she embraced Christianity in her youth, dedicated her virginity to God, and was disowned by her father. Refusing both marriage to a Roman official and renunciation of her faith, she endured severe tortures and was beheaded while still a girl.
  - She is remembered above all for her accounts of overcoming the devil — depicted in Eastern iconography striking a demon — and is venerated as a great martyr. The Eastern Orthodox Church commemorates her on July 17.
sections:
  - heading: Life and Background
    body:
      - Marina was born around 289 in Antioch of Pisidia, in the Roman province of Pisidia in Asia Minor (modern Yalvaç, Turkey). Her father, named in tradition as Aedesius, was a pagan priest.
      - Her mother died soon after her birth, and the infant Marina was placed in the care of a Christian wet nurse who lived some distance from Antioch, on an estate associated with her family. Raised by this nurse, she came to learn the rudiments of the Christian faith as a child; tradition relates that hearing of the birth of Christ through the Virgin Mary strengthened her faith.
      - She resolved to dedicate herself entirely to God and made a vow of perpetual virginity. This led her pagan father to disown her, and she lived in the countryside as a shepherdess.
  - heading: Martyrdom
    body:
      - According to the hagiographical accounts, the Roman governor Olybrius (also rendered Olymbrios), encountering Marina during her shepherding, demanded that she marry him and renounce Christianity. When she publicly confessed her faith and refused, she was arrested and subjected to severe torture.
      - The sources relate that she was beaten with rods, her body raked with iron tridents or combs, nails were driven into her, and she was burned with fire. One account adds that she was suspended on a tree and plunged into water, and another that she emerged unharmed from a cauldron of boiling water, singing the praises of God.
      - She was ultimately beheaded, at approximately the age of fifteen or sixteen, around the year 304 during the persecution under the emperor Diocletian. One tradition records that a great number of other Christians were martyred alongside her.
  - heading: Overcoming the Devil
    body:
      - Marina is especially associated with accounts of confronting and overcoming Satan during her imprisonment. The synaxarion relates a series of supernatural encounters.
      - By tradition, Satan appeared to her in the form of a dragon or serpent that swallowed her; she made the Sign of the Cross, and the dragon was destroyed, the cross she carried irritating the dragon's innards so that she escaped alive. In a second encounter she physically contended with Satan, seizing him by the horns and striking him with a copper hammer. A further assault came as a temptation to sin, which she overcame through prayer, until a light from Heaven appeared in the form of a cross.
      - These accounts shaped her iconography. Eastern Byzantine icons depict her grasping the demon by the hair and striking him with a copper hammer, while Western depictions show her emerging from a dragon.
  - heading: Relics & Shrines
    body:
      - "The relics of Marina were venerated for miraculous healings. Tradition traces their movements through history: they were kept at the Panteponteia monastery in Constantinople until 1204, and accounts variously place them afterward in Antioch and then in Italy."
      - Today relics associated with her are reported in Athens, in a church dedicated to the holy virgin martyr, while a relic of her venerable hand was transferred to Mount Athos, to the Vatopedi Monastery. A relic believed to be her right hand is also held at Saint Mary Church in Cairo.
  - heading: Legacy and Veneration
    body:
      - Marina is widely venerated in both East and West, where she is known as Margaret of Antioch. Her feast is kept on July 17 in the Eastern Orthodox calendar (with July 30 also attested), and on July 20 in the West.
      - Her cult was especially extensive in medieval England, where over 250 churches bear her name.
      - Historical scholarship treats her vita with caution. The Encyclopædia Britannica describes her story as generally regarded to be fictitious, and the Catholic Encyclopedia notes that even the century to which she belonged is uncertain. The narrative details of her life come from later hagiographical tradition rather than contemporary record.
timeline:
  - when: c. 289
    title: Birth in Antioch of Pisidia
    body: Born in Antioch of Pisidia (modern Yalvaç, Turkey) to a pagan priest; her mother dies soon after, and she is raised by a Christian wet nurse.
  - when: c. 301 (age 12)
    title: Embraces Christianity
    body: By tradition learns the basics of the Christian faith around age twelve, dedicates her virginity to God, and is disowned by her father, living as a shepherdess.
  - when: c. 304
    title: Confession before Olybrius
    body: The Roman governor Olybrius demands marriage and apostasy; she publicly confesses Christ and is arrested and tortured.
  - when: c. 304
    title: Martyrdom by beheading
    body: After enduring torture and her accounts of overcoming the devil, she is beheaded at about age fifteen, during the persecution of Diocletian.
