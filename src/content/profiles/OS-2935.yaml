timeline:
  - when: c. AD 30
    title: Appointed by Christ
    body: The Lord appoints the Seventy and sends them out two by two ahead of Him into every town He was about to visit (Luke 10:1).
  - when: c. AD 30–33
    title: Mission in Judea and Galilee
    body: They go before the Lord preaching, healing, and preparing the way; returning with joy, they are told to rejoice rather that their names are written in heaven (Luke 10:17–20).
  - when: After Pentecost
    title: Missionary expansion
    body: Filled with the Spirit, the Seventy carry the Gospel throughout the Roman world — Syria, Asia Minor, Greece, Cyprus, Egypt, and Rome.
  - when: 1st century
    title: Bishops and martyrs
    body: Many are ordained bishops of the early churches; a number end their labors in martyrdom.
  - when: January 4
    title: Synaxis of the Seventy
    body: Their common commemoration is fixed in the Church calendar, gathering the whole company in one feast.
