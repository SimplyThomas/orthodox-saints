id: OS-2935
status: reviewed
eyebrow: Synaxis · The Apostolic Mission
feastNote: Commemorated together as a synaxis · each with individual feasts through the year
overview:
  - The Synaxis of the Holy Seventy Apostles is the common commemoration of the wider circle of disciples whom Christ appointed and sent out ahead of Him, two by two, as recorded in the Gospel of Luke (10:1–24). Where the Twelve hold a unique place at the heart of the apostolic college, the Seventy — seventy-two in some manuscript traditions — formed a broader body of missionary disciples who carried the Gospel through the apostolic age.
  - Scripture does not give their names, and the surviving lists come from later ecclesiastical tradition — above all those associated with Hippolytus of Rome and Dorotheus of Tyre, together with the Byzantine synaxaria — so that the membership varies somewhat from one tradition to another. The Church commemorates them together on January 4, and many of them individually through the year.
  - Following the Resurrection and Pentecost, many of the Seventy became bishops, evangelists, founders of local churches, and martyrs; tradition links them to mission across Palestine, Syria, Asia Minor, Greece, Cyprus, Egypt, Mesopotamia, Rome, and North Africa. Their collective feast expresses the breadth of the apostolic mission — that the spread of the Gospel was the work not of a few leaders only, but of many disciples laboring together — and many later bishoprics trace their origins to members of the Seventy.
