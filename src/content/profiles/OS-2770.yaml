id: OS-2770
lifespan: c. 622/637 – c. 692/700
liturgicalTitle: Our Father among the Saints Landericus, Bishop of Metz and Abbot of Soignies
overview:
  - Saint Landericus of Soignies (Landry of Soignies) was a seventh-century Frankish bishop and abbot from the region of Hainaut, in what is now Belgium. He was born, by varying estimates, between about 622 and 637 into a noble family of the Austrasian aristocracy.
  - "He was the son of Saints Vincent Madelgarius and Waltrude, and every member of his immediate family is venerated as a saint: his siblings were Aldetrude of Maubeuge, Madelberta of Maubeuge, and Dentelin of Mons. His parents each entered the monastic life in later years, his father founding the monasteries of Hautmont and Soignies."
  - Landericus succeeded his father as abbot of the family's monasteries, and also held episcopal office, being remembered as a bishop of Meaux and later as the thirty-fourth Bishop of Metz. He died at Soignies around the close of the seventh century and is commemorated on April 17. A pre-schism Western saint of the undivided Church, he is venerated in the Roman Catholic tradition.
timeline:
  - when: c. 622–637
    title: Birth in Hainaut
    body: Landericus is born in the Pagus Hainoensis of Austrasia, in the modern Hainaut Province of Belgium, to Vincent Madelgarius and Waltrude.
  - when: c. 660
    title: Abbot of the family monasteries
    body: He takes over as abbot of the monasteries his father had founded, having received the monastery at Soignies from him.
  - when: c. 675
    title: Succession at Soignies
    body: He is succeeded as abbot by Halidulphe.
  - when: c. 692–700
    title: Repose at Soignies
    body: Landericus dies at Soignies. His feast is kept on April 17.
  - when: "1864"
    title: Opening of his shrine
    body: His shrine at Soignies is opened on October 1, 1864, by Vicar General Charles-Joseph Voisin, following documented venerations of his relics in 1269, 1406, and 1595.
sections:
  - heading: Ecclesiastical Career
    body:
      - Landericus held both monastic and episcopal office. He is recorded as having taken over the direction of his father's monasteries around 660, receiving the monastery at Soignies from Vincent Madelgarius, and being succeeded there by Halidulphe about 675.
      - In the episcopate he is said to have first occupied the seat of Meaux, and to have been subsequently appointed the thirty-fourth Bishop of Metz, from which he is also known as Saint Landry of Metz.
  - heading: A Family of Saints
    body:
      - Landericus belonged to a household unusually rich in venerated figures. His father, Vincent Madelgarius (also called Maelceadar or Mauger), born about 615 at Strépy, married Waltrude around 635; his mother Waltrude (c. 610–688) came from a wealthy noble family of Cousolre in northern France and became patron saint of Mons.
      - "His three siblings were likewise venerated: Aldetrude, abbess of Maubeuge Abbey; Madelberta, who succeeded Aldetrude as abbess; and Dentelin of Mons, who died in childhood, about the age of seven. After Dentelin's death, Vincent and Waltrude agreed to separate and each pursue the monastic life. Vincent founded Hautmont Abbey around 642 and Soignies around 670, and was clothed in the monastic habit by Saint Aubert, Bishop of Cambrai, dying in 677; Waltrude withdrew to a cell and chapel near the oratory of Saint Ghislain."
  - heading: Relics & Shrines
    body:
      - Landericus's relics were venerated at Soignies, with documented occasions of veneration recorded in 1269, 1406, and 1595. His shrine was opened on October 1, 1864, by Vicar General Charles-Joseph Voisin.
  - heading: Veneration
    body:
      - Landericus is a pre-schism Western saint, principally commemorated in the Western calendar and venerated in the Roman Catholic Church, and included in the pan-Orthodox reckoning as a saint of the undivided Church. No article for him was found on OrthodoxWiki, and the OCA daily synaxarion for April 17 lists no commemoration under his name; no separate formal act of Orthodox glorification has been located.
