    body: Bishop Ioasaph of Vologda, a hagiographer of the period, records the story of the appearance of Euthymius's relics.
  - when: April 11, 1509
    title: Repose of Chariton
    body: Saint Chariton, Euthymius's successor, dies and is interred at the Ascension church alongside Euthymius.
