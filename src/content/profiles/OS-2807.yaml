  - claim: The overview states he crossed to Francia around 644, implying arrival in Francia in 644. The dossier distinguishes departure from East Anglia (c. 644) from arrival in Francia (c. 648). 'Crossed to' implies arrival, which the dossier dates to c. 648.
    detail: Dossier external text 3 says 'around 644 Fursey left his brother Foillan as abbot and departed for Francia'; dossier external text 4 says 'Arriving in Francia (Neustria) around 648.' The 644 date is for departure from East Anglia, not arrival in Francia. The profile's own Foundations in Francia section correctly states 'Arriving in Neustria around 648,' making the overview internally inconsistent and factually imprecise.
