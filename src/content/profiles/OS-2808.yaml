id: OS-2808
lifespan: Fifth century (died c. 450–461; exact date unknown)
liturgicalTitle: Our Father among the Saints Palladius, First Bishop of the Irish
overview:
  - Palladius was a deacon of the Roman Church who, in 431, was ordained bishop by Pope Celestine I and sent to Ireland — in the words of the contemporary chronicler Prosper of Aquitaine, as "first bishop to the Scotti believing in Christ." His mission preceded that of Saint Patrick and is the earliest securely dated event in Irish Christian history.
  - The phrasing of Prosper's notice indicates that an organized Christian community already existed in Ireland requesting ecclesiastical oversight, rather than a purely missionary venture into pagan territory. Palladius's tenure in Ireland was brief and met resistance; later tradition holds that he withdrew and continued to labor among the Scots of northern Britain before his death.
  - He is venerated in the Eastern Orthodox Church as a pre-schism Western saint, and also in the Catholic Church and the Anglican Communion. His feast is kept on July 7.
sections:
  - heading: Origins and Roman Service
    body:
      - Palladius came from a prominent Gallo-Roman family; a tradition preserved in the sources reckons the Palladii among the noblest families of Gaul. His father, Exuperantius, served as Praetorian prefect of the Gallic provinces until he was killed in an army mutiny at Arles in 424.
      - Palladius was a deacon of the Roman Church. Around 429 he is reported to have urged Pope Celestine I to send Bishop Germanus of Auxerre to Britain to combat the Pelagian heresy, which places him within the circle of clergy engaged in the ecclesiastical affairs of the western provinces.
  - heading: Mission to Ireland
    body:
      - 'In 431 Pope Celestine I ordained Palladius bishop and sent him to Ireland. Prosper of Aquitaine recorded the event in his Chronicon: "Palladius, having been ordained by Pope Celestine, is sent as first bishop to the Scotti believing in Christ." The notice is the earliest firm date in the history of Irish Christianity.'
      - By later tradition Palladius landed at Arklow, in the territory of Leinster. He is said to have met resistance from the king of Leinster and to have been banished. Muirchu, writing in the Book of Armagh, relates that the people "did not receive his doctrine readily," and that Palladius "returned to him who sent him."
      - "According to the same tradition he traveled with four companions: Sylvester and Solinus, who remained in Ireland, and Augustinus and Benedictus, who followed him to Britain. Some modern historians associate three further missionaries — Auxilius, Secundinus, and Iserninus — with Palladius rather than with Patrick, suggesting that his mission had more lasting effect than the brief traditional account implies. He is most strongly associated with Leinster."
  - heading: Later Labors and Death
    body:
      - After leaving Ireland, tradition holds that Palladius worked among the Scots of northern Britain for roughly twenty years, establishing a Christian community there. His exact date of death is unknown.
      - The Vita tripartita states that he died at Cell Fine — identified with modern Killeen Cormac in County Kildare — leaving behind books, a writing tablet, and relics of the Apostles Peter and Paul. A separate tradition holds that he died at Fordun, near Aberdeen in Scotland, around the year 450; a cluster of religious dedications in the Mearns region, near the village of Auchenblae, marks what is held to be his resting place.
  - heading: Relics & Shrines
    body:
      - A church dedicated to Palladius stands at Fordoun in Scotland, long associated with his burial according to the Scottish tradition. During the reign of King James V, royal funds were disbursed for the making of a new reliquary for the church there.
      - An annual fair bearing his name, the "Paldy Fair," was held in the district at least until the period of the Protestant Reformation.
  - heading: Historical Uncertainty
    body:
      - The historical record for Palladius is fragmentary, and later writers appear to have confused him with Saint Patrick. The Annals of Ulster contain conflicting death entries — at 457, 461, 492, and 493 — which likely reflect this conflation of the two figures.
      - No writings by Palladius survive, and he is known primarily through the notices of Prosper of Aquitaine and through later Irish hagiographical tradition, which must be weighed against the sparse contemporary evidence.
timeline:
  - when: "424"
    title: Death of his father Exuperantius
    body: Exuperantius, Praetorian prefect of the Gallic provinces, is killed in an army mutiny at Arles.
  - when: c. 429
    title: Urges a mission against Pelagianism
    body: As a deacon of Rome, Palladius reportedly urges Pope Celestine I to send Bishop Germanus of Auxerre to Britain to combat the Pelagian heresy.
  - when: "431"
    title: Ordained bishop and sent to Ireland
    body: Pope Celestine I ordains Palladius and sends him "as first bishop to the Scotti believing in Christ," as recorded by Prosper of Aquitaine.
  - when: c. 431–432
    title: Mission in Leinster
    body: By tradition Palladius lands at Arklow, meets resistance from the king of Leinster, and withdraws, leaving companions Sylvester and Solinus in Ireland.
  - when: c. 450–461
    title: Death
    body: Palladius dies at an uncertain date; traditions place his death at Cell Fine (Killeen Cormac, Co. Kildare) or at Fordun near Aberdeen in Scotland.
