id: OS-2027
lifespan: Date of repose uncertain; a monk of the Kiev Caves monastery, traditionally placed in its medieval period.
overview:
  - Venerable Longinus the Gatekeeper was a monk of the Kiev Caves monastery (the Kyiv Pechersk Lavra) who fulfilled his monastic obedience as the gatekeeper, or gatesman, of the community. His relics rest in the Far Caves, the part of the Lavra descending from the cave of seclusion of the monastery's founder, Saint Anthony.
  - He is remembered for his prayerful fervor and humble love of work, qualities for which, according to the synaxarion, he was granted the gift of discernment. In this capacity he is said to have encouraged those who came to the Lavra with good intent, while denouncing those inclined to wickedness and calling them to repentance.
  - Surviving accounts of his life are brief, reflecting his obscurity; the principal narrative source is the synaxarion of the Orthodox Church in America. He is numbered among the monastic saints of the Kiev Caves whose relics are venerated in the Far Caves.
liturgicalTitle: Our Venerable Father Longinus, Gatekeeper of the Kiev Caves
sections:
  - heading: Monastic Obedience and Discernment
    body:
      - Longinus made his monastic obedience at the Kiev Caves monastery, serving as the community's gatekeeper. The synaxarion records that his prayerful fervor and humble love for work were rewarded by the Lord with the gift of discernment.
      - In the role of gatesman he stood at the threshold between the world and the monastery. The synaxarion relates that he encouraged people who came to the Lavra with good intent, while he denounced those inclined to wickedness and urged them to repentance — an exercise of the discernment attributed to him.
    heading_note: ""
  - heading: Relics & Shrines
    body:
      - Saint Longinus was buried in the Far Caves of the Kiev Caves monastery, also known as the Caves of Theodosius, where the relics of numerous venerated monastic fathers are housed.
      - The Far Caves descend from the personal cave of seclusion of Saint Anthony, who founded the monastery around 1051. The monks of the Caves were collectively glorified in 1643.
    heading_note: ""
  - heading: Historical Context
    body:
      - The Kyiv Pechersk Lavra, where Longinus lived, was founded about 1051 and became the foremost monastic center of the medieval Rus' lands. The monastery suffered destruction in the Mongol invasion of 1240 and was burned again by the Golden Horde under Edigey in 1416, with rebuilding completed only around 1470.
      - Sources offer no firm dates for Longinus's own life, and the surviving record is too thin to fix his era with confidence; this profile presents the monastery's history only as background to a saint whose own biography is largely undocumented.
timeline:
  - when: c. 1051
    title: Founding of the Kiev Caves monastery
    body: The monk Anthony founds the Kyiv Pechersk Lavra; the Far Caves, where Longinus would later be buried, descend from his cave of seclusion.
  - when: Uncertain
    title: Monastic obedience as gatekeeper
    body: Longinus serves as gatekeeper of the Kiev Caves, becoming known for prayerful fervor, humble love of work, and the gift of discernment in receiving pilgrims.
  - when: "1643"
    title: Glorification of the Caves saints
    body: The monastic fathers of the Kiev Caves, among whom Longinus is numbered, are glorified.
