id: OS-2877
lifespan: 4th century
overview:
  - Aedesius (also spelled Edesius) was a fourth-century Christian of Tyre in Phoenicia (in present-day Lebanon) who, together with his brother Frumentius, took part in the earliest evangelization of the kingdom of Aksum in Ethiopia. Captured as a youth and brought to the Aksumite court, he later returned to Tyre, where he was ordained a priest.
  - The principal account of the brothers derives from the Ecclesiastical History of Tyrannius Rufinus, who states that he had the story from Aedesius himself. While his brother Frumentius went on to become the first bishop of Ethiopia and is widely commemorated, Aedesius is remembered chiefly as Frumentius's companion in that mission, and records of separate liturgical veneration for him are limited.
  - He is distinct from the martyr Aedesius of Lycia.
liturgicalTitle: The Righteous Aedesius, Priest of Tyre
sections:
  - heading: The Voyage and Capture
    body:
      - By tradition, around the year 316 the boys Frumentius and Aedesius accompanied their uncle Meropius on a voyage from their birthplace of Tyre toward India. On the return journey disaster struck at a harbor on the Red Sea, where local people fell upon the ship and killed the whole crew. Only the two youths were spared, and they were taken as captives to the King of Aksum.
      - "At the royal court the brothers rose to positions of trust: Aedesius was appointed the king's cupbearer, while Frumentius served as his secretary and treasurer."
  - heading: The First Evangelization of Aksum
    body:
      - According to Rufinus, the brothers used their standing at court to encourage the spread of Christianity. They urged Christian merchants who came into the kingdom to practice their faith openly, helped establish places for prayer, and drew some of the local population toward the faith.
      - When the young heir to the throne came of age and assumed royal power, the brothers were released and offered whatever they might wish. Aedesius chose to return to his homeland of Tyre. Frumentius instead traveled to Alexandria, where the Patriarch Athanasius consecrated him bishop; he then returned to Aksum, where he is credited with converting and baptizing King Ezana.
  - heading: Return to Tyre and Priesthood
    body:
      - Having departed from Ethiopia rather than remaining for the ongoing missionary work, Aedesius settled again at Tyre. There he was ordained a priest and spent the remainder of his life.
  - heading: Sources and Veneration
    body:
      - The chief historical authority for the brothers' story is the Ecclesiastical History of Tyrannius Rufinus, who names Aedesius directly as his informant.
      - Frumentius is widely commemorated — on November 30 in the Eastern Orthodox calendar, December 27 in the Ethiopian Orthodox tradition, December 18 among the Copts, and July 20 in the Roman calendar. For Aedesius, however, records of distinct liturgical veneration are limited, and no firmly established feast day is attested for him in the Eastern Orthodox calendar. The Orthodox Church in America lists Frumentius on November 30 but records no separate commemoration of Aedesius. His feast therefore remains unsettled and in need of further review.
timeline:
  - when: c. 316
    title: Voyage from Tyre and capture
    body: As a youth Aedesius, with his brother Frumentius and their uncle Meropius, sailed from Tyre toward India; on the return the crew was killed at a Red Sea harbor and the two boys were taken captive to the King of Aksum.
  - when: 4th century
    title: Service at the Aksumite court
    body: Aedesius was made the king's cupbearer and Frumentius his secretary and treasurer; the brothers fostered Christian worship in the kingdom.
  - when: 4th century
    title: Release and return to Tyre
    body: When the heir came of age the brothers were freed; Aedesius returned to Tyre while Frumentius went to Alexandria to be consecrated bishop.
  - when: 4th century
    title: Ordination at Tyre
    body: Back in his homeland, Aedesius was ordained a priest and remained at Tyre.
