id: OS-0838
lifespan: d. 411 (traditional)
liturgicalTitle: Our Venerable Father Alexis, the Man of God
overview:
  - Alexis the Man of God was, by tradition, the only son of a wealthy senatorial family in Rome who renounced his inheritance and married state to live in voluntary poverty for the sake of Christ. According to his vita he fled an arranged marriage on his wedding night and adopted the life of an unknown beggar.
  - He lived first in Edessa in Mesopotamia and later returned to Rome, where he dwelt unrecognized as a poor man on his own father's property until his death. His identity was discovered only afterward, from a written account he left. The Orthodox Church commemorates him on March 17.
timeline:
  - when: early life
    title: Birth into a Roman senatorial family
    body: By tradition Alexis was the only son of Euphemianus, a high-ranking Roman of the senatorial class during the reign of the emperor Honorius, and his wife (named Aglais or Aglaida). The family was exceptionally wealthy and Christian.
  - when: wedding night
    title: Flight from marriage
    body: Compelled into an arranged marriage, Alexis abandoned both his bride and his father's household on his wedding night to pursue a life of religious devotion and poverty.
  - when: in Edessa
    title: Seventeen years as a beggar in Edessa
    body: He travelled to Edessa in Mesopotamia, where he venerated the famous image of the Lord associated with King Abgar, then took up a beggar's clothing and lived in the city for seventeen years, continually praying in the vestibule of the Church of the Theotokos. By tradition an icon of the Virgin Mary identified him as a 'Man of God.'
  - when: return
    title: Hidden years in Rome
    body: When his holiness became known and he feared human praise, he fled Edessa and a ship carried him back to Rome. Unrecognized even by his own parents, he was permitted to live as a poor man on the family property, enduring mistreatment from the household servants.
  - when: 411 (traditional)
    title: Death and discovery
    body: Alexis died holding a written account of his life. His family learned his true identity only after his death, when the document revealed who he was and how he had lived in penance from the day of his wedding for the love of God.
sections:
  - heading: The Vita and Its Themes
    body:
      - "The life of Alexis is among the most widely circulated of the early ascetic legends, recounting a nobleman who exchanged great wealth for utter anonymity and poverty. Accounts agree on its central movement: the flight from marriage, the years as a beggar at Edessa, the return to Rome, and the discovery of his identity only after death."
      - Details vary between recensions. The number and length of his hidden years differ, and the precise place of his concealment in Rome is given variously, but the sources concur that he lived unrecognized as a poor man in his own father's house and that a written document revealed who he had been.
      - By tradition he died on March 17, 411, during the reign of Honorius. After his death the sources relate that the sick were healed through contact with his body and that a fragrant oil flowed from it.
  - heading: Relics & Shrines
    body:
      - Relics of Alexis are venerated across the Orthodox world. A large portion of his skull is kept at the Monastery of Agia Lavra near Kalavryta in Greece, said to have been donated by the Byzantine Emperor Manuel II Palaiologos in 1398.
