lifespan: c. 750 – c. 801
liturgicalTitle: Our Venerable Mother Anthusa of Constantinople
overview:
  - Anthusa of Constantinople was an eighth-century Byzantine nun, a daughter of the iconoclast emperor Constantine V Copronymus. Born into the imperial household during one of the most intense phases of the Iconoclast controversy, she rejected the marriages her father arranged and instead embraced monastic life, becoming associated with the veneration of the holy icons that the emperor sought to suppress.
  - After her father's death she gave away her personal wealth in support of the poor and founded a monastery in Constantinople. The accounts of her life preserve a pointed contrast between the imperial policy of her father and the icon-venerating piety she adopted, and she is commemorated in the Orthodox Church on April 12.
timeline:
  - when: c. 750
    title: Birth in the imperial household
    body: According to the tradition, Anthusa was born around 750 as a daughter of Emperor Constantine V (reigned 741–775), said to be the twin of her brother, the future emperor Leo IV the Khazar. The sources give her mother as Eudokia (or, on an alternative dating, Tzitzak). She is said to have been named after Anthusa of Mantinea, an abbess whom Constantine V had tortured for venerating icons and who, by tradition, foretold the safe delivery of the twins.
  - when: after 775
    title: Renunciation of imperial life
    body: Anthusa is said to have refused her father's wishes that she marry. After the death of Constantine V she distributed her personal property to relieve the poor and orphaned, and, according to the accounts, declined an offer from Empress Irene to serve as co-regent during the minority of Constantine VI.
  - when: late 8th century
    title: Monastic tonsure and foundation
    body: She received the monastic tonsure from Patriarch Tarasius of Constantinople and entered the monastery of Saint Euthymia. She subsequently founded the Omonia (Concord, or Charity) monastery in Constantinople, which was known for its strict rule.
  - when: c. 801
    title: Repose
    body: By the principal account she reposed in 801 at the age of fifty-two; an alternative tradition places her death in 808 at the age of fifty-seven.
sections:
  - heading: Monastic life and works
    body:
      - In her monastic life Anthusa is described as taking part in manual labor, serving the other nuns at meals, and maintaining a strict discipline. Her care extended beyond the cloister to the poor, to orphans, and to widows, and the Omonia monastery she founded carried in its name (rendered as Concord or Charity) the charitable character ascribed to her work.
      - The narratives of her life set her piety against the iconoclast policy of her father Constantine V. Where the emperor is remembered for his hostility to the holy icons, his daughter is remembered for venerating them and for embracing the monastic life that the iconoclast establishment often opposed.
  - heading: Veneration
    body:
      - Anthusa is commemorated in the Orthodox Church on April 12, with April 18 also recorded as a feast. As a pre-schism saint she is venerated in both the Eastern Orthodox and Roman Catholic traditions; in the latter she is associated with convents and abbeys and her feast is kept on April 18.
patronage:
  - Convents and monastic communities
  - The poor, orphans, and widows
companions:
  - name: St. Tarasius, Patriarch of Constantinople
    note: Patriarch who gave Anthusa the monastic tonsure, after which she entered the monastery of Saint Euthymia.
