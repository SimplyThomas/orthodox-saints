    body: A runaway slave of Philemon, Onesimus is converted and baptized by the imprisoned Apostle Paul.
  - when: 1st century
    title: Epistle to Philemon
    body: Paul sends him back to Philemon with the letter commending him as a brother; he later returns to the apostle's service.
  - when: 1st century
    title: Bishop of Ephesus
    body: Ordained a bishop, he preaches in many lands and in old age succeeds the Apostle Timothy at Ephesus.
  - when: c. 109
    title: Martyrdom
    body: Arrested under Trajan and taken to Puteoli, he is martyred for the faith.
