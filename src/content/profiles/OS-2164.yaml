    title: Birth on Lesbos
    body: Theoktiste is born in Methymna (Mithimna) on the island of Lesbos in the Byzantine Empire.
  - when: Childhood
    title: Orphaned and raised in a monastery
    body: Losing her parents at a young age, she is placed by relatives in a monastery, where she is raised by nuns, learns the chants and prayers, and devotes herself to monastic life.
