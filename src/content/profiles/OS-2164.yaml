id: OS-2164
lifespan: c. 820 – 881
overview:
  - Theoktiste of Lesbos was a Byzantine ascetic who, after being orphaned in childhood and raised as a nun, spent some thirty-five years as a solitary hermit on the island of Paros, where she had escaped from Arab captors. Her story became widely known in the Orthodox world and she is venerated in both the Eastern Orthodox and Roman Catholic Churches, commemorated on November 9.
  - Born around 820 in Methymna on Lesbos, she was placed in a monastery by relatives after losing her parents and there devoted herself to the monastic life. Captured during a Saracen pirate raid as a young woman, she fled her captors when their ship anchored at Paros and lived out the rest of her life in prayer and extreme austerity in an abandoned church of the Theotokos, subsisting on wild plants until she received Holy Communion shortly before her death.
  - Her Life was composed around 920 by the Byzantine official and man of letters Niketas Magistros, who deliberately modelled it on the Life of Mary of Egypt while setting it amid the ninth-century Byzantine world and its ever-present Saracen pirate menace.
liturgicalTitle: Our Venerable Mother Theoktiste of Lesbos
timeline:
