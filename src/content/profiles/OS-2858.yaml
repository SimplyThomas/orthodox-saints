lifespan: Died June 253
liturgicalTitle: The Holy Hieromartyr Cornelius, Pope of Rome
overview:
  - Cornelius was Bishop of Rome — the twenty-first pope — from March 251 until his death in June 253, during the aftermath of the persecution under the Emperor Decius. He was elected after the Roman see had stood vacant for some fourteen months following the martyrdom of his predecessor Fabian.
  - His episcopate was dominated by the controversy over the lapsi — Christians who had abandoned the faith under persecution. Cornelius, in agreement with St. Cyprian of Carthage, held that such penitents could be restored to communion after a period of penance, against the rigorist position of the Roman priest Novatian, who denied any readmission. A synod of sixty bishops confirmed Cornelius as legitimate bishop and excommunicated Novatian.
  - When persecution resumed, Cornelius was exiled to Centumcellae, where he died. He is venerated as a martyr; St. Cyprian repeatedly refers to him as such. He is distinct from the Hieromartyr Cornelius the Centurion (OS-1830), commemorated on September 13.
sections:
  - heading: Election and the Vacant See
    body:
      - The persecution of the Emperor Decius, which began in January 250, ordered all citizens to perform religious sacrifices under pain of death. In its course Cornelius's predecessor, Fabian, was martyred, and the Roman see remained vacant for roughly fourteen months.
      - Cornelius was a Roman by birth. During a temporary pause in the persecution he was elected bishop by an assembly of bishops, according to one account against his own will and as a moderate alternative to more rigorous candidates. His surviving letters are written in a colloquial rather than a classical Latin, which some scholars have read as a sign of humble origins in contrast to the philosophically educated Novatian.
  - heading: The Lapsi Controversy and the Schism of Novatian
    body:
      - The central question of Cornelius's episcopate concerned the lapsi — those who had denied Christ during the Decian persecution. The Roman priest Novatian maintained the rigorist view that apostates could never be readmitted to the Church. Cornelius, together with St. Cyprian of Carthage, held instead that the fallen could be reconciled through repentance demonstrated by a period of penance.
      - Novatian's supporters had him consecrated as a rival bishop of Rome, establishing what came to be regarded as an antipope. Cornelius retained the support of Cyprian and the African Church, of Dionysius of Alexandria, and of most Eastern bishops. A synod of sixty Italian bishops formally acknowledged Cornelius's legitimacy and excommunicated Novatian and his followers, establishing that lapsed Christians could be re-admitted only after doing penance.
  - heading: The Roman Church of His Day
    body:
      - Cornelius's correspondence gives a rare picture of the organization of the Roman Church in the mid-third century. It records forty-six priests, seven deacons, seven sub-deacons, forty-two acolytes, fifty-two ostiarii (doorkeepers), and more than fifteen hundred widows and persons in distress supported by the Church. From these figures scholars have estimated a Christian population of roughly fifty thousand in Rome during his papacy.
  - heading: Exile, Death, and Legacy
    body:
      - When persecution resumed under the Emperor Trebonianus Gallus, Cornelius was exiled to Centumcellae (modern Civitavecchia). The Liberian catalogue attributes his death there to the hardships of banishment; later sources report that he was beheaded. He died in June 253 and was succeeded by Lucius I.
      - He was buried in the Catacomb of Callixtus, in the cemetery adjoining the chapel of the popes. His feast is kept on September 16, the earlier date of September 14 being recorded by Jerome.
  - heading: Relics & Shrines
    body:
      - Cornelius was entombed in the Catacomb of Callixtus at Rome. In the medieval period relics attributed to him were dispersed to Germany; Kornelimünster Abbey, near Aachen, claimed to possess his head.
timeline:
  - when: c. January 250
    title: The Decian persecution
    body: The Emperor Decius orders all citizens to sacrifice to the gods; Cornelius's predecessor Fabian is martyred and the Roman see falls vacant for about fourteen months.
  - when: March 251
    title: Elected Bishop of Rome
    body: During a pause in the persecution Cornelius is elected the twenty-first bishop of Rome as a moderate on the question of the lapsed.
  - when: "251"
    title: Novatian's rival claim and the synod of sixty bishops
    body: Novatian is consecrated a rival bishop over the readmission of the lapsi; a synod of sixty bishops confirms Cornelius and excommunicates Novatian, with the support of Cyprian of Carthage and Dionysius of Alexandria.
  - when: "252"
    title: Exile to Centumcellae
    body: As persecution resumes under Trebonianus Gallus, Cornelius is banished to Centumcellae (modern Civitavecchia).
  - when: June 253
    title: Death in exile
    body: Cornelius dies in exile — by the Liberian catalogue from the hardships of banishment, by later accounts by beheading — and is venerated as a martyr; he is buried in the Catacomb of Callixtus.
