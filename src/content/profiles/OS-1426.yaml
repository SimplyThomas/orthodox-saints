lifespan: d. 1810
liturgicalTitle: The Holy New Martyr Procopius of Varna
overview:
  - Procopius of Varna is venerated as a new martyr of the Bulgarian Orthodox tradition who was put to death in 1810. By tradition he came from Varna, on the Black Sea coast, and as a young man embraced the monastic life on Mount Athos before a period of apostasy that he later sought to redeem through public confession of Christ and a martyr's death.
  - Because the saint is commemorated chiefly through brief synaxarial notices, the surviving account of his life is short and traditional in character. He is kept on June 25 and is honored particularly as a patron of Varna.
timeline:
  - when: c. age 20
    title: Tonsured on Mount Athos
    body: By tradition, Procopius left Varna for Mount Athos around the age of twenty and entered the Skete of Saint John the Forerunner, placing himself under the guidance of an elder named Dionysios.
  - when: before 1810
    title: Apostasy at Smyrna
    body: The account relates that he abandoned the monastic life, traveled to Smyrna, and in despair embraced Islam, after which the head Janissary of the city had him circumcised.
  - when: before 1810
    title: Repentance and preparation
    body: Stricken in conscience, he confessed to a priest his wish to die for the Christian faith. The priest, fearing he might falter under torture, counseled a period of repentance and ascetic preparation; he is said to have spent fifteen days strengthening his resolve.
  - when: June 25, 1810
    title: Confession and martyrdom
    body: On a Saturday he presented himself before the Ottoman court, set aside his Turkish headdress, put on his monastic hat, renounced Islam, and confessed Jesus Christ as true God. Remaining steadfast against the judge's attempts to dissuade him, he was beheaded.
sections:
  - heading: Traditional Accounts
    body:
      - The synaxarial tradition relates that at the place of execution none of the Ottoman executioners would step forward to strike the blow, so that a former Orthodox Christian who had converted to Islam was brought to behead him.
      - Sources for the saint are limited to brief synaxarial notices; the OCA record on which his database entry rests preserves no detail of his life, and the fuller narrative derives from later devotional accounts of the Athonite and Bulgarian tradition.
patronage:
