id: OS-2575
lifespan: Old Testament era; born c. 1203 BC by one reckoning
overview:
  - Obed (Hebrew עוֹבֵד, also rendered Oved, meaning 'worshipper') was the son of Boaz and Ruth the Moabite, and a link in the genealogy leading from the patriarchs to King David and, ultimately, to Christ. He was the father of Jesse and the grandfather of David, Israel's greatest king.
  - "His birth is recorded in the Book of Ruth as the culmination of the narrative of Ruth and Boaz: through him the family line of Elimelech was preserved and Ruth's integration into Judean society validated. He is named in the genealogies of Jesus in both the Gospel of Matthew and the Gospel of Luke."
  - The Eastern Orthodox and Eastern Catholic churches honor Obed as one of the Holy Forefathers of Christ, commemorating him on the Sunday before the Nativity.
patronage: []
timeline:
  - when: c. 1203 BC
    title: Birth in Bethlehem
    body: According to one Biblical chronology Obed was born around 1203 BC to Boaz and Ruth after their marriage. The women of Bethlehem named the child Obed, and Naomi, Ruth's mother-in-law, took the infant to her breast, playing an active part in his naming and care.
  - when: Following generation
    title: Father of Jesse
    body: Obed became the father of Jesse (Yishay). Jesse in turn was the father of David, making Obed the grandfather of the future king of Israel.
  - when: Christian era
    title: Named in the genealogies of Christ
    body: Obed is listed as an ancestor of Jesus in both Matthew's and Luke's Gospels, connecting the Moabite convert Ruth and her husband Boaz to the Davidic messianic line.
sections:
  - heading: Family and Lineage
    body:
      - "Obed stood at a crucial point in Israel's royal genealogy. His parents were Boaz, a true Israelite of Bethlehem, and Ruth, a Moabite convert. The sequence recorded in scripture runs: Boaz married Ruth; their son was Obed; Obed's son was Jesse; and Jesse's son was David, who became king of Israel."
      - "The Book of Ruth describes his birth simply: 'Ruth became Boaz's wife, and bore him a son.' Naomi took the child to her bosom, and the women of Bethlehem declared that 'Naomi had borne a son,' celebrating that a redeemer had been found to preserve the family name of Elimelech."
      - Because Ruth is one of the few women named in the genealogy of Jesus in the Gospel of Matthew, Obed's place in the line was regarded as essential to the descent that Christians associate with messianic prophecy.
  - heading: Significance in the Book of Ruth
    body:
      - Within the narrative of the Book of Ruth, Obed's birth represents the fulfillment of a redemption story. It restores the family line of Elimelech and affirms Ruth's conversion and acceptance into Judean society, illustrating that the welcome of converts strengthens rather than weakens the community's continuity.
      - "Matthew's genealogy records the same descent tersely: 'Boaz the father of Obed by Ruth, and Obed the father of Jesse.'"
  - heading: Veneration
    body:
      - Obed is honored in Orthodox Christianity as a righteous figure in the ancestral line of Christ, commemorated among the Holy Forefathers. The Sunday of the Holy Forefathers falls on the second Sunday before Christmas in churches of the Byzantine Rite and commemorates the Old Testament ancestors from Adam through the patriarchs, judges, kings, and prophets.
      - "On the final pre-Nativity Sunday, genealogical forebears including Zerubbabel, Matthan, Joseph the Betrothed, and Obed are commemorated, Obed listed as the father of Jesse. A synaxarion couplet marks him: 'Obed of Ruth, a Moabite by tribe, But yet of Boaz, a true Israelite.'"
  - heading: Traditional Accounts
    body:
      - In a homily on the Holy Forefathers attributed to St. Nikolai Velimirovich, Obed's birth is presented as a divine reward for Ruth's devotion to her mother-in-law Naomi. The text observes that Ruth 'had humbled herself to being a beggar,' yet God made her the ancestress of the great king David, from whose line came many kings and finally Christ. In this reading Obed exemplifies God's providence toward the faithful and merciful.
