id: OS-0725
liturgicalTitle: The Holy Martyr Christodoulos
overview:
  - Christodoulos is venerated as a martyr of the Orthodox Church who, according to the surviving record, was put to death by the sword for confessing Christ. He is commemorated on February 26. Almost nothing of his life has been preserved beyond the fact of his witness unto death.
  - The account of his martyrdom is brief and undocumented in detail. The available sources note simply that he was slain with swords, and the place and date of his suffering are not specified. His memory is transmitted through the Synaxaristes of Saint Nikodemos of the Holy Mountain, the principal source in which his commemoration appears.
patronage:
  - Invoked as a martyr who confessed Christ unto death.
status: draft
sources:
