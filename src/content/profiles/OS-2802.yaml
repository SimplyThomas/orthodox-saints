flagReasons:
  - claim: Birth year stated as c. 336 in both the lifespan and the timeline
    detail: "The Gregory of Nyssa source (tertullian.org/fathers) states Naucratius was in his 'twenty-first year' when he withdrew, and the Wikipedia (Naucratius) source places that withdrawal 'around 352.' 352 − 21 = c. 331, not c. 336. A birth of c. 336 would make him only ~16 at withdrawal, contradicting the source's 'twenty-first year.' The profile also internally contradicts itself: the timeline simultaneously claims birth 'c. 336' and withdrawal 'at about twenty-one' in 'c. 352,' which is impossible — and if birth were 336 and death 357 the total lifespan is only ~21 years, leaving no room for five years of hermit life preceded by a rhetorical career."
  - claim: Timeline birth entry repeats the unsupported birth year c. 336
    detail: "Same as above: the external source (Life of Macrina via tertullian.org) says he was 21 when he withdrew c. 352, placing birth c. 331. The timeline entry 'c. 336' repeats the unsupported date."
