    body: Azes is arrested in Isauria for confessing the Christian faith and brought before the eparch Aquilinus.
  - when: c. 284
    title: Conversion of the soldiers
    body: The one hundred and fifty soldiers sent to seize him are converted and, the synaxarion relates, baptized with water that sprang forth through the saint's prayer.
  - when: c. 284
    title: Martyrdom
    body: Azes and the soldiers confess Christ before Aquilinus and are beheaded; the eparch also executes his own wife and daughter, who had come to believe.
