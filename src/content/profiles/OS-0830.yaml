  - when: January 15, 1506
    title: Consecrated Archbishop of Novgorod and Pskov
    body: With the consent of Grand Prince Vasily III of Moscow, Serapion was consecrated and enthroned as Archbishop of Novgorod and Pskov, though he had initially refused the position.
  - when: "1507"
    title: Dispute with Joseph of Volokolamsk
    body: When Joseph of Volokolamsk, who fell under Serapion's episcopal jurisdiction, transferred his monastery to princely patronage, Serapion deprived Joseph of his blessing and excommunicated him. Joseph appealed directly to Metropolitan Simon of Moscow, an action Serapion regarded as anti-canonical.
  - when: July 1509
