id: OS-2065
lifespan: Reposed late 4th or early 5th century (exact dates unknown)
overview:
  - Saint Macarius the Roman of Mesopotamia is a hermit known through a traditional hagiographic account in which three wandering monks discover him living in a remote cave in the wilderness of Mesopotamia. According to the vita, he was born in Rome, the son of a wealthy senator named John, and was raised in comfort before fleeing an arranged marriage to pursue a hidden ascetic life.
  - The synaxarion relates that Macarius was guided into the desert over three years by an elderly figure of noble bearing who was later revealed in a dream to be the Archangel Raphael, the same angel who had guided Tobias in the Old Testament. Left at a cave with two orphaned lion cubs entrusted to his care, he passed many years in extreme fasting, vigil, and self-denial until his cave was found by monks drawn to a heavenly fragrance issuing from it.
  - His story is prized for its emphasis on hidden holiness and the desert life. His precise date of repose is unknown; hagiographic sources place him at the end of the fourth or the beginning of the fifth century. He is commemorated on October 23. He is distinct from Macarius the Roman of Novgorod.
liturgicalTitle: Our Venerable Father Macarius the Roman, Hermit of Mesopotamia
patronage:
  - Hermits and solitaries
  - Monastic ascetics
  - Those fleeing worldly life
  - Repentance
timeline:
  - when: Late 4th century (traditional)
    title: Birth and youth in Rome
    body: By tradition Macarius was born in Rome, the son of a wealthy senator named John, and raised in wealth and luxury.
  - when: Wedding night
    title: Flight from an arranged marriage
    body: Betrothed against his will, he fled his father's house on the night of his wedding, reportedly at the very threshold of the bridal chamber, and took refuge with a pious widow, where he spent seven days weeping and entreating God for help.
  - when: Following his flight
    title: Three-year journey into the wilderness
    body: He encountered an elderly man of noble bearing who commanded him to follow. They traveled together for about three years until reaching a cave in the wilderness of Mesopotamia, at which point the guide vanished.
  - when: After arrival
    title: Revelation of the Archangel Raphael
    body: The guide appeared to Macarius in a dream and revealed himself to be the Archangel Raphael, who had guided Tobias in the Old Testament. Raphael entrusted Macarius to God's care together with two lion cubs that had recently lost their mother.
  - when: During his solitude
    title: The demonic temptation
    body: A beautiful young woman appeared at the cave claiming she too had fled a forced marriage in Rome. Sources diverge on the outcome (see Miracles & Traditions). After the apparition vanished, the Archangel Raphael appeared a second time and urged Macarius to remain in the cave, promising that God would hear his prayers.
  - when: Many years
    title: Life of extreme asceticism
    body: Macarius afflicted his flesh with severe fasting, vigils, and utter self-denial for many years. By the time he was found, sources describe him as covered only by his own long hair and a beard reaching to his knees, wearing no other clothing.
  - when: Toward the end of his life
    title: Discovery by three monks
    body: Three monks named Sergius, Hyginos, and Theophilos, from the Monastery of Saint Asclepius in Mesopotamia, discovered his cave after detecting a heavenly sweet fragrance. Macarius shared his testimony with them and sent them away with his blessing.
  - when: Late 4th or early 5th century
    title: Repose
    body: According to the vita he fell asleep in the Lord unknown to all. His precise date of repose is not recorded; sources place it at the end of the fourth or the beginning of the fifth century. He is commemorated on October 23.
sections:
  - heading: Flight from Rome and the Journey into the Desert
    body:
      - The vita opens in Rome, where Macarius is the son of a senator named John and is raised in wealth. Betrothed against his will, he fled on the night of his wedding, according to the account even as he stood on the threshold of the bridal chamber, and hid for seven days with a pious widow in prayer and weeping.
      - After leaving the widow's house he met an elderly man of kindly and noble demeanor who told him to follow. The two journeyed together for about three years until they reached a cave in the wilderness of Mesopotamia, where the guide disappeared. The guide subsequently appeared to Macarius in a dream, revealing himself as the Archangel Raphael, the angel who had guided Tobias, and entrusting the young man to God together with two lion cubs whose mother had lately died. Macarius raised the cubs and made the cave his dwelling.
  - heading: Ascetic Life
    body:
      - "Macarius passed many years in the cave in extreme asceticism: strict fasting, vigils, and absolute self-denial. Several sources describe his physical state at the time he was discovered: an old man covered only by his own long hair and a beard reaching to his knees, with no other clothing, his skin toughened from exposure to heat and cold and his nails grown very long."
      - One recension adds further ascetic and visionary detail, relating that after the temptation he fasted for forty days and nights in penance, experienced a celestial vision of a figure in radiant garments, and afterward remained speechless for seventy days.
  - heading: Discovery and Commemoration
    body:
      - Three monks named Sergius (Sergios), Hyginos (Hyginus), and Theophilos (Theophilus), from the Monastery of Saint Asclepius in Mesopotamia, sought a sign from God and were led to Macarius's cave, which emanated a heavenly sweet fragrance. The hermit recounted his whole life to them and then sent them onward with his blessing; one recension states the monks were miraculously carried back by angels (to Jerusalem in that version).
      - Macarius is commemorated on October 23. A troparion associated with him in one source reads, in part, that by a flood of tears he made the desert fertile and that his longing for God brought forth fruits in abundance.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: There is no independent historical documentation for Macarius apart from the hagiographic tradition; the sources are synaxarion and Lives-of-the-Saints accounts, and his dates are given only approximately (late 4th or early 5th century)."
      - "Traditional Accounts: The recensions differ on the central temptation episode and this variance is worth noting. In several versions (including the OCA and other accounts), a beautiful young woman claiming to have fled a Roman marriage is a demonic apparition, and Macarius, being young and inexperienced and lacking spiritual discernment, sins with her before she vanishes, after which he weeps bitterly and, encouraged again by the Archangel Raphael, redoubles his ascetic struggle. At least one recension instead presents the encounter as a trial he ultimately resisted, the temptress vanishing and his two lions abandoning the cave for ten days as a sign of the spiritual struggle. The accounts also embellish the narrative with details such as the two orphaned lion cubs entrusted to him, the heavenly fragrance that led the monks to his cave, and, in one version, the monks' miraculous transport by angels."
  - heading: Identity
    body:
      - This Macarius is distinct from Macarius the Roman of Novgorod, a separate saint. The Mesopotamian hermit's account is transmitted as a traditional hagiographic life; sourcing and details of his life warrant the usual caution appropriate to obscure early monastic vitae.
