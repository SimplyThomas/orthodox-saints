id: OS-2294
lifespan: 4th–5th century (died c. 440)
overview:
  - Saint Theodoulus was a public official who served as an eparch of Constantinople during the reign of the emperor Theodosius the Great (379–395). He resigned his office because he did not wish to be distracted by vain worldly cares, and after the death of his wife he distributed his wealth to the poor and embraced the monastic life.
  - Having become a monk, he traveled to Edessa, where he took up the ascetic discipline of the stylites, living atop a pillar for thirty years. According to his life, he ate nothing but the Body and Blood of Christ together with the antidoron, once a week. He is commemorated on December 3 and reposed around the year 440.
patronage:
  - Monastics
  - Public officials
sections:
  - heading: From Public Office to the Pillar
    body:
      - Before his conversion to the monastic life, Theodoulus held the rank of eparch, a senior administrative office, in Constantinople under Theodosius the Great. His life records that he stepped down from this position because he did not want the responsibilities of public service to distract him from spiritual concerns.
      - The death of his wife marked a decisive turn. According to his life, he gave away a fortune of 550 litres of gold to the poor and became a monk. He then went to Edessa, where he adopted the way of the stylites, remaining on top of a pillar for thirty years and sustaining himself with the Eucharist and the antidoron once each week.
  - heading: Cornelius the Mime
    body:
      - A tradition preserved in his life relates that Theodoulus once wondered whether anyone equaled him in spiritual achievement. In answer, an inner voice from God revealed that he was the equal of Cornelius, a mime who worked in a theatre in Damascus.
      - "Theodoulus sought out Cornelius and found that the mime had already abandoned his theatrical career. The account credits Cornelius with an act of self-sacrifice: when a debtor was about to be imprisoned, he raised 400 gold coins through his own effort and hardship in order to free the man. The story is told as a lesson that hidden acts of mercy in the world can match the visible feats of the ascetic."
