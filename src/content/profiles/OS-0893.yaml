flagReasons:
  - claim: He reposed in 1751 at Kizliar; his relics were translated to the Sioni Cathedral in Tbilisi.
    detail: Both external sources state repose on March 28, 1751 at Kizliar with relics translated to Sioni Cathedral. However, the anchor row notes read 'Lived 1668-1724 ... reposed in the 18th' and the anchor brief describes labors 'during the 17th and early 18th centuries', which conflicts with a 1751 repose. The anchor wins on conflict, so this date is flagged; the profile hedges it as 'according to the accounts of his life'.
