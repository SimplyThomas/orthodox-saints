    title: The Nativity Kontakion
    body: By tradition, after serving poorly as a reader at the All-Night Vigil for the Nativity at Blachernae and being humiliated, Romanus fell asleep; the Theotokos appeared with a scroll and bade him eat it. He awoke, received the Patriarch's blessing, ascended the ambo, and chanted his famous Nativity Kontakion, 'Today the Virgin gives birth to Him Who is above all being.'
