id: OS-1961
lifespan: 16th century (both reposed before the 1595 uncovering of relics)
liturgicalTitle: Our Venerable Fathers Jonah and Nectarius of Kazan
overview:
  - "Saints Jonah and Nectarius of Kazan were a father and son among the earliest monastic saints associated with the newly established diocese of Kazan in the sixteenth century. Though sometimes described as brothers, the sources identify them as father and son: before their monastic tonsure they were known as John and Nestor Zastolsky."
  - The elder, a boyar named John, accompanied Saint Gurias when the latter was sent to organize the Kazan diocese, and lived under his spiritual direction; he was later tonsured with the name Jonah. His son Nestor, an ascetic from childhood, was tonsured with the name Nectarius and died at a young age. Both were buried near Saint Gurias at the Kazan Savior-Transfiguration monastery.
  - Their veneration rests on the uncovering of relics in 1595, when the incorrupt bodies of Jonah and Nectarius were discovered alongside those of the Kazan hierarchs Gurias and Barsanuphius. They are commemorated on October 4.
sections:
  - heading: Life under Saint Gurias
    body:
      - "When Saint Gurias was sent to the newly established Kazan diocese, the boyar John Zastolsky went with him. Under the spiritual guidance of Saint Gurias, John led a virtuous and pious life: the sources record that he avoided sin, loved truth, and was strictly honest."
      - John raised his son Nestor in the fear of God. According to the tradition, the youth was an ascetic from childhood — he wore a hair-shirt, kept the fasts, and loved to pray in church. With his father's consent, Nestor was tonsured a monk and given the name Nectarius. He died at a young age and was buried near the grave of Saint Gurias.
      - John himself was later tonsured into monasticism with the name Jonah. Before his death he left instructions that he too be buried near Saint Gurias. No specific year of tonsure or repose is recorded in the available sources for either Jonah or Nectarius.
  - heading: Relics & Shrines
    body:
      - Jonah had built a chapel over the grave of Saint Gurias at the Kazan Savior-Transfiguration monastery, and both he and his son were buried there. At the uncovering of the relics of Saints Gurias and Barsanuphius in 1595, the incorrupt bodies and clothing of Saints Jonah and Nectarius were also found.
      - Their relics were left beneath a crypt in the chapel that Jonah had raised over the grave of Saint Gurias. This uncovering is treated as the basis of their veneration as saints, alongside the Kazan hierarchs.
  - heading: Historical context
    body:
      - The Kazan diocese was established in the mid-sixteenth century following the incorporation of the Khanate of Kazan. Saint Gurias (born Grigory Grigoryevich Rugotin, c. 1500, Radonezh; died December 5, 1563) was appointed the first Archbishop of Kazan and Svyazhsk on February 3, 1555; his successor was Herman of Kazan.
      - As companions and spiritual children of Saint Gurias in the Kazan mission, Jonah and Nectarius are numbered among the early monastic saints of the region, and their commemoration is tied to that of the founding hierarchs of Kazan.
timeline:
  - when: "1555"
    title: Journey to Kazan with Saint Gurias
    body: The boyar John Zastolsky accompanies Saint Gurias, the first Archbishop of Kazan and Svyazhsk, to the newly established diocese and lives under his spiritual direction.
  - when: 16th century
    title: Tonsure of Nectarius and Jonah
    body: Nestor is tonsured a monk with the name Nectarius and dies young, buried near Saint Gurias; his father John is later tonsured as Jonah and, having built a chapel over Gurias's grave, asks to be buried there as well.
  - when: "1595"
    title: Uncovering of the relics
    body: At the uncovering of the relics of Saints Gurias and Barsanuphius, the incorrupt bodies and clothing of Saints Jonah and Nectarius are also found and left beneath a crypt in Jonah's chapel — the basis of their veneration.
