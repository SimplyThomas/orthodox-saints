id: OS-0038
lifespan: 9th century (Cyril c. 826/827–869; Methodius c. 815/826–885)
overview:
  - Saints Cyril and Methodius were ninth-century Byzantine brothers from Thessalonica who evangelized the Slavic peoples and created the first written alphabet for the Slavic language, an achievement that earned them the title Equal-to-the-Apostles. Cyril, born Constantine, was the younger brother; Methodius, born Michael, was the elder.
  - Sent from Constantinople at the request of Prince Rastislav of Great Moravia, the brothers translated the Gospels and the liturgical books into the Slavic vernacular, devising the Glagolitic script for that purpose. Their work laid the foundation for Old Church Slavonic letters and, through their disciples, for the Cyrillic alphabet that bears Cyril's name.
  - The brothers are commemorated together on May 11; the Orthodox calendar also keeps the repose of Saint Cyril on February 14 and the repose of Saint Methodius on April 6. They are honored as patrons of translators and of the Slavic Church.
sections:
  - heading: Origins and Education
    body:
      - The brothers were born in Thessalonica into a family of senatorial standing. Their father, Leo, served as a droungarios (a military officer) of the Byzantine theme of Thessalonica; their mother, named in one source as Maria, is by tradition believed to have been of Slavic descent. The brothers lost their father while Constantine was still young.
      - The Byzantine minister Theoktistos furthered their education. Constantine studied at the University of Magnaura in Constantinople, where he later taught philosophy and gained the epithet "the Philosopher." Sources credit him with expertise in theology and command of several languages, including Arabic and Hebrew. He was ordained to the clergy after his studies, described variously as deacon and as priest. Michael entered imperial administrative service, governing in a Slavic region, before withdrawing to the monastery on Mount Olympus, where he was tonsured a monk with the name Methodius.
  - heading: The Missions to the Khazars and Moravia
    body:
      - Around the year 860, the Emperor Michael III and Patriarch Photius sent Constantine on a missionary expedition to the Khazars. While staying in Chersonesos in the Crimea he is said to have learned the Khazar language. According to one account the mission sought to dissuade the Khazar ruler from adopting Judaism, an objective in which it did not ultimately succeed, though many of the people were converted.
      - In 862 Prince Rastislav of Great Moravia asked Constantinople to send missionaries who could conduct services in the local Slavic tongue. The brothers undertook this mission, arriving in Moravia around 863 and laboring there for roughly four and a half years. To translate the scriptures and Christian literature into the Slavic vernacular, Constantine devised the Glagolitic script, the first alphabet used for Slavonic manuscripts. They translated the Gospels and the essential liturgical books into what is now known as Old Church Slavonic.
  - heading: Rome and the Repose of Saint Cyril
    body:
      - "In 867 the brothers were invited to Rome, arriving in 868 bearing relics of Pope Clement I. Pope Adrian II gave formal papal support to their mission and sanctioned the use of the Slavonic liturgy. Five of their disciples were ordained in Rome: Clement of Ohrid, Gorazd, Naum, Angelar, and Sava."
      - Shortly before his death, Constantine became a monk, taking the monastic name Cyril by which he is now known. He died in Rome on February 14, 869, about fifty days after his tonsure. His remains were interred in a shrine within the Basilica di San Clemente in Rome.
  - heading: The Later Ministry and Repose of Saint Methodius
    body:
      - After Cyril's death, Methodius was raised to the episcopate with jurisdiction over Moravia and Pannonia, sources naming him Archbishop of Sirmium, and was granted authority to celebrate the Slavonic liturgy. He continued his labors among the Slavs while completing further scriptural translations and the Nomocanon.
      - Methodius faced fierce opposition from German clergy. He was captured and imprisoned for about two and a half years; scholars have identified his place of confinement with Reichenau Abbey on the basis of signatures in the Reichenau Confraternity Book. In 878 he was again summoned to Rome on charges of heresy but was acquitted and granted permission to continue the Slavonic liturgy. He died on April 6, 885, and was buried in the principal cathedral of Great Moravia, though the exact location is uncertain. He recommended his disciple Gorazd as his successor.
  - heading: Legacy
    body:
      - After the expulsion of the brothers' disciples from Moravia, Clement and Naum carried the work to Bulgaria under Prince Boris I, establishing the Ohrid Literary School and the Preslav Literary School. It was at Preslav that disciples developed the Cyrillic alphabet, named in Cyril's honor, on the basis of the brothers' earlier Glagolitic script. By one account Clement taught some 3,500 students in the Slavonic language and the Glagolitic alphabet over seven years (886–893).
      - The brothers' creation of a written Slavic language and a Slavic liturgy gave the Slavic peoples scripture and worship in their own tongue and shaped the literary culture of the Orthodox Slavic world. In 1980 Pope John Paul II declared Cyril and Methodius co-patrons of Europe, alongside Benedict of Nursia.
timeline:
  - when: c. 815–827
    title: Birth in Thessalonica
    body: Michael (later Methodius) and Constantine (later Cyril) are born in Thessalonica to Leo, a droungarios, and his wife; sources place Cyril's birth around 826–827 and Methodius's somewhat earlier.
  - when: c. 860
    title: Mission to the Khazars
    body: Sent by Emperor Michael III and Patriarch Photius, Constantine travels to the Khazars, reportedly learning the Khazar language while at Chersonesos in the Crimea.
  - when: 862–863
    title: Mission to Great Moravia
    body: At the request of Prince Rastislav, the brothers go to Moravia to provide worship in the Slavic tongue, devising the Glagolitic script and translating the Gospels and liturgical books into Old Church Slavonic.
  - when: "868"
    title: Journey to Rome
    body: The brothers arrive in Rome bearing relics of Pope Clement I; Pope Adrian II sanctions the Slavonic liturgy, and five disciples are ordained.
  - when: February 14, 869
    title: Repose of Saint Cyril
    body: Having taken the monastic name Cyril shortly before, he dies in Rome about fifty days after his tonsure and is interred in the Basilica di San Clemente.
  - when: "878"
    title: Methodius acquitted at Rome
    body: Summoned again to Rome on charges of heresy, Methodius is acquitted and permitted to continue celebrating the Slavonic liturgy.
  - when: April 6, 885
    title: Repose of Saint Methodius
    body: Methodius dies and is buried in the principal cathedral of Great Moravia, having recommended his disciple Gorazd as his successor.
