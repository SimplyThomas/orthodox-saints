id: OS-2835
lifespan: reigned c. 636 – died 653/654
liturgicalTitle: The Holy and Right-believing King Anna of East Anglia
overview:
  - Anna was King of the East Angles from approximately 636 to 654, ruling a kingdom that comprised the present-day English counties of Norfolk and Suffolk and perhaps the eastern Cambridgeshire Fens. A member of the Wuffingas dynasty, he was a son of Eni of East Anglia and a nephew of Rædwald.
  - A devout Christian king, he supported the mission of the Church in East Anglia, endowed monasteries, and sheltered a Christian exile who was converted at his court. The Venerable Bede praised his devotion to Christianity in the Ecclesiastical History of the English People.
  - "He is best remembered as the father of a remarkable holy family: his children — including Seaxburh, Æthelthryth (Etheldreda) who founded the monastery at Ely, Æthelburh, and possibly Wihtburh, together with his son Jurmin — were venerated as saints. Anna fell in battle against the pagan Mercians under King Penda, and his tomb at Blythburgh long remained a place of pious veneration."
sections:
  - heading: Reign and Christian Influence
    body:
      - Anna married Sæwara and exercised significant Christian influence throughout his reign. Around 645, when Penda of Mercia expelled King Cenwalh from his West Saxon throne, Cenwalh took refuge at Anna's court, and during his year of exile there he was converted to Christianity.
      - "Anna richly endowed the coastal monastery at Cnobheresburg — thought to have stood near Burgh Castle in Suffolk — before it was attacked by Penda's forces around 651. He also supported the monastic work of Saint Botolph: according to an account referencing the life of Botolph, the king offered part of his royal estate to help found the Monastery of Ikanhoe (Ox-island), established in 654."
      - He arranged a strategically important diplomatic marriage for his daughter Seaxburh to Eorcenberht of Kent, strengthening the alliance of Christian kingdoms in England. His daughter Æthelburh and his stepdaughter Sæthryth entered Faremoutiers Abbey in Gaul during the 640s, becoming among the first royal Anglo-Saxons to become nuns abroad.
  - heading: Conflict with Mercia and Death
    body:
      - Throughout his reign Anna faced persistent Mercian aggression under the pagan King Penda. Around 651 Penda attacked the monastery at Cnobheresburg that Anna had endowed, and Anna was driven into exile — possibly to the Magonsæte kingdom in western Shropshire. He returned to rule East Anglia around 654, but the Mercian assaults continued.
      - The opposing armies of Penda and Anna met at Bulcamp, near Blythburgh in Suffolk. The East Anglians were defeated and many were slain, including King Anna and his son Jurmin. The Anglo-Saxon Chronicle records simply, 'Her Anna cining werð ofslagen' ('Here Anna was killed'). His death is dated to 653 or 654.
      - Saint Botolph's monastery at Iken, Suffolk, was built in the year that Anna was killed, possibly to commemorate the king.
  - heading: Relics & Shrines
    body:
      - Anna was probably buried at Blythburgh, alongside his son Jurmin, though his original tomb is now lost. According to the Liber Eliensis, five hundred years after his death his tomb at Blythburgh was still 'venerated by the pious devotion of faithful people.'
      - An eighth-century whalebone writing tablet discovered at Blythburgh suggests connections to East Anglian royalty and Christianity in the period following Anna's death.
  - heading: Family and Veneration
    body:
      - "Anna and his wife Sæwara had at least five children who were later venerated as saints: Seaxburh, who married King Eorcenberht of Kent; Æthelthryth (Etheldreda), who founded the monastery at Ely in 673; Æthelburh, who became a nun at Faremoutiers in Gaul; possibly Wihtburh, an abbess whose historical existence some scholars dispute, as she first appears in late tenth-century records; and Jurmin, who was killed alongside his father. Anna also had a stepdaughter, Sæthryth, who entered Faremoutiers Abbey."
      - No dedicated feast day for King Anna himself is recorded in the sources consulted; his veneration appears to have been local and informal, centred on his tomb at Blythburgh. His son Jurmin is venerated with a feast day of 24 February.
timeline:
  - when: c. 636
    title: Accession
    body: Anna, of the Wuffingas dynasty and nephew of Rædwald, becomes King of the East Angles.
  - when: c. 645
    title: Conversion of Cenwalh
    body: The exiled West Saxon king Cenwalh takes refuge at Anna's court and is converted to Christianity there.
  - when: c. 651
    title: Attack on Cnobheresburg
    body: Penda of Mercia attacks the monastery at Cnobheresburg that Anna had endowed; Anna is driven into exile.
  - when: "654"
    title: Foundation of Ikanhoe
    body: Saint Botolph's monastery at Ikanhoe (Iken) is established, reportedly with Anna's support and part of his royal estate.
  - when: 653/654
    title: Battle of Bulcamp
    body: Anna and his son Jurmin are killed fighting Penda of Mercia near Blythburgh; Anna is buried at Blythburgh.
