id: OS-1950
lifespan: 12th–13th centuries (dates unknown)
overview:
  - Helladius (Elladiy) was a monk of the Kiev Caves Monastery (the Kyiv Pechersk Lavra) whose relics rest in the Near Caves. The Orthodox Church commemorates him among the venerable fathers of the Lavra, but no detailed account of his life has survived.
  - Later Ukrainian tradition places him in the 12th–13th centuries and holds that he was born in Kiev, though his birth and death dates are unknown. The Orthodox Church in America notes his feast and monastic title while recording that no biographical information is available.
liturgicalTitle: Our Venerable Father Helladius of the Kiev Near Caves
patronage:
  - Recluses
timeline:
  - when: 12th–13th c.
    title: Life at the Lavra
    body: By later Ukrainian tradition, Helladius was born in Kiev and lived as a monk of the Kyiv Pechersk Lavra, though the sources preserve no narrative of his life.
  - when: "1638"
    title: Earliest documented mention
    body: His name first appears in written record in Afanasy Kalnofoysky's 'Teraturgim' (1638), a catalogue of the Lavra's holy fathers.
  - when: "1643"
    title: Local recognition
    body: A local recognition of his veneration is associated with the year 1643.
  - when: latter half of the 18th c.
    title: Synodal confirmation
    body: General church-wide veneration was formally approved by the Holy Synod in the second half of the 18th century.
sections:
  - heading: Veneration and Relics
    body:
      - Helladius is numbered among the venerable fathers of the Kyiv Pechersk Lavra, and his relics repose in the Near Caves (Blizhni Pechery) of Kiev. Within the Lavra's own synaxis he is commemorated on the Saturday after 14 September, while his individual feast falls on October 4 (Julian).
      - He is honored in the liturgical tradition of the Lavra as a 'praise of recluses' and as a wonderworker among the Pechersk holy fathers.
  - heading: Iconography
    body:
      - An 18th-century description of his icon depicts him as fair-haired, wearing a black klobuk on his shoulders, with both hands crossed at the heart, in monastic vestments over a red undergarment.
  - heading: Sources and the Historical Record
    body:
      - No connected life of Helladius survives. The Orthodox Church in America commemorates him on October 4 alongside Venerable Onesimus of the Kiev Near Caves and Venerable Ammon the Recluse, and its Synaxarion entry states plainly that no information is available.
      - The principal Western reference is F. G. Holweck's 'A Biographical Dictionary of the Saints' (1924); the fullest surviving detail comes from later Ukrainian sources drawing on the Lavra's own tradition.
