id: OS-2872
lifespan: 2nd century; reposed c. 195
overview:
  - Theophilus was bishop of Caesarea Maritima in Palestine in the latter part of the second century, during the reign of the emperor Commodus. His episcopate is dated to about 189, and he is thought to have reposed around 195–196. The Church commemorates him on March 5.
  - He is remembered chiefly for presiding, together with Narcissus of Jerusalem, over the synod of Palestinian bishops that addressed the controversy over the date of Pascha, upholding its celebration on the Lord's Day. The early historian Eusebius of Caesarea numbers him among the well-known ecclesiastical leaders of his time.
liturgicalTitle: Our Father among the Saints Theophilus, Bishop of Caesarea
timeline:
  - when: c. 189
    title: Bishop of Caesarea
    body: Theophilus becomes bishop of Caesarea Maritima in Palestine, succeeding Cornelius in the see and preceding Theoctistus.
  - when: Reign of Commodus (180–192)
    title: Synod of Caesarea
    body: With Narcissus of Jerusalem, Theophilus presides over a synod of Palestinian bishops convened during the Paschal controversy, which upheld celebrating the resurrection of the Lord on the Lord's Day.
  - when: c. 195
    title: Repose
    body: Theophilus reposes; he is commemorated on March 5.
sections:
  - heading: "Historical Context: The Paschal Controversy"
    body:
      - In the late second century the Church was divided over the date on which Pascha should be observed. Bishops of the province of Asia, led by Polycrates of Ephesus, maintained the Quartodeciman practice of keeping the feast on the fourteenth of Nisan regardless of the day of the week. Others held that the mystery of the resurrection should be celebrated only on the Lord's Day, that is, on Sunday.
      - Eusebius of Caesarea records in his Church History (Book V) that synods were convened on the question in many regions — at Rome, in Pontus, in Gaul, and elsewhere. Among these was a gathering of the bishops of Palestine, over whom, in Eusebius's words, Theophilus of Caesarea and Narcissus of Jerusalem presided. A written statement of this Palestinian assembly was still extant in Eusebius's day.
      - The Palestinian synod joined the others in unanimous agreement that the resurrection of the Lord should be celebrated on no day but the Lord's Day. The Asian bishops under Polycrates continued to hold the older observance, so the dispute was not fully resolved by these synods.
  - heading: Contributions and Legacy
    body:
      - Beyond his role in the Paschal synod, tradition holds that Theophilus served as a teacher to Clement of Alexandria, and he is also credited with endorsing the celebration of the Nativity on December 25.
      - No writings of Theophilus survive individually; his witness is preserved through the collective synodal letter of the Palestinian bishops noted by Eusebius, and through the historian's inclusion of him among the prominent bishops of the age. His predecessor in the see was Cornelius, sometimes identified with Cornelius the Centurion, and he was succeeded by Theoctistus.
