celebration:
  intro: Ways to honor St Mark the Evangelist.
  ideas:
    - idea: Make a little Gospel book — his is the shortest and fastest-moving — where children copy or illustrate a favorite scene, like the calming of the storm.
    - idea: His symbol is the winged lion — a lion craft or mask makes it memorable.
    - idea: Find Alexandria on a map and talk about how Mark founded the Church there, praying for the Orthodox Christians of Africa and the Middle East today.
    - idea: Keep a name-day for any Mark with an icon, a candle, and a favorite meal.
    - idea: Support a mission or a persecuted Christian community, honoring the missionary-founder who gave his life for the Gospel.
