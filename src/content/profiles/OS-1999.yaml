lifespan: c. 778 - c. 845
liturgicalTitle: Our Father among the Saints Theophanes the Confessor and Hymnographer, Bishop of Nicaea
overview:
- Theophanes (c. 778 - c. 845) was a Palestinian monk, hymnographer, and bishop of the ninth century, remembered as one of the leading opponents of Byzantine iconoclasm. With his elder brother Theodore he is known by the epithet Graptos, 'the written-upon' or 'the Branded,' after the emperor Theophilus ordered insulting verses inscribed on their faces with red-hot needles. He is distinct from his contemporary Theophanes the Confessor of Sigriane, the chronicler.
- Educated and tonsured at the Lavra of Saint Sabbas in the Holy Land, Theophanes devoted his life to the defense of the veneration of icons. After the restoration of icon veneration in 842 he was consecrated Bishop of Nicaea, where he served until his death and composed a large body of liturgical canons. He is commemorated on October 11.
timeline:
- when: c. 778
  title: Birth in Palestine
  body: Theophanes was born in Palestine, the younger brother of Theodore, later called the Branded. According to the Wikipedia account their father was the presbyter Jonah.
- when: Early life
  title: Monastic formation at the Lavra of Saint Sabbas
  body: The brothers entered the Lavra of Saint Sabbas (Mar Saba) near Bethlehem, where Theophanes was tonsured and in time ordained a hieromonk. Sources record that they studied under Michael the Synkellos and received an education with a focus on philosophy and theology.
- when: c. 812-829
  title: Defense of the icons in Constantinople
  body: Commissioned, by the OCA account, by the Patriarch of Jerusalem, the brothers traveled to Constantinople and openly opposed the iconoclast emperors, named in the sources as Leo the Armenian, Michael Balbos, and Theophilus.
- when: under Theophilus (829-842)
  title: Branding and exile
  body: Emperor Theophilus had insulting verses inscribed on the brothers' faces with red-hot needles, the act that gave them the name Graptos, 'the Branded.' Theodore died in confinement, while Theophanes endured exile until the change of policy under the Empress Theodora.
- when: '842'
  title: Consecration as Bishop of Nicaea
  body: After the restoration of icon veneration in 842, Theophanes was returned from exile and consecrated to the see of Nicaea; the Wikipedia account names Patriarch Methodius as his consecrator and styles him Metropolitan of Nicaea.
- when: c. 845
  title: Repose
  body: Theophanes died while holding the see of Nicaea. The Wikipedia account places his death in 845; the OCA synaxarion gives a peaceful repose around 850.
sections:
- heading: Iconoclasm and the epithet Graptos
  body:
  - Theophanes lived through the second period of Byzantine iconoclasm and, with his brother Theodore, became one of its most visible opponents. The sources record that the brothers came from the Holy Land to Constantinople specifically to argue for the veneration of icons against successive iconoclast emperors.
  - Under Theophilus the brothers were imprisoned and tortured, and the emperor ordered verses insulting to them cut or tattooed into the skin of their faces with heated needles. The Wikipedia account specifies twelve lines of verse. This punishment produced the name by which they are jointly known, Graptos or 'the written-upon,' rendered in English as 'the Branded.'
- heading: Hymnography
  body:
  - Theophanes is remembered as a prolific hymnographer. The OCA and OrthodoxWiki accounts credit him with about 150 canons, among them a canon written in defense of the holy icons.
  - According to the Wikipedia account, he was a major contributor to the Parakletike, composing sets of canons in all eight tones for the angels and for the departed.
