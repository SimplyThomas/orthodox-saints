    body: The Diocletianic Persecution, with Caesarea in Palestine a principal center of martyrdom under the governor Firmilian and the emperor Maximinus Daia; one resource dates the associated Caesarea martyrs to around 308.
  - when: early 4th century
    title: Arrest, humiliation, and martyrdom
    body: Arrested as a Christian and tortured, Manatho is led naked through the city and mocked, then burned alive.
