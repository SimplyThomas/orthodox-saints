companions:
  - name: St. Herman of Alaska
    note: Fellow monastic of the 1794 Valaam mission that brought Orthodoxy to Kodiak.
    href: saint/OS-0044
  - name: Joasaph (Bolotov)
    note: Archimandrite and leader of the Alaska mission, later its first bishop-elect.
  - name: Hieromonk Macarius
    note: Fellow missionary with whom he traveled Kodiak Island, teaching and baptizing.
  - name: His native guide
    note: A young convert, by some accounts a Tanaina, who by tradition was martyred with him; his name is not recorded.
related:
