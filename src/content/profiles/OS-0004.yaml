    body: Paul undertakes three major missionary journeys across Asia Minor and Europe, through Cyprus, Galatia, Macedonia, Athens, Corinth, and Ephesus.
  - when: AD 49
    title: Council of Jerusalem
    body: Paul meets with Peter, James, and John concerning the reception of Gentile converts.
  - when: c. AD 57
    title: Paul's arrest and appeal to Caesar
    body: Arrested in Jerusalem, Paul is held at Caesarea under Felix for about two years, then appeals to Caesar and is sent to Rome.
