id: OS-0004
lifespan: 1st century (both martyred at Rome under Nero, c. AD 64–68)
overview:
  - The Apostles Peter and Paul are the two chief apostles, commemorated together on June 29, the day marking their martyrdom at Rome under the Emperor Nero. The OCA Synaxarion names them the koryphaioi — the leaders and chiefs of the Apostles — foremost in the ranks of the Twelve and the wider apostolic mission. Their joint feast is preceded by the Apostles' Fast.
  - Peter, originally Shimon bar Yonah, was a Jewish fisherman of Bethsaida, the son of Jonah and brother of the Apostle Andrew. He is listed first among the Twelve Apostles and is remembered for his confession of Jesus as the Messiah at Caesarea Philippi. Paul, born Saul of Tarsus, was a Roman citizen and a former persecutor of Christians who, after a vision of the risen Jesus on the road to Damascus, became the foremost missionary of the early Church and the traditional author of fourteen New Testament books.
sections:
  - heading: Saint Peter
    body:
      - By tradition Peter was born around 1 BC as Shimon bar Yonah in Bethsaida. A married Jewish fisherman and the son of Jonah, he was the brother of the Apostle Andrew and is listed first among the Twelve Apostles. At Caesarea Philippi he proclaimed Jesus as the Messiah; the OCA Synaxarion characterizes him as a fervent follower of Christ known for his profound confession of Christ's divinity. He formed an inner circle with James and John and witnessed the Transfiguration.
      - Peter led the early Jerusalem church. He received a vision permitting the eating of formerly forbidden foods, which opened the way to the conversion of the Gentiles, and he traveled to Lydda, Joppa, Caesarea, and Antioch. He is recognized as the first bishop of Antioch and the first bishop of Rome. He was crucified at Rome under the Emperor Nero, by tradition head-downward at Vatican Hill, in the years between AD 64 and 68.
  - heading: Saint Paul
    body:
      - Paul was born about AD 5 in Tarsus, in Cilicia, to a devout Jewish family of the tribe of Benjamin, and was a Roman citizen from birth. Originally named Saul of Tarsus, he later adopted the Roman name Paul for communication within the Greco-Roman world. He was educated under Gamaliel and worked as a tentmaker. Before his conversion he persecuted the early Christians, taking part in the martyrdom of Stephen.
      - His conversion came through a vision of the ascended Jesus on the road to Damascus (dated to roughly AD 31–36), in which he was temporarily blinded; he was then healed by Ananias and baptized. Paul made three documented missionary journeys, founding Christian communities across Asia Minor and Europe from the mid-40s to the mid-50s, traveling by tradition some 12,000 kilometers by land and 8,000 by sea, through Cyprus, Asia Minor, Philippi, Athens, and Corinth. The Council of Jerusalem in AD 49 confirmed his mission to the Gentiles. He had a public dispute with Peter at Antioch over the observance of Jewish customs. He died at Rome around AD 64–65.
  - heading: Writings and Legacy
    body:
      - "Fourteen of the twenty-seven books of the New Testament are traditionally attributed to Paul. Seven are regarded as undisputed authentic epistles: Romans, Galatians, 1 and 2 Corinthians, 1 Thessalonians, Philippians, and Philemon. Letters whose authorship is disputed include Ephesians, Colossians, 1 and 2 Timothy, Titus, and 2 Thessalonians. Paul is regarded as one of the most important figures of the Apostolic Age, and his epistles remain foundational to Christian theology in both the Western and Eastern traditions."
      - Saint John Chrysostom describes Paul as enduring innumerable trials — imprisonment, chains, scourging, stoning, laceration, shipwreck, robbery, hunger, and nakedness — saying that he 'was dying every day.' Yet Chrysostom presents Paul as one who met these hardships with remarkable spiritual fortitude, declaring 'I rejoice in my sufferings' and 'we also glory in afflictions,' an exemplar of the conviction that external suffering cannot harm one's spiritual integrity where moral resolve is maintained.
