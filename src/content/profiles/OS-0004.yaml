id: OS-0004
lifespan: 1st century (both martyred in Rome under Nero, c. AD 64–68)
overview:
  - The Apostles Peter and Paul are honored together as the two chief apostles of the Christian Church, both of whom were martyred in Rome in the first century. The Orthodox tradition titles them the "Holy Glorious and All-Praised Leaders of the Apostles," calling them the foremost in the ranks of the Apostles. Peter is remembered as the rock and confessor of Christ's divinity; Paul as the apostle to the nations.
  - Peter, originally Simon, was a Jewish fisherman of Bethsaida whom Jesus renamed Cephas (Aramaic for "rock"), rendered in Greek as Petros. He stood always at the head of the Twelve and was present at key events of the Gospel. Paul, born Saul of Tarsus, was a learned Pharisee and former persecutor of the Church who, after a dramatic conversion on the road to Damascus, became the great missionary to the Gentile world.
  - Their common feast on June 29 is one of the most ancient in the Church, kept at Rome as early as the third or fourth century, and in the Eastern Orthodox tradition it ranks among the great feasts and closes the Apostles' Fast.
patronage:
  - The chief apostles, venerated together as leaders of the apostolic college
  - Apostle to the Gentiles / mission to the nations (Paul)
  - Confession of Christ's divinity (Peter)
sections:
  - heading: Saint Peter
    body:
      - Peter was born around 1 BC as Simon (Shimon bar Yonah), son of Jonah or John, in Bethsaida on Lake Genesareth, and later settled in Capernaum. He was a Jewish fisherman who worked alongside his brother Andrew and the brothers James and John, the sons of Zebedee. He was married, as is shown by the Gospel account of Jesus healing his mother-in-law at his home in Capernaum.
      - When Jesus first encountered Simon, He gave him the Aramaic name Cephas, meaning rock or stone, which in Greek became Petros; the name was later formalized at Caesarea Philippi. Called as one of the first disciples, Peter became the first leader of the early Church. He is always listed first among the Twelve and, with James and John, formed an inner circle present at events including the Transfiguration and the raising of Jairus' daughter.
      - After Christ's Ascension Peter led the Jerusalem community, delivered the first Pentecost sermon by which thousands were converted, and performed public miracles. He traveled to Lydda, Joppa, and Caesarea; at Joppa he received a vision permitting the eating of animals previously held unclean, which opened the way to evangelizing the Gentiles. His First Epistle was, by tradition, written from Rome.
      - Most scholars accept that Peter was martyred in Rome during the reign of Nero, likely between AD 64 and 68. Tradition, recorded in the apocryphal Acts of Peter, holds that he was crucified upside down at Vatican Hill, having requested this form of death as unworthy to die in the same manner as his Lord. Origen recorded that "Peter was crucified at Rome with his head downwards, as he himself had desired to suffer."
  - heading: Saint Paul
    body:
      - Paul was born Saul of Tarsus around AD 5 in Tarsus, in the Roman province of Cilicia (in modern-day Turkey). He came from a devout Jewish family of Pharisaic tradition belonging to the tribe of Benjamin, and he held Roman citizenship through his father. Trained as a tentmaker, he studied in Jerusalem under the teacher Gamaliel.
      - Before his conversion Saul actively persecuted the early Christian communities and took part in the death of the protomartyr Stephen. Around AD 35, while traveling to Damascus to persecute Christians, he experienced a transformative encounter with the risen Christ that turned the persecutor into an apostle.
      - "Paul undertook three major missionary journeys across Asia Minor and Europe from roughly the mid-40s to the mid-50s AD, traveling many thousands of kilometres by land: the first through Cyprus, Galatia, and Pamphylia with Barnabas; the second through Macedonia, Athens, and Corinth; and the third based at Ephesus. At the Council of Jerusalem (AD 49) he met with Peter, James, and John concerning the reception of Gentile converts."
      - Arrested in Jerusalem around AD 57, Paul was held at Caesarea under the governor Felix for about two years, then appealed to Caesar and was sent to Rome. Ancient tradition places his execution near Rome at Aquae Salviae (now Tre Fontane), about two miles from the basilica that bears his name, toward the end of Nero's reign, around AD 67.
  - heading: The Feast and the Apostles' Fast
    body:
      - The chief feast of Saints Peter and Paul was kept at Rome on June 29 as early as the third or fourth century. The date commemorates either the martyrdom of the two apostles in Rome or the translation of their relics. In Julian-calendar churches, June 29 Old Style corresponds to July 12 on the Gregorian calendar.
      - Though not numbered among the twelve greatest feasts, in the Eastern Orthodox tradition the feast ranks as one of the additional great feasts and is often celebrated with an all-night vigil beginning the evening before. The Orthodox Church in America commemorates the apostles on this day as the "Holy Glorious and All-Praised Leaders of the Apostles, Peter and Paul."
      - The feast marks the end of the Apostles' Fast, a moveable observance in the Byzantine tradition. The fast begins on the second Monday after Pentecost (the day after All Saints' Sunday) and continues until June 29. Its length varies considerably with the date of Pascha, lasting anywhere from as few as eight days to as many as forty-two; depending on the calendar in use, in some years on the Revised Julian calendar it may not occur at all, though it is always observed by those keeping the traditional Julian calendar.
  - heading: Relics & Shrines
    body:
      - Tradition locates Peter's burial at Vatican Hill, where Constantine erected a basilica over his grave; this was later replaced by the present Basilica of Saint Peter. In 1950 human bones were discovered beneath the altar, and forensic examination in the 1960s identified them as belonging to a first-century male of about 61 years. In 1968 Pope Paul VI announced that these were "most likely" Peter's relics, and in 2019 Pope Francis transferred nine bone fragments to Ecumenical Patriarch Bartholomew of Constantinople.
      - Paul's remains are believed to rest in the Basilica of Saint Paul Outside the Walls in Rome, near the site of his martyrdom at Aquae Salviae.
