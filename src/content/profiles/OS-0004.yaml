    body: Simon (Shimon bar Yonah) is born in Bethsaida on Lake Genesareth, a Jewish fisherman, son of Jonah or John.
  - when: c. AD 5
    title: Birth of Paul
    body: Saul is born in Tarsus, Cilicia, to a devout Jewish family of the tribe of Benjamin holding Roman citizenship.
  - when: c. AD 35
    title: Conversion of Paul
    body: While traveling to Damascus to persecute Christians, Saul encounters the risen Christ and is transformed from persecutor to apostle.
  - when: AD 45–57
