id: OS-2290
lifespan: c. 1336/1337 – December 1371
overview:
  - Saint Stephen Urosh (Stefan Uroš V) was the last ruler of the Nemanjić dynasty of medieval Serbia, remembered by the Serbian Orthodox Church as a right-believing king who kept his piety through a period of political decline and turmoil.
  - Born about 1336–1337, he was the sole son of Emperor Stefan Dušan and Helena of Bulgaria. Given the title of King in 1346 when his father assumed the imperial dignity, he succeeded as sole ruler on his father's death in 1355 at roughly nineteen years of age.
  - His reign saw the unity of the Serbian Empire dissolve amid the rising power of regional noblemen. He died childless in December 1371, an event that marked the effective end of the Serbian Empire as a unified state. He was canonized by the Serbian Orthodox Church some two centuries later, around 1582.
liturgicalTitle: The Holy and Right-believing King Stephen Urosh of Serbia
patronage:
  - Serbia
  - Rulers
