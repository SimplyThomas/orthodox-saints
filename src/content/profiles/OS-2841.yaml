id: OS-2841
lifespan: c. 327 – 398
overview:
  - Marcellina of Rome was a consecrated virgin of the fourth century, the elder sister of Ambrose of Milan and of Satyrus, and a formative figure in her family's celebrated devotion to Christian virginity. Born about 327 in Trier in Gaul into a prominent Roman Christian family, she received the veil of a consecrated virgin from Pope Liberius and lived a life of asceticism, fasting, and prayer.
  - After the death of her father, the praetorian prefect of Gaul, the family relocated to Rome, where Marcellina took a leading role in raising her younger brothers and in shaping the household's religious life. Her example instilled in Ambrose a lifelong love of virginity, and when he became Bishop of Milan he dedicated to her his three-volume treatise on virginity. She died in 398, one year after Ambrose, and was buried in the crypt of the Ambrosian Basilica in Milan.
liturgicalTitle: Our Venerable Mother Marcellina of Rome
patronage:
  - Consecrated virgins
  - Religious sisters
