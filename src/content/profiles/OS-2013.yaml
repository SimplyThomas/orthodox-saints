    title: Life in Thessalonica
    body: Florentius lived as a fervent Christian in Thessalonica, opposing pagan worship and bringing many to faith in Christ.
  - when: 1st–2nd centuries (traditional)
    title: Martyrdom by fire
    body: After enduring severe torments for his Christian witness, he was put to death by being burned alive.
