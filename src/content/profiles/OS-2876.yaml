id: OS-2876
lifespan: 3rd century
liturgicalTitle: Our Father among the Saints Athenodorus, Bishop of Pontus
overview:
  - Saint Athenodorus of Pontus was a third-century bishop and the brother of Saint Gregory the Wonderworker (Gregory Thaumaturgus), alongside whom he studied under the theologian Origen at Caesarea in Palestine.
  - Following several years of instruction under Origen, both brothers returned to their native Pontus, where each was consecrated a bishop while still young. Athenodorus is remembered as one of the leading episcopal voices of the mid-third-century church, taking part in the councils at Antioch convened against the teaching of Paul of Samosata.
  - The independent historical record for Athenodorus is limited, and much of what is known survives through the writings of Eusebius of Caesarea and the works of his more famous brother Gregory.
sections:
  - heading: Studies under Origen at Caesarea
    body:
      - According to the Panegyric that Gregory the Wonderworker addressed to Origen, Athenodorus and his brother had originally intended to study Roman law at Berytus (modern Beirut), then one of the most renowned schools of the Hellenic world. Their course was changed when they accompanied their sister to Caesarea in Palestine, where she was rejoining her husband, a legal expert who had been summoned by the governor of Palestine.
      - At Caesarea the brothers encountered Origen, who persuaded them to abandon their legal plans and remain as his students. Eusebius records that Origen, finding them deeply interested in Greek and Roman learning, infused into them a love of philosophy and led them to exchange their earlier studies for the pursuit of divinity.
      - "Gregory's account, which consistently uses the first-person plural, indicates that Athenodorus shared the full curriculum: logic, natural philosophy, geometry, astronomy, and ethics, before advancing to theology. Their period of study under Origen is generally placed around 231 to 238, a span of roughly five to seven years. A surviving letter of Origen refers to the departure of the two brothers, testifying to the close bond he maintained with both."
  - heading: Episcopate in Pontus
    body:
      - After completing his studies, Athenodorus returned with Gregory to their native Pontus. Eusebius states that, though still young, both brothers were honored with a bishopric in the churches of Pontus. Writing of the reign of the emperor Gallienus (260 to 268), Eusebius notes that Gregory and Athenodorus, friends of Origen, were presiding over the churches in Pontus, confirming that the two held active episcopal sees there at the same time.
  - heading: The councils against Paul of Samosata
    body:
      - Eusebius names the brothers Gregory and Athenodorus, pastors of the churches in Pontus, among the most eminent bishops who assembled at Antioch to address the teaching of Paul of Samosata, who held that Christ was merely a common man rather than divine. This synodal assembly took place in the 260s and establishes Athenodorus as one of the leading episcopal figures of the mid-third-century church.
      - Beyond his participation in these councils, the historical sources preserve little further independent detail about Athenodorus, consistent with the limited record that survives for him apart from his brother Gregory.
timeline:
  - when: c. 231–238
    title: Study under Origen at Caesarea
    body: Athenodorus and his brother Gregory, having set out to study Roman law at Berytus, are diverted to Caesarea in Palestine, where they become students of Origen and are turned from law toward philosophy and theology.
  - when: c. 238
    title: Return to Pontus and consecration as bishop
    body: After completing their studies, both brothers return to their native Pontus, where each is consecrated a bishop while still young.
  - when: 260–268
    title: Presiding over the churches of Pontus
    body: During the reign of Gallienus, Eusebius records Gregory and Athenodorus, friends of Origen, presiding over the churches in Pontus at the same time.
  - when: 260s
    title: Councils at Antioch against Paul of Samosata
    body: Athenodorus is numbered among the most eminent bishops who assemble at Antioch to address the teaching of Paul of Samosata, who denied the divinity of Christ.
