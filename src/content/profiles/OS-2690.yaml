id: OS-2690
lifespan: Reposed c. 462
liturgicalTitle: Our Venerable Father Mamertinus, Abbot of Auxerre
overview:
  - Mamertinus of Auxerre (known in French as Saint Mamert) was a fifth-century monk and abbot in the region of present-day Burgundy, France. According to the received tradition, he was converted through the ministry of Saint Germanus of Auxerre, bishop of that city from 418 to 448, and entered monastic life at the Abbey of Saints Cosmas and Damian on the banks of the Yonne River, a house that Germanus had built.
  - Mamertinus later assumed the leadership of that community as its abbot, and he reposed around the year 462. His life is documented only in brief notices, and little is known of his origins; he is remembered chiefly as a link in the early monastic tradition of Auxerre, standing between his spiritual father Germanus and his own disciple Marcian, for whom the monastery was eventually renamed.
sections:
  - heading: The Monastic Community of Auxerre
    body:
      - Saint Germanus of Auxerre, bishop from 418 to 448, established a large monastery dedicated to Saints Cosmas and Damian on the banks of the Yonne River, to which he would withdraw in his free moments. Mamertinus became a monk of this house following his conversion by Germanus, and in time succeeded to its leadership as abbot.
      - Mamertinus stands within a chain of spiritual mentorship in the early monastic life of Auxerre. Among his own monks was Saint Marcian of Auxerre, with whom the community became associated after Marcian's death; the monastery, originally named for Saints Cosmas and Damian, eventually came to be known as the monastery of Saint Marcian. These overlapping connections and hagiographies illustrate the transmission of monastic life across successive generations at Auxerre.
  - heading: Commemoration
    body:
      - Mamertinus is commemorated on March 30. His feast was subsequently transferred to April 20 to coincide with a combined commemoration of four saints of Auxerre — Amator, Germanus, Mamertinus, and Marcian.
      - As a pre-schism Western saint, his veneration rests on ancient received tradition rather than any documented act of glorification. The surviving sources agree on the essential facts of his life while preserving no details of his birth, relics, or shrine.
  - heading: Iconography
    body:
      - In artistic depictions Mamertinus is shown exhorting his monks, and lying on a mat in his cell before his death.
timeline:
  - when: 418–448
    title: Germanus bishop of Auxerre
    body: Saint Germanus serves as bishop of Auxerre and builds the monastery of Saints Cosmas and Damian on the banks of the Yonne River.
  - when: 5th century
    title: Conversion and monastic profession
    body: Mamertinus is converted through Saint Germanus and becomes a monk at the Abbey of Saints Cosmas and Damian in Auxerre, later assuming leadership of the house as its abbot.
  - when: c. 462
    title: Repose
    body: Mamertinus reposes at Auxerre. His feast is kept on March 30, later transferred to April 20 for a joint commemoration of the saints of Auxerre.
