flagReasons:
  - claim: The profile claims Agathodorus voluntarily followed Carpus and Papylus. The Wikipedia source identifies Agathodorus as the consul's servant, not a voluntary confessor who followed independently.
    detail: The Wikipedia source states 'the consul had his servant Agathodorus scourged to death with bull's sinews to pressure the martyrs' — Agathodorus is described as the governor's servant who was killed to coerce the martyrs, not as an independent voluntary confessor. The OCA source portrays Agathodorus as voluntarily following. The profile presents the voluntary-follower framing as the narrative (in the overview and timeline) without flagging this fundamental divergence about Agathodorus's identity and the nature of his death. This is a claim the profile makes as established fact in the overview section, not as a contested variant.
