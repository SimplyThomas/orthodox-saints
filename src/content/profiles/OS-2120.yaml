influence:
  heading: Influence in America
  intro: "Twelve years of missionary labor in Chicago left St. John a landmark cathedral and a living patronage among the Orthodox of the American Midwest."
  places:
    - name: "Holy Trinity Orthodox Cathedral"
      kind: Cathedral
      place: "Chicago, Illinois"
      note: "Fr. John managed the construction of this church, engaging the celebrated architect Louis Sullivan to design it; finished in 1903 and consecrated by Bishop Tikhon, it is listed on the National Register of Historic Places and is a designated Chicago Landmark."
    - name: "St. John of Chicago Orthodox Church"
      kind: Church
      place: "Rogers, Arkansas"
      note: "An OCA parish dedicated to St. John Kochurov, one of the churches in America that have taken the hieromartyr of Chicago as their heavenly patron."
    - name: "St. John Kochurov Society"
      kind: Society
      place: "Chicago, Illinois"
      note: "The stewardship order of the ROCOR Diocese of Chicago and Mid-America, founded in 2009 under his heavenly patronage to strengthen the common life and ministry of the diocese where he once served."
