id: OS-2279
liturgicalTitle: The Holy Right-Believing King Vakhtang Gorgasali of Georgia
lifespan: 5th-early 6th century (traditionally died 502; scholarly estimates of his death range from c. 502 to c. 527)
overview:
  - Vakhtang I Gorgasali was a king of Kartli (Iberia), the kingdom of eastern Georgia, who ruled in the second half of the fifth century and into the early sixth. He is remembered as a defender and consolidator of Christian Georgia at a time when the kingdom was pressed between the Sassanid Persian empire to the south and the Ossetians to the north, with the Byzantine empire also active in the Caucasus. Tradition credits him with strengthening the organization of the Georgian Church, building fortresses, monasteries, and churches, and laying the foundations of Tbilisi, which became the Georgian capital. The Georgian Orthodox Church venerates him as a holy and right-believing king, commemorating him on November 30 (December 13 on the civil calendar).
timeline:
  - when: 5th century
    title: Ascends the throne of Kartli
    body: According to the OCA synaxarion Vakhtang came to the throne of Kartli at the age of fifteen, at a time when the kingdom was repeatedly invaded by the Persians from the south and the Ossetians from the north. Scholars date the beginning of his reign variously, with estimates ranging from the late 440s to the 470s.
  - when: c. age 16
    title: Campaign against the Ossetians
    body: As a youth, said to be about sixteen, Vakhtang led a retaliatory war against the Ossetians. Tradition holds that he won a single combat against the enemy's champion and freed his sister Mirandukht from captivity.
  - when: c. 482-484
    title: Confrontation with Sassanid Persia
    body: Around 482 Vakhtang put to death his most influential vassal and placed himself in open confrontation with his Iranian (Sassanid Persian) suzerain. His forces were routed, and Iberia was ravaged by Iranian punitive expeditions in 483 and 484.
  - when: during his reign
    title: Reorganization of the Georgian Church
    body: Tradition records that during Vakhtang's reign the Georgian Church was first recognized as autocephalous. He obtained recognition from Constantinople for elevating the head of the Iberian church to the rank of catholicos; the patriarch of Constantinople is said to have consecrated twelve bishops chosen by Vakhtang and to have enthroned Petre as the first Catholicos of Georgia.
  - when: during his reign
    title: Founding of Tbilisi and building works
    body: Vakhtang established a royal residence at Ujarma and laid the foundations of Tbilisi, the future capital. Tradition explains the city's name from the warm springs at the site. He is also credited with building numerous fortresses, monasteries, and churches throughout the kingdom.
  - when: 502 (traditional)
    title: Death in battle with the Persians
    body: According to the traditional account, in 502 the sixty-year-old king was defending his country for the last time and was fatally wounded in battle with the Persians, an arrow piercing a gap in his armor beneath the arm. Some scholars place his death later, at c. 522 or c. 527.
sections:
  - heading: Name and epithet
    body:
      - Vakhtang is universally known by the epithet 'Gorgasali'. The Georgian and Orthodox tradition explains it from his military helmet, on the brow of which was depicted a wolf and on the back a lion; on seeing it the Persians are said to have cried out 'Beware of the wolf's head!' (rendered 'Dar' az gurgsar!'), and this became the source of his appellation. Scholars more often connect the name to an Iranian form meaning 'wolf-bodied'.
  - heading: Defender of Christian Georgia
    body:
      - Vakhtang's reign fell in a period when Kartli was caught between the Sassanid Persian empire and the peoples to its north. He waged war against the Ossetians as a young man, secured alliances with Caucasian tribes, and is credited with freeing western Georgia from Byzantine control. His open break with his Persian overlord around 482 provoked devastating Iranian reprisals against Iberia, and he is remembered as having died in arms defending his Christian kingdom against Persia.
  - heading: Marriage and ties with Byzantium
    body:
      - Vakhtang married Helen (Elene), described in the sources as a Byzantine princess and a putative daughter of the emperor Zeno. His relations with Constantinople were closely bound up with the reorganization of the Georgian Church, for which he sought and received recognition from the Byzantine capital.
  - heading: Veneration
    body:
      - The Georgian Orthodox Church venerates Vakhtang as a holy and right-believing king. His feast is kept on November 30 (December 13 on the civil calendar). He remains one of the most celebrated figures of Georgian national and ecclesiastical memory, associated above all with the founding of Tbilisi and the strengthening of the Georgian Church.
companions:
  - name: St. Peter, first Catholicos of Georgia
    note: The chief hierarch he installed; Peter accompanied him on his final campaign against the Persians and heard his dying confession. Commemorated the same day.
    href: saint/OS-2280
  - name: St. Samuel, second Catholicos of Georgia
    note: Among the hierarchs who came to establish the Georgian catholicate during his reign; second to hold the office.
    href: saint/OS-2281
family:
  figures:
    - name: Helen (Elene)
      note: His wife, described in the sources as a Byzantine princess and putative daughter of the emperor Zeno.
