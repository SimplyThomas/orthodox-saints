id: OS-1221
liturgicalTitle: The Holy Martyr Basiliscus, Bishop of Comana
lifespan: died c. 308
overview:
  - >-
    Basiliscus was a martyr of the early fourth century, by tradition a nephew of the
    Great Martyr Theodore the Recruit (Theodore Tyro). He suffered during the
    persecution of the emperor Maximian Galerius (305-311) and was put to death near
    Comana in Pontus, where a church was later raised over his relics. His principal
    commemoration falls on May 22.
  - >-
    He had earlier confessed Christ together with his kinsmen Eutropius and Cleonicus;
    his brothers were martyred, while Basiliscus was kept in prison at Comana. He is
    also named in their group commemoration on March 3. By tradition Comana is the
    place where Saint John Chrysostom later reposed, in the church dedicated to
    Basiliscus.
timeline:
  - when: c. 305-308
    title: Confession with Eutropius and Cleonicus
    body: >-
      Basiliscus confessed Christ together with the martyrs Eutropius and Cleonicus
      during the persecution of Maximian Galerius; his companions were put to death
      while he was held in prison at Comana.
  - when: c. 308
    title: Vision and arrest
    body: >-
      The synaxarion relates that the Lord appeared to Basiliscus and foretold his
      martyric death at Comana. When the governor Agrippa learned the saint had gone
      to visit relatives, he sent soldiers in pursuit.
  - when: c. 308
    title: Martyrdom near Comana
    body: >-
      Shod, the account says, in metal sandals with nails driven into the soles and
      bound with heavy chains, Basiliscus was beheaded by order of Agrippa and his
      body cast into the river near Comana in Pontus.
sections:
  - heading: Kinsman of Theodore the Recruit
    body:
      - >-
        The tradition names Basiliscus a nephew of the Great Martyr Theodore Tyro and
        a companion of the martyrs Eutropius and Cleonicus, whose feast he shares on
        March 3. After his companions were crucified, Basiliscus was imprisoned at
        Comana during the persecution of Maximian Galerius, while the governor Agrippa
        carried on a persecution centered at Amasea.
  - heading: Martyrdom and the church over his relics
    body:
      - >-
        The synaxarion recounts that, taken under guard toward Comana, Basiliscus was
        bound to a tree, and that an earthquake opened the ground and a spring of
        water came forth; he was at last beheaded by Agrippa's order and his body
        thrown into the river. A church was afterward built in his honor on the spot
        and his relics translated into it, where, the account relates, healings began
        to occur.
      - >-
        By a widely received tradition, this church near Comana in Pontus is where
        Saint John Chrysostom died in exile in 407, and the martyr is said to have
        appeared to him shortly before his repose. The Greek tradition keeps a second
        commemoration of Basiliscus on July 30.
