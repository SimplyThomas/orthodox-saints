sections:
  - heading: Martyrdom
    body:
      - The accounts agree that George served in Diocletian's personal guard at Nicomedia and that, when the emperor turned to persecuting Christians in 303, George refused to comply and publicly confessed his faith. By one tradition he declared before the Senate, "I am a servant of Christ, my God."
      - The hagiographic tradition relates that he was subjected to extreme tortures before his death and that his steadfastness moved others to faith; among those said to have been converted by his witness were the empress Alexandra and a pagan priest named Athanasius, with Alexandra herself accepting martyrdom. By tradition George was beheaded on 23 April 303, by some accounts before the defensive wall of Nicomedia. His body was returned to Lydda for burial.
  - heading: Relics & Shrines
    body:
      - By tradition the relics of Saint George rest at Lydda (Diospolis), the modern Lod in Israel, where his mother's family lived and where his body was brought after his martyrdom. A church there has long been associated with his tomb and with miraculous healings; a new church was erected on the site in 1872. The translation of the relics and the dedication of the church are kept on 3 November.
      - "Veneration at Lydda is documented from an early date: the pilgrimage account known as the De Situ Terrae Sanctae of Theodosius (c. 518–530) attests devotion at the site. Major shrines connected with the saint later arose at Damascus, Cairo, and across the Kerala region of India."
  - heading: Veneration & Legacy
    body:
      - George's cult spread from Syria Palaestina throughout the Byzantine Empire by the fifth century and reached Western Europe by 494, when Pope Gelasius I recognized him. The centre of his veneration shifted from Diospolis toward Cappadocia by the sixth century.
      - "Devotion to George was carried into the Slavic world: Prince Yaroslav the Wise of Rus' promoted his veneration, founding monasteries and churches in his honour, and the coat of arms of Moscow depicts George slaying the serpent. The red-on-white Cross of Saint George became associated with him from the twelfth century, used first by Genoa and later adopted by England."
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: Early pilgrimage and liturgical evidence record veneration of George at Lydda from the sixth century onward, and his feast and the translation of his relics were established commemorations across the Byzantine world."
      - "Traditional Accounts: The famous dragon-slaying narrative belongs to the later hagiographic tradition rather than to the historical record. Its earliest documented form appears in an eleventh-century Georgian source and reached Latin Europe in the twelfth century; the legend tells of George delivering a city from a dragon that demanded human sacrifice and converting its people, and it became widely known through William Caxton's fifteenth-century English translation of the Golden Legend. A related Eastern tradition places his deliverance of a city from a serpent near Beirut."
      - "Traditional Accounts: In the country of Georgia, where devotion to the saint reaches back to the fourth century, legend holds that after his martyrdom his body was divided into 365 pieces scattered throughout the land, and that 365 churches bear his name, one for each day of the year."
