id: OS-0012
lifespan: c. 270s – 303 (martyred April 23)
overview:
  - George, called the Great Martyr and Trophy-bearer, was a Roman soldier of Cappadocian origin who was put to death around 303 during the persecutions of the emperor Diocletian, most probably at Lydda (Diospolis) in Palestine. By tradition he was born to a devout Christian family; his father was martyred during his childhood, and his mother, who held lands in Palestine, raised him there in strict piety.
  - Entering the Roman army, he distinguished himself for bravery and rose to the rank of military commander (comites) under Diocletian. The synaxarion relates that he distributed his wealth to the poor and freed his servants before declaring himself a Christian before the emperor and Senate, after which he was tortured and executed at about thirty years of age.
  - His title of Great Martyr (megalomartyr) was given in the Eastern Orthodox tradition. He is commemorated on April 23 and, in Georgian usage, on November 10. He is best known in later iconography and legend as the dragon-slayer, though that narrative does not belong to the earliest accounts of his life.
sections:
  - heading: Life and Martyrdom
    body:
      - By tradition George was born in Cappadocia to a devout Christian family. His father was martyred when George was a child, and his mother, who owned lands in Palestine, brought him there and raised him in strict piety.
      - "He entered the Roman army and distinguished himself for his bravery, earning appointment as a military commander (comites) under Diocletian. According to the synaxarion he distributed his wealth to the poor and freed his servants, then presented himself before the emperor and Senate, declaring: 'I am a servant of Christ, my God, and trusting in Him, I have come among you voluntarily, to bear witness concerning the Truth.'"
      - The accounts relate that he endured a series of tortures, including imprisonment under heavy stones, a spiked wheel from which he was delivered, iron sandals fitted with red-hot nails, beatings with ox-thongs, and attempts to poison him. He was executed on April 23, 303, at about thirty years of age.
  - heading: Historicity and the Development of the Legend
    body:
      - George's veneration is documented from the fifth century, and he was canonized by Pope Gelasius I in 494. The oldest surviving tradition is a Coptic manuscript from Qasr Ibrim, dated to between 350 and 500, which describes George as born during the reign of Aurelian (270–275) to Cappadocian parents and secretly baptized by his Christian mother.
      - The dragon narrative is absent from the earliest hagiographies. It first appears in the eleventh century in Georgian sources and reached Latin Europe by the twelfth century through Jacobus de Voragine's Golden Legend.
      - Scholars have noted that the dragon tale may draw on pre-Christian mythology, with parallels to Apollo slaying the Python, Heracles defeating the Hydra, Bellerophon killing the Chimera, and the Perseus and Andromeda myth. It has been suggested that the Perseus mythology migrated to Lydda, where 'Perseus became George' through Christian reinterpretation. The legendary elements—the elaborate tortures, resurrections, and miracles—developed over centuries across Greek, Latin, Syriac, and Persian traditions.
  - heading: Legacy and Veneration in Russia
    body:
      - George's veneration spread widely in the Slavic world. Prince Yaroslav the Wise, baptized with the name George, advanced his veneration by building the city of Yuriev, founding the Yuriev monastery at Novgorod, and constructing a church dedicated to George in Kiev. The consecration of that church on November 26, 1051, became known as 'Yuriev Day,' celebrated as the autumn Feast of Saint George.
      - Yurii Dolgoruky, the founder of Moscow, built numerous churches honoring the saint. The image of George slaying the serpent became the coat of arms of Moscow and an emblem of the Russian state, strengthening ties with other Christian nations, particularly Georgia. The Georgian commemoration of his martyrdom falls on November 10.
