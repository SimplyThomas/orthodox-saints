id: OS-0012
lifespan: c. late 3rd century – April 23, 303
liturgicalTitle: The Holy, Glorious Great Martyr George the Trophy-bearer
overview:
  - George the Trophy-bearer was a Roman military officer of the late third century who was martyred under the Emperor Diocletian for publicly confessing Christ and refusing to renounce his faith. By tradition he was born in Cappadocia, in Asia Minor, to a Christian father from Cappadocia and a Christian mother from Lydda in Palestine; his father is said to have died a martyr during George's childhood, after which his mother returned to Palestine.
  - Entering Roman military service, George rose to the ranks of tribune and count (comites) by his late twenties and served in Diocletian's personal guard at Nicomedia. When the emperor issued his persecution edicts against Christians around 303, George distributed his wealth to the poor and openly declared his Christian faith before the imperial senate. After enduring a series of severe tortures, he was beheaded on April 23, 303, before the defensive wall of Nicomedia, and his body was returned to Lydda for burial.
  - One of the most beloved of the military martyrs, George is honored with the titles Trophy-Bearer, Victory-Bearer, and Wonderworker. He is the dragon-slayer of later icon and legend, though that narrative is absent from the earliest accounts of his life. He is venerated across the Orthodox world and far beyond, and stands as patron of numerous nations and cities.
