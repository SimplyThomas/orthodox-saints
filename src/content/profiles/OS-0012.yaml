id: OS-0012
lifespan: c. 270/275 – 303
overview:
  - George, called the Trophy-bearer, was a Roman officer martyred under the emperor Diocletian and one of the most widely venerated of the early military martyrs. By tradition he was born in the late third century, likely between about 270 and 275, into a devout Christian family; a Coptic manuscript found at Qasr Ibrim in 1964 names his father Gerontius as a Cappadocian and his mother Polychronia as a native of Lydda in Palestine.
  - His father died as a martyr during George's childhood, after which his mother returned with the boy to her native Lydda. George entered the Roman army and rose quickly, attaining the rank of tribune and the title of count (comes) and serving in Diocletian's personal guard at Nicomedia. When the persecution intensified in 303 he publicly confessed his faith and refused to renounce Christ; he was beheaded, by tradition on 23 April 303, and his body was returned to Lydda for burial.
  - Though later legend made him the dragon-slayer of icon and story, the historical core of his martyrdom is well attested. The scholar Herbert Thurston judged that there is no ground for doubting the saint's historical existence, even while no confidence can be placed in the details of his alleged exploits. He is honoured in the Orthodox Church as a Great Martyr and Wonderworker.
