id: OS-2848
lifespan: Died c. 529–530 (Gallo-Roman, 6th century)
overview:
  - Caesaria the Elder was a Gallo-Roman nun and the first abbess of the convent of Saint-Jean at Arles, founded for her by her brother, Bishop Caesarius of Arles. Before assuming leadership of the community she trained at the monastic foundation of John Cassian in Marseilles.
  - Her brother composed his Regula ad Virgines (Rule for Virgins) for her community — the first monastic rule in the West written exclusively for women. Under her direction the convent became a center of prayer, charity, needlework, and the transcription of books, and by Caesarius's death the community is reported to have numbered around 200 nuns.
  - She died about 529–530 (some accounts place her death nearer 525, and Alban Butler notes the date is uncertain). She was buried in a basilica beside a tomb reserved for her brother, and was succeeded as abbess by her niece, Caesaria the Younger. She is venerated as a pre-schism Western saint, commemorated on January 12.
liturgicalTitle: Our Venerable Mother Caesaria, First Abbess of Arles
patronage:
  - Nuns
  - Monastic women
  - Arles
timeline:
  - when: Late 5th century
    title: Birth into a Gallo-Roman family
    body: Caesaria was born into a Gallo-Roman family and was the sister of Caesarius, the future bishop of Arles.
  - when: Early 6th century
    title: Formation at Marseilles
    body: Before becoming abbess she trained at the monastic foundation of John Cassian in Marseilles, receiving her formation in the ascetic life there.
  - when: c. 512
    title: First abbess of Saint-Jean, Arles
    body: She became the first abbess of the convent of Saint-Jean, established by her brother Caesarius outside the walls of Arles under her spiritual direction.
