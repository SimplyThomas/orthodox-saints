    body: Caesaria died about 529–530; the exact date is uncertain. She was buried in a basilica adjacent to a tomb reserved for her brother Caesarius.
sections:
  - heading: The Convent of Saint-Jean at Arles
    body:
      - Bishop Caesarius of Arles, consecrated in 502, established a monastery for women outside the walls of Arles after returning from exile in Bordeaux around 507–508, placing it under the spiritual direction of his sister Caesaria. Most of its inhabitants likely came from elite Gallo-Roman families.
      - The community practised permanent enclosure (claustration) from a nun's entry until her death, abstained from meat except during illness, and did not bathe during Lent. The nuns devoted themselves to prayer, care of the poor, needlework, weaving, and the transcription of books; Caesaria herself taught and supervised the copying of the Bible at the convent.
      - By Caesarius's death the community is reported to have numbered around 200 nuns. Contemporary accounts described the convent as an ark of salvation for women in troubled times, and it received papal approval and support. The house remained in operation until the French Revolution in 1789.
  - heading: The Rule for Virgins
    body:
      - Caesarius composed his Regula virginum (Regula ad Virgines, c. 512) and addressed it directly to his sister Caesaria, who presided over the convent he had founded. It is recognized as the first western monastic rule written exclusively for women.
      - The rule emphasized strict claustration — complete containment within the monastery from entry until death — together with prescribed prayer hours, restrictions on servants and fine clothing, and requirements of modesty and piety.
  - heading: Veneration and Coverage
    body:
      - Caesaria is commemorated on January 12. In this database she is remembered with the Caesarian family of Arles on that day, alongside her brother Caesarius (OS-1794).
      - No formal act of Orthodox glorification has been located; she is venerated in the Catholic Church and is commemorated in some Orthodox calendars as a pre-schism Western saint. The grounding for her life rests chiefly on the Wikipedia accounts of Caesaria the Elder, Caesarius of Arles, and the Regula virginum, supplemented by OrthodoxWiki's article on Caesarius. OrthodoxWiki has no dedicated article on Caesaria the Elder, and standard synaxaria for January 12 do not carry a separate entry for her.
