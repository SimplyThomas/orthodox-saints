    body: Leo V rules as Byzantine emperor; in 815 he initiates the second period of iconoclasm, seizing the properties of iconodules and monasteries and exiling defenders of icons such as Theodore the Stoudite.
  - when: early 9th c.
    title: Abbot of Triglia
    body: Having received monastic tonsure in his youth, Stephen becomes igumen of the monastery of Triglia in Bithynia, near Constantinople.
  - when: "815"
    title: Interrogation, torment, and imprisonment
    body: Summoned and ordered to sign a renunciation of icon veneration, Stephen refuses and denounces the emperor's impiety. He endures severe torment and is imprisoned.
  - when: c. 815
    title: Death in prison
    body: Weakened by his sufferings and by illness, Stephen dies in prison, confessing the Orthodox faith.
