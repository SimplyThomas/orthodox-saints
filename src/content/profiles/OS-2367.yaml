id: OS-2367
lifespan: 1495–1583
liturgicalTitle: Our Venerable Father Tryphon, Abbot of Pechenga, Enlightener of the Lapps
sources:
  - OCA Synaxarion (oca.org), Lives of the Saints
  - https://en.wikipedia.org/wiki/Tryphon_of_Pechenga
  - https://www.oca.org/saints/lives/2019/12/15/103552-venerable-tryphon-abbot-of-pechenga
  - https://www.johnsanidopoulos.com/2018/12/saint-tryphon-of-pechenga-and-kola-1583.html
overview:
  - Venerable Tryphon of Pechenga (1495–1583), known in the world as Metrophanes, was a Russian monastic missionary who carried Christianity to the Sami (Lapp) peoples of the Kola Peninsula in the far north of Russia. Born into a priestly family of the Novgorod region, he settled on the banks of the Pechenga River, learned the language and beliefs of the indigenous Lapps, and over decades of preaching founded the Pechenga-Trinity Monastery, which became the northernmost monastic center of the Russian Church.
  - He is commemorated as the Enlightener of the Lapps and Abbot of Pechenga, with a feast day of December 15. By tradition Russian mariners of the north invoke his protection.
timeline:
  - when: "1495"
    title: Birth
    body: Born Metrophanes (Mitrofan), the son of a priest, in the Novgorod region of Russia; sources name Torzhok as his birthplace and June 1495 as the date.
  - when: c. 1520
    title: Journey to the Kola Peninsula
    body: Resolving to preach to the pagan Laplanders, he journeyed north to the Kola Peninsula and settled on the banks of the Pechenga River, studying the language and religious beliefs of the local people.
  - when: "1532"
    title: Tonsure and founding of the monastery
    body: After a church was consecrated and converts baptized, he was tonsured a monk with the name Tryphon and established the Pechenga-Trinity Monastery, which he led.
  - when: "1556"
    title: Imperial support
    body: Tsar Ivan IV (the Terrible) helped and richly endowed the monastery; according to one account Tryphon returned that year with a new abbot, Gury, and an imperial charter granting the monastery concessions.
  - when: "1583"
    title: Repose
    body: He reposed at Pechenga on December 15, 1583, having lived among the Lapps for several decades.
  - when: "1589"
    title: Destruction of the monastery
    body: Six years after his death, the Pechenga-Trinity Monastery was destroyed by the Swedes, an event he had foretold to the brethren before his repose.
sections:
  - heading: Early Life and Vocation
    body:
      - Tryphon was born in 1495 in the Novgorod region, the son of a priest, and was raised by pious parents. Sources record that from his early years he resolved to devote his life to apostolic work and to proclaim the Gospel to the pagan Laplanders. According to the Wikipedia account he received training as a military engineer before pursuing a religious vocation.
      - By tradition he received his call while praying in the forest, prompted by a voice to go north to preach. About the year 1520 he journeyed to the wild lands of the Kola Peninsula and established himself on the banks of the Pechenga River.
  - heading: Mission to the Lapps
    body:
      - "Tryphon first acquainted himself with the language and pagan religious beliefs of the Sami (Lapp) people before beginning to preach. His early efforts were met with great mistrust: the synaxarion relates that local sorcerers incited the people against him, and he endured hardships, insults, and beatings, at times hiding in caves and living as an ascetic devoted to prayer through the night."
      - Through his meekness and kindly words, the number of those who listened to him gradually grew, and many came to believe. In 1532 the hieromonk Elias (Elijah) came to consecrate the church and baptize the converts, and it was he who tonsured Metrophanes with the monastic name Tryphon.
  - heading: The Pechenga Monastery
    body:
      - Beside the church, Tryphon established the Pechenga-Trinity Monastery, situated on the cold northern sea near the frontier of Murmansk, and served as its leader. He is also credited with founding the Church of the Annunciation in the region.
      - Tsar Ivan IV (the Terrible) supported and richly endowed the poor monastery. One account records that the monks expelled their abbot in 1548, forcing Tryphon to wander for some years collecting alms, and that in 1556 he returned with a new abbot named Gury and an imperial charter granting the monastery concessions.
  - heading: Repose and Legacy
    body:
      - Tryphon reposed on December 15, 1583, at Pechenga. Sources differ on his age at death — some give 88 and others 98 — and on how long he lived among the Lapps, variously about sixty or seventy years.
      - Before his death he foretold to the brethren the ruin of the monastery and their death by the sword. This came to pass in 1589, when the Swedes destroyed the Pechenga-Trinity Monastery; the rebuilt community was later moved to the Kola Peninsula. His relics rest at his burial place, and following a restoration of the monastery between 2009 and 2012 a new church was built over them.
patronage:
  - Enlightener of the Lapps (Sami) of the Kola Peninsula
  - Northern Russian mariners (by tradition)
