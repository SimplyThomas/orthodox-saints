    body: Made igumen of a monastery dedicated to the Great Martyr Demetrius in Prince Iziaslav's court, serving about ten years.
  - when: c. 1077–1078
    title: Consecrated Bishop of Rostov
    body: Consecrated to the see of Rostov, succeeding Saint Leontius; the sources differ between 1077 and 1078.
  - when: "1089"
    title: Consecration of the Dormition church at the Kiev Caves
    body: By tradition borne by an angel to the Lavra to take part in the consecration of the Dormition church.
