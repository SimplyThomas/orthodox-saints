celebration:
  intro: Ways to honor St Thekla, the first woman martyr.
  ideas:
    - idea: Tell the story of Thekla, who heard St Paul preach and gave her whole life to Christ, surviving fire and wild beasts (adapt the dramatic scenes for little ones).
    - idea: Play a simple listening and attentiveness game, since she was converted by listening at a window to the word of God.
    - idea: Keep a name-day for any Thekla with her icon, a candle, and a special dessert.
    - idea: Craft a small palm branch — the martyr's symbol — or a "protomartyr" bookmark as a reminder to be brave in the faith.
    - idea: Support a shelter or ministry caring for women, honoring the first woman to give everything for Christ.
