sections:
  - heading: Athonite asceticism and discipleship
    body:
      - For twenty-eight years Kallistos lived as an ascetic at the Magul (Magoula) Skete on Mount Athos, situated opposite the Monastery of Philotheou. He was a devoted follower of Saint Gregory of Sinai, whose teaching shaped his own spiritual formation.
      - He wrote an account of the life of Gregory of Sinai, preserving the memory of the elder who guided him. During this period he formed a close bond with Saint Ignatios Xanthopoulos, a native of Constantinople; the two monks were described as spiritually unified, both reaching advanced levels of contemplative prayer. Tradition relates that they experienced visions of divine uncreated light, comparable to the experience of the Apostles on Mount Tabor, with their faces appearing radiant.
  - heading: Hesychast writings and the Philokalia
    body:
      - With Ignatios Xanthopoulos, Kallistos composed the 'Directions to Hesychasts in One Hundred Chapters,' an influential treatise of the Hesychast tradition. The work was later incorporated into the Philokalia compiled by Saint Nikodemos the Hagiorite.
      - "In the Philokalia the treatise appears as 'Method and precise canon for those who choose the hesychastic and monastic life: 100 chapters,' attributed to the pair Kallistos and Ignatios Xanthopoulos. The majority of Patriarchs of Constantinople in the 14th century were monks in the Hesychast tradition, and Kallistos stood among them as both practitioner and writer."
  - heading: Patriarchate and death
    body:
      - In 1397, during the reign of Emperor Manuel II Palaiologos (1391–1425), Kallistos was appointed Ecumenical Patriarch of Constantinople. By the account of his tenure he served only about three months, succeeding Antony IV and being succeeded by Matthew I. According to one dating his patriarchate ran from 17 May 1397 to around August 1397, at a time when Constantinople was under siege by the Ottoman Sultan Bayezid I.
      - He set out for Serbia to reconcile the Serbian church, stopping at Mount Athos on the way. There Saint Maximos Kavsokalyvites prophesied that he would 'not see his flock again.' Upon reaching Serbia, Kallistos died; sources place his death after 1397.
  - heading: Identity and distinction from Callistus I
    body:
      - Kallistos II is distinct from Callistus I of Constantinople (commemorated June 20), who died in Serbia in August 1363. The two patriarchs share remarkably similar Athonite biographies — both lived some twenty-eight years near the Monastery of Philotheou, both were disciples of Gregory of Sinai, and both died in Serbia — which has caused persistent confusion in secondary sources.
      - Some accounts, including one Wikipedia article on Callistus I, credit that earlier patriarch with co-authoring the century of chapters with Ignatius Xanthopoulos; the Philokalia metadata and the OCA sources instead attribute the 'Directions to Hesychasts in One Hundred Chapters' to Kallistos II (Xanthopoulos) and Ignatios Xanthopoulos. Kallistos II bore the surname Xanthopoulos, indicating an association with the monastery of Xanthopoulos.
