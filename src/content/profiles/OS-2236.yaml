id: OS-2236
lifespan: 14th century (died after 1397)
overview:
  - Saint Kallistos II, also surnamed Xanthopoulos, was a 14th-century Athonite ascetic, Hesychast spiritual writer, and briefly Ecumenical Patriarch of Constantinople in 1397. A disciple of Saint Gregory of Sinai, he spent twenty-eight years in ascetic practice at the Magul (Magoula) Skete on Mount Athos, opposite the Monastery of Philotheou, and composed an account of the life of his spiritual elder.
  - Together with his close companion Saint Ignatios Xanthopoulos, a native of Constantinople, he authored an influential ascetical treatise known as the 'Directions to Hesychasts in One Hundred Chapters,' later incorporated into the Philokalia by Saint Nikodemos the Hagiorite. Elevated to the patriarchal throne in 1397 during the reign of Emperor Manuel II Palaiologos, he served only about three months before dying while on a mission to Serbia. His memory is celebrated on November 22.
liturgicalTitle: Our Father among the Saints Kallistos II, Patriarch of Constantinople
patronage:
  - Hesychast prayer
  - Monastics of Mount Athos
