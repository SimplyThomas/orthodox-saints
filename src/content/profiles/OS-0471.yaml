id: OS-0471
lifespan: c. 1157 – 1224 (repose date given variously as 1224 or 1273)
liturgicalTitle: Our Venerable Father Anthony of Dymsk
overview:
  - Anthony of Dymsk was a Russian monastic of the Novgorod region, a disciple of Saint Barlaam of Khutyn, who founded a monastic community on the shores of Lake Dymsk (Lake Dyma) near Tikhvin and pursued severe ascetic labors there until his repose.
  - Born around 1157 (some sources give c. 1206), he was, by tradition, moved to leave the world after hearing Christ's words on self-denial and cross-bearing read in church, and received monastic tonsure under Saint Barlaam at the Khutyn Monastery near Novgorod.
  - He is remembered in Russian tradition as the only saint of the Russian Orthodox Church said to have practiced a form of pillar-asceticism upon the waters, standing for long periods on a large stone partly submerged in Lake Dymsk. His relics were found incorrupt and became a source of veneration and reported miracles.
timeline:
  - when: c. 1157
    title: Birth near Novgorod
    body: Anthony is born around 1157 in the Novgorod region; some sources instead give a birth date of c. 1206 and place his origins in the Nizhny Novgorod / Gorodets area.
  - when: Early life
    title: Tonsure under Saint Barlaam of Khutyn
    body: After hearing Christ's words on self-denial in church, Anthony resolves to leave the world and is tonsured a monk under Saint Barlaam at the Khutyn Monastery near Novgorod.
  - when: On Barlaam's deathbed
    title: Declines the office of igumen
    body: Saint Barlaam appoints Anthony as igumen (abbot) on his deathbed. By tradition Anthony, who according to one account had traveled to Constantinople and returned on the very day Barlaam died, declined the office and departed the monastery to seek a more solitary life.
  - when: 13th century
    title: Founding of the community at Lake Dymsk
    body: Anthony establishes a monastic community on the shore of Lake Dymsk, about 15 km from Tikhvin on the outskirts of the Novgorod lands. Some sources give the founding date as 1243, citing permission granted by Alexander Nevsky; the monastery was dedicated to Saint Anthony the Great.
  - when: 1224 (or 1273)
    title: Repose
    body: Anthony reposes after years of ascetic struggle. The OCA Synaxarion gives the year as 1224 (June 24), while Russian sources give 1273; his commemoration on June 24 marks the date of his repose.
  - when: 1330 (or 1370)
    title: Uncovering of incorrupt relics
    body: His relics are discovered incorrupt and become a source of many reported miracles. The OCA gives the year as 1330 and Russian sources as 1370; January 17 commemorates the uncovering.
  - when: 1409 and 1611
    title: Relics hidden during invasions
    body: The relics are concealed during the Tatar invasion of 1409 and again during the Swedish raids of 1611.
  - when: 2001–2008
    title: Rediscovery and return of the relics
    body: The relics are rediscovered in 2001, briefly relocated to the Tikhvin monastery, and returned to the Antoniev-Dymsky Monastery in 2008.
sections:
  - heading: Monastic Life and Asceticism
    body:
      - Anthony entered monastic life under Saint Barlaam of Khutyn, one of the foremost ascetics of the Novgorod region. According to tradition, when Barlaam appointed him igumen on his deathbed, Anthony declined the office and withdrew to seek a more hermitic life, secretly leaving the monastery.
      - "He settled on the shore of Lake Dymsk, near Tikhvin, where he kept harsh ascetic labors. Russian tradition regards him as the only saint of the Russian Orthodox Church to have practiced a form of pillar-dwelling (stolpnichestvo) upon the waters: he is said to have stood for extended periods on a large stone partially submerged in the lake, exposed to the elements."
  - heading: Relics & Shrines
    body:
      - The Antoniev-Dymsky Monastery was founded on the shore of Lake Dymsk, roughly 15 km from Tikhvin, and dedicated to Saint Anthony the Great. Some sources date its founding to 1243 and connect it with permission from Prince Alexander Nevsky.
      - Anthony's relics were found incorrupt some decades after his repose (1330 per the OCA; 1370 per Russian sources) and became a focus of veneration. They were hidden during the Tatar invasion of 1409 and the Swedish raids of 1611. In modern times the relics were rediscovered in 2001, briefly moved to the Tikhvin monastery, and returned to the Antoniev-Dymsky Monastery in 2008.
  - heading: Sources and Dating
    body:
      - The sources disagree on several biographical details. The birth date is given as c. 1157 or c. 1206, and his origin as the Novgorod region or the Nizhny Novgorod / Gorodets area. The OCA Synaxarion dates his repose to 1224, while Russian Wikipedia gives 1273; the anchor record's dating of the 13th century is consistent with either. The date of the uncovering of his relics is likewise given as 1330 or 1370.
companions:
  - name: St. Barlaam of Khutyn
    note: "Teacher: tonsured Anthony at the Khutyn Monastery near Novgorod and, on his deathbed, appointed him igumen, an office Anthony declined before withdrawing to Lake Dymsk."
    href: saint/OS-1420
  - name: St. Alexander Nevsky
    note: "Princely patron (by tradition): some accounts credit Prince Alexander Nevsky with granting permission to found the Dymsk monastery (c. 1243), though the dating sits uneasily with the earlier repose date some sources give for Anthony."
    href: saint/OS-2241
