id: OS-1994
lifespan: 5th century (reposed c. 458)
overview:
  - Saint Bassian of Constantinople (known in the Greek tradition as Bassianos) was a fifth-century ascetic of Syrian origin who became the abbot of a large monastery in the imperial capital during the reign of Emperor Marcian (450-457).
  - Born in eastern Syria, he took up the ascetic life in Constantinople, where his reputation for virtue and miracles drew a community that grew to three hundred monks. Among those he received was Saint Matrona of Perge, who entered his monastery disguised as a man.
  - He lived to an advanced age, renowned throughout the city for his holiness, and reposed peacefully. He is commemorated on October 10.
patronage:
  - Monastics
  - Abbots
sections:
  - heading: Life and Monastic Foundation
    body:
      - Bassian was born in eastern Syria and came to Constantinople during the reign of the pious Emperor Marcian (450-457), where he devoted himself to the ascetic life. According to the tradition preserved by later Greek sources, his fame for virtue and wonderworking grew so great that Emperor Marcian built a church in his honor.
      - He served as igumen (abbot) of a monastery that numbered three hundred monks. He guided this community into his old age, esteemed throughout the capital for his virtuous life and numerous miracles, and at last fell asleep in the Lord peacefully.
  - heading: Saint Matrona of Perge
    body:
      - Among the monks Bassian received into his community was Saint Matrona of Perge (commemorated November 9), a young married woman from Perge in Pamphylia who had fled an abusive husband to pursue the monastic life. She presented herself at the monastery dressed as a eunuch under the name Babylos, and was received and assigned to garden work.
      - By tradition, after about three years Bassian recognized her true identity. When her husband Dometianus continued to pursue her, Bassian counseled her and directed her to a women's monastery in Emesa (modern Homs). Learning again of her circumstances, he later established a small monastery for her and other women not far from his own.
      - In recognition of her long disguise and ascetic endurance, Bassian is said to have granted these nuns the unusual privilege of wearing men's wide black leather belts and white mantles in place of the customary women's monastic garb.
  - heading: Legacy and Iconography
    body:
      - An icon of Saint Bassian is preserved in the Menologion of Basil II, the illuminated Byzantine manuscript of the late tenth century, attesting to his established place in the liturgical calendar of the Eastern Church.
      - "A commemorative liturgical verse recorded in the Greek tradition reads: 'Bassianos is absent from life below, rejoicing as he advances above.'"
