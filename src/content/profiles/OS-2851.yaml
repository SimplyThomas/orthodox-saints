id: OS-2851
lifespan: c. 615 – 17 December 693
overview:
  - Saint Begga of Andenne (c. 615–693) was a Frankish noblewoman of the Austrasian ruling house who, after her widowhood, embraced the monastic life and founded the monastery of Andenne on the river Meuse, in what is now Belgium, where she served as first abbess until her death.
  - She was the daughter of Blessed Pepin of Landen, mayor of the palace of Austrasia, and Saint Itta (also called Ida), and the elder sister of Saint Gertrude of Nivelles. Through her marriage to Ansegisel, son of Saint Arnulf of Metz, and their son Pepin of Herstal, she became an ancestress of the Carolingian dynasty.
  - A pre-schism Western saint venerated in the Orthodox calendar, she is commemorated on December 17.
liturgicalTitle: Our Venerable Mother Begga, Abbess of Andenne
timeline:
  - when: c. 615
    title: Birth
    body: Begga is born to Pepin of Landen, mayor of the palace of Austrasia, and his wife Itta, into the leading noble family of the Frankish kingdom of Austrasia.
  - when: before 679
    title: Widowhood
    body: Her husband Ansegisel, son of Arnulf of Metz, is killed in a feud by his enemy Gundewin, leaving Begga a widow.
  - when: after Ansegisel's death
    title: Pilgrimage to Rome
    body: Following her husband's death, Begga makes a pilgrimage to Rome; upon her return she takes religious vows.
  - when: c. 691–693
    title: Foundation of Andenne
    body: She has seven churches built at Andenne on the Meuse and establishes a monastic community there, serving as its abbess for the remainder of her life.
  - when: 17 December 693
    title: Repose
    body: Begga dies at Andenne at approximately 77–78 years of age and is buried in what became Saint Begga's Collegiate Church there.
sections:
  - heading: Family and Lineage
    body:
      - Begga belonged to the highest rank of Austrasian nobility. Her father, Pepin of Landen, held the office of mayor of the palace, effectively governing the kingdom on behalf of the Merovingian kings; her mother was Itta (Ida) of Nivelles. Her younger sister was Saint Gertrude of Nivelles, the noted abbess.
      - She married Ansegisel, a son of Saint Arnulf, Bishop of Metz. From this marriage came Pepin of Herstal, regarded as the founder of the Carolingian line, and, according to some accounts, a second son named Martin (Duke Martin, or Martin of Laon).
      - "Her descendants shaped the course of European history: she was grandmother to Charles Martel and great-grandmother to Charlemagne."
  - heading: Monastic Foundation and Legacy
    body:
      - After her pilgrimage to Rome and profession of vows, Begga devoted herself to religious life at Andenne on the Meuse, where she was responsible for building seven churches and gathering a monastic community. She governed this community as its first abbess until her death.
      - She is honored as the patroness of Andenne. Her cult predates the formal papal canonization process, having been recognized through the pre-Congregation tradition of the early Church.
  - heading: The Beguine Tradition
    body:
      - Some later theories attributed the origin of the medieval Beguine movement to Begga. Modern scholarship, however, increasingly favors the alternative explanation that the Beguines took their name from the priest Lambert le Bègue, under whose protection their ministry flourished, rather than from Begga herself.
