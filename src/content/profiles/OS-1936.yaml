overview:
  - Saint Melchizedek I was Catholicos-Patriarch of All Georgia in the early eleventh century, traditionally regarded as the first Georgian hierarch to bear that title. He led the Georgian Church from approximately 1010 to 1033, serving through the reigns of Kings Bagrat III, George I, and Bagrat IV.
  - Of noble origin and educated at the royal court, he strengthened the Georgian Church during a formative period of national consolidation. His most enduring work was the restoration and embellishment of Svetitskhoveli Cathedral in Mtskheta, and he secured recognition of the Georgian primate's patriarchal dignity from the Byzantine emperor and the eastern patriarchs. He was glorified by the Georgian Orthodox Church on October 17, 2002.
timeline:
  - when: c. 1010
    title: Elevated to Catholicos-Patriarch
    body: Succeeding Catholicos Simeon, Melchizedek assumed leadership of the Georgian Church, becoming by tradition the first Georgian to hold the office of Catholicos-Patriarch of All Georgia.
  - when: 1010–1029
    title: Rebuilding of Svetitskhoveli
    body: He commissioned the reconstruction of the fourth-century Svetitskhoveli Cathedral in Mtskheta, carried out in the cross-dome style by the architect Arsukidze during the reign of King George I. The project has been called the greatest construction undertaking of that century in Georgia.
  - when: during his tenure
    title: Journeys to Constantinople
    body: He traveled multiple times to Constantinople, where he met Emperor Basil II and returned with substantial gifts and resources; on these visits the eastern patriarchs formally recognized 'Catholicos-Patriarch' as the official title of the Georgian Church's head.
  - when: "1031"
    title: Tax immunity for the Church
    body: He successfully petitioned King Bagrat III to grant the Church tax immunity.
  - when: "1033"
    title: Repose
    body: Melchizedek died in 1033. His surviving testament records donations of churches, monasteries, villages, and sacred objects to Svetitskhoveli Cathedral and specifies his place of burial. He was succeeded by John V (Chrysostomus).
  - when: October 17, 2002
    title: Glorification
    body: He was glorified as a saint by the Church of Georgia; his feast is kept on October 1.
sections:
  - heading: Historical Context and Rise
    body:
      - Melchizedek came from a noble family and received his education at the royal court, by tradition as a pupil of King Bagrat III. He entered church leadership at a time when the Georgian kingdom was being unified under the Bagrationi dynasty, and his primacy overlapped the reigns of Bagrat III, George I, and Bagrat IV.
      - Succeeding Catholicos Simeon (Simeon III in some reckonings), he is remembered as the first Georgian hierarch to bear the title of Catholicos-Patriarch. His see was associated with Ani, and his authority extended over the whole of the Georgian Church.
  - heading: The Restoration of Svetitskhoveli
    body:
      - Melchizedek's signature achievement was the restoration and embellishment of Svetitskhoveli Cathedral in Mtskheta, the ancient spiritual heart of Georgia, whose original fourth-century church had suffered significant damage. The present cathedral was built between 1010 and 1029 at his commission during the reign of King George I.
      - "The design was executed by the architect Arsukidze in the cross-dome style, producing what has been described as a masterpiece of the Early and High Middle Ages; the building is now a UNESCO World Heritage Site. An inscription on the eastern facade preserves the architect's memory: 'This holy church was built by the hand of Thy wretched servant, Arsukidze.' Arsukidze did not live to see the completion of the work in 1029. Sources record that Melchizedek adorned the cathedral with gold, silver, pearls, and precious stones."
  - heading: Byzantine Recognition and Legacy
    body:
      - To fund the cathedral's restoration, Melchizedek journeyed several times to Constantinople, where he was received by Emperor Basil II and returned with substantial gifts and resources. During these visits the eastern patriarchs formally acknowledged 'Catholicos-Patriarch' as the official title of the head of the Georgian Church, confirming its patriarchal standing.
      - In 1031 he obtained from King Bagrat III a grant of tax immunity for the Church. His surviving testament documents both the patriarchal title and his benefactions, recording the donation of churches, monasteries, villages, and sacred objects to Svetitskhoveli, and it names his intended place of burial.
  - heading: Relics & Shrines
    body:
      - Melchizedek's testament specifies his burial location, and he is associated above all with Svetitskhoveli Cathedral in Mtskheta, which he restored and to which he bequeathed lands, monasteries, and holy objects.
