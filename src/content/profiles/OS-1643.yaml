  - when: November 10, 1608
    title: Ordained hieromonk
    body: A monk of the Solovki Monastery, Job was ordained as a hieromonk by Metropolitan Isidore of Novgorod.
  - when: "1614"
    title: Sent to the Mezen region
    body: Job was sent to the Mezen region, where at the confluence of the Rivers Ezeg and Vazhka into the River Mezen he built a chapel honoring the Nativity of Christ.
  - when: reign of Tsar Michael (1613–1645)
    title: Grant of lands and fishing rights
    body: After Tsar Michael granted lands together with fishing rights, Job constructed a church and monastic cells, enabling the community to live on its own rather than among lay relatives.
