id: OS-2764
lifespan: Old Testament patriarch; by tradition born c. 1600 BCE in Paddan Aram (Mesopotamia)
overview:
  - Judah (Hebrew Yehuda) was the fourth son of the Patriarch Jacob and his wife Leah, and the ancestor from whom the royal tribe of Judah takes its name. The Eastern Orthodox Church numbers him among the Holy Forefathers, the Old Testament ancestors of Christ, commemorated collectively on the Sunday before the Nativity and individually on December 14.
  - Though fourth in birth order, Judah emerged as a leader among Jacob's twelve sons. Through his son Perez he stands at the head of the genealogy that runs to King David and, according to the flesh, to Jesus Christ, making him a central figure in the messianic lineage. His name derives from the Hebrew word for praise or thanksgiving.
  - "His recorded life mingles moral failure with sincere repentance: he counseled selling his brother Joseph rather than killing him, was deceived by his daughter-in-law Tamar and then openly confessed his wrong, and later offered himself as surety for his youngest brother Benjamin. Orthodox tradition venerates him as a Righteous one who, despite his faults, repented and served as an instrument of divine providence."
sections:
  - heading: Family and Origins
    body:
      - Judah was born, by traditional reckoning around 1600 BCE in Paddan Aram, the fourth son of Jacob and Leah. His full brothers were the older Reuben, Simeon, and Levi, and the younger Issachar and Zebulun; he had one full sister, Dinah.
      - "Through Jacob's other wives he had six half-brothers: Dan and Naphtali (born to Bilhah), Gad and Asher (born to Zilpah), and Joseph and Benjamin (born to Rachel). His mother Leah named him at his birth, declaring, 'This time I will praise the LORD,' using the Hebrew word odeh, which shares the root of the name Yehuda."
      - "Judah married the daughter of a Canaanite named Shuah and had three sons: Er, Onan, and Shelah. After Er died and Onan refused to raise up offspring for his brother's widow Tamar and likewise perished, Tamar bore Judah twin sons, Perez and Zerah. It is through Perez that Judah's patrilineal descent to King David is traced."
  - heading: Role Among the Sons of Jacob
    body:
      - When his brothers, out of jealousy, cast Joseph into a pit, Judah spotted a passing caravan of Ishmaelite traders bound for Egypt and proposed that Joseph be sold to them rather than killed, sparing his life.
      - In the episode with Tamar, Judah at first prepared to have her executed when her pregnancy was discovered, but recanted and confessed when he realized he himself was the father, saying she was more righteous than he (Genesis 38:24-26). Later Jewish tradition regarded this open confession as a spiritually redemptive act.
      - Decades afterward, when Joseph, now a ruler in Egypt, tested his brothers, Judah offered himself as surety for the safety of Benjamin and pleaded for the boy's life. His advocacy moved Joseph to reveal his identity, and it demonstrated Judah's growth into a responsible leader of his family.
  - heading: Blessing and Royal Legacy
    body:
      - Jacob's deathbed blessing (Genesis 49) gives Judah particular prominence. Jacob declared that 'the sceptre shall not depart from Judah,' praised him as 'a lion's whelp,' and foretold that his brothers would bow before him, elevating him above his older siblings.
      - The genealogy from Judah to King David runs through Perez, Hezron, Ram, Amminadab, Nahshon, Salmon, Boaz, Obed, and Jesse. The New Testament genealogies in Matthew and Luke identify Jesus Christ as a descendant of David, connecting him to Judah's royal line.
      - The image of the 'Lion of the Tribe of Judah' became a messianic symbol; the Book of Revelation (5:5) applies the title to Christ, grounding Judah's patriarchal role in Christian eschatology as well as soteriology.
  - heading: The Tribe of Judah
    body:
      - The tribe descended from Judah settled the southern portion of the Land of Israel, including the Negev, the Shephelah lowlands, the hill country, and the wilderness near the Dead Sea, with major cities at Hebron and Bethlehem.
      - After the death of King Solomon around 930 BCE, the tribe remained loyal to the House of David when the northern tribes seceded, becoming the dominant tribe of the Kingdom of Judah, whose primary capital was Jerusalem. After the Babylonian exile (c. 586 BCE) the older tribal distinctions dissolved, but the name Judah (Yehudi) endured, evolving into the word 'Jew' and giving its name to the land of Judea.
  - heading: The Testament of Judah
    body:
      - The Testament of Judah, part of the Testaments of the Twelve Patriarchs, presents itself as his farewell to his sons. In it he recounts military achievements against Canaanite kings and openly confesses personal failings brought on by wine.
      - He is portrayed admonishing his descendants against coveting gold and beauty and urging them to observe the whole law. The text reflects the later tradition that read Judah's life as one of both notable leadership and candid self-accusation.
  - heading: Relics and Shrines
    body:
      - Tradition holds that Judah died in the land of Canaan, in the region later known as Yehud in present-day Israel. His tomb is variously located at al-Yahudiya (modern Yehud) or near Horvat Omrit in the Hula Valley, sites that became destinations for pilgrimage.
  - heading: Veneration
    body:
      - The Orthodox Church commemorates Judah among the Holy Forefathers, the Old Testament ancestors of Christ, on the Sunday before the Nativity, and he is also remembered individually on December 14. As one of the twelve sons of Jacob, he is venerated as a Righteous patriarch who, despite moral failures, repented sincerely and served in the preservation of the messianic lineage.
      - His veneration in the Russian Orthodox tradition is attested by an icon of about 1654 from the Church of the Resurrection in Korovniki, Yaroslavl, which depicts him as a patriarch.
timeline:
  - when: c. 1600 BCE (traditional)
    title: Birth in Paddan Aram
    body: Judah is born as the fourth son of Jacob and Leah; his mother names him for her praise of the LORD.
  - when: Youth
    title: The selling of Joseph
    body: When his brothers plot Joseph's death, Judah proposes selling him to a passing Ishmaelite caravan bound for Egypt, sparing his life.
  - when: Adulthood
    title: Marriage and sons
    body: Judah marries the daughter of Shuah the Canaanite and fathers Er, Onan, and Shelah.
  - when: Later
    title: Tamar and the twins
    body: Deceived by his daughter-in-law Tamar, Judah confesses his wrong; Tamar bears the twins Perez and Zerah, and the line of David descends through Perez.
  - when: During the famine
    title: Surety for Benjamin in Egypt
    body: Judah offers himself as surety for Benjamin and pleads for his life, prompting Joseph to reveal his identity to his brothers.
  - when: End of life
    title: Death in Canaan
    body: Judah dies in the region of Yehud in Canaan; tradition locates his tomb at al-Yahudiya or near Horvat Omrit.
  - when: c. 1654 AD
    title: Russian icon at Yaroslavl
    body: An icon depicting Judah as a patriarch is produced for the Church of the Resurrection in Korovniki, Yaroslavl, attesting his veneration.
