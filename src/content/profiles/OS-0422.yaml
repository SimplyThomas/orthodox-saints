  - Teacher and defender of the Holy Trinity and Holy Spirit
works:
  - title: Against Eunomius
    desc: A dogmatic treatise refuting the extreme Arian teaching of Eunomius.
  - title: On the Making of Man
    desc: A treatise on the creation of humanity, completing his brother Basil's unfinished work on creation.
  - title: The Great Catechism (Catechetical Oration)
    desc: A systematic exposition of Christian doctrine.
  - title: The Life of Moses
    desc: A mystical and exegetical reading of the life of Moses as a model of the soul's ascent to God.
  - title: On the Soul and the Resurrection
    desc: A dialogue on the soul and the resurrection, set as a conversation with his dying sister Macrina.
  - title: On Virginity
    desc: An ascetic treatise on the virtue and life of virginity.
