id: OS-2843
lifespan: Died c. AD 119–126
overview:
  - Saint Sabina of Rome was a noble Roman widow of the early second century who was converted to Christianity through the witness of her Syrian servant, Saint Serapia (Seraphima) of Antioch. When Serapia was denounced and put to death for the faith, Sabina buried her in her own family tomb and, shortly afterward, was herself arrested, condemned, and executed for confessing Christ.
  - She is venerated in both the Eastern Orthodox and Roman Catholic traditions. Her memory is bound to the basilica of Santa Sabina on the Aventine Hill in Rome, raised on the site of her former residence, and the Eastern commemoration keeps her feast on August 29. Historians note that the surviving accounts of her martyrdom are legendary in character and were shaped centuries after her lifetime, so many details of her story rest on tradition rather than documented record.
liturgicalTitle: The Holy Martyr Sabina of Rome
sections:
  - heading: Life and Conversion
    body:
      - According to tradition, Sabina was a wealthy Roman widow of senatorial standing; some accounts name her father as Herod Metallarius and her late husband as the senator Valentinus, and connect her origins with Avezzano in the Abruzzo region of Italy.
      - She came to Christian faith through the example of her servant Serapia, a Syrian woman from Antioch who had fled the persecution under the Emperor Hadrian and entered Sabina's household. Serapia had taken a vow of chastity and distributed her property to the poor before her service. The two women withdrew together to one of Sabina's country estates, described as near Vendina in Umbria, where they devoted themselves to prayer and works of charity.
  - heading: Martyrdom
    body:
      - During Hadrian's reign, Serapia was denounced as a Christian and refused to honor the Roman gods. After enduring torments, she was beaten with rods and beheaded by the sword on the order of a judge named in the accounts as Virilus (Berillus). Sabina, according to tradition, accompanied her teacher to her trial and, after the execution, reverently buried Serapia's body in her own family mausoleum, expecting to be laid to rest there herself.
      - Not long afterward, Sabina was in turn denounced as a Christian by the prefect Elpidius and was martyred at Rome, dying around AD 119 or 126. The martyrdom is commonly placed roughly a month after that of Serapia.
  - heading: Relics and Shrine
    body:
      - In the year 430, Sabina's relics were transferred to a basilica on the Aventine Hill in Rome, built on the site of her former residence and known as Santa Sabina. The church was originally dedicated jointly to both Sabina and her servant Serapia, reflecting the two women's shared story, and it remains a place of pilgrimage.
  - heading: Historical Note
    body:
      - Scholars observe that the Acts of Sabina's martyrdom "have no historic value," and that the legendary narratives surrounding her likely developed centuries after her actual life. The core memory preserved across the traditions is that of a Roman widow converted by her servant, whom she buried before following her into martyrdom.
