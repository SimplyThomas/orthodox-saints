lifespan: 11th century
patronage:
  - Embroiderers
  - Needle workers
  - Spinners
  - Weavers
overview:
  - Paraskevi of Serbia, also known as Petka or Paraskeva the New, was an eleventh-century ascetic born in Epivates, a village near Constantinople (modern Selimpaşa, Turkey). Born to pious and wealthy parents, she gave away her inheritance to pursue a life of prayer, fasting, and monastic asceticism.
  - Moved by the Gospel call to self-denial, she abandoned her family's wealth and lived as an ascetic in Heraclea Pontica and in the wilderness beyond the Jordan River before an angelic vision commanded her return home, where she died at the age of twenty-seven.
  - She is best known for the extraordinary journey of her incorrupt relics, which were translated across the Balkans over the centuries — from Thrace to Bulgaria, Serbia, Constantinople, and finally to Iași in Moldavia (modern Romania), where they remain a major pilgrimage site. Her name, Paraskevi, means 'Friday' in Greek.
timeline:
  - when: 11th century
    title: Birth in Epivates
    body: Paraskevi is born in the village of Epivates, situated between Silistra and Constantinople, into a pious and wealthy family. By tradition her older brother Euthymios became a monk and later a bishop.
  - when: c. age 10
    title: The Gospel call
    body: During divine services she is deeply moved by the Gospel words on self-denial (Mark 8:34, 'If any man will come after Me, let him deny himself'), and begins distributing her clothing to the needy, to her family's distress.
  - when: After her parents' death
    title: Ascetic life at Heraclea Pontica
    body: She settles at the Church of the Most Holy Theotokos in Heraclea Pontica for about five years of concentrated prayer and fasting.
  - when: Until age 25
    title: The Holy Land and the Jordan wilderness
    body: She travels to the Holy Land to venerate the sites of Christ's life, then crosses the Jordan into the desert, living ascetically until an angel commands her to return to her homeland.
  - when: c. age 27
    title: Repose at Katikratia
    body: After two years of ceaseless fasting and prayer, she dies in the village of Katikratia (Kallikrateia, in Eastern Thrace) and is buried in an unmarked grave near the sea.
  - when: c. 175 years later
    title: Discovery of the incorrupt relics
    body: Her relics are found fragrant and incorrupt after her identity is revealed in a dream. They are housed at a church of the Holy Apostles, where numerous healings are reported.
  - when: "1238"
    title: Translation to Tarnovo, Bulgaria
    body: The relics are moved to the cathedral at Veliko Tarnovo, capital of the Second Bulgarian Empire.
  - when: "1393"
    title: Translation to Belgrade, Serbia
    body: The relics are brought to the Ružica Church in Belgrade, where a spring is associated with cures for the faithful.
  - when: "1521"
    title: Translation to Constantinople
    body: After the Ottoman conquest of Belgrade, the relics are transferred to the patriarchal cathedral in Constantinople.
  - when: "1641"
    title: Translation to Iași, Moldavia
    body: Patriarch Parthenios arranges the transfer of the relics to the Moldavian prince; they are installed in the Monastery of the Three Hierarchs at Iași (Jassy).
  - when: "1888"
    title: Move to the Metropolitan Cathedral
    body: Following a fire, the relics are moved to the Metropolitan Cathedral of Iași, where they remain and draw hundreds of thousands of pilgrims each October.
sections:
  - heading: Early Life and Asceticism
    body:
      - According to her Life, Paraskevi was born in the village of Epivates, situated between Silistra and Constantinople, to a pious and wealthy family. Sources record that her older brother Euthymios entered monastic life and became a bishop.
      - At about ten years of age, while attending divine services, she was struck by the Gospel words on self-denial and began giving away her clothing to the poor, causing distress within her family. After the death of her parents, she distributed her inheritance and devoted herself to prayer and fasting at the Church of the Most Holy Theotokos in Heraclea Pontica for roughly five years.
      - She then made a pilgrimage to the Holy Land and withdrew across the Jordan River into the wilderness, living ascetically until the age of twenty-five, when an angel is said to have commanded her return to her homeland. She reposed at about twenty-seven in the village of Katikratia after two more years of fasting and prayer, and was buried in an unmarked grave near the sea.
  - heading: Relics and Shrines
    body:
      - Paraskevi's relics are renowned for their extensive travels across the Balkans. According to tradition, her identity was revealed in a dream after a sailor's body was buried atop her grave; her relics were found incorrupt and fragrant, and were enshrined at a church of the Holy Apostles, where healings were reported over roughly 175 years.
      - In 1238 the relics were translated to the cathedral at Veliko Tarnovo, capital of the Second Bulgarian Empire. In 1393 they were brought to the Ružica Church in Belgrade, Serbia. After Belgrade fell to the Ottomans in 1521, they were transferred to the patriarchal cathedral in Constantinople. In 1641 they were given to the Moldavian prince and installed in the Monastery of the Three Hierarchs at Iași (Jassy), and in 1888 they were moved to the Metropolitan Cathedral of Iași following a fire.
      - Today the shrine at the Metropolitan Cathedral of Iași draws hundreds of thousands of pilgrims each October. Other churches dedicated to her include the Church of St Paraskeva in Nesebar and the Church of St Petka of the Saddlers in Sofia (Bulgaria), and the St Petka Chapel at Kalemegdan in Belgrade (Serbia).
  - heading: Veneration and Legacy
    body:
      - Widely venerated across the Orthodox Balkans, Paraskevi is known under several names — Paraskevi, Petka, and Paraskeva the New — reflecting her devotion in the Greek, Bulgarian, Serbian, and Romanian traditions. Her veneration spread from Bulgaria into Wallachia and Moldavia during the fourteenth century.
      - She is regarded as the patroness of embroiderers, needle workers, spinners, and weavers. In 1947, her relics were carried in procession through drought-stricken counties of Moldavia. Her feast is kept on October 14.
  - heading: Hagiography
    body:
      - Numerous hagiographies attest to her enduring veneration. A Greek Life was composed by Deacon Basilikos around 1150, commissioned by Patriarch Nicholas IV Mouzelon. In the fourteenth century, Patriarch Euthymius of Tarnovo wrote a Life of Saint Petka of Tarnovo and is credited with establishing the October 14 commemoration.
      - Later accounts include those of Metropolitan Mattheos of Mira (1605), Metropolitan Varlaam of Moldavia (1643), and Bishop Melchisedec of Roman (1889).
