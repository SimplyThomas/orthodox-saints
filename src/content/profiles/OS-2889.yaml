id: OS-2889
lifespan: died 4 March 1299
overview:
  - Basil was the abbot (igumen) of the Savior-Transfiguration Mirozh Monastery at Pskov, in north-western Rus', during the thirteenth century. He is venerated as a hieromartyr for his death in the burning of his monastery during a Livonian raid on 4 March 1299.
  - He is commemorated together with Saint Joasaph, abbot of the neighbouring Snetogorsk Monastery, the two being remembered as hieromartyrs of the most ancient of the Pskov monasteries who suffered in the same assault.
liturgicalTitle: The Holy Hieromartyr Basil, Abbot of the Mirozh Monastery
sections:
  - heading: The Mirozh Monastery
    body:
      - The Savior-Transfiguration Mirozh Monastery had been founded in 1156 by Saint Niphon, Bishop of Novgorod, together with Saint Abraham of Mirozh. It stood outside the city walls of Pskov, at the point where the Mirozha River joins the left bank of the Velikaya. Basil directed this house as its abbot.
      - The monastery is renowned for its Transfiguration Cathedral, one of only two surviving pre-Mongol buildings in Pskov, celebrated for its twelfth-century frescoes. In 2019 the monastery was inscribed as part of the UNESCO World Heritage Site of the Churches of the Pskov School of Architecture.
  - heading: Martyrdom
    body:
      - On 4 March 1299 forces of the Livonian Order attacked Pskov and set fire to the undefended monasteries lying outside the city walls, among them Mirozh and Snetogorsk. In the burning of the church, Basil, the abbot Joasaph, and other monks endured an agonizing death.
      - The assault prompted Prince Dovmont-Timothy to lead a military response, defeating the invaders in a battle by the river near Pskov. Dovmont afterward funded a replacement stone church and supported the restoration of monastic life at the ruined sites. The martyrs were interred in crypts beneath their monastery churches.
