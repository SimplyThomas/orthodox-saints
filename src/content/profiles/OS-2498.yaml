    title: Abdication and tonsure
    body: After issuing two decrees in November 1372, he abdicates in favour of Alexios Angelos Philanthropenos and is tonsured a monk with the name Joasaph at the Great Meteoron.
    source: https://www.johnsanidopoulos.com/2018/04/saint-joasaph-former-king-second.html
