    title: Withdrawal to Mount Athos
    body: After the Turkish conquest of Thessaly he withdraws, by tradition to the Monastery of Vatopaidi on Mount Athos, returning to Meteora around 1401.
    source: https://pemptousia.com/2016/04/saint-joasaph-of-meteora-saints-indirectly-associated-with-the-monastery/
