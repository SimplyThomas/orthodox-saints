sections:
  - heading: Early Life and Formation
    body:
      - Jacob was born in 1802 on Atka Island, the eldest of the four surviving children — with Osip, Elena, and Antony — of Yegor Vasil'evich Netsvetov, a Russian from Tobolsk in the service of the Russian-American Company, and Maria Alekseevna, an Aleut woman of Atka. A child of both worlds of Russian America, he grew up speaking the languages of each.
      - In 1823 the family moved to Irkutsk in Siberia, where Jacob entered the theological seminary. He was tonsured sub-deacon on October 1, 1825, graduated in 1826 with certificates in history and theology, and married Anna Simeonovna, a Russian or Creole woman. Ordained deacon on October 31, 1826, he was raised to the priesthood on March 4, 1828, by Archbishop Michael of Irkutsk — the first native-born Alaskan to become an Orthodox priest. On May 1, 1828, he set out to return to the islands of his birth.
  - heading: Ministry at Atka
    body:
      - Arriving at Atka on June 15, 1829, accompanied by his wife Anna and his father, Father Jacob took charge of a parish that stretched some two thousand miles across the Aleutian Islands and the Bering Sea, including Amchitka, Attu, and the Kuril Islands. Until the Church of St. Nicholas was built, he is reported to have raised a large tent in which to celebrate the services.
      - "His pastoral labors bore early fruit: within his first six months he recorded sixteen baptisms, four hundred forty-two chrismations, fifty-three marriages, and eight funerals. He founded a parish school in which children were taught in both Russian and Unangan-Aleut, reorganized in 1841 to broad recognition."
      - These years also brought severe personal trials. His wife Anna died of illness in March 1836, his home burned in July of the same year, and his father Yegor died in 1837. Bereaved of nearly everything, he continued his ministry among his people, and within a few years his bishop, St. Innocent, had new labors in mind for him.
  - heading: Linguistic and Translation Work
    body:
      - Father Jacob devised an alphabet adequate to the Unangan-Aleut language and used it to translate the Holy Scriptures and other church texts into the speech of his people. He corresponded with St. Innocent of Alaska on matters of language, and his contributions to the recording and teaching of the native tongues were widely recognized.
      - Later, on the Yukon, he took up the same labor for a new people, working out writing for the language of the Yup'ik among whom he served. In recognition of his service he received the nabedrennik, kamilavka, and gold cross, and was in time elevated to archpriest and awarded the Order of St. Anna.
  - heading: The Kvikhpak Mission
    body:
      - On December 30, 1844, St. Innocent appointed Father Jacob head of the Kvikhpak Mission, sending him into the Alaskan interior. Headquartered in the Yup'ik village of Ikogmiute, today known as Russian Mission, he traveled for some twenty years along the Yukon and Kuskokwim rivers and as far as the Innoko, journeying hundreds of miles to reach scattered and sometimes mutually hostile communities.
      - He established the first church in the region, dedicated to the Elevation of the Holy Cross, and in the course of his labors baptized approximately 1,320 people, becoming known as the evangelist of the Yup'ik and Athabascan peoples. He was assisted by Creole co-workers, among them Innokentii Shayashnikov, Konstantin Lukin, and his own nephew Vasilii Netsvetov.
  - heading: Final Years and Repose
    body:
      - In 1863 spurious charges were brought against Father Jacob, and he was summoned to Sitka by Bishop Peter, where he was cleared of all accusations. His health had by then declined, and he remained at Sitka, spending his final months serving a Tlingit chapel there.
      - He reposed of natural causes on July 26, 1864, and was buried at Sitka near the chapel he had served, after thirty-five years of missionary priesthood.
  - heading: Glorification
    body:
      - The Orthodox Church in America published The Life of St. Jacob Netsvetov in 1994 and glorified him in October of that year at St. Innocent Cathedral in Anchorage, appointing his feast on July 26, the anniversary of his repose. He is venerated as the Enlightener of the Peoples of Alaska.
      - His glorification came in the same year the OCA glorified St. Alexis Toth, joining the first native-born Alaskan priest and the gatherer of the immigrant flock in a single year of American canonizations.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: Father Jacob kept detailed journals across his Atka and Yukon ministries, preserved and published in English translation as The Atkha Years and The Yukon Years; they remain among the most important primary sources for the history of Orthodox Alaska, recording his travels, baptisms, and daily labors in his own hand."
      - "Traditional Accounts: The account of his life relates that in 1841 a woman on Amlia Island afflicted by a demon was freed through his prayers, and that in November 1845 his preaching at Kalskag brought the village chief — himself a shaman — and his people to baptism."
