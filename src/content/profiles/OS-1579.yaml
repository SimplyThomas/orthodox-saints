id: OS-1579
liturgicalTitle: Our Righteous Father Jacob Netsvetov, Enlightener of the Peoples of Alaska
lifespan: 1802 – July 26, 1864
overview:
  - Jacob Netsvetov was a nineteenth-century priest of the Russian-American mission in Alaska, born in 1802 on Atka Island in the Aleutians to a Russian father, Yegor Vasil'evich Netsvetov of Tobolsk, who managed affairs for the Russian-American Company, and an Aleut mother, Maria Alekseevna of Atka. Of mixed Russian and indigenous heritage, he became the first native-born Alaskan ordained to the Orthodox priesthood, a circumstance that uniquely fitted him to serve the peoples among whom he had been raised.
  - After theological training at Irkutsk he returned to the Aleutians, where for fifteen years he served a parish that stretched some two thousand miles across the island chain. He devised a written alphabet for the Unangan-Aleut language, translated Scripture and church texts into the speech of his people, and founded a school where children were taught in both Russian and Aleut, corresponding all the while with St. Innocent (Veniaminov) on questions of language.
  - In 1844 St. Innocent sent him into the Alaskan interior as head of the new Kvikhpak Mission on the Yukon. For some twenty years, headquartered in the Yup'ik village of Ikogmiute, he traveled the Yukon and Kuskokwim rivers and as far as the Innoko, baptizing about 1,320 people and becoming the evangelist of the Yup'ik and Athabascan peoples. Through it all he kept detailed journals that remain a principal source for the history of Orthodox Alaska.
  - Cleared of false charges in his final years, he spent his last months serving a Tlingit chapel at Sitka, where he reposed on July 26, 1864. The Orthodox Church in America glorified him in October 1994 at St. Innocent Cathedral in Anchorage as the Enlightener of the Peoples of Alaska; his feast is kept on July 26.
