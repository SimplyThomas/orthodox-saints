influence:
  heading: Influence in America
  intro: "From the parishes of his Aleutian and Yukon mission field to new communities named for him in the Lower 48, the first American-born Orthodox priest still anchors Orthodox life in the places he served."
  places:
    - name: St. Nicholas Church
      kind: Church
      place: Atka, Alaska
      note: "The parish of St. Jacob's home island, where he arrived in 1829 as Atka's first resident priest and built the original church; an Orthodox Church in America parish continues there today."
    - name: Elevation of the Holy Cross Church
      kind: Church
      place: Russian Mission, Alaska
      note: "The Yup'ik village of Ikogmiut became the headquarters of the Kvikhpak Mission that St. Jacob led from 1845 — the village is named for the mission itself — and its Orthodox parish continues in the OCA Diocese of Alaska."
    - name: St. Jacob of Alaska Orthodox Church
      kind: Church
      place: Northfield Falls, Vermont
      note: "An Orthodox Church in America parish dedicated to St. Jacob, one of the first churches in the United States to bear his name."
    - name: St. Jacob of Alaska Orthodox Christian Church
      kind: Church
      place: Ishpeming, Michigan
      note: "A mission parish of the Russian Orthodox Church Outside of Russia in Michigan's Upper Peninsula, named for the Alaskan missionary and translator."
