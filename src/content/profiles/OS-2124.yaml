id: OS-2124
lifespan: first half of the 5th century
overview:
  - Maura of Constantinople was a fifth-century ascetic who served as a deaconess and abbess (igoumeness) in the imperial capital. According to the synaxarion, she labored in asceticism during the first half of the fifth century and founded a monastery in Constantinople, in which she also reposed.
  - The surviving record of her life is very brief, and no details of her birth, family, or death survive in accessible sources. She is remembered chiefly as a model of monastic renunciation and leadership within the early Byzantine Church.
liturgicalTitle: Our Venerable Mother Maura, Deaconess and Abbess of Constantinople
sections:
  - heading: Liturgical Veneration
    body:
      - Maura is commemorated on October 31, while in Greek usage her feast is kept on November 9.
      - "Her hymnography presents her as a pattern of monastic discipline: the troparion appointed for her (in the Eighth Tone) praises her for preserving the divine image in the human person and for taking up the Cross in imitation of Christ. It recalls her teaching to disregard the passing flesh while caring for the immortal soul, concluding that her spirit now rejoices among the angels."
timeline:
  - when: First half of the 5th century
    title: Ascetic life and monastic foundation
    body: Maura labored in asceticism at Constantinople, where she served as a deaconess and abbess and founded a monastery.
  - when: First half of the 5th century
    title: Repose
    body: She reposed at the monastery she had founded in Constantinople.
