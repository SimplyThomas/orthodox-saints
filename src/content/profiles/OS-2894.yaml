id: OS-2894
lifespan: 13th–14th century
overview:
  - Venerable Gregory the Faster was an ascetic of the Far Caves of the Kiev Caves Lavra (Kyiv Pechersk Lavra), remembered for the strictness of his fasting. He is dated to the 13th–14th century, placing him in the period following the Mongol destruction of the monastery in 1240, when the ascetic traditions of the Far Caves were maintained by individual monks whose lives went largely unchronicled.
  - 'No standalone hagiography of Gregory survives. He is known almost entirely through his commemoration alongside Saint Sisoes the Schemamonk of the Far Caves: the canon of the Far Caves fathers joins the two names in the restraint of the passions, and a preserved line of that canon reads, "Sisoes the wondrous and Gregory, a name courageous, having by fasting..." This joint mention is the sole liturgical text that names Gregory the Faster as a distinct monk of the Far Caves.'
  - He is commemorated on July 6 with Saint Sisoes, and among the Synaxis of the Fathers of the Far Caves. He is distinct from Saint Gregory the Wonderworker of the Near Caves.
sections:
  - heading: The Far Caves and Their Ascetic Tradition
    body:
      - The Far Caves were the original cave dwellings of the Kiev Caves monastery. Around 1051 Saint Anthony of Kiev settled in an old cave in a hill near the site, and this became the Far Caves; the Near Caves were established later, when Anthony relocated around 1057.
      - "Anthony set the pattern of extreme self-denial that shaped the community: by tradition he ate rye bread every other day and drank only a little water, dwelling in seclusion and solitary prayer. The monks of the Far Caves followed this template of strict fasting and cave-dwelling asceticism. Gregory the Faster, whose very epithet marks him as an exemplar of fasting, stands within that tradition."
      - The Kiev Caves Paterikon, the collection of the lives of the monastery's fathers, was composed between 1203 and 1232 under Archimandrite Akindin II and soon became popular reading throughout Eastern Europe. The anchor sources place Gregory's commemoration within the Paterikon tradition of the Far Caves, though no accessible translation preserves a detailed life for him.
