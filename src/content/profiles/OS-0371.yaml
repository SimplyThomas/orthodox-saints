liturgicalTitle: The Holy New Hieromartyr Warus (Shmarin), Bishop of Lipetsk
lifespan: 1880 – 1938
overview:
  - Warus (Shmarin) was a bishop of the Russian Orthodox Church who was martyred during the Soviet persecution of the Church. He is numbered among the Synaxis of the New Martyrs and Confessors of Russia and is commemorated on September 10.
  - According to the records that survive of him, he was born on 24 October 1880 and served as Bishop of Lipetsk. He died on 23 September 1938 at the Karaganda corrective labor camp (Karlag) in Kazakhstan, where many clergy and faithful perished in the same period. His clerical service is variously recorded, and the detailed narrative of his life is not preserved in the available English sources beyond the synaxarion notice; he is venerated as a hieromartyr.
  - His commemoration on September 10 (Old Style) corresponds to his repose on September 23 by the civil calendar. He is remembered together with the broader assembly of bishops, priests, monastics, and laypeople of the Russian Church who suffered under the Soviet regime.
