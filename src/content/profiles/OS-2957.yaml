sections:
  - heading: Why They Are Called Anargyroi
    body:
      - 'The Greek anargyros joins the negative an- to argyros, silver — a saint "without silver." The name marks not poverty but refusal: these saints could have been paid and would not be. The synaxarion tradition remembers Tryphon asking of those he healed one thing only, faith in Jesus Christ, and Panteleimon freeing his household''s slaves and spending his inherited fortune on the poor, the sick, and Christians in prison. Payment refused is the thread that gathers them.'
  - heading: Not All of Them Were Physicians
    body:
      - The company is defined liturgically rather than biographically. Its members are those invoked together with the Unmercenaries in the prayers of the Mystery of Holy Unction and the Great Sanctification of the Waters — and several of them never practiced medicine at all. Anicetus was a military official of Nicomedia and Photius his nephew; Mokios was a presbyter of Amphipolis who preached against idolatry; Hermolaus was the priest who baptized Panteleimon and taught him to heal in the name of Christ rather than by the art alone. They are Unmercenaries because the Church prays to them as such, asking healing through them freely given.
      - This is worth stating plainly, because a reader who expects every Unmercenary to have been a doctor will find several of them puzzling. The category is about mercy without price, not about a profession.
  - heading: The Roster and Its Traditions
    body:
      - The Greek enumeration of twenty (twenty-one with Photios) is the one kept at the October 17 synaxis. Other traditions honor their own unmercenaries alongside it — the Slavic churches number among them Agapitus of the Kiev Caves, the physician-monk who took nothing for his cures, and later figures still. The lists differ; the pattern does not.
