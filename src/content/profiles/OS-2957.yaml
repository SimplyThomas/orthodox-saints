id: OS-2957
status: reviewed
eyebrow: Open Synaxis · The Anargyroi
feastNote: October 17 in Greek practice · the Sunday after November 1 in Slavic practice
overview:
  - 'The Holy Unmercenaries — in Greek the Anargyroi, "those without silver" — are the saints who healed and served the suffering without accepting payment for it. Their charity was not merely free of charge but deliberately free of profit: they asked nothing of those they treated except faith in Christ, by whose grace they understood every cure to come. The Church honors them together as a company of mercy, and traditionally numbers them at twenty, or twenty-one when Saint Photios is counted among them.'
  - Foremost among them are the three pairs of brothers named Cosmas and Damian — of Asia, of Rome, and of Arabia — together with Cyrus and John, and the Great Martyr Panteleimon, the court physician of Nicomedia who gave away his inheritance and treated the poor and imprisoned for nothing. With them are numbered Sampson the Hospitable, who turned his house into a hospital; Thallelaios, martyred at Aegae while still a young physician; Diomedes, Julian of Emesa, Tryphon, Mokios, Anicetus and Photius, and Hermolaus, the priest who taught Panteleimon that the greater medicine is Christ.
  - "Each keeps his own day, and all are honored together — on October 17 in Greek practice, and on the Sunday after November 1 in Slavic practice. This is an open synaxis: the Church has never closed the roll of those who heal without price, and later traditions number their own among the Unmercenaries."
