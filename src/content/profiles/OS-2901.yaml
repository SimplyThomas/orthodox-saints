id: OS-2901
lifespan: Died c. 315
overview:
  - Valerius of Saragossa (San Valero; Sant Valero) was bishop of Caesaraugusta (modern Zaragoza) in the province of Hispania during the late third and early fourth centuries. By tradition he governed the see from 290 until his death around 315, a tenure of roughly twenty-five years, and is remembered above all as the bishop under whom Saint Vincent of Saragossa served as deacon.
  - Because Valerius is said to have had a speech impediment, he ordained Vincent to the diaconate and commissioned him to preach throughout the diocese, so that the younger man served as his spokesperson. Contemporary accounts describe Valerius as somewhat timid and retiring in manner.
  - During the persecution of Christians under the emperor Diocletian, Valerius and Vincent were arrested together and brought before the Roman governor Dacian at Valencia, where they were confined in prison. While Vincent was tortured and put to death, the aged bishop was instead sent into exile, and he is honoured as a confessor rather than as a martyr.
liturgicalTitle: Our Father among the Saints Valerius, Bishop of Saragossa, the Confessor
sections:
  - heading: Episcopate and ministry
    body:
      - Valerius was born at Caesaraugusta, the Roman city now known as Zaragoza, in the course of the fourth-century Church of Hispania. He served as its bishop for approximately twenty-five years, from about 290 until his death around 315.
      - He is recorded as a participant in the Council of Elvira (the synod held at Elvira, near Granada), which met around 306 and issued some of the earliest surviving Western canonical legislation.
      - His most enduring association is with his deacon, Vincent of Saragossa. Valerius ordained Vincent and entrusted him with the preaching of the diocese; on account of the bishop's speech impediment, Vincent spoke on his behalf in the exercise of their common ministry.
  - heading: Arrest, trial, and exile
    body:
      - When Diocletian's persecution reached Spain, Valerius and Vincent were seized and taken to Valencia, where they were tried before the governor Dacian and shut up together in the prison of the city, described in the tradition as especially dark and squalid.
      - Offered release on condition that they surrender and burn the Scriptures, both refused; Vincent, speaking for his bishop, declared that they would suffer everything for their faith and heed neither threats nor promises.
      - Vincent was subjected to severe torture and died a martyr, while the aged Valerius was condemned to exile. Later accounts place his banishment at a location called Enetum, near Barbastro, where he is said to have died around 315. For enduring imprisonment and exile without dying under torture, he is venerated as a confessor.
  - heading: Relics and shrines
    body:
      - In 1050 remains believed to be those of Valerius were translated to Roda de Isabena. After the Christian conquest of Zaragoza by Alfonso the Battler in 1118, these relics were carried back to the city in successive shipments over the following decades.
      - A chapel dedicated to the saint stands in the Cathedral of the Savior (La Seo) in Zaragoza. Its baroque wooden portal, from the seventeenth century, depicts Valerius together with Vincent and Saint Lawrence, and it houses a reliquary bust donated by Pope Benedict XIII in 1397.
      - Valerius came to be honoured as the patron saint of Zaragoza.
  - heading: Commemoration and customs
    body:
      - This profile follows the anchor record in commemorating Valerius on January 28. In the Western tradition his feast is kept on January 22, the day associated with his deacon Vincent, though one source notes the date as January 29.
      - Since 1992, his civic feast at Zaragoza has been marked by the eating of the roscon de San Valero, a ring-shaped sweet bread decorated with candied fruit that represents the saint's crown; more than 150,000 are customarily consumed in the Plaza del Pilar during the celebrations.
      - No dedicated OrthodoxWiki article exists for the saint, and he does not appear among the saints listed for January 28 in the OCA Synaxarion; he is venerated principally within the Western, pre-schism tradition.
timeline:
  - when: c. 290
    title: Becomes bishop of Saragossa
    body: Valerius begins his episcopate over the see of Caesaraugusta (Zaragoza), which he is said to have held for about twenty-five years.
  - when: c. 306
    title: Council of Elvira
    body: He takes part in the Council of Elvira, near Granada, one of the earliest Western Church synods.
  - when: c. 304
    title: Arrest under Diocletian
    body: Valerius and his deacon Vincent are arrested in the Diocletian persecution and brought before the governor Dacian at Valencia, where they are imprisoned together.
  - when: c. 304
    title: Martyrdom of Vincent and exile of Valerius
    body: Vincent is tortured and martyred; the aged bishop Valerius is instead sent into exile, reportedly to Enetum near Barbastro.
  - when: c. 315
    title: Death in exile
    body: Valerius dies around 315, honoured as a confessor.
  - when: "1050"
    title: Translation of relics to Roda de Isabena
    body: Remains believed to be his are translated to Roda de Isabena.
  - when: 1118 onward
    title: Relics returned to Zaragoza
    body: Following Alfonso the Battler's conquest of Zaragoza in 1118, the relics are carried back to the city over subsequent decades.
  - when: "1397"
    title: Reliquary bust given by Benedict XIII
    body: A reliquary bust of the saint, donated by Pope Benedict XIII, is placed in his chapel in the Cathedral of the Savior.
