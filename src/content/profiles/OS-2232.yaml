flagReasons:
  - claim: Procopius was among the first to suffer in the Great Persecution in Palestine.
    detail: No dossier external source states he was among the first martyrs of the persecution in Palestine. Wikipedia says he died on July 7, 303, and mentions Eusebius recorded his death, but does not rank him chronologically as 'among the first.' The OCA source likewise makes no such claim. This assertion is absent from the dossier and must be flagged.
  - claim: Eusebius of Caesarea is characterized as an eyewitness historian of the persecution.
    detail: The dossier external sources cite Eusebius but do not describe him as an eyewitness. Wikipedia says only 'According to Eusebius of Caesarea, Procopius and his companions were sent from Scythopolis to Caesarea Maritima.' The characterization 'eyewitness historian' does not appear in any dossier source and is not grounded in the dossier.
