id: OS-2232
lifespan: d. 303
overview:
  - Procopius the Reader was an early-fourth-century martyr of Palestine, remembered as a reader (lector) of the Church who was put to death at Caesarea during the persecution under the emperor Diocletian. According to the account preserved by Eusebius of Caesarea, he was among the first to suffer in the Great Persecution in Palestine.
  - Born at Jerusalem, he is described as a man of strict ascetic life and learning who served the Church in several capacities and preached the word of God. When he refused to offer sacrifice to the pagan gods, he was condemned and beheaded. The Eastern Church keeps his memory on November 22 (July 8 in the Western calendar).
  - "His veneration spread widely in the Christian East: his relics were carried to Antioch, churches were dedicated to him at Caesarea and Constantinople, and he came to be honored across the Orthodox, Roman Catholic, Anglican, and Lutheran traditions."
patronage:
  - Prokuplje, Serbia
  - Deliverance from evil spirits
sections:
  - heading: Life and Ministry
    body:
      - The Orthodox synaxarion records that Procopius was a reader in the Church of Jerusalem who led a strict ascetic life. For this discipline he was granted the gift of casting out unclean spirits, and he became a zealous preacher of the Gospel.
      - The account of Eusebius of Caesarea, an eyewitness historian of the persecution, associates his service with the church at Scythopolis (modern Bet She'an), where he is said to have held the offices of reader, exorcist, and interpreter of the Syriac tongue. He was esteemed as an ascetic and as a learned theologian.
      - During the persecution of Diocletian he was brought with others from Scythopolis to Caesarea Maritima, the Roman capital of Palestine, and there examined. When he refused to sacrifice to the pagan gods, he was sentenced and beheaded.
  - heading: Relics & Shrines
    body:
      - His relics were translated to the Church of Saint Michael in Antioch, in Syria.
      - In AD 484 the emperor Zeno erected a church in his honor at Caesarea Maritima, and a chapel was also built for him at Scythopolis. Constantinople is reported to have contained four churches bearing his name.
  - heading: Veneration and Legacy
    body:
      - Procopius is venerated in the Eastern Orthodox, Roman Catholic, Anglican, and Lutheran traditions. In Eastern Orthodox practice his name is invoked among the saints remembered in the marriage dismissal.
      - He is honored as the patron saint of Prokuplje in Serbia. The Orthodox Church appoints both a troparion and a kontakion to his memory.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: The martyrdom account written by Eusebius of Caesarea survives, and his original narrative is preserved in medieval Syriac, Georgian, and Latin translations."
      - "Traditional Accounts: The synaxarion relates that his ascetic labors won him the grace to drive out demons. Later medieval legends elaborated his story in divergent ways — variously casting him as a soldier-saint, an ascetic, a Persian, or a prince of Alexandria; one such legend named him Neanias and drew heavily on the conversion narrative of the Apostle Paul. These embellished accounts are legendary developments rather than part of the earliest record."
timeline:
  - when: c. late 3rd c.
    title: Birth at Jerusalem
    body: Procopius is born at Jerusalem and comes to be known for a strict ascetic life and for learning.
  - when: Early 4th c.
    title: Service in the Church
    body: He serves as a reader, and by Eusebius's account also as exorcist and interpreter of Syriac, connected with the church at Scythopolis; he preaches the Gospel.
  - when: "303"
    title: Arrest and martyrdom at Caesarea
    body: Brought to Caesarea Maritima during Diocletian's persecution, he refuses to sacrifice to the pagan gods and is beheaded (traditionally July 7, 303).
  - when: "484"
    title: Church built by Zeno
    body: The emperor Zeno erects a church dedicated to him at Caesarea Maritima; his relics are honored at Antioch and churches rise in his name at Constantinople.
