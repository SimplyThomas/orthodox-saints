flagReasons:
  - claim: His brother Lukian served at the court of the Great Prince of Moscow
    detail: The dossier says it was Lukian who served at court, not Cornelius. The profile implies Cornelius held 'a position connected to the court', which is an unsupported inference. The OCA source states only Lukian served at court; Cornelius 'had longed for the solitary life from a young age' and followed Lukian to the monastery.
  - claim: The profile states Cornelius abandoned a position connected to the court of the Great Prince of Moscow
    detail: The dossier says only Lukian served at court; Cornelius 'had longed for the solitary life from a young age' and followed his brother. The profile's claim that Cornelius himself abandoned 'a position connected to the court' is unsupported and goes beyond the sources, which attribute the court position to Lukian alone.
