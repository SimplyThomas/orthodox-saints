id: OS-2175
lifespan: 8th century
liturgicalTitle: Our Venerable Father Theocteristus, Abbot of the Monastery of Symbola on Mount Olympus
overview:
  - "Theocteristus (Greek: Theosteriktos) was an eighth-century Byzantine monastic who served as igoumen (abbot) of the Monastery of Symbola (Symboloi) on Mount Olympus in Bithynia, in Asia Minor. He lived during the reign of the iconoclast emperor Constantine V Copronymos (741–775), a period in which monasteries and icon-venerating monks were subject to intense imperial persecution."
  - He is venerated as a Venerable (monastic) saint and Confessor, commemorated principally on November 10 and also on February 17. Care is needed to distinguish him from a near-contemporary of the same name, Theosteriktos the Confessor, abbot of the Pelekete Monastery near Prusa, who is commemorated separately (March 17 in the Greek reckoning).
sections:
  - heading: Iconoclast Persecution under Constantine V
    body:
      - Theocteristus's monastic career fell within the height of Byzantine Iconoclasm under Constantine V, an emperor remembered by later iconophile sources as obsessive in his hostility toward images and monks. Accounts describe the burning of monasteries and icons, the conversion of churches into stables, and the public humiliation of monks, who on one occasion were forced to parade in the Hippodrome in violation of their vows. In 765 Saint Stephen the Younger was killed and venerated as a martyr to the iconophile cause.
      - The Bithynian monasteries of Mount Olympus, including Symbola, lay on the geographical periphery of effective imperial control and became a spiritually resistant zone during and after the height of the persecution. Because most surviving accounts of this era were written by iconophile opponents of Constantine V, they may be biased in detail, but the broad pattern of monastic persecution is well attested.
  - heading: The Monastery of Symbola and its Disciples
    body:
      - Under Theocteristus, the Symbola Monastery was a centre of icon-venerating monasticism in Bithynia. Two of his renowned disciples were Saint Timothy (d. 795), an Italian-born monk who led an ascetic life at Symbola, and Saint Plato (feast April 4), the uncle of Saint Theodore the Studite. Plato entered monastic life at Symbola in 759, eventually succeeded Theocteristus as abbot, and in 781 founded the Sakkoudion Monastery, where Theodore the Studite began his own monastic career.
      - Plato was noted for his iconodule stance during the iconoclast controversy and took part in the Second Council of Nicaea (787), which restored the veneration of icons. The continuity from Symbola through Sakkoudion to the Stoudios tradition links Theocteristus's community to one of the most influential currents of later Byzantine monasticism.
      - Some sources connect Theocteristus instead with the Peletiki (Pelekete) community at Triglia, which may reflect a discrepancy among the sources or the possibility that he was associated with more than one community at different points. The Pelekete Monastery, however, is more securely linked to the other Theosteriktos, whose hegoumenate there ended in the iconoclast attack of 763.
  - heading: Ascetic Character and Sayings
    body:
      - The troparion sung in his honour (Tone 8) praises him as one whose "flood of tears made the desert fertile" and whose "longing for God brought forth fruits in abundance," language consistent with the ascetic and confessorial character attributed to him.
      - 'A spiritual saying handed down under his name expresses the same renunciatory ideal: "Longing for God wipes away longing for parents."'
timeline:
  - when: 741–775
    title: Reign of Constantine V Copronymos
    body: Theocteristus lived and led the Symbola community during the reign of the iconoclast emperor who persecuted icon-venerating monks and monasteries.
  - when: "759"
    title: Plato enters Symbola
    body: Saint Plato, uncle of Theodore the Studite, entered monastic life at the Symbola Monastery under Theocteristus.
  - when: "781"
    title: Foundation of Sakkoudion
    body: Plato, having succeeded Theocteristus as abbot at Symbola, founded the Sakkoudion Monastery, where Theodore the Studite began his monastic career.
  - when: Nov 10 / Feb 17
    title: Commemoration
    body: Theocteristus is commemorated principally on November 10 and also on February 17, the primary monastic commemorant of the November date.
