flagReasons:
  - claim: The Pelekete Monastery's hegoumenate ended in the iconoclast attack of 763.
    detail: External source 4 says the Pelekete abbot Theosteriktos 'was tortured by Governor Michael Lachanodrakon during the iconoclast attack on Holy Thursday 763, with approximately 38 monks buried alive at Ephesus.' The dossier confirms he was tortured in 763 but does NOT state that his hegoumenate ended at that point. Indeed, he is titled 'Confessor' (not Martyr), implying he survived the persecution. The claim that his hegoumenate specifically ended in 763 goes beyond what the dossier supports.
