id: OS-2235
lifespan: 9th century (traditional; some modern scholars propose the 11th century)
overview:
  - Michael the Soldier of Potouka (also called Michael the Warrior) is a Bulgarian saint honored as Righteous and commemorated on November 22. He is remembered as one of the early Bulgarian Christians, known from infancy as a "saintly child" and leading a blameless life from his youth.
  - Tradition places him in the city of Potuka during the reign of the Byzantine Emperor Michael III (855–867), where he served as a soldier. His life is preserved chiefly through later Bulgarian hagiographic accounts, which recount his military career, a legendary act of deliverance, and the fatal wounds he received.
  - His relics were translated to Tarnovo in 1206 under Tsar Kaloyan, and his cult remained active in Bulgaria into the era of the National Renaissance.
liturgicalTitle: The Righteous Michael the Soldier of Potouka
timeline:
  - when: 855–867 (traditional)
    title: Life at Potuka
    body: By tradition Michael lived in the city of Potuka—believed to lie north of Plovdiv, with some scholars connecting it to modern Batak—during the reign of the Byzantine Emperor Michael III. He was counted among the first of the Bulgarians to become Christian and was known as a devout child from infancy.
  - when: As a young man
    title: Military service
    body: Coming from noble stock, Michael became primikur, a military officer, of a military unit. Bulgarian hagiographic accounts relate that he distinguished himself in war against Muslim forces, which some interpretations locate in Southern Italy.
  - when: After his campaigns
    title: Deliverance and death
    body: According to tradition, upon returning from his campaigns he slew a dragon that had terrorized a settlement. The severe wounds he received in this act proved fatal after his return to Potuka.
  - when: "1206"
    title: Translation of relics to Tarnovo
    body: Tsar Kaloyan transported Michael's relics from Potuka to Tarnovo following his conquest of Plovdiv, placing them first in the Church of the Forty Martyrs and later in the Patriarchal Cathedral of the Ascension.
  - when: 13th century
    title: Prologue Life and liturgical Service
    body: Unknown authors composed a "Prologue Life" and a liturgical Service for the saint. These later inspired Patriarch Eutimius of Tarnovo to write an Encomium (panegyric) in his honor.
sections:
  - heading: Historical Sources and Dating
    body:
      - The sole historical sources for Michael are Bulgarian hagiographic texts of the 13th–14th centuries. While these accounts place him in the mid-9th century, during the reign of Michael III, some contemporary scholars believe he actually lived during the 11th century.
      - The philologist Ancho Kaloyanov has proposed that Michael may have been associated with Paulician Christianity, suggesting that Bulgarian rulers promoted his cult as a means of integrating Paulician settlers.
  - heading: Relics & Shrines
    body:
      - In 1206, following the conquest of Plovdiv, Tsar Kaloyan transferred Michael's relics from Potuka to the Bulgarian capital of Tarnovo. They were first placed in the Church of the Forty Martyrs and afterward in the Patriarchal Cathedral of the Ascension.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented:"
      - Michael's cult is attested by the 13th-century Prologue Life and liturgical Service, and by the Encomium written for him by Patriarch Eutimius of Tarnovo.
      - "Traditional Accounts:"
      - The hagiographic tradition relates that Michael was known as a "saintly child" from infancy and led a blameless life from his youth. It further recounts that, returning from his military campaigns, he slew a dragon that had been terrorizing a settlement, and that the wounds he suffered in this deliverance ultimately caused his death at Potuka.
  - heading: Legacy and Veneration
    body:
      - Michael's cult remained active through the era of the Bulgarian National Renaissance. The renowned iconographer Zacharias Zograf painted frescoes of the saint—substantially identical images preserved in the Transfiguration and Troyan (Trinity) monasteries.
      - He is commemorated on November 22, and is venerated as a Bulgarian saint honored under the title of Righteous.
