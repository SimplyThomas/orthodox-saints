id: OS-2803
lifespan: Late 3rd–early 4th century (fl. reign of Maximian, d. after c. 305)
overview:
  - Saint Eubiotus the Hermit was an ascetic of Asia Minor who lived in the late third and early fourth centuries, during the persecutions under the emperor Maximian. According to his synaxarion he endured extensive tortures for confessing Christ, survived his imprisonments, and after his release withdrew to a solitary ascetic life, his hermitage becoming a refuge for those who came to him in pain.
  - He is chiefly remembered in the wider tradition for receiving the exiled Martyr Philetairus of Nicomedia (OS-2433) shortly before both men's deaths. The Orthodox Church in America places their meeting on the island of Prokonnesos in the Sea of Marmara, where Eubiotus welcomed Philetairus, kept company with him for seven days, and, when Philetairus died at his cell, gave him burial. Eubiotus himself reposed a short time afterward.
  - The anchor tradition followed here records no fixed individual feast day for Eubiotus, commemorating him within the account of Philetairus on December 30; Greek synaxarion sources assign him a distinct feast on December 18.
liturgicalTitle: Our Venerable Father Eubiotus the Hermit
sections:
  - heading: Historical Context and Life
    body:
      - Greek synaxarion accounts place Eubiotus's origins in Asia Minor. One tradition names his home village as Ptoketon in the Opsikion theme, in the region around Kyzikos (Cyzicus), and dates his sufferings to about 298, under the emperor Maximian. His visibly Christian life is said to have drawn the hostility of the local pagan population and the attention of Leontios, governor of Cyzicus, who ordered him tortured.
      - The synaxarion relates that Eubiotus was subjected to severe punishments and repeated imprisonments but was preserved through them, and that his endurance moved many onlookers to accept baptism. When the emperor Maximian released Christian prisoners on learning of Constantine the Great's approach from the West (around 305–306), Eubiotus was freed. He then spent about five further years in ascetic practice and prayer before commending his spirit to God in peace.
      - There is some divergence among the sources on his profile. The Greek synaxarion titles him a martyr and centres on his tortures and survival, while the anchor tradition classes him among the venerable monastics as a hermit; because he endured torture for the faith yet reposed in peace, he is best understood as a confessor who ended his days in the ascetic life.
  - heading: The Meeting with the Martyr Philetairus
    body:
      - Eubiotus is most widely commemorated for his encounter with the Martyr Philetairus of Nicomedia, who had likewise been tortured and then released by Maximian and was afterward exiled to Prokonnesos, one of the islands of the Sea of Marmara. According to the Orthodox Church in America, Eubiotus came to see Philetairus on the island; the two saints embraced with joy and remained together for seven days.
      - Philetairus died at Eubiotus's cell, and Eubiotus buried him nearby. The accompanying tradition records that six soldiers and their commander, who had converted while escorting Philetairus, died eleven days later and were interred beside him. Greek sources present the meeting as a mutual consolation between two survivors of persecution, each strengthening the other at the end of his life; Eubiotus reposed a short time after burying his companion.
  - heading: Miracles and Traditions
    body:
      - "Historically Documented: The surviving accounts of Eubiotus are hagiographical synaxarion narratives rather than independent documentary records, and they should be read as the received tradition of the Church."
      - "Traditional Accounts: The synaxarion relates that Eubiotus was cast into fire yet remained unharmed, that lions set upon him refused to attack, and that when executioners were commanded to behead him a sudden darkness fell and they struck down one another instead; these deliverances are said to have led many witnesses to conversion and baptism. It is further related that after his release his hermitage became a place of refuge, especially for people in pain, to whom he offered comfort and, by tradition, miraculous healing through prayer."
  - heading: Prokonnesos
    body:
      - Prokonnesos (also Proikonesos or Proconnesus, the modern Marmara Island) is an island in the Sea of Marmara, long noted as the source of the Proconnesian marble used in major Roman and Byzantine buildings. The island had an established Christian and monastic presence in the Byzantine period; it is associated with Saint Timothy, called a wonderworker and bishop of Proconnesus, and the emperor Justinian I is recorded to have built a convent there. It is on this island that the tradition followed by the Orthodox Church in America places Eubiotus's reception and burial of the Martyr Philetairus.
timeline:
  - when: c. 298
    title: Confession and torture under Maximian
    body: By the Greek synaxarion, Eubiotus, a Christian of the region of Kyzikos in Asia Minor, is denounced during the persecution under Maximian and tortured on the orders of Leontios, governor of Cyzicus, enduring repeated imprisonments.
  - when: c. 305–306
    title: Release from prison
    body: Learning of Constantine the Great's approach from the West, Maximian frees his Christian prisoners; Eubiotus is released and withdraws to an ascetic life.
  - when: c. 305–310
    title: Life as a hermit
    body: Eubiotus spends about five years in ascetic practice and prayer, his hermitage becoming a refuge for those who come to him in pain.
  - when: Late reign of Maximian
    title: Reception and burial of Philetairus
    body: The exiled Martyr Philetairus of Nicomedia is received by Eubiotus (on Prokonnesos, per the OCA tradition); the two remain together seven days, and when Philetairus dies at Eubiotus's cell, Eubiotus buries him nearby.
  - when: Shortly after
    title: Repose
    body: Eubiotus reposes in peace a short time after burying his companion.
