id: OS-2131
lifespan: died November 1, 1520
overview:
  - James of Docheiariou was a sixteenth-century Athonite monk and spiritual elder who, together with two disciples, suffered martyrdom under Ottoman rule and is commemorated on November 1. Tonsured at the monastery of Docheiariou on Mount Athos, he later relocated to the Georgian Skete of Saint John the Baptist, which had fallen into disrepair, and restored it under the direction of Elder Ignatius.
  - The three martyrs — Saint James, the deacon James, and the monk Dionysios — are commemorated together as "the Monastic Martyrs James and his two disciples." According to their life, they were seized by Turkish authorities on fabricated charges of inciting rebellion, and, after refusing to apostatize, endured torture for seventeen days before receiving the crown of martyrdom on November 1, 1520.
  - Their relics were transferred to the monastery of Saint Anastasia the Deliverer from Potions (Pharmakolytria) near Galatista, not far from Thessaloniki, where they became associated with reported miracles and where the community grew under Igoumen Theonas, a former disciple of Saint James.
liturgicalTitle: The Holy Venerable-Martyr James of Docheiariou and his two disciples, James the Deacon and Dionysios the Monk
timeline:
  - when: Early 16th century
    title: Tonsure at Docheiariou
    body: James was tonsured a monk at the monastery of Docheiariou on Mount Athos, tenth in the hierarchy of the Athonite monasteries and dedicated to the Archangels Michael and Gabriel.
  - when: 16th century
    title: Restoration of the Georgian Skete
    body: He relocated to the Georgian Skete of Saint John the Baptist, which had fallen into disrepair, and restored it under the direction of Elder Ignatius.
  - when: Before 1520
    title: Ministry in Aetolia
    body: Traveling through Aetolia with his followers, James is said to have healed the infirm and taught the faithful, drawing the attention of the Ottoman authorities.
  - when: November 1, 1520
    title: Martyrdom
    body: After being accused of inciting rebellion and refusing to renounce the faith under torture, James and his two disciples died as martyrs, having endured torments for seventeen days.
sections:
  - heading: Monastic Life and Restoration of the Skete
    body:
      - James began his monastic life at Docheiariou on Mount Athos before moving to the Georgian Skete of Saint John the Baptist. Finding the skete in disrepair, he restored it under the direction of Elder Ignatius, and through his monastic labors his life records that he advanced, in the words of his synaxarion, "to the heights of purity."
      - 'His life attributes to him extraordinary spiritual gifts: divine revelations compared to those of the Apostle Paul, by which he was said to behold "the mansions of Paradise and the depths of Hades," and the discernment to perceive the inner thoughts and hidden secrets of those around him.'
  - heading: Martyrdom
    body:
      - While traveling through Aetolia with his followers, James is recorded to have healed the sick and instructed the faithful. Turkish authorities fabricated accusations that he was inciting rebellion and sought to compel his apostasy through torture.
      - According to their life, all three monks — James, the deacon James, and the monk Dionysios — endured severe torments for seventeen days before receiving the crown of martyrdom on November 1, 1520.
  - heading: Relics & Shrines
    body:
      - The relics of the three martyrs were transferred to the monastery of Saint Anastasia the Deliverer from Potions (Pharmakolytria) at Galatista, near Thessaloniki, where they became renowned for reported miraculous occurrences.
      - The monastery subsequently drew a community of roughly one hundred monks under its igoumen, Saint Theonas, himself a former disciple of Saint James.
