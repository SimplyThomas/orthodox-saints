id: OS-2778
lifespan: 1876–1921
overview:
  - New Hieromartyr Euthymios (Agritellis), Bishop of Zela, was a Greek Orthodox hierarch who labored among the Greeks of Asia Minor and died in 1921 after prolonged imprisonment and ill-treatment by Kemalist authorities amid the persecutions surrounding the Asia Minor Catastrophe.
  - Born Eustratios Agritellis on the island of Lesbos, he was formed as a monk and scholar at Leimonos Monastery and the Theological School of Halki before his consecration as Bishop of Zela in 1912. As bishop he effectively governed the Metropolis of Amasya, overseeing hundreds of Orthodox communities and founding churches, schools, and community organizations.
  - Arrested in January 1921, he endured months of imprisonment and isolation and reposed on May 29, 1921. He was canonized as an ethnomartyr and saint by the Holy Synod of the Church of Greece in 1992, and is commemorated among the hierarchs of the Asia Minor Catastrophe together with Saint Chrysostomos of Smyrna.
liturgicalTitle: The Holy New Hieromartyr Euthymios, Bishop of Zela
patronage:
