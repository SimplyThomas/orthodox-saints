id: OS-0116
overview:
  - Venerable Anthony of Agyia is an Orthodox monastic saint commemorated on September 1. He is associated with Agyia (Agia), in the Greek region, and is numbered among the venerable (monastic) fathers.
  - Very little of his life survives. The liturgical calendars that preserve his memory record him by name and commemoration alone, without a surviving vita, dates, or biographical narrative, so the details of his birth, monastic labors, and repose are not known.
