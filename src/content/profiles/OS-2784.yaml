id: OS-2784
lifespan: 1st century
overview:
  - Eubulus is numbered among the Seventy Apostles and is known from a single verse of the New Testament, 2 Timothy 4:21, where he is named among the members of the Roman Christian community who send greetings to Timothy. The Apostle Paul wrote the letter from Rome during his final imprisonment, traditionally dated to about 67 AD, as he anticipated his martyrdom.
  - Beyond this one mention Eubulus is otherwise unattested in Scripture, and little to nothing is recorded of his life. In the Orthodox calendar he is commemorated on February 28 together with the Apostle Nymphas, both counted among the disciples of the Apostle Paul.
liturgicalTitle: The Holy, Glorious and All-Praised Apostle Eubulus of the Seventy
sections:
  - heading: Scriptural Attestation
    body:
      - "Eubulus appears only in the closing greetings of the Second Epistle to Timothy: 'Eubulus sends you greetings, as do Pudens, Linus, Claudia, and all the brothers' (2 Timothy 4:21, Berean Standard Bible). Paul, imprisoned at Rome and writing to Timothy at Ephesus, conveys the greetings of the Roman believers gathered around him as he faced execution."
      - His companions in this greeting include Pudens and Claudia, otherwise obscure figures, and Linus, whom patristic tradition (as reported by Irenaeus and Eusebius) identifies as the first Bishop of Rome after the Apostle Peter. The presence of Linus places Eubulus within the foundational leadership circle of the Roman church during the Apostolic Age. Commentators consistently observe that nothing further is known of Eubulus, whose entire scriptural witness is this one verse.
  - heading: Identity and Distinctions
    body:
      - Eubulus of the Seventy should not be confused with the martyr Eubulus of Caesarea, who was put to death by the sword during the persecution of Diocletian around 310 AD. That later Eubulus, whose death is recounted by Eusebius of Caesarea in his History of the Martyrs in Palestine and who is commemorated on February 3 with the martyr Adrian, is a distinct person separated from the apostle by centuries.
      - A proposed connection between Eubulus and Aristobulus, sometimes linked to early evangelism in Britain, is unsupported conjecture rather than established tradition. There is no dedicated biographical account of the Apostle Eubulus, reflecting his extreme obscurity as a historical figure.
  - heading: Commemoration
    body:
      - "Eubulus is commemorated on February 28 jointly with the Apostle Nymphas, both listed among the Seventy Apostles and remembered as disciples of the Apostle Paul. A synaxarion verse for the feast associates the two together in Christ: 'Eubulus and Nymphas together being associated with Christ.'"
timeline:
  - when: 1st century
    title: Numbered among the Seventy
    body: Eubulus is counted in Orthodox tradition among the Seventy Apostles and reckoned a disciple of the Apostle Paul.
  - when: c. 67 AD
    title: Greeting in 2 Timothy
    body: Writing from Rome during his final imprisonment, the Apostle Paul conveys Eubulus's greeting to Timothy alongside those of Pudens, Linus, and Claudia (2 Timothy 4:21).
