id: OS-2320
liturgicalTitle: Our Venerable Father Cyril, Abbot of Chelma Hill, Enlightener of the Chudian People
lifespan: c. 1285 – 1367/1368
overview:
  - Cyril (Kirill) of Chelma Hill was a monk of the northern Russian wilderness who, after years of monastic training and solitary wandering, settled on Chelma Hill in the Kargopol region and became the enlightener of the Finnic Chud people, many of whom he led to baptism.
  - He is remembered as the founder of a monastery and church dedicated to the Theophany of the Lord, established toward the end of a long ascetic life spent on the hill. He is commemorated on December 8.
timeline:
  - when: c. 1285
    title: Birth
    body: According to the synaxarion he was born in the city of White Lake (Beloozero); one account places his birth in September of 1285.
  - when: Early monastic life
    title: Tonsure at the monastery of Saint Anthony the Roman
    body: He was tonsured a monk at the monastery of Saint Anthony the Roman in Novgorod, where for six years he passed through various obediences.
  - when: After leaving the monastery
    title: Three years of wandering
    body: Leaving the monastery, he wandered through the wilderness for three years before settling in a wild region of the Kargopol district and choosing Chelma Hill for his constant abode.
  - when: On Chelma Hill
    title: Solitary asceticism
    body: He spent the first winter in a cave, then built himself a wooden cell and a chapel, beginning a long ascetic life on the hill.
  - when: Toward the end of his life
    title: Founding of the monastery and church
    body: Toward the end of his life he established a monastery and a church in honor of the Theophany of the Lord.
  - when: Dec 8, 1367 (reposed 1367/1368)
    title: Repose
    body: Having dwelt upon Chelma Hill for fifty-two years, he died at the advanced age of 82, on December 8.
