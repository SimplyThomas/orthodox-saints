flagReasons:
  - claim: The monastery was located 'on Lake Ladoga'.
    detail: Neither the anchor row nor either OCA external source mentions Lake Ladoga. The sources refer only to 'the island of Konev' (Oct 21 source) and 'the Konevets monastery' (Dec 29 source). The location on Lake Ladoga is not grounded in the dossier.
