id: OS-2884
lifespan: died c. 925
liturgicalTitle: Our Father among the Saints Paul, the Sign-Bearer, Bishop of Corinth
overview:
  - Saint Paul, called the Sign-Bearer, was a tenth-century bishop of Corinth remembered as a wonderworker. Born in Constantinople to devout parents, he was one of several brothers who together embraced the monastic life, and he later received the see of Corinth after his younger brother Peter—afterward the celebrated Bishop of Argos—declined it.
  - Sources record that Paul shepherded the Christian community of Corinth well and worked many signs and wonders before reposing in peace. He is commemorated alongside his brother Peter, with whom the tradition remembers him as sharing a common heavenly dwelling.
sections:
  - heading: Family and Early Life
    body:
      - Paul was born in Constantinople to God-loving and pious parents. According to the synaxarion of his brother Peter, the entire family resolved to take up the monastic life. Paul and his older brother Dionysios became monks first, followed by the younger brothers Plato (Platon) and Peter, and finally by their parents.
      - "His younger brother, Peter, would become the widely venerated Bishop of Argos, known as the Wonderworker (commemorated on January 3 and May 3). A verse preserved in Paul's commemoration honors the two brothers together: it names Paul as the natural brother of Peter and declares that they dwell together in the city above."
  - heading: Bishop of Corinth
    body:
      - The Patriarch Nicholas I Mystikos wished to elevate Peter to the episcopal see of Corinth on account of his virtues and eloquence, but Peter declined, preferring to remain in the contemplative and ascetic life. The office was then given to Paul, who was ordained Bishop of Corinth in his brother's stead.
      - By the sources' account Peter accompanied Paul to Corinth, where he continued to live ascetically while Paul governed and shepherded the Christian community. When the see of Argos later fell vacant, the people of Argos and Nauplion pressed Paul to ordain his brother Peter as their bishop; after initial resistance, Peter accepted.
  - heading: Repose and Legacy
    body:
      - Having shepherded the flock of Christ in Corinth well and worked many signs and wonders, Saint Paul reposed in peace, around the year 925. His epithet, the Sign-Bearer, reflects the reputation for miracles attached to his memory.
      - He is commemorated closely with his brother Peter the Wonderworker, whose own veneration became far more widespread; much of what is preserved about Paul survives within the accounts of Peter's life.
  - heading: Feast Day
    body:
      - The account by John Sanidopoulos records a feast of Saint Paul the Sign-Bearer on March 27. His commemoration is not firmly established in the wider liturgical calendars, and the entry stands in need of clergy and source review.
