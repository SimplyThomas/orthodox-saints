id: OS-0871
lifespan: 1870 – 1948
liturgicalTitle: Our Venerable Father Sergius (Srebryansky), Confessor
sources:
  - OCA Synaxarion (oca.org), Lives of the Saints
  - stjohndc.org
  - https://stjohndc.org/en/list-of-relics/sergius-srebriansky-archimandrite-venerable-confessor
  - https://roca.org/oa/volume-xvi/issue-146/father-mitrofan-srebrianski-father-confessor-of-the-martha-mary-convent
  - https://orthodoxwiki.org/New_Martyrs_and_Confessors_of_Russia
overview:
  - Sergius (Srebryansky) was a Russian married parish priest and army chaplain who became confessor and superior of the Marfo-Mariinsky (Martha-Mary) Convent in Moscow, founded by Grand Duchess Elizabeth Feodorovna. Born Mitrofan (Metrophanes) Vasilyevich Srebryansky on July 31, 1870, he was later tonsured the monk Sergius and raised to archimandrite.
  - Through the years of Soviet persecution he was repeatedly arrested and exiled, spending long years in prisons and camps before settling in exile in the Tver region, where he reposed in 1948. He is venerated among the New Martyrs and Confessors of Russia, glorified by the Russian Orthodox Church in 2000.
timeline:
  - when: July 31, 1870
    title: Birth in Voronezh province
    body: Born Metrophanes Vasilyevich Srebryansky in the village of Tresvyatskoye, Voronezh uyezd, Voronezh province, into the family of a priest.
  - when: 1892–1894
    title: Seminary, marriage, and ordination
    body: He completed theological seminary studies in 1892 and married Olga Vladimirovna Ispolatovskaya in 1893. He was ordained deacon in 1893 and priest in 1894, beginning parish ministry; sources record him serving at Orel from 1896.
  - when: 1904–1906
    title: Chaplaincy in the Russo-Japanese War
    body: He served as a regimental chaplain during the Russo-Japanese War, with the 51st Chernigov regiment, taking part in military actions near Lyaoyan and Mukden. He recorded his experiences in a wartime diary published in 1906.
  - when: "1908"
    title: Confessor of the Marfo-Mariinsky Convent
    body: Grand Duchess Elizabeth selected him as spiritual father and superior of the Martha-Mary (Marfo-Mariinsky) Convent in Moscow, a community she had established. He served there until the convent's closure in the mid-1920s.
  - when: "1922"
    title: Tonsure as the monk Sergius
    body: He was tonsured a monk with the name Sergius, while his wife Olga became the nun Elizabeth; he was subsequently elevated to the rank of archimandrite. The Orthodox America account records that the tonsure was received from Patriarch Tikhon.
  - when: 1923 onward
    title: Arrests and exile
    body: Beginning in 1923 he endured repeated arrests and was exiled. The Orthodox America account records that he spent some sixteen years in various prisons and camps.
  - when: "1933"
    title: Settlement in the Tver region
    body: Following his release in 1933, he and his matushka settled in exile at Vladychnya (Vladichnoye) in the Tver region.
  - when: April 5, 1948
    title: Repose
    body: He reposed from pneumonia at Vladychnya in the Tver region and was buried in the village cemetery. Two years later, when his wife was interred in the same grave, his body was found incorrupt.
  - when: "2000"
    title: Glorification
    body: He was glorified by the Russian Orthodox Church among the Synaxis of the New Martyrs and Confessors of Russia, canonized in 2000.
sections:
  - heading: Priest and Army Chaplain
    body:
      - Before his monastic life, Mitrofan Srebryansky was a married parish priest, serving at Orel from 1896. During the Russo-Japanese War he accompanied troops to the front as a regimental chaplain with the 51st Chernigov regiment, taking part in the fighting near Lyaoyan and Mukden.
      - His diary of those years was serialized in a Russian journal and published in 1906; it was through this published account of his chaplaincy, the sources relate, that Grand Duchess Elizabeth came to know of him and invited him to Moscow.
  - heading: The Marfo-Mariinsky Convent
    body:
      - Though reluctant to leave his flock at Orel, Father Mitrofan accepted the position of father-confessor and superior of the Martha-Mary (Marfo-Mariinsky) Convent in Moscow, the community of sisters of mercy founded by Grand Duchess Elizabeth Feodorovna. The Orthodox America account records that he daily served the Divine Liturgy and gave lectures three times a week.
      - His marriage to Olga was childless, and the couple made a monastic commitment, living as brother and sister; both later received monastic tonsure, he as Sergius and she as the nun Elizabeth. After the Grand Duchess's arrest in 1918 he continued to shepherd the convent community until the monastery was closed by the Soviet authorities in the mid-1920s.
  - heading: Persecution and Confession
    body:
      - From 1923 onward, Archimandrite Sergius was repeatedly arrested and exiled under the Soviet regime. The Orthodox America account records that he spent some sixteen years in various prisons and camps before settling in exile at Vladychnya in the Tver region following his release in 1933.
      - He reposed there in 1948. It is for this endurance of imprisonment and exile in faith that he is numbered among the confessors rather than as a martyr by violent death.
  - heading: Relics & Shrines
    body:
      - He was buried in the village cemetery at Vladychnya. Two years after his repose, when his wife was interred in the same grave, his body was found to be incorrupt, and local veneration of him began.
companions:
  - name: Grand Duchess Elizabeth
    note: Founder of the Marfo-Mariinsky Convent, who chose him as its father-confessor and superior; also a New Martyr of Russia.
