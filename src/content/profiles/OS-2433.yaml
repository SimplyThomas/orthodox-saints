    title: First trial under Diocletian
    body: Tried at Nicomedia and cast into a furnace, from which the tradition says he emerged unharmed and was released.
  - when: 286-305
    title: Second trial under Maximian
    body: Confessing Christ again, he was scourged and exposed to wild beasts; his executioners and their commander converted and were beheaded.
  - when: early 4th century
    title: Exile and death on Prokonnesos
    body: Sentenced to exile on the island of Prokonnesos in the Sea of Marmara, where he died and was buried by Saint Eubiotus.
