id: OS-2908
lifespan: c. 864–960
overview:
  - Elias Speleotes ("the Cave-Dweller"), also rendered Spelaeotes, was an Italo-Greek hermit of Calabria in southern Italy. Born about 864 in Reggio of Calabria to a wealthy noble family, he abandoned a comfortable life in his youth for monastic asceticism and spent the greater part of his life in a cave, around which a community of ascetics gathered.
  - He is counted among the principal leaders of Italo-Greek Basilian monasticism, alongside figures such as Elias the Younger, Lucas of Demena, Vitalis of Castronuovo, and Nilus of Rossano. He was the spiritual father of St. Fantinus of Calabria, and a spiritual associate of the wider Calabrian ascetic tradition of his day.
  - He reposed on September 11, 960, at a great age, and is commemorated on that date. His cave complex near Melicuccà in Calabria survives as some of the most important surviving archaeological evidence of the Byzantine Greek monastic presence in southern Italy.
liturgicalTitle: Our Venerable Father Elias the Cave-Dweller (Spelaeotes) of Calabria
