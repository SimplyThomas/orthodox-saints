celebration:
  intro: Ways to honor the Apostle and Evangelist Matthew.
  ideas:
    - idea: Tell the "leave everything and follow" call-story — the tax collector rising from his money table at Christ's word.
    - idea: Read a short passage from his Gospel together (the Beatitudes or the Nativity story), or let older children find a favorite parable.
    - idea: 'Turn "collecting" into "giving": sort coins or toys to give away, since Matthew handled money before his calling.'
    - idea: Make a simple scroll or "Gospel book" craft, decorating the four evangelist symbols (Matthew's is the winged man).
    - idea: Keep a name-day for anyone named Matthew or Matthaios.
