    title: Valerian's second edict
    body: The Emperor Valerian issued an edict ordering the summary execution of bishops, priests, and deacons.
  - when: Aug 6, 258
    title: Martyrdom of Sixtus II and his deacons
    body: Arrested while addressing his congregation at the cemetery of Praetextatus, Sixtus II was put to death together with deacons including Felicissimus and Agapitus.
