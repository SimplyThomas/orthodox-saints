id: OS-2185
lifespan: c. 365 – 430 (some sources give 451)
overview:
  - Neilos the Ascetic of Sinai (also called Nilus of Ancyra or Nil Postnik, "the Faster") was a native of Constantinople who, while still a young layman, rose to the office of prefect (eparch) of the imperial capital. A married man with two children, he became a disciple of Patriarch John Chrysostom, who guided him in the study of Scripture and in works of piety.
  - "Around 390, Neilos and his wife agreed to part and each embrace the monastic life: his wife and daughter entered a women's monastery in Egypt, while Neilos and his son Theodulos withdrew to Mount Sinai. There they settled in a cave they dug with their own hands, and Neilos remained on Sinai for some forty years, pursuing fasting, vigil, and prayer while receiving visitors from every rank of society, including the emperor."
  - He became one of the notable spiritual writers of the early fifth century, leaving treatises on the virtues and vices, works on monastic life, some two hundred precepts called "Admonitions," and a very large body of letters. His feast is kept on November 12.
liturgicalTitle: Our Venerable Father Neilos the Ascetic of Sinai
patronage:
  - Monastics
  - Ascetics
  - Spiritual writers
timeline:
  - when: c. 365
    title: Birth in Constantinople
    body: Neilos is born in Constantinople and receives an excellent education.
  - when: c. 398–403
    title: Discipleship under John Chrysostom
    body: While serving as prefect of the capital, he becomes a disciple of Patriarch John Chrysostom, who directs him in Scripture and works of piety.
  - when: c. 390–404
    title: Withdrawal to Mount Sinai
    body: Neilos and his wife agree to part for the monastic life. His wife and daughter enter a women's monastery in Egypt; he and his son Theodulos settle in a cave on Mount Sinai.
  - when: c. 410
    title: Capture of Theodulos
    body: Saracen raiders seize Theodulos and eventually sell him into slavery. A bishop in Palestine makes the young man a church doorkeeper; after Neilos recovers his son, the bishop ordains them both to the priesthood and lets them return to Sinai.
  - when: c. 430 (some sources 451)
    title: Repose
    body: Neilos dies on November 12 after roughly forty years of ascetic life on Sinai.
  - when: 565–578
    title: Translation of relics
    body: During the reign of Justin II his remains are transferred to Constantinople and deposited in the Church of the Holy Apostles.
sections:
  - heading: From Prefect to Ascetic
    body:
      - Neilos received an excellent education and, while still young, was appointed to the important post of prefect (eparch) of Constantinople. He was married with two children during these years in public life.
      - "His decisive spiritual formation came through Patriarch John Chrysostom, whom he served as a disciple and who directed him in the study of Scripture and in works of piety. Sometime between roughly 390 and 404, Neilos and his wife mutually resolved to abandon worldly life: she and their daughter entered a women's monastery in Egypt, while Neilos and his son Theodulos departed for Mount Sinai."
  - heading: Life on Mount Sinai
    body:
      - On Sinai, father and son settled in a cave they dug out with their own hands, which remained Neilos's dwelling for some forty years. He devoted himself to fasting, vigil, and prayer, and was sought out for counsel by visitors of every station, including the emperor.
      - By tradition, Saracen raiders captured Theodulos, intending to sacrifice him to pagan gods, and eventually sold him into slavery; the bishop of a Palestinian city (named as Elusa or Emessa in differing accounts) ransomed him and made him a church doorkeeper. After Neilos found his son, the bishop ordained both men to the priesthood and permitted their return to Sinai.
  - heading: Writings
    body:
      - 'Neilos left an extensive body of writing. His compositions are commonly grouped into four categories: treatises on the virtues and vices; works about monastic life, including accounts of the Saracen invasion; a collection of roughly two hundred precepts called the "Admonitions"; and a large correspondence numbering over a thousand letters addressed to emperors, bishops, and religious leaders.'
      - Among his letters is a sharp denunciation of the Emperor Arkadios for the unjust exile of John Chrysostom. His best-known work, the Ascetic Discourse, is included in the first volume of the English Philokalia. In the modern printed tradition, Possinus published 355 of his letters and Allatius 1,061.
  - heading: Relics & Shrines
    body:
      - Neilos's relics were transferred to Constantinople during the reign of the Emperor Justin II (565–578) and deposited in the Church of the Holy Apostles.
  - heading: Veneration
    body:
      - Neilos is commemorated on November 12 in the Eastern Orthodox Church, and his feast is also observed on that day in the Roman Catholic calendar. He is venerated as well in the Armenian Apostolic Church.
