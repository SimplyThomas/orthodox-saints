  - claim: Martyrdom date is November 10, 852, but the capture/defense is dated 853–854 — the profile asserts both simultaneously, which is chronologically impossible.
    detail: The profile's martyrdom date is November 10, 852 (timeline entry and overview), but the Historical Context section and the 'Defense of Kartli' timeline entry both date the capture to '853–854.' A martyrdom in 852 cannot follow a capture in 853–854. The external sources themselves contain this ambiguity (HolyTrinityOrthodox gives 852; Wikipedia/Bugha article says Bugha's campaign began 852 and subdued the region 'by 853'), but the profile reproduces both dates without resolving the contradiction, making one of the two claims unsupported.
  - claim: Lifespan is given as c. 767/768 – November 10, 852.
    detail: No dossier source provides a birth date or birth year for Constantine. The birth year is a back-calculation (852 minus 85 years = 767) not stated in any external source. Additionally, given the internal date inconsistency (capture 853–854 vs. martyrdom 852), the birth year calculation is also unreliable. This is an inference not grounded in any dossier source.
