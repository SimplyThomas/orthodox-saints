id: OS-0995
liturgicalTitle: The Holy Martyr Ardalion the Actor
lifespan: died early 4th century
overview:
  - "Ardalion was an actor of the early fourth century who, by tradition, suffered for Christ during the persecution under the emperor Maximian Galerius (305-311). The sources remember him chiefly for the manner of his conversion: a performer who had built his reputation on mocking Christianity, he was transformed into a confessor in the very act of ridiculing it, and went from staging a burlesque of martyrdom to undergoing a real martyrdom himself."
  - According to the synaxarion, Ardalion was cast in a play in the role of a Christian. The character he portrayed at first refused to offer sacrifice to the idols and then, under pressure, consented to renounce Christ. At the moment the scene called for that renunciation, the saint instead ordered the audience to be silent and declared that he himself was truly a Christian. What the spectators took at first for part of the performance proved to be a genuine confession of faith.
  - When Ardalion persisted in confessing Christ before the crowd, the governor ordered him put to death. The tradition relates that he was bound upon a red-hot iron grill, and upon it he gave up his life and attained the crown of martyrdom. He is commemorated on April 14.
sections:
  - heading: The actor and his role
    body:
      - Ardalion's profession is central to how the Church remembers him. He is described as a talented actor, and one strand of the tradition specifies that his favourite role was a burlesque of the martyrs that mocked Christians in every possible way. His art was thus directed against the very faith he would come to die for.
      - The dramatic reversal is the heart of his story. The role he was performing scripted a Christian who weakened under interrogation and agreed to deny Christ; Ardalion broke from the script, silenced the theatre, and made the confession his own. The sources observe the irony that a man who had played the part of a martyr in mockery came to play it in truth.
  - heading: Martyrdom
    body:
      - Refusing to retract his confession, Ardalion was condemned by the governor. The accounts agree that he was executed by fire, bound to a red-hot iron grill or litter. His commemoration is kept on April 14.
