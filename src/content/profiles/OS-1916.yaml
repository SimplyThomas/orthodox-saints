id: OS-1916
lifespan: died 11 April 1509
overview:
  - Chariton of Syanzhemsk was a fifteenth- and early-sixteenth-century Russian monastic of the Vologda region, remembered as the disciple and successor of Saint Euthymius of Syanzhemsk. He shared with his spiritual father in the founding and sustaining of monastic life at the monastery established by the River Syanzhema.
  - The OCA Synaxarion describes him as the "beloved disciple" of Euthymius, the two devoting themselves together to prayer and to the labor of construction and supervision at the community. Following Euthymius's death around 1465, Chariton became the monastery's igumen (abbot) and continued its work for more than forty years, dying in old age on 11 April 1509. He is commemorated on September 28, and also on January 20 together with Euthymius.
liturgicalTitle: Our Venerable Father Chariton of Syanzhemsk
timeline:
  - when: c. 1465
    title: Succeeds as igumen
    body: On the death of Saint Euthymius of Syanzhemsk, who had formally designated him as successor, Chariton became igumen (abbot) of the monastery on the River Syanzhema.
  - when: c. 1465–1509
    title: Leadership of the monastery
    body: Chariton continued the work of the community for more than forty years, sustaining the monastic life he had shared in building with Euthymius.
  - when: 11 April 1509
    title: Repose
    body: Chariton died in old age and was buried at the Ascension church of the monastery, alongside his spiritual father Euthymius.
sections:
  - heading: Life and Monastic Labor
    body:
      - Chariton is known chiefly through his association with Saint Euthymius of Syanzhemsk, whose "beloved disciple" the OCA Synaxarion calls him. The two devoted themselves jointly to prayer and to the practical works of construction and supervision at the monastery Euthymius had established by the River Syanzhema, in the Vologda region.
      - Euthymius had founded the community with a church in honor of the Ascension of Christ. Before his death, he formally designated Chariton as his successor. Chariton accordingly became igumen and carried on the labor of the monastery for over forty years, until his own death in old age on 11 April 1509. He was buried at the Ascension church beside Euthymius.
  - heading: Saint Euthymius of Syanzhemsk
    body:
      - Chariton's spiritual father, Euthymius, was born in Vologda and received monastic tonsure at the Savior-Stone (Spaso-Kamenny) monastery at Lake Kuben. He first lived as a hermit in a solitary cell on the River Kuben, later yielding that hermitage to Saint Alexander of Kushta before relocating to Syanzhem, where he established the Ascension monastery.
      - Euthymius is commemorated on January 20, the day on which Chariton is also remembered alongside him. Bishop Ioasaph of Vologda, a sixteenth-century hagiographer, recorded accounts concerning Euthymius's relics after his death.
  - heading: Commemoration
    body:
      - Chariton's memory is celebrated on September 28, and also on January 20 with Saint Euthymius. The available sources name no specific glorification date or formal act of canonization for him.
