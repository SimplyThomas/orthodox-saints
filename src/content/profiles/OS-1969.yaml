    - idea: Retell the "doubting to believing" scene — Thomas touching the risen Christ's wounds and crying "My Lord and my God" — a lesson that honest questions can lead to deep faith.
    - idea: 'Do a "hands" craft: trace each child''s hands and write on them a question they have and a truth they trust, turning doubt into confession.'
    - idea: Learn that Thomas carried the Gospel as far as India — find it on a map and pray for the ancient St Thomas Christians.
