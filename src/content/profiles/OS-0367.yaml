id: OS-0367
liturgicalTitle: New Hieromartyr Gabriel (Yatsik), Archimandrite, of the Donskoy Monastery, Moscow
lifespan: 1880 – 1937
overview:
  - Gabriel (Yatsik) was an archimandrite of the Donskoy Monastery in Moscow who was put to death during the Soviet persecution of the Russian Orthodox Church in 1937. He is numbered among the Synaxis of New Martyrs and Confessors of Russia, and is commemorated on September 10.
  - According to Russian Orthodox biographical sources, he was born Grigory Petrovich Yatsik on November 20, 1880, in the town of Borzna in Chernihiv Governorate, into the family of a merchant. In 1906 he entered as a novice at the Holy Trinity-Saint Sergius Lavra, where he worked in the monastery's printing house as assistant to its director. He was ordained a hieromonk in 1924 and was elevated to the rank of archimandrite in 1929.
  - He served at the Donskoy Monastery in Moscow. After the monastery was closed by the Soviet authorities, he was appointed rector of the Church of the Holy Apostles Peter and Paul in the village of Petrovskoe (now within the city of Khimki) in Moscow Oblast. He was arrested on September 7, 1937, and held in Taganskaya prison, where he was accused of anti-Soviet agitation; the sources record that he did not confess to the charges under interrogation. He was executed by shooting on September 23, 1937, at the Butovo firing range near Moscow and buried in an unmarked mass grave.
sections:
  - heading: Arrest and Martyrdom
    body:
      - The accusation against him rested on religious books found during a search of his quarters and on testimony alleging hostility toward Soviet power. Such charges of "anti-Soviet agitation" were characteristic of the mass repression of clergy in 1937. The sources relate that he declined to admit guilt during his interrogations.
      - He was among the many clergy, monastics, and laity shot at the Butovo firing range on the outskirts of Moscow, one of the principal execution sites of the period. He is commemorated both within the wider Synaxis of New Martyrs and Confessors of Russia and among the New Martyrs who suffered at Butovo.
