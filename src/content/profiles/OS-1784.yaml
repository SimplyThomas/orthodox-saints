lifespan: 15th–early 16th century (reposed c. 1504)
liturgicalTitle: Our Venerable Father Adrian of Uglich
overview:
  - Saint Adrian of Uglich was a Russian monastic of the late fifteenth and early sixteenth centuries, numbered among the first disciples of Saint Paisius of Uglich, whom he served as cell-attendant, close disciple, and fellow ascetic. His life is recorded chiefly in connection with the monastic community that grew up around Saint Paisius near the town of Uglich on the Volga.
  - Adrian shared in the formative events of that community, including a vision associated with the dedication of a church to the Protection of the Theotokos, and he later took part in establishing a daughter monastery dedicated to Saint Nicholas, of which he was made superior. He reposed around the year 1504 and is commemorated on August 26.
timeline:
  - when: "1472"
    title: Vision of the Theotokos
    body: While the brethren were chanting, according to the tradition recorded in his life, Adrian was among the monks—together with Saints Paisius, Cassian, and Gerasimos—who beheld the monastery filled with an extraordinary light and the Mother of God enthroned with the Divine Infant. An angel is said to have directed them to raise a church in honor of the Protection of the Theotokos at that place.
  - when: "1482"
    title: Building of the Protection church
    body: Adrian assisted in constructing a stone church dedicated to the Protection of the Theotokos at the site indicated in the vision. The synaxarion relates that an icon of the Protection was found in connection with this church.
  - when: "1489"
    title: Founding of the Saint Nicholas monastery
    body: Adrian helped Saint Paisius establish a monastery dedicated to Saint Nicholas near the Grekhova stream, on the right bank of the Volga. He was appointed superior of the community and ordained a hieromonk.
  - when: June 6, 1504
    title: Funeral of Saint Paisius
    body: Adrian attended the funeral of his elder, Saint Paisius of Uglich. He reposed around the same time and, by his elder's wish, was buried near Paisius's grave.
sections:
  - heading: Veneration
    body:
      - Saint Adrian is commemorated on August 26 and also on Cheesefare Saturday. According to the accounts of his life, his formal glorification likely took place in the seventeenth century.
      - On March 10, 1964, his name was entered among the Synaxis of the Saints of Rostov and Yaroslavl, the regional commemoration under which many saints of that part of Russia are remembered.
companions:
  - name: St. Paisius of Uglich
    note: Spiritual father and elder; Adrian was among Paisius's first disciples and his cell-attendant, shared in the vision of the Theotokos at Uglich, and by his elder's wish was buried near him.
