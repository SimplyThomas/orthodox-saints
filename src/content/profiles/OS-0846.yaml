  - name: Saint Justin (Popović) of Ćelije
    note: His disciple and spiritual son, who rests near Lelić at Ćelije Monastery; both came to be called new Chrysostoms of the Serbian Church.
    href: saint/OS-2591
  - name: Saint Sebastian (Dabovich) of Jackson
    note: The American-born Serbian missionary at whose funeral Nikolai presided at Žiča Monastery in 1940.
