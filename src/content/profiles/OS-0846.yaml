works:
  - title: The Prologue of Ohrid
    desc: His best-known work (1926), a year-long cycle of saints' lives, hymns, reflections, and spiritual counsel for every day of the year, widely beloved across the Orthodox world.
  - title: Prayers by the Lake
    desc: A hundred contemplative prayers in poetic prose written beside Lake Ohrid (1922), widely regarded as his literary masterpiece.
  - title: Homilies
    desc: A collection of his sermons on the Gospel readings of the church year (1925).
  - title: The Religious Spirit of the Slavs
    desc: Lectures on the faith of the Slavic peoples given in England during the First World War (1916).
  - title: Thoughts on Good and Evil
    desc: Short aphoristic reflections on the spiritual life (1923).
  - title: Words to the Serbian People Through the Dungeon Window
    desc: Reflections written during his imprisonment at Dachau.
  - title: The Life of St. Sava
    desc: A life of the founder of the Serbian Church, written in America (1951).
reading:
  - heading: Editions of His Works
    items:
      - title: The Prologue of Ohrid
        type: Two-volume English translation (Sebastian Press, Western American Diocese)
      - title: The Prologue From Ohrid
        type: English translation set (St. Vladimir's Seminary Press)
influence:
  heading: Influence in America
  intro: "The final American decade of the Serbian Chrysostom left living landmarks from a Pennsylvania seminary to Serbian monasteries and presses across the country."
  places:
    - name: St. Tikhon's Orthodox Theological Seminary
      kind: Seminary
      place: South Canaan, Pennsylvania
      note: "Nikolai came to St. Tikhon's as a professor in 1951 and served as rector of the seminary until his repose there on March 18, 1956; the room where he died is kept as a shrine."
    - name: St. Sava Monastery
      kind: Monastery
      place: Libertyville, Illinois
      note: "His first resting place. He was buried at the Serbian monastery in Libertyville in 1956 and lay there until 1991, when his relics were translated to his home village of Lelic in Serbia."
    - name: Monastery of St. Nikolaj of Žiča
      kind: Monastery
      place: China Township, Michigan
      note: "A Serbian Orthodox monastery of the Eparchy of New Gračanica and Midwestern America, north of Detroit, dedicated to him."
    - name: Sebastian Press
      kind: Press
      place: Alhambra, California
      note: "The publishing house of the Serbian Western American Diocese carries his works in English, keeping his voice — including the Prologue — before American readers."
