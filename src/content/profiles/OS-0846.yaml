id: OS-0846
lifespan: 1881 – 1956
liturgicalTitle: Our Father among the Saints Nikolai, Bishop of Ohrid and Žiča, the New Chrysostom
overview:
  - Nikolai Velimirović (born Nikola Velimirović) was a Serbian Orthodox bishop, theologian, and one of the most influential and prolific spiritual writers of the twentieth century. Widely regarded as a gifted orator, he came to be called the 'New Chrysostom' for his preaching and writing.
  - Born in 1881 in the village of Lelić in Serbia, he served as Bishop of Ohrid and Žiča, was imprisoned with the Serbian Patriarch in the Dachau concentration camp during the Second World War, and after the war emigrated to the United States, where he taught at Orthodox seminaries until his death in 1956. He is the author of the Prologue of Ohrid. The Serbian Orthodox Church glorified him as a saint in 2003, and he is commemorated on March 18.
timeline:
  - when: "1881"
    title: Birth in Lelić
    body: He was born Nikola Velimirović on January 4, 1881, in the village of Lelić near Valjevo in the Principality of Serbia, to a family of pious farmers, Dragomir and Katarina Velimirović.
  - when: 1905–1908
    title: Education and doctorate
    body: He graduated from the Seminary of Saint Sava in Belgrade in 1905 and pursued advanced theological studies in Russia and Western Europe, earning his doctorate of divinity from the Old Catholic Theological Faculty at the University of Berne, with distinction, in 1908; his dissertation concerned faith in the Resurrection of Christ as the foundation of the dogmas of the apostolic Church.
  - when: "1909"
    title: Monastic tonsure
    body: In 1909, after recovering from dysentery, he was tonsured a monk and received the name Nikolaj.
  - when: 1919–1920
    title: Episcopate at Žiča and Ohrid
    body: He became Bishop of Žiča in 1919 and subsequently served as Bishop of Ohrid and of Žiča. As a hierarch and writer he became one of the most prominent figures in the Serbian Orthodox Church.
  - when: "1944"
    title: Imprisonment at Dachau
    body: In 1944 he was sent to the Dachau concentration camp together with the Serbian Patriarch Gavrilo. The two were held as 'special prisoners' for a period before their release in December 1944.
  - when: "1946"
    title: Emigration to the United States
    body: After the war he immigrated as a refugee to the United States in 1946, where he taught at St. Sava's Seminary in Libertyville, Illinois, at St. Tikhon's Orthodox Theological Seminary in South Canaan, Pennsylvania, and at St. Vladimir's Orthodox Theological Seminary.
  - when: "1956"
    title: Repose in Pennsylvania
    body: He died on March 18, 1956, at Saint Tikhon's Seminary in Pennsylvania.
  - when: "1991"
    title: Translation of relics to Lelić
    body: His remains were repatriated to Serbia and re-buried in his home village of Lelić on May 12, 1991.
  - when: "2003"
    title: Glorification
    body: On May 19, 2003, the Holy Assembly of Bishops of the Serbian Orthodox Church recognized Bishop Nikolaj (Velimirović) of Ohrid and Žiča as a saint and entered his name into the calendar of saints.
sections:
  - heading: Writings and Legacy
    body:
      - Nikolai was an exceptionally prolific author whose work spanned theology, homiletics, and devotional literature. His best-known book is The Prologue from Ohrid (1926), a year-long collection of saints' lives, reflections, and counsel that became widely beloved across the Orthodox world. Other major works include Prayers by the Lake (1922) and his collected Homilies (1925).
      - His complete works were later published in twenty-three volumes by the Glas Crkve publishing house in Valjevo, Serbia. For the power of his preaching and writing he came to be widely regarded as the 'New Chrysostom'; Saint John Maximovitch described him as a great saint and a Chrysostom of his day.
  - heading: Relics & Shrines
    body:
      - After his death in the United States in 1956, the relics of Saint Nikolai were translated to Serbia and re-interred in his native village of Lelić on May 12, 1991, where by tradition he rests near his friend and disciple Father Justin Popović. He is commemorated both on March 18 and on the feast of the translation of his relics.
companions:
  - name: Patriarch Gavrilo V of Serbia
    note: Held with Nikolai as a 'special prisoner' at the Dachau concentration camp in 1944.
    commemorated: false
  - name: Saint Justin (Popović) of Ćelije
    note: His disciple and spiritual son, who rests near him at Lelić; both came to be called new Chrysostoms of the Serbian Church.
    href: saint/OS-2591
related:
  - name: Saint John of Shanghai and San Francisco
    note: His contemporary in the Russian emigration, who venerated him as a great saint and called him a Chrysostom of his day.
    href: saint/OS-0050
