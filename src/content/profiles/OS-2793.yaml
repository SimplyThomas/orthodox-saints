lifespan: died c. 772
overview:
  - Tetta (died c. 772) was the abbess of Wimborne, a large Anglo-Saxon double monastery in Dorset, England, during the early eighth century. Of royal birth, she is described in the sources as a sister of the king, though she was esteemed more for her conduct than for her lineage.
  - Under her governance Wimborne flourished as a house of many nuns and an educational centre in the Benedictine tradition, and it was from her community that Saint Lioba, Saint Thecla of Kitzingen, and other women were sent to assist Saint Boniface's mission in Germany.
  - She is chiefly known through Rudolf of Fulda's Life of Leoba, which preserves accounts of her strict enclosure, her formation of the nuns by example, and miracles associated with her intercessory prayer. Her feast is kept on September 28.
liturgicalTitle: Our Venerable Mother Tetta, Abbess of Wimborne
sections: []
timeline:
  - when: c. 705
    title: Wimborne founded
    body: The double monastery of Wimborne is established in Dorset by Cuthburh, later the community that Tetta would govern.
  - when: early 8th century
    title: Abbess of Wimborne
    body: Tetta, a sister of the king, governs the double monastery, ruling both the men's and women's communities with a strict rule of enclosure.
  - when: "748"
    title: Nuns sent to the German mission
    body: At Saint Boniface's request, Tetta consents to send Lioba, Thecla, and other sisters from Wimborne to assist his mission in Germany.
  - when: c. 772
    title: Death
    body: Tetta dies after governing Wimborne; she is venerated as a saint, her canonisation being pre-Congregation.
