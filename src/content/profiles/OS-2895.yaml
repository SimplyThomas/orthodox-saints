id: OS-2895
lifespan: 1729–1789
overview:
  - Venerable Alexandra of Diveyevo (in the world Agafia Semyonovna Melgunova) was an eighteenth-century Russian noblewoman who, following visions of the Mother of God, founded the convent of Diveyevo in Nizhny Novgorod province and served as its first superior. Born in Ryazan in 1729 to the noble landowners Simeon and Paraskeva, she inherited a large estate and was widowed young when her husband, Colonel Melgunov, died, leaving her with a three-year-old daughter.
  - Around 1760 she traveled to Kiev seeking spiritual guidance, where the Caves elders blessed her monastic vows; she was tonsured at the Frolov (Florovsky) Convent with the name Alexandra and was directed to keep her monasticism secret while making pilgrimages across Russia. Guided by visions of the Theotokos — who designated Diveyevo as her 'fourth chosen portion' in the world, alongside Mount Athos, Georgia, and the Kiev Caves Lavra — she settled there, sold her estate, freed her serfs, and used her wealth to build churches and gather a community of ascetics.
  - She lived in voluntary poverty, performing the most menial labor, and shortly before her death received the Great Schema. She reposed on June 13, 1789, having entrusted the care of her sisters to the young hierodeacon who would become St. Seraphim of Sarov. Her relics were uncovered in 2000 and she was glorified by the Russian Orthodox Church, her commemoration extended to the whole Church in 2004.
liturgicalTitle: Our Venerable Mother Alexandra of Diveyevo, Foundress and First Superior of the Diveyevo Convent
patronage:
  - Diveyevo Convent
  - Monastic foundresses
  - Widows
  - Voluntary poverty
timeline:
  - when: "1729"
    title: Birth in Ryazan
    body: Agafia Semyonovna Melgunova is born in Ryazan to the noble landowners Simeon and Paraskeva, inheriting a substantial estate of some seven hundred serfs and lands across the Yaroslavl, Vladimir, and Ryazan provinces.
  - when: c. 1760
    title: Widowed and tonsured in Kiev
    body: Widowed young after the death of her husband, Colonel Melgunov, she travels to Kiev with her young daughter. The Caves elders bless her monastic vows and she is tonsured at the Frolov (Florovsky) Convent with the name Alexandra, being instructed to keep her monasticism secret and to undertake pilgrimages.
  - when: c. 1760
    title: Vision of the Theotokos at Diveyevo
    body: By tradition the Mother of God appears to her, first in Kiev directing her northward, and again near Diveyevo, confirming the place as her 'fourth chosen portion' in the world, alongside Mount Athos, Georgia, and the Kiev Caves Lavra.
  - when: "1767"
    title: Building of the Kazan Church
    body: After the death of her young daughter, she sells her estate, frees her serfs, and applies the proceeds to charitable works and church-building. She begins construction of a church in honor of the Kazan Icon of the Mother of God on the site of the vision.
  - when: "1772"
    title: Consecration of the Kazan Church
    body: The stone Kazan Church at Diveyevo is consecrated. Alexandra builds the first monastic cells beside it, forming a community that lived under a rule of voluntary poverty, hospitality to pilgrims, handiwork, and the unceasing Jesus Prayer, guided by the Sarov elders Pachomius and Isaiah.
  - when: "1789"
    title: Great Schema and repose
    body: Sensing death approaching, she receives the Great Schema, retaining the name Alexandra, and entrusts the spiritual care of her sisters to the young hierodeacon who would become St. Seraphim of Sarov. She reposes on June 13, 1789.
  - when: "2000"
    title: Uncovering of relics and glorification
    body: Her relics, together with those of Schema-nun Martha and Nun Elena, are uncovered on September 26, 2000. In December 2000 the Saints of Diveyevo are glorified among the locally venerated saints of the Nizhny Novgorod diocese.
  - when: "2004"
    title: Church-wide commemoration
    body: On October 6, 2004, the Bishops' Council of the Russian Orthodox Church extends the commemoration of the Diveyevo saints to the entire Russian Orthodox Church.
sections:
  - heading: Foundation of Diveyevo
    body:
      - Directed by her Kiev elders to travel and to keep her monastic state hidden, Alexandra received two visions of the Most Holy Theotokos. The first, in Kiev, instructed her to journey northward to find a divinely designated place; the second, near the village of Diveyevo, confirmed it as the Mother of God's 'fourth chosen portion' in the world, ranked with Mount Athos, Georgia, and the Kiev Holy Trinity Lavra of the Caves.
      - She settled first in the nearby village of Osinovka for about three years before relocating to Diveyevo. There, from 1767, she oversaw the building of a church in honor of the Kazan Icon of the Mother of God on the site of the vision; the stone church was consecrated in 1772. She used her inherited wealth to fund the construction of twelve churches in all, among them the Dormition Cathedral at nearby Sarov.
      - "Around the Kazan Church she built the first monastic cells and gathered a small community of ascetics. She established its rule under the guidance of the Sarov elders Pachomius and Hieromonk Isaiah: voluntary poverty, the reception of pilgrims and wanderers, handiwork, and the unceasing Jesus Prayer. By 1788 the community had received official land grants and additional cells were built."
  - heading: Ascetic Life
    body:
      - Though she came from wealth, Alexandra embraced voluntary poverty in the fullest measure. Sources recall that she cleaned cattle sheds, washed clothes, and wore threadbare garments over a hair-shirt, taking upon herself the most difficult physical labor of the community she led.
      - Shortly before her death she received the Great Angelic Schema, keeping the name Alexandra. Sensing her end approaching, she entrusted the spiritual care of her sisters to a young hierodeacon then visiting from Sarov — the future St. Seraphim of Sarov — under whom the Diveyevo community would later flourish. She reposed on June 13, 1789.
  - heading: Relics & Shrines
    body:
      - The relics of Venerable Alexandra, together with those of Schema-nun Martha and Nun Elena, were uncovered on September 26, 2000. They are preserved in the lower church of the Nativity of the Mother of God at the Seraphim-Diveyevo Monastery.
      - Alexandra is numbered among the six ascetics canonized as saints of Diveyevo — Alexandra, Martha, Helen, Pelagia, Paraskeva, and Mary — whose relics remain in the convent's churches.
  - heading: Veneration and Miracles
    body:
      - "Historically Documented: St. Seraphim of Sarov held Venerable Alexandra in profound reverence, and after her repose directed pilgrims to visit her grave and ask her prayers, foretelling the later uncovering of her relics and her glorification. Sources record the healing in 1879 of Lieutenant F. N. Sergeyev from an incurable illness through anointing with holy myrrh from her relics, and further healings attributed to her wonderworking icon."
      - "Traditional Accounts: Tradition preserves St. Seraphim's words of veneration — that her clothing bore many patches and that he kissed the prints of her feet — and describes her relics as displaying the skeleton entire, the bones 'like the purest amber.' Witnesses recalled her as of average height, with a round and fair face, grey eyes, and light brown hair in her youth."
  - heading: Commemoration
    body:
      - Venerable Alexandra's principal feast is June 13, the day of her repose. She is also commemorated on June 14 with the Synaxis of All Saints of Diveyevo, on July 15 with the Synaxis of All Saints of Kiev, and on August 27 with the Synaxis of Saints of Nizhny Novgorod.
