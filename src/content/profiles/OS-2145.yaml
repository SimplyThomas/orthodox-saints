id: OS-2145
liturgicalTitle: Our Venerable Father Nicander, Abbot of Gorodensk
overview:
  - Venerable Nicander, Abbot of Gorodensk, was a monastic superior associated with a monastery at Gorodensk in the Novgorod region of Rus'. He is commemorated by the Orthodox Church on November 4.
  - No detailed life of Nicander survives. He is identified in the calendar by title alone — as a venerable (monastic) father and an abbot — and the Orthodox Church in America, which otherwise supplies a synaxarion life for nearly every saint on its calendar, records 'No information available at this time' on his dedicated life page.
sections:
  - heading: Commemoration
    body:
      - Nicander appears on the Orthodox Church in America's November 4 calendar, which holds a dedicated life page and a troparion-and-kontakion page for him, confirming a full liturgical commemoration despite the absence of any narrative vita.
      - The troparion assigned to him is the standard Tone 8 troparion used broadly for venerable monastic saints ('By a flood of tears you made the desert fertile...') and is not specific to Nicander; it supplies no biographical detail. No other jurisdictional calendar or hagiographical source examined carries a substantive entry for him.
