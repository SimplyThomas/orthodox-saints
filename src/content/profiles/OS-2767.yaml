id: OS-2767
lifespan: c. 612 – 686
liturgicalTitle: Our Venerable Mother Waltrude of Mons
overview:
  - Waltrude of Mons (also rendered Waldetrude, Valdetrudis, Vaudru, or Waltrudis) was a Frankish noblewoman of the seventh century who, after raising a family and outliving her married life, founded and entered a monastic community at the place that would grow into the city of Mons in present-day Belgium. She was born about 612 (sources place her birth between c. 610 and c. 612) at Cousolre in northern France, and died on 9 April 686.
  - "She belonged to a family in which sanctity ran through several generations: her parents, her sister, her husband, and all four of her children came to be venerated as saints. Married to Vincent Madelgarus, a leading lord of the Frankish royal court, she persuaded her husband to embrace the monastic life and afterward received the religious veil herself, living out her widowhood in asceticism, charity, and the ransoming of captives."
  - As a pre-schism Western saint, Waltrude is honored in Orthodox traditions that commemorate saints of the undivided Church, though she does not appear in the OCA synaxarion and no distinct Orthodox glorification act is recorded; her veneration is early medieval and predates the formal Roman canonization process. She remains the patron saint of Mons, where her relics are enshrined.
sections:
  - heading: A Household of Saints
    body:
      - Waltrude was the daughter of Walbert (also called Walbert IV or Walbert of Hainault) and Bertille of Thuringia, both venerated as saints. Her sister was Aldegund (Aldegundis), foundress of Maubeuge Abbey, and she was cousin to Saint Aye.
      - "She married Vincent Madelgarus, count of Hainault, a principal lord at the court of King Dagobert. The couple had four children, all later venerated as saints: Landericus (Landry of Soignies, described in Western tradition as bishop of Metz), Dentelin of Mons, Aldetrude (abbess of Maubeuge Abbey), and Madalberta of Maubeuge, who succeeded her sister Aldetrude as abbess."
      - Around 642 Madelgarus founded Hautmont Abbey. At Waltrude's urging he later withdrew into monastic life there, taking the name Vincent, under which he is venerated (as Saint Vincent of Soignies, commemorated 20 September).
  - heading: Monastic Foundation at Mons
    body:
      - Following the withdrawal of her husband into monastic life — placed by one account around 656, after the death of their son Dentelin — Waltrude devoted herself to spiritual life. She spent a period as a disciple of Abbot Saint Ghislain (Guislain), whom she had earlier persuaded to establish an oratory at a place called Ursidongus, now Saint-Ghislain.
      - About 656 she received the religious veil from Saint Aubert, bishop of Cambrai. Hydulphe of Lobbes built her a cell and chapel at a place called Castriloc, on the site of the future Mons, near Ghislain's oratory.
      - The small community that gathered around her grew into a religious house and eventually became a royal chapter of canonesses. Her biography records that within it she lived as an ordinary member rather than as a leader, and that she endured much slander from the secular world during her lifetime.
  - heading: Charity and Ransom of Captives
    body:
      - Waltrude's vita celebrates her efforts to free captives, whom she redeemed through ransom payments drawn from her personal resources. This work of liberation is among the acts most closely associated with her memory.
  - heading: Relics & Shrines
    body:
      - Waltrude's relics are preserved in the Saint Waltrude Collegiate Church (Collégiale Sainte-Waudru) in Mons, Belgium, which stands as the center of her veneration.
      - Her reliquary shrine is carried in procession each year during the Ducasse de Mons festival, when it is placed on the 'car d'or', a gilded cart, and drawn through the streets of the city.
  - heading: Note on the Sources
    body:
      - "The details of Waltrude's life come from Western hagiographical and Catholic references; OrthodoxWiki carries no article on her and the OCA calendar for 9 April does not list her. Sources differ on some dates: her birth is given variously as c. 610 or c. 612, and her death as 686 or c. 688. This profile follows the anchor feast of 9 April and the commonly cited death year of 686."
timeline:
  - when: c. 612
    title: Birth at Cousolre
    body: Waltrude is born at Cousolre in northern France to Walbert of Hainault and Bertille of Thuringia, both later venerated as saints.
  - when: c. 642
    title: Foundation of Hautmont Abbey
    body: Her husband, Vincent Madelgarus, founds Hautmont Abbey.
  - when: c. 656
    title: Husband enters monastic life
    body: Persuaded by Waltrude, Madelgarus withdraws into monastic life at Hautmont, taking the name Vincent; the account links this to the period following their son Dentelin's death.
  - when: "656"
    title: Receives the religious veil
    body: Waltrude receives the veil from Saint Aubert, bishop of Cambrai, after a period as a disciple of Abbot Saint Ghislain.
  - when: c. 656
    title: Cell and chapel at Mons
    body: Hydulphe of Lobbes builds her a cell and chapel at Castriloc, the future site of Mons; the community that gathers there grows into a chapter of canonesses.
  - when: 9 April 686
    title: Repose at Mons
    body: Waltrude dies of natural causes at Mons; her relics are enshrined in the collegiate church that bears her name.
