flagReasons:
  - claim: Patronage includes 'Ransomed captives' as a named patronage category
    detail: No external source names her as patron saint of ransomed captives. Wikipedia explicitly limits her patronage to 'Mons and Herentals, Belgium'; anastpaul to 'Mons and Hainault'; catholicsaints.info to 'Frameries, Hainault, and Mons.' The sources only document ransoming captives as a work she performed, not a formal patronage designation. This is an inference not grounded in the dossier.
