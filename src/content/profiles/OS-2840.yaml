id: OS-2840
lifespan: c. 305 – 384
overview:
  - Pope Saint Damasus I served as Bishop of Rome from 366 to 384, an episcopate of roughly eighteen years during which he defended the Nicene faith against the Arian, Apollinarian, and Macedonian heresies. He was born around 305, most probably in Lusitania in Hispania (in territory now part of Portugal), though some accounts place his birth in Rome; his parents were Antonius and Laurentia.
  - "He is chiefly remembered for three enduring contributions: entrusting the learned monk Jerome with the revision of the Latin Scriptures that became the Vulgate, presiding over councils that fixed the canon of Scripture, and adorning the tombs of the Roman martyrs in the catacombs with verse epitaphs of his own composition. He reposed on December 11, 384, and is venerated as a pre-schism Western saint in the Eastern Orthodox Church, and also in the Catholic Church and Oriental Orthodoxy."
liturgicalTitle: Our Father among the Saints Damasus, Pope of Rome
patronage:
  - Biblical scholarship
  - Archaeology of the martyrs
timeline:
  - when: c. 305
    title: Birth
    body: Born around 305, most probably in Lusitania in Hispania, though some sources place his birth in Rome, to Antonius and Laurentia.
  - when: Before 366
    title: Service in Rome
    body: Served at the Church of San Lorenzo in Rome and rose to the office of archdeacon under Pope Liberius.
  - when: October 366
    title: Election as Bishop of Rome
    body: Elected pope by a large majority in succession to Liberius, but faced violent opposition from supporters of the rival deacon Ursinus.
  - when: "367"
    title: Imperial recognition
    body: Emperor Valentinian I recognized Damasus and banished his rival Ursinus to Cologne.
  - when: 368–369
    title: Roman synods against heresy
    body: Convened two councils at Rome condemning Apollinarianism and Macedonianism; around this time he also excommunicated Auxentius, the Arian Bishop of Milan.
  - when: "382"
    title: Council of Rome and the Vulgate
    body: Presided over the Council of Rome, which established the official canon of sacred Scripture, and commissioned Jerome, his confidential secretary, to revise the Latin Bible.
  - when: December 11, 384
    title: Repose
    body: Died in Rome and was buried in a small church he had built on the Via Ardeatina, alongside his mother and sister.
sections:
  - heading: A Contested Election
    body:
      - "Damasus served at the Church of San Lorenzo in Rome and eventually became archdeacon. On the death of Pope Liberius in October 366 he was elected Bishop of Rome by a large majority, but the election was violently contested: the deacon Ursinus was set up as a rival by supporters drawn largely from the lower classes, while the patricians backed Damasus. Emperor Valentinian I recognized Damasus's authority and banished Ursinus to Cologne in 367."
      - In 378 Damasus faced an accusation of adultery, but he was exonerated both by Emperor Gratian and by a Roman synod of forty-four bishops.
  - heading: Defender of the Nicene Faith
    body:
      - Damasus actively combated the heresies of his age. Through two Roman synods held in 368 and 369 he condemned Apollinarianism, which denied the fullness of Christ's humanity, and Macedonianism, which denied the divinity of the Holy Spirit. Around 369–370 he excommunicated Auxentius, the Arian Bishop of Milan.
      - "His concern for orthodoxy extended to the wider Church: he sent legates to the Second Ecumenical Council, held at Constantinople in 381, where the assembled fathers likewise voted against these heresies."
  - heading: The Canon of Scripture and the Vulgate
    body:
      - A Roman synod of 374 proclaimed an important statement on the New Testament canon, and the Council of Rome in 382, over which Damasus presided, established the official canon of sacred Scripture.
      - When Jerome came to Rome, Damasus appointed him his confidential secretary and, in 382, entrusted to him the revision of the older Latin translations of the Bible. Jerome worked on this project in Rome during roughly 382 to 385; the result was the Latin version later known as the Vulgate, which would shape Western Christianity for more than a thousand years.
  - heading: Poet of the Martyrs
    body:
      - Damasus restored and opened access to the tombs of the martyrs in the catacombs of Rome, setting up tablets bearing verse inscriptions that he composed himself. These epitaphs were executed in a distinctive lettering, the so-called Damasan Letters, cut by his associate Furius Dionysius Filocalus.
      - His surviving poetry includes brief epigrammatic verses and hymns, the Carmina, honoring various martyrs and saints.
  - heading: Building in Rome
    body:
      - Damasus restored the church of San Lorenzo in Damaso and built a marble monument, the so-called Platonia, in the basilica of St. Sebastian, commemorating the tradition of the temporary transfer of the bodies of the Apostles Peter and Paul. He also built a baptistery at the Vatican in honor of St. Peter.
      - He constructed a small church on the Via Ardeatina, where he was eventually buried together with his mother and his sister.
