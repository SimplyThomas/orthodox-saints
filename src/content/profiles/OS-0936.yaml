id: OS-0936
liturgicalTitle: The Holy New Martyr Niketas of Serres
lifespan: d. 1808
overview:
  - Niketas of Serres was an Athonite monk martyred under Ottoman rule in 1808. He had lived in the monastic community of Mount Athos, associated with the Russian monastery of Saint Panteleimon and the Skete of Saint Anne, before traveling to the city of Serres in Macedonia with the deliberate intention of confessing Christ before the Ottoman authorities and suffering death for the faith.
  - Sources differ on his national origin; the OCA synaxarion describes him as a Slav from Albania, while other accounts of his life propose an origin in Epirus or Trebizond and place his birth roughly between 1760 and 1770. He is venerated as the patron saint of Serres, the place of his martyrdom, and is counted among the New Martyrs who suffered during the Ottoman period.
timeline:
  - when: "1808"
    title: Journey to Serres
    body: Longing for martyrdom, Niketas left the Holy Mountain and traveled to Serres, arriving on Great and Holy Monday. He disclosed to the local abbot that he was a hieromonk from Mount Athos.
  - when: "1808"
    title: Confession and arrest
    body: After receiving Communion, he went to a mosque and openly disputed with the Muslim authorities, confessing Christ. He was reported to the local official, imprisoned overnight, and interrogated.
  - when: "1808"
    title: Martyrdom
    body: Unable to make him recant, his captors tortured him and hanged him on the evening of Great and Holy Saturday. His body was left suspended for several days until Christians were permitted to take it down and bury it.
sections:
  - heading: Monastic life on Athos
    body:
      - Before his martyrdom Niketas belonged to the monastic world of Mount Athos. Accounts connect him with the Russian monastery of Saint Panteleimon and with the Skete of Saint Anne, where he is said to have lived a life of fasting, prayer, and vigils. Some accounts record that he was ordained deacon and priest, and the OCA synaxarion reports that on arriving in Serres he identified himself as a hieromonk.
  - heading: Veneration
    body:
      - Niketas is commemorated on April 4. Christians of Serres buried his body after his execution, and he came to be honored as the patron saint of the city. Relics associated with him are reported to have been kept at the Skete of Saint Anne on Athos.
patronage:
  - City of Serres
