id: OS-2783
lifespan: 10th century (lived during the reign of Constantine VII Porphyrogennitos, 901–959)
overview:
  - Venerable Basil was a Cappadocian monastic father of the tenth century who founded and served as first abbot (igoumen) of the Monastery of Vatheos Ryakos — the "Deep Stream" — at Trigleia in Bithynia, in Asia Minor. He lived during the reign of the Byzantine emperor Constantine VII Porphyrogennitos (901–959).
  - Sources describe him as known not only for his piety but also for his education and his zeal to serve the faith and the Church. At his monastery he taught pious young men who in turn became teachers of the people and went on to govern other monasteries well, so that his foundation became a seedbed of monastic leadership.
  - He is commemorated on July 1. He is distinct from Saint Basil the New, a separate tenth-century figure.
liturgicalTitle: Our Venerable Father Basil, Founder of the Monastery of Vatheos Ryakos
patronage:
  - Monastic founders
  - Monastic teachers
timeline:
  - when: 901–959
    title: Reign of Constantine VII Porphyrogennitos
    body: Basil lived and labored during the reign of the emperor Constantine VII Porphyrogennitos, the period to which his monastic activity is dated.
  - when: c. 956
    title: Foundation of the Monastery of Vatheos Ryakos
    body: Basil established the Monastery of Vatheos Ryakos (the "Deep Stream"), also called the Monastery of the Transfiguration of Christ the Savior, at Trigleia in Bithynia. A monastery at Trigleia rendered "Christ-Sauveur / Ruisseau-Profond" is recorded as built in 956, likely corresponding to this foundation.
  - when: 10th century
    title: Succession of abbots
    body: Basil was succeeded as abbot by Peter the Pious (second abbot), then by Luke of Lycaonia (third abbot, late tenth century), and by Ignatios, who governed under the emperors Nikephoros Phokas and John Tzimiskes until about 975 and greatly expanded the monastery.
sections:
  - heading: The Monastery of Vatheos Ryakos
    body:
      - Basil's foundation stood near medieval Trigleia (modern Tirilye, in the Mudanya district of Bursa Province, Turkey), a town that was an important religious center for Greek Orthodox Christians during the Byzantine Empire and home to several monasteries, including Medikion and Pelekete.
      - 'The monastery was known by several names: Vatheos Ryakos or the "Deep Stream," and the Monastery of the Transfiguration of Christ the Savior — the Soteros (Savior) Monastery, known locally in Turkish as Aya Sotiri. Its church was a rectangular, east–west nave with a rounded apse and a narthex at the western end, measuring roughly sixteen by nine meters.'
  - heading: Teacher and founder
    body:
      - The sources emphasize Basil's combination of piety and learning. He taught pious youths who themselves became teachers of the people and capable governors of other monasteries, making his community a source of monastic leadership across the region.
      - "A liturgical verse commemorates him: rendered in translation, it observes that Basil reigned over his irrational passions — a summary of the ascetic self-mastery for which he was remembered."
  - heading: Successors and legacy
    body:
      - After Basil, the abbacy passed to Peter the Pious, then to Luke of Lycaonia in the late tenth century, and then to Ignatios, who governed during the reigns of Nikephoros Phokas and John Tzimiskes until about 975.
      - Under Ignatios the monastery expanded significantly. He built additional churches near the monastery dedicated to the Archangel Michael the Commander, the Prophet Elias, and the Holy Apostles.
  - heading: Later history of the site
    body:
      - The monastery declined over the centuries. By the 1880s it was described as neglected, with only the church's four walls and scattered columns remaining; around 1910 it appeared recently restored. When the site was mapped in 1987 after brush clearing, it survived chiefly as ruins and debris.
      - In 1988 the landowner used heavy machinery to clear the site and built a shed, and by 2017 only piles of stone from the original walls persisted. The complex now lies largely in ruins, with some structures used as animal shelters.
  - heading: Relics & Shrines
    body:
      - No death date, burial place, or relics of Saint Basil are recorded in the available sources. He appears to have been commemorated in the Byzantine calendar; no separate act of modern glorification is documented.
