id: OS-0585
liturgicalTitle: The Holy Martyr Adrian of Caesarea
lifespan: d. c. 309
overview:
  - Adrian was a martyr of Caesarea in Palestine, one of the last to suffer in the great persecution there, about the year 309. He is commemorated on February 3, together with the Martyr Eubulus, his companion.
  - By the accounts he was seized and brought before the governor Firmilianus, and having confessed Christ he was condemned. He was put to death by the sword, and so entered into eternal life among the martyrs of the persecution recorded at Caesarea.
companions:
  - name: Martyr Eubulus of Caesarea
    note: Fellow martyr; suffered with Adrian at Caesarea in Palestine about 309, the last to die in the persecution there as recorded by Eusebius.
    href: saint/OS-0586
related:
  - name: Martyr Pamphilius the Presbyter and his Companions at Caesarea
    note: Fellow martyrs of the same Diocletianic persecution at Caesarea in Palestine recorded by Eusebius; Adrian and Eubulus came to the city to visit these confessors and were themselves seized.
    href: saint/OS-0667
