id: OS-2883
lifespan: c. 1448 – 1463
overview:
  - Eleni, also called Susanna, was a young Greek woman of the island of Lesbos who, according to tradition, was martyred by Turkish forces on Bright Tuesday, April 9, 1463, about ten years after the Fall of Constantinople. She is remembered as a fifteen-year-old kinswoman — a cousin — of Saint Irene, one of the martyrs of Lesbos.
  - Her death forms part of a single episode of martyrdom that also claimed Saint Raphael, an archimandrite serving as igoumen of the Monastery of the Nativity of the Theotokos near Thermi; Saint Nicholas, a deacon; the young Saint Irene; and other companions. The memory of these martyrs was lost to the people of Lesbos for nearly five centuries and was recovered only through a series of reported visions and excavations beginning in 1959.
  - She is commemorated together with the newly-revealed Martyrs of Lesbos, principally Saints Raphael, Nicholas, and Irene, on Bright Tuesday, a movable feast reckoned as April 9 in some calendars.
liturgicalTitle: The Holy New Martyr Eleni (Susanna) of Lesbos
sections:
  - heading: Historical Context
    body:
      - The martyrdom is set on Lesbos in 1463, in the decades after the Fall of Constantinople in 1453, when Turkish invasions of the Aegean and of Macedonia drove clergy and faithful to flee. According to the tradition, Saint Raphael — born on the island of Ithaka around 1410 with the baptismal name George, and later an archimandrite and chancellor — came to Lesbos with the deacon Nicholas, a native of Thessaloniki, in 1453 or 1454, and served as igoumen of the Monastery of the Nativity of the Theotokos near Thermi.
      - During a Turkish raid the community was seized and tortured over the days from Holy Thursday through Bright Tuesday. Eleni, the young cousin of Saint Irene, received the crown of martyrdom on Bright Tuesday, April 9. Among the others associated with the group are Irene's father Basil, the village mayor; her mother Maria; and Theodore, the village teacher.
  - heading: Rediscovery and Veneration
    body:
      - The memory of the martyrs of Lesbos was forgotten for nearly five hundred years. In 1959, when Angelos Rallis undertook to build a chapel near the ruins of the monastery, workers discovered the relics of Saint Raphael on July 3, 1959. The saints were subsequently said to have appeared to various inhabitants of the island, revealing the details of their lives and deaths.
      - The relics of Saint Nicholas were reported found on June 13, 1960, and the grave of Saint Irene on May 12, 1961. The iconographer Photios Kontoglou documented these accounts in his 1962 book A Great Sign. The martyrs of Lesbos were formally canonized in 1970 by the Ecumenical Patriarchate. The rebuilt monastery, on a hill called Karyes about 12 km from Mytilene and 3 km from Thermi, has become a prominent center of pilgrimage.
