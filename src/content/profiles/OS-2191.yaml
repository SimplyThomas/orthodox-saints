id: OS-2191
lifespan: c. 1492 – 1537
overview:
  - Saint Philip, Abbot of Irap, was a sixteenth-century Russian monastic and the founder of the Irap wilderness-monastery, situated near the River Irapa some 45 versts from Cherepovets in the Novgorod region. Born with the name Theophilus, he was orphaned so young that he retained no memory of his parents.
  - Left to wander and live on charity, at the age of twelve he settled near the Komel monastery, where Saint Cornelius of Komel received him and, after three years, tonsured him a monk with the name Philip. Known for meekness, humility, and diligence, he was ordained to the priesthood at the request of the brethren before withdrawing to found his own wilderness community.
  - He labored in the Irap wilderness for fifteen years and died in 1537 at the age of forty-five. His formal veneration was established at the end of the sixteenth century, and the Krasnoborsk Philippov monastery later arose on the site of his monastic struggles. His feast is kept on November 14.
liturgicalTitle: Our Venerable Father Philip, Abbot of Irap
timeline:
  - when: c. 1492
    title: Birth as Theophilus
    body: Born in the Russian lands and named Theophilus, he was orphaned so early that he retained no memory of his parents.
  - when: c. 1504
    title: Settles near the Komel monastery
    body: After wandering and living on charity, the twelve-year-old Theophilus settled near the Komel monastery.
  - when: c. 1507
    title: Tonsure by Saint Cornelius of Komel
    body: Saint Cornelius of Komel received the pious youth into the monastery and, after three years, tonsured him a monk with the name Philip; at the brethren's request he was later ordained to the priesthood.
  - when: c. 1522
    title: Founding of the Irap wilderness
    body: Seeking greater ascetic labors, Philip withdrew toward the White Lake region. With the patronage of Prince Andrew Sheleshpansky, who allotted him land by the River Irapa near Cherepovets, he built a chapel dedicated to the Most Holy Trinity and a cell for himself, and monks began to gather around him.
  - when: "1537"
    title: Repose
    body: After fifteen years in the wilderness, Saint Philip died at the age of forty-five. His relics were placed beneath a crypt in the Trinity temple, and an icon of him was painted over his grave by the monk Theodosius.
  - when: late 16th century
    title: Establishment of veneration
    body: The celebration of Saint Philip was established at the end of the sixteenth century, with a manuscript service dating from the same period.
sections:
  - heading: Monastic Formation
    body:
      - An orphan with no recollection of his parents, Theophilus wandered and survived on charity until, at the age of twelve, he settled near the Komel monastery. There Saint Cornelius of Komel (commemorated May 19) received him, and after three years tonsured him a monk under the name Philip.
      - The sources describe him as meek, humble, and hard-working. At the request of the brethren he was ordained to the priesthood, though his desire for greater ascetic effort led him to seek solitude beyond the community.
  - heading: The Irap Wilderness-Monastery
    body:
      - Drawn toward the outskirts of the White Lake region, Philip received the patronage of Prince Andrew Sheleshpansky, who allotted him land near the River Irapa, some 45 versts from Cherepovets. There he built a chapel in the name of the Most Holy Trinity together with a cell for himself.
      - As word of the wilderness-dweller spread through the surrounding area, monks began to flock to him, and he instructed both monastics and lay visitors in the spiritual virtues. He dwelt in the wilderness for fifteen years.
  - heading: Relics & Shrines
    body:
      - Following his death in 1537, Saint Philip's relics were placed beneath a crypt in the Trinity temple. An icon of the saint was painted over his grave by the monk Theodosius.
      - Soon after his death the Krasnoborsk Philippov monastery arose on the site of his monastic struggles. His formal celebration was established at the end of the sixteenth century, accompanied by a manuscript liturgical service from the same period.
