id: OS-1820
lifespan: 5th century (reposed under Emperor Zeno, 474–491)
liturgicalTitle: Our Venerable Mother Theodora of Alexandria
overview:
  - Theodora of Alexandria was a married woman of fifth-century Egypt whose life became, in the Orthodox tradition, an enduring example of repentance carried to its limit. According to her synaxarion, she lived in harmony with a devout husband until she was deceived into committing adultery. Stricken with remorse, she resolved to spend the remainder of her life in penance.
  - To do penance unrecognized, she left her home secretly, dressed in men's clothing, and entered a men's monastery under the name Theodore, where she was received as a eunuch. She is remembered above all for the depth of her ascetic struggle and for bearing a grave false accusation in silence rather than reveal her identity, her true sex remaining unknown until her death.
timeline:
  - when: 5th century, Alexandria
    title: Marriage and fall into sin
    body: Theodora lived in Alexandria with a devout husband. By the synaxarion's account she was led into adultery through the deceit of others, and afterward was consumed by remorse for her sin.
  - when: After her repentance
    title: Enters a men's monastery as 'Theodore'
    body: Resolving to do penance unseen, she dressed in men's clothing and presented herself at a men's monastery, taking the name Theodore. By tradition this was the Oktodeka monastery, some eighteen miles from Alexandria; the abbot, taking her for a eunuch, received and clothed her. She is recorded as labouring there for eight years, known for all-night prayer, humility, and self-denial.
  - when: During her monastic life
    title: False accusation and expulsion
    body: Accused of fathering a child with a woman from a nearby village, Theodore neither defended herself nor revealed her identity. When an infant was presented as evidence, she was expelled from the monastery and lived in a hut nearby, raising the child in poverty for some years before the monks asked her to return.
  - when: Reposed under Emperor Zeno (474–491)
    title: Repose and revelation
    body: After further years of asceticism she reposed in peace. Only then was her true identity as a woman discovered, and the community recognised her sanctity. The synaxarion relates that her husband afterward received the monastic tonsure, and that the child she had raised likewise became a monk.
sections:
  - heading: Repentance and the Disguised Life
    body:
      - "The life of Theodora belongs to a recognised group of early monastic accounts of women who lived hidden as men in male communities. The narrative's central concern is repentance: having fallen into adultery, Theodora is said to have been counselled by an abbess on God's forgiveness, with reference to the woman who anointed Christ's feet, and to have chosen a hidden ascetic life so as not to be found by her husband."
      - "Her concealment under the name Theodore is presented not as deception for its own sake but as the form her penance took. The accounts emphasise her endurance of a false charge of fathering a child: rather than clear her name by disclosing that she was a woman, she accepted expulsion and the burden of raising the child, which the tradition reads as the summit of her humility."
  - heading: Veneration
    body:
      - Theodora is commemorated in the Orthodox Church on September 11. Her account is preserved in the synaxaria and Lives of the Saints and has long been read as a model of penitence. She is also remembered in the Western calendar, where the Episcopal Church observes her on January 5.
related:
  - name: Saint Pelagia the Penitent
    note: Another early repentant woman of the Eastern Church whose life follows a comparable pattern of conversion and rigorous penance.
    external: https://en.wikipedia.org/wiki/Pelagia
patronage:
  - Penitents and those seeking forgiveness
  - Those bearing false accusation
