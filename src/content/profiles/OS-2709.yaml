id: OS-2709
lifespan: c. 635 – 710
overview:
  - Adrian of Canterbury (c. 635–710) was a North African monk and scholar who became one of the principal architects of learning in the early English Church. Born in North Africa and described by the Venerable Bede as "by nation an African," he was a Berber by descent and a master of both Greek and Latin.
  - Before coming to Britain he served as abbot of the monastery of Niridanum (also called Niridian) near Naples, possibly on the island of Nisida. Twice offered the archbishopric of Canterbury by Pope Vitalian, he twice declined and instead recommended Theodore of Tarsus, whom he then accompanied to England at the pope's request.
  - As abbot of the monastery of Saints Peter and Paul at Canterbury — later Saint Augustine's Abbey — Adrian and Theodore established a celebrated school that taught theology, scripture, Greek, Latin, rhetoric, the liberal arts, metrics, astronomy, and arithmetic. He led the monastery for roughly thirty-nine years until his death, and is venerated in the Orthodox, Catholic, and Anglican traditions.
liturgicalTitle: Our Venerable Father Adrian, Abbot of Canterbury
sections:
  - heading: Origins and Early Monastic Life
    body:
      - Adrian was born in North Africa between about 630 and 637. Of Berber descent, he was among the many North African Christians whose learning connected the Latin West with the Greek East. Bede, the chief early witness to his life, records simply that he was "by nation an African, well versed in holy writ."
      - By the time he enters the historical record he was abbot of a monastery near Naples variously called Niridanum or the Niridian monastery, possibly located on the island of Nisida. Bede praises him there as skilled in monastic and ecclesiastical discipline and "excellently skilled both in the Greek and Latin tongues" — a rare double competence that would shape his later mission.
  - heading: Declining Canterbury and the Journey to Britain
    body:
      - When Pope Vitalian sought a new archbishop for the English churches, he offered the office to Adrian. Adrian declined the honor, and did so a second time when it was pressed upon him, judging himself unsuited. In his place he recommended Theodore of Tarsus, a learned monk then in Rome, whom the pope accepted and consecrated.
      - "Vitalian stipulated that Adrian must accompany Theodore to Britain — partly because Adrian had already traveled through Gaul and knew the routes. The two left Rome on 27 May 668, sailing to Marseille and continuing overland to Arles, where they wintered in France: Theodore lodging with Bishop Agilbert of Paris, and Adrian staying by turns with Bishops Emmon of Sens and Faro of Meaux."
      - Theodore reached England in May 669, but Adrian was detained by Ebroin, the Frankish Mayor of the Palace, on suspicion of being a Greek imperial emissary. Once cleared, Adrian at last crossed to England and took up his appointed work.
  - heading: The School at Canterbury and Its Legacy
    body:
      - At Canterbury Adrian became abbot of the monastery of Saints Peter and Paul, later renamed Saint Augustine's Abbey. Bede describes him as "not only a distinguished theologian, but eminently accomplished in secular learning." Working closely with Archbishop Theodore, he taught the right rule of monastic life and the canonical reckoning of Easter.
      - Together the two traveled through England and drew students from across the country. Their curriculum embraced theology and biblical study alongside Greek, Latin, rhetoric, the liberal arts, metrical composition, astronomy, and arithmetic. Bede notes that in his own day, in the early eighth century, some of their pupils still spoke Greek and Latin as fluently as their native tongue. A record of the teaching of the Canterbury school survives in the Leiden Glossary.
      - Adrian presided over the monastery for approximately thirty-nine years until his death in 709 or 710.
  - heading: Relics and Veneration
    body:
      - Adrian's relics were translated and redeposited on 9 January 1091, and that date became established as his feast day, kept at Canterbury and beyond.
      - He is honored as a saint in the Eastern Orthodox, Roman Catholic, and Anglican churches. This entry rests on the accounts of Bede and later hagiographical tradition and, like other lives of the early Western saints, remains subject to review.
