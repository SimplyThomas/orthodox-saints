liturgicalTitle: Our Venerable Father Simeon of Philotheou, the Bare-Foot
overview:
  - Simeon of Philotheou, known by the epithet "the Bare-Foot" (Bosoi), was a post-Byzantine ascetic and abbot associated with Philotheou Monastery on Mount Athos. The son of a priest, he was tonsured a monk at the age of fifteen and pursued a life of strict asceticism, going barefoot in his labors.
  - After serving as head of Philotheou Monastery, he withdrew to a hermitage on Mount Pelion and later traveled as a preacher through the Greek lands. He died at Constantinople and was buried there, and his memory is kept on April 19.
timeline:
  - when: Youth
    title: Tonsure at fifteen
    body: The son of a priest, Simeon came at the age of fifteen under the spiritual guidance of Pachomius, Bishop of Demetriada, who tonsured him a monk and ordained him hierodeacon.
  - when: Early monastic years
    title: Mount Athos
    body: After early training at monasteries near Mount Olympus, he settled at the Lavra of Saint Athanasius on Mount Athos before transferring to Philotheou Monastery, where the brethren unanimously chose him as their head.
  - when: Later life
    title: Hermitage and preaching
    body: Facing complaints that his leadership was too strict, he withdrew to Mount Phlamourion on Mount Pelion, living in solitude before a community gathered around him. He afterward preached through Epirus, Thessaly, and Athens.
  - when: Repose
    title: Death at Constantinople
    body: He ended his life at Constantinople, where he fell asleep in the Lord and was buried by the Patriarch at Chalke, in a church dedicated to the Most Holy Theotokos.
sections:
  - heading: Trial at Euripa
    body:
      - According to his life, while preaching in the city of Euripa, Simeon was slandered before the city-governor, Ayan, who accused him of having led a Turk to accept Christianity, and he was sentenced to public burning.
      - Brought before the governor in shackles, barefoot, and in an old robe, he answered so wisely that the death sentence could not be carried out, and he was set free.
  - heading: Relics & Shrines
    body:
      - His life relates that two years after his burial at Chalke his grave was opened, an ineffable fragrance came forth, and healings were reported. Monks from the Phlamourion monastery are said to have opened the grave to transfer his remains.
      - The Vita and the Service to Simeon were published at Smyrna in 1646.
companions:
  - name: Pachomius, Bishop of Demetriada
    note: Spiritual father; the bishop who took the fifteen-year-old Simeon under his guidance, tonsured him a monk, and ordained him hierodeacon.
