id: OS-2870
lifespan: Died c. 303
overview:
  - Theodosia was the mother of the Great Martyr Procopius of Caesarea (born Neanius), one of the early victims of the Diocletianic persecution in Palestine. Married to a Christian named Christopher, she herself remained a pagan, and when her son embraced Christianity and abandoned the worship of the ancestral gods, she is said to have denounced him to the imperial authorities.
  - According to the tradition preserved in the synaxaria, Theodosia's opposition gave way to faith after she witnessed the constancy of her son under repeated tortures at Caesarea of Palestine. Moved by the endurance of the Christians, she confessed Christ, took her place among the confessors, and was beheaded together with her son around the year 303.
liturgicalTitle: The Holy Martyr Theodosia, Mother of the Great-Martyr Procopius
timeline:
  - when: c. 303
    title: Denunciation of her son
    body: After Procopius converts to Christianity and ceases to worship the ancestral gods, Theodosia, still a pagan, goes to the emperor to complain that her son no longer honors the traditional deities.
  - when: c. 303
    title: Conversion at Caesarea
    body: Witnessing the faith and endurance of her son during his repeated tortures at Caesarea of Palestine, Theodosia is spiritually transformed, repents, and joins the ranks of the confessors of Christ.
  - when: c. 303
    title: Martyrdom
    body: Theodosia is executed alongside her son during the reign of the emperor Diocletian (284-305), in what the tradition records as the first martyrdom at Caesarea.
sections:
  - heading: Historical Context
    body:
      - Theodosia's death belongs to the Diocletianic persecution, the last and most severe of the imperial campaigns against the Church. Her son Procopius, originally named Neanius, was born in Jerusalem and served the Church at Scythopolis before being sent to Caesarea Maritima, where he was executed by beheading. The historian Eusebius of Caesarea documented Procopius's death, describing it as the first martyrdom to take place at Caesarea.
  - heading: Conversion and Martyrdom
    body:
      - The synaxarion relates that Theodosia, the pagan mother of Procopius, at first opposed her son's Christian faith and complained of him to the emperor. Her hostility reversed when she observed the great faith and courage of the Christians and the constancy of her son under torture. Repenting, she stood in the line of the confessors and was put to death together with him.
      - The broader account of the martyrdom records that twelve Christian women received martyrs' crowns at the gates of the Caesarea praetorium, and that many Roman soldiers, together with their tribunes Nikostratos and Antiochos, went to execution for their confession of Christ.
  - heading: Sources and Historical Note
    body:
      - The historical record of Eusebius concerns the martyrdom of Procopius himself. The identification of his mother by the name Theodosia, and her role first as accuser and then as fellow-martyr, derives from later hagiographical accounts rather than from the earliest historical notice. Her commemoration is kept on July 8 alongside that of her son.
      - This Theodosia is distinct from the Virgin Martyr Theodosia of Tyre and from Theodosia of Constantinople.
