id: OS-0067
lifespan: c. 89 – 202 (traditionally aged about 113 at his death)
overview:
  - Saint Charalampos (also transliterated Haralambos or Haralampus) was an aged hieromartyr of the pre-Nicene Church, traditionally numbered among the wonderworkers and widely invoked as a protector against contagious disease and epidemics. By tradition he was born around 89 in Magnesia on the Maeander in Asia Minor and served as Bishop of Magnesia, spreading the Christian faith throughout the region for many years.
  - He was arrested and tried during the reign of the Emperor Septimius Severus (193–211). Refusing to sacrifice to idols, he confessed his faith and was subjected to severe torture before being put to death by beheading in 202, traditionally at about 113 years of age. His Greek name is understood to mean "glowing with joy."
  - His relics are credited with numerous miracles; his skull is preserved at the Monastery of Saint Stephen at Meteora in Greece, with further relics distributed across Greece and elsewhere. He is commemorated on February 10 (February 23 on the Old Calendar).
sections:
  - heading: Life and Episcopate
    body:
      - By tradition Charalampos was born around the year 89 in Magnesia on the Maeander in Asia Minor (identified with modern-day Tekin, in present-day Turkey). He served as Bishop of Magnesia and, according to the hagiographic accounts, guided his people toward salvation and spread faith in Christ throughout the region over the course of many years.
      - "Sources differ on his rank: Russian tradition, followed by the anchor record and the OCA, identifies him as Bishop of Magnesia in Thessaly, while some Greek sources regard him as a priest. The accounts agree that he was a Christian leader of great age at the time of his martyrdom."
  - heading: Arrest, Trial, and Martyrdom
    body:
      - The synaxarion relates that Charalampos was arrested during the reign of the Emperor Septimius Severus (193–211), when Lucian served as proconsul and Lucius as military commander. Brought to trial, he refused to offer sacrifice to idols and openly confessed the Christian faith.
      - "By tradition he was subjected to severe torture: his body was lacerated with iron hooks and the skin scraped from it, and soldiers are said to have twisted his beard into a rope about his neck and driven iron nails into his body. According to the accounts he endured these sufferings with remarkable steadfastness despite his advanced age."
      - Before his execution he is said to have prayed that the place where his relics rested would never suffer famine or disease, and asked instead for peace, prosperity, and an abundance of fruit, grain, and wine for the faithful. He was put to death by beheading in 202, traditionally at about 113 years of age. The accounts relate that his body received honorable burial by Galina, the emperor's daughter, who had converted.
  - heading: Fellow Martyrs
    body:
      - The accounts name several who were martyred in connection with Charalampos. Witnessing his endurance under torture, two soldiers, Porphyrius and Baptus, converted to Christ and were immediately beheaded.
      - Three women who observed his sufferings likewise confessed Christ and were martyred. These companions are commemorated together with him on February 10.
  - heading: Miracles & Traditions
    body:
      - "Traditional Accounts: The hagiography records a series of miraculous events surrounding the martyrdom. The military commander Lucius is said to have had his forearms severed and the proconsul Lucian his head turned backward, both of whom later converted and were healed. Charalampos is also said to have raised a dead youth and to have healed a man who had been tormented by demons for thirty-five years. By tradition the emperor's daughter Galina converted and destroyed the pagan idols. His relics are credited with numerous miracles down to the present day."
      - "Historically Documented: The continuous veneration of Saint Charalampos and the preservation of his relics, including his skull at the Monastery of Saint Stephen at Meteora, are attested in the liturgical and synaxarion tradition. The miraculous narratives above are transmitted as part of his hagiography rather than as independently documented history."
  - heading: Relics & Shrines
    body:
      - The skull of Saint Charalampos is preserved at the Monastery of Saint Stephen at Meteora in Greece. Further portions of his relics are distributed across Greece and elsewhere, and are credited with numerous miracles.
      - His dying prayer that the place of his relics be spared famine and disease underlies his enduring invocation as a protector against epidemics and contagious illness.
