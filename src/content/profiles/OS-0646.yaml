flagReasons:
  - claim: The reconstruction was supported by King Bagrat IV (Bagrat Kuropalates) — treating these as one and the same person.
    detail: "The two external sources name different kings: the OCA source says 'King Bagrat Kuropalates' while the Wikipedia source says 'King Bagrat IV'. Historically Bagrat III held the title Kuropalates and Bagrat IV was his son and successor — they are different people. The profile conflates them in a single parenthetical as if they are one person, which is not supported by either source and is likely incorrect."
