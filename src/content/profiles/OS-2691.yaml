  - claim: Second son baptized, became gravely ill, 'yet recovered'
    detail: The dossier external says only 'She similarly baptized their second son without consent, and he became severely ill.' There is no mention of recovery anywhere in the dossier. 'Yet recovered' is an addition not supported by any dossier source.
  - claim: Godefroid Kurth disputed claims that Clotilde incited 'her sons' (plural) against her cousin Sigismund
    detail: The dossier external says 'Godefroid Kurth's historical analysis disputed claims that Clotilde incited her son against her cousin Sigismund' — singular 'son,' not plural 'sons.' The profile's use of 'sons' is a factual discrepancy with the dossier.
