id: OS-2691
lifespan: c. 474 – 3 June 545
liturgicalTitle: The Holy and Righteous Queen Clotilde of the Franks
overview:
  - Clotilde (c. 474–545) was a Burgundian princess who became queen of the Franks through her marriage to Clovis I, the first king to unite the Frankish tribes. Contemporary and near-contemporary sources associate her closely with the Christianization of the Frankish court, and she is venerated as righteous in the Eastern Orthodox Church as well as in the Catholic Church and in Lutheranism.
  - Born around 474 at Lyon in Burgundy, she survived the murder of her father, mother, and siblings by her uncle Gundobad, who — though himself an Arian — had her raised in the Catholic faith. After marrying Clovis around 492–493, she persistently urged him toward Catholic Christianity, and his eventual conversion and baptism by Saint Remigius at Reims is remembered as a decisive moment in the religious history of Gaul.
  - Widowed in 511, Clotilde withdrew from political life to Tours, where she lived near the shrine of Saint Martin for her remaining decades, giving generously to the poor and founding churches and monastic houses. She died at Tours on 3 June 545 and is commemorated on June 3 (June 4 in France).
timeline:
  - when: c. 474
    title: Birth in Burgundy
    body: Clotilde is born around 474 at Lyon, into the Burgundian royal house; her grandfather was Gondioc and her father Chilperic II of Burgundy.
  - when: After her father's death
    title: Family murdered; raised Catholic
    body: Her uncle Gundobad murders her father Chilperic II, her siblings, and her mother Caretena. Though an Arian himself, Gundobad raises Clotilde and her sister Sedeleuba as Catholics at his court.
  - when: c. 492–493
    title: Marriage to Clovis I
    body: "Clotilde marries Clovis I, the first king of the Franks. They have five children: four sons — Ingomir, Clodomir, Childebert, and Clotaire — and a daughter also named Clotilde."
  - when: c. 496
    title: Battle of Tolbiac and Clovis's vow
    body: By tradition, during the Battle of Tolbiac against the Alemanni, the losing Clovis appeals to his wife's God, promising to accept the Christian faith if granted victory.
  - when: c. 498–506
    title: Baptism of Clovis at Reims
    body: Clovis is baptized on Christmas Day by Saint Remigius, in a church near the later Abbey of Saint-Remi at Reims, together with some three thousand Franks. Gregory of Tours, writing in the sixth century, is the principal source for these events.
  - when: "511"
    title: Widowhood and withdrawal to Tours
    body: After Clovis dies, Clotilde moves to Tours to live near the shrine of Saint Martin, detaching herself from politics and devoting herself to prayer and almsgiving for her remaining thirty-four years.
  - when: 3 June 545
    title: Repose at Tours
    body: Clotilde dies at Tours at about seventy years of age and is buried in the Basilica of the Holy Apostles alongside Clovis and her elder children.
sections:
  - heading: The Conversion of Clovis
    body:
      - The conversion of Clovis I is the achievement with which Clotilde is most closely associated. Sources record that she urged him toward Catholic Christianity from early in their marriage. She had their first son baptized without his consent; when the child died soon after, Clovis's resistance hardened. She likewise had their second son baptized, and he became gravely ill, yet recovered.
      - "According to tradition the turning point came at the Battle of Tolbiac against the Alemanni around 496: with his army losing, Clovis appealed to his wife's God, vowing to accept the Christian faith if he won. He was afterward baptized by Saint Remigius at Reims, along with roughly three thousand Franks. Scholars debate the year of the Christmas-Day baptism, placing it somewhere between 498 and 506. The account of Gregory of Tours, set down in the sixth century, is the main historical source for Clotilde's influence on the conversion."
  - heading: Widowhood, Foundations, and Charity
    body:
      - "After Clovis died in 511, Clotilde spent her last thirty-four years at Tours near the shrine of Saint Martin, withdrawn from the power struggles of the Frankish court and giving generously to the poor. These years brought heavy grief: her eldest son Clodomir died in battle, her grandsons were killed by her sons Childebert and Clotaire, and her daughter died after being rescued from a cruel Visigothic husband."
      - She founded several monastic institutions, including a Monastery of Saint Mary at Les Audelys in Touraine, Chelles Abbey for nuns in honor of Saint George (later restored by Saint Bathilde), and a convent at Les Andelys in 511 for noble girls. She built churches at Rouen, Lyon, and Les Andelys. Together with Clovis she began the Basilica of the Holy Apostles — later the Church of Sainte-Geneviève — as a mausoleum honoring Saint Genevieve, patroness of Paris; Clotilde completed it after his death.
  - heading: Reputation and Sources
    body:
      - "Gregory of Tours is described by the historian David Hugh Farmer as the principal source for Clotilde's life. Later scholarship has defended her memory: Godefroid Kurth disputed claims that she incited her sons against her cousin Sigismund out of a desire for revenge, calling such accounts a defamation contrary to her character, and Butler's scholarship is said to have vindicated her from charges of ferocity and vindictiveness."
      - She is venerated in the Catholic Church, the Eastern Orthodox Church, and Lutheranism. Her feast is kept on June 3 (June 4 in France).
  - heading: Relics & Shrines
    body:
      - Clotilde was buried in the Basilica of the Holy Apostles at Paris, alongside Clovis and her older children. Her relics survived the French Revolution and, as of 1997, are kept at the Church of Saint Louis of France in Paris.
  - heading: Miracles & Traditions
    body:
      - "Traditional Accounts: A legend attached to the building of the convent at Les Andelys relates that, when the workers complained of heat and thirst, Clotilde prayed and the water of a nearby fountain took on the strength and taste of wine for them. The spring afterward became known for healing diseases of the skin."
