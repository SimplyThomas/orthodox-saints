id: OS-2708
lifespan: c. 650 – 727
overview:
  - Frideswide (also Frithuswith; died 19 October 727) was an Anglo-Saxon abbess who founded a religious community at Oxford and became the city's patron saint. She is venerated in the Eastern Orthodox Church as well as in Anglicanism and Roman Catholicism.
  - By tradition she was the daughter of Didan (Dida of Eynsham), a sub-king whose territories lay in the upper Thames region of western Oxfordshire, and his wife Safrida. While still young she founded a monastery with her father's support and served as its first abbess, taking vows of celibacy after her parents' deaths.
  - Much of the detail of her life survives only through later legendary accounts, principally a 12th-century vita preserved by John of Worcester and reworked by Robert of Cricklade. Her cult grew around her shrine at Oxford, which drew pilgrims from the 12th century until the Reformation.
liturgicalTitle: Our Venerable Mother Frideswide, Abbess of Oxford
patronage:
  - Oxford
  - University of Oxford
timeline:
  - when: c. 650
    title: Birth
    body: Frideswide is born, by tradition in the upper Thames region, the daughter of the sub-king Didan and his wife Safrida.
  - when: 7th century
    title: Foundation of the monastery
    body: While still young, and with her father's support, she founds a monastery at Oxford, originally dedicated to the Holy Trinity, the Virgin Mary, and all saints, becoming its first abbess.
  - when: c. 727
    title: Repose
    body: Frideswide dies on 19 October, the date kept as her principal feast.
  - when: "1002"
    title: Destruction of the nunnery
    body: The community she founded is destroyed during the St. Brice's Day massacre, and is later restored.
  - when: "1180"
