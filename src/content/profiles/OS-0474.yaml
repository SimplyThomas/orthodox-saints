companions:
  - name: St. Ambrose of Milan
    note: "Bishop and confessor: imposed public penance on Theodosius after the massacre at Thessalonica (390) and later delivered his funeral oration at Milan."
    href: saint/OS-2312
  - name: St. Gregory the Theologian
    note: "Hierarch he upheld: on entering Constantinople in 380 Theodosius confirmed Gregory in the archiepiscopal see, and Gregory presided over the opening of the council Theodosius convened in 381."
    href: saint/OS-0022
  - name: St. Flavian, Archbishop of Antioch
    note: "Hierarch who interceded with him: Flavian I of Antioch entreated Theodosius to spare the citizens of Antioch after their revolt against imperial taxes."
    href: saint/OS-0669
