    body: Nicholas Cabasilas is born at Thessalonica in the Byzantine Empire, into a family connected to the theologian and clergyman Neilos Cabasilas, his kinsman.
  - when: mid-14th century
    title: Public life and imperial friendship
    body: As a younger man he takes part in the political affairs of the empire and becomes a close associate of the emperor John VI Kantakouzenos, whom he accompanies when the emperor withdraws to monastic life.
