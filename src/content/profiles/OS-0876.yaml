related:
  - name: Hieromartyr Hermogenes, Patriarch of Moscow
    note: As Metropolitan of Kazan, recorded the lives of the Kazan saints and promoted the veneration of its martyrs.
    href: saint/OS-0671
  - name: Saint Gurias, Archbishop of Kazan
    note: First hierarch of the newly-established see of Kazan, whose mission to the Tatars formed the setting of these conversions.
