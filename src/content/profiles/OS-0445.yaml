patronage:
  - Poitiers
works:
  - title: On the Trinity (De Trinitate)
    desc: A twelve-book treatise defending the divinity of Christ against Arianism, the first successful expression in Latin of the Nicene theology developed in Greek.
    date: 359–360
  - title: On the Councils (De Synodis)
    desc: An epistle addressed to Semi-Arian bishops of Gaul, Germania, and Britain, analyzing the Eastern bishops' positions in the Nicene controversy.
    date: "358"
  - title: Commentary on Matthew (Commentarius in Evangelium Matthaei)
    desc: The earliest surviving complete Latin commentary on the Gospel of Matthew.
    date: before 356
  - title: Commentaries on the Psalms (Tractatus super Psalmos)
    desc: Psalm commentaries composed after his return from exile, following the interpretive methods of Origen; surviving only in part.
    date: c. 360
  - title: Against Constantius (In Constantium)
    desc: A polemical work attacking the Emperor Constantius II as a persecutor of orthodox Christians.
  - title: Against Auxentius (Liber Contra Arianos vel Auxentium Mediolanensem)
    desc: An account of his confrontation with Auxentius, the Arian-favoring bishop of Milan.
    date: "365"
  - title: Book of Hymns (Liber Hymnorum)
    desc: A collection of hymns recorded by Jerome, by which Hilary is reckoned among the earliest Latin Christian hymnographers, though the attribution of the surviving hymns is disputed.
