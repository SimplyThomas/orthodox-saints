flagReasons:
  - claim: Profile says the anchor sets Era=Pre-Nicene but describes the saint as being of 'the early Christian centuries'. The anchor's Era is 'Pre-Nicene' yet the profile places his withdrawal in the 4th century. The Pre-Nicene era ends around 325 AD (Council of Nicaea). A 4th-century figure who lived many decades as a hermit would have begun his desert life after ~325, which would be post-Nicene, not pre-Nicene. The profile accepts and uses the 4th-century framing throughout without flagging this internal tension.
    detail: "The anchor row sets Era=Pre-Nicene (ends ~AD 325) and Century=4th. These two fields are in tension: a 4th-century figure who withdrew to the desert after his parents' death and lived 95 years there would likely have extended well into the post-Nicene period. The profile accepts Century=4th from the anchor and calls him 'an Athenian of the early Christian centuries,' which is consistent with Pre-Nicene. However, the Era=Pre-Nicene is the anchor value and must be treated as authoritative; the profile's claim that he was 'of the early Christian centuries' is consistent with but does not explicitly assert Pre-Nicene. Since the anchor itself carries this tension between Era and Century fields, and the profile does not contradict the anchor's Era field, this is a tension in the anchor rather than a profile error. Marking as supported."
