id: OS-1990
lifespan: died c. 310
liturgicalTitle: The Holy, Glorious Martyrs Eulampius and Eulampia and the Two Hundred who suffered with them at Nicomedia
overview:
  - Eulampius and Eulampia were a brother and sister of Nicomedia in Asia Minor (modern İzmit, Kocaeli, Turkey) who confessed Christ during the persecutions of the early fourth century, in the reign of the emperor Maximian. By tradition they died around 310.
  - According to the synaxarion, Eulampius was arrested while attempting to buy provisions for Christians hiding in caves on the outskirts of Nicomedia. When he refused to renounce his faith under interrogation he was subjected to torture; his sister Eulampia then declared herself a Christian and was arrested in turn. The two siblings were martyred together, and two hundred witnesses moved by their endurance professed Christ and were themselves put to death.
  - The group is commemorated together on October 10. As a named collective commemoration they are kept as a single entry.
timeline:
  - when: early 4th c.
    title: Persecution at Nicomedia
    body: Eulampius, disturbed by an imperial decree ordering the execution of Christians, refuses to renounce his faith. Tradition relates that he was arrested while seeking supplies for Christians hiding in caves near the city.
  - when: early 4th c.
    title: Eulampia comes forward
    body: His sister Eulampia openly embraces him in public and declares herself a Christian, leading to her own arrest. By tradition Eulampius encouraged her, recalling the words of Matthew 10:28 concerning those who can kill the body but not the soul.
  - when: c. 310
    title: Martyrdom of the siblings and two hundred witnesses
    body: Both siblings are tortured; the synaxarion relates that they were cast into a furnace yet preserved from the fire. Eulampius was beheaded and Eulampia died under torture before execution. Two hundred onlookers who confessed Christ after witnessing their suffering were also put to death.
sections:
  - heading: Historical Context
    body:
      - The martyrdom is set in Nicomedia, an imperial capital of the eastern Roman Empire and a major center of the persecutions of the early fourth century. By the tradition followed here it is placed in the reign of the emperor Maximian, around the year 310.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: The siblings are attested as fourth-century martyrs of Nicomedia commemorated on October 10."
      - "Traditional Accounts: The synaxarion relates that Eulampius, brought to a pagan temple, destroyed an idol of Mars; that the two siblings were cast into a furnace but miraculously protected from the flames; and that two hundred witnesses to these events confessed Christ and received martyrdom with them. These accounts are transmitted as tradition."
