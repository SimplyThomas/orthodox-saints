id: OS-2861
lifespan: c. 42 – c. 125
overview:
  - Sixtus I was an early bishop of Rome in the sub-apostolic age, counted as the seventh to hold the see after the Apostle Peter. According to tradition he was a Roman of Greek descent, born at Rome around 42, and he governed the Roman Church during the reign of the Emperor Hadrian.
  - He succeeded Alexander I and was in turn followed by Telesphorus. Ancient sources disagree on the exact span of his tenure, but he is generally placed as bishop from roughly 117 or 119 until his death about 125 or 126. He is venerated as a saint and martyr of the primitive Roman Church.
  - His name is recorded in older sources as "Xystus," from the Greek xystos; the "Xystus" named in the Canon of the Mass, however, refers to the later Sixtus II rather than to him.
liturgicalTitle: The Holy Hieromartyr Sixtus I, Pope of Rome
timeline:
  - when: c. 42
    title: Birth at Rome
    body: By tradition Sixtus is born at Rome, a Roman of Greek descent.
  - when: c. 117–119
    title: Bishop of Rome
    body: He succeeds Alexander I as bishop of Rome, the seventh to hold the see after the Apostle Peter, during the reign of the Emperor Hadrian.
  - when: c. 125
    title: Repose
    body: After a tenure of roughly a decade he dies at Rome and is venerated as a martyr; the scholar Richard Adelbert Lipsius reconciles the divergent ancient sources to place his death around this year.
sections:
  - heading: Historical Context and Sources
    body:
      - The dates of Sixtus's episcopate are transmitted differently by the early records. The Liberian Catalogue assigns him the years from the consulate of Niger and Apronianus to that of Verus III and Ambibulus (117–126); the Ecclesiastical History of Eusebius places his tenure in 119–128; and the Armenian translation of Eusebius suggests that Telesphorus succeeded him already in 124.
      - The scholar Richard Adelbert Lipsius sought to reconcile these witnesses, concluding that Sixtus most likely died around 125 after a tenure of about ten years.
      - "The saint is not the subject of a dedicated life in the Orthodox synaxaria: the OCA daily calendar for his feast does not list him, and no entry appears in OrthodoxWiki or in the Mystagogy archive. He is a pre-Nicene Western bishop carried in the pan-Orthodox calendar whose record survives chiefly through Western sources such as Eusebius, the Liberian Catalogue, and the Liber Pontificalis."
  - heading: Name
    body:
      - In older sources the saint's name appears as "Xystus," derived from the Greek xystos, meaning polished, correct, or shaved. It has been debated whether the later form "Sixtus" also echoes the Latin sextus (sixth), since he was the sixth pope after Peter.
      - The "Xystus" named in the Canon of the Mass refers to Sixtus II, the later martyr, and not to Sixtus I.
  - heading: Traditional Ordinances
    body:
      - The Liber Pontificalis attributes three ordinances to Sixtus I. First, that only sacred ministers were permitted to touch the sacred vessels. Second, that bishops summoned to the Holy See were to present Apostolic letters upon returning to their dioceses. Third, that after the Preface in the Mass the priest should recite the Sanctus together with the people.
      - These attributions come from a later source and are transmitted as tradition rather than as contemporary record.
  - heading: Relics & Shrines
    body:
      - Following tradition Sixtus was buried near the grave of the Apostle Peter on the Vatican Hill.
      - His relics were later translated to Alife in Campania, said to have been brought there by Rainulf III, and were housed in a Romanesque crypt in the town. A further distribution of relics is reported under Pope Clement X, who is said to have given them to Cardinal de Retz; these were placed in the Abbey of Saint Michael in Lorraine.
      - Reflecting the tradition that his relics rest at Alife, he is honored as patron of the Diocese of Alife-Caiazzo and of the Diocese of Anagni-Alatri, and of the Italian towns of Alatri and Alife.
