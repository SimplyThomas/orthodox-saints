id: OS-0049
lifespan: 1877–1961
overview:
  - St. Luke, Archbishop of Crimea (born Valentin Felixovich Voyno-Yasenetsky, 1877–1961), was a Russian Orthodox bishop and an accomplished surgeon who continued to operate, teach, and preach throughout decades of Soviet persecution.
  - Born in Kerch in the Russian Empire to a Russian Orthodox mother and a Roman Catholic father, he trained as a physician before being ordained a priest in 1921 and consecrated a bishop in 1923, taking the religious name Luke.
  - He endured eleven years of internal exile across three separate periods yet produced landmark surgical scholarship, served in wartime military hospitals, and led a succession of dioceses, dying as Archbishop of Simferopol and Crimea in 1961.
  - He is venerated as a confessor and wonderworker and is regarded as a patron of medical workers, especially physicians, surgeons, and nurses.
sections:
  - heading: Early Life and Education
    body:
      - Valentin Felixovich Voyno-Yasenetsky was born on April 27, 1877 (April 15 Old Style) in Kerch, then part of the Russian Empire. His mother was Russian Orthodox and his father was Roman Catholic. In 1889 the family relocated to Kiev.
      - "He completed gymnasium and art school in Kiev before entering the medical faculty of Kiev University. By tradition his turn toward Christ came through study: when he left school the principal gave him a copy of the New Testament, and through careful reading he came to know the teachings of Christ."
      - He married Anna Vasilyevna Lanskaya, a sister of mercy, and the couple had two children. In 1917 the family moved to Tashkent, where Anna died of tuberculosis in 1919.
  - heading: Medical Career and Surgical Scholarship
    body:
      - Voyno-Yasenetsky became a distinguished surgeon and medical scholar. His first monograph, Regional Anesthesiology, was published in Petrograd in 1915, and in 1916 he defended a doctoral thesis on regional anesthesiology of the second branch of the trigeminal nerve. He pioneered ethanol injection techniques for trigeminal nerve anesthesia.
      - His best-known work, Sketches of Purulent Surgery (1934), long remained a reference book and manual for surgeons. He developed new orthopedic procedures for treating osteomyelitis, including joint-rejection operations devised during his wartime service at Krasnoyarsk, and conducted bacteriological research with Guselnikov on purulent processes.
      - He presented four surgical reports at the first Turkestan Medical Conference, held October 23–28, 1922. In 1946 he was awarded the Stalin Prize in Medicine, and he also received the medal 'For Valiant Labour in the Great Patriotic War 1941–1945.'
  - heading: Ordination, Episcopate, and Exile
    body:
      - In 1921 Voyno-Yasenetsky was ordained a priest, and in 1923 he was consecrated Bishop of Tashkent and Turkestan, taking the religious name Luke. As a prominent religious figure he was subjected to political repression and spent eleven years in internal exile across three separate periods.
      - Reflecting on those years he wrote of how arduous it had been to swim against what he called the stormy current of antireligious propaganda, and of the many sufferings it caused him.
      - "He held a succession of sees: Bishop of Tashkent and Turkestan (1923–1927); Archbishop of Krasnoyarsk and Yenisei (1942–1944), where he worked in military hospitals; Archbishop of Tambov and Michurinsk (1944–1946); and finally Archbishop of Simferopol and Crimea (1946–1961). In 1955 he became completely blind. He died on June 11, 1961, in Simferopol in the Ukrainian SSR, at the age of 84."
  - heading: Glorification and Veneration
    body:
      - The Russian Orthodox Church glorified him on May 25, 1996, by decision of its Holy Synod. His remains were disinterred on March 17, 1996, with many thousands in attendance; his heart was reported to be found incorrupt, accompanied by an aroma that witnesses described as indescribable.
      - His relics were transferred to the Cathedral of the Holy Trinity in Simferopol on March 20, 1996. The Ecumenical Patriarchate of Constantinople recognized him as a saint on June 13, 2019.
      - His feast is kept on May 29 (Julian calendar), corresponding to June 11 on the Revised Julian calendar.
  - heading: Relics & Shrines
    body:
      - His relics rest at the Cathedral of the Holy Trinity in Simferopol, Crimea.
      - Portions of his relics are venerated at Sagmata Monastery in Boeotia, Greece; at Dovra Monastery; and at All Saints Antiochian Orthodox Church in Raleigh, North Carolina.
