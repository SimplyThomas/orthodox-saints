id: OS-0049
lifespan: 1877–1961
overview:
  - Saint Luke, Archbishop of Crimea (born Valentin Felixovich Voyno-Yasenetsky, April 27, 1877, in Kerch, Russian Empire; died June 11, 1961, in Simferopol), was a world-class surgeon and Orthodox bishop who continued to operate and preach even during years of exile. He is widely regarded as a patron of medical workers.
  - A pioneering physician, he produced one of the most influential Russian surgical texts of the twentieth century while simultaneously serving the Church as priest, bishop, and finally archbishop. His career spanned both the highest recognition of Soviet medicine and eleven years of internal exile under Soviet religious persecution.
sections:
  - heading: Medical Career and Contributions
    body:
      - Voyno-Yasenetsky was a prominent surgeon whose work ranged broadly across abdominal surgery — including operations on abdominal organs, the gallbladder, and the stomach — as well as neurosurgery and orthopedics. He developed new surgical procedures for treating osteomyelitis.
      - "His most significant work, Sketches of Purulent Surgery (1934), remained a reference book and manual for surgeons. His greatest contribution lay in anesthesiology: he published Regional Anesthesiology in 1915 and was the first to describe trigeminal nerve anesthesia using ethanol injections. He pioneered regional anesthesia techniques and emphasized that local anaesthesia allowed doctors to attend solely to the operation, advocating that such methods be spread among rural physicians."
      - In 1946 he received the Stalin Prize in medicine.
  - heading: Priesthood, Episcopate, and Persecution
    body:
      - He was ordained a priest in 1921, taking the religious name Luke. He went on to serve as bishop and later archbishop of various regions, including Tashkent, Krasnoyarsk, and Tambov, before becoming Archbishop of Simferopol and Crimea, a position he held from 1946 until his death in 1961.
      - As a religious figure during the Soviet era, he endured political repression under communist rule, spending eleven years in internal exile. In 1958 he reflected on how arduous it had been to swim against the stormy current of antireligious propaganda.
      - He became completely blind in 1955.
  - heading: Relics & Shrines
    body:
      - His remains were disinterred in March 1996 before being transferred to the Holy Trinity Cathedral in Simferopol. Reports at the time described an indescribable aroma, and his heart was found to be incorrupt.
  - heading: Legacy and Veneration
    body:
      - The Russian Orthodox Church canonized him on May 25, 1996. The Ecumenical Patriarchate of Constantinople also recognized him as a saint in 2019.
      - He is commemorated on June 11.
