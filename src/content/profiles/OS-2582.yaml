id: OS-2582
lifespan: 1st century
overview:
  - Damaris was an Athenian woman who became a Christian through the preaching of the Apostle Paul at the Areopagus in Athens, around AD 55.
  - She is named in a single verse of the New Testament, Acts 17:34, which records that after Paul's Areopagus sermon certain hearers joined him and believed, 'among the which was Dionysius the Areopagite, and a woman named Damaris, and others with them.'
  - The Orthodox Church honors her as a righteous convert, commemorating her on October 3 together with Dionysius the Areopagite and other disciples associated with Paul's mission to Athens.
sections:
  - heading: Historical Context
    body:
      - Damaris appears only in Acts 17:34, in the account of Paul's visit to Athens. Following his address to the philosophers gathered at the Areopagus, a small number of listeners attached themselves to him and came to faith, and Damaris is named alongside Dionysius the Areopagite as one of them.
      - "Because women rarely attended the deliberations of the Areopagus, her presence there has drawn attention. Scholars have proposed several explanations for her identity: that she was a hetaira, a high-status courtesan, since ordinary women were not typically admitted to such gatherings; that she was a follower of Stoic philosophy, whose adherents welcomed women and whose ideas about the divine resembled points in Paul's preaching, which could account for her rapid conversion; or that she was a foreign visitor to the city. A Georgian manuscript tradition identifies her as the wife of Dionysius the Areopagite."
      - The origin of the name Damaris is uncertain. Proposed derivations include the Greek words damar ('wife') and damalis ('heifer'), and some have suggested a Coptic source.
  - heading: Commemoration
    body:
      - Damaris is remembered as the first Athenian woman to believe in Christ through the preaching of the Apostle Paul. Her feast falls on October 3 (Julian calendar; October 16 on the Gregorian).
      - On the same day the Church commemorates the Hieromartyr Dionysius the Areopagite, Bishop of Athens, together with his companions the Martyrs Rusticus the Presbyter and Eleutherius the Deacon, as well as the Venerable Dionysius the Recluse of the Kiev Caves, Saint John the Chozebite, Bishop of Caesarea in Palestine, and the Venerable Hesychius of Mount Horeb.
timeline:
  - when: c. AD 55
    title: Conversion at the Areopagus
    body: Damaris hears the Apostle Paul preach before the Athenian Areopagus and, with Dionysius the Areopagite and others, believes and becomes a Christian (Acts 17:34).
