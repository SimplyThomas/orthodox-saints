id: OS-2789
lifespan: died c. 275
overview:
  - Sabinian of Troyes was a Gallo-Roman martyr of the third century, venerated in both the Orthodox and Roman Catholic Churches. Tradition holds that he was born on the Greek island of Samos, converted from paganism to Christianity, and gave his life for the faith near Troyes in Gaul during the persecution under the Emperor Aurelian.
  - By tradition he was brought to Christian faith within the circle of Saint Patroclus of Troyes, and some accounts credit him with being the first to preach the Gospel at Troyes. He was arrested during the imperial persecution and put to death by decapitation at Rilly-Sainte-Syre, near Troyes, around the year 275.
liturgicalTitle: The Holy Martyr Sabinian of Troyes
patronage:
  - Rilly-Sainte-Syre
  - Balnot-sur-Laignes
  - Melle
timeline:
  - when: 3rd century
    title: Origins on Samos
    body: By tradition Sabinian was born on the Greek island of Samos; his name is associated with the Sabine people. Accounts relate that he fled his father's threats around 271 and traveled to Gaul.
  - when: c. 271-275
    title: Conversion and preaching at Troyes
    body: Having come to Troyes, he converted from paganism to Christianity. Tradition names Saint Patroclus of Troyes as the one who converted him, and reports that Sabinian was among the first to preach Christianity in the city.
  - when: c. 275
    title: Martyrdom at Rilly-Sainte-Syre
    body: During the persecution under the Emperor Aurelian he was arrested and, after torture, beheaded at Rilly-Sainte-Syre near Troyes. His feast is kept on January 29.
  - when: 5th century
    title: Discovery of his grave
    body: By tradition a blind Irish nun named Syra received a revelation of the location of Sabinian's grave at Rilly-Sainte-Syre; after praying there she was restored to sight and a chapel was built over the tomb.
sections:
  - heading: Historical Context
    body:
      - Sabinian belongs to the Gallo-Roman martyrs of the pre-Nicene Church, whose deaths fell during the imperial persecutions of the third century. His passion is set under the Emperor Aurelian (reigned 270-275), the same period to which the accounts of Saint Patroclus of Troyes are attached, though the surviving traditions preserve varied and sometimes conflicting details.
      - The connection to Patroclus of Troyes anchors Sabinian to the early Christian community of Troyes in Gaul. Patroclus, a wealthy aristocrat of the city, is said to have converted Sabinian; Patroclus was himself martyred by beheading, his death variously placed under Valerian or, in his passion account, under Aurelian.
  - heading: Relics & Shrines
    body:
      - His relics are honored at Troyes Cathedral. A chapel raised over his original grave at Rilly-Sainte-Syre marks the traditional site of his burial, and a translation of his relics is commemorated there on March 2.
      - Sabinian is named patron saint of Rilly-Sainte-Syre, of Balnot-sur-Laignes, and of Melle, near Poitiers.
  - heading: Miracles & Traditions
    body:
      - "Traditional Accounts: The best-known tradition surrounding Sabinian concerns the finding of his grave. A blind nun, remembered as Syra, is said to have come to Gaul and received a divine revelation of where his body lay at Rilly-Sainte-Syre; after praying at the spot she was healed of her blindness and built a chapel over his tomb. Some accounts identify her as the sister of Saint Fiacre."
      - "Traditional Accounts: The accounts differ over the details of his death and companions. Several relate that his sister Sabina died alongside him, and that a companion named Fabianus also died, commemorated separately at Troyes. Feast dates likewise vary across calendars, being kept variously on January 24 and January 29."
