flagReasons:
  - claim: The dates and identity of Saint Ekoumenios are uncertain.
    detail: >-
      Sources preserve two irreconcilable traditions — a late-tenth-century bishop of Trikka
      identified with the commentator Oecumenius, and a fourth-century Cappadocian kinsman of
      Achilles of Larisa — and modern scholarship redates the commentaries attributed to
      Oecumenius to the sixth/seventh century in Asia Minor ("Pseudo-Oecumenius"). The anchor
      row itself notes this disagreement and is flagged for review.
