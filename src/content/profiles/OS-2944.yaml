id: OS-2944
status: reviewed
eyebrow: Synaxis · The First Deacons
overview:
  - The Seven Deacons are the seven men of good repute, full of the Holy Spirit and of wisdom, whom the apostles appointed to serve the tables of the early Church at Jerusalem, as recorded in the Acts of the Apostles (6:1–6). When the Greek-speaking widows were being overlooked in the daily distribution, the Twelve called the faithful together and set apart seven — Stephen, Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicolas of Antioch — laying hands on them so that the apostles might give themselves to prayer and the ministry of the word.
  - In them the Church honors the origin of the diaconate — the ordering of ministry to the poor as a sacred office of the Church, not a merely practical arrangement. Chosen to serve, the Seven quickly became preachers and evangelists in their own right — Stephen the archdeacon disputed with the synagogue and, filled with the Spirit, became the first martyr of the Church; Philip carried the Gospel to Samaria and baptized the Ethiopian eunuch on the desert road.
  - Tradition numbers several of the Seven among the Seventy Apostles and follows them into mission and martyrdom across the apostolic world. Their commemoration keeps before the Church the truth that care for the hungry and the overlooked stands at the very heart of the Gospel, and that the table of service and the pulpit of preaching are not far apart.
