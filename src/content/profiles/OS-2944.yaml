timeline:
  - when: c. AD 34
    title: The Seven are chosen
    body: The Greek-speaking widows being overlooked, the apostles call the faithful to set apart seven men "full of the Spirit and of wisdom" to serve the tables (Acts 6:1–3).
  - when: c. AD 34
    title: Ordained by the apostles
    body: The Twelve pray and lay their hands upon the Seven — the first deacons of the Church.
  - when: c. AD 34
    title: The martyrdom of Stephen
    body: Stephen the archdeacon, full of grace and power, is stoned outside Jerusalem and becomes the first martyr of the Church (Acts 7).
  - when: Apostolic age
    title: Preaching and mission
    body: Philip evangelizes Samaria and the Ethiopian eunuch, and several of the Seven, numbered among the Seventy, carry the Gospel abroad.
members:
  - name: Stephen the Protomartyr
    saint_id: OS-0009
    role: Archdeacon & Protomartyr
    note: First martyr of the Church; he preached before the Sanhedrin and was stoned (Acts 6–7).
  - name: Philip the Deacon
    saint_id: OS-1998
    role: Deacon & Evangelist
    note: Evangelized Samaria and baptized the Ethiopian eunuch; also called Philip the Evangelist (Acts 8).
  - name: Prochorus
    saint_id: OS-1589
    role: Bishop of Nicomedia
    note: Traditionally became bishop of Nicomedia and a companion of the Apostle John.
  - name: Nicanor
    saint_id: OS-1589
    role: Martyr
    note: Tradition holds that he suffered martyrdom.
  - name: Timon
    saint_id: OS-1589
    role: Bishop of Bostra
    note: Traditionally became bishop of Bostra in Arabia and was martyred.
  - name: Parmenas
    saint_id: OS-1589
    role: Martyr
    note: Traditionally preached the Gospel and was martyred during the reign of Trajan.
  - name: Nicolas of Antioch
    role: Deacon
    note: A proselyte from Antioch. Later tradition is divided — some Fathers identify him with the Nicolaitans of Revelation, while others reject that identification.
