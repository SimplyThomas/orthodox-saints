id: OS-2159
lifespan: c. 972/981 – 1053
overview:
  - Lazarus of Mount Galesius (born Leo, c. 972/981) was a Byzantine monk and stylite who founded a monastic community on Mount Galesius near Ephesus in Asia Minor. Born to a peasant family near Magnesia (modern Manisa, Turkey), in the region of Lydia, he left home in youth to pursue the monastic life.
  - After entering monastic life at Attaleia, he traveled to Palestine, where he spent about a decade at the celebrated Lavra of Saint Sabas and was ordained to the priesthood by the Patriarch of Jerusalem. Returning to his home region, he settled on Mount Galesius, where he took up the ascetic discipline of the stylite, living atop a pillar.
  - Around his pillar there developed a monastic community; in time he founded three monasteries on the mountain. His communities were organized so that the monks lived in individual cells rather than a strictly cenobitic common life, and were permitted to earn their own income by practicing a handicraft. He died on November 7, 1053, and is venerated in both the Eastern Orthodox and Roman Catholic Churches.
liturgicalTitle: Our Venerable Father Lazarus, the Stylite and Wonderworker of Mount Galesius
patronage:
  - Monastics
  - Stylites
timeline:
  - when: c. 972/981
    title: Birth near Magnesia
    body: Born with the secular name Leo to a peasant family near Magnesia (modern Manisa) in the region of Lydia in Asia Minor. A manuscript reference stating he died at age 72 places his birth around 981.
  - when: Youth
    title: Enters monastic life at Attaleia
    body: After receiving an elementary schooling, he left home to become a monk at Attaleia.
  - when: Early adulthood
    title: Decade at the Lavra of Saint Sabas
    body: Traveled to Palestine and spent about ten years at the famed Lavra of Saint Sabas, engaged in rigorous ascetic discipline. The Patriarch of Jerusalem ordained him to the priesthood.
  - when: After return
    title: Settles on Mount Galesius
    body: Returned to his homeland near Ephesus and established himself on Mount Galesius, where he took up the stylite life on a pillar and founded three monasteries.
  - when: Nov 7, 1053
    title: Repose at Ephesus
    body: Died at the age of 72 at Ephesus (modern Selçuk, Turkey). The brethren buried him at the pillar on which he had practiced his asceticism.
sections:
  - heading: Formation in Palestine
    body:
      - An educated young man devoted to God, Lazarus first entered the monastic life at Attaleia before journeying to Palestine. There he joined the Lavra of Saint Sabas, a center of great ascetic tradition, where he spent roughly a decade in rigorous spiritual disciplines. During this period the Patriarch of Jerusalem ordained him to the priesthood.
  - heading: Mount Galesius and the Stylite Life
    body:
      - Returning to his home region near Ephesus, Lazarus established himself on Mount Galesius. By the account preserved in his vita, he there experienced a vision of a fiery pillar rising to heaven, encircled by angels singing 'Let God arise and let His enemies be scattered.' In response he built a church dedicated to the Resurrection of Christ and adopted the discipline of the stylite, standing upon a pillar.
      - His reputation for holiness drew monks who sought his guidance, and a functioning monastery grew up around his pillar dwelling. Over time he founded three monasteries on the mountain. Unlike most cenobitic houses, his communities allowed the monks to live in individual cells and even to earn their own income by practicing a handicraft.
  - heading: Legacy and Veneration
    body:
      - Lazarus died on November 7, 1053, and the brethren buried him at the pillar where he had struggled in asceticism. His veneration spread after his death through reports of miraculous occurrences at his tomb, and he came to be titled a Wonderworker.
      - He is venerated in both the Eastern Orthodox and Roman Catholic Churches, with feast days observed on November 7 and July 17.
  - heading: Sources and the Vita
    body:
      - Lazarus's Life was written by his disciple Gregory the Cellarer and later reworked by Patriarch Gregory II of Cyprus in the late thirteenth century. The account is notable for emphasizing everyday details and local events over supernatural elements.
  - heading: Traditional Accounts
    body:
      - By tradition, in response to monastic intercession his lifespan was extended by fifteen years beyond a death date that had earlier been revealed to him; he is said to have died at the age of 72.
