works:
  - title: The Ladder of Divine Ascent (Klimax tou Paradeisou)
    desc: Thirty-step manual of the ascetic and mystical life, addressed to cenobitic and hesychast monks alike; the most widely read Orthodox spiritual classic.
    date: early 7th century
  - title: Letter to the Shepherd (Pastor)
    desc: A companion work addressed to John of Raithu, offering guidance to abbots on the pastoral care of their communities.
