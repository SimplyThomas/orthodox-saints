id: OS-1991
lifespan: d. 1122
overview:
  - Saint Amphilochius was the third bishop of Vladimir-Volhynia (Volodymyr-Volynskyi), one of the oldest dioceses of Rus', established in the time of Saint Vladimir the Great. Consecrated in 1105 by Metropolitan Nikephoros of Kiev, he governed the see for seventeen years, laboring to convert the region's remaining pagans, to uproot superstition among the newly baptized, and to reconcile the feuding princes of Volhynia.
  - After resigning his bishopric he withdrew to the Kiev Caves monastery, where he ended his days in 1122. His memory is kept on October 10 together with the other holy hierarchs of Volhynia, a commemoration established in 1831 following the return of the Pochaiv Lavra to Orthodoxy.
liturgicalTitle: Our Father among the Saints Amphilochius, Bishop of Vladimir in Volhynia
timeline:
  - when: "1105"
    title: Consecrated bishop
    body: On August 27, 1105, Amphilochius was consecrated bishop of Vladimir-Volhynia by Nikephoros, Metropolitan of Kiev (who held the see from 1103 to 1121). He was the third occupant of the see, following two predecessors named Stephen — the first elected under Saint Vladimir himself, the second an igumen of the Kiev Caves monastery.
  - when: 1105–1122
    title: Seventeen years as bishop
    body: During his episcopate he worked to convert pagans to Christ and to root out lingering pagan superstitions among the newly baptized, while also seeking to pacify the strife among the princes of the region.
  - when: "1122"
    title: Repose at the Kiev Caves
    body: Having resigned his bishopric, Amphilochius continued his service to God in the Kiev Caves monastery, where he died in 1122.
  - when: "1831"
    title: Commemoration established
    body: His memory, together with the other holy hierarchs of Volhynia, was appointed for October 10, following the restoration of the Pochaiv Lavra in Volhynia to Orthodoxy in that year.
sections:
  - heading: The See of Vladimir-Volhynia
    body:
      - Vladimir-Volhynia (Volodymyr-Volynskyi) is among the oldest towns of Rus'. It first appears in the Primary Chronicle under the year 988, when Vladimir the Great appointed his son to rule there, and from 1146 it served as the capital of the Principality of Volhynia; its Dormition Cathedral was completed in 1160. The diocese was thus founded in the earliest period of the Christianization of Kievan Rus', only a couple of generations before Amphilochius became its third bishop, which places him among the first shepherds of one of the most ancient Christian centers of the Rus' lands.
  - heading: Episcopal Labors
    body:
      - "The sources remember Amphilochius above all as a missionary bishop. His seventeen-year tenure fell in a period when Christianity was still consolidating in the region: he labored intensely for the conversion of pagans and to eradicate the pagan superstitions that survived among those recently baptized. Beyond his pastoral work he acted as a peacemaker, striving to quell the quarrels among the princes of Volhynia."
      - On laying down his office he did not retire into idleness but entered the Kiev Caves monastery — the great monastic center of Rus' and the cradle of much of its early sanctity — where he lived out his final years until his death in 1122.
  - heading: Commemoration and the Volhynian Hierarchs
    body:
      - The October 10 feast of Saint Amphilochius honors him alongside the other holy hierarchs of the Volhynian region. This collective commemoration was instituted in 1831, when the Pochaiv Lavra — the foremost monastery of Volhynia — was returned to Orthodoxy after 111 years of Greek-Catholic Basilian control. The Lavra was reconsecrated as Orthodox on October 10, 1831, and the same date was chosen for the memory of the Volhynian saints, binding Amphilochius's commemoration to the restoration of Orthodox monastic life in the region he had once shepherded.
