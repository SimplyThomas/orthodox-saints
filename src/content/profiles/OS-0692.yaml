  - when: 474–491
    title: Monastery built under Emperor Zeno
    body: Emperor Zeno provides funds for Rabulas to build a monastery in the mountains, with construction supervised by Bishop John of Berytus. It becomes a center for converting local peoples to Christianity.
  - when: 491–518
    title: Further foundations under Anastasius I
    body: Traveling to Constantinople, Rabulas receives financial support from Emperor Anastasius I Dicorus, enabling him to build additional monasteries.
  - when: c. 530
    title: Repose
    body: Rabulas dies around 530. He is commemorated on February 19.
