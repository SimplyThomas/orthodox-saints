lifespan: 12th century – 1190
liturgicalTitle: Our Father among the Saints Leontius, Patriarch of Jerusalem
overview:
  - Leontius was a twelfth-century monastic who rose from the abbacy of the Monastery of Saint John the Theologian on Patmos to become Patriarch of Jerusalem, an office he held from 1170 until his repose in 1190. Born in Tiberioupolis in Phrygia to wealthy and devout parents, he embraced the monastic life after his father's early death, and his reputation for asceticism and humility led to his unanimous election as abbot and, in time, to the patriarchal throne.
  - His patriarchate fell during a period when the Orthodox of the Holy Land lived under Latin Crusader rule, and accounts of his time in office are sparse. He is remembered chiefly for his monastic virtue, his refusal of earlier offers of episcopal sees, and his willingness to confront imperial authority, which led to his exile. His memory is kept on Patmos and in Jerusalem on May 14.
timeline:
  - when: Second half of the 12th century
    title: Birth in Phrygia
    body: Leontius was born in Tiberioupolis in Phrygia to wealthy and devout parents. After his father died when he was a youth, he studied under a pious priest before turning to the monastic life.
  - when: 12th century
    title: Monastic formation
    body: He was tonsured a monk at the Ptelidion Monastery of the Mother of God, then traveled to Constantinople and eventually to the Monastery of Saint John the Theologian on Patmos, where he served under the abbot Theoktistos.
  - when: 12th century
    title: Abbot of Patmos
    body: On the repose of Theoktistos, Leontius was chosen to succeed him as abbot by the unanimous decision of the monks. The Emperor Manuel I Komnenos offered him episcopal sees, which he declined.
  - when: "1170"
    title: Patriarch of Jerusalem
    body: He was elevated to the patriarchal throne of Jerusalem in 1170, succeeding Nicephorus II, at a time when the Orthodox Church there lived under Latin domination.
  - when: "1177"
    title: Mission to the Holy Land
    body: According to one account he was sent as a representative of Emperor Manuel I Komnenos to King Baldwin IV of Jerusalem. The Latin patriarch Amalric of Nesle was hostile to him, and the emperor recalled him to avoid wider conflict.
  - when: May 14, 1190
    title: Exile and repose
    body: Because of the rebuke he directed at the emperor Andronikos Komnenos, Leontius was exiled. He reposed at an advanced age on May 14, 1190.
sections:
  - heading: Veneration
    body:
      - Saint Leontius is commemorated on May 14, both on Patmos, where he had served as abbot, and in Jerusalem, where he had been patriarch. A church service composed in his honor was published in Jerusalem in 1912.
      - "Sources differ on the year of his repose: while the prevailing account gives 1190, Saint Nikodemos the Hagiorite records the year as 1175."
