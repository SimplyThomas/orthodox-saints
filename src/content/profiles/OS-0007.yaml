liturgicalTitle: The Holy Myrrh-bearer and Equal-to-the-Apostles Mary Magdalene
lifespan: 1st century
overview:
  - Mary Magdalene was one of the women who followed Christ during His earthly ministry and the first witness of His Resurrection. The Gospels record that she came from Magdala, a town on the Sea of Galilee, that the Lord freed her from seven demons, and that she ministered to Him and the apostles out of her own means.
  - She stood by the Cross at the Crucifixion and came to the tomb on the third day, where the risen Christ appeared to her before any other; for carrying this news to the apostles she is honored in the Orthodox Church as 'Equal-to-the-Apostles.' As one of the women who brought spices to anoint the Lord's body she is also numbered among the Myrrh-bearers. Her feast is kept on July 22, and she is remembered on the Sunday of the Myrrh-bearing Women.
timeline:
  - when: during Christ's ministry
    title: Following Christ in Galilee
    body: From Magdala by origin, Mary was freed by the Lord of seven demons (Luke 8:2) and became a devoted follower, providing for Him and the apostles out of her own resources as they traveled through Judea and Galilee.
  - when: the Passion
    title: At the Cross and the burial
    body: She stood by the Cross with the Mother of God and the Apostle John when the other disciples had fled, and witnessed the Lord's burial.
  - when: the Resurrection
    title: First witness of the risen Lord
    body: Coming to the tomb early on the third day to anoint the body, she encountered the risen Christ, who appeared to her first of all, and she carried the news to the apostles with the words 'I have seen the Lord!'
  - when: after Pentecost
    title: Preaching and travels
    body: By tradition she preached the Resurrection beyond Judea, traveling as far as Rome, and afterward joined the Apostle John at Ephesus.
  - when: her later years
    title: Repose at Ephesus
    body: She reposed in peace at Ephesus, where she had assisted the Apostle John, and was buried there.
sections:
  - heading: In the Gospels
    body:
      - Mary took her name from Magdala, a fishing town on the western shore of the Sea of Galilee. The Gospel of Luke records that the Lord drove seven demons out of her, after which she followed Him and, with other faithful women, provided for the disciples out of her own resources as they went through Judea and Galilee.
      - "All four Gospels place her among the women at the Crucifixion and the empty tomb. The Orthodox accounts emphasize her constancy: she stood by the Cross together with the Mother of God and the Apostle John when the other disciples had fled, witnessed the burial, and came to the tomb early on the third day intending to anoint the body of the Lord."
  - heading: First Witness of the Resurrection
    body:
      - At the tomb Mary encountered the risen Christ, who appeared to her before all others, and she became the first to announce the Resurrection to the apostles, saying, 'I have seen the Lord!' Because the apostles preached the Resurrection to the world while she announced it to the apostles themselves, Orthodox tradition calls her 'Apostle to the Apostles' and honors her as Equal-to-the-Apostles.
      - The Eastern Church has always kept her distinct from the unnamed penitent woman of Luke 7, with whom Western tradition once identified her, venerating her instead as a Myrrh-bearer and Equal-to-the-Apostles.
  - heading: Apostolic Labors and the Red Egg
    body:
      - By tradition Mary continued to preach the Resurrection after Pentecost, traveling as far as Italy and Rome. A cherished account relates that she came before the emperor Tiberius, proclaiming that Christ was risen and presenting him a red egg; when he scoffed that the dead can no more rise than an egg can turn red, the egg in her hand turned red. The Orthodox custom of dyeing eggs red at Pascha is connected to this tradition.
      - She later went to Ephesus, where she assisted the Apostle and Evangelist John the Theologian in his labors, remaining there to the end of her life.
  - heading: Relics and Veneration
    body:
      - Mary reposed in peace at Ephesus and was buried in that city. Byzantine tradition records that her relics were translated to Constantinople, by the usual account in the ninth century, and that portions were afterward carried to Rome and to the West.
      - The Orthodox Church commemorates her on July 22 and also remembers her on the Sunday of the Myrrh-bearing Women. In Eastern iconography she is most often depicted holding a vessel of myrrh or, in keeping with the tradition above, a red egg.
