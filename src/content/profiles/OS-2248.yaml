    body: The emperor summons fifty learned philosophers and rhetoricians to refute Saint Katherine; persuaded by her instead, they confess Christ and are burned alive by his order.
  - when: c. 305 AD
    title: Visit to Katherine's prison
    body: Empress Augusta, the commander Porphyrius, and a body of soldiers visit Katherine in prison and witness the miraculous destruction of the wheel prepared for her execution.
  - when: c. 305 AD
    title: Confession and martyrdom
    body: The empress and Porphyrius confess Christ publicly; the empress, Porphyrius, and the soldiers are beheaded.
