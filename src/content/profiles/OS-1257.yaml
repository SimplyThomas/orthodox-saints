lifespan: 15th–16th century (reposed 1510)
liturgicalTitle: Our Venerable Father Sophronius the Bulgarian, Hieromonk of the Penkovsky Monastery
overview:
  - Sophronius the Bulgarian was a hieromonk who lived across the fifteenth and sixteenth centuries, during the period of Ottoman rule over the Balkans. According to his commemoration, he was born in the village of Penkovts in Bulgaria, bearing the name Stephen in the world, and entered monastic life at the Penkovsky Monastery near Sofia.
  - When Turkish forces threatened the monastery, he withdrew across the Danube into Wallachia, in what is now Romania, where he continued his monastic struggle until his repose in 1510. He is venerated among the Bulgarian saints and commemorated on May 28.
timeline:
  - when: 15th–16th century
    title: Monastic life near Sofia
    body: Born in the village of Penkovts in Bulgaria and named Stephen in the world, he became a hieromonk at the Penkovsky Monastery near Sofia.
  - when: Under Ottoman threat
    title: Flight to Wallachia
    body: Learning that Turkish invaders were preparing to attack the monastery, he fled to Vlahia (Wallachia), in present-day Romania, and settled in a monastery near the Danube River.
  - when: Later years
    title: Ascetic struggle at Rusensk
    body: He devoted himself to continual labors of fasting, vigil, and prayer within the monastic community of Rusensk, which according to tradition may have been founded by Saint Joachim, Patriarch of Trnovo.
  - when: May 28, 1510
    title: Repose
    body: He reposed on May 28, 1510. By one account his end was peaceful; another account relates that he was killed by a servant.
sections:
  - heading: Relics & Shrines
    body:
      - Tradition holds that, following the account of his violent death at the hands of a servant, his relics were found to be incorrupt three years after his repose. He was remembered for his philanthropy and almsgiving during his lifetime.
