patronage:
  - Invoked against despondency and discouragement, drawing on her noted teaching on resisting the spirit of despondency (acedia)
  - Looked to as a model and intercessor for those enduring long or painful illness, which she bore with thanksgiving
  - Honored among women pursuing the monastic and ascetic life, to whom she served as teacher and guide
