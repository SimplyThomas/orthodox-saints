id: OS-0393
lifespan: 4th century (traditionally said to have lived about eighty years)
overview:
  - Synkletike of Alexandria was a fourth-century ascetic and Desert Mother of Roman Egypt, remembered as a teacher of the spiritual life whose recorded sayings circulated widely among the early monastic communities. Born to a noble and wealthy family of Macedonian descent that settled in Alexandria, she renounced an inheritance and a much-sought marriage to live in hidden asceticism.
  - Though celebrated for her beauty and pursued by many suitors, she refused marriage, and after her parents' deaths distributed her fortune to the poor. She cut her hair as a sign of her changed life and withdrew with her blind sister to the tomb of a relative outside the city, where she lived as an anchorite and drew young women seeking her instruction.
  - "Her significance rests on her teaching rather than on miracles: her counsel on humility, hidden virtue, and the danger of despondency was preserved among the sayings of the desert. In old age she bore a long and agonizing final illness with thanksgiving, and she is commemorated on January 5."
sections:
  - heading: Early Life and Renunciation
    body:
      - According to her vita, Synkletike's ancestors were of noble Macedonian stock who relocated to Alexandria, drawn by reports of the city's Christian community. She was raised in wealth and was noted for her physical beauty, which together with her family's standing attracted numerous suitors.
      - Despite pressure to marry, she resisted all proposals and chose a life devoted to God. She had a blind sister and two brothers; by tradition one brother died young while the other fled an arranged marriage to take up the monastic life. After her parents died, she sold her possessions and gave the proceeds to the poor.
      - She cut off her hair as an outward sign of her inward transformation, and withdrew with her blind sister to the tomb of a relative remote from the city, taking up the life of an anchorite marked by strict fasting and a deliberately hidden asceticism.
  - heading: Teaching and Legacy
    body:
      - Synkletike's reputation for holiness drew young women who sought her as a guide, making her one of the notable women of the Egyptian desert alongside such figures as Theodora of Alexandria and Sarah of the Desert. Her teaching survives chiefly through the Apophthegmata, the collected sayings of the desert, which preserve a substantial body of her counsel.
      - Her sayings drew on everyday and domestic imagery — the work of a household, the loading of a ship for a voyage — as well as nautical metaphor, to illustrate the spiritual life. She taught that the beginning of the path to God brings great struggle and labor but afterward an indescribable joy, that virtues must remain hidden to keep their worth, and that humility and poverty are essential.
      - She is especially remembered for her counsel on despondency, which she named among the gravest spiritual dangers, to be resisted through psalmody, prayer, and perseverance in one's cell. She also held that for those living in community, obedience is a greater virtue than chastity. Her teaching integrated the bodily and the spiritual rather than emphasizing extreme ascetic feats alone.
      - "Two principal sources transmit her life and words: a Greek Life traditionally attributed to Athanasius of Alexandria, and the collections of desert sayings compiled later. Her teaching makes extensive use of Scripture, with direct quotations and many allusions woven throughout."
  - heading: Final Illness and Repose
    body:
      - In old age — by tradition around eighty years — Synkletike was afflicted with a long and severe illness. The vita describes a lung ailment with constant fever and a wasting decline, followed by a painful affliction of the jaw and face that spread over a period of months and caused great disfigurement.
      - She is said to have borne this suffering with thanksgiving, regarding it as a share in the sufferings of Christ. Her attendants tended her with medicine and incense; though she at first declined treatment, she is reported to have accepted it so as to spare her caregivers. By tradition she foretold the day of her death, and she reposed peacefully on January 5.
      - Unusually among the saints, no posthumous miracles are recorded of her; her memory rests entirely on her teaching and her influence upon the women's ascetic communities that looked to her.
