id: OS-2702
lifespan: c. 634 – 672
patronage:
  - Lichfield
  - Mercia
overview:
  - Chad (also called Caedda) was a seventh-century Anglo-Saxon monk and bishop, the first Bishop of Lichfield and a leading figure in the conversion of Mercia. He was the youngest of four brothers active in the early English church, alongside Saint Cedd, Saint Cynebil (Cynibil), and Caelin, and is known chiefly through the writings of the Venerable Bede.
  - Trained at Lindisfarne under Saint Aidan and further in Ireland, Chad served successively as abbot of Lastingham, Bishop of the Northumbrians, and finally Bishop of the Mercians and the people of Lindsey. He was remembered above all for his humility, yielding his Northumbrian see without resistance and being recalled to episcopal office by Archbishop Theodore of Tarsus.
  - Chad established his see at Lichfield and founded monasteries before his death on 2 March 672. He is venerated in the Roman Catholic, Anglican, and Celtic Orthodox churches and is noted as a saint in a new edition of the Eastern Orthodox Synaxarion.
timeline:
  - when: c. 634
    title: Birth in Northumbria
    body: Chad is born in Northumbria, the youngest of four brothers of British Celtic descent, likely of noble lineage. His brothers Cedd, Cynebil, and Caelin all become monks.
  - when: c. 635–651
    title: Education at Lindisfarne
    body: Chad studies at the monastery of Lindisfarne under Saint Aidan, together with his brothers.
  - when: mid-7th c.
    title: Study in Ireland
    body: He completes his education at Rath Melsigi (Rathmelsige), an Anglo-Saxon monastery in Ireland, studying scripture intensively with companions including Egbert of Ripon.
  - when: "664"
    title: Abbot of Lastingham
    body: After his brother Cedd dies of plague, Chad succeeds him as abbot of the monastery of Lastingham in Yorkshire, which the brothers had established together.
  - when: 664–669
    title: Bishop of the Northumbrians
    body: Appointed by King Oswiu, Chad is consecrated Bishop of the Northumbrians. Owing to a plague-related shortage of bishops, he is ordained by Bishop Wini and British bishops.
  - when: "669"
    title: Yields the see to Wilfrid
    body: Archbishop Theodore of Tarsus removes Chad from the Northumbrian see so that Wilfrid may assume it. Chad yields with characteristic humility.
  - when: "669"
    title: Bishop of Lichfield
    body: At the request of King Wulfhere, and impressed by Chad's humility, Theodore recalls and consecrates him Bishop of the Mercians and of the people of Lindsey. Chad establishes his see at Lichfield, becoming its first bishop.
  - when: 2 March 672
    title: Repose at Lichfield
    body: After about two and a half years as Mercian bishop, Chad dies at Lichfield. Bede records that his death was attended by heavenly singing and angelic visitations.
sections:
  - heading: Early Life and Formation
    body:
      - "Chad was born in Northumbria near the beginning of the seventh century, one of four brothers who all entered the monastic life: Saint Cedd, Saint Cynebil (Cynibil), Caelin, and Chad himself, the youngest. His name is of British Celtic origin."
      - All four brothers studied under Saint Aidan at the monastery of Lindisfarne. Chad later completed his education in Ireland at Rath Melsigi (Rathmelsige) in County Carlow, an Anglo-Saxon monastery, where he studied scripture intensively with companions including Egbert of Ripon.
      - With his brother Cedd, Chad helped establish the monastery of Lastingham in Yorkshire. When Cedd died of plague in 664, Chad succeeded him as its abbot.
  - heading: Episcopal Ministry
    body:
      - In 664 King Oswiu appointed Chad Bishop of the Northumbrians. Because plague had left few bishops available to consecrate him, he was ordained by Bishop Wini together with British bishops. In 669 Archbishop Theodore of Tarsus judged this consecration irregular and removed Chad from the see so that Wilfrid could take it; Chad yielded without protest.
      - That same year King Wulfhere requested Chad as bishop for Mercia. Impressed by Chad's humility, Theodore recalled him and consecrated him Bishop of the Mercians and of the people of Lindsey. Chad established his see at Lichfield, making him the first Bishop of Lichfield, and staffed a new minster there with monks from Lastingham. He founded monasteries at Barrow upon Humber and elsewhere. Bede relates that Theodore, concerned for Chad's endurance on long journeys, ordered him to travel by horse rather than continue his practice of going everywhere on foot.
      - Chad's missionary labors advanced the conversion of the Mercians. Tradition, recorded in the OrthodoxWiki account, relates that the sons of King Wulfhere asked about Jesus and were baptized; the king killed them in a rage but afterward repented and built churches in penance.
  - heading: Relics and Shrines
    body:
      - Chad died on 2 March 672 at Lichfield. He was regarded as a saint immediately after his death, and miracles and cures were reported at his well and reliquary.
      - His relics passed through a complex history. During the Reformation under Henry VIII, in 1538 Prebendary Arthur Dudley of Lichfield Cathedral removed them and passed them to his nieces. They eventually reached the Seminary at Saint-Omer in France, and by 1837 were presented to the Roman Catholic Vicar Apostolic; they were enshrined in Saint Chad's Cathedral, Birmingham, in 1841. Radiocarbon dating in 1985 authenticated the remains as seventh-century. In November 2022 one bone was returned to a new shrine at Lichfield Cathedral.
  - heading: Veneration
    body:
      - Chad is commemorated on 2 March. He is venerated in the Roman Catholic, Anglican, and Celtic Orthodox churches, and is noted as a saint in a new edition of the Eastern Orthodox Synaxarion.
