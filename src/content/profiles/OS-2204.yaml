works:
  - title: Oratio Panegyrica (Panegyric to Origen)
    desc: A farewell oration in honour of his teacher Origen, described as the first attempt at biography in Christian literature.
  - title: Epistola Canonica (Canonical Epistle)
    desc: A letter on church discipline and organization, bearing witness to conditions during the Gothic invasions.
  - title: Exposition of the Faith (Ekthesis tes pisteos)
    desc: A statement of Trinitarian doctrine, dated c. 260-270, emphasizing the eternity and equality of the three divine Persons.
  - title: Metaphrasis of Ecclesiastes
    desc: A paraphrase of the book of Ecclesiastes attributed to Gregory.
