works:
  - title: Dialogues
    desc: Four books recounting the lives and miracles of holy men of sixth-century Italy and teachings on the afterlife; the source of his epithet 'Dialogist' and a principal source for the life of St. Benedict.
  - title: Pastoral Rule (Pastoral Care)
    desc: A treatise defining the responsibilities of bishops, long used as a manual for priests in the West.
  - title: Moralia in Job
    desc: An extensive commentary on the Book of Job, possibly finished as early as 591.
  - title: Homilies on Ezekiel
    desc: A series of homilies expounding the prophet Ezekiel.
