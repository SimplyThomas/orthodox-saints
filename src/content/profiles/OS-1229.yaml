id: OS-1229
liturgicalTitle: Our Venerable Martyr Michael the Black-Robed of the Lavra of Saint Savva
lifespan: 9th century
overview:
  - >-
    Michael the Black-Robed was a ninth-century monk of the Lavra of Saint Savva who,
    by tradition, was put to death for refusing to deny Christ. A native of Edessa in
    Mesopotamia, he gave away his inheritance, made the pilgrimage to the Holy Places,
    and entered the monastic life before his martyrdom. He is commemorated on May 23,
    and again on July 29.
  - >-
    The synaxarion relates that while selling his handiwork in Jerusalem he refused
    the advances and the favor of a Muslim queen and would not renounce his faith,
    and that he was at last beheaded by order of the caliph. His epithet "the
    Black-Robed" reflects his monastic habit.
timeline:
  - when: 9th c.
    title: Renunciation at Edessa
    body: >-
      Born at Edessa in Mesopotamia to Christian parents, Michael distributed his
      inheritance to the poor after their death and went to Jerusalem to venerate the
      Holy Places.
  - when: 9th c.
    title: Monastic life at the Lavra of Saint Savva
    body: >-
      He settled in the Lavra of Saint Savva and became the disciple of his kinsman
      Saint Theodore of Edessa; the two supported themselves by weaving baskets of
      reeds, which Michael carried to the marketplace in Jerusalem.
  - when: 9th c.
    title: Trial before the caliph
    body: >-
      Taken before the court of the caliph al-Ma'mun (813-833), Michael refused both
      the queen's advances and the demand that he renounce Christ, and was condemned.
  - when: 9th c.
    title: Martyrdom by beheading
    body: >-
      The account relates that, given poison which left him unharmed, Michael was at
      last beheaded; his relics were afterward brought to the Lavra of Saint Savva.
sections:
  - heading: From Edessa to the desert of Saint Savva
    body:
      - >-
        Michael belonged to the ninth-century world of Edessa, then under Muslim rule.
        Having renounced his inheritance, he made the pilgrimage to Jerusalem and
        joined the Lavra of Saint Savva in the Judean wilderness, placing himself under
        his relative Saint Theodore of Edessa, who lived both in the monastery and as
        an anchorite. The two supported themselves by a humble craft, weaving reed
        baskets that Michael sold in the city.
  - heading: The confession and martyrdom
    body:
      - >-
        The synaxarion relates that Michael's well-made baskets drew the notice of a
        eunuch of the Muslim queen Seida, who was visiting Jerusalem with her husband,
        the caliph al-Ma'mun. Brought before her, Michael refused her seduction; in
        her anger she accused him to the caliph, who demanded he confess Islam.
        Michael refused, the account says, and called Muhammad a deceiver. Offered a
        cup of poison, he made the sign of the cross over it, drank, and remained
        unharmed, and was then beheaded.
      - >-
        His life was preserved in the tradition associated with Saint Theodore of
        Edessa, and his relics were honored at the Lavra of Saint Savva. He is
        commemorated on May 23 and on July 29.
related:
  - name: Saint Theodore of Edessa
    note: Michael's kinsman and teacher at the Lavra of Saint Savva, in whose tradition his life is preserved
patronage:
  - Monastics and pilgrims who keep the faith under persecution
  - Those who resist temptation and worldly favor for Christ
