id: OS-1117
liturgicalTitle: The Holy, Glorious Great-Martyr Irene of Magedon
lifespan: 4th century
overview:
  - >-
    The Holy Great-Martyr Irene was, by the synaxarion's account, born in the city of Magedon
    in Persia during the fourth century. At birth she was named Penelope, and she was the
    daughter of Licinius, a pagan ruler of a small kingdom, and his wife Licinia. Tradition
    relates that her conversion to Christ and the long series of torments she endured and was
    delivered from led great numbers of pagans to the faith, on account of which she is honored
    in the Orthodox Church as a great martyr.
  - >-
    Because Penelope was very beautiful, her father shut her away from the age of six in a high
    tower, together with thirteen young companions, so that she would be kept apart from the
    Christian faith. He appointed an aged tutor named Apellian to educate her; but Apellian was
    himself a Christian, and through his lessons the girl learned of Christ the Savior and of the
    Christian virtues. By tradition she received a vision of a dove bearing an olive branch, an
    eagle with a wreath of flowers, and a raven carrying a snake, which Apellian interpreted as
    signs of grace, of victory, and of the sufferings she would undergo.
  - >-
    Refusing the marriage her father had arranged, Penelope was baptized by the priest Timothy,
    who gave her the name Irene, meaning "peace," and she broke her father's idols to pieces.
    The accounts of her passion describe a succession of rulers who tried to compel her to
    sacrifice and who subjected her to torments from which she was repeatedly delivered, so
    that thousands were converted at each deliverance before she was finally put to death.
timeline:
  - when: 4th century
    title: Birth in Magedon as Penelope
    body: >-
      According to the synaxarion, Penelope was born in Magedon in Persia, daughter of the
      pagan ruler Licinius and his wife Licinia.
  - when: From age six
    title: Confined in a tower and taught by Apellian
    body: >-
      Her father isolated her in a high tower with thirteen young companions and a tutor,
      Apellian, who was secretly a Christian and instructed her in the faith.
  - when: Adolescence
    title: Baptism and the name Irene
    body: >-
      Refusing marriage, Penelope was baptized by the priest Timothy, who named her Irene, and
      she destroyed her father's idols.
  - when: After her confession
    title: Tortures and the conversion of her father
    body: >-
      By tradition she was thrown beneath wild horses; one horse turned on Licinius and injured
      him, and through Irene's prayer he was restored. The synaxarion relates that Licinius and
      Licinia, with great numbers of others, were then baptized.
sections:
  - heading: Conversion and the breaking of the idols
    body:
      - >-
        The tradition preserved in the Orthodox synaxarion makes Irene's own conversion the
        spring of everything that follows. Shut away in the tower so that she would marry well
        and remain in the old religion, she was instead catechized in secret by her Christian
        tutor Apellian and was baptized by the priest Timothy, taking the name Irene in place of
        Penelope. Her first public act of confession was to break the idols her father kept,
        which set in motion the conflict between father and daughter that the passion narrative
        recounts.
  - heading: Torments, deliverances, and the conversion of many
    body:
      - >-
        The synaxarion relates that Irene passed through the hands of several rulers who tried
        in turn to make her sacrifice. She was bound and cast before wild horses that would not
        move against her; she was shut for ten days in a pit of vipers and serpents; and, in the
        account of King Numerian at Callinicus, she was enclosed within heated bronze oxen and
        emerged unharmed. At each of these deliverances the tradition records that great numbers
        of onlookers came to faith in Christ — by one reckoning some five thousand in Magedon,
        and thousands more elsewhere — so that her sufferings became the occasion of widespread
        conversion. It is from this fruit of conversions, rather than from a single death alone,
        that she is honored with the title of great martyr.
  - heading: Death and relics
    body:
      - >-
        The accounts describe Irene as travelling and preaching through several cities before
        her repose. She is commemorated as a martyr, and her relics are venerated in the
        Orthodox world, with traditions placing them at the Monastery of Kykkos on Cyprus and
        in the Greek church of Saint George in Venice. There are several saints named Irene in
        the Orthodox calendar; this Great-Martyr Irene, formerly Penelope of Magedon, is to be
        distinguished from them.
