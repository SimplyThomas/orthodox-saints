id: OS-2904
lifespan: 6th century (died c. 550–560)
patronage:
  - Monastic beginnings
  - Spiritual mentorship
overview:
  - Romanus of Subiaco was a sixth-century monk of the region around Subiaco in Italy, best known for his role in the monastic formation of the young Benedict of Nursia. When Benedict withdrew from the world to live as a hermit, Romanus clothed him in the monastic habit and became his chief supporter during the three years Benedict spent in solitude in a cave above the river Anio.
  - The primary historical source for his life is the second book of the Dialogues of Pope Gregory the Great, which recounts the life of Benedict. Romanus died around the middle of the sixth century and is venerated in both the Eastern Orthodox and Catholic traditions, with a feast observed on May 22.
sections:
  - heading: Support of the Young Benedict
    body:
      - Romanus was a monk whose monastery stood on the mountain above the cliff overhanging the cave to which Benedict withdrew. When Benedict traveled from Enfide to Subiaco, the two met, and Romanus gave him the monk's habit, marking the beginning of Benedict's monastic life.
      - During Benedict's three years of solitary living in the cave above the river Anio, Romanus served him in every way he could. He visited frequently and on fixed days brought him food, and by tradition lowered bread down to the cave on a long cord. This regular provision was essential to Benedict's survival and vocation. Gregory the Great's account in the Dialogues emphasizes Romanus's consistent dedication to supporting the younger aspirant.
  - heading: Later Life in Gaul
    body:
      - After his time in Italy, Romanus is said to have traveled to Gaul, where he founded a small monastery at Dryes-Fontrouge (Druyes-les-Belles-Fontaines) near Auxerre. Some accounts describe him as an abbot. He died around the middle of the sixth century, with dates given variously as about 550 and about 560.
      - He is sometimes identified with a Romanus of Auxerre venerated as a bishop of that see on 8 or 6 October, though this identification is not universally accepted.
  - heading: Relics & Shrines
    body:
      - Romanus was buried at the monastery at Dryes-Fontrouge. His relics are recorded as being located at Auxerre, Sens, and Vareilles.
  - heading: Veneration
    body:
      - Romanus is venerated in both the Eastern Orthodox Church and the Catholic Church; his feast is celebrated on May 22. In the Catholic tradition his recognition as a saint is classified as pre-Congregation, meaning it predates the formal canonization process established by the Church. Catholic hagiographic references for his life include the Catholic Encyclopedia, the 1914 Roman Martyrology, and the Italian resource Santi e Beati.
