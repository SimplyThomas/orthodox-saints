id: OS-0008
liturgicalTitle: The Holy Great Martyr and Equal-to-the-Apostles Photini, the Samaritan Woman
lifespan: died c. 66
overview:
  - Photini, the Samaritan Woman, is identified in Orthodox tradition with the woman with whom Christ conversed at Jacob's Well, recounted in the Gospel of John (John 4:5-42). According to the tradition, she was afterward baptized and received the name Photini, meaning 'the enlightened one,' from the Greek word for light. She is venerated by the Church as a Great Martyr and as Equal-to-the-Apostles, the latter title given for her labors in preaching the Gospel after her encounter with Christ.
  - "The synaxarion relates that Photini devoted the remainder of her life to evangelism, bringing many to the faith together with her family. Her two sons are named Victor (also called Photinos) and Joses, and tradition records five sisters who shared in her labors and witness: Anatole, Photo, Photida (also rendered Photis), Paraskeve, and Kyriake. By tradition she preached fearlessly in Carthage in North Africa during the reign of the Emperor Nero (54-68) before traveling to Rome."
  - Her witness is said to have drawn the attention of Nero, under whom she and her companions were subjected to severe tortures and imprisonment. The tradition relates that she refused to renounce Christ and that among those converted through her was Domnina, identified as a daughter of Nero, along with the Martyr Sebastian. After enduring her sufferings, Photini was cast into a dry well, where, by tradition, she surrendered her soul to God about the year 66.
  - Photini is commemorated on February 26 in the Greek tradition and on March 20 in the Slavic tradition, and she is honored on the movable Sunday of the Samaritan Woman, the fourth Sunday after Pascha, when the Gospel of her meeting with Christ at the well is read. Her name is also rendered Photine, Fotini, and, in Slavic usage, Svetlana.
sections:
  - heading: The Woman at the Well
    body:
      - The foundation of Photini's veneration is the Gospel account in which Christ, resting at Jacob's Well near the Samaritan town of Sychar, asked a woman drawing water to give Him to drink, and revealed Himself to her as the Messiah (John 4:5-42). The tradition holds that the Apostles later baptized her, giving her the name Photini, 'the enlightened one,' to mark her spiritual awakening upon recognizing Christ.
      - The Gospel itself records that the woman, leaving her water jar, went into the town and brought many of its inhabitants to Christ (John 4:28-30, 39-42). It is from this immediate evangelization that the Church derives her title Equal-to-the-Apostles, regarding her as among the first to spread word of the Savior.
  - heading: Evangelism and Martyrdom
    body:
      - Beyond the Gospel account, the synaxarion preserves a tradition of Photini's later life as a preacher of the Gospel. By this tradition she labored in Carthage during the reign of Nero before going to Rome, where the persecution of Christians under that emperor overtook her and her family.
      - The tradition relates that Photini, her sons, and her sisters endured a prolonged series of tortures and imprisonment without renouncing Christ. After her sufferings she was cast into a dry well, where she gave up her soul to God about the year 66. Her companions in martyrdom are remembered with her.
