lifespan: 1218–1233
liturgicalTitle: The Holy Right-Believing Prince Theodore Yaroslavich of Novgorod
overview:
  - Theodore Yaroslavich was a prince of thirteenth-century Rus' and the elder brother of Saint Alexander Nevsky. Born in 1218 to Yaroslav Vsevolodovich, he was sent with his younger brother to govern Novgorod on their father's behalf while still a boy, and he took part in the military life of the principality before reaching adulthood. He died suddenly in 1233, by tradition on the very day appointed for his wedding, and is venerated in the Russian Orthodox Church as a right-believing prince.
  - "His brief life is remembered chiefly for its abrupt end and for the figure it touched: his intended bride, the daughter of Prince Michael of Chernigov, renounced the world after his death and became the monastic Saint Euphrosyne of Suzdal. Theodore was buried at the Yuriev Monastery in Novgorod, and his relics were honored there and later in the city's cathedral of Hagia Sophia."
timeline:
  - when: "1218"
    title: Birth
    body: Theodore is born to Yaroslav Vsevolodovich, the elder brother of the future Saint Alexander Nevsky.
  - when: 1229–1230
    title: Sent to govern Novgorod
    body: Theodore and Alexander are stationed in Novgorod as their father's representatives. After being expelled when the veche invited another prince, they are reinstated in 1230 when Yaroslav returns to rule.
  - when: "1232"
    title: Campaign against the Mordovians
    body: At the age of fourteen Theodore takes part in campaigns against the pagan Mordovian princes, called to serve, as the synaxarion puts it, not only in prayer but also by the sword.
  - when: "1233"
    title: Betrothal and sudden death
    body: Theodore is arranged to marry Theodoulia, daughter of Prince Michael of Chernigov. By tradition, when the wedding guests had already gathered, the bridegroom died suddenly. His feast is kept on June 5.
sections:
  - heading: His Bride and Saint Euphrosyne of Suzdal
    body:
      - Theodore's intended bride was the eldest daughter of Prince Michael of Chernigov, later venerated as a holy martyr. After Theodore's death she left the world and was tonsured in a Suzdal monastery dedicated to the Placing of the Robe of the Mother of God, taking the name Euphrosyne in honor of Saint Euphrosyne of Alexandria.
      - She is commemorated as the Venerable Euphrosyne of Suzdal on September 25, later serving as abbess of her community before her repose in 1250. Through her, Theodore's short life remained joined to the memory of the Church.
  - heading: Relics & Shrines
    body:
      - Theodore was buried in the Yuriev Monastery in Novgorod. According to the synaxarion, his tomb was desecrated by Swedish forces in 1614, after which Metropolitan Isidore transferred his remains to the cathedral of Hagia Sophia in Novgorod.
      - There his relics were venerated until 1919, when they were removed during the early Soviet period.
