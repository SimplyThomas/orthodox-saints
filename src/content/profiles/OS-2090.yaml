flagReasons:
  - claim: He withdrew to a cave near the River Lom, described in the profile as a tributary 'in the region of Ruschuk.'
    detail: The dossier mentions the River Lom (Mystagogy, external[1]) and the city of Ruschuk (OCA, external[0]) in separate, unconnected statements. No source in the dossier states that the Lom is in or near the region of Ruschuk. The River Lom enters the Danube near the town of Lom in northwestern Bulgaria, whereas Ruschuk (Ruse) is in northeastern Bulgaria — these are distinct locations. The profile conflates the two source references by asserting a geographic link the dossier does not support.
