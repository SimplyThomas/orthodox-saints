id: OS-1561
liturgicalTitle: The Righteous Alexis (Medvedkov), Priest of Ugine
lifespan: 1867–1934
overview:
  - Alexis Medvedkov (1867–1934) was a Russian Orthodox priest who, after parish service in Russia and persecution during the Bolshevik revolution, emigrated to Western Europe and ended his ministry as rector of a poor Russian emigre parish at Ugine in the French Alps. He was remembered for his humility, his constant prayer, and his patient endurance of hardship and slander.
  - Twenty-two years after his death his body was found incorrupt, and in 2004 the Ecumenical Patriarchate of Constantinople formally recognized him as a saint. Sources style him 'Righteous'; though his rank is recorded among the confessors who suffered under the Soviet persecution, he died of natural causes rather than by execution.
