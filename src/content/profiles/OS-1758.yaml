    title: Reign of Emperor Maximian
    body: The persecution in which Agathonicus and his companions suffered took place during the reign of the Roman emperor Maximian.
  - when: c. 4th century
    title: Arrest at Nicomedia
    body: Under the official Comitus Eutolmius, Agathonicus was arrested in Nicomedia together with Theoprepius, Acindynus, and Severian after the followers of Zoticus had been crucified in the Pontine region.
  - when: c. 4th century
    title: Deaths on the road to Thrace
    body: During the transport toward the imperial court, Zoticus, Theoprepius, and Acindynus died of their torture wounds near Potama, and Severian was executed at Chalcedon.
  - when: c. 4th century
    title: Beheading at Selymbria
    body: Agathonicus and the surviving companions were beheaded by the sword at Selymbria in Thrace by order of the emperor.
