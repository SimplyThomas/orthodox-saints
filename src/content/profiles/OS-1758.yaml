    note: Co-martyr whose followers were crucified in Pontus; he died of his wounds on the road to Thrace.
  - name: Martyr Theoprepius
    note: Co-martyr arrested with Agathonicus at Nicomedia who died of torture near Potama.
  - name: Martyr Acindynus
    note: Co-martyr arrested with Agathonicus who died of his torments during the journey to the imperial court.
  - name: Martyr Severian
    note: Co-martyr arrested with Agathonicus at Nicomedia and put to death at Chalcedon.
