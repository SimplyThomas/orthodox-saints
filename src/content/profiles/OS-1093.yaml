id: OS-1093
liturgicalTitle: The Holy Right-believing Queen Tamara of Georgia
lifespan: c. 1160 - 1213
overview:
  - Tamara (also rendered Tamar) was Queen of Georgia at the height of the kingdom's medieval power, ruling first as co-regent alongside her father, George III, from 1178 and then as sole monarch from 1184 until her death. Her reign is remembered in Georgian tradition as the Golden Age, a period of territorial expansion, cultural flourishing, and the consolidation of a Christian kingdom that extended its influence across the Caucasus.
  - Georgian narratives extol her meekness, love of peace, wisdom, piety, and beauty. She is remembered above all as a just and Christian ruler who defended and adorned the Church, supported monasteries at home and in the wider Orthodox world, and showed constant care for the poor, widows, and orphans. For these labors and her generosity to the Church, she was numbered among the saints by the Georgian Orthodox Church, which commemorates her as a right-believing queen.
timeline:
  - when: c. 1160
    title: Birth
    body: Tamara was born about 1160, the daughter of King George III of Georgia and Queen Burdukhan, who came from the royal house of Alania.
  - when: "1178"
    title: Crowned co-ruler with her father
    body: Because George III had no male heir, he had Tamara crowned as co-monarch during his lifetime to secure the succession; for this reason Georgian usage styles her "King."
  - when: "1184"
    title: Sole reign begins
    body: On the death of her father Tamara became sole ruler of Georgia, beginning a reign that would be remembered as the kingdom's Golden Age.
  - when: 1191 - 1207
    title: Marriage to David Soslan
    body: After the failure and dissolution of an earlier marriage, Tamara married the Alan prince David Soslan, with whom she had two children, George and Rusudan, both of whom later reigned.
  - when: c. 1203 - 1206
    title: Military expansion
    body: Georgian forces under her reign won notable victories over Seljuk armies, including at the Battle of Basian, and extended the kingdom's dominion across much of the Caucasus.
  - when: "1213"
    title: Repose
    body: Tamara died in 1213 and was numbered among the saints; her traditional burial is associated with the Gelati Monastery.
sections:
  - heading: A Christian queen and the Golden Age of Georgia
    body:
      - Tamara ruled Georgia with a wisdom and godliness that gave her reign its enduring reputation as the Golden Age. Under her government the kingdom grew in strength and extent, and Georgian arts and letters flourished, an era later associated with the poet Shota Rustaveli. Tradition praises her not for conquest alone but for the meekness, love of peace, and piety with which she is said to have governed.
      - Because her father George III left no son, Tamara was crowned during his lifetime and ruled in her own right rather than as a consort, which is why Georgian sources call her 'King.' Her second marriage, to the Alan prince David Soslan, produced two children, George and Rusudan, who each reigned after her.
  - heading: Defender and adorner of the Church
    body:
      - Tamara's care for the Church was a defining feature of her rule. Orthodox accounts relate that she summoned a Church assembly to set aside disorder and to replace unworthy hierarchs, acting to restore good order among the clergy. She built many churches and supported monastic life, and her patronage reached beyond Georgia to Georgian monastic communities in Jerusalem and the eastern Mediterranean and to centers on Mount Athos.
      - Her solicitude for the poor, for widows, and for orphans is remembered alongside her ecclesiastical works, and she assisted in the spiritual development of Georgia. For these cares and her generous gifts to the Church, she was added to the roster of saints; many Georgians have venerated her as a healer of infirmities.
family:
  heading: The Bagrationi royal saints
  intro: Tamara belonged to the Bagrationi dynasty, the royal house of Georgia that gave the Church a line of saint-kings and queens across the medieval centuries.
  figures:
    - name: King George III of Georgia
      note: Her father, who had her crowned co-ruler in his own lifetime to secure the succession.
      commemorated: false
    - name: Saint Demetre I (Damiane), King of Georgia
      note: Her grandfather, the king who laid down the crown to become a monk and hymnographer; commemorated May 23.
      href: saint/OS-1233
    - name: Blessed David IV the Builder, King of Georgia
      note: Her great-grandfather, the great king-saint who renewed the medieval Georgian kingdom at the dawn of its golden age.
      href: saint/OS-0548
    - name: Saint Demetrius II the Self-Sacrificing, King of Georgia
      note: Her great-grandson, the passion-bearer king who gave himself up to the Mongols to spare his people and was beheaded in 1289.
      href: saint/OS-0815
    - name: Holy King Ashot of Georgia
      note: Progenitor of the Bagrationi royal house from which Tamara descended.
      href: saint/OS-0553
patronage:
  - Rulers and those in positions of civil authority
  - Those who defend and serve the Church
  - The poor, widows, and orphans
