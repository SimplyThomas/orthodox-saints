lifespan: 14th century – 1432
liturgicalTitle: Our Father among the Saints Leontius, Bishop of Radauti
overview:
  - Leontius of Radauti was a Moldavian monastic and hierarch who lived in the fourteenth and early fifteenth centuries. Born at Radauti, he was tonsured a monk under the name Laurence and founded a monastery near the town before being elevated to the episcopal see of Radauti on the recommendation of Prince Alexander the Good.
  - After guiding his diocese for many years he withdrew into the wilderness as a solitary ascetic, where he received the Great Schema and the name Leontius shortly before his death. His relics were later found incorrupt, and he was formally glorified by the Orthodox Church of Romania in 1992.
timeline:
  - when: 14th century
    title: Birth and monastic tonsure
    body: Leontius was born at Radauti in Moldavia. He received the monastic tonsure under the name Laurence and entered the ascetic life, by tradition beginning at Bogdana Monastery.
  - when: 14th–15th century
    title: Foundation of a monastery near Radauti
    body: As a monk he founded a monastery near Radauti, which afterward came to be associated with his monastic name. Among those who gathered around him as disciples was Saint Daniel the Hesychast.
  - when: early 15th century
    title: Bishop of Radauti
    body: On the recommendation of Prince Alexander the Good, Leontius was made Bishop of Radauti and led the diocese for many years.
  - when: "1432"
    title: Withdrawal, Great Schema, and repose
    body: In his old age he retired to live alone in the wilderness. There he received the Great Schema with the name Leontius and reposed soon afterward.
  - when: "1992"
    title: Glorification
    body: Saint Leontius was glorified by the Orthodox Church of Romania, formally restoring his veneration.
sections:
  - heading: Episcopal Ministry
    body:
      - The see of Radauti was founded in 1402, and according to the tradition recorded in his life it was Prince Alexander the Good who recommended Leontius for the office of bishop. He is remembered as having governed his flock with wisdom over a long episcopate before retiring to the solitary life.
      - The synaxarion relates that he received the grace of working miracles and healed the sick through prayer during his lifetime.
  - heading: Relics & Shrines
    body:
      - His holy relics were reported to have been found incorrupt, and accounts relate that many received healing at his tomb. His relics are kept in the church of Bogdana Monastery in Radauti.
companions:
  - name: Venerable Daniel the Hesychast
    note: Disciple who gathered around him at Radauti; later the renowned Moldavian hermit and spiritual father of Stephen the Great.
