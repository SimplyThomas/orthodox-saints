id: OS-2836
lifespan: early 7th century – c. 699
overview:
  - Seaxburh of Ely was a seventh-century queen of Kent who, after her widowhood, entered monastic life and rose to become abbess of Ely, succeeding her sister Æthelthryth (Etheldreda). Born in the early seventh century, she was a daughter of Anna, King of East Anglia, and belonged to a royal family that produced several venerated saints.
  - "She married Eorcenberht of Kent, who ruled from 640 until his death in 664, and bore him four children: the future kings Ecgberht and Hlothhere, and two daughters, Eormenhild and Ercengota, both honored as saints. After Eorcenberht's death she governed Kent as regent, founded monastic houses, received the monastic veil, and ultimately joined her sister's community at Ely, where she led the double monastery and oversaw the famous translation of Æthelthryth's incorrupt relics."
  - She is commemorated on 6 July and venerated in the Orthodox Church, the Catholic Church, and the Anglican Communion by virtue of pre-congregation canonization.
liturgicalTitle: Our Venerable Mother Seaxburh, Queen of Kent and Abbess of Ely
patronage:
  - Widows
  - Queens and royal women
  - Ely
timeline:
  - when: early 7th century
    title: Birth into the East Anglian royal house
    body: Seaxburh was born the daughter of Anna, King of East Anglia, who reigned until his death at the Battle of Bulcamp in 653 or 654.
  - when: c. 640
    title: Marriage to Eorcenberht of Kent
    body: "She married Eorcenberht, King of Kent (reigned 640–664), and bore four children: the sons Ecgberht and Hlothhere, both of whom later ruled Kent, and the daughters Eormenhild and Ercengota, both venerated as saints."
  - when: "664"
    title: Widowhood and regency
    body: Following Eorcenberht's death on 14 July 664 during an outbreak of plague, Seaxburh served as regent, ruling Kent until her young son came of age.
  - when: c. 670
    title: Foundation of Minster-in-Sheppey
    body: Her son King Ecgberht granted her land at Minster on the Isle of Sheppey, where she established a nunnery, said to be the first such foundation in Kent; she also founded a house at Milton Regis. Archbishop Theodore of Tarsus gave her the veil of holiness at Minster-in-Sheppey.
  - when: c. 679
    title: Abbess of Ely
    body: Seaxburh moved to the double monastery at Ely, where her sister Æthelthryth was abbess, and upon Æthelthryth's death she succeeded her in leadership of the community.
  - when: "695"
    title: Translation of Æthelthryth's relics
    body: Seaxburh orchestrated the translation of her sister's remains from a common grave into a marble sarcophagus; opened after sixteen years, the body was found miraculously preserved, and the coffin and clothes were reported to display miraculous powers.
  - when: c. 699
    title: Repose at Ely
    body: According to the Liber Eliensis, Seaxburh died at a good, late age at Ely and was buried there alongside her sisters Æthelthryth and Wihtburh and her daughter Eormenhild.
sections:
  - heading: Family and Royal Background
    body:
      - Seaxburh belonged to one of the most prominent saintly families of Anglo-Saxon England. Her father was Anna, King of East Anglia, and her sister was Æthelthryth (Etheldreda), the celebrated abbess of Ely whom she would eventually succeed.
      - "Through her marriage to Eorcenberht of Kent she became the mother of two kings, Ecgberht and Hlothhere, and of two daughters honored as saints: Ercengota, who became a nun at Faremoutiers Abbey on the continent, and Eormenhild (also called Ermenilda), who became abbess at Ely."
  - heading: Queen, Regent, and Monastic Founder
    body:
      - "Her husband Eorcenberht was a significant figure in the Christianization of Kent: he was the first king in Britain to order the destruction of pagan idols and the observance of Lent, and in 655 he appointed Deusdedit, the first Saxon Archbishop of Canterbury."
      - When Eorcenberht died in the plague of 664, Seaxburh governed the kingdom as regent until her son came of age. She used her authority to found monastic houses, establishing Kent's first abbey for women at Milton Regis and a nunnery at Minster-in-Sheppey on land granted by her son Ecgberht around 670.
      - Having received the monastic veil from Archbishop Theodore of Tarsus at Minster-in-Sheppey, she later withdrew to the double monastery at Ely to live under her sister's rule, and on Æthelthryth's death took up the office of abbess herself.
  - heading: The Translation of Saint Æthelthryth
    body:
      - Seaxburh is especially remembered for the translation of her sister Æthelthryth's relics in 695, sixteen years after her death. She had the remains removed from a common grave and placed in a marble sarcophagus.
      - When the tomb was opened, Æthelthryth's body was found to be miraculously preserved, and her coffin and grave-clothes were reported to possess miraculous powers. The event became a foundation of Ely's later reputation as a place of pilgrimage.
  - heading: Relics and Shrines
    body:
      - According to the Liber Eliensis, Seaxburh reposed at a good, late age and was buried at Ely alongside her sisters Æthelthryth and Wihtburh and her daughter Eormenhild, making Ely a shrine to several members of her family.
      - The nunnery she founded at Minster-in-Sheppey endured as a monastic community; it was burned by the Danes in 855, roughly 185 years after its founding, and the site remained a religious house until the Dissolution of the Monasteries in 1539.
  - heading: Veneration
    body:
      - Seaxburh received pre-congregation canonization and is venerated in the Eastern Orthodox Church, the Catholic Church, and the Anglican Communion.
      - Her principal feast is kept on 6 July, with a secondary observance on 17 October marking the translation of her relics.
