id: OS-0530
liturgicalTitle: The Holy Martyrs Theodotion, Paul and Pausirios
lifespan: 3rd century
overview:
  - Theodotion, Paul, and Pausirios were brothers by birth, Egyptians, who suffered as martyrs in Egypt during the third century. They are commemorated on January 24.
  - By the accounts Pausirios and Paul confessed their faith in Christ and were martyred under the emperor Diocletian. Their brother Theodotion came to believe in Christ after witnessing the steadfastness of their martyrdom, and he in turn gave his life for the faith.
