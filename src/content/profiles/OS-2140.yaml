id: OS-2140
lifespan: Second half of the 13th century – 1308
overview:
  - Venerable Nicholas, called the Radiant Star of the Georgians, was a Georgian monastic and hymnographer active in the second half of the 13th century. He is remembered chiefly as a writer of church services, of whom little else is preserved.
  - His final years coincided with the reign of King Vakhtang III of Georgia (reigned 1302–1308), son of the martyred King Demetre II 'the Devoted.' Nicholas reposed peacefully in 1308.
  - He is distinct from the Martyr Nicholas Dvali. The Georgian Orthodox Church commemorates him on November 3.
timeline:
  - when: Second half of the 13th century
    title: Life and monastic labors
    body: Nicholas lived and worked as a monastic and hymnographer in Georgia, becoming renowned as one of the leading spiritual figures of his era.
  - when: 1302–1308
    title: Reign of King Vakhtang III
    body: Nicholas's final years fell within the reign of Vakhtang III, son of King Demetre II the Devoted, when the Kingdom of Eastern Georgia lived under Mongol dominance.
