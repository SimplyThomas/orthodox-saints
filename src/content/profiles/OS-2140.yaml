    body: Nicholas reposed peacefully.
sections:
  - heading: Historical Context
    body:
      - Nicholas lived during a difficult period for Georgia, when the kingdom was subject to Mongol dominance. His final years coincided with the reign of King Vakhtang III (1302–1308), of the Bagrationi dynasty, who was appointed king in 1302 by the Ilkhan Ghazan and controlled only the capital Tbilisi and parts of the southern and eastern provinces.
      - Vakhtang III was the son of Demetre II 'the Devoted,' a canonized Georgian king-martyr, and spent much of his reign commanding Georgian and Armenian auxiliaries in Mongol campaigns before his death in 1308, the same year Nicholas reposed.
  - heading: Contributions and Legacy
    body:
      - Nicholas was renowned as one of the greatest hymnographers and spiritual figures of his era. He authored numerous church services and canons, including a 'Canon of Supplication for Rain.'
      - Scholars believe he likely also translated liturgical texts from Greek into Georgian, among them the 'Canon for the Blessing of Holy Water.' Few of his works have survived to modern times, though his significance in Georgian Orthodox Christianity is acknowledged through these liturgical contributions.
      - Little else about his life is known.
  - heading: Relics & Shrines
    body:
      - The historian Platon Ioseliani documented that church services attributed to Saint Nicholas are preserved among the manuscripts of the Monastery of Iviron on Mount Athos.
      - Iviron was founded between 980 and 983 by the Georgian monks John the Iberian and John Tornike and served as a center of scholarship for Georgian clergy, including the renowned George the Hagiorite, who translated Byzantine theological texts into Georgian. As the Kingdom of Georgia weakened during the Mongol period, Greek monks gradually took control, and by 1357 Georgians had become a minority there, yet the monastery's Georgian manuscript collections endured.
