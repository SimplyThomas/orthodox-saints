id: OS-0695
lifespan: 1522–1589
overview:
  - Philothea of Athens (1522–1589), born Revoula Benizelos, was an Athenian noblewoman of the Ottoman period who became a nun and devoted her life and fortune to charitable works in her native city. After an unhappy forced marriage and early widowhood, she founded a convent, schools, and refuges, ransomed Christian women from slavery, and sheltered refugees. Beaten by Ottoman mercenaries for her labors, she died of her wounds and is honored as a venerable-martyr and a patroness of Athens.
  - "She was born into Byzantine noble families: her father was Angelos Benizelos and her mother Syrigi (Syriga) Palaiologina. By tradition her mother, who had been barren, conceived her after receiving a vision of light from an icon of the Theotokos. She is commemorated on February 19."
patronage:
  - Patroness of the city of Athens
  - Women
  - Charitable works
sections:
  - heading: Early Life and Marriage
    body:
      - Revoula Benizelos was born in 1522 in Athens, then under Ottoman rule, to the noble families of Angelos Benizelos and Syrigi Palaiologina. The sources relate that her mother had long been barren and conceived her only after a vision of light from an icon of the Theotokos.
      - While still a young girl she was pressured into marriage against her will; the sources differ on her age, giving either twelve or fourteen. Her husband, identified as Andrea Chila, treated her cruelly. The marriage lasted about three years and ended with his death, dated by the sources to 1537 or 1539, when she was still in her teens. She refused to remarry despite family pressure.
  - heading: Monastic Calling
    body:
      - After the deaths of her parents around 1547–1549, Revoula gave herself to a life of prayer, fasting, and vigil. By tradition the Apostle Andrew the First-Called appeared to her in a vision and commanded her to build a convent.
      - She was tonsured a nun and received the monastic name Philothei (Philothea). Around 1551 she established the Convent of the Apostle Andrew on the site occupied today by the Archdiocese of Athens, and later founded a second convent on Lefkosia Avenue in Patesia, which was afterward converted into a hospital.
  - heading: Charitable Works
    body:
      - From her convents Philothea organized an extensive network of charity. She built hospices, homes for the elderly, and schools for both girls and boys.
      - She is especially remembered for ransoming enslaved Greek women from Ottoman harems and providing shelter to freed women, including those who were pregnant. She also helped refugees escape secretly to the islands, among them Tzia (Kea), Andros, Aegina, and Salamina. On February 22, 1583, she wrote to the Venetian Senate requesting funds to help cover the debts she had incurred through these ransoms.
  - heading: Martyrdom and Legacy
    body:
      - The Ottoman authorities sought to conscript the convent's nuns into harems, and the nuns' refusal led to Philothea's violent death. On October 3, 1588, four Ottoman mercenaries attacked her monastery at Patisia during an evening vigil and severely beat her. She died from her injuries on February 19, 1589, at the age of sixty-six.
      - She was canonized within a few years of her death, during the tenure of Ecumenical Patriarch Matthew II (1595–1600), who proclaimed her among the righteous. The Filothei district of Athens is named after her, and she is honored as a patron saint of the city, of women, and of charitable works.
  - heading: Relics & Shrines
    body:
      - Philothea's relics are interred in the Metropolitan Cathedral of Athens. According to the sources her head is missing from the surviving relics.
