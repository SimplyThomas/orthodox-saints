id: OS-2161
lifespan: Date uncertain; ancient (era of the pagan persecutions in Macedonia)
overview:
  - Auctus, Taurion, and Thessalonica are three early martyrs commemorated together on November 7, whose relics were buried at Amphipolis in Macedonia. Their story centers on Thessalonica, the daughter of a pagan priest who embraced Christianity.
  - When her father discovered her conversion, he beat her and cast her out of the household, leaving her destitute. Auctus and Taurion came to her aid and attempted to reason with the embittered father, who responded by denouncing the two men to the authorities. After confessing their faith and enduring torture, Auctus and Taurion were beheaded, and Thessalonica died shortly afterward.
  - The three are among the more obscure martyrs of the ancient Macedonian Church; the surviving sources preserve the outline of their suffering but no firm dates, and no emperor or governor is named.
liturgicalTitle: The Holy Martyrs Auctus, Taurion, and Thessalonica, at Amphipolis in Macedonia
sections:
  - heading: Account of Their Martyrdom
    body:
      - According to the synaxarion, Thessalonica was the daughter of a pagan priest. When she converted to Christianity and her father learned of it, he attacked her violently and expelled her from the family home, leaving her without any means of supporting herself.
      - Auctus and Taurion provided aid to Thessalonica in her distress and sought to reason with her father. The priest reacted by reporting both men to the civil authorities, who arrested them. Having professed their Christian faith and undergone torture, the two men were beheaded. Thessalonica died soon after.
      - The three martyrs were buried together at Amphipolis in Macedonia. The episode reflects a period of persecution in which a pagan family member could denounce a Christian relative to the authorities.
  - heading: Commemoration
    body:
      - The three martyrs are commemorated on November 7. On the same day the Church remembers the 33 Martyrs of Melitene (including Hieron, Hesychius, and Nicander), Saint Lazarus the Wonderworker of Mount Galesius, the Martyrs Melasippus and Carina with their son Antoninus, and Saint Willibrord (Clement) of Utrecht.
      - "Sources for their lives are limited: the OCA synaxarion and calendar entries preserve the account, while dedicated encyclopedia articles for the group are not available. Their precise dating is lost."
