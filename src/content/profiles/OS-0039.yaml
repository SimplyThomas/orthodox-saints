celebration:
  intro: Ways to honor St Nina, the enlightener of Georgia.
  ideas:
    - idea: Make a grapevine cross with the children — bend two twigs into the distinctive drooping-armed Georgian cross and bind the center with thread, recalling that St Nina tied hers with strands of her own hair.
    - idea: Serve grapes, raisins, or grape juice, a nod to the vine-cross the Theotokos gave her.
    - idea: Tell how St Nina, a young woman, brought a whole nation to Christ — a chance to talk about how God uses the humble and the small.
    - idea: Find Georgia on a map, try a simple Georgian dish, or look at photos of the Bodbe convent where she is buried.
    - idea: Sing the apolytikion to St Nina and venerate her icon as a family.
