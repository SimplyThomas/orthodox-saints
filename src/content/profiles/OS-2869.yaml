id: OS-2869
lifespan: died 518
overview:
  - Saint Elias of Jerusalem (Elias I) was Patriarch of Jerusalem from 494 until his deposition in 516, remembered as a defender of the Council of Chalcedon during the Monophysite controversies of the reign of the emperor Anastasius I. Refusing to sign the emperor's non-Chalcedonian formula, he was deposed and exiled to Aila on the Red Sea, where he reposed in 518.
  - An Arab by birth, Elias received his monastic formation in Egypt before founding a laura near Jericho and rising to the patriarchal throne of Jerusalem. He was closely associated with the monastic life of the Palestinian desert, including Saint Sabas and Saint John the Silent. He is distinct from the Prophet Elias (Elijah).
liturgicalTitle: Our Father among the Saints Elias, Patriarch of Jerusalem, the Confessor
patronage:
  - Defenders of Chalcedon
  - Confessors under persecution
  - Exiles
timeline:
