    title: Driven from Egypt
    body: An Arab by birth educated in an Egyptian monastery, Elias was driven out of Egypt by the Monophysite Patriarch Timothy II.
  - when: After 457
    title: Founds a laura near Jericho
    body: He settled in Palestine and founded a laura in the region of Jericho, later being ordained priest by Patriarch Anastasius of Jerusalem.
