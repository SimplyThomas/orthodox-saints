id: OS-2643
liturgicalTitle: The Holy New Hieromartyr Seraphim, Hegumen of the Monastery of the Holy Trinity of Pljevlja
lifespan: died 1941
overview:
  - Hieromartyr Seraphim of Pljevlja (Serafim Dzaric) was the hegumen of the Monastery of the Holy Trinity, a medieval Serbian Orthodox monastic complex at Pljevlja in the region of present-day Montenegro. He was killed in 1941 during the Second World War and is venerated among the New Martyrs of Dabar-Bosnia and Mileseva.
  - According to the historical record, he was put to death during the Battle of Pljevlja, when Partisan (Communist) forces, following the capture of the town, ordered measures against those they regarded as enemies. His death belongs to the broader pattern of suffering endured by the clergy and monastics of the Serbian Orthodox Church during the wartime persecutions of this period.
timeline:
  - when: "1941"
    title: Martyrdom at Pljevlja
    body: Serving as hegumen of the Monastery of the Holy Trinity at Pljevlja, he was killed during the Second World War, in the course of the fighting that accompanied the Battle of Pljevlja.
sections:
  - heading: Historically Documented
    body:
      - Sources identify him as the leading monastic of the Holy Trinity Monastery of Pljevlja, a medieval Serbian Orthodox lavra. He held the office of hegumen (the rank of archimandrite is also recorded for him).
      - His death is dated to the wartime events of 1941 and is attributed to Partisan headquarters' order against perceived enemies after the town changed hands. He is commemorated within the Serbian Orthodox Church's grouping of the New Martyrs of Dabar-Bosnia and Mileseva, who suffered during the persecutions of the Church in the 1940s.
companions:
  - name: New Martyrs of Dabar-Bosnia and Mileseva
    note: The grouping of Serbian clergy and monastics martyred in this region during the Second World War, among whom he is commemorated.
