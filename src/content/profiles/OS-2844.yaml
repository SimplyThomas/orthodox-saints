id: OS-2844
lifespan: c. 403 – 449
overview:
  - Hilary of Arles (c. 403–449) was a fifth-century bishop of Arles in Roman Gaul, a monk formed at the monastery of Lérins who succeeded his kinsman Saint Honoratus in the see of Arles around 429. Noted as an ascetic and preacher, he is remembered above all as the author of a panegyrical life of Honoratus.
  - A vigorous organizer, Hilary sought to exercise a metropolitan primacy over the churches of southern Gaul. His deposition of a fellow bishop provoked an appeal to Rome, and in 444 Pope Leo I curtailed the jurisdiction Hilary had claimed. He reposed in 449 and is venerated on May 5. He is distinct from the earlier Saint Hilary of Poitiers.
liturgicalTitle: Our Father among the Saints Hilary, Bishop of Arles
patronage:
  - Arles
  - against snake bites
timeline:
  - when: c. 403
    title: Birth in Gaul
    body: Hilary was born around 403 in Roman Gaul; the sources variously place his origins in the region of Dijon or in Provence. Before entering monastic life he appears to have been living at Dijon.
  - when: c. 420s
    title: Entry into Lérins
    body: In his youth Hilary joined the abbey of Lérins, then presided over by his kinsman Honoratus. According to one tradition he had been raised a pagan and was baptized at Lérins upon accepting Honoratus's invitation to the monastic community.
  - when: c. 429
    title: Succession to the see of Arles
    body: Having served as an associate of Honoratus after the latter became bishop of Arles, Hilary succeeded him as bishop of Arles around 429, while still a young man.
  - when: "444"
    title: Roman curtailment of his jurisdiction
    body: After Hilary deposed Chelidonius, bishop of Besançon, an appeal was carried to Rome. Pope Leo I used the case to extinguish the Gallican vicariate headed by Hilary, depriving him of the rights to consecrate bishops, convene synods, and oversee the province.
  - when: "449"
    title: Repose
    body: Hilary died at Arles around 449, traditionally on 5 May, at about the age of forty-eight. His name was later entered into the Roman martyrology.
sections:
  - heading: Monastic Formation and Episcopate
    body:
      - Hilary entered the monastery of Lérins in his early youth, drawn there by his kinsman Honoratus, its abbot. The two were relatives, and one account holds that Hilary, originally raised outside the faith, converted and was baptized at Lérins after Honoratus's urging.
      - When Honoratus became bishop of Arles, Hilary served alongside him, and on Honoratus's death succeeded to the see around 429 despite his relative youth. As bishop he was known for his asceticism and preaching. Following the model of Augustine of Hippo, he organized his cathedral clergy into a common 'congregation,' devoting much of their life to shared ascetic discipline.
  - heading: The Dispute with Rome
    body:
      - Hilary held the standing of a metropolitan and sought to exercise a primacy over the churches of southern Gaul, including oversight extending toward Vienne and Narbonne. In asserting this authority he deposed Chelidonius, bishop of Besançon, for disregarding his primacy.
      - The deposition was appealed to Rome. In 444 Pope Leo I used the case to abolish the Gallican vicariate that Hilary headed, stripping him of the rights to consecrate bishops, summon synods, and govern the province. Later tradition records that his zeal in spreading the faith brought him into conflict with the people and the civil authorities, and that he was more than once reproved from Rome; even so, his sanctity was not called into question.
  - heading: Legacy and Veneration
    body:
      - After his death Hilary's name was introduced into the Roman martyrology, and he came to be venerated in both the Western and Eastern churches, with a feast on May 5. He is honored as the patron saint of Arles and is invoked against snake bites.
      - He is to be distinguished from the earlier Saint Hilary of Poitiers.
  - heading: Works
    body:
      - Hilary's principal surviving work is the Vita Sancti Honorati, a biography and panegyric of his kinsman and predecessor Honoratus of Arles. He also composed the Metrum in Genesin, a versified treatment of Genesis.
      - A poem titled De providentia is sometimes attributed to him, though it is more commonly credited to Prosper of Aquitaine.
