id: OS-2892
lifespan: c. 1881 – 1928
overview:
  - Hieromonk Nicephorus (Kuchin) was a monk of the Solovetsky (Solovki) Spaso-Transfiguration Monastery who, amid the Soviet persecution of the Russian Orthodox Church, became the closest assistant of the monastery's last abbot, Archimandrite Benjamin (Kononov). After the monastery's suppression, the two withdrew to a remote forest hermitage near the Lodma River in the Arkhangelsk region, where they were murdered and their cell burned in 1928.
  - Born Nikolai Ivanovich Kuchin around 1881 in the Solvychegodsk District of Vologda Province, he served in the Imperial Russian Army before entering monastic life at Solovki in 1909. He was tonsured in 1913, later ordained hieromonk, and shared arrest, forced labor, and eventual martyrdom with his abbot.
  - He was glorified as a venerable martyr (prepodobnomuchenik) at the Jubilee Bishops' Council of the Russian Orthodox Church in August 2000, and is numbered among the Synaxis of New Martyrs and Confessors of Russia. His feast is kept on April 4 (Old Style) / April 17 (New Style).
liturgicalTitle: The Holy New Hieromartyr Nicephorus (Kuchin), Hieromonk, of Solovki Monastery
patronage:
  - Solovki Monastery
  - New Martyrs of Russia
