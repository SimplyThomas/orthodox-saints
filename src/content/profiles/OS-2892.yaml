flagReasons:
  - claim: The martyrdom occurred on 'the eve of Pascha during Bright Week' — these are mutually exclusive liturgical terms. The eve of Pascha (Holy Saturday) precedes Pascha; Bright Week follows it.
    detail: Julian Pascha 1928 fell on April 2 O.S. (= April 15 Gregorian). April 4 O.S. is therefore two days after Pascha — Bright Tuesday — which the external source correctly identifies as 'Tuesday of Bright Week.' The description 'eve of Pascha' is calendrically wrong for this date and contradicts 'during Bright Week' in the same phrase. The phrase appears verbatim in both the timeline entry and the Martyrdom section. 'Tuesday of Bright Week' is accurate; 'eve of Pascha' is not.
