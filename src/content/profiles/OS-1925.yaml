id: OS-1925
lifespan: c. 1350s – 1442
overview:
  - Gregory of Pelsheme was a Russian monastic founder of the fifteenth century, born into the Lopotov nobility in the city of Galich in the Kostroma region. According to his life, his parents arranged his marriage when he was about fifteen but died before it could take place, leaving him his inheritance, which he distributed to the poor before taking monastic vows.
  - He entered the monastery of the Nativity of the Most Holy Theotokos on the shore of Lake Galich, where he was ordained a priest and later served as abbot. Seeking greater seclusion, he moved to Rostov, resided at the monastery of Saint Abramius, and was appointed by Archbishop Dionysius of Rostov to head the Savior (Yakovlev) monastery, which he led for two years before departing.
  - He eventually settled in the wilderness by the River Pelsheme, where he founded a monastery around 1426. Remembered as an ascetic and wonderworker of the Vologda lands, he was glorified at the Council of 1549 convened by Metropolitan Macarius and is commemorated on September 30.
liturgicalTitle: Our Venerable Father Gregory, Abbot of Pelsheme, Wonderworker of Vologda
patronage:
  - Monastics
  - Monastic founders
timeline:
  - when: c. 1350s
    title: Birth in Galich
    body: Gregory is born in the city of Galich, in the Kostroma region, into the Lopotov boyar (noble) family, described as living in wealth and honor.
  - when: c. age 15
    title: Renounces his inheritance
    body: After his parents die before completing his arranged marriage at age fifteen, Gregory distributes his inherited estates to the poor and enters the monastery of the Nativity of the Most Holy Theotokos near Lake Galich, where he is later ordained a priest and becomes abbot.
  - when: 1418–1425
    title: Appointed at Rostov
    body: After moving to Rostov and residing at the monastery of Saint Abramius, he is assigned by Archbishop Dionysius of Rostov to head the Savior (Yakovlev) monastery, which he leads for two years before secretly departing to seek the ascetic Dionysius of Glushitsa in the Sosnovetsk wilderness.
  - when: "1426"
    title: Founds the Pelsheme monastery
    body: Crossing the River Pelsheme and planting a cross on its bank, Gregory settles in the wilderness and oversees the building of the first church, dedicated to the Most Holy Theotokos, whose icons are painted by Saint Dionysius of Glushitsa.
  - when: 1433–1434
    title: Intervention in princely conflict
    body: Gregory travels to Moscow to urge Prince Yuri Dimitrievich to restore the principality to Basil the Dark, and later confronts Prince Demetrius Shemyaka over violence against the Vologda lands; according to his life, Shemyaka has him thrown from a bridge, but he survives.
  - when: September 30, 1442
    title: Repose
    body: According to the Orthodox Church in America's synaxarion, Gregory reposes on September 30, 1442, and is buried at his monastery, having appointed as his successor the abbot Alexander, whom he had himself tonsured.
  - when: "1549"
    title: Glorification
    body: Gregory is glorified as a venerable monastic at the Council of 1549 convened by Metropolitan Macarius, which recognized a number of Russian saints for church-wide veneration.
sections:
  - heading: Foundation at Pelsheme
    body:
      - Having sought out the ascetic Dionysius of Glushitsa, Gregory withdrew into the wilderness along the River Pelsheme. According to his life, he crossed the river carrying a cross on his shoulders and planted it in a thicket by the bank, marking the site of his new community.
      - The first church was constructed in 1426 and dedicated to the Most Holy Theotokos, with its icons painted by Saint Dionysius of Glushitsa. The monastery Gregory founded there became the center of his ascetic labors and later bore his name.
  - heading: Involvement in Princely Affairs
    body:
      - Gregory's life records that he did not remain wholly apart from the political turmoil of his day. In 1433 he traveled to Moscow to persuade Prince Yuri Dimitrievich to restore the principality to Basil the Dark.
      - In 1434 he confronted Prince Demetrius Shemyaka over the violence inflicted on the Vologda lands. According to the account, Shemyaka responded by ordering Gregory thrown from a bridge, but he survived the fall.
  - heading: Repose and Glorification
    body:
      - The Orthodox Church in America's synaxarion states that Gregory reposed on September 30, 1442, and was buried at his monastery, having appointed as his successor the abbot Alexander—the priest Alexiy, whom he had himself tonsured. Some later Russian accounts place his death variously between 1441 and the winter of 1449/50, a few connecting it to the siege of Vologda under Prince Dmitry Shemyaka.
      - He was glorified in 1549 at the Council convened by Metropolitan Macarius, which recognized a number of Russian saints for church-wide veneration. He is remembered as a wonderworker of the Vologda region, and his feast is kept on September 30.
