id: OS-2698
lifespan: c. 497 – c. 570
overview:
  - Saint Cadoc, also called Cattwg, Cadog, or Cadoc the Wise (Welsh Cattwg Ddoeth), was a sixth-century Welsh abbot and one of the foremost figures of the early monastic movement in Wales. His principal foundation, the monastery of Llancarfan in the Vale of Glamorgan, became one of the great centers of learning and religious life in Wales.
  - Born about 497 into the royal house of Gwynllwg in Monmouthshire, he was the son of Gwynllyw the Bearded and Princess Gwladys, daughter of King Brychan of Brycheiniog; both parents are themselves venerated as saints. According to tradition he refused the throne to serve God, and after wide study established Llancarfan and numerous daughter houses, later founding monasteries in Scotland and Brittany.
  - He is remembered as a teacher and organizer whose disciples and associates included Saint Gildas the Wise, Saint Iltut, and Saint Finnian of Clonard. Welsh literary tradition preserves large collections of maxims attributed to him. He reposed about 570; his feast is kept on September 25 in the tradition followed here, though other dates are observed in various calendars.
liturgicalTitle: Our Venerable Father Cadoc the Wise, Abbot of Llancarfan
timeline:
  - when: c. 497
    title: Birth in Gwynllwg
    body: Cadoc is born in Monmouthshire, in the Welsh kingdom of Gwynllwg, to Gwynllyw the Bearded and Princess Gwladys. Tradition holds that an angel announced his birth and that the hermit Meuthi baptized him, with his baptismal name given as Cathmail (Cadfael).
  - when: early 6th c.
    title: Education
    body: He studies under Saint Tathyw (Tathan) at Caerwent, then spends three years in Ireland visiting its monasteries, and afterward studies rhetoric with an Italian teacher named Bachan (Pachan).
  - when: c. 518
    title: Foundation of Llancarfan
    body: Cadoc founds the monastery of Llancarfan in the Vale of Glamorgan, transforming marshland into a major center with a monastery, seminary, hospital, and church. Sources describe about a thousand monks there and several daughter houses, with Cadoc serving as its first abbot.
  - when: 6th c.
    title: Foundations abroad
    body: He establishes or is associated with monasteries at Kilmadock and Cambuslang in Scotland — living seven years at Kilmadock — and foundations in Brittany, including an island in the Etel River now called L'Île de Cado.
  - when: c. 562
    title: Pilgrimage to Jerusalem and Rome
    body: Cadoc makes a pilgrimage to the Holy Land and Rome, returning with altar stones said to have touched the Holy Sepulcher.
  - when: c. 570
    title: Repose
    body: Cadoc reposes, according to the tradition followed here. One account relates that he was slain by pagans while serving the Liturgy at Weedon in England; other dates and accounts of his death circulate in the sources.
