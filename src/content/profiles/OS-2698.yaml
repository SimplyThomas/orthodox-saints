sections:
  - heading: Family and Early Life
    body:
      - Cadoc's father was Gwynllyw the Bearded (also called Gundleus or Woolos), a lesser Welsh king of Gwynllwg and brother of Saint Petroc; his mother was Princess Gwladys, a daughter of King Brychan of Brycheiniog. Both parents are said to have later withdrawn to live as hermits and are venerated as saints.
      - According to tradition an angel foretold his birth, and the hermit Meuthi baptized him, giving the baptismal name Cathmail or Cadfael; a holy well is said to have sprung up at the site of his baptism. He was educated first under Saint Tathyw at Caerwent, then in Ireland for three years, and afterward in rhetoric under an Italian master named Bachan. He is said to have refused the royal succession in order to serve God.
  - heading: Llancarfan and Monastic Foundations
    body:
      - About the year 518 Cadoc founded the monastery of Llancarfan in the Vale of Glamorgan, near Cowbridge, draining marshland to create one of the most renowned monasteries and centers of learning in Wales. The community is described as including a seminary or college, a hospital, and a church, with about a thousand monks present at once and several daughter monasteries.
      - He hosted Saint Gildas the Wise, who taught in the seminary and is said to have compiled a Gospel manuscript there. Beyond Wales, Cadoc is credited with foundations at Kilmadock (northwest of Stirling, Scotland), where he lived seven years, at Cambuslang, and in Brittany, including an oratory and monastery on an island in the Etel River now known as L'Île de Cado; chapels dedicated to him stand at Belz, Locoal-Mendon, and Gouesnac'h. He also lived as a hermit on Flatholm Island in the Bristol Channel and later on a Breton island near Vannes.
  - heading: Legacy and Veneration
    body:
      - Cadoc's disciples and associates included Saint Iltut and Saint Finnian of Clonard, and he was a close friend of Saint Gildas. Known to his contemporaries as Cadoc the Wise, he is credited in Welsh literary tradition with large collections of maxims or sayings preserved in the Myvyrian Archaiology.
      - Fifteen churches in Wales bear his name, and at least thirty Breton place-names are derived from him. The church at Llancarfan, near Cardiff, remains dedicated to him and preserves medieval wall-paintings depicting scenes from his life, uncovered during conservation work. In iconography he is depicted as a bishop or abbot throwing a spear, with a crown at his feet, and is sometimes accompanied by a stag, pig, or mouse. Feast days vary by tradition, including September 25 in the Cardiff tradition, September 21 in the Roman Martyrology, and January 24.
  - heading: Relics and Shrines
    body:
      - The church at Llancarfan, the site of his chief monastery, remains dedicated to Saint Cadoc and is noted for its medieval wall-paintings of his life and miracles. His name and dedications are also carried by numerous churches across Wales and by chapels and place-names in Brittany. One tradition connected with his death at Beneventum describes a great basilica raised over his shrine.
  - heading: Miracles and Traditions
    body:
      - "Historically Documented: The principal narrative source for Cadoc's life is the vita written by Lifris of Llancarfan shortly before 1086, which preserves the traditions of his monastery and its foundations."
      - "Traditional Accounts: The vita relates encounters with King Arthur, in one of which Cadoc sheltered a man who had killed some of Arthur's soldiers; Arthur demanded a herd of cattle as compensation, but the cattle are said to have turned into ferns when he seized them. Accounts of Cadoc's death differ: one tradition holds that he was slain by pagans while serving the Liturgy at Weedon in England, while another vita episode describes him being carried off in a cloud to Beneventum in Italy, where he was renamed Sophias and became abbot, bishop, and martyr."
