flagReasons:
  - claim: The sources distinguish this Isidore from the Martyr Isidore of Chios, a Roman naval officer commemorated on May 14.
    detail: No primary liturgical or hagiographic source in the dossier (OCA, OrthodoxWiki, Pravoslavie.ru, Moscow Patriarchate) makes this distinction. Only the distinction from Isidore of Pelusium appears in the OCA synaxarion entry. The Wikipedia article on Isidore of Chios is an article about that entirely separate saint and does not claim to distinguish him from the Feb 4 Isidore; it was included by the researcher for context, not as a primary witness to this saint's commemoration. Attributing this distinction to 'the sources' overstates what the liturgical witnesses do.
