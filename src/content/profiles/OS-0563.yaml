id: OS-0563
liturgicalTitle: Our Venerable Father Zeno the Faster of the Kiev Caves
lifespan: 14th century
overview:
  - Zeno the Faster was a monk of the Kiev Caves monastery, numbered among the saints of the Far Caves. He is commemorated on January 30, and also on August 28 among the Synaxis of the Fathers of the Far Caves, and on the second Sunday of Great Lent.
  - By the accounts he lived in the fourteenth century and was resplendent in fasting and ascetic labor, from which he is called 'the Faster.' Little more is recorded of his life.
