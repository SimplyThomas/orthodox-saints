id: OS-0568
lifespan: 3rd–early 4th century; martyred c. 311 (some accounts c. 304)
overview:
  - Cyrus and John are venerated together as Holy Unmercenaries — physicians and martyrs of Alexandria in Egypt who, by tradition, healed both soul and body without accepting payment. Cyrus was a physician of Alexandria who treated patients without charge while drawing them toward the Christian faith; John, said to have held a high military rank, became his companion in the ascetic life. Both were martyred during the persecution under Diocletian, and they are invoked for the healing of the sick.
  - By account, Cyrus practiced medicine in Alexandria and was renowned for treating the sick freely, healing through prayer and the recitation of Scripture and counseling his patients to keep God's commandments. Fleeing persecution, he withdrew to Arabia, received monastic tonsure, and exchanged the practice of medicine for ascetic life. John, formerly of high military standing and connected to the imperial court, sought him out and joined him. When a mother and her daughters were imprisoned for the faith, the two saints went to comfort and strengthen them; they were arrested with the women, tortured, and beheaded on January 31.
sections:
  - heading: Life and Martyrdom
    body:
      - According to their tradition, Cyrus was a physician of Alexandria who operated a medical workshop where he treated patients without charging fees, earning with John the title of 'Wonderworking Unmercenaries.' He is described as healing through prayer and the recitation of Scripture, and as urging those he treated to obey God's commandments and avoid sin. His reputation drew many to the faith, and his renown is said to have prompted the construction of a hospital that later became a church and a site of pilgrimage.
      - During the persecution, Cyrus fled to Arabia, where he received monastic tonsure and abandoned the practice of medicine for ascetic life. John, who had held a high military rank and was connected to the imperial court, learned of Cyrus's virtuous works and miracles; by one account he first traveled to Jerusalem to fulfill a vow before proceeding to Alexandria and Arabia, where he became Cyrus's companion in asceticism.
      - When a mother and her daughters were arrested and imprisoned for their faith, Cyrus and John went to comfort and strengthen them. The saints were discovered and arrested together with the women. Accounts relate that they were tortured — by tradition with beatings, scourging, and burning — before all were beheaded on January 31.
  - heading: The Companion Martyrs
    body:
      - Tradition associates with Cyrus and John a mother and her three young daughters, also martyred. The mother is named Athanasia, and her daughters are given as Theoctista, Theodota, and a third whom sources name variously as Theodossia or Eudoxia. Their reported ages are likewise given as roughly fifteen, thirteen, and eleven. By account they were arrested at Canopus and beheaded together with the two unmercenaries.
  - heading: Relics & Shrines
    body:
      - The bodies of the martyrs were at first placed in the Church of St. Mark in Alexandria. Under Patriarch Cyril of Alexandria (412–444), their relics were translated to Menouthis (Manuphin), near Canopus — identified with modern Abu Qir — where a cult was established at the site of a former pagan temple. This translation is commemorated on June 28; accounts date it to the year 412 or 414.
      - Tradition holds that the village to which the relics were brought had previously been a place of fear, and that the saints' presence brought spiritual transformation to the area. The city of Abu Qir is said to take its name from Cyrus (Abū Qīr, 'Father Cyrus'). In the fifth century relics were also reported carried to Rome, eventually placed in the church of Santa Passera.
