    body: After basic instruction on Paros and six years at the Greek (Evangelical) school in Smyrna, he enrolled at the Athonite Academy, studying under Neophytos Kausokalyvites and Eugenios Voulgaris. He later studied under Nikephoros Theotokis in Corfu.
