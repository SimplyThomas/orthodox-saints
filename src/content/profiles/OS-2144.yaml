id: OS-2144
lifespan: 14th century
overview:
  - Venerable Mercurius the Faster was a monk of the Kiev Caves Lavra who pursued asceticism in the Farther (Far) Caves in the fourteenth century. He is remembered chiefly for the strictness of his fasting, from which his epithet derives.
  - No detailed life of Mercurius survives; the Orthodox Church in America's synaxarion records only that he was a faster of the Far Caves and preserves his commemorations. Tradition holds that in life he shared a deep spiritual friendship with Saint Paisius, and that when the two died they were buried together in a single grave.
liturgicalTitle: Our Venerable Father Mercurius the Faster of the Kiev Caves
patronage:
  - Fasting
  - Monastics
sections:
  - heading: Historical Context
    body:
      - Mercurius belonged to the monastic community of the Kiev Caves Lavra (Kyiv Pechersk Lavra), whose origins trace to 1051, when Anthony of the Caves settled in a cave in the Kyiv hills. That first cave complex, later extended with corridors and a church, became known as the Far Caves, named for Saint Theodosius; in 1057 Anthony moved to a new cave that became the Near Caves.
      - The Far Caves hold the relics of approximately sixty monastic fathers, who are venerated individually on their own days and together as an assembly. Dated entries among them, such as Archimandrite Dositheus (died 1218) and Archimandrite Acindynus (died 1235), show that the community there spanned the medieval period into Mercurius's own fourteenth century, an era of external political and military pressure that culminated in the burning of the monastery by forces of the Golden Horde under Edigey in 1416, a generation after his lifetime.
  - heading: Veneration
    body:
      - Mercurius is commemorated individually on November 4 and November 24. He is also honored on August 28 among the Synaxis of the Venerable Fathers of the Kiev Caves who rest in the Far Caves, and on the second Sunday of Great Lent at the Synaxis of the Venerable Fathers of the Kiev Caves.
timeline:
