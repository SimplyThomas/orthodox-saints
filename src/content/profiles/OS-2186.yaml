id: OS-2186
lifespan: 10th century BC
overview:
  - Ahijah (Hebrew Ahiyya ha-Shiloni; Latin Achias, 'friend of Jehovah') was a prophet of Shiloh active during the reign of Solomon and the early reign of Jeroboam over the northern kingdom of Israel. He is named in the biblical First Book of Kings and, in the Orthodox reckoning, in 3 Kings.
  - "He is remembered above all for two prophecies: the announcement to Jeroboam that ten of the twelve tribes would be torn from the house of Solomon, and a later oracle to Jeroboam's wife foretelling the death of her son and the ruin of Jeroboam's dynasty. According to 2 Chronicles he also composed a written record of Solomon's reign, a text that has not survived."
  - The Orthodox Church commemorates the Prophet Ahijah on November 12.
liturgicalTitle: The Holy Prophet Ahijah the Shilonite
timeline:
  - when: Reign of Solomon (10th c. BC)
    title: Prophecy of the divided kingdom
    body: Meeting Jeroboam outside Jerusalem, Ahijah tore his new garment into twelve pieces and gave ten to Jeroboam, signifying that God would take ten tribes from Solomon's house and grant Jeroboam rule over the northern kingdom of Israel (1/3 Kings 11:29-39).
  - when: Reign of Jeroboam
    title: Oracle to Jeroboam's wife
    body: Delivered to the disguised wife of Jeroboam, this prophecy foretold the death of the king's son, the destruction of the House of Jeroboam, and Israel's eventual fall and captivity 'beyond the River' (1 Kings 14:6-16).
sections:
  - heading: The prophecy of the divided kingdom
    body:
      - The books of Kings record that Ahijah met Jeroboam on the road outside Jerusalem while wearing a new garment. He tore the garment into twelve pieces and gave ten to Jeroboam, declaring that God would tear the kingdom from the hand of Solomon and give ten tribes to Jeroboam, because Solomon's heart had turned from the Lord God of Israel. This act signified the coming separation of the ten northern tribes from the united kingdom and the establishment of the Northern Kingdom of Israel (1/3 Kings 11:29-39).
      - The OCA Synaxarion identifies Ahijah as a contemporary of Solomon, born in the city of Shiloh, and anchors his memory to this prophecy of Jeroboam's kingly rule over the ten tribes.
  - heading: The oracle to Jeroboam's wife
    body:
      - "A second prophecy is recorded in 1 Kings 14:6-16. When Jeroboam's son fell ill, the king sent his wife in disguise to consult Ahijah, whose eyes, the text notes, 'were set by reason of his age.' The prophet nonetheless recognized her and delivered a judgment: the death of the sick child, the destruction of Jeroboam's dynasty, and the future fall and captivity of Israel 'beyond the River' — east of the Euphrates. That Jeroboam himself consulted the prophet is taken as testimony to the esteem in which Ahijah was held."
  - heading: Writings and legacy
    body:
      - According to 2 Chronicles 9:29, Ahijah authored a prophetic work concerning the reign of Solomon, sometimes called the 'Prophecy of Ahijah the Shilonite' and associated with the Acts of Solomon referenced in 1 Kings 11:41. This text has not survived.
      - Traditional accounts relate that Ahijah lived to a great age and died peacefully in Shiloh. An icon of the prophet appears in the Menologion of Basil II. The Orthodox Church in America commemorates him on November 12 together with Saint John the Merciful, Venerable Neilos the Ascetic of Sinai, and the Kykkiotisa Icon of the Mother of God.
  - heading: Traditional accounts
    body:
      - Rabbinic tradition, reported in the sources, ascribes to Ahijah an extraordinary longevity of more than six hundred years and counts him among a line of long-lived righteous figures who transmitted sacred knowledge across the generations. Maimonides identified him as a Levite and a disciple of Moses who had left Egypt, served in David's court, and later became the teacher of the prophet Elijah; a rabbinic reading further interprets the note that his eyes were dim as a spiritual rather than a physical blindness. These traditions are extra-biblical and are recorded here as such.
