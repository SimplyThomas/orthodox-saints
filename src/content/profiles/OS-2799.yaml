id: OS-2799
lifespan: Late 4th–early 5th century
patronage:
  - Shepherds
  - The blind
  - The deaf
  - Arsinoe and the Paphos region of Cyprus
overview:
  - Saint Theosebios, called 'the God-bearer,' was a holy man of Arsinoe in Cyprus, born at the end of the fourth century in the village of Melandra, in the Arsinoe subdistrict (present-day Polis Chrysochous) of Paphos province. His parents, Michael and Anna, raised him and his brother Arkadios in Christian faith; Arkadios later served as Bishop of Arsinoe in the early fifth century.
  - From his youth Theosebios worked as a shepherd, an occupation that gave him leisure for prayer and meditation. He kept a strict ascetic regimen of fasting and minimal food, giving his saved bread to the poor and crumbs to the birds, and withdrawing to a cave about five kilometers from Melandra to pray in solitude.
  - He is venerated locally in the Church of Cyprus and is commemorated on October 12. He is also known by the alternative names Sesefis, Efsechis, Eusevis, and Eusevios.
sections:
  - heading: Life and Asceticism
    body:
      - Theosebios married a pious woman from the neighboring village of Philousa (modern Chrysochous), but by mutual agreement the couple lived together in virginity, maintaining a purely fraternal relationship. He continued his ascetic labors as a shepherd, combining his daily work with continual prayer.
      - By tradition, he foreknew his approaching death through divine revelation. Telling his wife he was taking the sheep to distant grazing lands one final time, he entered his cave and there surrendered his soul to God on October 12. His faithful shepherd dog remained at the cave entrance and eventually led family members to discover his body, which was described as 'scented and fresh as an unfading morning flower.'
  - heading: Miracles and Traditional Accounts
    body:
      - Following a vision in which the saint appeared to his father, a church was built over the cave burial site rather than moving his remains. The synaxarion relates that the saint cured many blind and deaf people who sought his intercession.
      - By tradition, two shepherds who looted his church later confessed their theft, returned the stolen items, and received forgiveness.
  - heading: Relics and Shrines
    body:
      - Several places on Cyprus preserve the saint's memory. The church at Peristerona in Paphos depicts him, and the village of Philousa contains the foundations of a church dedicated to him. Geographic features named 'Mouttes of Saint Eusevios' and 'Plakoudia of Saint Sesefis' retain his name. Near Kritou Terra survive the remnants of another church and a holy water spring dedicated to 'Saint Efsechis.'
  - heading: Veneration and Sources
    body:
      - Theosebios is venerated primarily on Cyprus and appears in the calendar of the Church of Cyprus. He is commemorated individually on October 12, while the saints of Arsinoe are jointly commemorated on August 29 (kept August 3). His Apolytikion, in the Third Tone, celebrates his youthful spiritual virtues and the divine grace given him.
      - He does not appear on the OCA calendar, and no Wikipedia or OrthodoxWiki article exists for him; the principal English-language account is the Mystagogy Resource Center (Sanidopoulos) article.
timeline:
  - when: Late 4th century
    title: Birth at Melandra
    body: Born in the village of Melandra in the Arsinoe subdistrict of Paphos province, Cyprus, to his parents Michael and Anna.
  - when: Early 5th century
    title: Brother becomes Bishop of Arsinoe
    body: His brother Arkadios served as Bishop of Arsinoe during the early fifth century.
  - when: October 12
    title: Repose
    body: After foreknowing his death, he withdrew to his cave near Melandra and reposed; his body was found through his shepherd dog, and a church was later built over the site.
