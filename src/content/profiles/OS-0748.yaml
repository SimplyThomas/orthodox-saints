    title: Reign of Decius
    body: The four lived under the emperor Decius, whose edict requiring sacrifice to the Roman gods inaugurated the first empire-wide persecution of Christians.
  - when: c. 249–251
    title: Preaching at Perge
    body: As Christians at Perge in Pamphylia, Nestor, Tribimius, Marcellus, and Anthony fearlessly preached Christ throughout their region.
  - when: c. 249–251
    title: Denunciation and arrest
    body: Pagans denounced them to the regional governor, who dispatched soldiers to arrest them and bring them for judgment.
  - when: c. 249–251
    title: Torture and beheading
    body: Refusing to renounce Christ, they were beaten with ox sinews, suspended from a tree and flayed, and finally beheaded by the sword.
