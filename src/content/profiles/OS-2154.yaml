id: OS-2154
lifespan: 13th century
overview:
  - Saint Luke the Steward was a monk of the Kiev Caves Monastery who labored in asceticism in the Near Caves during the 13th century. Within the monastic community he fulfilled the obedience of steward, and his life is remembered chiefly for humble, faithful monastic labor and observance of the Lord's commandments.
  - Nothing survives of his life before he entered the monastery, and he receives no individual narrative in the surviving sources. He is venerated collectively among the roughly eighty venerable fathers of the Near Caves, whose relics repose at the Kiev Caves Lavra and are described as incorrupt. He should not be confused with the Apostle and Evangelist Luke.
liturgicalTitle: Our Venerable Father Luke, Steward of the Kiev Caves
sections:
  - heading: Monastic Life and Obedience
    body:
      - "Luke lived as a monk of the Kiev Caves Monastery in the 13th century, taking up his ascetic labor in the Near Caves, the underground community traced to Saint Anthony, who settled there in 1057. His recorded distinction is the obedience he carried within the monastery: he served as steward, the brother charged with the community's material provision and household order."
      - The sources preserve no account of his origins, family, or life prior to the monastery. He is praised in the Canon for the Holy Fathers of the Near Caves as an exemplar and 'icon' of obedience to the divine commandments, but no individual vita or distinguishing episode is attached to his name.
  - heading: Historical Context
    body:
      - Luke's lifetime fell in a turbulent period for the monastery. The Kiev Caves Lavra was sacked by Batu Khan in 1240 during the Mongol invasion of Rus', and it suffered further destruction in later centuries, being burned in 1416 by forces of the Golden Horde ruler Edigey and rebuilt only in 1470. The Near Caves, a network some 383 metres in length and 5 to 20 metres deep, contain 79 surviving monastic burials.
      - The names of many of the Near Caves fathers were not preserved, and historical records for a large number of these saints remain sparse; Luke is among those venerated with little individual documentation. Two canons commemorating the Near Caves fathers were later compiled, one by the hieromonk Meletius the Orphan and another by Saint Demetrius of Rostov, though Luke receives no special individual attention in either.
  - heading: Relics & Shrines
    body:
      - Saint Luke's relics repose in the Near Caves (the Antoniev Caves) of the Kiev Caves Lavra and are described as incorrupt. The Near Caves hold 79 surviving burials of monastic saints, over which later churches were raised, including the Church of the Elevation of the Cross built in Ukrainian Baroque style in the early 18th century.
      - Those who serve as stewards at the Lavra honor Saint Luke as their patron and keep his icon in their cell.
  - heading: Commemoration
    body:
      - Luke is commemorated on November 6 as his primary feast. A secondary commemoration falls on September 28, together with all the Holy Fathers of the Near Caves of Saint Anthony.
      - A general commemoration of the Near Caves fathers was established in 1670 after an earthquake damaged the caves and relics were uncovered during restoration. In 1886, under Metropolitan Platon, the synaxis of the Near Caves fathers was set on September 28 to distinguish it from the August 28 commemoration of the Far Caves fathers.
timeline:
  - when: "1057"
    title: Founding of the Near Caves
    body: Saint Anthony settles on a new hill at Kiev and establishes the underground monastic community of the Near Caves, in which Luke would later labor.
  - when: 13th century
    title: Monastic labor as steward
    body: Luke lives as a monk of the Near Caves, fulfilling the obedience of steward and keeping the Lord's commandments.
  - when: "1240"
    title: Mongol sack of the Lavra
    body: The Kiev Caves Monastery is sacked by Batu Khan during the Mongol invasion of Rus', part of the turbulent context of Luke's era.
  - when: "1670"
    title: General commemoration established
    body: A shared commemoration of the Near Caves fathers is instituted after an earthquake damaged the caves and relics were uncovered during restoration.
  - when: "1886"
    title: Synaxis set on September 28
    body: Under Metropolitan Platon the synaxis of the Near Caves fathers is moved to September 28, distinguishing it from the Far Caves' August 28 feast.
