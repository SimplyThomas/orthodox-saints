id: OS-2774
lifespan: c. 584 – 10 October 644
overview:
  - Paulinus of York was a Roman monk of the Gregorian mission to the Anglo-Saxons who became the first Bishop of York and baptized King Edwin of Northumbria and many of his people. Likely Italian by birth, he was sent from Rome by Pope Gregory I and arrived in England by 604 with a later group of missionaries carrying sacred vessels, vestments, and relics for the churches.
  - Consecrated bishop in 625 (possibly 626) by Justus, Archbishop of Canterbury, he traveled north as chaplain to Æthelburh of Kent when she married the pagan King Edwin. After a period of preaching he converted Edwin, who was baptized at York in 627, together with many of his subjects. Following Edwin's death in battle in 633, Paulinus fled Northumbria with the queen and served as Bishop of Rochester until his death in 644. He is venerated as a saint in the Eastern Orthodox, Roman Catholic, and Anglican churches, with a feast on 10 October.
liturgicalTitle: Our Father among the Saints Paulinus, First Bishop of York
