id: OS-2838
lifespan: c. 325 – 410
overview:
  - Marcella of Rome (c. 325–410) was a Roman noblewoman of the Aventine Hill who, after being widowed young, dedicated her life to Christian asceticism and turned her family palace into what is regarded as the first house of consecrated ascetic women in the city of Rome.
  - Widowed in the seventh month of her marriage, she declined a subsequent proposal from the consul Cerealis and instead gathered around her a circle of noblewomen devoted to prayer, fasting, and the study of Scripture. Her community became a foremost centre of the emerging ascetic movement among the Roman aristocracy.
  - She was a leading disciple and correspondent of St. Jerome, who lodged at her hospitality house during his years in Rome and addressed to her a substantial number of his surviving letters. During the sack of Rome by the Goths in 410 she was beaten by soldiers demanding treasure she had already given to the poor, and she reposed soon afterward.
patronage:
  - Widows
  - Ascetic women
timeline:
  - when: c. 325
    title: Birth into the Roman nobility
    body: Marcella was born into a noble Roman family on the Aventine Hill; her mother, Albina, was a wealthy and educated woman.
  - when: c. 340
    title: Early exposure to Egyptian asceticism
    body: As a child she was influenced by Athanasius of Alexandria, who during his exile from Alexandria visited Rome around 340 and introduced her to Egyptian ascetic ideals.
  - when: After her widowhood
    title: Founding of the Aventine community
    body: Widowed after only seven months of marriage, she rejected a further marriage proposal from the consul Cerealis and established a women's religious community in her Aventine palace — roughly forty years before Jerome's arrival — making hers the first house of consecrated ascetic women in Rome.
  - when: "382"
    title: Jerome comes to Rome
    body: When Jerome arrived in Rome in 382 at the invitation of Pope Damasus I, he lodged at Marcella's hospitality house and gave readings and scriptural lectures to her community; it was at her home that he first introduced Paula, later one of his closest collaborators.
  - when: "410"
    title: The sack of Rome and her repose
    body: During Alaric's sack of Rome, soldiers came to her home demanding treasure she had already distributed to the poor and scourged her with cudgels. She was escorted to the Basilica of Saint Paul Outside the Walls, a designated sanctuary, and died there or shortly afterward of her injuries.
sections:
  - heading: The Aventine Community
    body:
      - In her palace on the Aventine Hill, Marcella established a community of women devoted to a disciplined ascetic life. She practiced strict self-denial, abstaining from wine and meat and giving herself to prayer, fasting, and mortification.
      - Her household drew prominent Roman noblewomen, including Paula of Rome, Eustochium, Lea, and her own disciple Principia. Because she founded her community roughly forty years before Jerome came to Rome in 382, it is remembered as the first house of consecrated ascetic women in the city, and an earlier generation's preparation for the wider movement of asceticism among the Roman aristocracy.
  - heading: Disciple and Correspondent of St. Jerome
    body:
      - When Jerome settled in Rome in 382, he became closely associated with a circle of well-born and well-educated women interested in the monastic life, centred on the Aventine, of which Marcella was the founder and senior figure. He lodged at her hospitality house and lectured her community on Scripture, and it was through her circle that Paula was drawn into the ascetic movement.
      - Jerome addressed to Marcella a large share of his correspondence — she received more of his letters than any other woman, among them Letters 23, 25, 26, 29, and 34. These letters treat scriptural questions, Hebrew philology, and doctrinal matters, and testify to her intellectual depth.
      - Marcella also took an active part in the Origenist controversy at Rome, helping to bring charges against Rufinus.
  - heading: The Sack of Rome and Her Death
    body:
      - In 410 the Visigoths under Alaric sacked Rome. Soldiers came to Marcella's home demanding treasure, but she had long since distributed her wealth to the poor, and they scourged and beat her with cudgels.
      - She was escorted to the Basilica of Saint Paul Outside the Walls, a place of sanctuary, where she died of her injuries either at once or shortly after. Jerome's Letter 127, written to her disciple Principia, records these events and is the primary historical source for her death.
  - heading: Veneration
    body:
      - Marcella is commemorated on January 31 and is venerated in the Eastern Orthodox Church, the Catholic Church, and the Anglican Communion; she is included in the Roman Martyrology.
      - She is to be distinguished from Markella of Chios and from Marcella the mother of St. Potamiaena.
