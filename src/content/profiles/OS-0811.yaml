id: OS-0811
liturgicalTitle: The Holy Hieromartyr Pionius, Presbyter of Smyrna
lifespan: 3rd century; died c. 250
overview:
  - Pionius was a presbyter of the Church of Smyrna in Asia Minor who suffered martyrdom during the persecution under the Emperor Decius, most likely in the year 250. He was arrested for refusing to perform the sacrifices required by the imperial edict and was put to death by being burned alive.
  - His martyrdom is recorded in a surviving text known as the Martyrdom of Pionius (Passio Pionii), composed in the later third century and regarded as one of the more historically reliable accounts of an early Christian martyr. Pionius is also remembered for having transcribed an older copy of the Martyrdom of Polycarp, helping to preserve that document. He is commemorated on March 11 in the Eastern Orthodox calendar and on February 1 in the Roman Catholic calendar.
timeline:
  - when: c. 250
    title: Arrest under Decius
    body: During the persecution mandated by the Emperor Decius, Pionius and his companions were arrested after refusing to offer the required sacrifices. According to the account, they had placed shackles around their own necks to signal that they were ready to be taken to prison. The arrest is recorded as occurring on a great Sabbath and on the anniversary of the martyrdom of Polycarp of Smyrna.
  - when: c. 250
    title: Trial and confession
    body: Pionius was brought before the proconsul Quintilian, who ordered that he be tortured. He refused to sacrifice to the idols or to the emperor and confessed Christ before the authorities.
  - when: March 11, c. 250
    title: Martyrdom by fire
    body: Pionius was sentenced to be burned alive. The account relates that as he died his face shone with grace and that his body remained unharmed by the flames.
sections:
  - heading: Companions
    body:
      - Pionius is commemorated together with a group of fellow martyrs of Smyrna. The Orthodox tradition names among them the Hieromartyr Limnus, a priest of the Church of Smyrna; Macedonia, the wife of Limnus, from the village of Karine; and the martyrs Asclepiades and Sabina.
      - The surviving account also records that Metrodorus, a presbyter of the Marcionite community, was executed alongside Pionius.
  - heading: The Martyrdom of Pionius
    body:
      - The events of Pionius's arrest, trial, and death are preserved in a text known as the Martyrdom of Pionius, or Passio Pionii, which scholars place in composition in the later third century, roughly between 250 and 300. It is counted among the more historically dependable of the early martyrdom narratives.
      - Pionius is also remembered as the one who transcribed the Martyrdom of Polycarp from an older copy that had been made by Isocrates in Corinth, thereby helping to preserve that earlier record of Smyrna's most famous martyr.
related:
  - name: Hieromartyr Polycarp, Bishop of Smyrna
    note: Preserved his memory — Pionius transcribed the Martyrdom of Polycarp from an older copy and, by tradition, was arrested on the anniversary of the death of Polycarp, the great martyr-bishop of his own Church of Smyrna.
    href: saint/OS-0713
  - name: Saint Bucolus, Bishop of Smyrna
    note: Forerunner in his Church of Smyrna — Bucolus was an early bishop of Smyrna and Polycarp's predecessor, a shepherd of the same see Pionius later served as presbyter.
    href: saint/OS-0602
  - name: Hieromartyr Irenaeus of Lyons
    note: Fellow heir of the Church of Smyrna — Irenaeus was formed there as a hearer of Polycarp before becoming bishop of Lyons, sharing the Smyrnaean inheritance Pionius gave his life to honor.
    href: saint/OS-1764
