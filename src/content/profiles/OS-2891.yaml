id: OS-2891
lifespan: 1831–1906
liturgicalTitle: Our Venerable Father Barnabas of Gethsemane
overview:
  - Venerable Barnabas of Gethsemane (1831–1906) was a Russian hieroschemamonk of the Gethsemane Skete of the Holy Trinity–St. Sergius Lavra, remembered as a renowned elder (starets) and confessor who received thousands of pilgrims over several decades. Born Vasily Ilyich Merkulov into a serf family, he entered the Gethsemane Skete as a novice in 1857 and was tonsured a monk in 1866.
  - Appointed by the monastery's superior as spiritual confessor for pilgrims at the Gethsemane Cave Church, he gained wide recognition across Russia for spiritual discernment. He served as the spiritual father of Basil Mouraviov, later glorified as St. Seraphim of Vyritsa. He reposed in 1906 and was glorified in 1995 among the Assembly of Radonezh Saints; his feast is kept on February 17.
sections:
  - heading: Early Life and Entry into Monasticism
    body:
      - Barnabas was born Vasily Ilyich Merkulov on January 24, 1831 (Old Style), in the village of Prudishchi, Tula Province, in the Russian Empire. His parents, Ilya and Darya (Daria) Merkulov, were pious serfs, and he was the youngest of their seven children.
      - He entered the Gethsemane Skete of the Holy Trinity–St. Sergius Lavra as a novice on December 23, 1857. After nearly a decade of novitiate, he received monastic tonsure under the name Varnava (Barnabas) on November 20, 1866. The Gethsemane Skete had been established as a dependency of the Trinity–Sergius Lavra in 1843, its refectory church consecrated in 1853.
  - heading: Ministry as Elder and Confessor
    body:
      - Barnabas was ordained hierodeacon in 1871 and hieromonk on January 10, 1872. The monastery's superior appointed him spiritual confessor for the pilgrims who came to the Gethsemane Cave Church, and in this office he became widely known throughout Russia as a starets renowned for spiritual discernment and clairvoyance.
      - The breadth of his reputation is reflected in the tradition that in January 1905 Emperor Nicholas II came to him for confession. He reposed on February 17, 1906, in Sergiev Posad, Moscow Province, at the age of 75.
  - heading: Spiritual Fatherhood of St. Seraphim of Vyritsa
    body:
      - Barnabas served as the spiritual father and guide of Basil Mouraviov, who was later glorified as St. Seraphim of Vyritsa. Before entering monastic life, Basil recounted to Barnabas a prophetic dream in which he found himself lost in a forest and encountered an elderly man he recognized as St. Seraphim of Sarov; in the same vision Barnabas—identified as Basil's own spiritual father—appeared and joined the saint beneath a tree, though Basil could not hear their conversation.
      - Sources present this vision as a pivotal moment in Seraphim of Vyritsa's monastic calling, with Barnabas functioning as the key spiritual director guiding Basil toward monastic life.
  - heading: Glorification
    body:
      - The Bishops' Council of 1989 initiated proceedings toward his glorification, with a canonization commission chaired by Metropolitan Juvenaly. Patriarch Alexy II approved his inclusion among locally venerated saints on September 30, 1994.
      - His formal canonization took place in 1995 during the feast of the Assembly (Synaxis) of the Radonezh Saints, at the Dormition Cathedral in the Moscow Kremlin.
