id: OS-1025
liturgicalTitle: Our Venerable Father Theodore Trichinas, the Hair-Shirt Wearer
lifespan: late 4th – early 5th century
overview:
  - Theodore Trichinas was an ascetic of the early Byzantine period who renounced the wealth of his family for a life of severe self-denial. He is venerated as a monastic saint (Venerable), and his memory is kept on April 20. His surname, Trichinas, means "the hair-shirt wearer" and derives from the single rough garment of hair that he wore throughout his life.
  - According to the synaxarion he was born at Constantinople to wealthy and pious parents but left his home and former life to enter a monastery in Thrace. There he gave away his possessions and lived in extreme austerity, clothed only in a hair shirt and sleeping on bare stone to deny himself bodily comfort.
timeline:
  - when: 4th century
    title: Birth at Constantinople
    body: Theodore was born at Constantinople, the son of wealthy and pious parents.
  - when: 4th century
    title: Entry into monastic life
    body: He left his home, family, and former manner of life to enter a monastery in Thrace, giving away what he possessed and keeping nothing for himself.
  - when: late 4th – early 5th century
    title: Ascetic life and repose
    body: He wore only a coarse hair shirt — the source of his surname — and slept on a stone to avoid comfort and to limit his sleep. The synaxarion relates that his life was adorned with miracles and that he had the power to heal the sick. He reposed at the end of the fourth or the beginning of the fifth century.
sections:
  - heading: Asceticism and Name
    body:
      - The defining mark of Theodore's life was its austerity. Having given away all that he had, he owned nothing and clothed himself, according to the tradition, not in ordinary garments but in a single rough garment of hair worn for the whole of his life. From this came his surname Trichinas, rendered in English as "the hair-shirt wearer." He is also said to have slept on a stone rather than a bed, both to avoid bodily ease and to keep himself from sleeping overmuch.
  - heading: Veneration
    body:
      - Theodore is venerated as one of the revered ascetics of early Orthodox monasticism. The synaxarion relates that a healing myrrh flows from his relics, and a canon in his honor is ascribed to Saint Joseph the Hymnographer. The Church commemorates him on April 20.
