id: OS-2683
lifespan: c. 290 – December 10, c. 304
overview:
  - Eulalia of Mérida was a young Christian martyr put to death in Augusta Emerita (modern Mérida, Spain) during the persecution under the emperor Diocletian, traditionally dated to around AD 304. She is remembered as one of the most prominent martyrs of Roman and Visigothic Iberia, and is distinct from Saint Eulalia of Barcelona, whose closely parallel narrative has led some scholars to debate whether the two accounts describe the same person.
  - According to her tradition, Eulalia was a girl of about twelve to fourteen years. When the demand that Roman citizens sacrifice to the pagan gods reached Mérida, her mother is said to have withdrawn her to the countryside for safety, but the young girl travelled to the court of the governor Dacian, publicly professed herself a Christian, denounced the pagan deities and the emperor, and challenged the authorities to execute her.
  - After attempts at flattery and bribery failed, she was stripped, tortured with hooks and torches, and burned, dying of smoke inhalation. A shrine was raised over her tomb almost at once, and her veneration was already widespread by around 350, spread further by the poetic account of the Spanish-Roman poet Prudentius.
liturgicalTitle: The Holy and Glorious Virgin-Martyr Eulalia of Mérida
patronage:
  - Mérida
  - Oviedo
  - Runaways
  - Torture victims
  - Widows
  - Protection from bad weather
timeline:
  - when: c. 290
    title: Birth at Mérida
    body: Eulalia is born, by tradition around AD 290, in Augusta Emerita (Mérida) in Roman Spain.
  - when: Feb 304
    title: The Fourth Edict of Diocletian
    body: The persecution's Fourth Edict, issued in early 304, requires all persons to assemble publicly and sacrifice to the gods on pain of death. In Spain the persecution fell under Maximian's domain and was firmly enforced, providing the legislative context for Eulalia's martyrdom.
  - when: Dec 10, c. 304
    title: Martyrdom at Mérida
    body: Having presented herself before the governor Dacian and professed Christ, Eulalia is stripped, tortured with hooks and torches, and burned at the stake, dying of smoke inhalation. A shrine is erected over her tomb almost immediately.
  - when: by c. 350
    title: Established veneration
    body: Christian veneration of Eulalia is already widespread; Prudentius later devotes Book 3 of his Peristephanon to her, greatly increasing her fame, and her relics are distributed throughout Iberia.
  - when: c. 560
    title: Basilica rebuilt at Mérida
    body: Bishop Fidelis of Mérida rebuilds a basilica in her honour; her shrine becomes the most popular in Visigothic Spain.
