sections:
  - heading: Historical Context
    body:
      - Eulalia's death belongs to the Diocletianic persecution, the most severe Roman campaign against Christians. It opened with the First Edict of February 24, 303, which banned Christian assembly, ordered the destruction of scriptures and places of worship, and stripped Christians of legal rights. Successive edicts through 303 mandated the arrest of clergy and then offered amnesty to those who would sacrifice.
      - The Fourth Edict, issued in January or February 304, extended the demand to sacrifice to the entire population, with execution the penalty for refusal. In Spain the persecution fell within the domain of the emperor Maximian and was firmly enforced; the bishop Ossius of Corduba narrowly escaped martyrdom in the same period. This edict provides the direct context for Eulalia's traditional death at Mérida on December 10, 304. Some scholars have instead proposed a date under Trajan Decius (249–251).
  - heading: The Account of Prudentius
    body:
      - The principal ancient literary source for Eulalia is Book 3 of the Peristephanon, a collection of martyr-hymns by the fifth-century Spanish-Roman poet Prudentius. His account, though written more than a century after her death, shaped her later fame and the distribution of her relics across Iberia.
      - Prudentius portrays Eulalia openly defying the authorities. He records her declaring that the gods Isis, Apollo, and Venus, and the emperor Maximian himself, are nothing, being merely the work of men's hands. His poetry supplied much of the narrative detail later associated with her cult.
  - heading: Relics & Shrines
    body:
      - A shrine was raised over Eulalia's tomb at Mérida almost immediately after her death, and by around 350 her veneration was widespread. Around 560 Bishop Fidelis of Mérida rebuilt a basilica in her honour, and her shrine became the most popular in Visigothic Spain.
      - About 780 King Silo of Asturias transferred her body to Oviedo, and in 1075 King Alfonso VI donated a coffin of Arab silver for the relics. In 1639 she was designated patroness of Oviedo. Her recorded patronages include the cities of Mérida and Oviedo, runaways, torture victims, widows, and protection against inclement weather. Tradition holds that before Saint James, son of Zebedee, became the recognized protector of Christian troops during the Reconquista, that role was attributed to Eulalia.
  - heading: Miracles & Traditions
    body:
      - "Traditional Accounts: According to her tradition, as Eulalia died a dove emerged from her mouth, frightening the soldiers, and miraculous snow fell to cover her naked body, its whiteness taken as a sign of her purity. These details belong to the hagiographic tradition transmitted especially through Prudentius rather than to documented record."
      - A separate tradition connects Eulalia with Saint Julia of Mérida, reportedly another young girl martyred at Mérida in 304 during the same persecution and commemorated on the same day, December 10. The close similarity between Eulalia of Mérida and Eulalia of Barcelona in narrative and chronology has led to continuing scholarly debate over whether the two represent a single martyr.
