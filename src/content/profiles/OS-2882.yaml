id: OS-2882
lifespan: 15th–16th century; martyred 1519/1520
overview:
  - New Martyr James (Iakovos) of Kastoria was a prosperous merchant of Macedonia who abandoned a fortune to become a monk on Mount Athos, where he gained a reputation as a spiritual father and wonderworker. Born in a village near Kastoria to parents named Martino and Paraskevi, he became a wealthy sheep merchant and eventually held an appointment supplying the Sultan's palace in Constantinople.
  - "A spiritual conversion turned him from commerce to the ascetic life: he distributed his wealth among the poor and departed for Athos, joining the Monastery of Docheiariou before settling at a ruined Georgian house dedicated to Saint John the Forerunner, which he labored to restore. Disciples gathered around him, among them the future Metropolitan Theonas of Thessalonica."
  - While preaching and healing in the region of Nafpaktos (Aetolia), James was denounced to the Ottoman authorities as seditious. He was arrested with two disciples — the deacon James and the monk Dionysius — tortured over seventeen days, and executed by hanging on November 1, 1520. Their relics were later enshrined at the Monastery of Saint Anastasia Pharmakolytria near Thessalonica.
liturgicalTitle: The Holy Venerable New Martyr James of Kastoria
patronage: []
