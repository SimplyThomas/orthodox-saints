id: OS-2078
lifespan: Late 13th – early 14th century
overview:
  - Martyrius the Deacon was a monk of the Kiev Caves Monastery (Kiev-Pechersk Lavra) who lived from the late 13th to the early 14th century. He served as a deacon and lived as a recluse, and is numbered among the ascetics whose relics repose in the Far (Theodosian) Caves.
  - Monastic tradition holds that he was ordained to the diaconate on account of his exceptional purity and rigorous asceticism, particularly his strict observance of fasting. He is remembered for a gift of healing and for casting out demons through prayer.
  - He is commemorated on October 25, and also within the Synaxis of the Saints of the Kiev Caves whose relics lie in the Far Caves (August 28), as well as on the Second Sunday of Great Lent.
liturgicalTitle: Our Venerable Father Martyrius the Deacon, Recluse of the Kiev Caves
sections:
  - heading: Life and Ministry
    body:
      - Martyrius belonged to the community of the Kiev-Pechersk Monastery, one of the foundational monastic centers of the medieval Rus' lands. According to monastic tradition he was raised to the diaconate because of his exceptional purity and his rigorous ascetic discipline, and he combined this liturgical office with the life of a recluse.
      - Tradition relates that those for whom he interceded before God while standing at the ambo received the Lord's mercy, obtaining either healing or the fulfillment of their petitions. He was particularly known for expelling demons through prayer. The Canon and akathist to the Fathers of the Kiev Caves remember him for his 'love of toil, justice and ardent purity,' and as one who received the gift of healing infirmities through great purity and monastic labors.
      - He died in the monastery and was buried there. His relics are venerated as incorrupt and remain in the Far (Theodosian) Caves of the Kiev-Pechersk Lavra.
  - heading: Relics & Shrines
    body:
      - Martyrius's relics repose in the Distant (Theodosian) Caves of the Kiev-Pechersk Monastery, positioned near the relics of Saint Euthymia of Polotsk and close to the underground church associated with Saint Theodore, the monastery's founder-abbot. His resting place among the Far Caves saints is the basis for his inclusion in the Synaxis commemorated on August 28.
      - By tradition his relics are numbered among those honored as incorrupt. Modern examination of the remains reported evidence of a healed fracture of the right tibia, an estimated age at death of roughly 55 to 60 years, and an estimated height of about 174–175 cm.
  - heading: Commemoration
    body:
      - The Eastern Orthodox liturgical calendar for October 25 lists both a 'Saint Martyrius, deacon' and a 'Saint Martyrius, recluse' of the Kiev Caves, dated to the 13th–14th centuries and associated with the Kiev-Pechersk Lavra. On the older-style reckoning his principal feast falls on October 25 / November 7.
      - There is no dedicated English-language biography of him beyond these calendar entries; he is remembered chiefly within the collective veneration of the Kiev Caves fathers, alongside contemporaries of the Far Caves such as Rufus the Obedient.
timeline:
  - when: Late 13th century
    title: Life at the Kiev Caves
    body: Martyrius enters monastic life at the Kiev-Pechersk Monastery, where he is ordained deacon on account of his purity and strict asceticism and lives as a recluse.
  - when: Early 14th century
    title: Repose
    body: He dies in the monastery, at an estimated age of about 55–60, and is buried in the Far (Theodosian) Caves, where his relics remain venerated as incorrupt.
patronage:
  - Healing of illness
  - Deliverance from demons
