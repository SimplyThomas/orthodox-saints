    note: Fellow Palestinian desert father who, by the accounts of Gerasimus's life, helped restore him to the Chalcedonian faith; at his death Gerasimus is said to have seen angels bearing up his soul.
    href: saint/OS-0494
  - name: Cyriacus the Anchorite
    note: A disciple of Gerasimus, sent to him by Euthymius the Great; commemorated on September 29.
