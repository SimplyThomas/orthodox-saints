id: OS-1924
lifespan: d. 29 September 1276
overview:
  - Saint Cyprian of Ustiug was a thirteenth-century monastic of the Rus' north who, having begun life as a prosperous landowner, renounced his worldly holdings, received the monastic schema, and founded the earliest organized monastery at Veliky Ustiug at the request of the town's inhabitants.
  - He is venerated as a Venerable (Preподобный) monastic saint, commemorated on September 29, and is remembered chiefly as the spiritual founder of the Michael the Archangel Monastery in the newly established city of Ustiug.
liturgicalTitle: Our Venerable Father Cyprian of Ustiug
timeline:
  - when: "1212"
    title: Foundation of the Ustiug monastery
    body: At the request of the residents of the newly founded city of Ustiug, Cyprian surveyed the surrounding area and chose a site near shallow lakes at the Ostrozh falls, where he began building a monastic cell and then the monastery, associated with the Entrance of the Theotokos into the Temple and a church dedicated to the Archangel Michael.
  - when: 29 September 1276
    title: Repose
    body: Cyprian died and was buried in the monastery he had founded. The date of his birth is not recorded in the surviving sources.
patronage:
  - Monastic founders
  - Veliky Ustiug
sections:
  - heading: Life
    body:
      - According to the accounts preserved in later Ustiug chronicles, Cyprian was originally a wealthy landowner in the Ustiug region who renounced worldly pursuits and embraced monastic life. He received the Angelic Schema with the name Cyprian; the OCA synaxarion and the Mystagogy account place his tonsure at the Monastery of the Holy Trinity at Gledeno, while the Russian tradition recorded in later chronicles associates his monastic vows with a monastery at Rostov the Great.
      - When the inhabitants of the newly founded city of Ustiug asked him to establish a monastery near their settlement, Cyprian accepted the responsibility and became instrumental in building the spiritual community there. He is said to have lived during the reign of Grand Prince Konstantin Vsevolodovich.
  - heading: Foundation of the Ustiug Monastery
    body:
      - Cyprian surveyed the city and chose a location near shallow lakes at the Ostrozh falls, where he began by constructing a cell. By the year 1212 he had begun to build the monastery, connected with the Entrance of the Most Holy Theotokos into the Temple, together with a church dedicated to the Archangel Michael. The community is remembered as the Michael the Archangel (Mikhaylo-Arkhangelskiy) Monastery of Veliky Ustiug, the earliest organized monastic house of the city.
      - Tradition relates that during his nighttime prayers the monk used a stone as a prop to keep himself vigilant and continuously at prayer; this stone is preserved and venerated as a relic associated with him.
  - heading: Relics & Shrines
    body:
      - Cyprian was interred in the monastery he founded. A church commemorating Mid-Pentecost was later constructed over his tomb, and by tradition it included a chapel honoring Saint Cyprian of Carthage. The stone said to have served as his prop or pillow during prayer is kept as a relic connected with the saint.
  - heading: Miracles & Traditions
    body:
      - "Traditional Accounts: A posthumous miracle is recorded in which a novice who had fallen gravely ill recovered after a requiem was served and the funeral veil was laid at the saint's tomb."
      - The primary narrative of Cyprian's life derives from Ustiug chronicles of the eighteenth and nineteenth centuries; the sources do not record the year of his birth.
