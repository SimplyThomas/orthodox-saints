id: OS-2890
lifespan: 15th–16th century
liturgicalTitle: Our Venerable Father Chariton of Kudinsk, Founder and Abbot of the Monastery at Lake Kudina near Toropets
overview:
  - Chariton of Kudinsk was a Russian monastic saint of the late fifteenth and early sixteenth centuries, remembered as a disciple of Saint Euphrosynus of Pskov and as the founder and first abbot (igumen) of a monastery at Lake Kudina, near the town of Toropets. He belonged to a generation of Euphrosynus's followers who carried the eremitic and cenobitic monasticism of the Pskov region into its surrounding wilderness.
  - Almost no biographical detail about him survives; the Russian sources that mention him note plainly that the record of his life has been all but lost. He is known chiefly through the community he established and through the tradition of his relics, which rest at the former monastery church near Lake Kudin, a few kilometres from Toropets.
  - He is venerated locally in the Russian Church, with a feast on September 28 (October 11, new style), and is also commemorated among the Assembly (Sobor) of the Saints of Pskov.
sections:
  - heading: Disciple of Saint Euphrosynus of Pskov
    body:
      - Chariton is counted among the famed disciples of Saint Euphrosynus of Pskov (born Eleazar, c. 1386, at Videlebo near Pskov). Euphrosynus entered the Snetogorsk Monastery, later withdrew to a solitary cell on the River Tolva around 1425, and gathered disciples around him, compiling a skete rule for the community and building a wooden church dedicated to the Three Holy Hierarchs in 1447 — the origin of the Spaso-Eleazarov Monastery. He declined the abbacy in favour of his disciple Ignatius, reposed on May 15, 1481, at the age of ninety-five, and was canonized at the Makaryev council in 1549.
      - Chariton is named alongside Euphrosynus's other notable disciples — Sava of Krypetsk, Dositheus of Verkhneostrov, Onuphrius of Malsk, Joachim of Opochsk, and Hilarion of Gdovsk — each of whom went on to establish his own monastic community. Together, the sources record, these disciples 'planted the seeds of monasticism throughout the Pskov area.'
  - heading: The Monastery at Lake Kudina
    body:
      - Chariton founded and served as first abbot of the Kudin Chariton Monastery (Kudinskaya Kharitonova pustyn), situated at the village of Kudino by Lake Kudina, near Toropets. The settlement lay in the historic Pskov lands and later fell within the Toropets district of Tver province.
      - The foundation belongs to the broader movement, led by Euphrosynus's disciples, of establishing monasteries in the wilderness around Pskov. Chariton's community continued after him, its principal church later becoming a parish church.
  - heading: Relics & Shrines
    body:
      - Chariton's relics rest beneath the floor of the Church of the Annunciation of the Most Holy Theotokos, once the main church of his monastery and later a parish church, at the Kudino pogost near Lake Kudin, roughly three kilometres from Toropets.
      - The existence of his relics in the former monastery church is recorded in the Novgorod Sophia Chronicle. His memory is also preserved in reference works including the Brockhaus and Ephron Encyclopedic Dictionary and the Russian Biographical Dictionary compiled by Sreznevsky.
  - heading: Veneration
    body:
      - Chariton is venerated locally in the Russian Orthodox Church. His primary feast falls on September 28 by the Julian calendar (October 11, new style). He is not listed on the pan-Orthodox calendar of the Orthodox Church in America, which commemorates other saints named Chariton on that day — a reflection of his standing as a locally venerated saint.
      - He is also commemorated on April 10 (Julian) as one of the Assembly (Sobor) of the Saints of Pskov, a collective feast established in 1987 by Metropolitan John of Pskov with the blessing of Patriarch Pimen.
timeline:
  - when: "1447"
    title: Foundation of the Spaso-Eleazarov Monastery
    body: Chariton's teacher, Saint Euphrosynus of Pskov, builds a wooden church of the Three Holy Hierarchs on the River Tolva, the nucleus of the monastery around which disciples such as Chariton gathered.
  - when: 15th–16th c.
    title: Foundation of the monastery at Lake Kudina
    body: Chariton establishes and serves as first abbot of a monastery at Lake Kudina near Toropets, part of the wave of foundations by Euphrosynus's disciples across the Pskov wilderness.
  - when: "1481"
    title: Repose of Saint Euphrosynus
    body: Euphrosynus of Pskov dies on May 15 at the age of ninety-five; Chariton, by the Russian record, outlived him into the following century.
  - when: "1987"
    title: Establishment of the Sobor of Pskov Saints
    body: Metropolitan John of Pskov, with the blessing of Patriarch Pimen, establishes the collective feast of the Saints of Pskov (April 10, Julian), among whom Chariton is commemorated.
