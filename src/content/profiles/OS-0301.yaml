id: OS-0301
overview:
  - Nicholas of Selinginsk was an abbot of the Holy Trinity Selinginsk Monastery who was martyred during the Soviet persecution of the Russian Orthodox Church in 1937. He is venerated as a New Hieromartyr and is numbered among the Synaxis of New Martyrs and Confessors of Russia. His memory is kept on September 7.
timeline:
  - when: "1937"
    title: Martyrdom
    body: Abbot Nicholas was put to death during the Soviet persecution of the Church.
sections:
  - heading: New Martyrs and Confessors of Russia
    body:
      - Nicholas is counted among the Synaxis of New Martyrs and Confessors of Russia, the assembly of clergy, monastics, and laity who suffered for the faith under Soviet rule in the twentieth century.
