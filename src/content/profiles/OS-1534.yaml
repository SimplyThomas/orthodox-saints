flagReasons:
  - claim: Aboudimos was beheaded for confessing Christ
    detail: "The anchor row says he 'was beheaded for Christ' but the dossier external sources (Wikipedia, OCA) never specify beheading as the mode of execution — they say he 'died in 305' and was 'martyred for his faith' without specifying beheading. The anchor row does use the word 'beheaded', so this is actually supported by the anchor. Re-evaluating: the anchor row states 'was beheaded for Christ under Diocletian' — so beheading is in the anchor. SUPPORTED."
  - claim: Aboudimos lived during the persecution under Diocletian, traditionally dated to his death in the year 305
    detail: The phrasing 'traditionally dated to his death in the year 305' is grammatically ambiguous — the participial phrase 'traditionally dated to his death in the year 305' modifies 'persecution', suggesting the persecution is dated to 305. The Diocletian persecution began in 303 and ran until 311/313 — it is not dated to 305. The death year 305 is supported, but calling the persecution 'traditionally dated to his death in the year 305' is a confused construction that misattributes the date. This is a minor drafting issue, not a factual fabrication, but 'traditionally dated to his death in the year 305' as a phrase describing the persecution is unsupported and misleading.
