id: OS-2859
lifespan: c. 280 – 352
overview:
  - Julius I was Bishop of Rome from 337 to 352, a pontificate dominated by the Arian controversy that convulsed the Church after the First Ecumenical Council. He is remembered in the Eastern Orthodox Church as a champion of the Nicene faith who sheltered its persecuted defenders and pressed for their vindication.
  - Born in Rome around 280, the son of a man named Rusticus, Julius was elected bishop on 6 February 337 following a four-month vacancy after the brief tenure of Pope Mark. When Arian-aligned bishops of the East renewed the deposition of Athanasius of Alexandria, Julius received the exiled patriarch at Rome, recognized him as a legitimate bishop at a synod there, and defended the Nicene party in his correspondence with the Eastern episcopate.
  - His intervention helped bring about the Council of Sardica (c. 343), whose Western majority ratified the earlier Roman decisions and framed canons on the review of deposed bishops. He also gave refuge to Paul the Confessor, the ejected bishop of Constantinople. Julius died on 12 April 352 and was quickly venerated as a saint; his feast is kept on 12 April.
liturgicalTitle: Our Father among the Saints Julius, Pope of Rome and Confessor
patronage:
  - Defenders of the Nicene faith
  - Bishops in exile
