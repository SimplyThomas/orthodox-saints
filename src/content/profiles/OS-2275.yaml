id: OS-2275
lifespan: 12th century
overview:
  - Nectarius the Obedient was a monastic of the Kiev Caves Monastery (Kyiv Pechersk Lavra) during the twelfth century. He is remembered chiefly for his unquestioning obedience to his elder and the brethren and for his diligence in monastic labor, from which he received the epithet 'the Obedient.'
  - According to the synaxarion he reposed peacefully after a life of much toil and many struggles, and was buried in the Near Caves of Saint Anthony, where his relics remain. He is commemorated on November 29.
liturgicalTitle: Our Venerable Father Nectarius the Obedient of the Kiev Near Caves
sections:
  - heading: Life and Monastic Labor
    body:
      - "Nectarius entered the Kiev Caves Monastery in the twelfth century and lived out his monastic life there. The sources record little of his biography beyond the defining marks of his ascetic character: unquestioning obedience to the will of his elder and the older brethren, and a marked zeal for work."
      - It was for this obedience that he was called 'the Obedient,' a byname that has attached to him in the liturgical calendar. The synaxarion states that he reposed peacefully after a life of much toil and many labors and spiritual struggles.
  - heading: Burial and the Near Caves
    body:
      - Following his death Nectarius was buried in the Near Caves of Saint Anthony, the older of the two cave networks at the Kyiv Pechersk Lavra. Saint Anthony established these caves in 1057, and the network of medieval tunnels runs some 383 metres in length at depths of five to twenty metres, holding dozens of surviving burials and three underground churches.
      - Nectarius rests among the many venerated fathers of the Near Caves, whose company includes such figures as Nestor the Chronicler, the iconographer Alipy, and the physician Agapit.
  - heading: Commemoration
    body:
      - Besides his individual feast on November 29, Nectarius is commemorated with the general synaxis of the Venerable Fathers of the Near Caves on September 28, and on the Second Sunday of Great Lent as part of the collective commemoration of the Caves fathers.
      - The September 28 synaxis dates to 1670, when the caves were restored following earthquake damage; it was originally observed on the first Saturday after the leave-taking of the Exaltation of the Cross. Liturgical texts, including a troparion and kontakion, have been composed in his honor.
timeline:
  - when: "1057"
    title: Founding of the caves
    body: Saint Anthony establishes the caves at Kyiv that would become the Near Caves of the Kyiv Pechersk Lavra.
  - when: 12th century
    title: Monastic life at the Caves
    body: Nectarius struggles in the Kiev Caves Monastery, becoming known as 'the Obedient' for his obedience to the brethren and his diligence in labor.
  - when: 12th century
    title: Repose and burial
    body: He reposes peacefully after many labors and is buried in the Near Caves of Saint Anthony.
  - when: "1670"
    title: Synaxis established
    body: The general synaxis of the Venerable Fathers of the Near Caves is set on September 28, following restoration of the caves after earthquake damage.
