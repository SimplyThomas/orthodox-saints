flagReasons:
  - claim: His relics remain in the Near Caves of Saint Anthony.
    detail: The dossier sources confirm burial in the Near Caves (OCA 2024, Sanidopoulos) but none explicitly state that his relics remain there in the present tense. The Wikipedia article on the Near Caves notes '79 surviving burials' generically but does not identify Nectarius by name among surviving burials. The present-tense relics claim goes beyond what any dossier source asserts.
  - claim: The Near Caves are 'the older of the two cave networks at the Kyiv Pechersk Lavra.'
    detail: No dossier source makes this comparative claim. The Wikipedia entry describes the Near Caves in isolation and does not state they are older than the Far Caves or even mention the Far Caves. This is additional knowledge injected beyond the dossier.
