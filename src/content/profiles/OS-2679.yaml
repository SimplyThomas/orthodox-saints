    title: Birth in Roman Africa
    body: Victor is born in the Roman province of Africa, of Berber origin; the Liber Pontificalis names his father as Felix, and some traditions place his birth at Leptis Magna in modern Libya.
  - when: c. 189
    title: Elected Bishop of Rome
    body: Victor succeeds Eleutherius as bishop of Rome.
  - when: c. 195
    title: The Paschal dispute
    body: Victor corresponds with Polycrates of Ephesus and calls the churches of Asia Minor to adopt the Sunday observance of Pascha, convening the earliest known Roman synod and requesting synods elsewhere.
  - when: c. 199
    title: Repose
    body: Victor dies at Rome and is succeeded by Zephyrinus.
