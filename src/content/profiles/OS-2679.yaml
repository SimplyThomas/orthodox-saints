id: OS-2679
lifespan: c. 110/130 – c. 199
overview:
  - Victor I was Bishop of Rome from approximately 189 to 199, and is remembered chiefly for his role in the Quartodeciman controversy over the proper date for the celebration of Pascha.
  - Born in the Roman province of Africa and of Berber origin, he was the first bishop of Rome to come from that province. The Liber Pontificalis names his father as Felix and identifies him as a native of Africa; he is dated by some traditions to Leptis Magna in modern Libya.
  - His episcopate saw him press the churches of Asia Minor to adopt the Roman practice of celebrating Pascha on a Sunday, convene the earliest known Roman synod, and take a firm stand against early adoptionist teaching. He is venerated in the Orthodox tradition as an Ante-Nicene (Pre-Nicene) saint, with his feast kept on July 28.
liturgicalTitle: Our Father among the Saints Victor, Pope of Rome
sections:
  - heading: The Quartodeciman Controversy
    body:
      - The defining dispute of Victor's episcopate concerned the date of Pascha. The churches of Asia Minor celebrated the feast on the fourteenth of the Jewish month of Nisan, regardless of the day of the week on which it fell, following what they held to be apostolic tradition; hence they were called by Romans 'Quartodecimans' (from the Latin for 'fourteen'). Rome and the West, by contrast, always celebrated on the Sunday following that date.
      - Around 195 Victor initiated correspondence with Bishop Polycrates of Ephesus and called upon the bishops of the province of Asia to abandon their custom, requesting that provincial synods be held to settle the question. He wrote to bishops across many regions asking them to convene similar assemblies.
      - Synodal letters affirming the Sunday observance came from Palestine (led by Theophilus of Caesarea and Narcissus of Jerusalem), from Pontus (under Palmas), from Gaul (represented by Irenaeus of Lyons), from the bishops of Osrhoene, and from individual bishops such as Bakchylus of Corinth. When the Asian churches nevertheless refused to conform, Victor severed communion with them and threatened their exclusion from fellowship.
      - This severity drew a rebuke from Irenaeus of Lyons and others, who argued that earlier bishops of Rome had maintained the Sunday observance without breaking communion with those who differed. The episode is among the earliest recorded exercises of Roman initiative across the wider Church.
  - heading: Defense of the Faith and Discipline
    body:
      - Victor took a firm stand against early heterodox teaching. He excommunicated Theodotus of Byzantium, a leather-worker (also described as a merchant from Constantinople), for teaching that Christ was merely a human being endowed with supernatural power at his baptism — an early form of the adoptionist heresy.
      - He also confronted the Florinus controversy, involving a Roman priest of Asian origin who had adopted Gnostic and Valentinian doctrine and was, after Irenaeus alerted him, likely degraded and expelled. A further disturbance was the Blastus schism, a minor schism raised in Rome over the Easter question.
      - The Liber Pontificalis reports that his episcopate coincided with relatively favorable conditions for Christians under the emperor Commodus, attributed to the influence of a woman named Marcia.
  - heading: Writings and Legacy
    body:
      - Jerome credited Victor as 'the first Latin writer in the Church,' noting that he composed small treatises on religious subjects, particularly concerning the paschal question; none of these writings survive.
      - By tradition Victor is also associated with the gradual introduction of Latin as the liturgical language of the Roman church, in place of Greek — though this change was gradual and the liturgical use of Latin in Rome did not become universal until the latter half of the third century. He is further said to have overseen aspects of the developing Roman scriptural canon.
      - He was preceded as bishop of Rome by Eleutherius and succeeded by Zephyrinus. He reposed in Rome around 199.
