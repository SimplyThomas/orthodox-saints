    body: Mark accompanies Paul and Barnabas as their assistant, traveling to Cyprus and on to Perga in Pamphylia, from where he returns to Jerusalem.
  - when: 1st century
    title: Separation of Paul and Barnabas
    body: A disagreement over taking Mark again leads Paul and Barnabas to part ways; Barnabas takes Mark back to Cyprus.
  - when: 1st century
    title: Episcopate at Byblos
    body: By tradition Mark serves as Bishop of Byblos in Phoenicia; later accounts relate that after the death of Barnabas he travels to Ephesus.
