id: OS-1662
liturgicalTitle: Our Venerable Father Anthony of Optina, Schema-Igumen of the Optina Skete
lifespan: 1795-1865
overview:
  - Venerable Anthony of Optina (1795-1865) was a Russian monastic elder and one of the saints associated with the famed Optina Monastery and its skete during the nineteenth-century flowering of eldership in Russia. Born Alexander Putilov, he was the younger brother of Moses Putilov, who became Superior of Optina, and entered the monastic life under his brother's spiritual guidance.
  - For roughly fourteen years he was placed in charge of the Optina skete, where he helped establish and sustain the tradition of eldership, working alongside the elders Leonid and Macarius. He bore long and painful physical illness with thanksgiving and was numbered among the Optina Elders, who were glorified for universal veneration in 2000.
timeline:
  - when: March 9, 1795
    title: Birth
    body: Born Alexander Putilov in the town of Romanov, Yaroslavl province, Russia, into the family of John Putilov. He was the younger brother of Moses, the future Superior of Optina, and of Isaiah, who became igumen at Sarov.
  - when: January 15, 1816
    title: Enters the monastic life
    body: He joined his elder brother Moses in the monastic life, becoming a novice under Moses's spiritual guidance, having first lived with him among ascetics in the Roslavl forests.
  - when: February 2, 1820
    title: Monastic tonsure
    body: He was tonsured by Father Athanasius and given the name Anthony.
  - when: 1821-1822
    title: Arrival at Optina and building of the skete
    body: He arrived at Optina Monastery in June 1821 and took part in a building project with his brother Moses and other monks; within about a year they had completed the church for the skete.
  - when: "1825"
    title: Placed in charge of the skete
    body: When his brother Moses was elected Superior of Optina Monastery, Anthony was placed in charge of the skete, a responsibility he held for some fourteen years.
  - when: "1839"
    title: Igumen of Maloyaroslavets Monastery
    body: He was appointed igumen of the Maloyaroslavets Monastery, where he served for fourteen years before returning to Optina in 1853.
  - when: March 9, 1865
    title: Receives the Great Schema
    body: Near the end of his life he was clothed in the Great Schema, the highest grade of the monastic life.
  - when: August 7, 1865
    title: Repose
    body: He departed to the Lord at the age of seventy and was buried next to his brother Saint Moses in the side altar of the monastery's cathedral.
sections:
  - heading: The Optina Skete and Eldership
    body:
      - After his brother Moses became Superior of Optina Monastery in 1825, Anthony was placed in charge of the skete, where he served for roughly fourteen years. According to the sources, he would not give orders without his elder brother's blessing, and under his care the skete flourished.
      - He and Moses helped nourish the skete's spiritual life by bringing the elders Leonid and Macarius to live there and supporting them, contributing to the tradition of eldership for which Optina became renowned.
  - heading: Illness Borne with Thanksgiving
    body:
      - Anthony suffered chronic physical ailments arising from his ascetic labors. His legs pained him from continual standing, he had eye trouble and for a time lost his sight, and from 1836 he developed open sores on his legs; in his final illness he suffered typhoid fever.
      - The sources record that he bore these long and painful illnesses with thanksgiving, and his patience under affliction became part of how he was remembered and venerated.
  - heading: Glorification
    body:
      - Anthony is numbered among the Optina Elders. According to the sources, he was glorified by the Moscow Patriarchate for universal veneration on August 7, 2000, the date that is also kept as his feast.
related:
  - name: Venerable Moses of Optina
    note: His elder brother and spiritual guide, Superior of Optina Monastery, beside whom he was buried.
