id: OS-2706
lifespan: Reposed 7 May 721
overview:
  - Saint John of Beverley was an Anglo-Saxon bishop who served successively as Bishop of Hexham and Bishop (Metropolitan) of York in early eighth-century Northumbria. Born of noble parents at Harpham in the East Riding of Yorkshire, he was educated at Canterbury under Archbishop Theodore of Tarsus and formed in the monastic life at Whitby Abbey under Abbess Hilda, where he gained a reputation as a preacher.
  - Consecrated Bishop of Hexham in 687 in succession to Saint Eata, he was transferred to the see of York in 705. He is especially remembered for ordaining the Venerable Bede as both deacon and priest, and Bede in turn recorded accounts of miracles worked through his intercession. Around 717 John founded a monastery at Inderawood, later known as Beverley, and retired there, resigning the see of York; he reposed at Beverley on 7 May 721.
  - His tomb at Beverley became one of the major pilgrimage shrines of medieval England, drawing the devotion of several English kings. His feast is kept on 7 May, the day of his repose.
liturgicalTitle: Our Father among the Saints John, Bishop of Beverley
