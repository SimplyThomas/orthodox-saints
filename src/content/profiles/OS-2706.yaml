sections:
  - heading: Episcopal Ministry
    body:
      - John was consecrated Bishop of Hexham on 25 August 687, succeeding Saint Eata, and served that see until his translation to York in 705 following the death of Bishop Bosa. As bishop he is remembered for his virtues, his learning, and his care for the formation of clergy.
      - Among those he ordained was the Venerable Bede, whom he made both deacon and priest. Bede, the great historian of the English Church, preserved accounts of John's episcopate and of miracles of healing attributed to him.
      - Around 717 John founded a monastery at Inderawood — a name meaning 'the forest of the men of Deira' — which later grew into the town of Beverley. He resigned the see of York and retired to this foundation, where he devoted himself to the contemplative life until his death on 7 May 721. He was succeeded at York by Wilfrid the Younger.
  - heading: Relics & Shrines
    body:
      - John was buried at Beverley, and his tomb became a major centre of pilgrimage in medieval England. His relics were translated in 1037, the same year his cult received formal canonization from Pope Benedict IX, and again to a new tomb on 25 October 1307.
      - English kings including Edward I, Edward II, Edward III, and Henry V were devoted to him; Henry V attributed his victory at the Battle of Agincourt on 25 October 1415 to John's intercession. The shrine was destroyed in 1541 during the English Reformation.
      - In 1664 workers uncovered a stone vault containing ashes, beads, pins, and nails together with a lead inscription bearing the dates 1188 and 1197. In 1738 the relics were reinterred beneath a brick vault and marble slab.
  - heading: Miracles & Traditions
    body:
      - "Historically Documented: The Venerable Bede, who was ordained by John and was his contemporary, recorded accounts of miracles of healing worked through the saint's ministry and intercession."
      - "Traditional Accounts: By tradition John's intercession was credited by King Henry V for the English victory at Agincourt in 1415; the saint's continued patronage was invoked at his shrine, which remained one of England's foremost pilgrimage destinations until the Reformation."
