id: OS-0981
liturgicalTitle: Our Father among the Saints Callinicus of Cernica, Bishop of Ramnicu Valcea
lifespan: 1787–1868
overview:
  - Saint Callinicus of Cernica (1787–1868) was a Romanian monastic, church founder, and hierarch who spent nearly his whole life at the Cernica Monastery near Bucharest before serving as Bishop of Ramnicu Valcea. Born Constantine Antonescu, he entered Cernica as a young man, was tonsured a monk, and rose to lead the community as igumen for more than three decades, presiding over an extensive program of building and restoration. Reluctantly accepting the episcopate in 1850, he governed the diocese of Ramnicu Valcea for some seventeen years, founding schools and a seminary and rebuilding churches before returning to Cernica in his final years.
  - He is remembered as one of the most significant figures of nineteenth-century Romanian monasticism and was the first Romanian to be formally recognized as a saint by the Romanian Orthodox Church. His feast is kept on April 11, the day of his repose.
timeline:
  - when: "1787"
    title: Birth in Bucharest
    body: Constantine Antonescu was born on October 7, 1787, in Bucharest, near the Church of Saint Bessarion, to Anthony and Flora Antonescu.
  - when: "1807"
    title: Entry into Cernica Monastery
    body: At the age of twenty he entered the Cernica Monastery, beginning a monastic association with the community that would last nearly forty-three years.
  - when: "1808"
    title: Tonsure and ordination to the diaconate
    body: He was tonsured a monk on November 9, 1808, receiving the name Callinicus from Igumen Timothy, and was ordained deacon the following month.
  - when: "1813"
    title: Ordination to the priesthood
    body: He was ordained priest on February 4, 1813, at the age of twenty-six, and was later raised to the rank of archimandrite by Metropolitan Dionysius Lupu.
  - when: "1818"
    title: Elected igumen of Cernica
    body: Following the death of his predecessor, the monks elected him igumen of Cernica on December 14, 1818, an office he would hold for thirty-two years.
  - when: "1850"
    title: Consecrated Bishop of Ramnicu Valcea
    body: He was elected Bishop of Ramnicu Valcea on September 14, 1850, accepting the office only with great reluctance after his long monastic service.
  - when: "1868"
    title: Repose at Cernica
    body: Having returned to Cernica in his final years, he reposed on April 11, 1868, at nearly eighty-one years of age, and was buried in the narthex of the Church of Saint George.
  - when: "1955"
    title: Recognized as a saint
    body: He was recognized as a saint by the Romanian Orthodox Church in 1955, the first Romanian formally so recognized, with the solemnities held at Cernica.
sections:
  - heading: Monastic life at Cernica
    body:
      - "Constantine entered Cernica in 1807 at the age of twenty and was tonsured a monk on November 9, 1808, taking the name Callinicus. His progress in the community was rapid: he was ordained deacon in December 1808 and priest in February 1813, and was eventually elevated to the rank of archimandrite by Metropolitan Dionysius Lupu."
      - After the death of his predecessor as superior, the brethren elected him igumen on December 14, 1818, when he was about thirty years old. He went on to govern Cernica for thirty-two years, in addition to overseeing other monasteries and sketes and supervising a number of parish churches. By tradition he kept a severe ascetic regimen, permitting himself only three hours of sleep each day.
  - heading: Building works
    body:
      - As igumen, Callinicus directed an ambitious program of construction and restoration. The sources credit him with completing a church dedicated to Saint Nicholas on an island at Cernica in under two years and furnishing it fully, and with raising a large church dedicated to Saint George between 1823 and 1836.
      - He also carried out restoration following the earthquake of 1838, built the church at the Skete of Pasarea (1846–1847) and a church in Buesti, and added stone houses and barns to the monastic establishment.
  - heading: Episcopate at Ramnicu Valcea
    body:
      - Elected Bishop of Ramnicu Valcea on September 14, 1850, Callinicus accepted the office only reluctantly and held it for roughly seventeen years. As bishop he is recorded as visiting churches and monasteries throughout the diocese and correcting matters that were not in proper order.
      - He gave particular attention to education and to rebuilding. He opened a seminary at Craiova in 1851 and moved it back to Ramnic in 1854, established schools to prepare church singers, began raising a new episcopal cathedral, and rebuilt an infirmary within the episcopal residence.
  - heading: Charity and ascetic reputation
    body:
      - By tradition Saint Callinicus died in poverty, having given away what he had to widows and orphans and toward the building of churches and other charitable purposes. The synaxarion accounts also relate that he was credited with healings, with knowledge of others' unspoken thoughts, and with foreknowledge of deaths, including his own.
      - He returned to Cernica in 1867 and reposed there on April 11, 1868. Metropolitan Niphon conducted his funeral, and he was buried in the narthex of the Church of Saint George at Cernica.
patronage:
  - Cernica Monastery
  - The Diocese of Ramnicu Valcea
related:
  - name: Venerable George of Cernica
    note: Refounder of the renewed coenobitic community at Cernica, on Paisian lines, which Callinicus entered in 1807 shortly after George's repose and whose monastic tradition Callinicus carried forward there.
