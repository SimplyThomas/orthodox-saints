id: OS-2006
lifespan: died 1452
overview:
  - Amphilochius of Glushetsa was a fifteenth-century Russian monastic of the Vologda region and a close disciple of Saint Dionysius of Glushetsa. Already a monk of priestly rank (a hieromonk), he came from Ustiug to Dionysius in 1417 and became his inseparable companion, later succeeding him as abbot of the Glushetsa monastery.
  - "According to his life, when Amphilochius arrived, Dionysius warned him of the demanding ascetic life that lay ahead. Amphilochius remained committed, and the two entered into a spiritual compact: not to be distinct one from another for as long as they lived on earth. Amphilochius accepted this arrangement eagerly and kept it for the roughly twenty years he lived under his mentor's guidance."
  - He died peacefully in 1452 and was buried beside Saint Dionysius at the Glushetsa monastery. The Church commemorates him on October 12.
liturgicalTitle: Our Venerable Father Amphilochius, Abbot of Glushetsa
patronage:
  - Monastics
  - Monastery of Glushetsa
timeline:
  - when: "1417"
    title: Arrival at Glushetsa
    body: Amphilochius, already a hieromonk, came from Ustiug to Saint Dionysius of Glushetsa. Warned by Dionysius of the hardships of the monastic life, he remained resolute and entered a spiritual compact with his mentor not to be distinct from one another while they lived on earth.
  - when: c. 1417–1437
    title: Twenty years under Saint Dionysius
    body: For about two decades Amphilochius practiced fasting and prayer in obedience to Dionysius, taking part in the construction and development of the monastery community.
  - when: "1437"
    title: Succession as abbot
    body: Following the death of Saint Dionysius, Amphilochius was named his successor and served as abbot of Glushetsa for approximately fifteen years.
  - when: "1452"
    title: Repose
    body: Amphilochius died peacefully and was buried alongside Saint Dionysius at the Glushetsa monastery. He was succeeded as abbot by Saint Macarius of Glushetsa.
sections:
  - heading: Discipleship under Saint Dionysius
    body:
      - Amphilochius's life is closely bound to that of Saint Dionysius of Glushetsa (Glushitsa), one of the great ascetics of the Russian north. Dionysius, a native of the Vologda region, had been tonsured by Saint Dionysius the Athonite at the Spasso-Kameni Island Monastery, and in 1393 withdrew into the Vologda forest, where he founded the Glushitsa Monastery by the Glushitsa River. He was also an accomplished iconographer who painted icons for the monastery church, and established additional communities, including a women's monastery and a monastery at Sosnovetsk for monks seeking greater solitude.
      - When Amphilochius arrived in 1417, Dionysius proposed a distinctive spiritual agreement, that the two would not be distinct from one another for as long as they lived on earth. Amphilochius embraced this bond, joining his mentor in a life of fasting, prayer, and obedience while contributing to the ongoing construction and growth of the community. Dionysius reposed on June 1, 1437, and named Amphilochius among his disciples who would carry on as monastic leaders.
  - heading: Abbot of Glushetsa
    body:
      - "After the death of Saint Dionysius, Amphilochius took up the leadership of the Glushetsa community, serving as its abbot for roughly fifteen years. He thus stood at the head of a succession of the monastery's guiding figures: from Dionysius the founder, to Amphilochius, and then to Saint Macarius of Glushetsa, who was chosen by the community to lead after Amphilochius's death."
      - Other saints of the same community are commemorated alongside him on October 12, among them Saint Macarius (born Matthew of Rostov, who entered monastic life at twelve under Dionysius) and Saint Tarasius of Glushetsa, a former abbot who relinquished his office in 1427 to live under Dionysius's direction and labored humbly beside the novices until his death in 1440. These shared commemorations reflect the close-knit monastic family that gathered around Dionysius during Amphilochius's years at Glushetsa.
  - heading: Repose and veneration
    body:
      - Amphilochius died peacefully in 1452 and was buried beside his spiritual father at the Glushetsa monastery, fulfilling in death the compact of shared life the two had made. He is venerated as one of the venerable monastic saints of the Russian north and is commemorated by the Church on October 12.
