id: OS-2868
lifespan: c. 525 – c. 557/559
liturgicalTitle: Our Venerable Father Cyril of Scythopolis, Monk of the Judean Desert
overview:
  - Cyril of Scythopolis (c. 525 – c. 557/559) was a Greek-language monk and hagiographer of the Judean desert whose Lives of the great Palestinian monastic fathers are the principal source for their history.
  - Born in Scythopolis (modern Beit She'an) in the province of Palaestina Secunda, he entered monastic life in the region's lauras and composed biographies of seven monks, among them Sts. Euthymius the Great, Sabbas the Sanctified, and John the Silent.
  - His writings, informed by local patriotism and a conviction that holiness belonged to the desert, remain valued not only as monastic history but as a scholarly source on the ecclesiastical and political affairs of sixth-century Palestine.
