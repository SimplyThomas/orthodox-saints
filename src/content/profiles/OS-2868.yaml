sections:
  - heading: Life in the Judean Desert
    body:
      - Cyril was born about 525 in Scythopolis, in the province of Palaestina Secunda, to a lawyer named John who oversaw his religious formation. After 532 he became a lector, and in 543 he entered monastic life.
      - In 544 he joined the Laura of Euthymius near Jericho. In 555 he was transferred to the New Lavra of Saint Sabas as an Orthodox monk brought in to replace those expelled for Origenism, and in 557–558 he moved to the Great Lavra of Saint Sabas (Mar Saba), where he died about 557–559.
      - His formative spiritual influences included Saint Sabas the Sanctified, whom he encountered in his youth, and Saint John the Silent, bishop of Colonia in Cappadocia.
  - heading: The Lives of the Palestinian Fathers
    body:
      - "Cyril composed hagiographies of seven Palestinian monks: Sabbas the Sanctified, Euthymius the Great, John the Silent, Cyriacus the Anchorite, Theodosius the Cenobiarch, Theognius of Bethany, and Abramius."
      - He also contributed biographical material on Mary of Egypt, Severian of Scythopolis, and Theodosius the Cenobiarch. His work was fostered, in the words of scholarship, both by local patriotism and by a firm belief in the relationship between holiness and the desert.
  - heading: Legacy and Scholarly Value
    body:
      - Cyril's accounts remain valuable to historians for their information on sixth-century political and ecclesiastical affairs, and in particular on the Arab tribal groups of the region, notably the Ghassanids and Lakhmids, on which he is regarded as precise and accurate.
      - The critical scholarly edition of his works was published by Eduard Schwartz in 1939; studies of his testimony on the Arab tribes were made by Irfan Shahîd.
  - heading: Veneration
    body:
      - "Cyril's feast day and formal place in the Orthodox calendar are not confirmed by the online sources consulted: no dedicated OrthodoxWiki article exists, and standard synaxarion and calendar searches returned no matching commemoration. His veneration therefore remains to be verified and requires clergy and source review."
