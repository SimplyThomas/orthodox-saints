id: OS-2796
lifespan: 1768–1833
overview:
  - Zosimas Verkhovsky (born Zakhariya Vasilievich Verkhovsky on 24 March 1768 in the village of Bulovitsy, Smolensk Governorate) was a Russian hesychast monk who, after a brief military career, spent roughly two decades in solitude in the Siberian taiga alongside his elder and spiritual brother, the Venerable Basilisk, and later founded and guided women's monastic communities.
  - The son of a noble family — his father was Colonel Bogdan Verkhovsky — he entered the Preobrazhensky Regiment as a cadet-officer in 1784 and resigned with the rank of lieutenant in 1788 following the death of his parents, having inherited two villages. Drawn to the reclusive life, he sought the forest hermits near Roslavl under Elder Adrian (Blinsky) and was tonsured a monk with the name Zosima in honor of the Venerable Zosimas of Solovki.
  - A close student of the patristic writings, he became a teacher of the Prayer of the Heart, and his labors culminated in the founding of the Turinsk Nikolaev Convent and the Troitse-Odigitrievskaya Hermitage near Moscow. He reposed on 24 October 1833 and, after long local veneration, was glorified by the Russian Orthodox Church for universal veneration in 2004.
liturgicalTitle: Our Venerable Father Zosimas Verkhovsky, the Hesychast of Siberia
patronage:
  - Monastics
  - The Jesus Prayer
  - Siberia
timeline:
  - when: 24 March 1768
    title: Birth
    body: Born Zakhariya Vasilievich Verkhovsky in the village of Bulovitsy, Smolensk Governorate, to a noble family; his father was Colonel Bogdan Verkhovsky.
  - when: "1784"
    title: Military service
    body: Entered the Preobrazhensky Regiment as a cadet-officer on 1 January 1784.
  - when: "1788"
    title: Resignation and inheritance
    body: Resigned with the rank of lieutenant after the death of his parents, having inherited two villages, and turned toward the reclusive life in the forests near Roslavl under Elder Adrian (Blinsky) of Ploshchansk Monastery.
  - when: c. 1790
    title: Tonsure
    body: Following Elder Adrian to Konevets Monastery, he was tonsured a monk with the name Zosima, in honor of the Venerable Zosimas of Solovki, and developed a hesychast life in cells some three versts from the monastery.
  - when: "1799"
    title: Blessing for Siberia
    body: Elder Adrian blessed Zosima and his companion Basilisk to undertake desert monasticism in Siberia.
  - when: c. 1802–1803
    title: Settlement in the taiga
    body: After failed attempts to reach Mount Athos and travels through Kiev, the Crimea, and southern Russia, the two settled in the Kuznetsk district, excavating a dugout in the taiga some forty versts from the nearest village.
  - when: "1822"
    title: Founding of the Turinsk convent
    body: Founded the Turinsk Nikolaev Convent in Tobolsk Governorate with the blessing of Metropolitan Philaret (Drozdov), authoring a monastic rule based on the communal principles of Basil the Great.
  - when: 24 January 1825
    title: Departure from Turinsk
    body: Dismissed from Turinsk by synodal decree amid community disputes, he settled at Moscow's Chudov Monastery with Metropolitan Philaret's blessing.
  - when: "1826"
    title: Troitse-Odigitrievskaya Hermitage
    body: Founded the Troitse-Odigitrievskaya Hermitage near Moscow in the Verey district, on the property of Maria Bakhmeteva, housing nuns loyal to him; he kept a forest cell some three versts away.
  - when: 24 October 1833
    title: Repose
    body: Reposed on the feast of the icon 'Joy of All the Sorrowful' and was buried near the monastery chapel.
  - when: 11 October 1999
    title: Local glorification
    body: Glorified as a local saint of the Moscow Diocese by Patriarch Alexy II.
  - when: 8 October 2004
    title: Universal glorification
    body: Canonized by the Synod at an Archdiocesan Council for veneration throughout the Russian Orthodox Church.
sections:
  - heading: Spiritual brotherhood with Basilisk
    body:
      - Attracted while still a layman to the eremitic life of the Bryansk monks, Zachariah (as he was then called) formed a lasting spiritual bond with the Elder Basilisk. Basilisk first directed him to live at the cenobitic Konevets Monastery for three years before accepting him as a companion.
      - Though Basilisk was his elder, Zosima surpassed him in understanding and spiritual discretion through his study of the patristic writings. He revealed to Basilisk what one account calls 'the secret monastic treasure,' explaining the teaching on the Prayer of the Heart, and compiled a manuscript documenting Basilisk's spiritual experiences and revelations.
      - The two ascetics spent roughly twenty years in hermitage near Kuznetsk in the Siberian forest, supporting themselves by craftwork — Basilisk made pottery and Zosima made wooden dishes. During one harrowing winter, when a promised delivery of food failed, Zosima nearly drowned in an icy river but, as tradition relates, was rescued after the two cried out to the Mother of God.
  - heading: Monastic foundations and rule
    body:
      - Zosima petitioned the Holy Synod to redesignate a monastery at Turinsk for women disciples, establishing the Saint Nicholas–Turinsk Convent in 1822, and traveled to Saint Petersburg in early 1823 to seek synodal approval of a rule he composed on the communal principles of Basil the Great.
      - Dismissed from Turinsk in 1825 amid disputes within the community, he settled at Moscow's Chudov Monastery with the blessing of Metropolitan Philaret (Drozdov) and in 1826 founded the Troitse-Odigitrievskaya Hermitage in the Verey district, on land given by Maria Bakhmeteva, gathering there the nuns loyal to him while himself keeping a forest cell nearby.
      - Following Basilisk's death, he commissioned a portrait of his companion and remained closely involved with the monastic community they had helped establish.
  - heading: Writings
    body:
      - Zosima's writings, all composed in Church Slavonic, include the 'Sealed Letters,' lives of Basilisk and of Peter of Tomsk, a treatise on obedience, and a seventy-five-part exposition on the Jesus Prayer.
      - An akathist to the saint was approved by the Sacred Synod on 28 December 2018 and published separately in 2021.
  - heading: Relics & Shrines
    body:
      - After his repose in 1833 local veneration began, and Metropolitan Philaret blessed the construction of a Trinity church over his grave. In the 1880s his relics were uncovered and transferred to a new stone coffin; the body was found whole, though the feet had decayed.
      - An examination on 25 December 1999 found the white-stone sarcophagus empty, and the present location of the relics remains unknown.
