id: OS-2611
liturgicalTitle: The Right-believing Prince Saint Neagoe Basarab of Wallachia
lifespan: c. 1459 – 1521
overview:
  - Neagoe Basarab was Voivode (Prince) of Wallachia from 1512 until his death in 1521, a member of the boyar house of the Craiovești. His reign is remembered as a period of relative peace and prosperity in the Romanian lands at a time when the Orthodox Church across the Balkans labored under Ottoman rule. He is venerated in the Romanian Orthodox Church as a right-believing ruler, and is commemorated on September 26.
  - He is best known as the builder of the monastery church at Curtea de Argeș, completed in 1517, which became his burial place and one of the great monuments of Wallachian church architecture. Beyond his own foundations, he was a generous patron of Orthodox institutions far beyond his borders, sending gifts and endowments to monasteries throughout the Balkans and to the major centers of Orthodox monasticism, including Mount Athos.
  - Neagoe is also remembered as a writer. He composed The Teachings of Neagoe Basarab to His Son Theodosie, a book of counsels in Church Slavonic addressed to his son and successor, ranging across questions of rule, morality, diplomacy, and the Christian life. The work is regarded as one of the significant literary monuments of medieval Romanian culture.
  - Born around 1459, he reposed in 1521 and was buried at Curtea de Argeș. The Holy Synod of the Romanian Orthodox Church formally numbered him among the saints in 2008.
sections:
  - heading: Reign and Church-Building
    body:
      - Neagoe Basarab became Prince of Wallachia in 1512, succeeding Vlad cel Tânăr, and ruled for some nine years until his death in 1521. Sources describe his rule as a time of order and prosperity, with attention to justice and to good relations with neighboring rulers, sustained in a region under heavy Ottoman pressure.
      - His most celebrated undertaking was the monastery church at Curtea de Argeș, completed in 1517, admired for its richness and craftsmanship. He also directed works on the Metropolitan church at Târgoviște and supported the building of the Church of St. Nicholas in the Șcheii district of Brașov. He was himself buried at Curtea de Argeș.
  - heading: Patronage Beyond Wallachia
    body:
      - Neagoe extended his patronage well beyond his own principality, sending donations and endowments to Orthodox monasteries across the Balkans and to the wider Orthodox world, including the monastic communities of Mount Athos. This support helped sustain Orthodox foundations during a period when many lived under Ottoman rule.
      - "His ties to Mount Athos were also personal: by tradition he had been a spiritual disciple of Niphon (Nifon) II, the former Patriarch of Constantinople who had served in Wallachia, and after Niphon's repose Neagoe arranged for the saint's relics to be brought from the Holy Mountain to Wallachia."
  - heading: The Teachings to His Son
    body:
      - Neagoe's literary legacy is The Teachings of Neagoe Basarab to His Son Theodosie, written in Church Slavonic and addressed to his heir. Cast in the tradition of a 'mirror for princes,' it gathers counsel on governance, diplomacy, morality, and Christian piety, drawing on Scripture and patristic sources. It is regarded as one of the most valued literary works of medieval Romanian culture.
