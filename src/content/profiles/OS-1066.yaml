id: OS-1066
liturgicalTitle: The Holy Righteous Virgin-Martyr Glaphyra
lifespan: died c. 322
overview:
  - >-
    Glaphyra was a maidservant in the household of the empress Constantia, wife
    of the emperor Licinius, in the early fourth century. When the emperor was
    overcome with passion for her, she resolved to preserve her chastity and,
    with the help of her mistress, fled the imperial court. The synaxarion
    honors her as a righteous virgin whose flight led, indirectly, to the
    martyrdom of Saint Basil, Bishop of Amasea, with whom she is commemorated on
    April 26.
  - >-
    According to the tradition preserved in the Orthodox calendar, Glaphyra
    disguised herself in men's clothing and travelled to Pontus, where she found
    refuge in Amasea. Her death there spared her from being returned to
    Licinius, but the discovery of her whereabouts brought about the arrest and
    execution of the bishop who had sheltered her.
timeline:
  - when: early 4th c.
    title: Service in the imperial household
    body: >-
      Glaphyra served as a maidservant of the empress Constantia, the wife of
      the emperor Licinius (who reigned in the East 308-324).
  - when: c. 322
    title: Flight from Nicomedia to Pontus
    body: >-
      When Licinius was seized with passion for her, Glaphyra reported the
      matter to the empress, who helped her escape. Disguised in men's attire
      and provided with money, she was sent to Pontus.
  - when: c. 322
    title: Refuge at Amasea and her repose
    body: >-
      Glaphyra was sheltered at Amasea by its bishop, Saint Basil. She gave the
      money she carried toward the building of a church there and wrote to
      Constantia asking for further funds. The letter was intercepted by
      Licinius, but Glaphyra died before his order to seize her reached Amasea.
sections:
  - heading: A flight to preserve chastity
    body:
      - >-
        The account of Glaphyra is bound up with the persecution under Licinius,
        who in the years before his defeat by Constantine renewed pressure
        against Christians in Pontus and the surrounding cities. The synaxarion
        relates that when the emperor conceived a passion for Glaphyra, she
        confided in the empress Constantia, who arranged her escape rather than
        expose her to dishonor.
      - >-
        Dressed as a man and given money for the journey, Glaphyra travelled to
        Pontus and was received at Amasea by Bishop Basil. There she devoted the
        funds she carried to the construction of a church and sought additional
        support from the empress by letter. When that letter fell into the
        emperor's hands, he demanded that both the bishop and the maidservant be
        sent to him; Glaphyra's death intervened before the order could be
        carried out.
  - heading: Commemorated with Saint Basil of Amasea
    body:
      - >-
        Saint Basil, Bishop of Amasea, who had given Glaphyra shelter, was taken
        in bonds to Nicomedia. By tradition he refused the emperor's demands,
        was tortured, and was beheaded, his body cast into the sea and later
        recovered and buried in the church he had built. He is commemorated on
        the same day as Glaphyra, April 26, and the two lives are recounted
        together in the calendar.
companions:
  - name: Hieromartyr Basil, Bishop of Amasea
    note: The bishop who sheltered Glaphyra at Amasea; martyred under Licinius and commemorated April 26
    href: saint/OS-1064
patronage:
  - Those fleeing to preserve chastity and purity
  - Women in domestic service
