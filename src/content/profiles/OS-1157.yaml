id: OS-1157
liturgicalTitle: The Holy New Martyr John the Wallachian
lifespan: c. 1644 - 1662
overview:
  - >-
    Saint John the Wallachian was a young Romanian martyr of the seventeenth
    century, put to death at Constantinople for refusing to deny Christ. Taken
    captive as a youth when Ottoman and Tatar forces ravaged Wallachia, he was
    sold into slavery and, resisting both the lust of his captors and repeated
    demands that he embrace Islam, sealed his confession of faith with his blood.
  - >-
    By the synaxarion's account John came from a pious and well-to-do family of
    Oltenia. After he killed the man who tried to violate him, he was carried to
    Constantinople and handed over to the dead man's widow, who over more than two
    years alternately attempted to seduce him and to force his conversion. He
    remained steadfast and was hanged on May 12, 1662, at roughly seventeen years
    of age. He is venerated as a New Martyr in both the Greek and Romanian
    Churches.
timeline:
  - when: c. 1644
    title: Birth in Oltenia
    body: >-
      John was born about 1644 in Oltenia, in the region of Wallachia (Vlachia),
      and raised in the Orthodox faith by pious parents during a period when the
      land was under Ottoman rule.
  - when: c. 1659
    title: Captivity
    body: >-
      Following the failed revolt of the Voevod Mihnea against Turkish tribute
      demands, Turkish and Tatar forces ravaged the region. John, then about
      fifteen, was seized and sold into slavery to a Turkish military captain who
      sought to abuse him.
  - when: c. 1659-1662
    title: Resistance and captivity at Constantinople
    body: >-
      When his captor attempted to violate him, John killed the man and was
      brought in chains to Constantinople, where he was given to the dead man's
      widow. For some two and a half years she tried in turn to seduce him and to
      make him deny Christ and accept Islam, but he refused, declaring he would
      rather die for Christ.
  - when: May 12, 1662
    title: Martyrdom
    body: >-
      Denounced by the widow to the authorities and tortured in prison, John was
      condemned to death and hanged at Parmak Kapi, near the covered bazaar of
      Constantinople, at about seventeen years of age.
sections:
  - heading: Veneration
    body:
      - >-
        John's sanctity was recognized first within the Greek Orthodox world,
        where his martyrdom took place. The Romanian Orthodox Church formally
        glorified him in October 1950, and his feast is kept on May 12. He is
        numbered among the New Martyrs who suffered under Ottoman rule.
patronage:
  - Captives and those held in slavery or bondage
  - Young people facing temptation and pressure to abandon the faith
sources:
  - OCA Synaxarion (oca.org), Lives of the Saints
