    body: Born as the son of King Stefan Uroš I of Serbia and Helen of Anjou; the date is estimated by historian Miodrag Purković from a 1264 monastic record.
  - when: c. 1268
    title: Marriage to Catherine of Hungary
    body: "Married Catherine of Hungary, a union likely arranged after his father's 1268 peace treaty with her grandfather, Béla IV. They had three children: Vladislav, Elizabeth, and Urošica."
  - when: "1276"
    title: Accession to the throne
    body: After rebelling with Hungarian assistance and the Battle of Gacko, forced his father Uroš I to abdicate and became King of Serbia.
  - when: "1282"
    title: Abdication
    body: Broke his leg in a fall from his horse and abdicated in favor of his brother Milutin, retaining the northern Serbian territories.
