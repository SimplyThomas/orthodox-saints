id: OS-2761
lifespan: c. 550 – 619
overview:
  - "Blessed John Moschus (c. 550–619), surnamed Eucrates, was a Byzantine monk best known for compiling The Spiritual Meadow (Greek: Leimon pneumatikos; Latin: Pratum spirituale), a collection of the sayings, lives, and edifying tales of the ascetics of Palestine, Egypt, Sinai, Cilicia, and Syria. Born at Damascus, he spent his life traveling among the desert monasteries of the Christian East, gathering the spiritual wisdom of the hermits and monks he encountered."
  - He was the spiritual father and lifelong companion of Sophronius, the future Patriarch of Jerusalem, with whom he journeyed through Egypt, Sinai, Antioch, Alexandria, Cyprus, and finally Rome. His book was highly esteemed in the Church and was cited at the Seventh Ecumenical Council. His feast is kept on March 11, shared with Sophronius.
liturgicalTitle: Our Venerable Father John Moschus, the Compiler of the Spiritual Meadow
sections:
  - heading: Life and Travels
    body:
      - Born around 550 at Damascus, John Moschus was surnamed Eucrates. He entered monastic life at the Monastery of Saint Theodosius near Jerusalem, and later lived among the hermits of the Jordan Valley and at the New Lavra of Saint Sabbas east of Bethlehem, serving as a hieromonk (priest-monk).
      - His life was marked by extensive travel through the monastic centers of the Christian East. Around 578 he set out for Egypt together with Sophronius, reaching the Great Oasis in the Libyan Desert. After 583 he spent approximately ten years at Mount Sinai in the Lavra of the Aeliotes, then returned to visit the monasteries near Jerusalem and the Dead Sea. He later went again to Egypt, and in 604 traveled to Antioch, returning to Egypt in 607.
      - According to the synaxarion, he and Sophronius departed Palestine to escape the Persian invasions, moving on to Antioch and then Egypt. At Alexandria they assisted Patriarch John the Merciful (John the Almsgiver) in his opposition to the Monophysite heresy. Moschus and Sophronius also collaborated on a biography of John the Almoner. Around 614–615 Moschus traveled to Rome, by tradition accompanied by eighteen other monks.
  - heading: The Spiritual Meadow
    body:
      - Moschus's enduring work is The Spiritual Meadow (Leimonarion), written during the 610s. It recounts his experiences among the ascetics he met on his travels through Palestine, Sinai, Egypt, Cilicia, and Syria, recording their sayings and lives together with accounts of miracles and visions. The book is a principal source for the history of Eastern monasticism in the sixth and seventh centuries.
      - The work grew out of the notes he and Sophronius made as they visited monastery after monastery, writing down the lives and spiritual counsel of the ascetics they encountered. It was held in high esteem in the Church and was cited at the Seventh Ecumenical Council.
  - heading: Death and Legacy
    body:
      - John Moschus died at Rome, traditionally dated to 619. His body was carried back to Jerusalem by Saint Sophronius and buried at the Monastery of Saint Theodosius, where he had first embraced the monastic life.
      - Through The Spiritual Meadow his influence extended across subsequent generations of Orthodox monasticism. He is remembered alongside major figures of his era, and his close companion Sophronius went on to become Patriarch of Jerusalem.
