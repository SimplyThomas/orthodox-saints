id: OS-2212
lifespan: 18th century (d. 1750)
overview:
  - Anastasius of Epirus was a mid-18th-century Greek peasant who lived in Epirus under Ottoman rule and is venerated in the Orthodox Church as a new martyr. According to the synaxarion, when a band of Turks entered his village, their leader, Musa, was struck by the beauty of Anastasius' sister and attempted to seize her. Anastasius fought off the attackers, allowing his sister to escape, and was arrested in her place.
  - Imprisoned and tortured, Anastasius was pressed to renounce Christianity and refused. The synaxarion relates that while in his cell he saw two young men of shining appearance, understood in the tradition as angels, and that he used his imprisonment as an occasion to speak to Musa about the Christian faith and the Gospel. He was beheaded in 1750 by order of Musa's father, the local Pasha.
  - By tradition, Anastasius' steadfast witness so moved Musa that he later converted to Christianity, became a monk under the name Daniel on the island of Corfu, and founded a church dedicated in the saint's honor. Anastasius is commemorated on November 18.
