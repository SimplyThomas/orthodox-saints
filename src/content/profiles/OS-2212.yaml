sections:
  - heading: Historical Context
    body:
      - Anastasius belonged to the Christian peasantry of Epirus in northwestern Greece during the era of Ottoman rule. His life and death are recorded among the new martyrs, Orthodox Christians who suffered under Ottoman authority and who were commemorated as a distinct category of martyrs of the later centuries.
      - "The account preserves a concrete social setting: an armed band entering a village, the vulnerability of a Christian household, and an ultimatum to abandon the faith. Anastasius' arrest followed directly from his resistance to the abduction of his sister."
  - heading: Legacy
    body:
      - Anastasius' martyrdom is chiefly remembered for its effect on Musa, the man responsible for his arrest. By tradition, Musa was so moved by the saint's constancy that he embraced Christianity, took monastic vows on Corfu under the name Daniel, and built a church dedicated to Saint Anastasius.
      - The Church commemorates Anastasius of Epirus on November 18, together with Martyr Platon of Ancyra, Martyr Romanus the Deacon of Caesarea, Martyr Barulas the Youth, and the Martyrs Zacchaeus and Alphaeus of Caesarea.
  - heading: Hymnography
    body:
      - The service to the saint includes a troparion in Tone 3 and a kontakion in Tone 2, which honor Anastasius as a martyr who received an incorruptible crown and who bore witness to Christ against false teaching, and which invoke his continuing intercession.
