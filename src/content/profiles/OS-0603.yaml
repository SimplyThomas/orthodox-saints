id: OS-0603
lifespan: c. 815 – February 6, 893
liturgicalTitle: Our Father among the Saints Photius the Great, Patriarch of Constantinople, Equal to the Apostles, Pillar of Orthodoxy
overview:
  - Photius the Great was the ninth-century Patriarch of Constantinople, a scholar and statesman of vast learning who twice held the patriarchal throne and twice suffered deposition and exile. Born into a noble Constantinopolitan family around 815, he became one of the foremost intellects of the Byzantine world before being raised, while still a layman, to the highest ecclesiastical office in the empire.
  - He is remembered as a defender of Orthodoxy who opposed the addition of the Filioque to the Nicene Creed, asserted the autonomy of the Eastern Church against the jurisdictional claims of the Roman papacy, and presided over the period that sent the mission to the Slavs. His extensive theological and scholarly writings, including the Bibliotheca, earned him recognition as a leading figure of the ninth-century intellectual renaissance.
  - The Orthodox Church venerates him as Saint Photius the Great, honoring him with the titles Confessor of the Faith, Equal to the Apostles, and Pillar of Orthodoxy. His feast is kept on February 6.
