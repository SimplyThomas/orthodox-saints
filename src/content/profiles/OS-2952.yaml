id: OS-2952
status: draft
eyebrow: Open Synaxis · The Saints of the New World
feastNote: Second Sunday after Pentecost · an open synaxis of all the saints of North America
overview:
  - The Synaxis of All Saints of North America gathers those who planted, watered, and confessed the Orthodox faith across the North American continent. It begins with the missionary monks who came from Russia to Alaska in 1794, and grows through two centuries of mission, immigration, and witness — Alaskan wonderworkers and native faithful, apostles to the peoples, hierarchs of the New World, and martyrs of the twentieth century.
  - The first laborers were the monks of Valaam, among them Saint Herman, who settled on Spruce Island and became the wonderworker of Alaska. Saint Innocent (Veniaminov) evangelized the Aleuts and Tlingit, gave them Scripture in their own tongues, and ended his life as Metropolitan of Moscow; Saint Jacob Netsvetov, of Aleut and Russian blood, carried the Gospel to the Yup'ik. To them are joined the Protomartyr Juvenaly and the boy-martyr Peter the Aleut, and, in later generations, hierarchs and pastors of the growing Church — Saint Tikhon, who reorganized the diocese before returning to Russia and the patriarchal throne, Saint Raphael of Brooklyn, the "good shepherd of the lost sheep in America," and the confessor Alexis Toth, who led tens of thousands back to Orthodoxy.
  - Kept on the second Sunday after Pentecost, the feast honors the whole company together — Russian and Greek, Serb and Arab, Aleut and Yup'ik and convert — the saints of a Church gathered from every nation on new soil. It is an open synaxis, and as North America's saints are glorified, they are numbered among this assembly, and the roster below grows with them.
