timeline:
  - when: "1794"
    title: The mission to Alaska
    body: Monks of Valaam, among them Saint Herman, arrive at Kodiak to preach to the native peoples.
  - when: "1824"
    title: Saint Innocent among the Aleuts
    body: The future apostle of America begins his labors, translating Scripture and services into native tongues.
  - when: "1870"
    title: A diocese of the New World
    body: The Russian Church establishes a North American diocese; its see later moves from Alaska to San Francisco and then New York.
  - when: "1905"
    title: Saint Tikhon reorganizes the Church
    body: Archbishop Tikhon broadens the multi-ethnic diocese before returning to Russia, where he becomes Patriarch and confessor.
  - when: "1970"
    title: Glorification of Saint Herman
    body: Herman of Alaska is glorified — the first saint canonized in North America — as the American Church receives autocephaly.
