timeline:
  - when: 1st century
    title: Betrothal to Mary
    body: Joseph, a widower of the House of David living in Nazareth, was betrothed to Mary. Upon learning she was with child he received angelic reassurance in a dream and took her as his wife.
  - when: 1st century
    title: Nativity and flight into Egypt
    body: Joseph traveled with Mary to Bethlehem for the census and witnessed the birth of Jesus, then fled with the family to Egypt when warned of Herod's threat before returning to settle in Nazareth.
  - when: When Jesus was twelve
    title: The Temple in Jerusalem
    body: Joseph's final appearance in the Gospels occurs at the Temple in Jerusalem when Jesus was twelve years old; he is not mentioned thereafter.
