    title: Birth in Ireland
    body: Brychan is born in Ireland, son of the Irish nobleman Anlach and Marchell, heiress of the Welsh kingdom of Garth Madrun.
  - when: Mid-5th century
    title: Founding of Brycheiniog
    body: On his father's death he inherits Garth Madrun and renames it Brycheiniog after himself, according to tradition founding the kingdom that would give its name to Brecknockshire.
