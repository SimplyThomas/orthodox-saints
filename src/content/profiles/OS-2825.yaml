id: OS-2825
lifespan: Traditionally late 5th century
overview:
  - 'Brychan of Brycheiniog was a semi-legendary chieftain of Brycheiniog, a kingdom in south-central Wales, traditionally placed in the late fifth century. He is remembered less for his own deeds than as the patriarch of a great "holy family": a large number of his children and grandchildren are counted among the saints of Wales, Cornwall, and Devon.'
  - According to tradition he was the son of Anlach, an Irish nobleman, and Marchell (Marchel), the Welsh heiress of the kingdom of Garth Madrun. Born in Ireland, he inherited Garth Madrun and renamed it Brycheiniog after himself. The realm gave its name to the later county of Brecknockshire (Breconshire) and survives in the Welsh Bannau Brycheiniog, the name of the Brecon Beacons.
  - The traditional literature does not, strictly, call Brychan a saint but styles him a patriarch, and no churches are dedicated to him. His importance to the church of the region rests on his descendants, many of whom are said to have travelled from Brecon into Cornwall and North Devon to evangelise, leaving their names on numerous parishes. His feast is kept on April 6.
liturgicalTitle: The Righteous Brychan, King of Brycheiniog
sections:
  - heading: Origins and the Kingdom of Brycheiniog
    body:
      - Brychan (Brychan ap Anlach) is presented in Welsh tradition as a fifth-century king. His father, Anlach (Prince Anlach Goronog mac Cormach), was an Irish settler said to have taken control of the region peacefully by marrying Marchell, the heiress of Garth Madrun; his mother thus carried the Welsh royal line of that kingdom.
      - Born in Ireland, Brychan inherited Garth Madrun on his father's death and renamed it Brycheiniog after himself. The kingdom lay in south Wales as a buffer between England to the east and, later, Deheubarth to the west, and tradition dates its founding to the mid-fifth century. Its name endures in the anglicised Brecon and Brecknockshire and in the Welsh Bannau Brycheiniog, the name of the Brecon Beacons.
      - His name most likely derives from the Irish Broccán, with Latinised forms such as Brocanus and variant spellings including Braccan, Brachan, Brecin, and Breccan; he is also known as Brychan of Brecknock. Some traditions attribute to him both Irish and Greek ancestry, though the Greek connection is not adequately explained in the Welsh sources.
  - heading: The Holy Family of Brychan
    body:
      - Brychan is chiefly venerated as the ancestor of a remarkable body of saints. Tradition holds that he married three times — to Prawst ferch Tydwal, Banhadlwedd ferch Banadi, and Gwladys — and the number of children attributed to him varies widely, from twelve to sixty-three, with twenty-four being the figure most often given.
      - Many of his children are said to have travelled from Brecon to evangelise Cornwall and North Devon, where they are now venerated, and eighteen of them gave their names to Cornish parishes — among them Adwen (Advent), Cleder (St Clether), Endelient (St Endellion), Enoder (St Enoder), Keyne (St Keyne), Mabon (St Mabyn), Menfre (St Minver), Morwenna (Morwenstow), Nectan, Tethe (St Teath), Wenna (St Wenn), and Yse (St Issey).
      - Notable saintly offspring named in the tradition include Cynog (Canog), Dwynwen, Morwenna, Nectan, Keyne (Keyna), Tydfil, Gladys (Gwladys), and Endellion. Later hagiographic sources reckon at least twenty-two of his children as canonized saints.
  - heading: Traditional Accounts
    body:
      - "The Life of St Cadoc, written by Lifris of Llancarfan around 1100, brings Brychan into the Arthurian legend: it depicts him in conflict with Arthur, Cai, and Bedwyr over the abduction of his daughter Gwladys by Gwynllyw, king of Gwynllwg."
      - Brychan's iconography reflects his role as patriarch of a holy family. A fifteenth-century stained-glass window at St Neot in Cornwall depicts him holding eleven children in his lap.
      - These accounts belong to a semi-legendary body of tradition; Brychan's historicity and the details of his family are not securely documented, and the sources themselves preserve considerable variation.
  - heading: Veneration
    body:
      - Brychan was canonized pre-Congregation, in the era before the formal processes of the later Roman church. His feast day is kept on April 6.
      - He is invoked as a patron of Wales, of kings, and of fathers, reflecting both his royal status and his fatherhood of so large a family of saints. He is associated in the tradition with other early British saints, including Clydog (Cledwyn) and Dubricius (Dyfrig) of Llandaff.
timeline:
