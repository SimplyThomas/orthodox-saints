lifespan: c. 1460 – 1548
liturgicalTitle: Our Venerable Father Theophilus the Myrrh-gusher of Macedonia
overview:
  - Theophilus the Myrrh-gusher was a sixteenth-century monastic of Macedonia, by tradition born around 1460 in New Zikhne in Greek Macedonia to pious parents. Well educated, he trained in letters and calligraphy before becoming a monk and being ordained to the priesthood, and he passed much of his later life in ascetic struggle on Mount Athos.
  - He is best known for the fragrant myrrh that, according to the synaxarion, flowed from his relics after their discovery, an account that gives him the epithet "the Myrrh-gusher." He is commemorated on July 8.
timeline:
  - when: c. 1460
    title: Birth in Macedonia
    body: By tradition Theophilus was born around 1460 in New Zikhne (Ziki) in Greek Macedonia to pious parents, and was educated in letters and calligraphy before entering the monastic life and being ordained priest.
  - when: c. 1486
    title: Mission to Egypt
    body: Patriarch Niphon of Constantinople sent him, by some accounts together with Bishop Akakios, to Egypt to investigate reports that Patriarch Joachim of Alexandria had moved a mountain and drunk poison without harm; the synaxarion relates that he verified these accounts.
  - when: 16th century
    title: Service and ascetic life
    body: He served the Patriarchate of Constantinople for a period before withdrawing to Mount Athos, where he lived in turn at the Vatopedi and Iveron monasteries and afterward in the Kapsala area near Karyes, settling at the cell of Saint Basil.
  - when: 16th century
    title: Refusal of the see of Thessalonica
    body: Nominated to become Archbishop of Thessalonica, he declined the office; the tradition relates that he avoided consecration by taking the Great Schema.
  - when: July 8, 1548
    title: Repose
    body: He reposed on July 8, 1548. His relics were later discovered and brought to his cell, after which, according to the synaxarion, fragrant myrrh began to flow from them.
sections:
  - heading: Relics & Shrines
    body:
      - According to the synaxarion, the relics of Theophilus were found and placed in the church or cell of Saint Basil in the Kapsala area near Karyes on Mount Athos, where they were reported to gush a fragrant myrrh. By tradition the myrrh-bearing relics were later enshrined at the Pantokrator Monastery on the Holy Mountain.
companions:
  - name: Niphon, Patriarch of Constantinople
    note: Patriarch who sent Theophilus to Egypt to verify the wonders reported of Patriarch Joachim of Alexandria.
