overview:
  - 1 Enoch, also called the Book of Enoch, is a Second Temple Jewish apocalyptic work attributed pseudonymously to the patriarch Enoch, the seventh generation from Adam. In Genesis, Enoch is briefly described as a righteous man who “walked with God” and was taken by God rather than dying in the ordinary way (Genesis 5:21–24). 1 Enoch expands this brief biblical notice into a large collection of visions, heavenly journeys, angelic revelations, judgments, and eschatological prophecies.
  - The book is especially important for the study of early Jewish angelology. It contains detailed traditions about the Watchers, the fallen angels who transgressed the divine order; the giants or Nephilim, their violent offspring; and several named faithful angels, including Michael, Gabriel, Raphael, Uriel, Raguel, Sariel, Remiel, and Phanuel. These traditions shaped later Jewish and Christian thought about angels, demons, judgment, and the heavenly court.
  - Within Eastern Orthodox Christianity, 1 Enoch is not canonical Scripture but ancient Jewish religious literature — though it was widely known in the early Church and remains canonical only in the Ethiopian and Eritrean Orthodox Tewahedo tradition. This page presents it as a historically influential witness that helps explain the background of some biblical and early-Christian language, while clearly distinguishing it from Holy Scripture and Orthodox liturgical doctrine. Its canonical standing and its echo in the New Testament are treated in the sections below.

sections:
  - heading: Authorship & Date
    body:
      - 1 Enoch is pseudepigraphal — written under the name of an ancient biblical figure. The historical patriarch did not write the book in its final form; modern scholarship generally understands 1 Enoch as a composite collection of several Enochic writings produced over time.
      - The oldest portions, especially the Book of the Watchers and parts of the Astronomical Book, are commonly dated to the third or early second century BC. Aramaic fragments of Enochic material were found among the Dead Sea Scrolls at Qumran, showing that these traditions circulated before Christianity. The Book of Parables is usually dated later, with scholarly debate placing it somewhere from the late first century BC to the first century AD.
      - The book survives completely in Geʽez, the classical liturgical language of Ethiopia; fragments also survive in Aramaic, Greek, and Latin.
  - heading: Canonicity & Orthodox Reception
    body:
      - In mainstream Eastern Orthodox tradition, 1 Enoch is not part of the biblical canon. The Byzantine Orthodox tradition received it primarily as apocryphal or pseudepigraphal literature, and it should not be cited as Scripture except when discussing the Ethiopian and Eritrean Orthodox biblical traditions specifically.
      - At the same time, 1 Enoch is not irrelevant to Orthodox study. It preserves early Jewish traditions that were known in the world of the New Testament, and several early Christian writers knew or discussed them — the Epistle of Jude even quotes a prophecy attributed to Enoch (treated under Influence on the New Testament, below). Some Fathers valued parts of the tradition, while others rejected the book's authority or warned against treating it as Scripture.
      - In summary — Second Temple Jewish literature; non-canonical in the Byzantine Orthodox tradition; canonical in the Ethiopian and Eritrean Orthodox Tewahedo tradition; historically influential for early Jewish and Christian angelology.
  - heading: Structure of the Book
    body:
      - 1 Enoch is usually divided into five major sections, each originally an independent Enochic writing.
    table:
      columns: ["Section", "Chapters", "Main content"]
      rows:
        - [
            "Book of the Watchers",
            "1–36",
            "Fall of the Watchers, the giants, judgment, and Enoch's heavenly journeys",
          ]
        - [
            "Book of Parables (Similitudes)",
            "37–71",
            "Judgment, the righteous, and the “Son of Man” figure",
          ]
        - [
            "Astronomical Book (Book of Luminaries)",
            "72–82",
            "The heavenly bodies, the calendar, and cosmic order",
          ]
        - [
            "Dream Visions",
            "83–90",
            "Symbolic visions of world history and Israel",
          ]
        - [
            "Epistle of Enoch",
            "91–108",
            "Warnings, judgment, righteousness, and final destiny",
          ]
  - heading: The Book of the Watchers
    body:
      - The Book of the Watchers is the first and most influential section of 1 Enoch. It explains the rebellion of certain angels called Watchers, who descend to earth, take human wives, and beget violent giants — events presented as a major cause of the corruption before the Flood.
      - It is the section that names the principal angelic figures — the faithful angels who bring the matter before God and are sent to execute judgment, and the rebellious Watchers judged for the transgression. Each of them, along with the giants they fathered, is catalogued in the directories further down this page.
  - heading: The Book of Parables
    body:
      - The Book of Parables, also called the Similitudes of Enoch, contains visions of judgment, the vindication of the righteous, and a prominent heavenly figure often called the Son of Man, the Chosen One, or the Righteous One. This section has drawn attention because of its possible relationship to New Testament “Son of Man” language, although scholars debate the exact nature and direction of that influence.
      - For Orthodox use this section should be read carefully. It is historically important for understanding Jewish apocalyptic expectations near the time of Christ, but it is not a doctrinal source equal to the Gospels or the Church's liturgical confession of Christ.
  - heading: The Astronomical Book
    body:
      - The Astronomical Book, or Book of the Heavenly Luminaries, describes the movements of the sun, moon, stars, winds, and seasons, and the calendar, presenting the cosmos as ordered by God and governed according to heavenly laws.
      - It is important for understanding the ancient Jewish concern with sacred time, calendars, feasts, and cosmic order, and it shows that Enochic literature was concerned not only with fallen angels but also with the lawful structure of creation.
  - heading: The Dream Visions
    body:
      - The Dream Visions section contains symbolic visions of world history. One famous vision — the “Animal Apocalypse” — presents human beings and nations through animal imagery, retelling history from Adam and Noah through Israel's trials and into the eschatological judgment.
      - This section includes further references to the fall of the angels, the Flood, the judgment of wicked powers, and the restoration of the righteous, connecting the angelic rebellion to a broader vision of salvation history.
  - heading: The Epistle of Enoch
    body:
      - The Epistle of Enoch contains exhortations, warnings, woes against sinners, encouragement for the righteous, and teaching about the final judgment, strongly contrasting the destiny of the righteous with that of the wicked.
      - It is useful for understanding the moral and apocalyptic tone of 1 Enoch; its emphasis on judgment, righteousness, and perseverance helps explain why early Jews and some early Christians found the book compelling.
  - heading: Major Themes
    body:
      - Across its five books, 1 Enoch returns to a consistent set of concerns.
    table:
      columns: ["Theme", "Description"]
      rows:
        - [
            "Angelic rebellion",
            "The Watchers abandon their appointed place and corrupt humanity.",
          ]
        - [
            "Divine judgment",
            "God judges angels, giants, rulers, sinners, and oppressive powers.",
          ]
        - [
            "Heavenly order",
            "The cosmos, angels, stars, and seasons are governed by divine command.",
          ]
        - [
            "Revelation",
            "Enoch receives hidden knowledge through visions and angelic guides.",
          ]
        - [
            "Righteousness",
            "The righteous suffer for a time but are ultimately vindicated.",
          ]
        - [
            "Demonic origins",
            "Evil spirits are connected with the destroyed giants in later Enochic tradition.",
          ]
        - [
            "Eschatology",
            "The book looks toward the final judgment, restoration, and the triumph of God's justice.",
          ]
  - heading: Influence on the New Testament
    body:
      - The clearest New Testament connection is Jude 14–15, which quotes a prophecy attributed to Enoch that closely parallels 1 Enoch 1:9. Jude's use of Enoch shows that Enochic tradition was known in early Christian circles, but it does not by itself make the whole book canonical for the Church.
      - Other possible thematic connections include angelic judgment, the imprisonment of rebellious spirits, heavenly books, the final judgment, and “Son of Man” imagery. These are best presented as literary and historical parallels rather than as proof that the New Testament depends on 1 Enoch in every case.
  - heading: Reception by the Church Fathers
    body:
      - Early Christian reception of 1 Enoch was mixed. Some early writers knew and used Enochic traditions positively — Tertullian defended the book's value — while others were more cautious. Origen knew of Enochic material but did not treat it as universally accepted Scripture, and later writers such as Augustine rejected its canonical authority, partly because it was not received in the Jewish canon known to the Church.
      - By the Byzantine period, 1 Enoch was largely outside the received biblical canon, though excerpts and traditions survived through quotations, chronography, and later scholarship.
  - heading: Influence on Later Tradition
    body:
      - 1 Enoch influenced later Jewish, Christian, and Islamic-era angelological imagination, especially through its accounts of named angels, fallen Watchers, giants, heavenly journeys, and the final judgment. In Christian art and literature, Enochic themes contributed to broader traditions about rebellious angels, demonic corruption, and the heavenly court.
      - In modern times, 1 Enoch is studied in biblical scholarship, Second Temple Jewish studies, Dead Sea Scrolls research, and Orthodox discussions of ancient angelology. For this database its value is mainly historical and contextual — it helps explain the background of several named angelic figures while preserving a clear boundary between Scripture, Orthodox liturgical tradition, and non-canonical ancient literature.

