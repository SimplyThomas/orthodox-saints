  - key: watchers
    title: The Twenty Leaders of the Watchers
    navLabel: Fallen Watchers
    tone: fallen
    display: table
    intro:
      - The Watchers (Aramaic ʿirin, “the wakeful ones”; Greek Grigori) are the angels who abandoned their appointed station — descending upon Mount Hermon, taking human wives, teaching humankind forbidden arts, and fathering the giants (1 Enoch 6–8). They differ from the faithful angels not in nature but in will.
      - The twenty chiefs of their descent are named in 1 Enoch 6:7. Many are little more than names in that list; several are remembered for a specific forbidden art they taught, shown below.
    entries:
      - name: Semjaza
        meaning: Shemyaza · Shemihazah
        refs: ["1 Enoch 6:3–8", "9:7", "10:11–13"]
        body:
          - Semjaza is the chief leader of the two hundred Watchers who descend upon Mount Hermon. Fearing that the others might abandon their plan to take human wives, he persuades them to swear a mutual oath binding them all to the rebellion. Although Azazel later becomes the most infamous of the fallen angels, Semjaza serves as the principal organizer of the revolt.
          - Unlike several other Watchers, Semjaza is not associated with teaching a specific forbidden art. Instead, he is remembered as the leader who initiated the collective rebellion against God's command.
        lists:
          - label: Known for
            items:
              - Leader of the Watchers
              - The oath on Mount Hermon
              - Father of many giants (Nephilim)
      - name: Arakiel
        meaning: Araqiel
        refs: ["1 Enoch 6:7", "8:3"]
        body:
          - Arakiel is one of the twenty leaders of the Watchers. According to 1 Enoch he taught humanity the “signs of the earth,” generally understood as knowledge relating to geography, geology, agriculture, or the earthly sciences. Ancient interpreters differ on whether this knowledge was inherently evil or became corrupt because it was revealed outside God's appointed order.
        lists:
          - label: Taught
            items:
              - The signs of the earth
      - name: Rameel
        meaning: Ramiel
        refs: ["1 Enoch 6:7"]
        body:
          - Rameel appears among the original leaders of the Watchers but receives no further description in the surviving text of 1 Enoch. No specific forbidden knowledge is attributed to him.
      - name: Kokabiel
        meaning: Kokabel — “Star of God”
        refs: ["1 Enoch 6:7", "8:3"]
        body:
          - Kokabiel's name is commonly interpreted as “Star of God.” He is said to have instructed humanity in the constellations and the movements of the stars. Although astronomy itself is presented positively elsewhere in 1 Enoch, Kokabiel's unauthorized disclosure of heavenly mysteries forms part of the corruption introduced by the Watchers.
        lists:
          - label: Taught
            items:
              - The constellations
              - Stellar knowledge
      - name: Tamiel
        meaning: Kasdaye in some traditions
        refs: ["1 Enoch 6:7"]
        body:
          - Tamiel is listed among the twenty Watcher leaders but is not assigned a specific teaching in the Ethiopic text. Some later traditions associate him with hidden knowledge, though these identifications vary among manuscripts and should not be treated as certain.
      - name: Ramiel
        refs: ["1 Enoch 6:7"]
        body:
          - Ramiel is another of the named leaders. Depending on the manuscript tradition, Ramiel may represent the same figure as Rameel or a separate individual. No particular corruption is assigned to him in the surviving text.
      - name: Danel
        refs: ["1 Enoch 6:7"]
        body:
          - Danel is one of the original leaders of the Watchers. Apart from his inclusion in the list, the text provides no further information concerning his activities or teachings.
      - name: Ezeqeel
        meaning: Ezekiel
        refs: ["1 Enoch 6:7"]
        body:
          - Ezeqeel appears only in the list of Watcher leaders. The surviving manuscripts preserve no additional narrative regarding him.
      - name: Baraqiel
        meaning: Baraqel
        refs: ["1 Enoch 6:7", "8:3"]
        body:
          - Baraqiel taught astrology, according to 1 Enoch. His instruction represents another example of heavenly knowledge revealed outside God's appointed order.
        lists:
          - label: Taught
            items:
              - Astrology
      - name: Asael
        meaning: Asa'el
        refs: ["1 Enoch 6:7"]
        body:
          - Asael appears among the Watcher leaders and is distinct from Azazel in most Ethiopic manuscripts, although some textual traditions confuse the two names. No individual teaching is assigned to Asael.
      - name: Armaros
        meaning: Amaros
        refs: ["1 Enoch 6:7", "8:3"]
        body:
          - Armaros taught the “resolving of enchantments,” generally understood as magical arts or the breaking of spells. His name is closely associated with forbidden magical practices.
        lists:
          - label: Taught
            items:
              - Enchantments
              - Magical arts
      - name: Batarel
        refs: ["1 Enoch 6:7"]
        body:
          - Batarel is one of the twenty leaders of the Watchers. No additional details survive concerning his actions.
      - name: Ananel
        refs: ["1 Enoch 6:7"]
        body:
          - Ananel appears only in the list of the Watchers. No individual role is preserved.
      - name: Zaqiel
        refs: ["1 Enoch 6:7"]
        body:
          - Zaqiel is listed among the Watchers but is not given any further narrative.
      - name: Samsapeel
        refs: ["1 Enoch 6:7"]
        body:
          - Samsapeel is one of the leaders of the rebellion. Later Jewish traditions occasionally expand upon his role, but 1 Enoch itself provides no further details.
      - name: Satarel
        refs: ["1 Enoch 6:7"]
        body:
          - Satarel appears only in the list of Watcher leaders. No particular corruption is attributed to him.
      - name: Turel
        refs: ["1 Enoch 6:7"]
        body:
          - Turel is mentioned only by name among the twenty leaders.
      - name: Yomiel
        refs: ["1 Enoch 6:7"]
        body:
          - Yomiel is another of the listed leaders for whom the surviving text preserves no further information.
      - name: Sariel (Watcher tradition)
        refs: ["1 Enoch 6:7"]
        body:
          - Some manuscript traditions include Sariel among the Watchers, while others instead list him among the faithful archangels in 1 Enoch 20. Because of this variation, scholars generally regard Sariel's identity in the Watcher list as textually uncertain.

  - key: prominent-fallen
    title: Other Prominent Fallen Angels
    navLabel: Prominent Fallen
    tone: fallen
    display: list
    intro:
      - These figures receive far more attention in the narrative than most of the twenty leaders — several for the specific arts they taught, and one for the emphasis placed on his imprisonment.
    entries:
      - name: Azazel
        refs: ["1 Enoch 8:1–2", "9:6", "10:4–8", "13–14", "54:5–6"]
        body:
          - Azazel is the most prominent of the fallen Watchers after Semjaza. He teaches humanity the manufacture of swords, knives, shields, and armor, together with cosmetics, jewelry, precious stones, and other arts that contribute to violence and moral corruption — so much so that “the whole earth has been corrupted” through what he made known (1 Enoch 10:8).
        fate: Bound hand and foot by the archangel Raphael and cast into the desert chasm of Dudael, covered with rough stones until the Day of Judgment (1 Enoch 10:4–8).
        lists:
          - label: Taught
            items:
              - Weapons
              - Warfare
              - Armor
              - Jewelry
              - Cosmetics
              - Metalworking
      - name: Gadreel
        refs: ["1 Enoch 69:6–7"]
        body:
          - Gadreel appears in one of the later sections of 1 Enoch. He is blamed for leading Eve astray and for introducing the instruments of war and death to humanity. Unlike the leaders listed in chapter 6, Gadreel is introduced later as an important participant in humanity's corruption.
        lists:
          - label: Taught
            items:
              - Weapons of war
              - Murder
              - Deception
      - name: Penemue
        refs: ["1 Enoch 69:8–11"]
        body:
          - Penemue teaches humanity writing, ink, and paper, together with forms of secret knowledge that lead people away from righteousness. The text does not condemn literacy itself, but portrays the unauthorized transmission of heavenly mysteries as spiritually dangerous.
        lists:
          - label: Taught
            items:
              - Writing
              - Ink and paper
              - Secret knowledge
      - name: Kasdeja
        meaning: Kasbeel
        refs: ["1 Enoch 69:12–14"]
        body:
          - Kasdeja teaches destructive forms of magic, poisons, abortions, and harmful spiritual practices. His instruction is presented as among the most corrupting influences introduced by the fallen angels.
        lists:
          - label: Taught
            items:
              - Sorcery
              - Poisons
              - Harmful magic
              - Abortive potions
      - name: Jeqon
        meaning: Yeqon
        refs: ["1 Enoch 69:4–5"]
        body:
          - Jeqon is remembered as the angel who persuaded the Watchers to bind themselves with an oath before descending to earth. His role emphasizes deliberate rebellion rather than the teaching of forbidden knowledge.
        lists:
          - label: Known for
            items:
              - Persuading the Watchers to swear the oath
              - Encouraging the collective rebellion

  - key: giants
    title: Giants / Nephilim
    navLabel: Giants
    tone: fallen
    display: list
    intro:
      - In 1 Enoch the giants are the violent offspring of the Watchers and human women. They devastate the earth and become a central reason for the divine judgment of the Flood — and, once destroyed, the origin of the evil spirits that afflict the world (last below).
    entries:
      - name: The Giants
        refs: ["1 Enoch 7:2–6", "9:9", "10:9–15", "15:8–12"]
        body:
          - The giants — often identified with the Nephilim — are the hybrid offspring born from the union of the Watchers and human women. According to 1 Enoch they grew to extraordinary size and strength, consuming enormous quantities of food until the earth could no longer sustain them. When natural resources failed, they began devouring animals and eventually turned their violence against humanity itself.
          - They are portrayed not merely as physically powerful beings but as symbols of unchecked violence and corruption. Their destruction becomes one of the chief reasons God sends the Flood — the archangel Gabriel is specifically commanded to incite conflict among them so that they destroy one another before the Flood arrives (1 Enoch 10:9). Unlike the mythological giants of other cultures, the Enochic giants are not an independent race but the direct offspring of angelic rebellion.
        lists:
          - label: Key Themes
            items:
              - Hybrid offspring of angels and humans
              - Extraordinary size and strength
              - Violence and bloodshed
              - Judgment before the Flood
              - Destruction by divine decree
      - name: Nephilim
        refs: ["Genesis 6:1–4", "1 Enoch 7", "1 Enoch 15"]
        body:
          - The term Nephilim originates in Genesis 6:4, where it describes mysterious mighty beings who lived before the Flood. Although Genesis provides very little detail, 1 Enoch greatly expands the narrative by identifying the Nephilim as the children of the Watchers and human women.
          - In later Jewish literature, including 1 Enoch, the terms Nephilim, giants, and related designations sometimes overlap, though the terminology is not always used consistently. Within Orthodox Christianity, Genesis remains the canonical source, while 1 Enoch represents an important example of how Jews of the Second Temple period interpreted the brief biblical account.
        lists:
          - label: Key Themes
            items:
              - Expansion of Genesis 6
              - Pre-Flood corruption
              - Angelic rebellion
              - Divine judgment
      - name: Elioud
        meaning: Elioudai
        refs: ["Later manuscripts of 1 Enoch", "Book of Giants traditions"]
        body:
          - The Elioud are mentioned in some manuscript traditions and related Enochic literature as a later generation descended from the original giants. Ancient interpreters differ regarding their exact relationship to the Nephilim — some understand them as a second generation of giant offspring, while others use the term simply as another designation for the giants themselves.
          - Because the textual evidence varies, modern scholars generally treat the Elioud as part of the broader Enochic giant tradition rather than as a clearly defined separate race. The name appears more frequently in later Enochic traditions than in the earliest surviving portions of the Book of the Watchers.
        lists:
          - label: Key Themes
            items:
              - Later giant tradition
              - Possible second generation
              - Manuscript variation
              - Enochic interpretation
      - name: Evil Spirits from the Giants
        refs: ["1 Enoch 15:8–12", "16:1"]
        body:
          - One of the most influential teachings of 1 Enoch is its explanation for the origin of evil spirits. After the destruction of the giants their physical bodies perish, but their spirits remain upon the earth.
          - According to the text, these become wandering evil spirits that oppress humanity, tempt people into sin, spread violence, and bring disease and suffering. Unlike the fallen Watchers, who are imprisoned awaiting the final judgment, the spirits of the giants continue to operate in the world until the consummation of history. This teaching profoundly influenced later Jewish demonology and appears to provide background for New Testament language concerning unclean spirits, although the New Testament never explicitly adopts the entire Enochic explanation.
        lists:
          - label: Key Themes
            items:
              - Origin of demons in Enochic tradition
              - Wandering spirits
              - Temptation
              - Spiritual warfare
              - Influence on later Jewish thought

  - key: book-of-giants
    title: Figures from the Book of Giants
    navLabel: Book of Giants
    tone: fallen
    display: list
    intro:
      - The following figures belong primarily to the Book of Giants — a separate Jewish work closely related to 1 Enoch that survives in fragments among the Dead Sea Scrolls and in later Manichaean manuscripts. Although they do not appear prominently in 1 Enoch itself, they belong to the same literary tradition and expand the story of the giant offspring of the Watchers.
    entries:
      - name: Ohyah
        meaning: Ohya
        refs: ["Book of Giants (Dead Sea Scrolls)"]
        body:
          - Ohyah is one of the principal giant leaders, commonly described as a son of the Watcher Semjaza. He experiences terrifying dreams foretelling the destruction of the giants and seeks their interpretation.
          - Unable to understand these visions, Ohyah takes part in sending Mahaway to Enoch, hoping the patriarch can explain God's coming judgment. His fear contrasts sharply with the earlier arrogance of the giants and introduces the theme of unavoidable divine justice.
        lists:
          - label: Associated Themes
            items:
              - Dreams
              - Divine judgment
              - Son of Semjaza
              - Fear of destruction
      - name: Hahyah
        meaning: Hahya
        refs: ["Book of Giants"]
        body:
          - Hahyah is usually identified as the brother of Ohyah and another son of Semjaza. Like his brother, he witnesses prophetic dreams announcing the destruction of the giants. Although only fragments survive, Hahyah appears among the giant leaders who seek answers from Enoch after recognizing that judgment is approaching.
        lists:
          - label: Associated Themes
            items:
              - Brother of Ohyah
              - Prophetic dreams
              - Coming judgment
      - name: Mahaway
        meaning: Mahawai
        refs: ["Book of Giants"]
        body:
          - Mahaway serves as a messenger among the giants. After Ohyah and Hahyah receive troubling dreams, Mahaway undertakes a remarkable journey to seek Enoch and obtain an interpretation. He functions as an intermediary between the condemned giants and the righteous patriarch, and Enoch's response offers no hope of escape — confirming that God's judgment against the giants and the Watchers cannot be overturned. Mahaway is one of the best-developed characters in the surviving Book of Giants.
        lists:
          - label: Associated Themes
            items:
              - Messenger
              - Journey to Enoch
              - Interpretation of dreams
              - Announcement of judgment
      - name: Gilgamesh
        refs: ["Book of Giants"]
        body:
          - The appearance of Gilgamesh shows how ancient Jewish writers incorporated well-known Mesopotamian heroic traditions into their own literature. Rather than the legendary king celebrated in Mesopotamian epic, the Book of Giants includes him among the giant figures awaiting divine judgment — an illustration of the interaction between biblical traditions and the broader literary world of the ancient Near East.
        lists:
          - label: Associated Themes
            items:
              - Ancient hero
              - Mesopotamian influence
              - Giant tradition
              - Divine judgment
      - name: Humbaba
        meaning: Huwawa
        refs: ["Book of Giants"]
        body:
          - Humbaba, also known as Huwawa, is another famous figure borrowed from Mesopotamian literature. Like Gilgamesh, he appears within the Book of Giants tradition rather than in the canonical biblical account or the text of 1 Enoch itself. His inclusion demonstrates how Second Temple Jewish writers adapted familiar legendary figures into an Enochic framework centered on divine judgment and the consequences of angelic rebellion.
        lists:
          - label: Associated Themes
            items:
              - Mesopotamian legendary figure
              - Book of Giants
              - Enochic adaptation
              - Ancient Near Eastern influence

  - key: imprisoned
    title: Imprisoned Heavenly Beings
    navLabel: Imprisoned
    tone: fallen
    display: list
    intro:
      - Following the rebellion of the Watchers, God pronounces judgment upon the fallen angels. Rather than being immediately destroyed, many are bound in places of darkness beneath the earth or in the wilderness until the final judgment. Throughout 1 Enoch the patriarch is shown visions of these places of imprisonment, where rebellious heavenly beings await God's appointed time. The book repeatedly emphasizes that divine judgment is both immediate and future — the Watchers are already restrained, yet their final punishment will come only at the end of the age.
    entries:
      - name: The Bound Watchers
        refs: ["1 Enoch 10:11–15", "18:11–16", "21:1–10"]
        body:
          - After the rebellion, God commands the faithful angels to bind the Watchers beneath the earth until the Day of Judgment. The leaders of the revolt are chained in darkness, where they remain imprisoned while awaiting their final sentence. Enoch later sees this place of confinement during his heavenly journey — a deep abyss filled with darkness and fiery punishment, prepared for those who abandoned their proper dwelling.
        lists:
          - label: Sentence
            items:
              - Bound in chains
              - Confined beneath the earth
              - Await the final judgment
      - name: The Seven Stars Bound in Heaven
        refs: ["1 Enoch 18:13–16", "21:1–6"]
        body:
          - During one of his visions Enoch encounters seven stars that have been bound together because they failed to fulfill the command God had given them. The interpreting angel explains that these stars represent heavenly beings who transgressed their appointed order; they remain imprisoned until ten thousand ages have been completed. Their exact identity is debated — some interpreters understand them as a separate class of rebellious powers, others identify them symbolically with some of the fallen Watchers.
        lists:
          - label: Sentence
            items:
              - Bound heavenly beings
              - Await the completion of ten thousand ages
              - Punished for disobedience
      - name: The Stars that Left Their Order
        refs: ["1 Enoch 86–88 (Dream Visions)"]
        body:
          - The Dream Visions portray the rebellious angels symbolically as stars falling from heaven. These stars descend to earth, mingle with humanity, and contribute to the corruption that leads to the Flood. The imagery later influenced Jewish and Christian symbolism in which stars frequently represent angelic beings.
      - name: Spirits Awaiting Judgment
        refs: ["1 Enoch 22"]
        body:
          - Enoch is shown four hollow places within a great mountain where the spirits of the dead await the resurrection and the final judgment. These are human souls, not fallen angels — the compartments separate the righteous from various classes of the wicked. It is included here to be distinguished from the prison of the Watchers, with which it is easily confused, though both involve a temporary confinement before the Last Judgment.
    table:
      columns: ["Being", "Current state", "References"]
      rows:
        - [
            "Semjaza and the Watchers",
            "Bound beneath the earth awaiting judgment",
            "1 Enoch 10; 18; 21",
          ]
        - ["Azazel", "Bound in Dudael by Raphael", "1 Enoch 10"]
        - [
            "The seven bound stars",
            "Imprisoned until ten thousand ages are completed",
            "1 Enoch 18; 21",
          ]
        - [
            "Spirits of the giants",
            "Active on earth as evil spirits",
            "1 Enoch 15",
          ]
        - ["The human dead", "Await the resurrection in Sheol", "1 Enoch 22"]
