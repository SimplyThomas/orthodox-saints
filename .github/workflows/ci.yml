name: CI
on:
  pull_request:
  push:
    branches-ignore: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests
      - run: python build.py --check-only

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python build.py --no-xlsx          # emit public/data.json (no openpyxl needed) for the Astro build
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run lint                        # eslint + prettier --check
      - run: npm run test:unit                   # vitest unit tests (pure lib logic)
      - run: npm run build                       # astro build must succeed
      - run: npx playwright install --with-deps chromium
      - run: npm test                            # playwright smoke tests (build base-path, modal, quiz)
