name: CI
on:
  pull_request:
  push:
    branches-ignore: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests
      - run: python build.py --check-only

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python build.py --no-xlsx          # emit public/data.json (no openpyxl needed) for the Astro build
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run lint                        # eslint + prettier --check
      - run: npm run build                       # astro build must succeed
      - run: npx playwright install --with-deps chromium
      - run: npm test                            # playwright smoke tests (build base-path, modal, quiz)
