name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python build.py            # validates + emits public/data.json + dist xlsx; fails the deploy if data is bad
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      # Astro's content-layer store (.astro/): restoring it lets the profiles
      # collection re-parse only changed YAML files instead of all ~2.6k.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .astro
          key: astro-datastore-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/content/profiles/**') }}
          restore-keys: |
            astro-datastore-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
      - run: npm run build              # astro build -> _site/ (reads public/data.json, custom domain orthodoxsaintfinder.com)
        env:
          # Umami Analytics website id (not secret — it ships in page source).
          # Add it under Settings -> Secrets and variables -> Actions -> Variables.
          # Empty/unset = the analytics script is simply omitted from the build.
          PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.PUBLIC_UMAMI_WEBSITE_ID }}
      - name: Add the Excel export to the site
        run: cp dist/Orthodox_Saints_Database.xlsx _site/ 2>/dev/null || true
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with: { path: _site }
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      # Cloudflare fronts orthodoxsaintfinder.com and edge-caches HTML (see
      # infra/cloudflare/). A GitHub Pages deploy leaves stale HTML at the edge,
      # so purge it to make the new build live immediately. Hashed assets keep
      # their URLs, so purging everything just re-warms them cheaply. Skips
      # cleanly if the secrets are not configured, but FAILS LOUDLY if a purge
      # is attempted and Cloudflare rejects it — a silently-swallowed purge
      # failure (e.g. a bad/expired token) leaves the whole site stale at the
      # edge with a green deploy, which is exactly the confusion this guards.
      - name: Purge Cloudflare edge cache
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ZONE_ID:-}" ]; then
            echo "CF_API_TOKEN/CF_ZONE_ID not set — skipping edge cache purge."
            exit 0
          fi
          body="$(mktemp)"
          code="$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            -o "$body" -w '%{http_code}')"
          echo "Cloudflare purge_cache HTTP $code"
          python3 -m json.tool < "$body" || cat "$body"
          ok="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("success"))' < "$body" 2>/dev/null || echo False)"
          if [ "$code" != "200" ] || [ "$ok" != "True" ]; then
            echo "::error title=Cloudflare purge failed::Edge cache was NOT purged (HTTP $code, success=$ok). The new deploy is live on the origin but will be served STALE at the edge until this is fixed — check the CF_API_TOKEN secret (needs a zone-scoped User token with Cache Purge)."
            exit 1
          fi
          echo "Edge cache purged."
